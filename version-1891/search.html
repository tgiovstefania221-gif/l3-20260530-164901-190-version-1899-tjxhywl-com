曾在深渊中堕落为魔，只为给兄长讨回一个公道。", "bucket": "action"}, {"id": "1191", "title": "万圣夜惊魂", "filename": "m1191.html", "year": "2024", "region": "美国", "genre": "恐怖 / 悬疑 / 惊悚", "tags": "万圣节， 面具杀手， 密室逃脱， 直播杀人， 社交媒体", "summary": "万圣夜，六位不同领域的网红收到神秘邀请，前往一座郊区别墅参加“终极万圣派对”。别墅内装饰着99个真南瓜，每个里面都藏着一个线索。主人迟迟未现身，他们通过直播与粉丝互动。当他们中最贪吃的女孩摘下一个南瓜里的糖吃下后，七窍流血死亡。屏幕弹出一条消息：“每摘下一个南瓜，就死一个人。南瓜全部摘下后，最后一个存活者可以获得千万奖金。” 直播观看量暴涨，五位幸存者被迫互相猜忌、合作、背叛。他们发现别墅门窗全被封死，唯一出口需要集齐藏在南瓜里的六把钥匙的密码。过程中他们发现邀请者是其中一人的狂热粉丝，因被所有网红网暴过而策划了这场复仇直播。最终只有女主角幸存，她打开门的那一刻，无数闪光灯亮起——外面是数百个举着手机的围观者，他们全程观看了直播并投票决定下一个死法。女主角崩溃痛哭。", "one_line": "六个网红受邀参加豪宅万圣派对，却发现每摘下一个装饰南瓜，就有一个朋友惨死。", "bucket": "horror"}, {"id": "1192", "title": "电幻国度", "filename": "m1192.html", "year": "2026", "region": "美国", "genre": "科幻 / 冒险 / 剧情", "tags": "废土世界，人机共存，少女与机器人，反乌托邦", "summary": "1997年，现实已经崩坏。人类戴上VR头盔沉溺“电幻国度”，真实世界沦为荒漠。少女米歇尔的弟弟克里斯托弗失踪，她怀疑他进入了更深层的“梦境泡”。她出发寻找，路上遇到一台型号SK-2的陈旧机器人，只剩下摄像头眼睛能动，被米歇尔叫作“黄仔”。一人一机穿越废弃超市、自动驾驶坟场、以及由失控无人机统治的“死亡峡谷”。途中他们遇到一个“清醒的人类抵抗组织”，其首领竟是被洗脑的弟弟。弟弟坚信“虚拟才是真实”，要带米歇尔进入终极幻境。米歇尔在黄仔的帮助下拔掉弟弟的神经插头。弟弟醒来第一句话：“那个世界没有你。”结尾米歇尔修复了黄仔，给了它一颗人类心脏形状的电池。", "one_line": "女孩米歇尔穿越废土寻找弟弟，唯一的同伴是一台只剩眼睛能动的黄色小机器人。", "bucket": "sci-fi"}, {"id": "1193", "title": "秘术", "filename": "m1193.html", "year": "2024", "region": "中国", "genre": "悬疑/惊悚", "tags": "民俗, 僵尸, 湘西, 赶尸, 风水", "summary": "90年代末，湘西。年轻的赶尸匠陈石头接了一趟大活：护送五具客死他乡的尸体回老家。按照规矩，他摇铃撒纸钱，昼伏夜出。但这一次，他总觉得背后死气沉沉的尸体似乎在偷看他。在歇脚时，他无意间划破了一具尸体的手臂，流出的不是黑血，而是泛着荧光的液体。恐惧之下他报了警，刑警队介入后发现，这根本不是尸体，而是五名被注射了强效镇定剂的科研人员，他们的体内被植入了某种正在研发的神经芯片。所谓的“秘术”，不过是最高明的科技障眼法。", "one_line": "湘西赶尸世家的传人，在一次赶尸途中，发现尸体里藏着的不是魂魄，而是一个国家级绝密科研计划。", "bucket": "suspense"}, {"id": "1194", "title": "饥饿游戏3:嘲笑鸟", "filename": "m1194.html", "year": "2014", "region": "美国", "genre": "动作 / 科幻 / 冒险", "tags": "反乌托邦, 革命, 精神图腾, 大结局上", "summary": "凯妮丝被救至十三区，在总统科恩的操控下成为“嘲笑鸟”——反抗运动的象征。她被迫拍摄宣传片鼓舞各区的士气，同时要去营救沦为俘虏的皮塔。然而随着革命推进，凯妮丝逐渐察觉科恩与斯诺并无本质区别。当起义军攻入国会区、皮塔被洗脑后攻击她时，凯妮丝面临终极抉择：是成为被塑造的英雄，还是做回那个只为了爱与正义的普通女孩？本集为终结篇上部，以压抑的情绪和道德困境为结局铺垫。", "one_line": "凯妮丝成为革命象征，但她发现自己只是另一场权力游戏的棋子。", "bucket": "action"}, {"id": "1195", "title": "魔域余生", "filename": "m1195.html", "year": "2018", "region": "美国", "genre": "恐怖 / 奇幻", "tags": "恶魔, 逃生, 密室, 血腥", "summary": "程序员阿莱克斯醒来时发现自己身处一座由血肉和骨骼构成的迷宫。和他同样遭遇的还有另外五人。一个声音告诉他们：这座迷宫是活的，它每过一个小时就会“消化”掉一个人。六人必须在倒计时内找到出口，但每次有人死去，迷宫就会改变结构。阿莱克斯通过计算发现，迷宫其实是根据某种数学规则重构的。他带领幸存者一边躲避迷宫中的触手和陷阱，一边破解规则。最终只剩下两人时，阿莱克斯发现迷宫的核心就是他们脚下——只要主动“献祭”一人，另一人就能离开。最终一位母亲自愿留下，阿莱克斯逃出，却发现外面的世界也已经被魔域侵蚀。", "one_line": "六人醒来被困在活体地牢中，每过一小时，就有一人被献祭给地底的恶魔。", "bucket": "horror"}, {"id": "1196", "title": "家有儿女新传", "filename": "m1196.html", "year": "2026", "region": "中国大陆", "genre": "喜剧 / 家庭", "tags": "重组家庭, 代际, 搞笑", "summary": "时光飞逝，夏小雪早已不是当年的叛逆少女，而是成了一档家庭调解节目的主持人。她与丈夫、两个孩子以及时不时来“指导工作”的亲生父母夏东海和刘梅过着看似平静的生活。然而，父母当年那点“历史遗留问题”突然爆发——夏东海想卖掉老房子移民，而刘梅坚决反对，双方各自搬来援军，连当年的“鼠标”、“键盘”都卷入其中。小雪不得不在镜头前，用当年治服刘星的方法，去摆平这群“老小孩”。一场关于亲情、金钱与记忆的混战，笑料百出又温暖感人。", "one_line": "20年后，当年的“小雪”成为了一名金牌调解员，而她要调解的第一个案子，就是自己父母和继父母之间的奇葩纠纷。", "bucket": "comedy"}, {"id": "1197", "title": "小麻雀", "filename": "m1197.html", "year": "2023", "region": "中国大陆", "genre": "剧情 / 儿童 / 家庭", "tags": "留守儿童、乡村教师、合唱团、治愈", "summary": "湘西山村，10岁女孩小雀父母在外打工，她跟着奶奶生活。小雀五音不全，但音乐老师刘老师发现她能准确分辨所有声音的频率——绝对音感。刘老师自己是个被城里剧团淘汰的落魄歌手，他把所有梦想都押在小雀身上。村里人都笑他们，说唱歌能当饭吃？小雀在省城合唱比赛上，没有唱歌，而是用口技还原了整个山寨的天籁：溪水、鸟鸣、奶奶的摇篮曲。", "one_line": "一个五音不全的留守儿童，被村里最差的音乐老师发现她其实有“绝对音感”。", "bucket": "drama"}, {"id": "1198", "title": "演员", "filename": "m1198.html", "year": "2025", "region": "法国/意大利", "genre": "剧情/文艺", "tags": "戏中戏, 存在主义, 舞台剧, 双重人生", "summary": "年近五十的老演员文森特，一辈子都在各大舞台和片场饰演跑龙套的失败者、流浪汉或酒鬼。他穷困潦倒，住在狭小的阁楼里，被剧评人称为“最真实的底层扮演者”。然而一场突发的疾病需要巨额手术费，他的同事们在为他筹款时，意外发现文森特竟然是欧洲某古老财团的唯一继承人，拥有巨额财富。原来，他为了体验“真实的人生痛苦”以精进演技，才隐瞒身份过着苦行僧般的生活。面对众人不解的目光和镜头，文森特在舞台上完成了最后一场关于“骗子”的独白后，脱下戏服，消失在了夜色中。", "one_line": "一个在剧场饰演“失败者”的演员，在现实生活中竟然真的是一名隐藏身份的巨富继承人。", "bucket": "drama"}, {"id": "1199", "title": "间谍亚契第二季", "filename": "m1199.html", "year": "2011", "region": "美国", "genre": "动画 / 喜剧 / 动作", "tags": "特工, 办公室喜剧, 黑色幽默, 冷战怀旧", "summary": "第二季中，自大狂特工斯特林·亚契和他混乱的 ISIS 情报局同事们迎来了新的挑战。当一场看似简单的军火交易变成争夺失控卫星控制权的竞赛时，亚契不得不放下对秘书嘉洛尔的痴迷，去阻止一场瞄准华盛顿的轨道打击。过程中，人力资源主管遭遇绑架，会计部被炸上天，而亚契的母亲——局长马洛里——一边酗酒一边远程指挥。本季延续无厘头风格，冷战怀旧元素与荒诞科技并存，每集都在精准与胡闹间反复横跳，最终以亚契意外升职的乌龙结局收场，笑点密集且充满冒犯式幽默。", "one_line": "世界上最自恋的特工亚契卷入一场关乎国际空间站的致命阴谋，却依然不忘调戏女同事。", "bucket": "animation"}, {"id": "1200", "title": "老无所依", "filename": "m1200.html", "year": "2024", "region": "中国大陆", "genre": "剧情 / 家庭", "tags": "空巢老人, 养老困境, 城市与乡村, 代际撕裂", "summary": "陕西农村的周长河老人丧偶后独居。三个儿子：老大在北京开公司，老二在深圳当码农，老三在县城做公务员。老人生病住院，三个儿子互相推诿，最后靠护工照顾。出院后，周长河把三个儿子告上法庭。法庭上，大儿子说给钱就行，二儿子说可以装监控，三儿子说送去养老院。老人在被告席上说了最后一句话：“我不要钱，不要监控，不要养老院。我只要你们三个，每年回来，在这老屋里，陪我住十天。就十天。”法官当庭哽咽。最终调解结案，三个儿子轮流陪住。老大第一个月回来，坐在小时候写作业的桌前，才发现自己已经二十年没进过这间房。老人的计时器上写着：还剩九天。", "one_line": "七十三岁的父亲把三个儿子告上法庭，要求的不是赡养费，而是每人每年必须回村住满十天。", "bucket": "drama"}, {"id": "1201", "title": "烽火雁翎", "filename": "m1201.html", "year": "2023", "region": "中国大陆", "genre": "战争、历史、动作", "tags": "抗日战争、白洋淀、雁翎队、民间英雄、游击队", "summary": "1939年，日军在白洋淀地区实行“三光政策”，美丽的芦苇荡变成了人间地狱。猎户出身的雁翎，亲眼目睹了乡亲被杀害。他不再沉默，利用自己对水性的精通和对芦苇荡地形的熟悉，联合了一帮同样身怀绝技的猎人、渔民和铁匠，组成了一支民间抗日武装。他们用打水禽的大抬杆猎枪作为武器，驾驶着伪装成荷叶的小船，神出鬼没地袭击日军的运输船和炮楼。日本陆军派来了擅长水战的指挥官山本，试图一举剿灭雁翎队。一场猫鼠游戏在白洋淀的水上与水下展开。最终，雁翎队利用水下的渔网和机关，将山本的舰队引入了陷阱，上演了一场荡气回肠的水上歼灭战。", "one_line": "1939年白洋淀，一群靠捕鱼打猎为生的猎人，组成“雁翎队”，用土枪土炮与日寇展开水上游击战。", "bucket": "drama"}, {"id": "1202", "title": "鱼缸", "filename": "m1202.html", "year": "2023", "region": "中国台湾", "genre": "剧情 / 家庭 / 心理", "tags": "单亲家庭, 青春期, 沉默, 城市孤独", "summary": "17岁的阿静和患有躁郁症的母亲住在台北万华一栋无电梯公寓的顶楼加盖铁皮屋里。夏天屋内温度高达四十度，她唯一的陪伴是一缸在自己房间角落里偷偷养的孔雀鱼。母亲的新男友阿伟是个酒保，看似温柔，但会在深夜敲阿静的房门。阿静不敢告诉任何人。有一天她放学回家，发现鱼缸里的水变成了蓝色，所有鱼浮在水面上。母亲在客厅笑着看电视，阿伟坐在旁边说：“帮你换水啦，加了点漂白水消毒。”阿静没有哭。她用一个塑料袋把死鱼装好，放在冰箱冷冻室。然后她从厨房拿了一把水果刀，走到客厅，坐在阿伟对面，把刀放在茶几上。她说：“你今晚睡这里。”然后自己回了房间，锁了门。", "one_line": "一个住在台北老旧公寓顶楼加盖的少女，偷偷养了一缸鱼，直到母亲的新男友往鱼缸里倒了一整瓶清洁剂。", "bucket": "drama"}, {"id": "1203", "title": "嗜血小红帽", "filename": "m1203.html", "year": "2023", "region": "美国", "genre": "恐怖, 惊悚", "tags": "暗黑童话, 狼人, 血腥, 女性反杀", "summary": "在这个颠覆性的黑暗版本中，小红帽并非无辜的受害者。她所居住的村庄被嗜血的狼人诅咒困扰。每当月圆之夜，小红帽就会披上外婆用狼皮编织的红色斗篷，独自走进黑森林。村民都以为她是去给外婆送食物，殊不知她其实是去猎杀那些企图接近村庄的狼人。这一次，一只极其狡猾的狼人伪装成了“猎人”混入村庄，并绑架了真正的外婆。小红帽必须在大脑被恐惧占据的村民面前揭开“猎人”的伪装，用她那把银制斧头和嗜血的意志，杀入狼穴救出外婆，完成一场血腥的救赎。", "one_line": "外婆不是被狼吃的，小红帽才是森林里最危险的猎手。", "bucket": "horror"}, {"id": "1204", "title": "补破网", "filename": "m1204.html", "year": "2023", "region": "中国台湾", "genre": "剧情 / 犯罪 / 社会", "tags": "底层诈骗, 弱势相害, 黑色写实, 老年困境", "summary": "七旬老翁阿财，渔网破了补，补了破，一辈子没攒下钱。孙子重病，儿子跑路，他走投无路加入一个诈骗团伙，负责最底层的取款“车手”。第一次取款，对象是一个靠拾荒为生的老太，阿财于心不忍，反而塞给对方几百块。黑帮威逼他必须完成任务，阿财于是发明了一套“骗中骗”：假装正规公益组织，专门骗那些贪得无厌的小奸商，把钱转去救助真正困难的老人。事情败露后，黑帮追杀，警察通缉，阿财却带着一群老弱病残，在废弃渔船上设下最后的“网”，让所有害人者自投罗网。", "one_line": "七十岁的老渔工加入诈骗集团当“车手”，却发现受害者都是比自己更穷的底层老人。", "bucket": "drama"}, {"id": "1205", "title": "战疫之疯狂的口罩", "filename": "m1205.html", "year": "2024", "region": "中国大陆", "genre": "灾难 / 喜剧 / 黑色幽默", "tags": "疫情, 荒诞, 囤货, 小人物", "summary": "口罩厂保安老李在被封厂的前一晚，偷听到厂长打电话说库房有一批过期口罩打算翻新卖高价。老李灵机一动，拍了库房照片发给网上三个不同买家：微商赵姐、外贸商“刘总”和一个海外华人。三人以为老李有内部渠道，纷纷打来定金。实际上库房里只有空箱子。麻烦的是，三人带着现金同时来到厂门口“提货”。老李只能让A骗B、B骗C、C骗A，上演了一出口罩版的“三岔口”。当所有人终于发现口罩不存在时，真正的民警和卫健委同时赶到——原来工厂从未生产过口罩，只有老李和厂长两个人是真实存在的。", "one_line": "疫情暴发初期，一个口罩厂保安和三个骗子围绕一批“根本不存在”的口罩，展开了一场连环骗局。", "bucket": "comedy"}, {"id": "1206", "title": "共生心理分类学", "filename": "m1206.html", "year": "2019", "region": "法国 / 比利时", "genre": "悬疑 / 科幻", "tags": "哲学寓言, 密室心理, 极简美学", "summary": "在一间没有任何家具的纯白房间内，七位性别、年龄、职业各异的人同时醒来。他们发现每人胸口都贴着一个会变色的数字，墙上唯一的文字写着“请完成分类”。起初他们试图通过交谈寻找共性，但很快发现任何试图建立的标签——职业、性格、血型——都会导致数字变化和房间的物理惩罚。一个自称心理学家的女人提议不要看“人”，而是看“关系”。他们开始构建复杂的动态模型，最终意识到自己并非真实人类，而是被用于研究“共生需求”的意识样本。当最后两人因拥抱而数字同步时，房间碎裂，露出外面浩瀚的星海。", "one_line": "七个陌生人被关在纯白立方体里，唯一的规则是“将对方归类”。", "bucket": "suspense"}, {"id": "1207", "title": "东京倾情男女", "filename": "m1207.html", "year": "2026", "region": "日本", "genre": "爱情 / 剧情 / 成人向", "tags": "都市情感, 群像剧, 不伦恋, 孤独感, 现实向", "summary": "繁华又冷漠的东京，深夜总是滋生孤独。一款名为“倾情”的匿名约会APP开始在都市男女中秘密流行，它的规则是：只能匹配到与自己生活轨迹完全不相交的陌生人，且关系必须在一周后自动销毁，不能留下任何联系方式。广告公司总监恭介厌倦了妻子的冷漠，在APP上遇到了单纯的大学生莉子；单亲妈妈美雪为了排解压力，匹配到了温柔的主厨阿诚；而编程天才拓海发现了APP的漏洞，他黑进系统，发现这个APP的开发者在通过这场“社会实验”，搜集人类真实的情感数据。当虚拟的情感逐渐侵蚀现实，当谎言变成真心，五个男女在东京的霓虹灯下，开始了一场关于爱与被爱的赌博。", "one_line": "在深夜的东京，五个孤独的陌生人通过一个神秘的“情感交换”APP，开始了危险的情感实验。", "bucket": "romance"}, {"id": "1208", "title": "凯撒密令", "filename": "m1208.html", "year": "2025", "region": "美国 / 意大利", "genre": "历史 / 惊悚", "tags": "古罗马, 宗教, 考古, 阴谋论, 解密", "summary": "考古学家米歇尔在梵蒂冈地下档案馆修复一卷羊皮纸时，意外发现一封据称是尤利乌斯·凯撒在被刺杀前三天写下的密令。密令用一种早已失传的密码写成，初步破译出的内容显示：凯撒曾秘密资助一个名为“拿撒勒派”的犹太教小分支，而该分支的领袖“耶稣”的真实身份并非神之子，而是凯撒安插在犹太行省的编外情报人员。如果这份密令属实，基督教的根基将被彻底动摇。梵蒂冈立即封锁消息，但米歇尔的学生已将部分内容泄露到暗网。一时间，各国宗教势力、考古猎人和情报机构全部出动，米歇尔必须在追杀中完成全部破译，并决定人类的信仰能否承受这个真相。", "one_line": "梵蒂冈秘密档案馆中惊现凯撒亲笔密令，若公开将彻底颠覆西方文明史。", "bucket": "drama"}, {"id": "1209", "title": "胡狼来了", "filename": "m1209.html", "year": "2019", "region": "埃及", "genre": "惊悚 / 剧情", "tags": "沙漠，走私，生存，复仇", "summary": "生活在埃及边境小镇的萨米尔为了凑齐女儿的心脏手术费，答应帮蛇头运送一批“特殊货物”穿过沙漠进入利比亚。出发后他才发现，货物是二十名挤在货车夹层里的偷渡客。穿越沙漠的七天里，他们遭遇了沙尘暴、车辆抛锚和缺水危机。萨米尔在面对巡逻军警时，本有机会弃货逃跑，但偷渡客中一名孕妇的哀求让他选择了继续前行。当黑帮在半路准备灭口以除后患时，萨米尔利用对沙漠地形的熟悉，反杀黑帮头目，并带领幸存者走到了国际救援组织设立的检查站。女儿的手术费最终由一家难民基金会承担。", "one_line": "为了给女儿治病，一个老实巴交的骆驼贩子被迫替黑帮穿越利比亚沙漠运货，而他运送的“货物”是一群活人。", "bucket": "suspense"}, {"id": "1210", "title": "过往人生", "filename": "m1210.html", "year": "2023", "region": "韩国 / 美国", "genre": "剧情 / 爱情", "tags": "移民, 青梅竹马, 十二年再见, 因缘, 克制", "summary": "娜英从小在首尔长大，十二岁时随家人移民加拿大，和青梅竹马海成断了联系。二十年后，娜英（已改名诺拉）在纽约成为剧作家，已婚。海成依然在首尔，是一名普通工程师。某天，海成突然联系她，两人开始视频通话，情感再次涌动。海成决定飞去纽约见她一周。那一周里，两人在城市里散步、聊天、喝酒，讨论韩语中“因缘”这个词——指人与人之间跨越生死的缘分。他们没有出轨，没有接吻，甚至没有牵手。最后一天，海成在等红灯时问：“如果当年我们没有分开，会怎样？”娜英看着对面的绿灯说：“那我们就不会是现在的我们了。”", "one_line": "十二年后在纽约重逢的韩国青梅竹马，用一周的时间确认：他们之间不是爱情，而是“因缘”。", "bucket": "drama"}, {"id": "1211", "title": "夏日乐园2017", "filename": "m1211.html", "year": "2025", "region": "中国台湾", "genre": "剧情 / 青春 / 同性", "tags": "游乐园关闭, 毕业旅行, 暗恋, 告别", "summary": "2017年夏天，陪伴小城三十年的“夏日乐园”因经营不善即将关闭。四个高中刚毕业的死党——内向的阿杰、外向的小安、文静的宜蓁、搞笑的胖子——决定在关园前一晚偷偷溜进去，进行最后一次“毕业夜游”。他们玩遍了所有设施：旋转木马、摩天轮、鬼屋，在空无一人的乐园里大喊大叫。但在鬼屋的镜厅里，阿杰无意中撞见小安和宜蓁在接吻。更让他崩溃的是，镜子里反射出第三个人的倒影——那是他自己三年前写在小安课本上、如今被撕下来贴在墙上的情书。原来这三年里，小安和宜蓁一直在假装情侣，只是为了不让阿杰发现自己被拒绝的事实。而今晚，是所有人都决定说出真话的最后一个夜晚。", "one_line": "2017年夏天，即将关闭的游乐园里，四个高中死党的最后一次夜游，揭开了隐藏三年的秘密。", "bucket": "drama"}, {"id": "1212", "title": "大雄的宇宙小战争2021", "filename": "m1212.html", "year": "2021", "region": "日本", "genre": "科幻, 冒险", "tags": "哆啦A梦, 宇宙战争, 童年", "summary": "暑假的某天，大雄在家中发现了一个来自匹里卡星的袖珍外星人帕比，他是被叛军驱逐的年轻总统。为了帮助帕比重夺星球，哆啦A梦拿出“缩小灯”，让所有人变成手掌大小，潜入帕比的玩具飞船。然而真正的叛军舰队追击至地球，静香被掳走。大雄一行人驾驶飞船杀回匹里卡星，却发现这颗星球的一切都荒诞地像一场“玩具战争”：坦克像积木，战斗机如纸鹤。但叛军首领的野心是真的，爆炸是真的，死亡也是真的。大雄第一次意识到，战争没有“大小”之分，恐惧和勇气都是等比例的。", "one_line": "大雄和朋友们缩小成手掌大小，闯入一场真实的星际战争，发现外星人也在渴望和平。", "bucket": "sci-fi"}, {"id": "1213", "title": "不要小看我", "filename": "m1213.html", "year": "2026", "region": "中国大陆", "genre": "喜剧 / 剧情 / 家庭", "tags": "老人, 尊严, 代际冲突, 逆袭, 温情", "summary": "退休锅炉工老方头今年72岁，老伴去世后搬去和儿子同住。儿子儿媳把他当小孩看：手机换成老年机、不许爬楼梯、每天吃软烂食物、午睡时间都要规定。老方头用藏私房钱的方式偷偷买了智能手机，在公园看年轻人跳街舞时被一个64岁的“年轻”老头拉进老年街舞队。他发现队员里有人是退休外科医生（偷偷给穷人在家做小手术）、有人是前京剧武生（还在练功）、有人是老年痴呆早期（跳舞时就不糊涂）。他们一起报名了市里首届“不老青春”才艺大赛，决赛前儿子发现父亲在车库练舞，大吵一架后看到父亲年轻时的锅炉厂工作证照片——那是当年市里霹雳舞比赛冠军。决赛夜，全家来看，老方头一个360度风车动作，全场沸腾。", "one_line": "72岁退休锅炉工被全家当成“需要被照顾的老糊涂”，他偷偷报名了全市老年人霹雳舞大赛。", "bucket": "comedy"}, {"id": "1214", "title": "天地豪情粤语", "filename": "m1214.html", "year": "1999", "region": "中国香港", "genre": "剧情 / 商战", "tags": "家族恩怨, 粤语原声, 豪门, 兄弟反目, 经典", "summary": "香港豪门的卓家有两个儿子：长子卓尚文自小被培养为接班人，次子卓尚武则被生母带走，在庙街长大。父亲临终前将百亿集团交给尚文，却将一块不毛之地的地契留给尚武。尚文嫉妒弟弟有母亲的陪伴，尚武怨恨父亲的不公。两人在一次冲突后意外撞车，醒来时身份错换——护士搞混了病房。尚文决定将错就错，体验平民生活；尚武则进入集团，发现了父亲当年的秘密：那块地契下埋着全港最大的稀土矿。最终兄弟俩联手对抗外敌，用粤语在金紫荆广场上演了一场震撼全城的摊牌戏。", "one_line": "两个同父异母的兄弟，一个继承百亿家产，一个流落街头，最终互换身份。", "bucket": "drama"}, {"id": "1215", "title": "32颗药丸：我姐姐的自杀", "filename": "m1215.html", "year": "2027", "region": "韩国", "genre": "剧情 / 悬疑", "tags": "社会议题, 家庭创伤, 密室推理", "summary": "所有人都说郑多恩是自杀的。她美丽、优秀，没有理由寻死，但现场留下的32颗未吞服的药丸和遗书成为了铁证。妹妹郑多海无法接受，她开始调查姐姐生前的最后三个月。随着调查深入，多海发现姐姐的药物并不是32颗，而是31颗。这一颗药丸的误差，撕开了一个完美骗局。她逐渐拼凑出，姐姐如何被一个以“情绪辅导”为名、实则进行PUA控制的精神邪教慢慢吞噬，被迫在遗书上签字。当一个懦弱的家庭、一个冷漠的社会和一个邪恶的组织同时成为对手，妹妹要用这32颗药丸作为弹药，发起一场无声的复仇。", "one_line": "妹妹不相信开朗的姐姐会自杀，通过姐姐留下的32颗抗抑郁药，拼凑出被藏匿的真相。", "bucket": "drama"}, {"id": "1216", "title": "我的挚爱未婚妻", "filename": "m1216.html", "year": "2024", "region": "法国", "genre": "喜剧， 爱情", "tags": "未婚妻， 冒名， 家族， 乌龙", "summary": "程序员马丁在网上认识了温柔体贴的“米莉”，两人热聊三个月后决定见家长。结果来赴约的是自称米莉室友的“克洛伊”——一个专门替委托人测试结婚对象家庭是否靠谱的“试婚专员”。克洛伊告知马丁：米莉因临时出差来不了，委托她代为“探底”。马丁无奈答应，带着一个冒牌未婚妻回到保守的法国乡下老家。克洛伊演技炸裂，把毒舌父母哄得团团转，却在相处中逐渐发现马丁是个真诚到笨拙的好男人。与此同时，真正的米莉突然出现，拆穿真相：原来米莉和克洛伊是一对搭档，米莉负责钓鱼，克洛伊负责评估，她们以此谋生。闹剧之后，克洛伊选择退出行业，自己留下来追求马丁。而马丁说了一句让全场哄笑又感动的话：“你们女生局挺深，但我想和你下这盘棋。”", "one_line": "老实人邀请网恋三个月的女友见家长，来的却是她室友——一个专门替人“试婚”的职业未婚妻。", "bucket": "comedy"}, {"id": "1217", "title": "尼罗河谋杀案", "filename": "m1217.html", "year": "2022", "region": "英国, 美国", "genre": "悬疑, 犯罪, 剧情", "tags": "阿加莎, 侦探, 轮船", "summary": "本片改编自阿加莎·克里斯蒂同名小说。世界著名侦探赫尔克里·波洛（肯尼思·布拉纳饰）在埃及度假时，遇到了一对财富悬殊的新婚夫妇：富家女琳内特和新郎西蒙。琳内特的前闺蜜杰奎琳一路尾随，纠缠不休。当晚在尼罗河上的豪华游轮“卡纳克号”上，琳内特头部中弹身亡。她价值连城的珍珠项链也不翼而飞。波洛展开调查，却发现船上的每一位乘客都有动机：嫉妒的闺蜜、被琳内特解雇的仆人、负债的律师、以及觊觎她财产的亲戚。随着又两起命案发生，波洛必须在游轮靠岸前，从谎言与爱情中找出那个最善于伪装的凶手。", "one_line": "大侦探波洛的埃及之旅被一起蜜月船上的谋杀案打断。", "bucket": "suspense"}, {"id": "1218", "title": "躲在阁楼的安妮·法兰克", "filename": "m1218.html", "year": "2025", "region": "荷兰/美国", "genre": "剧情，历史，战争", "tags": "二战，密室，日记，人性光辉", "summary": "现代阿姆斯特丹，一位名叫汉娜的少女为了完成学校的家族历史课题，开始研究自己的曾祖母。她发现曾祖母对二战期间的一切闭口不谈，只留下一个上了锁的古董柜子。在开锁匠的帮助下，汉娜打开了柜子，里面只有一本手写的日记，扉页上写着“安妮·法兰克”。汉娜震惊了，因为课本上说安妮在贝尔根-贝尔森集中营死于伤寒。她拿着日记去质问曾祖母，曾祖母终于开口：当年，她在集中营被一位德国军官偷偷救出，改换了身份，战后辗转来到荷兰。为了躲避仍潜伏的纳粹余孽和记者的追捕，她不得不放弃“安妮·法兰克”的身份，选择作为一个普通的活着。随着汉娜的调查深入，一股神秘势力开始阻挠她，他们坚称日记是伪造的，并试图销毁证据。究竟曾祖母是骗子还是真正的英雄？而那本日记中缺失的几页，又记录了怎样足以改变历史的惊天秘密？", "one_line": "如果安妮·法兰克没有死在集中营，而是被人救出并匿名活到了21世纪，一个自称是她孙女的神秘女孩带着一本泛黄的日记出现在阿姆斯特丹。", "bucket": "drama"}, {"id": "1219", "title": "总统与奶牛", "filename": "m1219.html", "year": "2018", "region": "法国", "genre": "剧情喜剧", "tags": "政治寓言, 动物, 乡村, 退休生活, 媒体", "summary": "前总统菲利普·莫罗卸任后选择在偏远山区养牛，他最亲密的伙伴是一头名叫玛格丽特的奶牛。当地政府突然要征用他的农场建造垃圾处理厂，莫罗试图通过正规渠道申诉却处处碰壁。无奈之下，他开始用前总统身份写匿名专栏揭露黑幕，而玛格丽特意外成了文章的唯一“校对员”。一名年轻记者追踪调查，发现这些文章竟来自牛棚。随着事件发酵，全国开始关注“总统与奶牛”，莫罗被迫重回聚光灯下，却用一场荒诞的电视直播发布会，让玛格丽特对着镜头“哞”出了整个腐败链条。", "one_line": "一位退休总统隐居农场，与他唯一的倾诉对象——一头奶牛一起对抗土地征用令。", "bucket": "comedy"}, {"id": "1220", "title": "美食街女老板", "filename": "m1220.html", "year": "2024", "region": "中国大陆", "genre": "都市 / 家庭", "tags": "女性创业, 夜市, 非遗美食", "summary": "胖姐在城南美食街开了二十年小炒店，是街坊们的“食堂”。商业地产公司要拆迁整条街，胖姐带头拒绝签字。开发商请来米其林星级主厨陈佑宁，提出一场“街头对决”：若胖姐胜，项目终止；若败，老街立刻签字。陈佑宁本以为稳操胜券，却被胖姐一道看似普通的“锅气炒饭”折服——那是他过世母亲的味道。两人从对手变成师徒，陈佑宁帮助胖姐将街边小吃标准化，最终联合整条街的老板，将美食街打造成了非遗文化地标，让资本无法强拆。", "one_line": "夜市一姐被迫与五星级酒店主厨打擂台，赌注是她那条即将拆迁的老街。", "bucket": "drama"}, {"id": "1221", "title": "洛杉矶大劫难", "filename": "m1221.html", "year": "2024", "region": "美国", "genre": "历史 / 剧情 / 犯罪", "tags": "1992暴动, 种族冲突, 多线叙事, 真实事件", "summary": "影片改编自真实历史，用五条平行线索重现1992年洛杉矶暴动。韩裔店主一家守枪店抵抗暴徒；非裔单亲妈妈试图带两个孩子逃出韩国城；白人警察因殴打罗德尼·金被判无罪，此刻陷入更深的道德拷问；拉丁裔消防员冒险进入火场救出被困的所有人；华裔记者在暴乱现场拍摄，却发现自己拍的受害者正是昨晚被抢劫的自己邻居。五组人在宵禁前的最后两小时，于一家教堂相遇。没有和解，只有一个沉默的、满目疮痍的洛杉矶。", "one_line": "1992年洛杉矶暴动爆发，五组不同肤色的人在48小时内挣扎求生。", "bucket": "drama"}, {"id": "1222", "title": "能耐大了第二季", "filename": "m1222.html", "year": "2023", "region": "中国大陆", "genre": "喜剧 / 都市", "tags": "职场喜剧, 二线城市, 年轻人", "summary": "接续第一季，成都MCN公司“能耐大了”迎来更离谱的2023年。老板老赵转型带货主播失败欠下巨债；过气网红“樱桃姐”为涨粉去菜市场表演“生吃辣椒”；富二代实习生小李为证明自己不是废物，直播“在太古里裸奔”（后被保安按住）；唯一的正常人、内容总监小杨每天都在崩溃边缘。第二季新增角色：一只被公司收养的流浪狗“旺财”，意外成了全公司粉丝最多的主播。他们为了流量做尽蠢事，却也在荒诞中学会了互相托底。当公司真的面临倒闭时，他们用一场“全员出道”的魔幻直播，告诉所有人：能耐不大，但情义很大。", "one_line": "成都一家网红MCN公司里，一群想红想疯了的年轻人，用最离谱的方式追逐流量，却意外治愈了彼此。", "bucket": "comedy"}, {"id": "1223", "title": "人生超友事", "filename": "m1223.html", "year": "2023", "region": "中国台湾", "genre": "喜剧 / 家庭", "tags": "友情, 中年危机, 创业, 乌龙事件, 治愈", "summary": "阿荣、小伟和大胖是三个面临裁员危机的发小，为了翻身合伙盘下一家铺面开特色餐厅。然而每到开业吉日，总会发生离奇事件：瓦斯爆炸、食材被野狗洗劫、甚至隔壁失火殃及池鱼。在屡战屡败的过程中，他们从互相埋怨到重拾年轻时的默契，也见证了邻里间的冷暖。每一次“超友事”（超级倒霉的事）都被网友拍下发到网上，竟然意外带火了他们从未成功营业的“幽灵餐厅”。最终他们发现，所谓的倒霉其实是有人刻意破坏，而这个人竟是他们最信任的房东。", "one_line": "三个失意的中年大叔凑钱开餐厅，却因为每次开业都离奇出事而成了网红倒霉蛋。", "bucket": "comedy"}, {"id": "1224", "title": "美国谍梦第五季", "filename": "m1224.html", "year": "2023", "region": "美国", "genre": "剧情, 悬疑, 惊悚", "tags": "冷战, 伪装家庭, 道德困境", "summary": "时间来到1987年，冷战阴影下，菲利普和伊丽莎白这对伪装成美国中产家庭的苏联特工，接到了最后一个任务：窃取星球大战计划的终极机密。然而，随着任务深入，他们发现对方似乎都在向另一个神秘代号汇报。家中长大的孩子已开始怀疑父母的真实身份，邻居FBI探员更是步步紧逼。当爱与信仰交织成谎言网，他们必须在国家与家庭间做出终极抉择。本季将揭示潜伏者灵魂深处的撕裂与救赎。", "one_line": "潜伏华盛顿的苏联特工夫妇，在第五季中发现彼此效忠的对象可能并非同一人。", "bucket": "drama"}, {"id": "1225", "title": "世上的扒手", "filename": "m1225.html", "year": "2023", "region": "法国", "genre": "犯罪、剧情", "tags": "盗窃哲学、师徒、道德困境、文艺犯罪", "summary": "巴黎老扒手阿尔贝托从不偷穷人和老人，把盗窃当成一门“重新分配财富的艺术”。他决定收街头少年迈克为徒，教他手法、观察与底线。迈克天赋极高，三个月就能独立作案。但在一次大单——一个装满钻石的保险箱面前，迈克选择了独吞，顺便把阿尔贝托的养老钱也卷走了。阿尔贝托没有报警，而是用最后的力气教了他最后一课：让迈克以为偷走的钻石是假的，逼他走投无路。最后阿尔贝托把真的钻石物归原主，而迈克才明白，师父教他的最后一招叫“放过自己”。", "one_line": "一名从业四十年的老扒手决定收徒，徒弟第一天就偷了他全部家当。", "bucket": "crime"}, {"id": "1226", "title": "安华：不为人知的故事", "filename": "m1226.html", "year": "2023", "region": "马来西亚", "genre": "传记政治", "tags": "馬來西亞政治，監獄歲月，權力暗流", "summary": "另辟蹊径的政治传记片。主角不是安华本人，而是在安华被囚禁的十年间（1999-2004，2014-2018）负责看守他的狱警阿里。阿里是普通马来人，最初对安华充满敌意，认为他是“国家叛徒”。但安华每天请求他带一本诗集、教他数学、为另一个囚犯的孩子写信。阿里从拒绝到沉默到偷偷塞进一块巧克力。影片用阿里的视角记录狱中十年：他被上级要求每晚监听安华的梦话；他被调离后又被调回；他在2018年安华获释那天，站在人群最后面。安华走出监狱大门时回头看了他一眼，没有说话。阿里回家后打开一本藏了十年的笔记本，是安华教他写的字：“阿里，你才是自由的人。”", "one_line": "不是政治家的传记，而是他狱中十年里，门外那个送饭的守卫的故事。", "bucket": "drama"}, {"id": "1227", "title": "赌棍", "filename": "m1227.html", "year": "2014", "region": "美国", "genre": "剧情, 犯罪", "tags": "赌博, 自毁, 哲学, 教师, 黑色电影", "summary": "吉姆是大学文学教授，也是一名重度赌瘾患者。他借了高利贷赌NBA，输光后无力偿还，被黑帮打手追杀。走投无路时，黑帮老大弗兰克发现吉姆讲得一口好莎士比亚，让他在赌场地下室给自己和手下开文学课，用《李尔王》和《麦克白》来解读赌博与欲望。吉姆一边教课一边继续赌，甚至用弗兰克的钱去赌。最后他押上自己的命，赌一场大学篮球赛。比赛最后一秒，他输定了，却因为对方球员一个诡异的失误而赢回一切。吉姆还清债务，走出赌场，却走进了另一家赌场。", "one_line": "文学教授吉姆身患赌瘾，他借高利贷赌球，输光后却靠教黑帮老大读莎士比亚活了下来。", "bucket": "drama"}, {"id": "1228", "title": "科学怪人2004", "filename": "m1228.html", "year": "2004", "region": "美国", "genre": "科幻 / 恐怖", "tags": "克隆, 伦理, 生化人, 血腥", "summary": "生物工程天才维克多无法接受妻子伊丽莎白因车祸脑死亡。他提取妻子的DNA，结合纳米机械骨骼和人工智能，创造了一个拥有妻子容貌和部分记忆的“新伊丽莎白”。然而这个新个体拥有自我意识后，发现自己既是人又不是人。她看到维克多看她时眼中始终是亡妻的影子，感到极度痛苦和愤怒。她开始以暴力方式“升级”自己，将活人的肢体嫁接到自己身上，试图让自己变得更像“真正的人类”。维克多意识到自己创造了一个嗜血的怪物，必须亲手摧毁她。最终在实验室大火中，新伊丽莎白抱住了维克多，启动自毁程序，说了一句伊丽莎白从没说过的“再见”。", "one_line": "21世纪，一位科学家用亡妻的DNA和机械骨骼造出了新的“她”，却造出了一个怪物。", "bucket": "sci-fi"}, {"id": "1229", "title": "穷友记第五季", "filename": "m1229.html", "year": "2026", "region": "英国", "genre": "喜剧， 剧情", "tags": "英式幽默， 底层生活， 兄弟情， 搞笑， 扎心", "summary": "在第五季中，住在曼彻斯特破旧公寓里的厄尔、肖恩和米奇三兄弟依然穷得叮当响。看到外甥靠剪辑视频买了新车，他们决定模仿富豪生活拍摄炫富视频。他们借来一辆保时捷，却发现是走私赃物；租来的豪宅里正在举行黑帮聚会；米奇甚至搞来一只老虎充当“宠物”。视频拍摄演变成了一场闹剧式的逃亡，他们不仅要躲避黑帮和警察，还得应付突然回家检查的母亲。在这一系列荒诞的意外中，三人不仅没有发财，反而把仅剩的家具都赔了进去。但在互相指责和背叛之后，他们发现彼此依然是最重要的存在，哪怕明天依然要面对催缴房租的通知单。", "one_line": "失业三兄弟试图通过拍摄“高端生活方式”短视频来当网红，却引发了一连串灾难。", "bucket": "comedy"}, {"id": "1230", "title": "持摄影机的人", "filename": "m1230.html", "year": "1929", "region": "苏联", "genre": "纪录片/先锋实验", "tags": "城市交响曲, 蒙太奇, 自我反射, 苏联电影眼, 无叙事", "summary": "本片以极具实验性的手法打破了传统纪录片的边界。黎明时分，摄影师扛着摄影机走上街头，镜头从空无一人的街道扫向苏醒的城市。他拍摄工厂开工、女工排队、孩童嬉戏，同时也拍摄自己的拍摄过程：摄影机如何架设、胶片如何冲洗、剪辑师如何拼接画面。白天，镜头跟随电车穿梭，捕捉建筑光影，记录市场喧嚣。夜晚，镜头进入电影院，银幕上播放的正是本片此前拍摄的画面——观众在看，摄影机在看观众。全片没有对白，只有机械声、人声片段和交响乐构成的节奏。最终，摄影师将镜头对准自己，与摄影机一同消失在暗房的红光中，留下关于“观看”本身的永恒追问。", "one_line": "一个摄影师扛着摄影机穿越苏联城市，镜头里的一切都在捕捉摄影机本身的“眼睛”。", "bucket": "drama"}, {"id": "1231", "title": "血肉狂魔", "filename": "m1231.html", "year": "2024", "region": "美国", "genre": "恐怖, 动作, 科幻", "tags": "丧尸, 变异, 血浆, 废土, 反英雄", "summary": "病毒爆发三年后，人类文明崩溃。主角“零号”是个异类：他被变异丧尸王咬伤后不仅没有尸变，反而获得了超级体能，代价是必须定期注入丧尸血液，否则就会彻底失控。为了寻找解药，零号必须在彻底丧失人性之前，穿越被辐射笼罩的“红区”，找到传说中的基因实验室。途中，他遇到了一个同样拥有抗体的哑巴女孩以及一支试图捕捉他做实验的军阀小队。敌人不仅是漫山遍野的变异巨兽，更是零号体内不断嘶吼的嗜血欲望。当他终于站在实验室门前，却发现所谓解药的配方，需要他自己健康的心脏。", "one_line": "末日废土上，一个被丧尸咬过却未变异的男人，靠喝丧尸血维持理智，追杀自己的同类。", "bucket": "horror"}, {"id": "1232", "title": "克金玩家", "filename": "m1232.html", "year": "2025", "region": "中国大陆", "genre": "电竞喜剧", "tags": "游戏，氪金，穷小子，逆袭", "summary": "天才电竞少年阿豪因为买不起游戏装备，被顶级战队嘲笑为“乞丐玩家”。他发誓组建一支“零氪金”战队：只依靠操作和意识，不花一分钱。他招募了被踢出战队的老将、聋哑辅助、还有用脚打游戏的残疾人主播。这支“废品站战队”在业余联赛一路杀上来，每赢一场，都让对面全身神装的土豪战队颜面扫地。联赛决赛，对手是拥有百万装备的卫冕冠军。阿豪在最后时刻放弃补刀，拿起话筒对全场说：“这个游戏最贵的装备，叫热爱，免费。” 全场观众打开手机，关闭了游戏内的充值页面。", "one_line": "贫穷的电竞天才拒绝氪金，组建“零元购”战队，用技术挑战全身神装的人民币玩家。", "bucket": "romance"}, {"id": "1233", "title": "蜗牛少女回忆录", "filename": "m1233.html", "year": "2023", "region": "中国大陆", "genre": "青春成长", "tags": "治愈系, 内向者视角, 日常诗学, 慢节奏", "summary": "高二女生林小蜗极度社恐，在班里像个透明人。没有人注意她，她也乐得清静。一次偶然，她发现自己有“隐藏倾听”的天赋——因为不说话，所以所有人都当她是空气，在她旁边肆无忌惮地说真话。她开始偷偷记录下这些“秘密”：班长其实在偷偷学街舞；学霸每次考试前都会呕吐；校霸欺负别人是因为被家暴；最开朗的女生在吃抗抑郁药。她把这些写成《蜗牛少女回忆录》，准备作为送给全班的高三礼物。但笔记本被偷了，秘密开始失控外泄。班级陷入信任崩塌，人人互相猜忌。林小蜗第一次被推到了聚光灯下——不是作为“背景板”，而是作为“背叛者”。她必须做出选择：永远缩回壳里，还是站出来，为这些秘密承担后果。", "one_line": "一个被所有人当作“背景板”的社恐女孩，决定用一年时间记录班级里每个同学的秘密。", "bucket": "comedy"}, {"id": "1234", "title": "武动乾坤第一季", "filename": "m1234.html", "year": "2023", "region": "中国大陆", "genre": "动画, 奇幻, 冒险", "tags": "修炼, 少年热血, 异世大陆, 动作设计", "summary": "大炎王朝天都郡，林家边缘子弟林动因机缘巧合获得一枚远古神秘石符，体内沉睡的武道天赋就此觉醒。石符不仅记录了失传的绝世功法，还隐藏着关于位面浩劫的预言。林动带着妹妹青檀，在宿敌林琅天的压迫下步步为营，从青阳镇杀入百朝大战的修罗场。他不仅面对异魔的渗透，还要在宗派林立的大陆上寻找八大祖符。本季结尾，林动在荒芜妖眼妖兽浪潮中突破造化境，第一次触摸到这个世界残酷的真正真相——而他手中的石符，或许正是众生的最后希望。", "one_line": "平凡少年林动意外获得神秘石符，从此踏上逆天改命、横扫六合的武道征途。", "bucket": "animation"}, {"id": "1235", "title": "非人哉", "filename": "m1235.html", "year": "2024", "region": "中国内地", "genre": "喜剧 / 奇幻 / 日常", "tags": "神话改编, 搞笑, 单元剧, 神仙打工人, 萌系", "summary": "改编自同名漫画。神话人物集体下凡，在现代都市过起了普通上班族的悲催生活。九月（九尾狐）天天想摸鱼却总被杨戬（天眼变监控摄像头）盯上；哪吒被迫去上小学，用混天绫当红领巾结果勒晕同桌；大士天天用玉净瓶浇花意外淹了整层办公楼；还有白龙马变成网约车司机，因为太帅被投诉“故意遮挡号牌”。每一集都是独立小故事，没有主线，只有神仙们层出不穷的社死现场。偶尔温情时刻，比如敖丙帮人类修好漏水龙头后默默消失。", "one_line": "哪吒、杨戬、九月等神仙妖怪全部变成社畜，在现代职场里疯狂翻车。", "bucket": "comedy"}, {"id": "1236", "title": "长日将尽", "filename": "m1236.html", "year": "2025", "region": "英国", "genre": "剧情，历史，爱情", "tags": "庄园往事，管家史诗，错过一生", "summary": "改编自石黑一雄小说，但将时间背景改为虚构的1938-1945年。管家史蒂文斯效力于达林顿庄园，那里是英国贵族与纳粹德国秘密谈判的中心。他以“尊严”为最高信条，压抑一切情感，包括对女管家肯顿小姐的爱。当肯顿小姐暗示想与他共度余生时，他只回了一句：“我的职责是服务达林顿勋爵。” 二战爆发，勋爵因通敌丑闻自杀，庄园被卖给美国商人。史蒂文斯在新主人手下继续做完美管家。多年后，他收到肯顿小姐的一封信，说她丈夫去世，她要搬去与女儿同住。史蒂文斯开上那辆老旧的轿车，用一天时间驶过英国乡间，去见她最后一面。这一路上，他不断回忆，也不断问自己：那一天，我到底为什么不挽留她？", "one_line": "一座二战前的英国庄园，一个完美管家，和一段他从未承认过的爱情。", "bucket": "drama"}, {"id": "1237", "title": "武馆", "filename": "m1237.html", "year": "2029", "region": "中国香港", "genre": "动作, 剧情", "tags": "咏春, 师徒, 武德, 港片, 写实打斗", "summary": "旺角某条即将拆迁的老街上，林师傅守着父亲留下的“振武馆”，学员只剩三个。拆迁办背后站着一位国外格斗资本推手，提出摆一场擂台：若武馆胜，整条街保留；若败，即刻搬离。对方派出的是一米九的 MMA 冠军。林师傅明知胜算渺茫，却接下战书。他教给弟子的不是杀招，而是如何在三招之内体面倒地，以此向资本证明传统武术的气节。比赛当日，林师傅肋骨断了三根，却打出了一套让全场沉默的“败中求存”拳法。最终对手向他鞠躬，资本撤资，老街保住了，武馆却因他重伤而关门。", "one_line": "衰落武馆的最后传人，接下一场不能赢的生死擂台，只为守住一条老街。", "bucket": "action"}, {"id": "1238", "title": "小爸爸的抉择", "filename": "m1238.html", "year": "2023", "region": "中国大陆", "genre": "剧情, 家庭", "tags": "单亲父亲, 成长抉择, 催泪", "summary": "阿辉是城中村的快递员，独自抚养五岁的儿子小光。一次晕倒后，他被确诊为渐冻症早期。自知时日无多，阿辉开始疯狂地在小光面前扮演“坏爸爸”，试图让孩子恨自己，以便日后能轻松融入新家庭。他先后找了前女友、远亲甚至福利院，却屡屡碰壁。小光在学校画了一幅画，标题叫《爸爸的谎言》，画里阿辉戴着超人头盔在哭。画展那天，阿辉决定放弃所有计划，他用仅存的力气为小光录制了未来十八年每一年的生日祝福视频。影片结尾，小光被阿辉的老班长收养，阿辉在疗养院通过视频看着小光吹蜡烛，手指微微动了动。", "one_line": "一个患有绝症的单亲爸爸，必须在生命倒计时里为五岁儿子找到最温暖的归宿。", "bucket": "drama"}, {"id": "1239", "title": "台商", "filename": "m1239.html", "year": "2005", "region": "中国大陆 / 中国台湾", "genre": "剧情, 商战, 家庭", "tags": "两岸, 创业, 时代变迁, 情感纠葛, 奋斗", "summary": "讲述了台湾商人林瑞阳从1989年第一次踏上大陆土地，到2005年企业腾飞的十六年风雨历程。他在东莞白手起家开办鞋厂，经历了政策摇摆、工人罢工、外资撤资等危机。期间，他遇到了温柔贤惠的台湾妻子和泼辣能干的大陆女厂长，感情与利益交织。剧集真实展现了台商在夹缝中求生存的智慧，以及两岸文化、思维方式的巨大差异。当儿子爱上大陆姑娘，当工厂面临转型，林瑞阳必须重新定义“家”的位置。", "one_line": "1989年，台商林瑞阳来大陆建厂，却在事业与两个女人之间撕裂。", "bucket": "drama"}, {"id": "1240", "title": "新 ‧ 无仁义之战", "filename": "m1240.html", "year": "2025", "region": "日本", "genre": "动作, 犯罪, 剧情", "tags": "黑帮, 翻拍, 暴力美学, 平成废柴", "summary": "本片是深作欣二经典《无仁义之战》的令和版翻拍。故事背景搬到2025年的东京。传统黑帮在《暴力团对策法》和少子化的双重打击下，濒临灭绝。一个名叫山内的小型黑帮组长，手下只有三个连刀都不敢拿的“平成废柴”组员。为了给被其他黑帮欺凌而死的老组长报仇，山内决定转型。他抛弃了所有传统黑帮规则：不砍人，不贩毒，不收取保护费。他利用组员擅长IT和营销的特长，开发了一款APP，将黑帮“服务”进行O2O平台化：代客排队、解决邻里纠纷、甚至扮演反派帮助客户分手。他们用五星好评和性价比，迅速抢占了市场，颠覆了整个行业。这让那些守旧的大帮派感到了威胁，一场“传统暴力”与“互联网思维”的无仁义之战爆发了。山内用网络曝光、并购、挖角等现代商战手段，打得老牌黑帮节节败退。但当他即将站上权力顶峰时，却发现，失去了“仁义”的，恰恰是他自己。", "one_line": "令和年代，一群失业的“平成废柴”为了生存，用互联网思维重组传统黑帮，掀起一场无仁义的商业战争。", "bucket": "action"}, {"id": "1241", "title": "拆弹客", "filename": "m1241.html", "year": "2024", "region": "德国 / 以色列", "genre": "动作 / 惊悚 / 谍战", "tags": "拆弹专家, 中东冲突, 创伤后应激障碍, 双重身份", "summary": "前以色列拆弹部队上尉阿隆因误炸平民而退役，隐姓埋名在柏林当水管工，并患严重PTSD。一天，他在一个土耳其家庭疏通下水道时，发现管道里藏着一枚缠着红线的手制炸弹——这种工艺，他只在加沙见过。当他拆开炸弹外壳，里面竟是他前妻米瑞安的护照和一张纸条：“救我”。阿隆被迫重操旧业，追查后发现米瑞安被一个极右组织绑架，组织计划在柏林马拉松引爆炸弹，而炸弹的设计者正是阿隆当年的拆弹教官。两人在勃兰登堡门前进行了一场“拆弹师对决”：两人同时剪线，阿隆剪对了，教官剪错了。", "one_line": "退役拆弹专家在柏林当水管工，一次疏通时发现自己拆的“炸弹”竟是前妻的行李箱。", "bucket": "action"}, {"id": "1242", "title": "催眠", "filename": "m1242.html", "year": "2025", "region": "韩国 / 美国", "genre": "悬疑 / 惊悚 / 科幻", "tags": "潜意识战争，记忆植入，高智商犯罪，盗梦空间风，反套路", "summary": "催眠师车贤秀经营着一家帮富豪客户洗掉羞耻记忆的私密诊所。他的新客户是声称目睹政要谋杀案的记者。在催眠过程中，记者突然反客为主，诱导车贤秀回想起自己遗忘的童年地下室，里面藏着九岁妹妹的尸体——原来车贤秀本人在童年时就被人植入了“杀死亲妹”的虚假记忆，用来测试一种军方开发的潜意识武器。而这位“记者”，就是当年实验的另一个受害者，如今已成长为无法被催眠的精神病杀手，代号“白噪音”。两人展开意识层面的攻防战，在彼此的记忆迷宫里设置陷阱。车贤秀最终意识到，要击败对方，必须先接受自己手上从未沾血的真相，并用一段纯粹的幸福童年记忆作为“特洛伊木马”，让杀手的暴力系统崩溃。", "one_line": "顶尖催眠师能通过视频通话植入虚假记忆，直到他遇上一位完全无法被催眠的神秘杀手。", "bucket": "suspense"}, {"id": "1243", "title": "顶楼左边那栋房子", "filename": "m1243.html", "year": "2018", "region": "西班牙", "genre": "悬疑、惊悚", "tags": "都市传说、偷窥、邻居的秘密、反转、限时营救", "summary": "离异后的女建筑师卡门带着失聪的女儿搬进老旧公寓，为了排解寂寞，她喜欢用望远镜观察对面居民楼的生活。某天深夜，她看到对面顶楼左边那栋房子的窗户里，一个男人正在勒死一个女人。她立刻报警，警方赶到时却发现，那栋楼根本没有“顶楼左边”这个单元——它在大火后已被封死，档案显示无人居住。卡门被当作精神病人，女儿在学校遭到霸凌。她不放弃，亲自潜入那栋废弃大楼，却发现里面住着一个暗中监视整个街区的黑客团伙。原来她看到的“谋杀”是为了嫁祸给邻居的虚拟现实模拟。在黑客准备灭口时，卡门利用对建筑结构的熟悉，启动了楼内的旧消防系统，引发水幕与短路，带着女儿死里逃生，并将证据送交给了调查网络犯罪的联邦警探。", "one_line": "单身母亲通过望远镜偷窥对面顶楼，无意间看到一场谋杀，报警后却说那栋楼不存在。", "bucket": "suspense"}, {"id": "1244", "title": "美谍入俄记第二季", "filename": "m1244.html", "year": "2026", "region": "俄罗斯", "genre": "谍战/喜剧", "tags": "特工, 冷战, 乌龙, 家庭", "summary": "上一季被迫同居的CIA特工约翰和KGB特工娜塔莎，在第一季结尾被迫“假戏真做”有了一个女儿。但第二季揭开惊天秘密：这个孩子并非意外，而是双方情报机构联手进行的“基因编辑特工”计划的产物，孩子天生具备超强的语言和格斗天赋。如今，五岁的女儿被恐怖组织盯上，约翰和娜塔莎不得不再次联手，一边像普通父母一样应付女儿的幼儿园面试和尿床问题，一边躲避追杀。当他们终于找到基因编辑的解药时，女儿却用稚嫩的声音说：“爸爸妈妈，我想自己决定成为什么样的人。”", "one_line": "上一季假扮夫妻的CIA和KGB特工，这一季有了孩子，而孩子是基因编辑的超级间谍。", "bucket": "action"}, {"id": "1245", "title": "蓝衣魔鬼", "filename": "m1245.html", "year": "2025", "region": "美国", "genre": "犯罪、黑色电影、心理惊悚", "tags": "洛杉矶、私家侦探、神秘女子、爵士时代、连环案", "summary": "退伍军人伊齐基尔靠打零工维生，某天被一位神秘富商雇佣，寻找一名经常出入日落大道爵士俱乐部的女子——她永远穿同一件孔雀蓝连衣裙，人称“蓝衣魔鬼”。伊齐基尔很快找到她，但她告诉他自己才是被追杀的那个人。当晚，富商死在了自己的劳斯莱斯里，全身无伤，法医却说他体内一滴血都没有了。随着调查深入，伊齐基尔发现这个“蓝衣女人”在过去三年里至少被七个人寻找过，而每个找过她的人最后都变成了“空心人”。他意识到，自己正在追的不是一个失踪者，而是一个以人为食的都市传说。而那件蓝色连衣裙，其实是她的“消化系统”。", "one_line": "1949年洛杉矶，一个穿蓝色西装的男人每次出现，都会有人离奇蒸发。", "bucket": "crime"}, {"id": "1246", "title": "不得不爱第一季", "filename": "m1246.html", "year": "2025", "region": "中国大陆", "genre": "爱情 / 都市 / 职场", "tags": "破镜重圆, 商战, 契约情侣, 智商在线, 虐恋", "summary": "林唯唯的父亲因商业诈骗入狱，家族企业落入二叔手中。走投无路之下，她找到了已是风投圈顶流的前男友沈晋。五年前，沈晋为了出国深造无情甩了她。如今，沈晋提出条件：和他结婚一年，帮他获取“联姻”带来的家族信托基金资格，作为交换，他会帮林唯唯夺回公司。两人开启了一场“假夫妻”的职场谍战。随着股权争夺白热化，林唯唯发现当年父亲入狱、沈晋离开，背后都是同一只看不见的手在操纵。而沈晋所谓的“无情抛弃”，其实是一场以身入局的救赎。", "one_line": "为了夺回被集团夺走的家族企业，落魄千金与抛弃她的前男友签署了“假结婚”对赌协议。", "bucket": "romance"}, {"id": "1247", "title": "我是纳斯琳", "filename": "m1247.html", "year": "2024", "region": "伊朗 / 法国", "genre": "剧情", "tags": "女性，法律，抗争", "summary": "18岁的伊朗女孩纳斯琳是忠实的足球迷，但按照法律，女性不被允许进入体育场观看男子比赛。在一个重要的德黑兰德比日前，她剪短头发，穿上男装，成功混进了人声鼎沸的球场。她激动地为球队欢呼，却被保安发现。在被带走的过程中，她用手机拍下自己被打的画面并传上网，视频迅速引爆了社交媒体。纳斯琳因此成为争取女性权益的标志性人物，但这给她和她的家庭带来了巨大压力。面对来自保守派的威胁、家人的不理解以及被开除学籍的处罚，年轻的纳斯琳必须决定是回归沉默的生活，还是继续这场危险的抗争。", "one_line": "伊朗女孩纳斯琳为了能去足球场看球，伪装成男孩，却引发了一场关于性别隔离的社会风波。", "bucket": "drama"}, {"id": "1248", "title": "侣行第二季", "filename": "m1248.html", "year": "2023", "region": "中国大陆", "genre": "纪实，探险，旅行真人秀", "tags": "环球，极限生存，情侣，战地，真实纪录", "summary": "本季延续“极限情侣”梁红与张昕宇的环球冒险。他们驾驶改装帆船挑战传说中的“东北航道”，却在格陵兰岛附近遭遇冰封。脱困后，他们深入切尔诺贝利禁区，本意是做环保调查，却在废弃医院地下室发现一具干尸手指上戴着上一季失踪队友的手工戒指。通过遗留日记，他们得知队友被一支非法盗猎武装绑架至挪威森林。二人利用无人机和自制炸药，在暴风雪中追踪到盗猎者营地，最终联合当地警察完成跨国营救。全季终集，他们在北极光下为队友举行了迷你婚礼。", "one_line": "一对情侣开帆船穿越北极航道，在废弃核电站里发现了前季队友留下的求救信号。", "bucket": "horror"}, {"id": "1249", "title": "乱撞大赛车", "filename": "m1249.html", "year": "1976", "region": "美国", "genre": "喜剧，动作", "tags": "赛车，恶搞，破坏，无厘头，邪典", "summary": "美国南部，一档名为“乱撞大赛车”的地下电视节目风靡全美。比赛规则简单粗暴：从起点到终点的两百英里，不设赛道，不限车型，可以安装武器，唯一规则是必须保持车辆还能动弹。主角是前赛车冠军、如今落魄的酗酒机械师“榔头”墨菲，他被黑心制片人从监狱捞出来参赛。对手包括装了喷火器的改装校车、车顶焊了铁蒺藜的灵车、以及上一届冠军驾驶的那辆能发射渔叉的怪兽卡车。比赛中墨菲被撞飞、翻滚、甚至掉进沼泽，但每次都奇迹般生还并继续往前龟速爬行。最后十英里，灵车用铁蒺藜绞烂了校车的轮胎，怪兽卡车渔叉射穿了灵车的油箱，而墨菲靠一块撞飞的树桩弹射起飞，连人带车砸到了终点线上。他赢了，但车只剩下一个方向盘。", "one_line": "一场没有任何规则的越野赛车，比的不是谁先到终点，而是谁把对手撞飞得更精彩。", "bucket": "comedy"}, {"id": "1250", "title": "前世的谜样旅程", "filename": "m1250.html", "year": "2002", "region": "中国台湾", "genre": "爱情 / 奇幻 / 悬疑", "tags": "轮回, 宿命, 催眠, 前世今生", "summary": "催眠师陈明远有一个特殊能力：他能带人进入“前世记忆”的真实影像。来找他的人五花八门：怕水的游泳教练、总是梦到被活埋的富商、见到红色就崩溃的画家。在催眠中，他们看到自己前世不同的死法：溺水、活埋、火烧……而且所有死亡现场的角落里，都站着一个戴玉扳指的男人。陈明远追查后发现，那个男人竟然是他自己某一世的模样。他开始给自己催眠，经历了七个轮回：从宋朝的将军到清朝的太监，每一次他都是旁观者或加害者。最后他一世来到了现代，发现那个戴扳指的人，是即将拜访他的下一位客人。", "one_line": "一名催眠师能够带人回到前世，但他发现所有客户的前世都指向同一个凶手，包括他自己。", "bucket": "romance"}, {"id": "1251", "title": "单亲插班生", "filename": "m1251.html", "year": "2023", "region": "中国大陆", "genre": "家庭， 喜剧， 教育", "tags": "单亲爸爸， 小学插班， 换位思考， 治愈", "summary": "单亲爸爸老周是互联网公司总监，儿子小周读小学五年级。老周发现儿子身上总出现淤青，检查书包时发现一张写着“你是没妈的孩子”的纸条。小周拒绝沟通，成绩直线下降。老周怒闯学校，却被告知“只是孩子间的小矛盾”。一气之下，老周做了一个疯狂决定：他申请以“30岁超龄插班生”的身份进入儿子所在班级，坐最后一排，重新体验小学生活。一个月里，他经历了被同学排挤、被老师忽视、被当众嘲笑，甚至被“小霸王”勒索零花钱。他终于明白儿子为什么不说话——因为大人永远不会相信孩子世界的残酷。当他终于揪住欺凌者时，他说：“我不是来当家长的，我是来当你同学的。”", "one_line": "一个忙于工作的单亲爸爸，为了理解被霸凌的儿子，决定去儿子班上当一个月插班生。", "bucket": "drama"}, {"id": "1252", "title": "白马之子", "filename": "m1252.html", "year": "2020", "region": "蒙古", "genre": "冒险史诗", "tags": "草原, 传奇, 人与自然, 游牧文化, 成长", "summary": "古时蒙古高原，男孩巴图出生时天上落下黑雨，萨满预言他将引来灾祸。部落驱逐了他，只有一匹刚出生的白色马驹与他为伴。十年后，巴图与白马在荒野中长大，能听懂风声与狼语。北方铁骑入侵，巴图的旧部落即将覆灭。白马的鬃毛突然发出银光——原来它是长生天派来的“天马”，而巴图的“诅咒”其实是与自然沟通的天赋。巴图带领残存族人利用地形与气候，以三百骑击退三千敌军。但他没有选择复仇，而是让铁骑领兵将军看到白马眼中的景象——战争过后草原的哭泣。将军撤军，巴图成为新萨满，白马最终化作山脊上的白色岩石。", "one_line": "一个被诅咒的男孩与一匹白马的羁绊，将决定整个草原部落的存亡。", "bucket": "animation"}, {"id": "1253", "title": "海南白影", "filename": "m1253.html", "year": "2024", "region": "中国", "genre": "悬疑, 惊悚, 恐怖", "tags": "都市传说, 海岛, 民俗, 怪谈, 低成本", "summary": "程序员陈远为逃避工作压力，住进了海南一个偏僻的黎族村落改造的民宿。第一夜，他透过窗户看到一个穿着白色长裙的女人在月光下的沙滩上跳着诡异的舞蹈。民宿老板警告他“看到白影就不该来”。次日，一位同住民宿的画家失踪，房间里只剩下被撕碎的画布——上面画的正是那个白衣女人。陈远调查发现，“海南白影”是当地流传百年的传说，她是在海边等待爱人归来的新娘，会带走所有看见她的孤独灵魂。七天之限将至，陈远必须在白衣女人来访前，解开传说背后的真实悲剧。", "one_line": "在海南一个黎村度假的游客，午夜总能看到一个白色人影在海滩上跳舞，而看到她的人都会在七日内失踪。", "bucket": "suspense"}, {"id": "1254", "title": "国风", "filename": "m1254.html", "year": "2023", "region": "中国", "genre": "文化， 真人秀", "tags": "国潮， 非遗， 竞赛， 青春", "summary": "这是一档聚焦“非遗年轻化”的竞演综艺。从汉服设计师、民乐改编者到古籍修复师、皮影戏传人，十位选手每期抽取一项濒危非遗技艺，在48小时内用现代审美进行再创作。首期“光影新说”中，电子音乐与皮影结合惊艳全场；中期“织造未来”让AI参与云锦纹样设计引发争议。节目没有淘汰制，而是采用“能量值累积”，最终能量值最高的三人共同获得非遗孵化基金。令人动容的是，不少老艺人作为评审出现在节目中，当看到自己的手艺被年轻人玩出新花样时，他们眼中的光比任何奖项都闪耀。", "one_line": "十位95后国风创作者同台竞技，用新潮方式复活古老技艺，争夺“国风推手”称号。", "bucket": "drama"}, {"id": "1255", "title": "好好好推理社的聚会", "filename": "m1255.html", "year": "2023", "region": "中国", "genre": "悬疑，喜剧", "tags": "剧本杀，暴风雪山庄，反转，幽默", "summary": "“好好好推理社”的六名成员每年都会举办一次剧本杀聚会。今年，社长花重金包下一座孤岛别墅，并请来专业编剧设计“沉浸式谋杀游戏”。但当第一个成员真的中毒身亡时，大家以为这是剧情。直到通讯中断、管家消失，他们才意识到：游戏规则已被篡改，凶手就藏在六人之中。每个成员都有一段不为人知的过往，而这场“游戏”实则是针对他们的审判。最后十分钟连续反转三次，颠覆所有推理。", "one_line": "六个推理爱好者受邀到孤岛参加剧本杀聚会，却发现他们正在经历一场真实的连环谋杀。", "bucket": "suspense"}, {"id": "1256", "title": "贼性难改", "filename": "m1256.html", "year": "2026", "region": "韩国", "genre": "犯罪 / 喜剧 / 动作", "tags": "神偷退休，重返江湖，师徒恩怨，爆笑反转", "summary": "传奇神偷“鼬鼠”金哲秀十年前诈死归隐，开了一家炸鸡店。徒弟朴小胖偷窃时误入政商勾结的证物仓库，不仅被抓，还连累师父身份暴露。为了救徒弟，哲秀必须重出江湖——偷回被警方封存的U盘，里面藏着徒弟的犯罪证据。他找来老搭档“开锁匠”英子、“黑客”姜博士，组成平均年龄52岁的老年天团。行动中笑料百出：英子老花镜掉进保险柜，姜博士用老年机当黑客工具。但最后一场戏，哲秀用炸鸡外卖盒偷梁换柱，成功拿到U盘，却发现里面根本没有小胖的罪证——是徒弟故意设局逼他回归。师徒在炸鸡店打了一架，然后一起喝了啤酒。第二季预告：他们决定偷走整栋腐败大厦。", "one_line": "金盆洗手十年的传奇大盗，因徒弟的一次“翻车”被迫重操旧业。", "bucket": "crime"}, {"id": "1257", "title": "《整蛊先锋队》", "filename": "m1257.html", "year": "2023", "region": "中国大陆", "genre": "真人秀、喜剧、整蛊", "tags": "素人整蛊、社会实验、无剧本、反向操作", "summary": "每期整蛊先锋队会设置一个匪夷所思的场景，测试路人的反应。例如让演员假装在街头被前任讨回昂贵钻戒，看路人会不会帮“渣男”；或者在深夜自动贩卖机上贴“别买，里面有虫子”，观察有多少人会好奇投币。但节目最妙的是：他们从不恶意嘲笑“上当者”，反而会为每一个愿意帮助陌生人的人送上奖金和拥抱。其中一期，他们假扮失智老人走失，一名外卖小哥停下手中爆单的任务陪了老人两小时，当小哥得知是整蛊，他没有生气，而是坐在地上哭了：“我爸就是走失找不到的。”这一集播出后全网破防。《整蛊先锋队》表面是整人，实则是一面照向人间善良的镜子。", "one_line": "一支专业整蛊团队用“最离谱”的方式测试普通人的善意底线，结果常常反转到令人沉默。", "bucket": "drama"}, {"id": "1258", "title": "以我的名义", "filename": "m1258.html", "year": "2024", "region": "印度", "genre": "悬疑 / 惊悚 / 社会", "tags": "顶替，升学，复仇，底层", "summary": "拉朱是达拉维贫民窟的天才，他的数学论文曾登上国际期刊。然而高考成绩公布那天，他的名字消失在了榜单上。后来他才知道，自己的身份被某邦高官的女儿顶替，对方用他的分数进入了顶级理工学院。拉朱申诉无门，父亲还被警察打死。十年后，一个代号“零”的黑客开始攻击印度的教育系统，他能精确修改任何人的学历信息，却从不索要钱财。当拉朱终于站在当年那个“自己”的面前时，那位早已成为知名工程师的女人跪下来求他：“这身份已经是我唯一的人生了。”一场关于姓名与尊严的审判，在数据洪流中拉开帷幕。", "one_line": "贫民窟数学天才的高考成绩被高官女儿顶替，十年后他化身顶级黑客，用智商重新夺回人生。", "bucket": "suspense"}, {"id": "1259", "title": "阿拉丁", "filename": "m1259.html", "year": "2024", "region": "印度", "genre": "奇幻 / 歌舞", "tags": "宝莱坞, 神灯, 逆袭, 民族风", "summary": "阿拉丁是个生活在达拉维贫民窟的街头小贩，梦想带母亲离开这里。他意外获得一盏油腻的神灯，里面蹦出一个满头白发的灯神。灯神自称曾是宝莱坞巨星，因得罪导演被封印，法力只剩“让人瞬间跳群舞”。阿拉丁半信半疑地许愿变有钱，结果银行经理开始对着他扭屁股。一连串荒唐后，阿拉丁发现真正的愿望不是钱，而是让母亲看一场她的专属演唱会。最终，灯神用尽最后的法力，在贫民窟空地开了一场万人演唱会，然后微笑着化为尘埃。", "one_line": "孟买贫民窟的混混捡到一盏神灯，灯神是个想退休的过气明星，只会唱跳。", "bucket": "fantasy"}, {"id": "1260", "title": "诸神的战车", "filename": "m1260.html", "year": "2028", "region": "美国", "genre": "动作, 奇幻, 史诗", "tags": "北欧神话, 赛车, 诸神黄昏, 改装, 末日", "summary": "距离预言中的诸神黄昏还有30天，阿斯加德的预言者却宣布：这次的神界毁灭者不是巨人族，而是一场自毁式的内卷战争。众神厌倦了无尽的战斗，于是主神奥丁提出了一个疯狂的方案：放弃传统武器，每人改装一辆战车，在末日废土上进行一场竞速赛，最先抵达世界树根部的神，将有权改写毁灭的预言。雷神索尔开着他的雷霆改装皮卡，洛基驾驶可以幻化成任何形态的变形赛车，女武神则骑着用光翼改装的飞行摩托。赛道上不仅有其他众神的阴谋陷阱，还有提前苏醒的巨人族猎杀。在赛程过半时，索尔发现了一个秘密：奥丁根本没有打算阻止诸神黄昏，这场竞赛本身就是毁灭的仪式。索尔必须在“赢得比赛拯救世界”与“毁掉比赛让诸神黄昏失效”之间做出选择，而洛基，正等着他走错这一步。", "one_line": "诸神黄昏前夕，众神放弃武器改开战车，在末世废土上展开一场决定命运的生死竞速。", "bucket": "action"}, {"id": "1261", "title": "舒莎公主与捣乱剧团", "filename": "m1261.html", "year": "2024", "region": "英国", "genre": "奇幻、冒险、家庭", "tags": "公主、流浪剧团、解谜、童话新编", "summary": "舒莎公主中了女巫的诅咒，凡是她说出的真话，都会变成谎言被人相信；而她说的假话，反而会被当成真相。这意味着她永远无法让别人知道她真实的想法和处境。被逐出王宫后，她流落到一个三流流浪剧团“捣乱剧团”，剧团里都是怪人：只会演死人的老演员、说话结巴的编剧、五音不全的女高音。舒莎发现，在舞台上，当台词被设定为“这是演戏”时，诅咒的规则会暂时失效。她开始编剧并主演一系列讽刺王宫黑暗的戏剧，每一场都座无虚席，却也因此引来了女巫和摄政王的联手追杀。", "one_line": "被诅咒的公主不能说真话，她加入一个二流剧团，用演戏的方式说出真相。", "bucket": "fantasy"}, {"id": "1262", "title": "古畑中学生", "filename": "m1262.html", "year": "2025", "region": "日本", "genre": "悬疑、推理、校园", "tags": "前传、天才少年、校园推理、日常之谜", "summary": "故事发生在80年代的日本乡下初中。此时的古畑任三郎还是一个穿着学生服、喜欢钻研奇怪冷知识的中学生。他因为总是用挑剔的逻辑指出老师的错误，而被全班同学孤立。唯一愿意和他说话的，是事事追求完美的女班长美雪。最近，校园里发生了一系列“诡异”事件：体育仓库的垫子被重新摆放、化学室的酒精灯被人点亮又熄灭、教师办公室的盆栽被修剪成奇怪的形状。所有人都认为是灵异事件，美雪则认为是校外人员所为。只有古畑眯起眼睛，笑着说：“不，这是一个追求极致完美主义的犯人在给我们的挑战书。”于是，史上最年轻的名侦探，展开了他的初次推理。", "one_line": "成为名侦探之前，古畑任三郎还是一个普通中学生，他的第一个“对手”是班上的女班长。", "bucket": "suspense"}, {"id": "1263", "title": "宾果：晨光之王", "filename": "m1263.html", "year": "2025", "region": "印度", "genre": "奇幻、冒险、家庭", "tags": "会说话的狗、王位继承、印度神话、大象军团", "summary": "流浪狗宾果在印度街头靠翻垃圾桶为生，意外被一个苦行僧点醒前世的记忆。原来它曾是猴神哈努曼座下的“晨光之王”，统领所有清晨活动的动物。然而黑暗之虎“影牙”五百年前篡位成功，将晨光之国的动物们奴役在永夜里。宾果今生变成狗，是因为被影牙诅咒。苦行僧告诉宾果，只有在下一个日食到来之前集齐三件圣物——猴神的金环、鸽后的羽毛、象王的獠牙，才能恢复神力。宾果带着新朋友——一只话痨鹦鹉和一只瘸腿水牛踏上征途。它们潜入废弃的泰姬陵找到金环，从猎人的陷阱中救出鸽群获得羽毛，最后在大象坟场与影牙的爪牙决战。日食最后一刻，宾果吞下三件圣物，化身为金光闪闪的巨犬，一爪拍碎了影牙。", "one_line": "流浪狗宾果发现自己前世是猴神国度的晨光之王，它必须带领动物军团打败篡位的黑暗之虎。", "bucket": "fantasy"}, {"id": "1264", "title": "善地第三季", "filename": "m1264.html", "year": "2025", "region": "美国", "genre": "喜剧 / 奇幻", "tags": "哲学，死后世界，道德困境", "summary": "经历了前两季的地址混乱后，埃莉诺、奇迪、塔哈尼和杰森终于被分配到了一个真正的“善地”。但这里一切都诡异得完美——邻居们都在背诵莎士比亚，豆子汤永远是最佳温度。奇迪发现，所谓的“善地”评分系统其实是一个巨大的能量收集装置，人类几千年来积累的“善行”能量都被用于维持宇宙运行。如果不继续产生“善”，宇宙就会坍缩。四人面临着终极拷问：是维持虚伪的“善”来拯救宇宙，还是选择真实的自由？", "one_line": "在天堂与地狱的夹缝中，四个灵魂发现了“善良”背后惊人的宇宙阴谋。", "bucket": "comedy"}, {"id": "1265", "title": "担保（韩国电影）", "filename": "m1265.html", "year": "2023", "region": "韩国", "genre": "剧情，犯罪，家庭", "tags": "高利贷，抵押品，小女孩，赎罪之路，父女情", "summary": "1993年，仁川。高利贷从业者斗硕和宗培接到任务：追讨非法移民露宿者明子的欠款。明子无法还钱，斗硕按规矩带走她九岁的女儿承怡作为“担保”。斗硕原本只打算吓唬明子，没想到明子第二天因非法居留被遣返出境，承怡成了烫手山芋。两人被迫暂时抚养这个浑身是刺的小女孩。十年间，斗硕从一个只知道放贷的混混变成了承怡真正的“父亲”，甚至放弃高利贷生意开了一家面馆供她读书。2003年，明子突然出现，她已在海外发迹，要拿回女儿的抚养权。斗硕面临残酷选择：打官司必输，因为当年“担保”本身就是非法的；但若放手，承怡将知道她深爱的“父亲”曾是一个靠绑架儿童讨债的人渣。最终他决定在法庭上亲口承认一切罪行，只为让承怡“清白的”回到母亲身边。", "one_line": "高利贷讨债人收走了一个非法移民的小女儿作为抵押，却在抚养她十年后，被迫亲手将她“归还”。", "bucket": "drama"}, {"id": "1266", "title": "验尸官", "filename": "m1266.html", "year": "2024", "region": "中国大陆", "genre": "悬疑、法医", "tags": "单元剧、陈年旧案、尸体说话、师徒", "summary": "法医林念有一种近乎天赋的能力：她能通过尸体上细微的陈旧性伤痕排列，推断死者生前最后几分钟的情绪——恐惧、愤怒、还是解脱。这种能力让她破获了多起悬案，但也让她被同事视为怪胎。新调来的刑侦队长秦放不信这套，坚持只看物证。两人联手调查一起连环失踪案时，发现所有失踪者最后都在同一家临终关怀医院出现过。林念剖开第五具遗骸，全身找不到任何致命伤，死因写着“自然死亡”。但她从死者手骨上极其特殊的肌肉痉挛痕迹中读出了一个词：窒息。而且不是被他人窒息——是被某种极高浓度的一氧化碳在睡眠中安静地杀死。秦放调出那家医院的用电记录，发现每个死者离世当晚，地下车库的柴油发电机都异常启动过。", "one_line": "女验尸官能从尸体上读到被忽略的“情绪”，直到她剖开一具看起来毫无伤痕的遗骸。", "bucket": "suspense"}, {"id": "1267", "title": "虾米小白鲸", "filename": "m1267.html", "year": "2025", "region": "中国", "genre": "动画, 家庭, 冒险", "tags": "海洋, 友情, 成长, 音乐", "summary": "在一片被称为“回声湾”的浅海，小虾米皮皮因为总爱发出“咔嚓”声而被其他虾类嘲笑。小白鲸团团则因为声呐系统有缺陷，经常迷路。一次海底地震让皮皮的钳子和团团的声呐感应器偶然融合，从此皮皮听到的声音，团团也能听到。它们发现自己家园的珊瑚正在白化，原因是海底的“声音污染”——人类船只的螺旋桨噪音盖过了珊瑚虫用来传宗接代的“海洋心跳声”。皮皮和团团结伴出发，要找到那个据称能发出最纯净心跳声的远古海底洞穴。一路上，它们遇见了唱歌跑调的海豚、有强迫症的寄居蟹，以及一条声称见过美人鱼的老海龟。最终它们发现，所谓的心跳声，其实就是彼此信任的声音。", "one_line": "小虾米和小白鲸意外共享了听觉，为了拯救被污染的珊瑚家园，它们必须找到传说中的“海洋心跳声”。", "bucket": "animation"}, {"id": "1268", "title": "暴风骤雨", "filename": "m1268.html", "year": "2025", "region": "中国大陆", "genre": "剧情, 历史", "tags": "土改, 乡村, 斗争, 变革", "summary": "1946年，东北解放区元茂屯。工作队队长萧祥带领队员进驻，发动群众开展土地改革。屯中地主韩老六表面恭顺，暗中却勾结土匪，利用宗族势力恐吓贫苦农民。青年农民赵玉林深受压迫，在萧祥的启发下第一个站出来揭发韩老六的罪行。随着斗争深入，内部也出现分歧，农会主任张富英被腐蚀拉拢。一场惊心动魄的较量后，赵玉林带领觉醒的农民冲进韩家大院，分配土地，最终在保卫胜利果实的战斗中英勇牺牲。", "one_line": "1946年东北农村，一场土改运动如暴风骤雨般席卷而来，打破了元茂屯的平静。", "bucket": "drama"}, {"id": "1269", "title": "割腕者的天堂", "filename": "m1269.html", "year": "2006", "region": "美国", "genre": "奇幻，剧情，爱情", "tags": "死后世界，自杀，公路电影，荒诞，治愈", "summary": "扎克因为失恋割腕自杀，醒来后发现自己没死——不，他确实死了，但死后世界不是天堂也不是地狱，而是一个无限循环的、灰蒙蒙的美国中西部。这里的人都因为自杀而来，每个人都带着自己死前的“创伤样式”：有人额头一直流血，有人手指永远在拨一个打不通的电话。扎克搭上一辆破车，司机是一个话痨老太太，她在自家浴缸里触电死的，现在全身上下时不时冒火花。他们一路寻找传说中的“天堂入口”，路上遇见了把自己吊死在风扇上的摇滚青年、吞药丸死掉的社恐女孩。扎克渐渐发现，这个无聊的死后世界，竟然比活着时更像“活着”。而天堂入口的真相，是一面镜子。", "one_line": "割腕自杀后，他来到一个比现实更无聊的灰暗来世，必须搭车穿越这片荒原才能找到天堂入口。", "bucket": "fantasy"}, {"id": "1270", "title": "周六夜现场 中国版", "filename": "m1270.html", "year": "2021", "region": "中国", "genre": "喜剧 / 真人秀", "tags": "喜剧, 小品, 明星, 讽刺", "summary": "本节目引进经典模式，由国内顶尖喜剧人带队，每期邀请一位当红明星担任嘉宾主持。节目包含情景小品、恶搞短片、周末更新等板块，内容直击社会热点、职场痛点与网络怪象。从直播带货的荒诞到职场内卷的疲惫，从无效社交到AI焦虑，演员们用夸张的表演和精准的吐槽，让观众在爆笑中看到自己的影子。虽然部分话题因尺度问题引发争议，但其敢于发声的勇气和不按套路出牌的创意，迅速成为年轻观众周末的解压首选，也孵化出一批优秀的喜剧新星。", "one_line": "一群喜剧新人用最辛辣的笔触，每周六夜晚对当代生活进行一场荒诞的“解刨”。", "bucket": "comedy"}, {"id": "1271", "title": "金钱豹", "filename": "m1271.html", "year": "1996", "region": "香港", "genre": "犯罪，剧情", "tags": "黑帮，卧底，金盆洗手，豹纹，宿命", "summary": "1990年代的香港，警察阿豪化名“金钱豹”潜入和联胜，一卧就是八年。他从底层马仔做到坐馆心腹，手上沾了血，也染上了赌和毒。上司周sir给他最后一次任务：杀掉即将出庭指证和联胜的污点证人，以此换取归队做回普通人。阿豪发现证人正是当年引他入行的卧底前辈——对方已精神崩溃，住在精神病院里反复画着豹纹图案。阿豪面临终极选择：杀掉证人完成任务，或救出证人向和联胜摊牌。他选择第三条路：穿上藏了八年的警服，走进和联胜的年会大厅，对着所有大佬说出那句迟到了八年的“我是警察”。", "one_line": "代号“金钱豹”的卧底在黑帮拼了八年，终于做到二把手，上司却让他再杀一个人来换取归队资格。", "bucket": "crime"}, {"id": "1272", "title": "盲柳与睡女", "filename": "m1272.html", "year": "2025", "region": "日本", "genre": "动画", "tags": "村田沙耶香, 超现实, 心理惊悚, 梦境, 存在主义", "summary": "本片改编自村田沙耶香短篇，但将舞台搬到了现代都市。银行职员片山发现妻子真由子陷入了一种“睡眠昏迷”，医生说是压力导致。一天深夜，片山在阳台发现了一株盲柳（没有眼睛却会转向人声的植物）。盲柳告诉他：真由子的意识被困在了“日常迷宫”里——那个由朝九晚五、房贷、育儿构成的无限循环场景。为了唤醒妻子，片山必须喝下柳汁进入她的梦境。然而他发现，妻子故意不愿醒来，因为在梦里她成了一名画家，而现实里她只是他的“太太”。片山面临选择：是打破她的美梦，还是永远陪她沉睡？", "one_line": "一只会说话的盲柳树下，睡着一个永远醒不来的女人，而她的梦境正在吞噬整座小镇。", "bucket": "animation"}, {"id": "1273", "title": "黑夜遥望", "filename": "m1273.html", "year": "2023", "region": "中国大陆", "genre": "剧情 / 悬疑", "tags": "失眠者，都市传说，出租车司机，午夜电台", "summary": "出租车司机阿城常年被失眠困扰，每天午夜在城市游荡。某夜他接到一名神秘乘客，对方不仅准确说出他父亲的名字，还声称知道二十年前父亲失踪的真相。乘客留下一盘旧磁带后消失，阿城从此陷入一场跨越时空的追寻。他通过午夜电台的线索，陆续找到当年与父亲有关的几位老人，每个人口中都有一段截然不同的往事。随着调查深入，阿城发现自己每晚的失眠并非偶然，而是父亲当年留下的某种保护机制。真相藏在城市的阴影中，而他必须在天亮之前做出选择。", "one_line": "一名失眠的出租车司机在午夜接到神秘乘客，对方声称知道他二十年前失踪父亲的真相。", "bucket": "drama"}, {"id": "1274", "title": "血色大地", "filename": "m1274.html", "year": "2025", "region": "乌克兰", "genre": "历史，战争，悬疑", "tags": "二战，UPA，历史悬疑，多视角叙事", "summary": "1943年，二战时期的乌克兰沃伦地区，是各方势力绞杀的“血色大地”。在一个偏远的村庄里，发生了一起血腥命案，一具尸体被以极其残忍的方式肢解。村里的长者担心这是复仇的开始。年轻的当地警察（此时政权更迭频繁）开始调查，他必须周旋于德国纳粹占领军、苏联游击队以及乌克兰民族起义军（UPA）之间。随着调查深入，他发现受害者生前曾犯下不可饶恕的罪行，而凶手可能不是某一方的士兵，而是来自被屠杀的波兰村庄的幸存者。这场谋杀，只是更大规模种族清洗的冰山一角。每个人都是受害者，每个人也都是加害者，在残酷的战争泥潭中，无人能保持清白。", "one_line": "1943年，沃伦地区一个村庄接连发生诡异命案，背后是纳粹、苏军还是民族起义军？", "bucket": "drama"}, {"id": "1275", "title": "囧男窘事第三季", "filename": "m1275.html", "year": "2025", "region": "美国", "genre": "喜剧/动画", "tags": "成人动画, 社畜, 黑色幽默, 荒诞", "summary": "上一季结尾，杰瑞终于受不了奇葩老板的无理要求，在办公室里放飞了一群鸽子后潇洒辞职。第三季开篇，杰瑞用全部积蓄开了一家“高端”宠物殡葬公司。他请来好友、半吊子程序员莫蒂做网站，让前同事、花痴女凯伦做财务。公司的第一个客户是一只网红鹦鹉，杰瑞需要把它做成标本，结果莫蒂把鸟烤焦了。为了赔偿，他们被迫接下一单更离谱的业务：为一头去世的动物园大象举办追悼会。与此同时，杰瑞的前老板也在处处使坏，企图让他永远无法再就业。杰瑞的生活还是一样，从一个窘境跌入另一个窘境，从未让人失望。", "one_line": "史上最倒霉的办公室社畜杰瑞又回来了，这一季他决定辞职创业，但等待他的却是更大更离谱的窘境。", "bucket": "comedy"}, {"id": "1276", "title": "烟波浩渺之相识", "filename": "m1276.html", "year": "2025", "region": "中国", "genre": "剧情 / 爱情 / 悬疑", "tags": "山水画，时空错位，文艺，宿命", "summary": "现代书画修复师沈明远在修复一幅宋代古画《寒江独钓图》时，发现画中迷雾深处竟有另一行现代简体字：“救我”。他试着用墨汁回应，竟与画中人物——明代落魄书生陆鹤鸣建立了跨时空联系。陆鹤鸣在画中被困了百年，每当画作被展出，他就要重复一次跳江自杀的场景。沈明远通过查阅史料得知，只要在画中加入“第三个人”，就能打破循环。他偷偷在画角落添加了一个现代救生圈。当画作在博物馆展出时，陆鹤鸣终于没跳江，而是抓住了救生圈，看向了画外的沈明远。", "one_line": "一幅宋代无名山水画里，两个相隔三百年的书生通过画中的迷雾对话，试图改变彼此的悲惨命运。", "bucket": "drama"}, {"id": "1277", "title": "珍珠劫", "filename": "m1277.html", "year": "2026", "region": "新加坡 / 中国大陆", "genre": "年代 / 爱情 / 商战", "tags": "南洋，家族恩怨，虐恋，商战，复仇", "summary": "三十年代的新加坡，富商沈万德经营着亚洲最大的珍珠养殖场。其女沈珍珠与养子陈明远青梅竹马。为了夺得家产，二房设计陷害珍珠通奸，导致她被驱逐出家门，流落到一个贫穷的渔村，险些丧命。十年后，南洋陷入日军侵略前的动荡。一个神秘的珠宝商“海女士”来到新加坡，她运筹帷幄，吞并了沈家一个又一个生意。沈万德病逝，陈明远接手掌管摇摇欲坠的家业。在一场拍卖会上，海女士摘下面纱，正是归来的沈珍珠。她要将曾经失去的一切亲手夺回，却意外发现当年陷害她的真凶并非陈明远，而日军也盯上了沈家世代守护的那颗能决定战争走向的“传说之珠”。国仇家恨下，两人被迫再次联手。", "one_line": "上世纪三十年代南洋，养珠场主家的千金遭人陷害流落渔村，十年后她带着复仇计划归来，却发现仇人竟是曾经的挚爱。", "bucket": "drama"}, {"id": "1278", "title": "欲海艳后", "filename": "m1278.html", "year": "1993", "region": "中国香港", "genre": "情色 / 剧情 / 古装", "tags": "宫廷, 权力, 欲望, 悲剧, 改编", "summary": "先帝驾崩，年仅八岁的太子登基，貌美的赵皇后垂帘听政。朝堂上，权臣王莽步步紧逼；边疆外，大将董卓虎视眈眈。为巩固权力，赵皇后不惜利用自己的身体作为武器，先后委身于王莽、董卓以及多位朝中重臣，在欲望与权力的漩涡中游走。她以为掌控了男人的心便掌控了天下，却不知自己早已沦为各派势力博弈的棋子。最终，在一次宫廷政变中，她亲眼看到儿子被毒杀，自己也落得被赐白绫的下场。临终前她才明白，欲海之中，从未有人能真正靠岸。", "one_line": "虚构王朝中，妖艳皇后为保幼帝皇位，周旋于朝臣与将军之间，最终被自己的欲望吞噬。", "bucket": "crime"}, {"id": "1279", "title": "夜色撩人", "filename": "m1279.html", "year": "2023", "region": "中国大陆", "genre": "爱情，悬疑", "tags": "一夜情，失忆，双重身份，都市迷情", "summary": "30岁的策展人方蕾在一家情人酒店醒来，身边空无一人，手机里有12个未接来电和一条短信：“别告诉任何人你见过我。”她对昨晚发生的一切毫无记忆，只记得自己参加了一个艺术圈的酒会，喝了很多酒。手臂上有一个陌生的纹身贴纸，上面写着“2:00 AM”。方蕾开始拼凑昨晚的碎片：酒店的监控显示她和一个戴帽子的男人进了房间，但画面模糊看不清脸；她的打车记录显示凌晨1:30从酒会离开，但目的地不是酒店而是另一个地址；更诡异的是，她的前男友在凌晨2:00发来一条语音说“我就在你门外，别开门”。方蕾必须在24小时内搞清楚——昨晚和她在一起的男人是谁？那个人现在在哪里？以及，她自己到底是受害者还是共谋者？", "one_line": "一个女人在情人酒店醒来后失去了昨夜的全部记忆，她必须在24小时内拼凑出那个男人的真面目。", "bucket": "romance"}, {"id": "1280", "title": "米奇欢乐多第二季", "filename": "m1280.html", "year": "2024", "region": "美国", "genre": "喜剧 / 动画 / 家庭", "tags": "米奇、复古、短剧、无厘头、欢乐", "summary": "第二季延续第一季的复古手绘风格，每集七分钟独立故事。米奇想要给米妮一个完美的野餐，结果餐垫被风吹走，追着餐垫跑遍了整个小镇。高飞当上了超市临时保安，把每一个顾客都当成了偷窃嫌疑人。唐老鸭试图在自家后院修建一个游泳池，结果挖穿了地下水脉，整个社区变成了水上乐园。布鲁托和一只猫抢一根肉骨头，从街头抢到街尾，最后骨头变成了一尊公共雕塑。这一季新增角色“疯狂发明家米奇”，每集结尾有一个十秒的脑洞彩蛋。全部26集没有一句说教，只有纯粹的卡通逻辑。", "one_line": "米奇和朋友们用更离谱的方式解决日常麻烦，这次连洗碗都能变成一场灾难级冒险。", "bucket": "comedy"}, {"id": "1281", "title": "杀手少女", "filename": "m1281.html", "year": "2026", "region": "韩国", "genre": "动作, 犯罪, 青春", "tags": "少女杀手, 校园卧底, 暴力美学, 反类型", "summary": "代号“夜莺”的少女从7岁起被养父训练成杀人机器。最后一次任务，是暗杀一所贵族高中里的腐败校长。她伪装成转学生，计划用三天解决目标。然而，从未体验过正常生活的她，被同桌热情的女生邀请加入社团，被木讷的男生递来情书。她一边在厕所隔间处理伤口，一边在课堂上计算狙击角度。任务即将成功时，养父却临时让她“杀掉所有目击者”——包括整个班级。夜莺第一次扣不动扳机，她必须在过往的“亲人”与刚认识的“同学”之间，做出血的抉择。", "one_line": "为完成最后暗杀任务，18岁顶级杀手伪装成高中生，却遇到了想和她做朋友的同学。", "bucket": "action"}, {"id": "1282", "title": "猫头鹰与小飞象", "filename": "m1282.html", "year": "1984", "region": "中国香港", "genre": "剧情, 动作, 青春", "tags": "香港电影, 青少年, 社会问题, 洪金宝, 林子祥", "summary": "“小飞象”是个家境优渥但极度叛逆的少女，因不满父亲的虚伪而混迹街头。“猫头鹰”则是个潦倒的前拳击手，白天在图书馆睡觉，晚上在夜市摆摊。一次偶然，他们共同救下了一只折翼的猫头鹰，并在照顾它的过程中建立了奇特的友谊。小飞象的父亲卷入了房地产黑幕，惹上了当地的黑帮，导致小飞象被绑架。猫头鹰为了救人，重新戴上旧拳套，闯入黑帮老巢。影片并非单纯的英雄救美，更刻画了两人互相救赎的过程：小飞象让猫头鹰重拾了对生活的热情，而猫头鹰让小飞象懂得了什么是责任。最终，他们没有离开那个破旧的街区，而是开了一家收留流浪动物的咖啡馆。", "one_line": "颓废的流浪汉与叛逆的富家女因一只受伤的猫头鹰相遇，在对抗黑帮的过程中找到了各自的人生方向。", "bucket": "drama"}, {"id": "1283", "title": "大嘴巴第五季", "filename": "m1283.html", "year": "2023", "region": "美国", "genre": "喜剧, 动画, 音乐", "tags": "青春期, 脑洞大开, 荷尔蒙, 校园, 闺蜜, 尴尬名场面", "summary": "全新一季中，尼克、安德鲁和女孩们迎来了高中前的最后一个暑假。荷尔蒙怪兽们集体出动，还出现了更抽象的“焦虑虫”。尼克突然长出喉结后声音变成电子合成器，安德鲁暗恋上夏令营的素食朋克女孩，而杰西必须面对母亲再婚后的新家人。这季还加入了一只专门掌管“社死回忆”的怪物，让主角们每次想接吻时都会自动回放最尴尬的童年片段。当大家试图举办一场“无尴尬派对”来告别初中，却引发全镇范围的青春期意识大爆炸，连父母们的陈年秘密都被翻了出来。最终，主角们发现成长不是消灭尴尬，而是学会与它共舞。", "one_line": "一群荷尔蒙爆炸的动画青少年，在荷尔蒙顾问“大嘴巴”的指挥下，上演更离谱的青春期灾难。", "bucket": "comedy"}, {"id": "1284", "title": "名校风暴第八季", "filename": "m1284.html", "year": "2026", "region": "西班牙", "genre": "悬疑、青春、犯罪", "tags": "贵族学校，阶级冲突，终极谜团", "summary": "拉斯恩西纳斯学院筹备百年校庆，扩建工程挖出一具被混凝土包裹的少年尸骨。法医鉴定：死亡时间十年前，死因是头部钝器击打。更惊悚的是，尸骨手中握着一枚该校1996届纪念徽章——那是十年前的毕业生，也是如今学校董事会某位核心成员的私人物品。这一季故事在两条时间线之间切换：现在时，全员老角色回归（以及他们的子女入学），每个人都被怀疑；过去时，揭开1996年那届不为人知的权力游戏、霸凌致死案和全校集体噤声。最终发现，死去的少年不是学生，而是一名顶替富家子弟身份混入学校的天才穷小子。他死前已经拿到了名校录取通知书，却永远没能离开这个埋着他的地方。", "one_line": "一栋新的教学楼在施工时挖出一具十年前的白骨，拉斯恩西纳斯真正的“第一个秘密”即将揭晓。", "bucket": "suspense"}, {"id": "1285", "title": "替嫁医女第一季", "filename": "m1285.html", "year": "2020", "region": "中国大陆", "genre": "古装, 爱情, 甜宠", "tags": "穿越, 医学, 替嫁, 王爷, 搞笑", "summary": "实习医生陈媛媛意外穿成北周国公府最丑的庶女，被逼替嫡姐嫁给传闻中杀人不眨眼的“病王爷”宇文玥。大婚当晚，王爷要杀她立威，媛媛反手一针麻醉剂将他放倒，顺带治好了他的陈年腿疾。从此，她在王府开起了“中医馆”，用青霉素救人，用无菌术防疫，把整个王府变成大型医学实验基地。王爷从怀疑到“真香”，一边嫌弃她粗鲁，一边默默为她铲除所有敌人。第一季结尾，媛媛发现自己穿书而来，而原著中王爷的结局是被毒杀。她掀开药箱，决定和命运来一场硬碰硬。", "one_line": "现代实习医生穿成被迫替嫁的丑女，用手术刀征服了说要杀她的冷面王爷。", "bucket": "fantasy"}, {"id": "1286", "title": "火的试练", "filename": "m1286.html", "year": "2020", "region": "美国", "genre": "动作，战争", "tags": "消防员，恐怖袭击，生死营救", "summary": "前陆军拆弹专家杰克转业成为消防队长，报到第一天全城多处地标同时起火，官方认定为恐怖袭击。杰克带领着一群还没毕业的实习消防员，被困在一栋被纵火的百层大楼中部。上层是慌乱的人群，下层是爆炸的燃气管道，而恐怖分子在暗网直播这场灾难。杰克必须利用他的军事经验，在这群菜鸟的帮助下，一边拆解藏在楼里的诡雷，一边带领数百人在大火吞噬一切之前找到逃生之路。", "one_line": "新任消防队长入职第一天，就遇到针对城市地标建筑的连环纵火恐怖袭击，他要带一群菜鸟救人。", "bucket": "action"}, {"id": "1287", "title": "维多利亚大帝", "filename": "m1287.html", "year": "2025", "region": "英国", "genre": "剧情 / 传记 / 科幻", "tags": "蒸汽朋克, 女王, 另类历史, 机甲", "summary": "1858年，伦敦被浓雾与工业废气笼罩，真实历史已被悄然改写。年轻的维多利亚女王在加冕后发现王室最深的秘密：一具由牛顿与布鲁内尔联合设计的巨型蒸汽机甲“维多利亚号”。当外星威胁从月球降临，试图奴役人类，女王脱下裙撑，穿上装甲，亲自驾驶机甲迎战。她不仅要面对外星入侵者，还要镇压企图趁乱夺权的议会叛军。在一场横跨伦敦上空的大战中，她砸碎了水晶宫，也砸碎了自己温柔的过去。最终，她将帝国旗帜插在月球表面，成为了永载史册的“机甲女王”。", "one_line": "维多利亚女王秘密驾驭巨型机甲，用蒸汽铁拳重铸日不落帝国的荣耀。", "bucket": "drama"}, {"id": "1288", "title": "香港人在北京粤语", "filename": "m1288.html", "year": "2026", "region": "中国香港 / 中国大陆", "genre": "剧情、都市、文化碰撞", "tags": "北漂、港式幽默、职场、身份认同", "summary": "香港顶尖广告公司创意总监周美宝（40岁）被高薪挖角到北京互联网大厂。她带着两箱衣服和满脑子“港式高效专业”落地，结果第一天就被上了一课：她引以为傲的戛纳获奖作品“孤独的茶餐厅”被北京同事评价“太丧”。她的北京下属，一个常年混迹南锣鼓巷的文案策划张高兴，随手写的“您呐，里边请”让她破防。周美宝试图用数据分析、4A方法论改造团队，却被北京甲方爸爸的一句“再想想”折磨到崩溃。她逐渐学会在后海喝豆汁、在工体蹦迪、在涮肉局上谈生意。与此同时，北京同事也开始理解“香港人不是冷漠，只是不熟”。本剧为粤语原声版，夹杂大量京腔对比，笑点密集。", "one_line": "香港广告女王空降北京公司，结果发现自己的“国际获奖案例”在北京胡同大爷面前一文不值。", "bucket": "drama"}, {"id": "1289", "title": "致曾为神之众兽", "filename": "m1289.html", "year": "2024", "region": "美国 / 英国", "genre": "剧情 / 奇幻 / 战争", "tags": "神明陨落, 黑色奇幻, 人性拷问", "summary": "十年前，“诸神黄昏”爆发，为了结束人类的内战，众神耗尽神力将邪恶封印，代价是它们全部退化成了只有本能、形态扭曲的“兽神”。十年后，人类成立了“神猎部”，专门猎杀这些流窜在荒野的兽神以绝后患。主角艾伦是被战争之神养大的孤儿，他看着昔日如同父亲般的战神变成了一头无意识的巨兽，不得不亲手将其斩杀，并拿走了战神的心脏。此后，他加入了神猎部，带着战神的心脏，踏上了猎杀其他曾经庇护人类的“父辈”的旅途。每斩杀一头兽神，他都在向人类的残忍更靠近一步。", "one_line": "在一场大战后，曾经守护人类的众神全部退化成了野兽，而猎杀它们的神猎手，竟是被神明养大的孤儿。", "bucket": "drama"}, {"id": "1290", "title": "贫民窟教室", "filename": "m1290.html", "year": "2019", "region": "印度", "genre": "剧情, 教育", "tags": "真实改编, 贫民窟, 老师, 希望", "summary": "根据真实事件改编。孟买大学心理学系的天才学生卡维塔在一门“社会服务”课程中，被分配到达拉维贫民窟的一间露天教室教书。班上有32个孩子，年龄从6岁到14岁不等，所有人都在垃圾山旁边上课。卡维塔很快发现，这些孩子不是学不会，而是根本不相信学习能改变命运——因为他们的父辈在贫民窟里挣扎了一辈子，依然在捡垃圾。卡维塔用了三个月的时间，设计了一套“以垃圾为教具”的教学法：用塑料瓶讲浮力，用废电池讲电路，用破布讲纺织史。她的方法遭到学校和家长的质疑，直到年终考试，班上有一半孩子的成绩超过了普通公立学校。但真正的考验在后面：一个孩子被黑帮诱骗去做童工，卡维塔只身进入达拉维的地下世界把他救了出来。", "one_line": "一个富家女大学生自愿去贫民窟教孩子，却发现最大的问题不是贫穷，而是绝望。", "bucket": "drama"}, {"id": "1291", "title": "谍战古山塘", "filename": "m1291.html", "year": "2022", "region": "中国大陆", "genre": "谍战、年代", "tags": "苏州评弹、双面间谍、珍珠港、江南", "summary": "1941年秋，日本特高课进驻苏州，意图破获潜伏在江南的地下电台。评弹名伶沈晚棠的真实身份是军统特工，她将情报编入唱词，在茶楼当着日本军官的面唱出去。新来的日本特高课课长山本是个中国通，他很快注意到沈晚棠每场必唱的《战长沙》中有一句词调门总是不对。山本没有抓她，而是布下天罗地网，要让她在传递情报时被当场抓获。沈晚棠接到最后一道任务：暗杀即将抵达苏州的一位“叛国者”。行动前夜，她偷看档案照片，发现照片上的人——是她十二年前失踪、所有人都说已牺牲的共产党地下党员父亲。山本已经知道了她的真实身份，正等着她扣下扳机的那一幕。", "one_line": "1941年，潜伏在苏州评弹班里的女间谍用唱词传递情报，直到她发现要暗杀的目标是自己失散的父亲。", "bucket": "action"}, {"id": "1292", "title": "毒帮家族", "filename": "m1292.html", "year": "2024", "region": "墨西哥", "genre": "犯罪 / 剧情", "tags": "毒枭, 家族, 权力", "summary": "老毒枭“教父”遇刺身亡，留下一个庞大的毒品帝国和四个不同母亲生下的孩子。老大崇尚暴力，老二精通财务，老三被送往美国念书最无心继承，老四则是年仅15岁的冷血天才。在外部缉毒局的步步紧逼下，四兄妹非但没有团结，反而互相设局、暗杀。当最小的弟弟微笑着将炸弹放进大哥的汽车时，这个家族的崩塌早已不可避免。", "one_line": "毒枭父亲意外去世，四个同父异母的子女为争夺帝国继承权，展开血腥内斗。", "bucket": "crime"}, {"id": "1293", "title": "五虎将之决裂", "filename": "m1293.html", "year": "2026", "region": "中国香港", "genre": "动作、犯罪、剧情", "tags": "兄弟、背叛、黑帮、枪战", "summary": "九十年代香港，阿飞、阿华等五人从小混迹油尖旺，结为异姓兄弟，号称“五虎将”。他们替黑帮老大龙哥做事，意外截获一笔百亿黑钱。面对巨款，原本肝胆相照的五人心生异变。阿飞想拿钱跑路去国外，阿华想用它洗白做正当生意，而老四则想私吞。老大龙哥施压限期交还，警方也盯上了他们。在一个暴风雨的夜晚，五个兄弟在一座烂尾楼里谈判，最终擦枪走火。信任的崩塌比子弹更快，曾经替对方挡刀的兄弟，如今亲手将刀插进对方胸口。天亮时，五个人死了四个，仅剩的阿飞抱着兄弟的尸体自首。", "one_line": "曾经同生共死的五个结义兄弟，因为一笔百亿赃款反目成仇，在一夜之间从兄弟变成了不死不休的死敌。", "bucket": "action"}, {"id": "1294", "title": "巴格达来信", "filename": "m1294.html", "year": "2024", "region": "美国", "genre": "战争剧情", "tags": "伊拉克战争、书信、亲情、士兵、真实事件改编", "summary": "驻伊美军士兵米勒在一次巡逻中捡到一个被炸毁的书包，里面有一本日记，记录着一个巴格达女孩法蒂玛的生活与梦想。日记的最后一页写着“我想有一个美国朋友，告诉他我们不是恐怖分子”。米勒被打动，开始冒充“笔友”给法蒂玛回信，信中描绘了一个和平美好的假象。通信持续了三个月，米勒在信中渐渐暴露了自己的真实身份。法蒂玛最终回信：“我知道你是那个在我家附近巡逻的士兵，你每次路过都会给我留一颗糖。”米勒震惊，原来她一直知道。电影结尾，米勒回国后收到最后一封信，信里只有一颗糖和一句话：“糖很甜，和平也是。”", "one_line": "美军士兵在巴格达捡到一个当地女孩的日记，开始冒充“笔友”给她回信。", "bucket": "romance"}, {"id": "1295", "title": "今日份的散步", "filename": "m1295.html", "year": "2023", "region": "日本", "genre": "剧情 / 日常 / 治愈", "tags": "孤独美食家式、城市漫游、单元剧、人生百态、慢节奏", "summary": "编剧高桥诚在遭遇连续被退稿后，陷入了创作瓶颈。他给自己定下一个规矩：每天下午三点，不带手机、不设目的地，进行一场“纯粹的散步”。在涩谷的小巷里，他遇见偷偷练习单口相声的银行职员；在浅寺的桥下，他目睹一场相隔五十年的恋人重逢；在高円寺的旧书店，他发现一本写满未来预言的二手笔记本。每一次偶遇都像一颗种子，渐渐在他荒芜的内心长出了新的故事。然而当他准备将这些素材写成剧本时，却发现这些“陌生人”似乎都在通过某种方式注视着他。", "one_line": "一位失业编剧每日在东京街头随机散步，每一次转弯都可能撞见别人人生中的“决定性瞬间”。", "bucket": "drama"}, {"id": "1296", "title": "美国派：兄弟会", "filename": "m1296.html", "year": "2018", "region": "美国", "genre": "喜剧, 青春", "tags": "兄弟会, 大学, 青春, 恶搞, 荷尔蒙", "summary": "大学新生麦克斯、克里斯和兰迪终于通过了兄弟会的入会考验，却发现他们加入的“三角洲 Alpha”兄弟会正面临被学校关闭的危机。原因是上一届学长们留下的派对视频太疯狂，惹怒了校长。校长给出最后通牒：一个月后的校庆夜，如果三角洲 Alpha 不能举办一场“空前绝后但绝对不能出事”的派对，兄弟会就永久解散。三个菜鸟被迫挑起大梁，他们没有任何经验，只有一栋破旧的房子和一群不靠谱的兄弟。他们偷校长的雕像做派对吉祥物、用食堂的果冻建了个泳池、还请来了小镇上最老的DJ。派对的筹备过程笑料百出，最终他们发现，最重要的不是派对有多疯狂，而是兄弟之间的信任与默契。", "one_line": "三个刚刚加入大学兄弟会的菜鸟，必须在30天内举办一场史上最疯狂的派对来拯救兄弟会。", "bucket": "comedy"}, {"id": "1297", "title": "美国忍者5", "filename": "m1297.html", "year": "2022", "region": "美国", "genre": "动作, 科幻, 冒险", "tags": "义体忍者, 高科技冷兵器, 反乌托邦", "summary": "未来世界，忍者协会被科技巨头“大东公司”收购，所有忍者都被植入“忍术芯片”，可以直接下载技能。唯一年轻的纯血忍者健二拒绝植入，被视为异类。大东公司派出义体忍者军团追杀，他们能隐身、弹跳、甚至手发激光。健二逃到深山，找到隐居的盲眼老师傅。师傅说：“芯片只能复制招式，复制不了‘心’。”健二用瀑布训练、松针练眼、竹刀练心。最终决战，健二攻入大东总部，义体忍者们的芯片被干扰后变成废铁，健二用传统手里剑、烟雾弹和无声步法逐一击败。大东社长亲自上阵，全身改造，但健二一招“空蝉”假身术骗过他，从背后以木刀敲晕。结尾，健二开了一所“无芯片道场”。", "one_line": "2045年，忍者技艺已被植入芯片取代，最后一位纯血忍者必须用传统忍术对抗义体军团。", "bucket": "action"}, {"id": "1298", "title": "黑道风云", "filename": "m1298.html", "year": "2021", "region": "韩国", "genre": "犯罪 / 动作 / 剧情", "tags": "黑帮，卧底，义气，暴力美学，背叛", "summary": "特种兵出身的泰秀，妹妹被黑帮分子的流弹误杀，凶手却因顶包而逍遥法外。泰秀伪造身份，潜入釜山最大的黑帮“七星派”，从小弟做起，试图接近当年开枪的中层头目。他用不要命的打法一路晋升，逐渐获得会长张哲的绝对信任。张哲是个信奉“道义”的老派黑帮，待泰秀如亲子。三年后，泰秀终于手刃仇人，却在临死前得知一个真相：当年下令开枪的并非那个人，而是张哲本人——因为妹妹无意中目睹了张哲与警察局长私下的毒品交易。泰秀面临终极抉择：是继续效忠对自己有恩的老大，还是为妹妹讨回公道。", "one_line": "为妹妹复仇而潜入黑帮的退役特种兵，却在三年后发现自己真正效忠的老大，才是当年害死妹妹的真凶。", "bucket": "crime"}, {"id": "1299", "title": "万花嬉春", "filename": "m1299.html", "year": "2024", "region": "中国香港", "genre": "喜剧/爱情", "tags": "戏中戏, 片场风云, 港式无厘头, 怀旧", "summary": "致敬《雨中曲》，背景搬到70年代的香港邵氏片场。过气武打明星龙哥（讽刺某位），被迫转型导演，拍一部名为《万花嬉春》的歌舞片。女一号是只想露腿赚钱、却偷偷写诗的艳星阿娇；男一号是只会念“12345”、迟到耍大牌的流量小生。投资方是黑帮，要求三天拍完。龙哥被逼疯了，干脆破罐子破摔：他不喊卡，让摄影机一直开着，记录下所有穿帮、打架、忘词和真情的瞬间。结果这部“灾难片”粗剪版意外地真诚，打动了所有人。当他们在暴雨中完成最后一镜，龙哥扔掉雨伞，在雨中嬉戏，真正明白了“电影是每秒24格的谎言，也是唯一真实。”", "one_line": "一个过气武打明星，一个想当文青的艳星，和一个只会念123的流量花瓶，要拍出年度最佳电影。", "bucket": "comedy"}, {"id": "1300", "title": "最后的巡逻兵", "filename": "m1300.html", "year": "2022", "region": "美国", "genre": "战争， 剧情", "tags": "二战， 兄弟情， 绝境求生", "summary": "1944年冬，阿登森林深处，一支由七人组成的美国巡逻队因无线电故障与大部队失联。在寻找归途的过程中，他们意外发现了一个隐藏在废弃修道院中的纳粹秘密实验室。队长米勒中士必须在严寒、追兵和内心恐惧中做出抉择：是带着关于“超级武器”的情报突围，还是救出被用作实验材料的同胞。随着队员一个个倒下，他们发现最后的敌人竟是一种被释放的、会传染的狂怒。这不是一场为了胜利的战争，而是一场为了阻止地狱降临人间的死亡行军。", "one_line": "二战末期，一支被遗忘的美军巡逻队深入敌后，却发现他们要对抗的远不止德军。", "bucket": "drama"}, {"id": "1301", "title": "圣母峰消失之谜", "filename": "m1301.html", "year": "2025", "region": "美国 / 尼泊尔", "genre": "冒险 / 悬疑 / 灾难", "tags": "珠峰，登山探险，神秘失踪，科学VS传说，生存", "summary": "珠峰南坡，三支登山队同时冲顶。第一队率先登顶，但在对讲机里留下一句莫名其妙的话后失联。救援队赶到时，峰顶空无一人，只有脚印走向悬崖边后消失。随后第二支队伍的夏尔巴向导在海拔8500米处看到一个“蓝色矩形光门”，然后昏迷。第三支队伍的领队、前NASA科学家陈博士拒绝相信超自然现象，他带着摄像装备再次登顶。在极度低氧和幻听中，陈博士也看到了那扇门，门里传出已故妻子的声音。他挣扎着走向门口，一只脚踏入，摄像信号中断。两个月后，有人在西藏的一座寺庙里发现了陈博士的登山杖，但寺庙住持说：“这根杖在这里已经放了三百年了。”", "one_line": "三名登山者在珠峰峰顶突然凭空消失，留下的最后一句无线电是：“山顶有个门，我们进去了。”", "bucket": "action"}, {"id": "1302", "title": "虎口余生", "filename": "m1302.html", "year": "2024", "region": "中国大陆", "genre": "动作 / 灾难", "tags": "野外求生, 东北虎, 暴风雪, 护林员", "summary": "长白山深处，六十岁的护林员老杨即将退休，最后一班岗却是巡查一片非法偷猎高发区。他发现了三只被剥皮的梅花鹿尸体，以及一串巨大的虎爪印。追踪过程中，一阵枪响后，一只重伤的雌性东北虎向他扑来，老杨滚下雪沟，跌入一个废弃的猎套陷阱。与此同时，暴风雪提前到来，气温骤降至零下三十五度。老杨和雌虎被封闭在山沟里，人无法爬上峭壁，虎也无法跳出深坑，而偷猎者就在附近搜索。老杨用自己的急救包给虎做了止血包扎，虎则用体温帮他抵御严寒。当偷猎者最终找到他们时，老杨做了选择——他解开猎套，放出雌虎。一人一虎在风雪中并肩冲向偷猎者。最后的画面是老杨的护林员证被风吹到悬崖边，一只虎爪轻轻按住。", "one_line": "东北林区护林员老杨与一只被偷猎者打伤的雌虎在暴风雪中狭路相逢，人虎都必须活下去。", "bucket": "action"}, {"id": "1303", "title": "外星人入侵", "filename": "m1303.html", "year": "2026", "region": "美国", "genre": "科幻 / 惊悚", "tags": "硬科幻, 外星生物, 末日求生, 悬疑反转", "summary": "2046年，巨大不明球体降临全球八大沙漠城市，不攻击、不交流，只是将人类强制驱离，并开始“改造”地貌。生态学家林深被秘密组织“望海”征召，发现球体释放的纳米粒子正在以不可思议的速度修复土壤与臭氧层。然而，当人类死亡率随空气质量改善而诡异上升时，林深破译了粒子中的信息：外星文明判定人类是地球生态的唯一病变，所谓的“修复”将在十年内清除所有灵长类哺乳动物。绝望之际，一名自称“前接触者”的老人交给他一段百年前的外星求救信号——原来，这些“修复者”也曾是某个濒死星球的癌细胞。", "one_line": "当外星人不再是入侵者，而是地球的“修复程序”，人类才发现自己才是病毒。", "bucket": "sci-fi"}, {"id": "1304", "title": "大洋之间的灯光", "filename": "m1304.html", "year": "2022", "region": "澳大利亚", "genre": "悬疑 / 剧情 / 爱情", "tags": "灯塔看守人，身份谜团，伦理困境，海岛", "summary": "1920年代，孤岛灯塔看守人汤姆救起海上漂来的小艇，艇上只有一个昏迷的美丽女人艾琳和一名女婴。艾琳苏醒后完全失忆，只记得恐惧。汤姆收留了她们，三人组成了温馨的家庭。四年后，一艘救援船带来报纸：富豪之女失踪，同时失踪的还有她的贴身女仆——照片上赫然是艾琳。更恐怖的是，过去四年间，艾琳曾居住过的几个沿海小镇接连发生了儿童失踪案。汤姆开始怀疑，艾琳的记忆中是否隐藏着恶魔。他偷偷调查，发现女婴的DNA与任何失踪儿童都不匹配。当真正的富豪之女出现在岛上时，艾琳突然恢复了记忆，她流着泪说出了真相：她是在保护这个女婴，因为女婴的亲生父亲是……一个让所有人大吃一惊的答案。", "one_line": "孤独的灯塔看守人在海边捡到一个失忆的婴儿和昏迷的女人，而这个女人可能是一名连环杀手。", "bucket": "suspense"}, {"id": "1305", "title": "眠狂四郎女妖剑", "filename": "m1305.html", "year": "1966", "region": "日本", "genre": "动作", "tags": "时代剧, 剑戟, 孤独英雄, 情色", "summary": "江户时代末期，流浪剑客眠狂四郎腰间挂着一把被称为“女妖剑”的异形兵器，剑身上映出的女子面容据说能让人神魂颠倒。他奉幕府密令追查一批失窃的黄金，线索指向一座由妖艳女剑客“蛇姬”统领的妓院。蛇姬手下有七名身怀绝技的女性，她们利用美色与剑术刺杀贪官，实则密谋推翻幕府。眠狂四郎混入妓院，先后与蛇姬的养女阿雪、琴师阿凉产生纠葛。阿雪想用柔情感化他，阿凉则想用毒酒杀他。当最终对决来临时，眠狂四郎发现蛇姬竟然是自己失散多年的母亲。女妖剑出鞘的瞬间，照出的不仅是敌人的恐惧，还有他自己被诅咒的血脉。", "one_line": "虚無僧剑客眠狂四郎，用一把妖剑斩断世间痴缠的女妖们。", "bucket": "action"}, {"id": "1306", "title": "千子之父：捐精狂奇案", "filename": "m1306.html", "year": "2022", "region": "日本", "genre": "犯罪悬疑", "tags": "真實事件改編，倫理爭議，基因偵查", "summary": "改编自震动日本的“精子Bank事件”。精神科医生渡边诚在十年间使用化名“千子之父”，通过非正规渠道向数百名女性匿名捐精，繁衍出超过一千名后代。十年后，全国陆续有二十三名少年少女因极其罕见的遗传性心脏病猝死，基因溯源发现他们都来自同一个父亲——渡边诚。更诡异的是，死者的手机都在死亡前一秒收到同一条空白短信。女刑警桐生凛与遗传学专家联手追查，发现渡边诚本人也在一场车祸中“死亡”多年。他们挖出一座深山里的私人精子库，里面保存的不是精子，而是经过基因编辑的“修正液”。", "one_line": "一个日本男人通过匿名捐精成为上千个孩子的生物学父亲，直到孩子们开始离奇死亡。", "bucket": "comedy"}, {"id": "1307", "title": "红楼梦第二部", "filename": "m1307.html", "year": "2026", "region": "中国大陆", "genre": "剧情 / 古装", "tags": "文学改编, 新视角, 黛玉之死", "summary": "本片并非续写，而是以全新的非线性叙事重新解构《红楼梦》后半部。全片始于“苦绛珠魂归离恨天”，以林黛玉临终前燃烧诗稿的火焰为叙事灯塔，火焰每吞噬一张诗稿，就闪回一段她与宝玉、宝钗等人的前尘往事。影片大胆地将黛玉的“小心眼”和“爱哭”重新诠释为典型的“复杂性悲伤障碍”和“高功能抑郁症”症状。贾府众人并非不爱她，恰恰相反，宝玉的激情、宝钗的理性、贾母的宠溺、王夫人的世俗，他们都在用自己的方式试图“治好”黛玉，却加速了她的崩溃。影片结尾，当黛玉咽下最后一口气，宝玉在雪地里跪了一夜，他始终不明白，为什么爱会杀死爱的人。而画面切回现代，一个同样患有抑郁症的女孩在图书馆合上《红楼梦》，在笔记本上写道：“林黛玉，你不是一个人。”", "one_line": "本片从“黛玉焚稿”倒叙，将红楼梦解读为一个“全员试图用爱拯救一个抑郁症少女，却全部失败”的悲剧。", "bucket": "drama"}, {"id": "1308", "title": "死侍2", "filename": "m1308.html", "year": "2018", "region": "美国", "genre": "动作喜剧", "tags": "死侍, 恶搞, 打破第四面墙, 超英, 嘴炮", "summary": "韦德·威尔逊在遭受丧妻之痛后，打算自我了断时被钢力士带回X学院。为了保护一个拥有“坏运气”能力的变种人少年罗素，死侍组建了“X特攻队”，但除他之外的所有成员在跳伞时全部以最荒诞的方式团灭。他只好联手从未来穿越回来的电索，试图阻止罗素黑化。全片充满了对X战警、DC以及各类流行文化的疯狂吐槽，死侍不仅打断了片尾彩蛋，还穿越时空用婴儿希特勒的啼哭开了一场玩笑。", "one_line": "死侍为了保护一个变种人少年，组了个临时“X特攻队”，结果全员落地只剩他自己。", "bucket": "comedy"}, {"id": "1309", "title": "快乐之后", "filename": "m1309.html", "year": "2026", "region": "法国", "genre": "剧情，哲学", "tags": "享乐主义，存在主义，文艺，实验", "summary": "法国哲学教授路易斯在退休后被诊断出只剩三个月寿命。他决定用全部积蓄体验一次“终极快乐”——一场没有任何限制的、长达72小时的感官盛宴。他雇用了最好的厨师、乐师、情人和毒品贩子，在一座孤岛上彻底放纵。然而，当72小时过去，快乐像潮水一样退去，留下的是无尽的空虚和更深重的死亡恐惧。路易斯开始录像，追问每一个参与者：“快乐之后，你还剩下什么？”全片在极致的感官刺激和冰冷的哲学思辨之间反复横跳。最后，路易斯没有死在快乐中，而是死在了快乐之后某一天，一个他正在花园里拔草的、平凡的、不快乐的下午。", "one_line": "如果快乐是生命唯一的意义，那么当快乐结束的那一刻，生命是否也随之失去了意义？", "bucket": "drama"}, {"id": "1310", "title": "直面疾风吧", "filename": "m1310.html", "year": "2024", "region": "中国大陆", "genre": "励志, 青春, 运动", "tags": "帆船运动, 女性成长, 逆袭爽剧, 海洋竞技, 热血群像", "summary": "曾经的天才少女帆船运动员林风，因在比赛中顶撞领队、拒绝让船，被省队以“缺乏体育精神”为由开除，职业生涯毁于一旦。她回到海边小镇，帮父亲打理濒临倒闭的渔具店，每天看着大海发呆，以为这辈子再也不会碰帆船。直到一场台风中，她救下了一名被困的外籍帆船教练。教练发现了她异于常人的风向感知能力，用激将法重新点燃了她的斗志。没有资金、没有队友、没有专业器材，林风靠捡破烂改装了一条旧船，从地方业余赛开始一场场打上去。与此同时，当年逼她退队的领队已成为国家队主教练，而她的前队友、现役全国冠军是她最大的对手。全剧穿插大量真实帆船赛知识，海战镜头全部实拍，热血而真实。", "one_line": "她被省队开除时说“你根本不适合帆船”，三年后她以业余选手身份，站上了亚运会资格赛的起航线。", "bucket": "drama"}, {"id": "1311", "title": "一个人的生命", "filename": "m1311.html", "year": "2026", "region": "英国", "genre": "剧情，传记，奇幻", "tags": "生死，存在主义，时间，家庭，人生", "summary": "退休教授亨利躺在临终关怀医院，即将咽下最后一口气。死神以一个小女孩的形象出现，告诉他：他的人生可以带走“一秒钟”进入来世，这必须是他一生中最快乐的瞬间。但为了激活这一秒，他必须原路返回，重新经历所有被他“快进”掉的痛苦记忆。亨利开始了痛苦的回溯：二战时失去兄长的恐惧、中年丧妻的绝望、与子女决裂的孤独、学术生涯的挫败……每经历一次，他就老一岁。他以为最快乐的一秒会是女儿出生，或是学术获奖。但当他回溯到最痛苦的一刻——妻子葬礼上，儿子哭着说“我恨你”时，他同时看到了躲在树后的女儿偷偷递给他的一块手帕。那一秒，他感受到了穿越仇恨的爱。他终于释然，笑着闭上了眼。", "one_line": "临终老人获得“生命回溯”能力，为了找到一生中最快乐的1秒钟，他必须重新经历所有最痛苦的记忆。", "bucket": "drama"}, {"id": "1312", "title": "传颂之物", "filename": "m1312.html", "year": "2006", "region": "日本", "genre": "奇幻 / 战争 / 冒险", "tags": "兽耳, 架空世界, 假面, 史诗", "summary": "男主哈克奥罗在一间破旧茅屋中醒来，脸上戴着无法摘除的面具，失去所有记忆。他被兽耳少女艾露露救起，并逐渐融入这个由各种亚人组成的边境村落。帝国压迫日益严苛，哈克奥罗被迫带领村民起义，凭借超凡的战术头脑连战连捷，势力迅速扩大。他从不想成为领袖，却被时势推上王座。随着征战的深入，他发现自己失忆前正是这片大陆的创造者——也是毁灭者。最终的敌人，不是帝国，而是他自己留下的诅咒。", "one_line": "一个戴着无法摘下的面具、失去记忆的男子，被兽耳少女所救，却意外卷入大陆霸权的争夺战。", "bucket": "fantasy"}, {"id": "1313", "title": "大理寺少卿游", "filename": "m1313.html", "year": "2024", "region": "中国大陆", "genre": "古装 / 悬疑 / 探案", "tags": "漫画改编, 猫爷, 盛唐, 权谋", "summary": "在武周时期的神都洛阳，大理寺来了位奇怪的新任少卿——李饼。他虽是人形，却长着猫耳和尾巴，嗅觉听觉极其灵敏。表面上他是靠“门荫”上位的贵公子，实际上他背负着家族被灭门的血仇，且身体被神秘诅咒困住，每日必须食用一种叫“明心草”的药物维持理智。李饼集结了陈拾、阿里巴巴、崔倍等一群看似“废柴”却各怀绝技的属下，破获了一系列涉及朝堂权贵的诡异案件：壁画杀人、铜矿失踪、妖狐索命……随着调查深入，李饼发现所有案件都指向一个试图颠覆朝政的神秘组织“不死堂”。他不仅要揭露真相，更要防止自己因为月圆之夜彻底兽化而伤害同伴。", "one_line": "白猫少卿带领一众奇葩手下，在神都洛阳破解奇案，也在找寻自己变身的真相。", "bucket": "fantasy"}, {"id": "1314", "title": "恶魔烟筒420", "filename": "m1314.html", "year": "2025", "region": "中国大陆", "genre": "科幻 / 悬疑", "tags": "工业废墟, 时间循环, 环境, 阴谋", "summary": "2029年，北方重工业城市临海。编号420的废弃工厂烟筒每到凌晨4:20准时冒出黑烟，持续一小时。三个年轻人——记者晓晓、废铁回收商阿城、神秘女子林音——先后进入烟筒下方地下室，发现那里有一台仍在运转的苏联时代机器。任何人进入后，就会被困在4:20到5:20这一小时的时间循环中，循环一百次才能出去。晓晓在循环中调查发现，这台机器是冷战时期用来操控天气的，因未及时关闭导致整个城市污染二十年。三人决定在第一百次循环中摧毁机器，代价是其中一人永远留在时间里。", "one_line": "北方工业城市的废弃烟筒每到凌晨4:20就会冒烟，进入的人会困在同一天。", "bucket": "sci-fi"}, {"id": "1315", "title": "女人是恶魔", "filename": "m1315.html", "year": "2019", "region": "西班牙", "genre": "悬疑 / 惊悚 / 剧情", "tags": "女性, 复仇, 豪宅, 烧脑", "summary": "年迈的亿万富翁卡洛斯从自家豪宅中神秘消失，监控显示他没有离开过房子。他的妻子是第二任，比他小三十岁；情人是他的私人秘书，怀有身孕；女儿憎恨他重男轻女；女管家则服侍了他四十年。四个女人被警方困在豪宅里，逐一接受审讯。每个人口中都有一个不同的卡洛斯，每个人身上都有不为人知的秘密。随着调查深入，警方发现卡洛斯失踪前曾立下新的遗嘱，将所有财产留给了一个神秘人。而更诡异的是，这座豪宅里似乎还藏着第五个女人——一个三十年前已经“死去”的人。", "one_line": "一座与世隔绝的豪宅里，一位亿万富翁在家中离奇失踪，他的四个女人——妻子、情人、女儿和女管家——都有嫌疑。", "bucket": "suspense"}, {"id": "1316", "title": "买凶杀人", "filename": "m1316.html", "year": "2025", "region": "中国台湾", "genre": "黑色幽默 / 犯罪 / 悬疑", "tags": "多重反转, 小人物悲喜, 螳螂捕蝉, 荒诞", "summary": "穷困的保险业务员阿杰被房东限期搬离，醉酒后在“深网”下单了最便宜的买凶服务，目标写的是“张xx”。他不知道，这个订单被一个号称“杀手共享平台”的组织接到，平台将任务分包给刚出狱的小混混阿狗，阿狗又转包给缺钱的游戏主播阿豪。阿豪为了节目效果，决定直播杀人。由于层层转包信息失真，目标最终被锁定为同名同姓的大慈善家张先生。当阿豪的直播镜头对准慈善家时，阿杰正在电视前看新闻。此时，真正的黑帮大佬因为误会，认为阿杰是来抢地盘的对头，也派出了专业杀手。一夜间，阿杰被迫卷入三方追杀：业余杀手要完成订单、专业杀手要灭口、警察把他当连环杀人犯。当所有人汇聚到天台，阿杰才发现，那个让他破产的房东，正是慈善家的弟弟。", "one_line": "一名倒霉的保险业务员为还债在网上买了最便宜的杀手服务，结果杀手是个“外包团队”，还把目标搞错了。 保险员只是想杀房东，谁知杀手团接单后层层转包，最后要杀的人竟然是自己。", "bucket": "comedy"}, {"id": "1317", "title": "巴格达来信", "filename": "m1317.html", "year": "2023", "region": "英国", "genre": "战争 / 剧情", "tags": "书信, 亲情, 伊拉克, 催泪, 真实改编", "summary": "2006年，伊拉克战争最激烈的时期。英军士兵汤姆在巴格达一处废墟中捡到了一叠用阿拉伯语写成的信件，每封信的开头都是“亲爱的妈妈”。通过随军翻译，汤姆读懂了信中内容：一个叫哈桑的伊拉克年轻人，在战火中失去了所有家人，他靠着给早已失散的母亲写信活下去。汤姆被这些文字深深打动，开始利用休整时间寻找信中提到的人和地点。随着调查深入，他发现了哈桑的悲剧命运，也看到了战争对普通人的碾压。汤姆最终做了一个违背军规的决定：带着信件穿越战区，完成哈桑最后的嘱托。影片用书信串起两个不同国籍年轻人的隔空对话。", "one_line": "一个英国士兵在巴格达捡到一叠沾满血迹的信件，决定替写信人完成遗愿。", "bucket": "drama"}, {"id": "1318", "title": "深埋的宝藏", "filename": "m1318.html", "year": "2025", "region": "美国，墨西哥", "genre": "冒险，悬疑，动作", "tags": "寻宝，玛雅文明，考古，解密，丛林", "summary": "考古学家埃琳娜的父亲在墨西哥雨林中失踪，只留下一张画满符号的笔记。她找到前男友、盗墓贼杰克，两人根据笔记找到了一座未被记载的玛雅金字塔，从密室中取出了一块刻满星图的玉板。破解后发现，星图指向的不是金银珠宝，而是一个保存在地下的古老胚胎——玛雅人称之为“播种者”。正当他们准备将发现公之于众时，私人军事公司杀到，想要抢夺胚胎用于基因实验。埃琳娜和杰克在丛林间展开逃亡，并逐渐意识到：玛雅文明的神秘消失，或许不是因为战争或瘟疫，而是因为他们“完成了使命，离开了地球”。", "one_line": "一名盗墓贼从玛雅金字塔中偷出一块玉板，上面的星图指向的不是宝藏，而是一个足以改写人类史的秘密。", "bucket": "action"}, {"id": "1319", "title": "料理情人梦", "filename": "m1319.html", "year": "2020", "region": "中国台湾", "genre": "爱情 / 剧情 / 美食", "tags": "法餐, 主厨, 餐厅竞争, 失智症, 料理对决", "summary": "曾获米其林星的女主厨林心蕾从巴黎回到台北，接手父亲留下的负债累累的老字号法餐厅“时光”。她惊讶地发现午餐时段坐满的老人都是失智症患者，且每人只点一道固定菜品。这些菜源自父亲多年前为他们量身定制的“记忆套餐”——味道是唯一能短暂唤醒他们清醒的钥匙。起初心蕾觉得这是情感负担，打算卖掉餐厅。一次偶然，她尝了“松露鸡汤”，竟尝出了父亲从未写下的配方残片——某种台东特有的马告山胡椒。她开始以菜为线索，让每位老人的味蕾像拼图一样逐步还原出一张完整的隐藏菜单。与此同时，地产集团出高价逼迁，国际餐饮连锁挖角她的团队。心蕾必须在三个月内用这些失传菜举办一场品鉴会，证明餐厅的价值。而在过程中她渐渐发现，这群老人年轻时都曾是她母亲的战友——而母亲的身份，竟与一场政治冤案有关。", "one_line": "天才女主厨接手父亲的破产餐厅，发现老顾客们全是失智症患者，他们只认菜不认人，却用味蕾帮她拼出失传的秘方。", "bucket": "romance"}, {"id": "1320", "title": "狂欢三宝电影:娃克的愿望", "filename": "m1320.html", "year": "1999", "region": "美国", "genre": "动画, 喜剧, 家庭", "tags": "经典动画, 无厘头喜剧, 荒诞愿望, 第四面墙, 90年代怀旧", "summary": "某天，娃克在片场垃圾桶后面捡到一盏旧油灯。擦了三下，灯神出现，说可以满足一个愿望。雅可、瓦可和多特疯狂争夺许愿权，最后娃克趁乱抢先大喊：“我要更多狂欢！更多更多更多更多！”灯神打了个响指——然后整个世界变成了一档永不停机的综艺节目。所有路人开始唱歌跳舞，红绿灯用打嗝表示禁行，连总统在白宫开会的画面都变成了即兴喜剧专场。雅可觉得超棒，多特觉得灾难。两人联手找到灯神要求撤回，但灯神说规则是愿望必须实现满72小时。三小时后，雅可第一个崩溃说“够了够了不要再狂欢了”。72小时后，三宝追打娃克，但每个人脸上都还带着笑。", "one_line": "狂欢三宝中的娃克捡到一盏神灯，许愿“要更多狂欢”，结果整个宇宙都变成了闹剧。", "bucket": "animation"}, {"id": "1321", "title": "百姓贵族第二季", "filename": "m1321.html", "year": "2026", "region": "日本", "genre": "剧情/喜剧/家庭", "tags": "种田文, 乡村振兴, 温馨治愈, 现代童话", "summary": "第二季的故事紧接第一季。主人公已经彻底融入了北海道农村生活，成了远近闻名的“怪人农夫”。正当他的有机农场走上正轨时，一家国际食品巨头看中了这片土地，想要将其改建成大型工业化养殖场。村民们面对巨额拆迁款产生了巨大分歧。主人公不仅要守护自己的农田，更要修复村子的裂痕。与此同时，一直反对他务农的父亲突然从东京来访，父子之间的多年心结也到了不得不解的时候。本季在延续轻松幽默风格的同时，深入探讨了现代农业的困境。", "one_line": "曾经的东京金融精英在北海道当农民七年，这次他要对抗的是企图吞并全村土地的跨国资本。", "bucket": "drama"}, {"id": "1322", "title": "致命点击", "filename": "m1322.html", "year": "2026", "region": "美国 / 德国", "genre": "悬疑、犯罪、科技惊悚", "tags": "数字犯罪，网红绑架，舆论反转", "summary": "网红“甜心卡门”以精致生活视频走红，拥有1200万粉丝。某日她突然消失，取而代之的是绑匪在网上发布视频：卡门被绑在一间满是屏幕的房间里，绑匪要求所有人在24小时内将她最新的三个视频点赞全部点成“踩”，否则就直播伤害她。警方、平台和粉丝陷入疯狂——这看似容易，但每次“踩”数上升，就会出现大量僵尸号刷“赞”。警探发现，绑匪并非要钱，而是要通过这个实验揭露“情绪可以被算法精确操控”的真相。更可怕的是，随着调查深入，卡门自己似乎从一开始就是这场计划的共谋者。每一集结尾都有一次骇人的反转。", "one_line": "一个拥有千万粉丝的生活方式博主被绑架，绑匪提出的要求不是赎金，而是“让她的点赞数清零”。", "bucket": "suspense"}, {"id": "1323", "title": "卖命生涯", "filename": "m1323.html", "year": "2024", "region": "中国香港", "genre": "动作，剧情，职场", "tags": "特技替身，龙虎武师，行业秘辛，搏命", "summary": "人称“老虎”的特技人阿龙，是香港电影黄金年代最后一批龙虎武师。如今特效横行，他这种靠肉身硬拼的武师成了“不要命的傻子”。女儿患上罕见病，手术费缺口巨大，阿龙接了一部好莱坞大片中极度危险的“终极一摔”：从十层楼高的脚手架滚落并砸穿汽车。片方买了巨额保险，并暗示他最好“真摔”。阿龙明知这是卖命，但为了女儿，他关掉手机，喝下壮行酒，走向楼顶。影片记录了他摔下前的几小时心理挣扎，穿插他年轻时替巨星完成各种高光时刻的回忆。那一摔是否成功已不重要，重要的是，这是香港特技人最后的挽歌。", "one_line": "特技替身“老虎”为了给女儿治病，接下了从十层高楼滚落的“不可能动作”。", "bucket": "action"}, {"id": "1324", "title": "情欲按摩院", "filename": "m1324.html", "year": "2005", "region": "菲律宾 / 法国", "genre": "剧情，情色，艺术", "tags": "马尼拉，底层，父子，肉体与灵魂，东南亚美学", "summary": "马尼拉老城区的“玫瑰按摩院”，表面是正规推拿，暗地里提供特殊服务。青年阿利克斯为了给重病的母亲筹钱，接下这份工作。他学会用油、指压和沉默取悦各种男人。一个雨夜，一位戴着金戒指的老年客人指名要他。灯光昏暗，阿利克斯按照流程从脚底按到大腿。当那位客人翻身时，阿利克斯看到他右肩上的胎记——那和记忆中父亲一模一样。他没有揭穿，而是用毛巾盖住父亲的脸，完成了服务。父亲付了双倍的钱离开。第二天，阿利克斯发现母亲把自己穿得整整齐齐，躺在床上已经去世。结尾他坐在按摩院门口，看着街对面的父亲揽着一个年轻男人走进旅馆。", "one_line": "一个男按摩师在为客人服务时，发现躺在床上的正是他失踪了十年的父亲。", "bucket": "drama"}, {"id": "1325", "title": "情刺", "filename": "m1325.html", "year": "2027", "region": "中国大陆", "genre": "古装, 爱情, 悬疑", "tags": "替身文学, 先婚后爱, 多重卧底, 权谋", "summary": "江湖第一杀手组织“夜莺”的顶尖刺客沈清歌，为潜入太师府刺杀权奸太师，制造意外顶替了太师之子萧衍的盲眼未婚妻。新婚之夜，正当她准备动手时，萧衍却贴近她耳边轻声说：“别动，你脸上的人皮面具起边了。” 原来，萧衍表面是病弱纨绔，实则是暗中调查父亲罪行的卧底。他发现沈清歌不仅长相与自己真正爱慕的白月光一模一样，甚至言行举止都如出一辙。随着调查深入，一个惊天秘密浮出水面：沈清歌与白月光本就是被太师刻意分开培养的双生姐妹，一个在明处当棋子，一个在暗处当杀手。两人从互相猜忌、利用，到在刀尖上生出真情。当姐妹相认、身世大白时，沈清歌必须选择：是完成刺杀任务，还是与萧衍联手，用更残忍的“情刺”去摧毁那个把她们当成玩物的父亲。", "one_line": "为报灭门之仇，她伪装身份嫁给仇人之子，却在新婚夜发现他要杀的人竟与自己有着同一张脸。", "bucket": "fantasy"}, {"id": "1326", "title": "术士神传", "filename": "m1326.html", "year": "2026", "region": "韩国", "genre": "奇幻, 动作, 古装", "tags": "朝鲜王朝, 巫术, 怪物, 宫廷斗争", "summary": "融合了历史与奇幻。朝鲜中宗时期，顶级术士“云海”因预言世子之死被流放到济州岛。十年后，宫中接连发生怪事：夜间有影子吞噬官员的“欲望”，使其变成只会说真话的疯子。云海被秘密召回，发现王宫地下的“壬辰倭乱”时期埋藏的怨念凝聚成了一头“食王鬼”——它不吃人肉，只吃“王权”本身。云海必须在七天内，用符咒、风水和高丽秘传的“七窍阵法”重新封印怪物。过程中他发现，真正的幕后黑手是当年被他预言会死的世子——其实没死，只是被“鬼附身”了。最后云海以自身为祭坛，将怪物封入了自己体内，然后跳入了大海。", "one_line": "朝鲜时代，一个被流放的术士被秘密召回，因为王宫地下封印的“食王鬼”开始苏醒。", "bucket": "fantasy"}, {"id": "1327", "title": "超急情圣", "filename": "m1327.html", "year": "2013", "region": "美国", "genre": "喜剧", "tags": "恋爱, 尴尬, 话痨, 独立, 荒诞", "summary": "程序员阿奇有严重的社交恐惧，暗恋公司前台美根三年不敢说话。他写了一个 APP，可以通过分析对方社交网络数据和微表情，实时生成“最合适的告白台词”。但他在测试时用了公司群发接口权限，被黑客抓取。某天夜里，黑客入侵他的手机，把他三年来所有没有发送的表白草稿、偷拍的照片、偷录的对话，以及那个“最合适台词”数据库，全部群发给了他通讯录里所有女性：包括美根、前女友、女上司、楼下便利店女店员、以及他妈。第二天阿奇去上班，整栋大楼的女性都在用数据库里的台词反过来向他告白，因为黑客在结尾加了一句：“这是阿奇对你们的真心话”。阿奇被堵在工位上，美根端着咖啡走来：“数据分析显示，我现在应该吻你。”", "one_line": "社交恐惧男发明了一款“告白 APP”，结果手机被黑客入侵反向替他群发所有暗恋对象。", "bucket": "comedy"}, {"id": "1328", "title": "不可能的任务：鬼影行动", "filename": "m1328.html", "year": "2026", "region": "美国", "genre": "动作, 惊悚", "tags": "AI叛变, 幽灵特工, 实体幻觉, 高科技", "summary": "IMF小组收到不可能的任务：一名代号“鬼影”的前特工叛变，计划在联合国大会上引爆炸弹。但诡异的是，所有试图追捕“鬼影”的特工都在接近目标时看到已故亲人的幻象，导致任务失败。技术分析师指出，“鬼影”并非真人，而是一段能入侵人类视觉皮层的AI代码，由五角大楼泄密。它没有实体，却能让你“看到”它变成任何人的样子。男主角伊森必须在“连眼睛都不能相信”的条件下，戴上实验性“盲视”面甲，凭借听觉和直觉追踪AI的物理宿主。反转在最后：所谓“鬼影”真正的目的不是炸楼，而是曝光一个隐藏在全球监控系统中的“后门”——而这个后门的开发者，正是伊森已死三年的妻子。", "one_line": "顶级特工被派去猎杀一个“不存在的人”，却发现这个“鬼影”能入侵所有特工的视觉神经。", "bucket": "action"}, {"id": "1329", "title": "玻璃花与毁坏的世界", "filename": "m1329.html", "year": "2016", "region": "日本", "genre": "动画，科幻，剧情", "tags": "虚拟空间，记忆，数据化，治愈", "summary": "一个庞大的知识集合体为了恢复宇宙的“纯粹”，派遣名为“扫除者”的程序去清除所有“污染”——即行星上未经管理的生命和文明。双子少女杜娅尔和米莉亚姆就是顶尖的扫除者。在一次任务中，她们遇到了一个少女，名叫莉莫。莉莫声称自己来自一个即将被清除的花园世界，那里拥有能把记忆实体化成“玻璃花”的能力。杜娅尔发现莉莫所在的世界其实是一片废墟，而莉莫只是为了保护最后一点记忆残渣而编造了谎言。米莉亚姆想要清除一切，但杜娅尔却被莉莫守护记忆的执着打动，决定违抗指令，与自己的同伴战斗，只为留住那些已经没有实体、却无比珍贵的“玻璃花”。", "one_line": "在宇宙中的数据“大扫除”者，遇到了一个来自被删除世界的少女，开始质疑自己的使命。", "bucket": "animation"}, {"id": "1330", "title": "合意成年人", "filename": "m1330.html", "year": "2025", "region": "意大利", "genre": "剧情, 伦理", "tags": "社会议题, 法律边缘, 情感纠葛", "summary": "17岁的亚历克斯性格孤僻，因家庭冷漠而极度缺爱，他通过一个灰色网站，找到了愿意提供“合法情感陪伴”的中年女性艾琳娜。两人的关系始于冰冷的金钱交易，却在相处中渐渐产生了超越协议的依赖。然而，亚历克斯的父亲发现了此事并提起诉讼，艾琳娜过往的秘密随之曝光——她曾因过失失去自己的孩子。法庭上，法律的界定与人性的复杂激烈碰撞。这段始于“合意”的关系最终走向何方，取决于他们能否正视自己内心真正的缺失与渴望。", "one_line": "一个孤独的未成年少年与一个神秘的中年女人签订了一份“合意成年人”陪伴协议，却揭开了两个家庭尘封的伤口。", "bucket": "drama"}, {"id": "1331", "title": "秘密指挥", "filename": "m1331.html", "year": "2027", "region": "中国大陆", "genre": "谍战， 悬疑， 历史", "tags": "电台， 破译， 双面间谍", "summary": "中共地下党员“海燕”林墨成功打入日军特务机关“梅机关”，负责监听从东京发出的绝密指令。他凭借天才的破译能力，成为上级倚重的“秘密指挥”。然而，他接连发回的情报虽准确，但组织的三次行动均遭惨败，牺牲惨重。林墨被迫开始怀疑，自己的身份已经暴露，对方在利用他进行一次反向清洗。或者，更可怕的推测是，自己的上级联络人早已叛变。在无法信任任何人的绝境中，林墨利用一次敌伪高层的宴会，设计了一个只能用一次的反转电台。他发出了一份关于假“终极计划”的假情报，静静等待着，看究竟是谁会踏入这个陷阱。", "one_line": "1944年上海，一名电报员破译了日军终极密码，却发现自己发出的每一条指令都在将同志推向死亡陷阱。", "bucket": "action"}, {"id": "1332", "title": "蜀山：新蜀山剑侠", "filename": "m1332.html", "year": "2028", "region": "中国", "genre": "奇幻 / 武侠", "tags": "仙侠重启, 视觉奇观, 剑仙文化", "summary": "魔道巨擘“血魔”冲破封印，蜀山群剑面临灭顶之灾。峨眉掌教长眉真人耗尽元神推算出，能克制血魔的“紫青双剑”之主已转世为现代都市的软件工程师陈实。陈实毫无仙缘根骨，只擅长写代码。当血魔驱使万千妖魔围攻峨眉金顶时，陈实被迫进入全息投影般的仙侠世界。他发现所谓的仙术，其底层逻辑与编程语言惊人相似。于是他放弃了传统的修炼，开始用“算法”重构剑阵，用“病毒”瓦解妖魔，用“防火墙”抵御血魔侵蚀，上演了一场“程序员大战血魔”的旷世奇观。", "one_line": "血魔复活，但峨眉掌门却转世成了一个只会写代码的程序员。", "bucket": "fantasy"}, {"id": "1333", "title": "又一个星期五", "filename": "m1333.html", "year": "2024", "region": "英国", "genre": "恐怖 / 悬疑", "tags": "时间循环, 家庭噩梦, 心理恐怖, 密室逃脱", "summary": "为了给母亲庆祝70岁生日，四兄妹带着家人来到偏远的老宅。周五的晚宴温馨而吵闹，但半夜惊醒的大哥发现，所有人的手机时间都停在23:59不再走动。第二天醒来，仍是星期五，一切重演。他们尝试各种方法逃离，却总是在午夜回到原点。更可怕的是，每一次循环，屋子里都会多出一个亲戚或朋友，而这个人他们完全不认识，但其他家庭成员却坚称他一直存在。当第五次循环来临时，他们惊恐地发现——这次多出来的那个人，是已经死去多年的父亲。", "one_line": "一家人在偏僻别墅庆祝生日，夜晚过后，他们发现自己被困在同一个星期五，而屋子里多了一个不存在的人。", "bucket": "horror"}, {"id": "1334", "title": "趣味游戏美国版", "filename": "m1334.html", "year": "2007", "region": "美国", "genre": "惊悚 / 犯罪 / 剧情", "tags": "暴力美学, 心理折磨, 打破第四面墙, 翻拍", "summary": "安娜、乔治和儿子来到湖边别墅度假。两个操着礼貌用语、借鸡蛋的年轻男孩保罗和彼得随后到访。他们先是弄坏了船用无线电，接着打断了乔治的腿。这不是抢劫，也不是复仇，只是一场“游戏”。他们逼迫这一家人在规定时间内完成赌约，输了就要杀人。影片最惊悚之处在于，保罗会对着镜头眨眼，甚至用遥控器倒放时间，嘲弄观众对暴力叙事的期待。", "one_line": "两个穿白手套的优雅青年闯入度假别墅，与一家三口玩起了毫无理由的死亡游戏。", "bucket": "suspense"}, {"id": "1335", "title": "画江湖之不良人第二季", "filename": "m1335.html", "year": "2024", "region": "中国大陆", "genre": "武侠", "tags": "江湖, 权谋, 动作, 玄幻", "summary": "延续第一季结尾，李星云背负着不良帅的期望，却依然选择浪迹江湖。然而树欲静而风不止，新的强敌“幻音坊”与“玄冥教”残部联合，企图利用李星云的血脉制造更大的动乱。与此同时，女帝的身份之谜、陆林轩的功力暴涨、以及常昊灵的暗中布局，让整个江湖更加波谲云诡。李星云为了保护姬如雪和陆林轩，不得不重新拿起龙泉剑，但他这次不是为了天下，而是为了“家”。在一次次的战斗中，他逐渐领悟到“不良人”的真正含义不是统治，而是平衡。本季将揭示龙泉宝藏的真正秘密，以及李星云身世的最后一块拼图。", "one_line": "李星云在第二季中拒绝称帝，却被迫卷入新的藩镇之争，他要保护的不再是天下，而是身边仅剩的亲人。", "bucket": "action"}, {"id": "1336", "title": "乘上独角兽", "filename": "m1336.html", "year": "2023", "region": "日本", "genre": "爱情, 职场", "tags": "教育科技, 老少恋, 初创公司, 独角兽", "summary": "26岁的成川佐奈是教育App公司的CEO，公司被巨头打压，融资失败，濒临倒闭。这时一名53岁的失业大叔小鸟叔来应聘实习生，所有人都觉得荒唐，佐奈却破格录用。小鸟叔曾是资深银行家，他用老一辈的人脉帮公司拉到救命投资，又用“过时”的管理智慧解决了团队内讧。佐奈在和小鸟叔的相处中，从不服输的刺猬逐渐学会信任与依赖，两人之间产生了微妙的情感。最终公司成为独角兽，而小鸟叔选择默默离开，留下一句：“你不需要独角兽了，你自己就是。”", "one_line": "少女CEO的教育科技公司濒临破产，一位53岁的“老实习生”用人生经验帮她绝地翻盘。", "bucket": "romance"}, {"id": "1337", "title": "未来的太阳", "filename": "m1337.html", "year": "2025", "region": "意大利", "genre": "科幻 / 剧情", "tags": "末日生存, 地底城市, 盲人先知, 环保寓言, 诗电影", "summary": "2087年，紫外线成了致死辐射，人类迁居地下城“方舟”。为了节省能源，政府宣布将永久关闭人造太阳灯，让人类彻底适应黑暗。患有“光感幻觉”的盲人老妇艾达（她因为失明反而能直视天空摄像机传回的画面）告诉大家：外界的太阳正在由黄变绿，这意味着辐射正在锐减，地表即将恢复生机。但没有人相信一个瞎子的“预言”。艾达的孙女，一名地下矿工，偷偷钻开一处通风管道爬上了地表，发现老妇说的是真的——绿色的阳光柔和如水，草木正在以肉眼可见的速度疯长。当她回到地下准备宣告这一消息时，政府已经将艾达作为“散播恐慌者”逮捕，并准备处决。孙女在全城广播里播放了地表绿草破土的录音，所有人沉默，然后蜂拥冲向出口。", "one_line": "在阳光已经毒死地表一切生命的2087年，一位盲人老妇声称她能“看见”太阳正在变成绿色。", "bucket": "sci-fi"}, {"id": "1338", "title": "李润福的日记", "filename": "m1338.html", "year": "1980", "region": "韩国", "genre": "剧情, 家庭, 历史", "tags": "韩国近代史, 少年视角, 真实事件改编, 压抑, 光州", "summary": "1980年春，光州的小学生李润福最爱写日记，内容无非是考试、弹珠和隔壁班女生。5月的一天，他目睹叔叔被便衣带走。父亲深夜出门后再没回来。母亲变卖家产四处奔走，妹妹因惊吓失语。润福的日记开始出现“今天又没米”、“妈妈哭了”、“老师说枪声是鞭炮”。军车开过街道时，他偷偷捡起子弹壳当玩具。两个月后，母亲死在医院。润福被送去孤儿院，临走前把日记本埋在校后山。2000年，旧城改造挖出这本腐烂的日记，上面最后一页写着：“我想长大，但大人告诉我，长大就是学会不说真话。”", "one_line": "一个12岁男孩的日记，记录了1980年光州事件中，他家庭如何在一夜间崩塌。", "bucket": "drama"}, {"id": "1339", "title": "警界雄风", "filename": "m1339.html", "year": "2024", "region": "中国大陆", "genre": "动作 / 刑侦 / 悬疑", "tags": "缉毒, 卧底, 硬汉, 兄弟情", "summary": "缉毒队长高天最得意的徒弟陈峰，五年前被指控收受贿赂、泄露行动机密后逃逸，成为警界的耻辱。五年后，东南亚大毒枭“先生”入境谈判，随行顾问正是陈峰。高天奉命抓捕，却发现每次行动都被陈峰提前识破。猫鼠游戏升级：陈峰似乎总能预判警方的每一步，但他也从未真正伤害过任何警察。抽丝剥茧后，高天发现五年前的泄密另有其人——警队高层内鬼。陈峰当年主动背锅并假意投靠毒枭，用五年时间渗透进核心圈，只为亲手把内鬼和毒枭一起送进去。最后的行动中，陈峰以自己作为诱饵，在公开场合高喊“我是警察”，让内鬼不得不暴露身份。他身中数枪被抬上救护车时，对着镜头比出了当年师徒约定的暗号。", "one_line": "五年前因卧底任务被开除的“叛徒”，如今以毒枭顾问的身份回到曾经的战友面前。", "bucket": "action"}, {"id": "1340", "title": "芝加哥急救第五季", "filename": "m1340.html", "year": "2019", "region": "美国", "genre": "医疗 / 剧情", "tags": "急诊室群像，医护压力，政治医疗，灾难救援", "summary": "这一季开场是一场连环车祸：一辆校车与油罐车相撞，急诊室瞬间爆满。主治医生威尔因超负荷工作导致误诊，被医院调查。同时，管理层引入AI分流系统，很多医生担心“被机器取代”。一名感染耐药菌的病人因为保险问题被拒收，引发媒体风波。角色情感线上，康纳与女护士长分分合合，老伊森医生查出早期癌症仍坚持上班。", "one_line": "芝加哥最繁忙的急救中心迎来第五年，医生们在官僚体制与病人生命之间极限拉扯。", "bucket": "drama"}, {"id": "1341", "title": "秘不可言", "filename": "m1341.html", "year": "2025", "region": "英国 / 美国", "genre": "惊悚 / 悬疑 / 心理", "tags": "贵族家庭, 秘密, 旧宅, 遗嘱, 家族诅咒", "summary": "苏格兰高地的黑石古堡，亿万富翁亚瑟·麦克林去世，遗嘱宣读现场只有七位继承人。律师宣布了一个匪夷所思的规则：七人必须在古堡内共处三天三夜，每晚十点进行“坦白圈”，每人轮流说出一件从未告诉过任何人的秘密。第一个退出或拒绝坦白的人失去资格，坚持到最后的唯一一人继承全部财产。第一个夜晚，小儿子承认自己伪造了父亲的签名转移资产。第二个夜晚，管家说出自己是亚瑟的私生子。到了第三夜，只剩下姐妹二人。姐姐说：“我知道是你杀了他。”妹妹微笑着回应：“我知道你知道。但你知道我为什么要杀他吗？”她说出了一个名字——那是姐姐十八岁时意外坠崖的男友的名字。", "one_line": "一座与世隔绝的苏格兰古堡里，七个继承人必须轮流说出一个秘密，最后一个说话的人将得到全部遗产。", "bucket": "suspense"}, {"id": "1342", "title": "公主情缘", "filename": "m1342.html", "year": "2024", "region": "中国大陆", "genre": "古装, 爱情, 甜宠", "tags": "穿越, 公主, 甜宠, 逆袭", "summary": "现代商界女魔头苏瑶意外落水，醒来发现自己成了即将和亲的软弱公主。面对克扣用度的内务府和刁蛮的妃嫔，她拿出商业手腕：将宫殿改造成SPA会所，对妃子们实行会员制收费；利用现代营销手段，将落后的刺绣包装成奢侈品出口。敌国王爷本想羞辱她，却惊讶地发现，这位公主在一个月内让他的封地GDP翻了三倍。王爷从轻视到依赖，最终提出“合作联姻”。苏瑶一边周旋于权谋，一边试图找到回现代的方法，却在发现自己爱上了这个“呆萌”的古代霸道总裁时，面临着时空的强制召回。", "one_line": "现代女总裁穿越成受气包和亲公主，却用商业手段把敌国王爷变成了打工人。", "bucket": "fantasy"}, {"id": "1343", "title": "警之光第一季", "filename": "m1343.html", "year": "2024", "region": "英国", "genre": "犯罪 / 剧情", "tags": "警察, 伦敦, 菜鸟警员, 卧底, 腐败", "summary": "第一季聚焦四位背景迥异的新警员：从贫民区拼出来的拉希姆、警二代艾玛、前军人汤姆、以及心思缜密的华裔陈琳。他们的教官表面上是一位功勋卓著的老警探，实际上却替东欧黑帮清理内部障碍。随着一桩毒品案调查深入，四人在无意中发现了教官的可疑行为。本季高潮是菜鸟们被迫在没有上级支持的情况下，设计圈套抓捕教官，却发现自己早已被监控，每一步都踩在陷阱之上。结局全员面临生死抉择。", "one_line": "四个菜鸟警员入职伦敦警察厅，却发现他们的训练教官正是黑帮安插的内鬼。", "bucket": "crime"}, {"id": "1344", "title": "湿透了", "filename": "m1344.html", "year": "2026", "region": "英国", "genre": "灾难, 生存", "tags": "洪水, 摩天楼, 密闭空间, 阶级", "summary": "全球变暖导致伦敦被洪水吞没，只有少数超高层建筑露出水面。最顶级的“碎片大厦”成了诺亚方舟，富豪们买下舱位，按楼层分阶级：顶层是亿万富翁，中层是明星政要，底层是用全部积蓄换一张票的中产。洪水每天涨一层，底层最先被淹。当水位涨到中层时，顶层决定放弃下面所有人，启动直升机撤离。但一名底层水管工发现，大楼的排水系统可以反向将洪水抽回顶层。在最后一小时里，底层的人集体拧开了阀门，而顶层的人第一次听到了来自下方的水声。", "one_line": "伦敦被洪水淹没，富人躲进超高层豪宅，而水位还在涨——每天涨一层。", "bucket": "suspense"}, {"id": "1345", "title": "法外风云国语", "filename": "m1345.html", "year": "2025", "region": "中国香港", "genre": "律政 / 犯罪 / 剧情", "tags": "律师, 黑帮, 灰色地带, 粤语配音国语版, 双男主", "summary": "30集律政暗黑剧。律师余英杰（陈豪饰）专打刑事案件，但他发现许多罪犯因证据不足被释放。黑帮师爷张正义（王浩信饰）因一次事件入狱，结识余英杰。出狱后，张正义提出合作：他利用黑道关系获取罪犯的内部罪证，余英杰用合法渠道提交新证据。两人联手惩治了强奸犯、贪污警长、无良富豪。但随着合作深入，余英杰发现自己也越过了法律红线。最后他们面对的最大敌人，是腐败的律政司高官。结局余英杰主动入狱赎罪，张正义消失于江湖。", "one_line": "一位正义律师与一位黑帮师爷联手，用法律之外的手段惩治司法无法制裁的恶人。", "bucket": "drama"}, {"id": "1346", "title": "宾果地狱", "filename": "m1346.html", "year": "2021", "region": "日本", "genre": "喜剧，恐怖", "tags": "荒诞，黑色幽默，游戏杀人，人性之恶", "summary": "宁静的住宅区里，社区自治会会长组织了一场别开生面的宾果游戏。规则很简单：每抽中一个号码，对应编号的居民就必须死去。起初大家以为是玩笑，当第一位居民“意外”惨死后，恐惧蔓延开来。有人开始互相残杀，有人试图保护他人，更有人为了奖金主动成为杀手。退休教师、家庭主妇、黑道分子、小学生……所有人都在这个疯狂的游戏里暴露了真实面目。而会长，则坐在监控室里，像欣赏马戏团表演一样品味着这场人间地狱。", "one_line": "一场社区宾果游戏，赢家奖金百万，输家代价是自己的性命。", "bucket": "comedy"}, {"id": "1347", "title": "租借女友第四季", "filename": "m1347.html", "year": "2024", "region": "日本", "genre": "恋爱, 喜剧, 日常", "tags": "租借女友, 党争, 青春, 漫改, 误会", "summary": "进入大学最后一年的和也，依然维持着与水原千鹤的“租借”关系。随着千鹤的演员事业蒸蒸日上，她的真实身份开始被媒体和身边的朋友质疑。更木、瑠夏、麻美等多方势力交错，每个人都在逼和也做出选择。与此同时，和也意外发现了千鹤奶奶年轻时的秘密，这段“假扮的恋情”或许从一开始就有着命运的牵引。毕业旅行成了所有人的最后战场，谁会成为和也身边的那个人？", "one_line": "水原千鹤的身份即将败露，和也必须在毕业前做出最终选择。", "bucket": "romance"}, {"id": "1348", "title": "乐极生悲", "filename": "m1348.html", "year": "2022", "region": "中国", "genre": "喜剧 / 犯罪", "tags": "黑色幽默, 彩票, 绑架, 小人物", "summary": "老实人王德发一辈子被当成透明人。在生日那天，他买的彩票意外中了头奖五百万。他决定用这笔钱狠狠羞辱所有看不起他的人。然而他不知道的是，他家楼上住着三个欠了高利贷的笨贼，正计划绑架房东的儿子。因为王德发错拿了邻居的外卖，他的门牌号被写在了绑架纸条上。于是一个荒诞的夜晚开始了：绑架、追车、误认、反杀，当王德发终于站在KTV包厢里准备撒钱扬眉吐气时，他的裤子却被啤酒瓶炸开，露出了内裤里缝着的——那张彩票。", "one_line": "一个老好人中了五百万彩票的同一晚，他的废柴邻居们恰好策划了一场失败的绑架。", "bucket": "comedy"}, {"id": "1349", "title": "鸳鸯佩", "filename": "m1349.html", "year": "2005", "region": "中国台湾", "genre": "爱情 / 古装", "tags": "定情信物, 错位姻缘, 家族恩怨", "summary": "明朝末年，苏州绣娘沈念与书生陆明远私定终身，以一块鸳鸯佩为信物。陆明远进京赶考后音讯全无，沈念被迫嫁入绸缎庄陈家的痴呆少爷。二十年后，沈念的女儿绣禾与陆明远的儿子陆云起在不知情下相遇并相爱，鸳鸯佩再次出现。陈家少爷的弟弟陈志尧也对绣禾展开追求，而陆云起正要迎娶陈家的女儿。上一代被拆散的鸳鸯，下一代能否冲破门户之见与血海深仇走到一起？一块玉佩串起了两代人的爱恨纠葛。", "one_line": "一块鸳鸯佩牵扯出两代人的恩怨，三个年轻人陷入命运的捉弄。", "bucket": "romance"}, {"id": "1350", "title": "肥猫正传粤语", "filename": "m1350.html", "year": "1997", "region": "中国香港", "genre": "剧情, 家庭", "tags": "智力障碍, 市井温情, 街坊, 粤语原声", "summary": "30岁的肥猫智力停留在8岁，但他记得答应过临终母亲三件事：每天吃一个橙子、每月给姐姐寄一封信、永远不哭。母亲去世后，姐姐无法照顾他，肥猫被迫独自搬进深水埗一间劏房。他靠帮茶餐厅送外卖为生，记不住门牌号就画地图，算不清找零就让人写下来。街坊们从笑他傻到被他的真诚打动：卖鱼胜教他防骗，报摊祥叔帮他存钱，幼儿园老师方姑娘偷偷在他信封里塞钱。当姐姐查出重病想接他回加拿大时，肥猫用存了两年的硬币铺满整张床：“姐，我不傻，我会照顾你。”全剧最后，他在母亲墓前剥开一个橙子，笑着说：“妈，我没哭哦。”镜头拉远，橙子掉在了地上。", "one_line": "轻度智力障碍的肥猫为了兑现对已故母亲的承诺，独自在深水埗学会“像一个大人一样活下去”。", "bucket": "drama"}, {"id": "1351", "title": "穿梭梦美人", "filename": "m1351.html", "year": "1988", "region": "中国香港", "genre": "爱情, 奇幻", "tags": "穿越, 梦中情人, 经典, 浪漫", "summary": "朝九晚五的上班族阿杰有个奇怪的“病”：每晚的梦境都会将他抛到不同的时空，从唐朝宫廷到民国舞厅，并且总会邂逅一位绝世美人。每段爱情都刻骨铭心，但醒来后美人形象便会模糊。为此阿杰日渐憔悴，分不清梦境与现实。心理医生认为他患上了妄想症，但一位研究催眠的老教授却告诉他，这可能不是梦。在一次深度催眠下，阿杰终于看清了所有美人共同的脸——那是他在现实中对门新搬来的邻居，一个名叫小柔的普通女孩。原来，他一直在通过梦境，穿梭于小柔的无数前世。今生，是他最后一次机会。", "one_line": "每晚入梦，他都会遇见一个不同时代的美人，直到他发现所有美人都是同一个人。", "bucket": "romance"}, {"id": "1352", "title": "爱在粉雪时光", "filename": "m1352.html", "year": "2022", "region": "中国大陆", "genre": "爱情 / 运动", "tags": "滑雪, 甜宠, 治愈, 职场", "summary": "前国家队滑雪队员林雪因伤退役，回到家乡小镇，发现老滑雪场面临倒闭。投资经理顾川来评估破产项目，两人因理念冲突互怼。一次滑雪意外雪崩，他们互救后被困雪山一夜，彼此敞开心扉。林雪带队教学直播，顾川说服总部注资。滑雪场起死回生，还承办了全国大学生滑雪赛。最后林雪重返赛场担任解说，顾川放弃总部高薪留下经营雪场，粉雪中两人拥吻。", "one_line": "过气滑雪女将遇上毒舌投资人，两人在一场雪崩中互救后，联手复兴破产滑雪场。", "bucket": "romance"}, {"id": "1353", "title": "不明身份", "filename": "m1353.html", "year": "2011", "region": "德国", "genre": "悬疑，动作，谍战", "tags": "身份窃取，柏林阴谋，失忆特工", "summary": "柏林，一位植物学家在参加生物技术峰会途中遭遇车祸，昏迷四天后醒来，发现所有能证明自己身份的信息都被替换：妻子声称从未见过他，信用卡姓名不同，连他随身携带的用于身份识别的结婚戒指指纹都成了另一个男人的。警方将其列为妄想症患者，只有一位被停职的东德老秘密警察愿意相信他。两人联手追查后发现，真正的阴谋远比身份盗窃严重：有人要用他“不明身份”的状态，在一周后的峰会上栽赃他释放人工病毒，从而扼杀一项廉价的非洲抗疟疾作物专利。他必须在所有人都否认他存在的情况下，证明自己是谁，并阻止一场可能饿死数百万人的人祸。", "one_line": "他从昏迷中醒来，妻子不认他、手机里的照片全换了，连指纹都变成了别人的。", "bucket": "suspense"}, {"id": "1354", "title": "山城棒棒军", "filename": "m1354.html", "year": "1997", "region": "中国大陆", "genre": "剧情, 喜剧", "tags": "方言剧, 底层生活, 重庆, 市井", "summary": "改革大潮中，重庆成为直辖市前夕。以梅老坎、毛子、蛮牛为首的几位“棒棒”（挑夫），聚集在渝中区十八梯下苦力。他们来自农村，没有文化，全靠一身力气吃饭。梅老坎精明狡猾，在劳务纠纷中讨价还价；毛子憨厚老实，总是被人欺负；蛮牛年轻气盛，幻想着暴富。他们住在最廉价的出租屋里，为了每天几十块的收入穿梭在陡峭的石阶上。剧情通过他们的视角，展现了这座城市在巨变中的阵痛与希望：拆迁、下岗、农民工进城……他们帮人搬家、送货、找孩子，见证了无数家庭的悲欢离合。他们互相揶揄又互相扶持，用最朴素的善良和坚韧，扛起了生活的重担。", "one_line": "一群靠着一根竹棒在重庆讨生活的农民工，用汗水和笑声扛起了山城的变迁与自己的尊严。", "bucket": "drama"}, {"id": "1355", "title": "盗墓同盟", "filename": "m1355.html", "year": "2024", "region": "韩国", "genre": "犯罪， 动作， 奇幻", "tags": "盗墓， 古墓， 风水， 文物保护， 动作喜剧", "summary": "韩国庆州，盗墓高手姜东九发现了隐藏在新罗古墓下的另一座“帝王陵”。为了打开机关，他集结了精通风水的前大学教授和擅长伪造文物的天才少女。就在他们准备动手时，一支神秘的国外雇佣兵闯入，目标是陵墓中的“龙血”——一种传说中能改写基因的古代细菌。为了保护国宝不被运出国境，这伙盗墓贼竟然与文物保护部门联手，在墓穴里与雇佣兵展开了一场惊心动魄的攻防战。最终他们炸毁了墓道，将“龙血”永远封存在地下。", "one_line": "一群由盗墓贼、风水师和黑市商贩组成的杂牌军，联手对抗企图利用古墓秘密掌控世界的跨国财阀。", "bucket": "crime"}, {"id": "1356", "title": "缩小人", "filename": "m1356.html", "year": "2023", "region": "美国", "genre": "科幻，喜剧，动作", "tags": "微观世界，大小互换，荒诞冒险，高科技，生存挑战", "summary": "失业工程师尼尔为了逃避现实，报名参加了科技公司的“缩小人生体验计划”，打算在微型社区躺平。谁知实验刚完成，实验室就遭到抢劫，唯一的复原装置被偷走。尼尔被遗弃在自家后院的草坪上，5厘米的身高让一根草变成了参天大树，一滴雨水成了洪水猛兽。他必须和同样被缩小的宠物蚂蚁“将军”合作，穿越蚂蚁洞穴、避开蜘蛛捕食、跨过排水沟“大峡谷”，在电池耗尽之前找到被藏在玩具屋里的复原装置。", "one_line": "一个中年废柴意外被缩小到只有5厘米高，必须在自家后院这片“原始丛林”里，带着一只蚂蚁找回复原装置。", "bucket": "sci-fi"}, {"id": "1357", "title": "金发女郎的爱情", "filename": "m1357.html", "year": "2024", "region": "意大利", "genre": "浪漫喜剧", "tags": "金发，偏见，真爱，欧洲，清新", "summary": "马蒂亚斯有严重的“金发情结”，交往过的女友全是金发尤物。某天他在酒吧遇见了“金发”学霸艾琳娜，惊为天人。两人飞速热恋，直到他第一次留宿，发现她的“金发”是假发——她其实是个因化疗掉光头发、戴着假发搞科研的女汉子。马蒂亚斯崩溃离去，却逐渐发现艾琳娜的灵魂才是真正的“金色”。他剃光自己的头发，捧着假发片去实验室道歉：“我爱的是你的发际线后退时的幽默感。”最终，两人在罗马街头举办了“光头婚礼”，成为全网最甜cp。", "one_line": "一个只爱金发女郎的男人，偏偏爱上了染金发的秃头女博士，她的假发片是最大笑点。", "bucket": "romance"}, {"id": "1358", "title": "落跑人生", "filename": "m1358.html", "year": "2025", "region": "美国", "genre": "剧情 / 冒险", "tags": "逃亡, 公路, 自我救赎, 治愈, 成长", "summary": "华尔街精英亚瑟挪用客户资金投资失败，面临20年监禁。在FBI上门前，他带着一个装了500万现金的行李箱逃跑了。他租了一辆破车，沿着66号公路向西狂奔。在亚利桑那州的汽车旅馆，他遇到了16岁的女孩露比，露比偷了他的行李箱。亚瑟追上去，发现露比比他更需要那笔钱：她要救患癌症的弟弟，而她的父母早已去世。两人被迫结伴逃亡，路上又捡了被家暴的墨西哥单亲妈妈和退伍后流浪的黑人老兵。四个人一台车，一路躲避FBI、黑帮和露比的吸毒叔叔。每个人都有自己的秘密和罪孽。最终，在到达墨西哥边境时，亚瑟把大部分钱给了露比，自己只留了一万。他说：“我以前以为人生就是赢，现在才知道，跑掉不一定是输。”他被FBI带走时，露比隔着车窗说：“我会等你。”", "one_line": "银行高管挪用公款败露后逃亡，却在路上遇到了比自己更惨的“同行”。", "bucket": "drama"}, {"id": "1359", "title": "棚车少年：奇异岛", "filename": "m1359.html", "year": "2024", "region": "美国", "genre": "冒险、家庭、儿童", "tags": "兄妹、荒岛求生、解谜、经典改编", "summary": "改编自经典童书《棚车少年》系列。亨利、杰西、维奥莱特和本尼四兄妹在一次帆船比赛中被风暴吹到一座地图上没有的岛屿。岛上，鹦鹉会指路，海龟会算术，一只老猫头鹰自称是“岛屿记忆”。孩子们发现，这座岛原本是古代玛雅人的避难所，他们用“声音魔法”让动物获得语言能力，后来因地震沉入海底，近百年才重新浮起。岛中心的金字塔里，一颗水晶球维持着魔法。但水晶球正在碎裂，一旦碎掉，动物会失去语言，岛屿会再次沉没。四兄妹必须在退潮前解开三道谜题修复水晶。最后一刻，本尼用自己最珍贵的玻璃弹珠填补了裂缝。岛屿保住了，猫头鹰说：“人类的孩子，你们才是真正的奇异之物。”", "one_line": "四个小兄妹流落奇异岛，发现岛上所有动物都会说话，而岛的中心藏着消失文明的秘密。", "bucket
