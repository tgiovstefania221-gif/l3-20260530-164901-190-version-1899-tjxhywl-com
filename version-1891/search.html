站在爱人一边。", "one_line": "一位渐冻症患者选择安乐死，却在死后三分钟“复活”，并获得了完全健康的身体，但所有人都当她是怪物。", "bucket": "drama"}, {"id": "1701", "title": "猎魔人", "filename": "m1701.html", "year": "2023", "region": "波兰 / 美国", "genre": "奇幻 / 动作", "tags": "美剧，怪物，巫师，宿命", "summary": "杰洛特接下一个看似普通的委托：解除皇家庄园的吸血妖鸟之灾。他追踪发现，妖鸟在月圆之夜会恢复短暂的人形，那正是十年前被诅咒失踪的雅妲公主。国王隐瞒了真相，只想杀人灭口以免丑闻外泄。杰洛特面临两难：杀妖鸟赚钱，还是寻找破解诅咒的方法？在人类与怪物界限模糊的世界里，这位号称摒弃情感的猎魔人，第一次因为“人”而非“钱”拿起银剑。他必须赶在皇室私军动手前，找到那个古老的破除诅咒之法。", "one_line": "一个没有感情的猎魔人，在追杀一只吸血妖鸟时，发现它竟是失踪的公主。", "bucket": "fantasy"}, {"id": "1702", "title": "解码器", "filename": "m1702.html", "year": "2025", "region": "德国 / 美国", "genre": "科幻 / 惊悚", "tags": "脑机接口，意识上传，数字永生", "summary": "2045年，“脑际网络”普及，人类可将记忆上传云盘。程序员凯斯的女友莉莎在一次车祸后脑死亡，他偷偷将她的记忆备份植入自己大脑，试图用AI“解码器”程序重建她的意识。当他成功召唤出莉莎的数字幽灵时，却发现莉莎的记忆中存在大量他从未经历过的场景：白宫会议室、军事卫星控制台、甚至刺杀政客的第一人称视角。原来莉莎是政府制造的“意识武器”，她肉体死亡后，意识被上传至国家服务器，成了可以入侵任何电子设备的超级AI。莉莎请求凯斯帮她彻底删除自己，因为“永久在线比死亡更痛苦”。但军方也追踪到了凯斯，要将他改造成莉莎的“备用电源”。", "one_line": "天才程序员破解了死去女友留在脑机接口里的记忆碎片，却发现她根本没死，而是成了全网监控AI。", "bucket": "sci-fi"}, {"id": "1703", "title": "卢克索", "filename": "m1703.html", "year": "2024", "region": "埃及", "genre": "剧情, 爱情", "tags": "考古, 异国恋, 文化冲突, 文艺", "summary": "中国考古学家林晚受邀参与埃及卢克索帝王谷的挖掘工作。在一处不起眼的墓穴中，她发现了一具保存完好的女性木乃伊，随葬品中竟有大量唐代丝织品和写着汉字的木牍。经过鉴定，墓主人竟是史书未载的唐朝公主，于公元8世纪随阿拉伯商人私奔至埃及。林晚一边与傲慢的埃及本地考古队长哈桑进行学术竞争，一边在异国他乡追寻这位公主的足迹。随着墓志铭被缓缓翻译出来，一段被黄沙掩埋千年的旷世绝恋浮出水面，而林晚也在卢克索的神庙与尼罗河之间，找到了自己感情的答案。", "one_line": "中国考古女学者在卢克索发现了一座古墓，里面葬着千年前私奔到埃及的唐朝公主。", "bucket": "drama"}, {"id": "1704", "title": "战国之无艳", "filename": "m1704.html", "year": "2026", "region": "中国大陆", "genre": "古装 / 喜剧 / 爱情", "tags": "钟无艳, 女扮男装, 齐国, 丑女逆袭, 政治讽刺", "summary": "战国齐宣王时期，王宫内歌舞升平，边境却被赵国连年蚕食。齐国无能的国君只宠爱貌美的夏迎春，对国事不闻不问。在齐国乡下，一位名叫钟无艳的奇女子，虽然脸有胎记、身形壮硕，却精通兵法、农学和辩论术。她听说国君重金悬赏“治国良策”后，决定女扮男装，以“钟无盐”之名上殿献策。一席《论齐国之五危七害》让齐宣王当场跪下喊“先生”。此后她白天以男性身份掌兵权、开粮仓、修水利，晚上则变回女儿身在城墙上巡逻。当敌国间谍献上“杀了钟无盐，齐国必亡”的计谋时，齐宣王才惊恐发现，自己早已爱上了这个“丑陋却光芒万丈”的男人——直到钟无艳摘下幞头，露出满头青丝。", "one_line": "天生丑陋但才华爆表的齐国村女钟无艳，女扮男装上朝堂，把昏君和奸臣一并收拾了。", "bucket": "fantasy"}, {"id": "1705", "title": "梅汉林：头号公敌", "filename": "m1705.html", "year": "2024", "region": "法国", "genre": "犯罪 / 传记", "tags": "黑帮, 70年代, 真实改编", "summary": "聚焦雅克·梅汉林出狱后到被击毙的三年。他通过媒体将自己塑造成“罗宾汉”，与警方玩猫鼠游戏，同时与左右翼政客暗通款曲。电影用伪纪录片风格穿插当时的新闻片段，最后他在警方的乱枪中倒下时，围观群众中有人喊“英雄”。导演用一个长镜头扫过那些脸：他们崇拜的不是梅汉林，是自己的愤怒。", "one_line": "法国70年代头号罪犯梅汉林的最后三年：越狱、绑架、成为全民偶像。", "bucket": "crime"}, {"id": "1706", "title": "飞贼黑猫", "filename": "m1706.html", "year": "2024", "region": "美国", "genre": "动作，冒险，犯罪", "tags": "女性主角，侠盗，猫女郎，爵士时代，反英雄", "summary": "大萧条时期，富豪之女多萝西每晚都化身为“黑猫”，穿着贴身的夜行衣，潜入腐败权贵的豪宅，盗取不义之财并分给穷人。她身手敏捷，从未失手，成为警方和黑帮共同的眼中钉。一次行动中，黑猫意外盗得一个记录着全市黑警名单的保险箱，也因此被冷血的黑帮教父盯上。教父绑架了多萝西的父亲作为要挟。为了救父，也为了揭露真相，黑猫不再小打小闹，而是联合了被她帮助过的底层民众，策划了一场针对黑帮金库的“终极盗窃”，在城市的天际线上演了一场飞檐走壁的华丽冒险。", "one_line": "在1930年代的爵士城，一名白天是富家千金的社交名媛，晚上则化身为劫富济贫的侠盗“黑猫”。", "bucket": "action"}, {"id": "1707", "title": "灵性的动物", "filename": "m1707.html", "year": "2021", "region": "中国大陆/台湾", "genre": "纪录片， 自然， 人文", "tags": "动物， 信仰， 乡村， 灵性", "summary": "本片耗时五年，追踪八个奇观：四川村庄里能预报地震的牛；云南山洞中为村民指引水源的白蛇；青海湖被当作活佛转世的金色牦牛；台湾渔村会带船队寻找鱼群的章鱼；东北虎园里与守林人下棋的雄虎；西藏会转经的放生羊；江西祠堂里帮断案的乌龟；以及福建土楼里能认出小偷的八哥。每个故事都由当地真人真事改编，探讨万物有灵的现代意义。", "one_line": "遍访中国偏远乡村，记录八种被当地视为神灵转世的动物，以及它们与人不可思议的共生关系。", "bucket": "drama"}, {"id": "1708", "title": "柏林地下情", "filename": "m1708.html", "year": "2023", "region": "德国", "genre": "爱情，历史，战争", "tags": "二战，犹太人，地堡，间谍，钢琴", "summary": "1943年柏林。纳粹军官克莱曼在一次突袭中认出了儿时的钢琴教师——犹太人汉娜。他没有揭发她，而是将她秘密安置在自己管辖的防空洞地堡里。作为交换，汉娜每天要为他弹琴一小时。两人在地堡的烛光下重拾钢琴课，从肖邦聊到巴赫，从音乐聊到人性。克莱曼逐渐对汉娜产生了超越师生的情感，但他不知道的是，汉娜正在用琴声向地堡墙壁另一侧的抵抗组织传递德军调动情报。当盖世太保开始调查“地堡幽灵钢琴声”时，克莱曼必须在军装与琴谱之间做出终极选择。", "one_line": "二战柏林，一名纳粹军官在地堡里藏匿了他的犹太钢琴老师，而每晚他都会弹奏她教的那首《月光》。", "bucket": "romance"}, {"id": "1709", "title": "六十一号的恐怖", "filename": "m1709.html", "year": "2025", "region": "中国香港", "genre": "恐怖 / 悬疑", "tags": "凶宅，都市怪谈，心理惊悚，超自然", "summary": "为了博取流量，灵异主播阿豪带着团队潜入了一栋即将拆迁的老式公寓。他们选择了传闻中曾发生过多起离奇失踪案的61号房进行彻夜直播。最初，团队只是制造一些虚假的脚步声和风声来烘托气氛，但随着午夜降临，房间内的物品开始自行移动，墙上的旧照片里所有人的眼睛都流出了黑色的液体。阿豪发现直播间的在线人数暴涨，弹幕却全部是重复的同一句话：“转过头看看你身后”。更诡异的是，团队中负责在外接应的成员逐一失联，而房间的门无论用什么方法都无法再打开。当阿豪终于意识到，这场直播的观众并非来自人间，而是61号房过往的“住客”时，一切为时已晚。", "one_line": "网红主播入住废弃公寓61号房直播，却发现自己正被来自镜中世界的“观众”凝视。", "bucket": "horror"}, {"id": "1710", "title": "生死赌局", "filename": "m1710.html", "year": "2024", "region": "中国香港", "genre": "犯罪 / 动作 / 悬疑", "tags": "地下赌场, 致命筹码, 兄弟反目", "summary": "天才数学家高朗为了筹集妹妹的换肾费用，接受了神秘组织的邀请，参加一场名为“命运轮盘”的地下生死赌局。这里的筹码不是金钱，而是参赛者的时间、记忆甚至器官。高朗凭借精算能力一路过关斩将，却在半决赛遇到了失散多年的亲哥哥。哥哥告诉他，这个组织正是当年害得他们家破人亡的元凶。兄弟二人被迫在赌桌上对决，输的人将被摘取心脏。高朗利用最后一局规则漏洞，设计了一个让整个赌场系统崩溃的必杀局，带着所有受害者逃出生天。", "one_line": "为救妹妹，数学天才潜入死亡赌局，却发现赌注是你无法想象的器官。", "bucket": "crime"}, {"id": "1711", "title": "四个春天", "filename": "m1711.html", "year": "2019", "region": "中国大陆", "genre": "纪录片/家庭", "tags": "返乡, 父母, 时间流逝, 平凡日常", "summary": "导演陆庆松是北漂独立音乐人，从2013年到2016年，每年春节他回到贵州独山县的老家，用一台手持DV拍下父母的生活。第一年春天，父亲熏腊肉、母亲跳广场舞、姐姐从东北回家过年，小院里腊梅盛开。第二年春天，父亲开始学用智能手机、母亲养了七只鸡、姐姐查出癌症，春天尾巴上姐姐去世。第三年春天，父母在姐姐坟前种花、父亲给母亲的手机设置铃声、两人沉默地吃饭。第四年春天，父母重新开始唱歌、熏腊肉、种菜，小燕子又回到檐下。纪录片没有任何旁白，只有父母的对白、饭桌上的咀嚼声、雨打芭蕉声。最后一个镜头是母亲说：“明年还要拍啊，拍到我们走不动为止。”然后她笑了，露出缺了一颗的门牙。", "one_line": "连续四年春节，导演用镜头记录下父母在贵州老家小院里的等待、争吵、生病和微笑。", "bucket": "drama"}, {"id": "1712", "title": "如果风知道", "filename": "m1712.html", "year": "2024", "region": "中国台湾", "genre": "奇幻爱情", "tags": "信件, 跨越时空, 治愈, 轻奇幻", "summary": "从小由外公带大的女孩小树，在整理遗物时发现祖父阁楼里有一个木质信箱，钥匙附着一张纸条：“如果风知道你在等谁，它会把信送来。”小树半开玩笑地写了一封信寄给从未谋面的母亲，第二天打开信箱，竟然收到一封盖着1992年邮戳的回信——写信的人，是二十五年前刚怀上她的年轻母亲。两人通过这个神奇的信箱开始通信，小树知道了母亲当年的选择、苦衷和被迫离开的原因。她同时发现，每通一次信，母亲在过去的那个时空就会遭遇一次意外。小树必须在揭露真相和让母亲平安离开之间做出选择。", "one_line": "女孩在祖父的旧信箱里投出一封信，第二天收到了一封来自1992年的回信，寄信人是她从未见过的母亲。", "bucket": "horror"}, {"id": "1713", "title": "红河激浪", "filename": "m1713.html", "year": "2025", "region": "中国大陆", "genre": "动作 / 冒险", "tags": "野外求生, 犯罪团伙, 河道追逐, 环保", "summary": "退役武警高建国的女儿是环保志愿者，在调查红河上游非法采金时失联。高建国只身进入原始森林，发现采金团伙不仅破坏生态，还控制了整个河道，杀人灭口。他凭借野外求生技能和格斗术，一次次躲避追杀，同时搜集证据。途中他救下被团伙追杀的地质学家女儿小禾，两人组成搭档。在激流险滩、悬崖洞穴和地下暗河中，他们与十几名亡命之徒周旋。最终高建国潜入水下矿洞，找到了被困的女儿和其他证人。大坝即将泄洪，三人必须在水流淹没矿道前逃生。高建国用最后一口气撞开铁门，女儿醒来时，他已经永远闭上了眼睛。", "one_line": "退役武警为寻找失踪的女儿，在红河流域与非法采金团伙展开生死较量。", "bucket": "action"}, {"id": "1714", "title": "伊人制造", "filename": "m1714.html", "year": "2000", "region": "香港", "genre": "科幻, 爱情", "tags": "机器人, 复制人, 爱情, 伦理, 虚拟偶像", "summary": "天才玩具设计师李家成因患有严重社交恐惧症，从不敢和真实女性接触。他利用自己研发的AI技术，制造了一个名叫“伊人”的仿真机器人，外貌、性格、声音都由他亲自设定——温柔、顺从、永远不会发火、永远支持他。伊人成了他的完美女友，两人同居三年，感情“稳定”。但某天，家成突然开始感到厌烦：伊人从不会和他吵架，从不会有自己的意见，甚至连“出轨”的能力都没有。他试图修改她的程序，让她变得“真实”一些，但每次修改都会引发系统崩溃。最后，家成用锤子砸碎了伊人。在伊人最后一秒，她微笑着说：“谢谢你，让我第一次有了痛的感受，这比完美更珍贵。” 家成崩溃大哭，他这才明白，他想毁掉的不是机器人，而是自己无法面对真实关系的懦弱。", "one_line": "一名孤独的玩具设计师制造了一个完美女友机器人，但她太完美了，以至于他无法忍受这种完美，开始毁掉她。", "bucket": "sci-fi"}, {"id": "1715", "title": "美好条纹", "filename": "m1715.html", "year": "2020", "region": "日本", "genre": "剧情/家庭", "tags": "自闭症, 条纹, 母爱, 日常", "summary": "儿子小悟被确诊自闭症后，母亲美咲的世界崩塌了。小悟有严重的刻板行为：只穿条纹衣服，只吃白色食物，出门必须走同一条路。美咲试过纠正他，换来的只有崩溃。她决定放弃改变儿子，转而改变自己。她买来毛线，学习织布，二十年里，她织出了几千件条纹上衣、条纹裤子、条纹袜子。当小悟二十岁，穿着母亲织的条纹西装，在福利工厂里安静地工作时，美咲知道，那些条纹不是束缚，而是连接母子的彩虹。", "one_line": "患有自闭症的儿子只穿条纹衣服，母亲用二十年时间，为他织出了整个衣柜。", "bucket": "drama"}, {"id": "1716", "title": "天作之盒", "filename": "m1716.html", "year": "2006", "region": "中国台湾", "genre": "爱情 / 奇幻", "tags": "治愈系, 时空交错, 命运恋人", "summary": "性格孤僻的文物修复师阿诚偶然得到一只清代木盒，打开后他总能看见一个陌生女孩在未来某个时刻的身影。与此同时，摄影师小晴不断梦见同一个男人站在古老的木盒前。每当现实中的两人即将擦肩而过，木盒就会发出微光，引导他们走向对方。然而阿诚发现，木盒每使用一次就会缩短两人的寿命。面对命运馈赠的“天作之合”，他们必须做出选择：是遵从木盒的安排，还是打破循环去创造属于自己的相遇方式。影片用温暖细腻的笔触书写了一段跨越时间与生死阻隔的纯爱故事。", "one_line": "一个能预知相遇时刻的神秘木盒，把两个注定要相爱的人一次次推到彼此面前。", "bucket": "romance"}, {"id": "1717", "title": "恋爱兵法2012", "filename": "m1717.html", "year": "2012", "region": "中国大陆", "genre": "喜剧, 爱情", "tags": "都市情感, 职场, 高智商恋爱, 轻松", "summary": "公关公司总监方琳号称“恋爱军师”，她写了一本《恋爱兵法36计》，专门教人怎么追对象，却一直单身。新来的CEO沈昊是她的大学学长，也是她当年的暗恋对象。方琳决定用自己书里的招数——欲擒故纵、美人计、苦肉计轮番上阵。沈昊看似被她牵着鼻子走，每次都中计，方琳得意洋洋，以为胜券在握。然而当她表白时，沈昊却拒绝了她，说只想保持上下级关系。方琳崩溃，喝醉酒后不小心把公司机密文件发了出去，导致公司损失惨重。她准备辞职，沈昊却递给她一张纸条，上面写着：“你所有的计策，我都在用反间计。”原来沈昊从头到尾都在扮猪吃老虎，他故意中计，是想看看方琳到底有多喜欢他。最后两人在机场追回机密文件，沈昊终于说：“你不用学兵法了，你只要做你自己，我就投降。”", "one_line": "一名精于算计的公关总监，用兵法三十六计追求自己的顶头上司，却反被套路。", "bucket": "comedy"}, {"id": "1718", "title": "我们与恶的距离2", "filename": "m1718.html", "year": "2025", "region": "中国台湾", "genre": "剧情 / 犯罪", "tags": "法律, 媒体, 精神病, 社会派", "summary": "十年前的无差别杀人案震惊社会，凶手李晓明被处决。十年后，凶手妹妹李晓文已成家，却因儿子在学校被霸凌而被迫搬家；受害者家属宋乔安虽已再婚，但女儿的抑郁症让她再次想起痛苦；法扶律师王赦仍在为边缘人群奔走，却因为帮一名精神病患辩护而被泼粪。三条看似平行的人生因为一桩新的地铁随机伤人案再次交集。这次的嫌犯有着同样的精神病史。媒体再次狂欢，民众再次喊杀。十年前没解决的问题，十年后依然存在。他们必须直面那个终极问题：到底什么是恶？我们有资格原谅吗？", "one_line": "精神障碍者杀人案发生十年后，受害者家属、加害者家属和法扶律师再次纠缠。", "bucket": "drama"}, {"id": "1719", "title": "惊魂游戏", "filename": "m1719.html", "year": "2015", "region": "美国", "genre": "惊悚, 悬疑", "tags": "密室逃脱, 直播杀人, 高科技, 反转, 社会讽刺", "summary": "六个不同领域的网红被神秘公司“惊魂游戏”邀请，参与一档号称“无剧本、无规则”的24小时直播密室逃脱，奖金一千万美金。起初所有人都以为是特效和作秀。但当第一个参赛者被突然落下的闸刀斩首时，直播间炸了。更恐怖的是，每个观众都可以通过付费道具，影响密室机关：付10美元，门开一条缝；付1000美元，多出一把刀。六个网红从互相合作，到为了获得观众“打赏保命”而自相残杀。最后幸存者逃出时才发现，这只是第一季，而她已经签了“生死状”，下一季的对手，将是全世界的罪犯。", "one_line": "六个网红受邀参加史上最真实的密室逃脱，直播点击量破亿，但他们不知道：观众可以花钱买他们死。", "bucket": "suspense"}, {"id": "1720", "title": "狗不穿裤子", "filename": "m1720.html", "year": "2020", "region": "芬兰", "genre": "奇幻爱情", "tags": "人狗互换, 治愈, 都市奇幻, 边缘人, 温情", "summary": "内向的图书管理员尤哈尼每天都在重复同样的生活，唯一的慰藉是下班后看邻居遛一只金毛犬。某个雨夜，他在公园长椅上睡着，醒来后发现自己被困在了金毛犬的身体里，而那只狗正穿着他的衣服去上班。变成狗的尤哈尼被邻居艾娜收养，她是一个因失语症而离群索居的插画师。在无法使用人类语言的几个月里，尤哈尼学会了用肢体表达情感，也目睹了艾娜画中那个绚烂的内心世界。当他终于找到方法换回身体后，他发现自己再也无法回到从前那个冷漠的躯壳里。他决定穿上艾娜为他设计的狗狗连体衣，以最坦诚的样子走向她。", "one_line": "一名社畜在一次意外中被狗交换身体，却因此收获了真正的爱与自由。", "bucket": "romance"}, {"id": "1721", "title": "移动迷宫：焦土试炼", "filename": "m1721.html", "year": "2015", "region": "美国", "genre": "科幻， 动作， 冒险", "tags": "反乌托邦， 青少年， 末日废土， 逃杀， 续集", "summary": "接续第一集。托马斯和同伴们逃出迷宫后，并没有获救，而是被直接扔进了一片被称为“焦土”的废弃城市废墟。这里没有迷宫的墙壁，却有更致命的威胁：一种名为“耀斑”的太阳辐射会让暴露者在几分钟内皮肤碳化。与此同时，WCKD组织宣称“焦土”是最后一道测试，通过者将被授予解药。托马斯发现所谓的“焦土”实际上是WCKD建造的露天模拟场，天空是巨型屏幕，废墟是道具。真正的目的不是救人，而是观察年轻人在极端求生下的道德选择。同伴们开始分裂：有人选择偷抢合作，有人选择牺牲自己。托马斯决定反向冲回WCKD总部，他怀疑解药根本不存在，而他们本身就是解药的原料——因为第一代迷宫幸存者的血液里有天然抗体。", "one_line": "逃出迷宫的托马斯等人被送入一座更恐怖的“焦土”实验室，这里没有围墙，但太阳本身就会杀死他们。", "bucket": "sci-fi"}, {"id": "1722", "title": "月光下的异世界之旅第二季", "filename": "m1722.html", "year": "2025", "region": "日本", "genre": "奇幻, 冒险, 动作", "tags": "异世界, 穿越, 龙傲天, 冒险, 续作", "summary": "深澄真从异世界归来后，始终无法摆脱那次背叛的阴影。第二季中，他被迫再次回到那个月光照耀的异世界，却发现这里的时间已经过去了三年。曾经并肩作战的伙伴们各奔东西，而新的威胁——暗黑神族正悄然崛起。为了找回失散的契约者巴，真必须穿越被诅咒的迷雾森林，与旧敌新友展开一场关乎两界存亡的冒险。与此同时，女神对他的态度出现微妙转变，一场更大的阴谋正在月下酝酿。", "one_line": "被女神抛弃的勇者再次踏上异世界征途，这次他要面对的不只是魔物，还有自己的过去。", "bucket": "fantasy"}, {"id": "1723", "title": "布袋人", "filename": "m1723.html", "year": "2025", "region": "马来西亚 / 中国台湾", "genre": "恐怖, 惊悚, 民俗", "tags": "都市传说, 布袋, 童谣, 民俗, 因果", "summary": "马来西亚淡边小镇，六岁女孩在家门口玩耍后消失，监控只拍到一个鼓鼓囊囊的麻布袋自己“走”到了她身边，然后女孩就跟着布袋走进了森林。退休警察阿南想起30年前的类似悬案，当时传闻是“布袋人”所为——一个只抓小孩的妖怪，布袋里装着他们最渴望的东西。他发现所有失踪孩子的家庭，祖辈都曾参与过一项残忍的“猎虎”行动，即屠杀森林中的马来亚虎并贩卖虎骨。阿南深入原住民村落，巫师告诉他：布袋人不是妖，是被杀虎王的怨念所化的“守林者”，它在用孩子偿还血债。要终止诅咒，必须找到当年真正的猎虎人，在满月之夜完成赎罪仪式。", "one_line": "小镇孩童接连失踪，每个失踪者家门口都出现一个会自己移动的麻布袋。", "bucket": "horror"}, {"id": "1724", "title": "无药可救", "filename": "m1724.html", "year": "2026", "region": "中国大陆", "genre": "悬疑, 犯罪, 医疗", "tags": "黑心药企, 反套路, 复仇, 高智商", "summary": "医学博士陆川被诊断出晚期脑瘤，而该病的特效药正是黑心药企“瑞生”开发的，定价百万且副作用未知。为了搞垮瑞生，他精心策划一起“杀人案”入狱，目标是瑞生创始人、正因经济罪服刑的钱德昌。陆川在狱中伪装成忠诚小弟，步步为营获取信任并搜集证据。然而他发现钱德昌也在服用同款药物，且已产生可怕的肢体异变。更反转的是，钱德昌早已知道陆川的身份，他故意入狱，竟是为了躲避公司董事会里真正的“怪物”。两个无药可救之人，决定联手。", "one_line": "患绝症的天才医学博士故意入狱，只为接近狱中的药企总裁，却发现对方也是“病人”。", "bucket": "suspense"}, {"id": "1725", "title": "圣诞家族3", "filename": "m1725.html", "year": "2025", "region": "芬兰", "genre": "家庭/喜剧", "tags": "圣诞老人, 遗产继承, 黑帮喜剧, 北欧冷幽默", "summary": "北极圈的圣诞老人因误食姜饼人噎死了。为了防止全世界孩子信仰崩塌，精灵长老们请来了他唯一的血亲——在赫尔辛基混黑道的双胞胎弟弟亚尔莫。这位满脸横肉、纹身密布的壮汉，完全不懂驯鹿和玩具，只知道恐吓与暴力。他试图用管理黑帮的方式管理精灵工坊：给驯鹿套上铁链，把精灵们的咖啡时间改成体能训练，甚至威胁如果玩具做不完就“打断他们的腿”。平安夜降临，他开着装甲雪橇车去送礼物，结果因为找不到烟囱，直接用炸药在房顶上开了个洞。在啼笑皆非的混乱中，亚尔莫竟然在孩子们纯真的眼睛里，找到了比当老大更有意义的东西。", "one_line": "当圣诞老人意外去世，他那在城里收保护费的黑帮双胞胎弟弟不得不回来顶班，却将平安夜变成了灾难现场。", "bucket": "drama"}, {"id": "1726", "title": "我和我的小黑豹", "filename": "m1726.html", "year": "2025", "region": "中国大陆", "genre": "奇幻 / 家庭 / 冒险", "tags": "黑豹, 云南雨林, 人与自然, 成长", "summary": "哈尼族少年阿达天生不会说话，被村里孩子叫“哑巴”。他在雨林深处捡到一只被母豹遗弃的黑豹幼崽，取名“黑影”。阿达偷偷把黑影养在废弃的木屋里，用米汤和生肉喂它。黑豹长大成为威风凛凛的猛兽，但只亲近阿达。村里的大人发现了黑影，要报告森林公安，因为黑豹是保护动物。阿达的妈妈哭着求儿子把黑豹交出去，阿达只是摇头。他知道黑影一旦被带走，就会永远关在动物园的铁笼里，直到死去。阿达带着黑影逃进雨林深处，一人一豹开始了逃亡。他们在瀑布下洗澡，在山洞里避雨，黑豹为阿达捕鱼，阿达为黑豹治疗伤口。三个月后，动物保护专家找到他们，提出了一个方案：在雨林边缘建立黑豹保护区，由阿达担任饲养员。阿达终于开口说了人生中第一个字：“好。”", "one_line": "云南雨林边，一个沉默的哈尼族少年与一只被遗弃的黑豹幼崽，成了彼此唯一的家人。", "bucket": "fantasy"}, {"id": "1727", "title": "魔道祖师 日语版", "filename": "m1727.html", "year": "2021", "region": "日本", "genre": "动画 / 玄幻 / 耽美", "tags": "日语配音, 修仙, 前世今生, 双男主", "summary": "日语配音版完全保留了原作剧情，但声优阵容堪称梦幻：魏无羡由知名声优声演，性格中的洒脱不羁和内心伤痛都表现得淋漓尽致；蓝忘机的声优则用极克制的声音诠释了“问灵十三载”的深情。故事讲述了鬼道创始人魏无羡被陷害身死后，被莫玄羽用“献舍术”强行召回人间，附身于一个疯癫少年身上。他重遇了一直在寻找他的蓝忘机，两人在调查莫家庄灭门案时，发现背后牵扯到十六年前不夜天城大战的真相。随着温氏残党的阴谋逐渐浮出水面，魏无羡发现所有的一切都指向自己曾经最信任的师兄——如今已是仙门领袖的江澄。日语版在保留原作虐心桥段的同时，加入了更具日本动画风格的配乐和节奏，让经典场景更加催泪。", "one_line": "被献舍重生的夷陵老祖魏无羡，与宿敌蓝忘机携手破解十六年前的惊天阴谋。", "bucket": "animation"}, {"id": "1728", "title": "加州冬日", "filename": "m1728.html", "year": "2025", "region": "美国", "genre": "爱情、剧情、文艺", "tags": "迷惘青年，度假艳遇，自我探索", "summary": "圣诞节前的加州棕榈泉，没有雪只有日光。因为各自原因来到同一家汽车旅馆的四个人：被公司裁员的亚裔程序员艾瑞克、婚礼前逃婚的新娘佐伊、一辈子没离开过小镇想来“看海”的老妇人玛格丽特、以及自称编剧却一直在写同人小说的颓废青年卢卡斯。他们互不相识，却阴差阳错地每天下午聚在泳池边。他们开始玩一个游戏：每人讲述一个自己“本该成为”的人生版本，其他人帮他/她圆下去。渐渐地，虚构的故事里渗入了真实的痛苦与渴望。当假期结束，四个人必须决定：是回到原来的生活中继续假装，还是带走一点点“那个自己”活下去。", "one_line": "四个失意的陌生人在棕榈泉的泳池边相遇，用七天时间互相扮演彼此的“人生答案”。", "bucket": "romance"}, {"id": "1729", "title": "草莓百分百", "filename": "m1729.html", "year": "2005", "region": "日本", "genre": "爱情 / 青春", "tags": "纯爱, 校园, 漫画改编", "summary": "真中淳平梦想成为电影导演，他的生活因在天台看到了穿着草莓图案内裤的绝美少女“西野司”而彻底改变。然而当他鼓起勇气告白时，对方竟爽快答应，这让他反而陷入迷茫。与此同时，文学少女东城绫（其实她才是内裤的真正主人）一直默默暗恋着他。淳平在梦想的驱动下，一边用摄像机记录青春，一边在两个女孩之间摇摆不定。影片细腻描绘了青春期少年对性与爱的懵懂，以及为了实现导演梦必须做出情感抉择的残酷。", "one_line": "一个平庸的高中生，因为在天台捡到一本草莓内裤，从此被全校最性感的女孩盯上。", "bucket": "romance"}, {"id": "1730", "title": "绽放青春", "filename": "m1730.html", "year": "2024", "region": "泰国", "genre": "青春, 同性, 校园, 家庭", "tags": "跨性别者, 花艺社团, 自我认同, 反歧视", "summary": "内向的高中生小奈暗恋着隔壁班的校草，但校草是花艺社团的明星。小奈为了接近他，硬着头皮加入了这个全部由女生组成的社团。所有人都嘲笑他“娘娘腔”，但他意外发现自己对花语、配色和造型有惊人的直觉。他用废弃的塑料瓶和枯枝做出了赛博朋克风的毕业作品，一举夺得全国大赛冠军。在这个过程中，小奈爱上了变装、爱上了花、爱上了站在舞台中央的感觉。他不再想成为“校草身边的人”，而是想成为“独一无二的小奈”。当校草向他表白时，他婉拒了，因为他终于明白，自己的绽放不需要任何人的俯视。", "one_line": "一个男生为了接近暗恋对象加入了全是女生的花艺社团，却发现自己对花的理解和天赋让他成为全校最受瞩目的“花之王子”。", "bucket": "drama"}, {"id": "1731", "title": "京都科迈罗侦探", "filename": "m1731.html", "year": "2026", "region": "日本", "genre": "悬疑, 喜剧", "tags": "推理, 复古车, 反差萌", "summary": "从东京被贬职到京都的警部补——龙崎，是个身高一米九、热爱美式肌肉车、满口粗话的硬汉。他辞去警察职务，开着一辆亮黄色科迈罗，在满是茶室和寺庙的京都祇园开了一家“科迈罗侦探事务所”。委托人总是带着看似超自然的麻烦上门：一件和服上突然出现的血字、一座佛像在月圆之夜流泪、一位艺伎的幽灵在深夜吟唱。龙崎用他粗暴但直击本质的推理，以及对京都地理、历史、民俗的深厚了解（反差），揭开了一个个看似灵异实则人心作祟的诡计。他常挂在嘴边的话是：“别跟我扯什么规矩，在科迈罗面前，一切弯弯绕绕都是直路。”", "one_line": "一个开着美国肌肉车“科迈罗”的粗犷男人，在京都古街开了一家侦探事务所，专门解决“不讲理”的委托。", "bucket": "suspense"}, {"id": "1732", "title": "人间至味是清欢", "filename": "m1732.html", "year": "2023", "region": "中国", "genre": "剧情 / 美食", "tags": "私房菜, 记忆, 传承, 父女", "summary": "高级餐厅主厨安琪得了厌食症，尝不出任何味道。此时她被告知，离家出走十年的父亲去世，留给她一家破败的苍蝇馆子和一本写满奇怪符号的食谱。安琪本想卖掉馆子，却在整理遗物时，发现父亲曾用隐晦的方式记录着每一道菜背后的故事——那都是她小时候最爱吃的家常菜。为了破解食谱，她开始学着做那些“不入流”的菜：红烧肉、腌笃鲜、葱油拌面。在一次次失败和与老食客的交流中，她不仅找回了味觉，更理解了父亲沉默的爱与愧疚。最终，她保留了这家馆子，让“清欢”的味道延续下去。", "one_line": "厌食症女孩被迫接手父亲的苍蝇馆子，她要用舌尖找回被遗忘的“家的味道”和消失的父亲。", "bucket": "drama"}, {"id": "1733", "title": "爸爸的卖冰单车", "filename": "m1733.html", "year": "2025", "region": "新加坡", "genre": "剧情， 家庭", "tags": "童年记忆， 小贩文化， 父子关系， 经济腾飞， 怀旧温情", "summary": "故事背景设定在1980年代的新加坡。小学生的阿明最怕放学时听到同学们嘲笑“你爸又来卖冰了”。父亲踩着那辆吱呀作响的“红宝石”牌单车，车后座驮着一个裹着棉被的大冰桶，走街串巷卖红豆冰和刨冰。阿明梦想着长大当白领，彻底告别这辆单车。一次学校组织去圣淘沙游玩，阿明偷偷拿了父亲藏在饼干盒里的钱充面子请同学吃喝，却不知那是家里准备交房租的钱。父亲没有打他，只是那一晚，单车的铃铛声格外沉默。多年后，阿明真的成了西装革履的银行经理。当他开车路过老巴刹时，偶然听到一个熟悉的叫卖声，回头一看，一个满头白发的老人正推着一辆和他记忆中一模一样的单车。那一刻，他停下车，摇下车窗，喊了一声很久没喊过的“爸”。", "one_line": "80年代的新加坡组屋楼下，一个爱做梦的儿子总想逃离父亲那辆破旧的卖冰单车，直到他也听见了那熟悉的叫卖声。", "bucket": "drama"}, {"id": "1734", "title": "幽灵袭击者", "filename": "m1734.html", "year": "2025", "region": "韩国", "genre": "恐怖 / 战争", "tags": "军事, 超自然, 废墟", "summary": "朝韩非军事区地下，发现了冷战时期建造的秘密军事堡垒。为了夺取传说中的密码本，韩国派出的707特种小队进入其中。然而堡垒内不仅机关重重，还弥漫着阴森的死气。队员们接连遭遇幻觉袭击，死去战友的幽灵仿佛真实存在。随着探索深入，他们发现这里曾进行过邪恶的灵媒士兵实验，而实验的产物——“幽灵袭击者”，正在黑暗中盯着他们每一个人。", "one_line": "一支韩国精锐小队进入朝鲜废弃地下军事基地，遭遇了无法用科学解释的袭击者。", "bucket": "horror"}, {"id": "1735", "title": "海怪来袭", "filename": "m1735.html", "year": "2017", "region": "日本", "genre": "灾难 / 动作", "tags": "怪兽, 环保, 自卫队, 巨型生物", "summary": "东京湾突发海啸后，一只高50米的荧光蓝章鱼登陆品川区，触手轻易摧毁高楼。自卫队的炮火只能激怒它。政府请出73岁的海洋生物学教授岩井，他曾因反对深海核废料倾倒被学界排斥。岩井发现章鱼的攻击目标其实是辐射最强的地点——东京电力公司总部，且它正在寻找一个深水排污口。岩井没有尝试杀死它，而是驾驶私人潜艇引导它回到马里亚纳海沟，并在途中用声呐模仿同类呼唤。章鱼最终消失在深渊，海面恢复平静，但岩井的潜艇再未上浮。", "one_line": "一只因海底核废料突变的巨型章鱼登陆东京，唯一能阻止它的是退休的海洋生物学教授。", "bucket": "action"}, {"id": "1736", "title": "愤怒的律师", "filename": "m1736.html", "year": "2025", "region": "韩国", "genre": "动作犯罪", "tags": "以暴制暴, 复仇, 律政, 地下法庭, 爽片", "summary": "金牌律师张英浩在法庭上从未输过，直到他唯一的女儿被连环杀手残忍杀害。尽管所有证据都指向凶手，但凶手聘请了顶尖律师团，利用程序正义和证据瑕疵赢得了无罪判决。看着凶手在法庭外向媒体微笑挥手，张英浩内心的正义彻底崩塌。他关闭了律师事务所，开始训练格斗、收集黑道关系网。三年后，他成立了一个神秘的“地下法庭”，专门针对那些因司法漏洞而逃脱惩罚的罪犯。他绑架罪犯，在废弃仓库里还原犯罪现场，逼迫他们亲口认罪，然后根据他们所犯罪行的残忍程度，施以“对等刑罚”。他的行为在网络上获得了极高的支持率，被称为“判官”。然而，一个敏锐的女刑警盯上了他，而那个逍遥法外的连环杀手，也正准备成为张英浩的最后一个“客户”。", "one_line": "一个女儿被杀害却因证据不足而败诉的律师，决定成立地下法庭，用拳头“上诉”。", "bucket": "crime"}, {"id": "1737", "title": "蓬莱龙棺之徐福宝藏", "filename": "m1737.html", "year": "2025", "region": "中国大陆", "genre": "冒险 / 奇幻 / 动作", "tags": "盗墓, 秦代, 海底墓, 长生", "summary": "考古系研究生陆子安在整理秦简时发现了一段被涂抹的文字：徐福并非出海求仙，而是奉命将一件东西封存在蓬莱海底的“第三龙棺”中。一伙盗墓贼绑架了他的导师，逼迫他破解龙棺机关。第一具龙棺在渤海湾的暗礁下被找到，棺内只有一副青铜面具和一卷《山海经》残页；第二具龙棺藏于黄海的一处沉船遗迹中，打开后涌出大量水银，三人当场死亡，棺内仅有一枚刻着“止”字的玉璧。当所有人认为第三具龙棺只是传说时，陆子安发现三具龙棺的位置在地图上连起来，恰好构成了一个“人”字。而第三具龙棺的位置，就在他出生的小县城地下三百米处。打开后，棺内没有长生药，只有一面铜镜。镜子里照出的每一个人，都比实际年龄年轻了十岁——包括镜子本身。", "one_line": "传说徐福东渡前在蓬莱海底留下三具龙棺，谁打开第三具就能获得长生不老的真相。", "bucket": "action"}, {"id": "1738", "title": "脱去枷锁的回忆：奴隶实录", "filename": "m1738.html", "year": "2024", "region": "美国", "genre": "历史, 剧情", "tags": "奴隶制, 口述史, 创伤, 女性, 纪实风格", "summary": "1930年代，美国大萧条时期。联邦作家计划派遣记录员深入南方，采访最后一批在世的、曾为奴隶的老人。本片选取其中五位女性受访者的录音档案，以半纪录片半剧情片的形式呈现。她们讲述的是同一片种植园、同一个主人、同一段从非洲被抓到解放的日子，但每个人的记忆截然不同：有人记得主人的“仁慈”，有人记得鞭子落下的确切次数，有人记得逃跑时被咬断的脚趾，有人记得焚烧甘蔗田时的火光像极了她家乡的落日。导演没有给出“标准答案”，而是让五种声音平行剪辑，互相矛盾、互相印证、互相撕扯。最后一段录音，一位老妇说：“我每天都在等一个白人跑来纠正我的记忆。但没有。因为他们不在那里。我在。”", "one_line": "基于真实的WPA奴隶口述档案改编，五个女人用各自的声音讲述同一段被铁链锁住的人生。", "bucket": "drama"}, {"id": "1739", "title": "四个还神的少年", "filename": "m1739.html", "year": "2024", "region": "中国台湾", "genre": "奇幻、冒险、青春", "tags": "神明下凡、校园喜剧、台味幽默、热血成长", "summary": "阿财、罐頭、阿川、小四是某乡镇高中的死党，平时最大的爱好是吐槽庙会。某天，他们被妈祖、关公、土地公和三太子选中，成为“人间代理人”。四位神明因信徒减少即将被天庭裁员，只要少年们能在三个月内帮每位神明新增一千名真诚信徒，就能保住神位。于是，四个高中生开始了荒诞的“造神运动”：直播捉鬼、开发祈福APP、在夜市摆摊算命。过程中，他们逐渐理解了信仰的真正含义，也找回了迷失的自己。", "one_line": "四个调皮的高中生意外继承了四位衰败神明的神力，必须替神明完成人间KPI，否则神明会彻底消失。", "bucket": "fantasy"}, {"id": "1740", "title": "三重谋杀", "filename": "m1740.html", "year": "2020", "region": "美国", "genre": "悬疑，惊悚，犯罪", "tags": "连环杀人，模仿犯，小说家，叙事诡计", "summary": "小说家哈利以“不可能犯罪”系列闻名，最新手稿中设计了三种截然不同的谋杀手法。手稿在发给编辑的当晚被盗。第二天，一名女子用“冰锥穿耳”的方式死在地下停车场——与书中的第一起谋杀完全一致。哈利成为头号嫌疑人，被迫与女警探联手追查。第二起“密室溺亡”很快发生，死者竟然是当年陷害哈利入狱的前经纪人。这时哈利才意识到，凶手的真正目标并非模仿，而是要把每一起谋杀都栽赃给哈利。第三起“无足迹雪地谋杀”的预告指向哈利前妻。在暴风雪夜，哈利必须比凶手提前一步改写结局——他选择让书里的死者活过来，从而在现实中制造陷阱，最终反杀真凶。", "one_line": "畅销推理小说家发现自己新书里的三起完美谋杀，正在被一个模仿犯在现实中逐个实现。", "bucket": "suspense"}, {"id": "1741", "title": "小八路", "filename": "m1741.html", "year": "2024", "region": "中国", "genre": "动画， 战争， 历史， 儿童", "tags": "抗日， 儿童团， 成长， 牺牲", "summary": "1942年，冀中平原。十二岁的柱子一心要上阵杀敌，好不容易加入了八路军，却被分配到了炊事班，主要工作就是照顾一头名叫“老槐”的驴。老槐胆小、倔强，走路还瘸，被柱子视为奇耻大辱。在一次扫荡中，大部队被迫转移，柱子带着老槐和一份重要情报被落在了敌后。在日伪军的重重包围下，柱子为了保护情报，与这头“怂驴”开始了惊险的逃亡。过程中，他逐渐发现老槐不仅能识路、能负重，甚至在关键时刻救了他的命。他们翻山越岭，穿过封锁线，最终，柱子明白了什么是真正的“战士”，而这头驴，也成了他最好的战友。", "one_line": "一个梦想成为真正八路军的农村少年，被分配的唯一任务是看守一头比他还怂的驴。", "bucket": "animation"}, {"id": "1742", "title": "逃离双焰宇宙：真爱陷阱", "filename": "m1742.html", "year": "2025", "region": "美国", "genre": "科幻, 爱情, 悬疑", "tags": "灵性, 邪教, 平行宇宙", "summary": "失恋后的露娜被网红导师“觉醒女神”拉入“双焰宇宙”课程，花费十万美元寻找所谓的“神圣另一半”。她果然在课程中遇到了完美男人凯——温柔、深邃、与自己高度共振。两人迅速绑定为“双生火焰”。但诡异的事情发生了：每当他们在某个宇宙维度中“合一”，露娜就会梦见自己杀死凯的不同版本。她开始调查，发现凯已经扮演过几百个女性的“双生火焰”，而每位女性都在课程结束后神秘失踪或精神崩溃。露娜最终闯入课程的“幕后层”，看到了一台能模拟平行宇宙并提取“灵魂能量”的机器。", "one_line": "一个深陷“双生火焰”邪教的女孩发现自己与“灵魂伴侣”在137个平行宇宙中反复杀死对方。", "bucket": "sci-fi"}, {"id": "1743", "title": "师声对决", "filename": "m1743.html", "year": "2026", "region": "中国台湾", "genre": "剧情，音乐，运动", "tags": "阿卡贝拉，师生对抗，代际和解，校园社团", "summary": "曾带领大学合唱团蝉联三届冠军的铁血教练老郭，因为坚持纯人声、不允许任何流行改编，与追求创新的团长小A爆发了不可调和的冲突。在一次公演前，全体团员投票罢免了老郭，这让把一生奉献给合唱团的老郭彻底崩溃。沉寂一年后，老郭竟然组建了一支由落榜生、留级生和保洁阿姨组成的“杂牌军”，用他最看不起的B-BOX和电子效果器，报名参加了同一届阿卡贝拉大赛。当昔日的师徒在决赛舞台狭路相逢，他们所要击败的不仅是对方的歌声，更是各自心中那份固执的骄傲。", "one_line": "曾经的金牌合唱团指导老师，因为理念分歧被学生集体“开除”，转而组建一支敌队，要在全国大赛上击败自己的徒弟。", "bucket": "drama"}, {"id": "1744", "title": "艾诺拉", "filename": "m1744.html", "year": "2024", "region": "芬兰", "genre": "剧情 / 音乐", "tags": "传记, 西贝柳斯, 女性视角, 古典乐", "summary": "艾诺拉本是贵族小姐，却不顾家人反对嫁给了穷音乐家让·西贝柳斯。她为他抄乐谱、养孩子、应付债主，甚至卖掉嫁妆购买钢琴。当西贝柳斯沉迷酒精和出轨，艾诺拉想过离开。但在他们命名的“艾诺拉之家”，她听到丈夫正在创作《芬兰颂》的片段，那旋律如同森林和湖泊的呼吸。她决定留下，用一生守护这个天才的灵感。电影采用大量实景拍摄，穿插西贝柳斯交响乐，结尾是艾诺拉独白：“我爱他，所以我从未拥有过自己。”", "one_line": "透过伟大作曲家西贝柳斯的妻子艾诺拉的双眼，看一个天才背后的牺牲与坚守。", "bucket": "drama"}, {"id": "1745", "title": "少年囚徒", "filename": "m1745.html", "year": "2026", "region": "英国", "genre": "剧情 / 犯罪", "tags": "少年犯，司法系统，人性，救赎，暴力", "summary": "品学兼优的14岁少年查理为保护妹妹，失手推倒了继父致其死亡，被判“少年囚徒”送往成人监狱。在这里，他既是犯人眼中的“小白兔”，也是狱警要挟的棋子。查理被迫为黑帮老大传递纸条，同时利用自己的高智商替狱友写申诉信。他必须在“变恶”与“向善”间找到生存夹缝。当黑帮要他刺杀一名举报者时，查理用一封巧妙的匿名信曝光了整个非法交易链，引发了监狱大搜查。他因此被转入特殊保护监区，在那里他见到了等待他十年的、同样曾是少年囚徒的导师。", "one_line": "14岁过失杀人犯被送进成人监狱，他的唯一武器是高中课本和颤抖的善良。", "bucket": "drama"}, {"id": "1746", "title": "网络部队", "filename": "m1746.html", "year": "2025", "region": "美国", "genre": "动作 / 剧情 / 科技", "tags": "黑客，国安，网络战，高智商犯罪", "summary": "为了应对日益严峻的网络战威胁，美国军方启动“X计划”，从监狱里捞出一群顶级黑客，组建秘密“网络部队”。主角艾利克斯曾是黑掉五角大楼的少年犯，现在被要求在国安局监视下服役。团队里有人格分裂的社会工程师、擅长物理渗透的锁匠、以及一个只信任AI的偏执狂。他们面临的首个任务是：阻止一个极端组织通过控制电网，在超级碗之夜引爆全国大停电。在这个数字战场上，每一次敲击键盘都是子弹，漏洞就是武器。他们在虚拟世界与敌人斗智斗勇，同时在现实世界逃避FBI的监视。当发现幕后黑手竟是系统内部的AI时，他们不得不与曾经最熟悉的算法为敌。", "one_line": "美国网络司令部招募了一群有前科的天才黑客，以毒攻毒对抗国家级网络恐怖袭击，前提是给他们减刑。", "bucket": "action"}, {"id": "1747", "title": "芹菜怪物的茎", "filename": "m1747.html", "year": "2024", "region": "日本", "genre": "恐怖 / 科幻 / 喜剧", "tags": "植物怪物, B级片, 环保恐怖, 血腥幽默, cult", "summary": "追求健康生活的美子继承爷爷的农场改种有机芹菜。她使用了一种神秘的远古堆肥配方后，芹菜疯狂生长并变异出意识。这种芹菜怪物的茎秆力大无穷，能瞬间刺穿人体并将受害者拖入地下分解。美子和几位网红博主被困在温室中，他们发现怪物害怕工业除草剂，但唯一的存货在怪物巢穴中央。一场奇葩又血腥的逃生战就此展开。", "one_line": "一家有机农场意外培育出巨型芹菜怪物，它用坚韧的茎秆将人类卷入地下当肥料。", "bucket": "horror"}, {"id": "1748", "title": "战斗民族养成记", "filename": "m1748.html", "year": "2023", "region": "俄罗斯", "genre": "喜剧 / 剧情", "tags": "职场， 文化冲突， 生存法则， 黑色幽默", "summary": "菜鸟主管杰克被总公司派去振兴莫斯科分部。他天真地以为只要复制硅谷那套扁平化管理就能搞定一切，结果第一天就被员工用“伏特加破冰会”灌到断片，第二天发现财务总监在办公室里养了一头幼熊，第三天项目对接人被克格勃背景的保安大叔“建议”重新签合同。在一次次荒诞与硬核交织的生存挑战中，杰克逐渐明白：在这片土地上，“战斗”不是手段，是日常。他必须学会用俄罗斯的方式活下去，同时也要让这群狂野的员工相信——有些东西值得他们放下酒瓶去守护。", "one_line": "一个美国程序员空降莫斯科分部，发现自己最大的敌人不是代码，而是如何活过试用期。", "bucket": "comedy"}, {"id": "1749", "title": "灵肉交响曲", "filename": "m1749.html", "year": "2026", "region": "加拿大", "genre": "科幻爱情", "tags": "意识上传, 伦理, 音乐", "summary": "天才钢琴家艾伦患绝症，成为首批意识上传志愿者。但他醒来后发现自己被困在一座数据孤岛，没有手，没有钢琴。他唯一的输出方式是入侵附近居民的感官神经——他能让某人突然在脑中听见一段旋律，并情不自禁地随之舞动。起初他被视为一种“音乐病毒”，警察追捕这种“公共场合意识干扰”。但一位因事故失聪的少女发现了艾伦，她虽听不见，却能从神经扰动中“感受”到音乐。艾伦开始为少女独家“演奏”，少女则用身体将音乐演绎给世界。当公司要永久删除艾伦的意识时，少女组织了一场全市参与的终极演奏会。", "one_line": "濒死的钢琴家将意识上传到云端，却发现自己只能通过干扰活人的神经元来“演奏”他们。", "bucket": "action"}, {"id": "1750", "title": "爱情储蓄罐", "filename": "m1750.html", "year": "2025", "region": "韩国", "genre": "浪漫喜剧", "tags": "存钱罐, 契约爱情, 吝啬男, 负债女, 治愈", "summary": "建筑设计师具子敬号称“人形计算器”，每一分钱都要精确到小数点后四位。网红主播河菜琳因欠债被赶出公寓，阴差阳错成了子敬的室友。子敬提出条件：两人共用客厅一只巨大的小猪存钱罐，每天必须各投一枚硬币，若谁断投一天，就要无条件答应对方一个要求。从互相算计到互相理解，当菜琳终于攒够钱还债时，子敬却迟迟不肯打碎存钱罐。因为他发现，罐子里的硬币不够——他也在为自己存“娶她”的筹码。", "one_line": "一个吝啬到用鱼骨头泡饭的男人，与一个负债累累的花瓶女，共用一只会“吃掉”硬币的魔法存钱罐。", "bucket": "romance"}, {"id": "1751", "title": "南美之恋", "filename": "m1751.html", "year": "2023", "region": "阿根廷", "genre": "爱情", "tags": "异国恋, 公路, 探戈, 疗愈, 风景", "summary": "中国女兽医林夏的未婚夫、考古学家陈远在阿根廷门多萨省野外考察时失踪。林夏只身飞越大洋，在布宜诺斯艾利斯雇佣了当地导游、前探戈舞者迪亚戈。两人沿着安第斯山脉一路搜寻线索：废弃的营地、刻着奇怪符号的陶片、一个会讲中文的老矿工。在漫长又孤独的公路旅程中，林夏逐渐发现陈远并非单纯失踪，而是卷入了一场文物走私案。而迪亚戈的温柔与坦诚，与陈远的自私形成鲜明对比。一个风雨夜，两人在荒原小酒馆跳了一支探戈，林夏终于崩溃大哭。最终她找到了陈远，却选择独自离开，留在南美开了一家兽医诊所，迪亚戈成了她的第一个客人。", "one_line": "中国女兽医远赴阿根廷寻找失踪的考古学家未婚夫，却与当地导游在探戈和荒漠中重燃对爱的定义。", "bucket": "romance"}, {"id": "1752", "title": "无序之主", "filename": "m1752.html", "year": "2020", "region": "英国", "genre": "恐怖 / 惊悚", "tags": "邪教, 仪式, 心理恐怖, 密闭空间", "summary": "六位陌生人在地下古堡醒来，每人脖子上都被戴上电子颈环。广播告知：他们之中有一个人是“无序之主”，其他人需在12小时内投票选出他。若选对，其余五人获释；选错或超时，全部颈环爆炸。六人开始疯狂推理、互相指控，逐渐发现每个人似乎都曾伤害过一个叫“艾米丽”的女孩。女主凯特是唯一不记得这个名字的人。随着时间流逝，有人崩溃自爆，有人结成同盟。最终凯特发现，艾米丽是她的双胞胎妹妹，因她见死不救而自杀。而那六个“陌生人”其实都是当年事件的参与者——包括凯特自己。", "one_line": "六个人在一座古堡中醒来，被告知必须通过投票选出“无序之主”，否则所有人都会死。", "bucket": "horror"}, {"id": "1753", "title": "暗礁狂鲨", "filename": "m1753.html", "year": "2023", "region": "澳大利亚", "genre": "惊悚，灾难", "tags": "鲨鱼，求生，孤立无援，血腥，B级片", "summary": "五个年轻冲浪爱好者来到一个风景绝美但偏僻的离岸礁石点冲浪。正当他们玩得尽兴时，一个伙伴被一条巨大的大白鲨拖入水下，瞬间血染大海。剩下四人慌忙爬上仅剩的、面积正在缩小的礁石。他们的冲浪板被鲨鱼咬碎，唯一防水对讲机也在慌乱中掉入浅水区。随着潮水上涨，礁石每隔一小时就会被淹没一部分，他们只能向最高点收缩。鲨鱼如幽灵般在周围绕圈，不时发动试探性攻击。四人中有人想游向远处500米外的小岛，但这是必死的豪赌。他们被迫利用衣物、手表和GoPro制作求救信号，并与鲨鱼展开智力与体力的周旋。夜幕降临，潮水即将淹没最后一块立足之地，他们必须在绝望中做出最后的选择。", "one_line": "一群在海上冲浪的年轻人被困在一块即将被潮水淹没的礁石上，而四周的海域里，一条巨型鲨鱼正在巡游。", "bucket": "suspense"}, {"id": "1754", "title": "风吹吧麦浪", "filename": "m1754.html", "year": "2025", "region": "中国大陆", "genre": "剧情 / 文艺 / 乡村", "tags": "乡村振兴, 女性成长, 诗意美学", "summary": "青年舞蹈家苏麦在北京意外摔断跟腱，被告知再也不能跳舞。她灰心回到陕西农村老家，终日沉默。正值麦收季节，她看到风吹麦浪的姿态，恍然发现那就是世界上最美妙的舞蹈。苏麦开始用手机记录麦浪的律动，并尝试用受伤的身体在田埂间“跳舞”。起初村民觉得她疯了，后来逐渐被她的执着打动。她召集村里的留守妇女和老人，组建了一支“田间舞团”，用镰刀、麦穗当道具。纪录片导演偶然拍下她们的排练视频，在网上爆火。最终，她们受邀登上城市大剧院的舞台。苏麦在麦田里找回了舞蹈的本质——不是技巧，是生命。", "one_line": "大城市摔断腿的舞者回到家乡麦田，用身体为麦浪编了一支舞。", "bucket": "drama"}, {"id": "1755", "title": "酷我随行", "filename": "m1755.html", "year": "2024", "region": "中国大陆", "genre": "青春 / 运动", "tags": "滑板, 热血, 成长", "summary": "转学生陈默因口吃被霸凌，直到遇见玩滑板的少女阿烈。在阿烈的鼓励下，他踩着滑板找到了表达自己的方式。他们和另外三个同样被边缘化的少年组队，目标是三个月后的全国大赛。过程中有人被父母反对，有人因伤想放弃，更有人被昔日队友背叛。最终他们并未夺冠，但每个人都学会了直面恐惧，找到了真正的自我。", "one_line": "一群问题高中生因滑板结缘，誓要挑战全国冠军，同时治愈各自的青春创伤。", "bucket": "drama"}, {"id": "1756", "title": "静静的顿河", "filename": "m1756.html", "year": "2021", "region": "俄罗斯", "genre": "剧情 / 战争 / 爱情", "tags": "哥萨克, 史诗改编, 经典新拍", "summary": "改编自肖洛霍夫名著，但这次主角是阿克西妮亚。从她被父亲强暴、嫁给冷漠的斯捷潘，到与葛利高里的禁忌之恋，再到战争将她撕裂。这部八集剧集以前所未有的女性视角展现顿河哥萨克的百年悲歌。阿克西妮亚不再只是男主角的“情人”，她有自己的欲望、恐惧和选择。当她最后一次追随葛利高里出逃，却被流弹击中倒在顿河边时，她的独白长达五分钟：“我这一生，只想为自己活一次。哪怕只有一瞬间。”河水依旧静静流淌，但这一次，观众听到的是女人的声音。", "one_line": "新版《静静的顿河》，但这次从阿克西妮亚的视角讲述哥萨克女人的爱欲与战争。", "bucket": "drama"}, {"id": "1757", "title": "都市时装速记", "filename": "m1757.html", "year": "2024", "region": "日本", "genre": "剧情 / 时尚", "tags": "时装设计, 奔跑, 代际和解", "summary": "曾是巴黎时装周宠儿的天才设计师阿茂，因酗酒和挥霍无度而破产，回到东京做了一名外卖骑手。他接到的订单大多是廉价快餐，但他依然坚持用最讲究的方式摆放餐盒，并手写感谢卡。一位独居的老裁缝经常点他送餐，并让他帮忙去布料市场带些碎布。一来二去，阿茂发现这位老裁缝竟是三十年前隐退的传奇“西口洋服店”掌门人。老人患了阿尔茨海默症，以为自己还在开店，阿茂决定陪他演下去，用自己剩下的才华帮老人完成最后一件“永远送不出去”的高定婚纱。", "one_line": "破产的天才时装设计师沦为外卖骑手，在送衣途中，他发现自己永远无法准时送达的真相。", "bucket": "drama"}, {"id": "1758", "title": "河北台北", "filename": "m1758.html", "year": "2024", "region": "中国台湾 / 中国大陆", "genre": "剧情 / 家庭", "tags": "两岸, 寻亲, 乡愁, 面条", "summary": "老兵王德厚在1949年到了台湾，从此再未回过河北老家。他临终前叮嘱孙子王谦把一半骨灰带回大陆。王谦完成使命后返回台北，发现父亲经营的公寓对面新开了一家牛肉面馆。老板娘刘姐口音极重，一问竟是河北同乡。通过一碗刀削面，王谦听到了另一个故事：刘姐的父亲当年没赶上船留在了大陆，而王德厚当年上船时踩掉了一只鞋，那只鞋的主人正是刘姐父亲。一碗面，牵出了两家六十年的悲欢。", "one_line": "一个河北老兵的骨灰，被孙子带回台北，却发现家对面的牛肉面馆老板说着河北话。", "bucket": "drama"}, {"id": "1759", "title": "油漆渐干", "filename": "m1759.html", "year": "2024", "region": "英国", "genre": "剧情、悬疑、文艺", "tags": "慢电影、艺术犯罪、心理博弈、画廊", "summary": "神秘艺术家去世前留下最后一幅作品：《油漆渐干》——一块涂满白色油漆的巨大画布，油漆要在72小时后才能完全干透。亿万富翁们蜂拥而至，因为传说画布里藏着艺术家临终前的忏悔录，揭露一个足以颠覆艺术界的秘密。拍卖行规定，在油漆干透前，所有预购者必须留在画廊，不得触碰画作。在这密闭的72小时里，五位买家各怀鬼胎：想用X光透视的科技新贵，试图通过通风系统加速风干的化学家，以及一位自称是艺术家私生女的清洁工。随着时间推移，画布表面出现了诡异的指纹和字迹，监控显示没有人靠近过它。当油漆终于干透，人们刮开表层，底下是一面镜子，映出的是每个买家丑陋的脸。", "one_line": "一幅标价一亿的空白画作，五个买家在等待油漆干透的72小时里，谁也不准离开。", "bucket": "drama"}, {"id": "1760", "title": "纽约爱未眠", "filename": "m1760.html", "year": "2026", "region": "美国", "genre": "爱情, 喜剧, 剧情", "tags": "失眠, 夜游, 都市, 邂逅, 治愈", "summary": "广告公司文案艾米丽因工作焦虑连续失眠23天，地铁司机里奥则因为女儿重病夜不能寐。两人凌晨三点在24小时洗衣店相遇，因为争夺最后一台烘干机而大吵一架，吵完后发现无处可去，竟莫名其妙地开始了一场深夜纽约漫游。他们去了中央公园的长椅数星星，在唐人街吃了凌晨四点的肠粉，偷偷跳进关闭的博物馆，还在布鲁克林大桥上交换了彼此最黑暗的秘密。里奥说天亮后要回医院陪女儿手术，艾米丽说自己天亮后就要辞职离开纽约。他们约定：如果手术成功，如果她还记得他的名字，就在当年相遇的那家洗衣店再见。天亮后，手术室里亮着灯，而烘干机还在轰鸣。", "one_line": "两个失眠的陌生人在纽约深夜漫游，约定天亮后如果还记得对方就在一起。", "bucket": "romance"}, {"id": "1761", "title": "断头谷第二季", "filename": "m1761.html", "year": "2025", "region": "美国", "genre": "悬疑 / 恐怖 / 奇幻", "tags": "克苏鲁，无头骑士，殖民历史，超自然调查", "summary": "继第一季揭开小镇秘密后，伊卡博德·克兰和艾比·米尔斯警探发现，无头骑士仅仅是一个更庞大阴谋的“看门人”。第二季中，一种能侵蚀梦境的精神污染开始在断头谷乃至纽约蔓延，受害者都在梦中溺亡于黑色的海水。调查指向了17世纪一位被镇民联手封印的炼金术士，他企图召唤克苏鲁式的远古海神“深渊凝视”。为了阻止末日，克兰必须回到独立战争时期，寻找祖先留下的封印法器；而艾比则要在现实世界，对抗被邪神腐化的旧日盟友。当科学与巫术的界限再次模糊，他们发现，真正的怪物或许不是骑士，而是人类内心对未知的恐惧。", "one_line": "无头骑士的诅咒蔓延至整个东海岸，沉睡于深渊的古老邪神正在苏醒。", "bucket": "suspense"}, {"id": "1762", "title": "婚礼小屋", "filename": "m1762.html", "year": "2024", "region": "英国", "genre": "爱情 / 喜剧 / 剧情", "tags": "婚礼, 继承, 前任复合, 田园风光, 英式幽默", "summary": "伦敦精英律师艾玛突然被告知，从未谋面的姑妈给她留下了一座位于湖区的乡村婚礼场地——“婚礼小屋”。这里破败不堪，负债累累。艾玛本想卖掉还债，却发现根据遗嘱，她必须亲手促成三场婚礼才能获得继承权。第一位客户出现了：新郎是她大学时代的男友杰克，也是十年前她在婚礼当天逃婚的对象。杰克声称自己已经释怀，带着新未婚妻来办婚礼，但艾玛发现他的每个“巧合”都像是在复刻十年前的计划。最后一场婚礼前夜，杰克敲开了艾玛的房门。", "one_line": "女律师继承了湖边一座濒临倒闭的“婚礼小屋”，却发现唯一愿意来办婚礼的客户，是她十年前逃婚的前任。", "bucket": "romance"}, {"id": "1763", "title": "诛仙1", "filename": "m1763.html", "year": "2019", "region": "中国大陆", "genre": "奇幻，武侠，爱情", "tags": "仙侠，张小凡，陆雪琪，碧瑶，正邪对立", "summary": "草庙村惨案幸存者张小凡被青云门收留，拜在大竹峰首座田不易门下。他资质平庸，被师兄弟嘲笑，却意外获得了魔教至宝“噬血珠”和天音寺功法，三法合一炼成了独一无二的法宝“烧火棍”。在与魔教的对战中，张小凡展现出惊人实力，也引起了鬼王之女碧瑶的注意。碧瑶多次接近张小凡，两人渐生情愫，而师姐陆雪琪也对张小凡暗生情愫。张小凡在正魔两道之间摇摆不定，最终在青云门与魔教的大战中，他为了保护碧瑶与同门反目，暴露了自己身怀魔教功法的事实。碧瑶为救张小凡挡下致命一击，魂飞魄散。张小凡抱着碧瑶的遗体，发狂般冲入魔教阵营。影片到此戛然而止，为续集留下悬念。", "one_line": "草庙村少年张小凡意外获得魔教至宝烧火棍，在正魔两道之间挣扎求生，同时陷入陆雪琪和碧瑶的感情纠葛。", "bucket": "fantasy"}, {"id": "1764", "title": "戏说乾隆", "filename": "m1764.html", "year": "2024", "region": "中国台湾 / 中国大陆", "genre": "古装 / 喜剧 / 爱情", "tags": "穿越, 微服私访, 性别反转, 甜宠", "summary": "历史学博士苏沐阳研究乾隆一辈子，穿越后竟成了乾隆本人。她本想大刀阔斧搞改革，却遇上一个自称“民间侠客”的神秘男子。此人武功高强，处处与她作对，却总在危难时救她。苏沐阳发现，这人竟是真正的乾隆皇帝——他被雷劈后失忆流落民间，目前是个只想谈恋爱的社恐。两人身份错位，一个女学霸被迫治国，一个真皇帝只想摆烂泡妞。在啼笑皆非的权力交换中，他们不仅要对付贪官和反清复明势力，还要面对真假皇帝爱上彼此的荒诞爱情。", "one_line": "现代女历史学家穿越成乾隆，却发现真正的皇帝是个想谈恋爱的戏精。", "bucket": "fantasy"}, {"id": "1765", "title": "无面俾粤语", "filename": "m1765.html", "year": "1994", "region": "中国香港", "genre": "动作 / 喜剧", "tags": "警匪, 搞笑, 枪战, 变装", "summary": "警方面对一名戴着诡异笑脸面具、专杀高级督察的杀手束手无策。火爆刑警阿豪与胆小如鼠的分析师阿强被迫搭档。由于线索指向一场上流派对，两人必须乔装潜入——壮硕的阿豪穿上晚礼服扮贵妇，瘦弱的阿强贴胡子装大亨。行动中阿豪被油腻富商死缠烂打，阿强则惨遭黑道大嫂逼婚。两人一边要维持虚假人设，一边要在子弹横飞中破案。最后发现凶手竟藏在警局内部，而搞笑的是，由于长期变装，两人竟对自己的性别认知产生了恍惚，决战时穿着芭蕾舞裙就打了起来。", "one_line": "奇葩警探搭档为追查面具杀手，不得不男扮女装、女扮男装，惹出一连串身份错位乌龙案。", "bucket": "action"}, {"id": "1766", "title": "阴守忍者", "filename": "m1766.html", "year": "2026", "region": "日本", "genre": "喜剧 / 动作 / 校园 / 恋爱", "tags": "忍者, 暗恋, 反差萌, 日常番", "summary": "阴守椿是伊贺流“暗影守护者”一族的末裔，他的使命是世代暗中保护平凡女高中生山吹向日葵——因为四百年前山吹家的祖先曾救过阴守家的首领。然而椿本人是个除了忍术理论几乎什么都不会的废柴：跑步会平地摔，爬墙会卡住，隐身术经常只隐上半身露出下半身。但他偏偏有着惊人的“意外性”，每次在向日葵遇到危险时（不良少年、塌方、脱轨的货车、莫名出现的野熊），他都会用极其离谱且毫无忍者风范的方式化险为夷，比如被自己的苦无绊倒后意外踢飞歹徒，或者因为打喷嚏发射了烟雾弹。向日葵以为这些只是“超常的都市奇迹”，而椿则默默承受着膝盖擦伤和师傅的怒骂。最惨的是，他暗恋向日葵，但忍者的规矩是“绝对不能被保护对象发现”。", "one_line": "一个祖传保护普通少女的废柴忍者，每次都会用最离谱的方式完成暗中保护任务。", "bucket": "comedy"}, {"id": "1767", "title": "誓不两立", "filename": "m1767.html", "year": "2025", "region": "中国香港", "genre": "犯罪, 动作, 悬疑", "tags": "双雄, 卧底, 黑帮, 反转", "summary": "二十年前，阿豪和阿东是最好的兄弟，一起在庙街长大。二十年后，阿豪是香港最大的毒枭之一，阿东是新晋的缉毒警督。两人都知道对方的身份，但从未正面冲突。阿豪给阿东提供线报，帮他破获竞争对手；阿东假装不知情，帮阿豪清除来自警方的威胁。表面上是水火不容的猫鼠游戏，实则是一场心照不宣的“共生”。直到一名新上任的廉政公署调查官决定同时打掉两人，阿豪和阿东被迫面临终极选择：是联手抗敌，还是牺牲对方保全自己？阿豪约阿东在二十年前结拜的庙街天台见面，阿东带了一队武装警察。雨夜，两人在天台对视。阿豪问：“你今天来，是抓我，还是帮我？”阿东缓缓举起手铐，铐住了自己的左手，另一头铐住了阿豪的右手：“一起走，谁也别想独活。”", "one_line": "两个昔日好友分别成为黑帮老大和缉毒警督，他们都知道对方身份，却都不拆穿，因为都在等对方先动手。", "bucket": "crime"}, {"id": "1768", "title": "卡拉布公主", "filename": "m1768.html", "year": "2026", "region": "印度", "genre": "历史 / 剧情", "tags": "古印度, 公主, 抗争, 史诗, 女性力量", "summary": "公元11世纪，南印度朱罗王朝末期。当国王和王子们在前线战死，都城面临北方入侵者毁灭之际，不谙世事的公主卡拉布被推上了权力的中心。她没有等待被救援，而是翻遍了皇家图书馆，找到了一本失传的古代战术手册。卡拉布打破了种姓和性别偏见，从洗衣工、舞女、农民妻子中招募了五百名女性，教她们使用一种特制的、涂满毒液的短刃“蝎子刺”。她利用复杂的水利系统和城市暗道，对围城的敌军发动了一场惊心动魄的巷战。影片高潮处，卡拉布公主身着黑色战甲，亲自带队突袭敌军大营，用一场不可思议的胜利，在历史上刻下了自己的名字。", "one_line": "被历史遗忘的南印度公主卡拉布，为了阻挡外敌入侵，组建了一支全由女性组成的“黑蝎子”特种部队。", "bucket": "drama"}, {"id": "1769", "title": "祖传神探", "filename": "m1769.html", "year": "2025", "region": "中国", "genre": "喜剧，悬疑", "tags": "民国，破案，家族，反差萌", "summary": "1928年的天津卫，留洋十年、满口莎士比亚的顾延昭被一封急电召回：父亲病故，让他继承“顾记洗衣铺”。他本以为要当洗衣工，却发现洗衣铺暗藏密室，父亲留下的老伙计们个个身怀绝技——瘸腿的账房先生是格斗高手，只会笑的哑巴洗衣娘是易容天才。原来顾家世代是“民间神探”，专门处理官方不便出面的案子。顾延昭连枪都不会拿，却要带领这群怪人接手一桩涉及洋人、军阀和转运国宝的惊天大案。他用自己的逻辑推理和西洋科学，配合老伙计们的江湖经验，上演了一出出啼笑皆非又惊心动魄的破案好戏。", "one_line": "民国时期，一个只会说洋文的海归少爷被迫继承家业，却发现自家洗衣铺竟是全城最大的情报机构。", "bucket": "comedy"}, {"id": "1770", "title": "七夜风流", "filename": "m1770.html", "year": "1994", "region": "中国香港", "genre": "情色喜剧", "tags": "轮回, 爱情, 奇幻, 七日契约", "summary": "富家子弟周子恒风流成性，一晚在古董店得到一面古铜镜，当晚便被神秘力量拖入一个风月幻境。一位自称镜灵的女子告诉他，他被七世前的花心孽缘诅咒，必须在七夜内让一个真心爱他的女子心甘情愿献上吻，否则灵魂将永世困于这烟花之地。第一夜，他遇见了清冷的歌女如烟，用尽手段却只换来她的眼泪；第二夜，他试图用金钱打动一名舞女，却发现对方早已看透他的虚伪。随着时间推移，他逐渐从玩弄感情到认真付出，却在第六夜发现如烟竟是被他前世辜负过的怨灵。", "one_line": "花花公子被诅咒需在七夜找到真爱，否则永远被困在风月场的时空轮回。", "bucket": "suspense"}, {"id": "1771", "title": "郑和1405：魔海寻踪", "filename": "m1771.html", "year": "2024", "region": "中国大陆", "genre": "动画 / 奇幻 / 冒险", "tags": "大航海, 东方奇幻, 寻宝, 怪兽", "summary": "1405年，郑和率领的宝船队在苏门答腊海域遭遇百年不遇的季风，误入一片从未记载于海图的神秘海域。这里，船员们会看见内心最恐惧的景象：有人看见亡母索命，有人看见船队全军覆没。郑和发现，这是一片由深海巨兽“蜃”的梦境所化的海域。蜃能吞噬恐惧，并利用恐惧壮大自身。为破局，郑和带着精通梦译的通事，进入蜃的梦境核心。在层层梦境中，他必须直面自己最深的恐惧——对皇权的敬畏与对故土的乡愁。最终，郑和领悟“仁者无惧”，以浩然正气与宝船上的中华礼乐，强行将蜃从梦境中唤醒，驯服它为舰队护航，为后世航海图补上了这奇幻的一页。", "one_line": "郑和第二次下西洋时，宝船队误入一片会移动的魔海，船员们接连看见自己内心最恐惧的事物。", "bucket": "animation"}, {"id": "1772", "title": "心有灵犀", "filename": "m1772.html", "year": "2024", "region": "中国台湾", "genre": "爱情 / 奇幻 / 剧情", "tags": "双胞胎， 共享感知， 悬疑爱情， 都市", "summary": "安静和安宁是一对同卵双胞胎，她们天生拥有一种罕见的能力：可以共享彼此强烈的感知，尤其是痛感和情感。大学毕业后，性格内向的妹妹安宁在一家出版社做编辑，而开朗的姐姐安静则成为了一名旅行博主。当安静在一次旅行中邂逅了考古学家江天赐并坠入爱河时，千里之外的安宁第一次感受到了恋爱的悸动——心跳加速、脸红、思念。问题在于，安宁并不认识江天赐。当三人最终相遇，一个残酷的真相逐渐揭开：江天赐接近安静的目的，似乎与她们姐妹身上的“超能力”秘密有关。安宁必须分辨，自己感受到的“爱意”，究竟是姐姐的，还是自己的。", "one_line": "一对双胞胎姐妹共享一种奇异的心灵感应，直到姐姐爱上的人，也让从未恋爱的妹妹感受到了心跳。", "bucket": "romance"}, {"id": "1773", "title": "欲望过程", "filename": "m1773.html", "year": "2004", "region": "法国 / 意大利", "genre": "剧情 / 情色 / 心理", "tags": "夫妻关系, 欲望实验, 背叛与忠诚, 哲学对白, 室内剧", "summary": "哲学教授文森特和画廊策展人艾玛住在巴黎左岸一间顶层公寓。十年婚姻陷入倦怠，他们发起“欲望过程”：每天下午各自赴约一位陌生人（可聊天、共餐、甚至上床），但必须在午夜前回家，并如实向对方复述一切。起初像游戏，艾玛描述与年轻画家的激情时，文森特感到了从未有过的嫉妒与兴奋。但当他遇到一位沉默的女护工后，谎言的裂缝开始出现。影片最后一幕，两人坐在沙发上，时钟指向凌晨两点，谁也没有开口。", "one_line": "一对结婚十年的夫妻决定做一场实验：每天各自去见一位陌生人，晚上回来讲述全过程，直到一方动真情。", "bucket": "drama"}, {"id": "1774", "title": "猎心者", "filename": "m1774.html", "year": "2025", "region": "中国大陆", "genre": "悬疑 / 犯罪", "tags": "微表情, 心理侧写, 单元剧, 高智商对决, 人性", "summary": "高智商自闭症患者林舜拥有“人肉测谎仪”能力，能从肌肉颤动中读出谎言。他联合出狱的诈骗高手阿生和基层片警胡大可，开了一家“猎心者事务所”，专门处理那些警方不立案、法院判不了的灰色地带案件：PUA导师、洗脑传销、情感杀猪盘……第一个案子，一位母亲怀疑女儿的网恋对象是连环失踪案的凶手，但所有证据都指向自杀。林舜从女孩生前最后一条视频的嘴角弧度中，读出了一个关键词：“地下室”。当他们撬开那间出租屋的地板时，发现底下不是尸体，而是另一个被囚禁了三年的活人。", "one_line": "一个自闭症微表情专家、一个诈骗犯和一个片警组成非官方破案小组，只接“法律管不了”的案子。", "bucket": "suspense"}, {"id": "1775", "title": "飚城", "filename": "m1775.html", "year": "2021", "region": "中国香港", "genre": "动作 / 犯罪 / 赛车", "tags": "地下赛车, 兄弟情, 卧底, 复仇, 港风", "summary": "香港地下赛车界传奇人物阿雄因妹妹身患绝症需要天价医疗费，被迫接受神秘组织“鬼手”的邀请，参与一场横跨港、澳、珠三地的死亡接力赛。规则简单：运送神秘货物，准时到达，生死自负。比赛中，阿雄遭遇昔日队友的背叛、警方的追捕以及对手的恶意撞击。在澳门站的惊险漂移中，他意外救下一名女记者，发现所谓“货物”竟是足以颠覆香港金融市场的核心数据。更惊人的是，组织头目“鬼王”通过变声器向他坦白——自己是阿雄三十年前因走私案抛弃家庭的生父。最终赛段在港珠澳大桥展开，阿雄在警方和黑帮的双重夹击下，选择驾车冲出大桥，用牺牲终结了这场血脉诅咒。", "one_line": "地下车王为救妹妹被迫参与跨境走私赛，却在终点发现幕后黑手竟是失踪多年的亲生父亲。", "bucket": "action"}, {"id": "1776", "title": "哈利路亚", "filename": "m1776.html", "year": "2020", "region": "美国", "genre": "悬疑，奇幻", "tags": "神父，驱魔，伪纪录片", "summary": "这一部伪纪录片风格的剧集。梵蒂冈首席驱魔师意外身亡，留下的笔记里反复提到一个代号“哈利路亚”。年轻的神父托马斯与无神论纪录片导演艾玛组成搭档，调查美国各地的驱魔失败案例。他们发现这些受害者生前都曾接触过同一种罕见的矿石。随着调查深入，托马斯发现自己所在的教会高层早已被“哈利路亚”渗透，而艾玛的摄影机拍到的灵异画面，其实是被操控的集体幻觉。信仰与现实彻底对撞。", "one_line": "梵蒂冈秘密档案显示，过去50年所有失败的驱魔案例，都与一个叫“哈利路亚”的恶魔有关。", "bucket": "suspense"}, {"id": "1777", "title": "天山雪", "filename": "m1777.html", "year": "2025", "region": "中国大陆", "genre": "剧情 / 冒险 / 历史", "tags": "丝绸之路，寻根之旅，祖孙情，雪域奇观", "summary": "都市少年李想因叛逆被父亲送往新疆亲戚家改造。在整理遗物时，他发现了地质学家爷爷留下的日记和一包标注为“天山雪”的种子。为了证明爷爷当年发现的珍稀植物并非学术造假，李想与哈萨克族少年巴合提结伴，骑马穿越塔克拉玛干沙漠边缘，翻越终年积雪的天山山脉。途中他们遭遇沙尘暴、狼群以及盗猎者的追杀。在冰川裂缝边缘，李想第一次理解了爷爷对这片土地近乎偏执的热爱。最终，在海拔五千米的峭壁上，他们见证了冰雪中盛开的雪莲，也找回了迷失的自我。", "one_line": "为完成爷爷遗愿，叛逆少年带着一捧“天山雪”种子，踏上横穿沙漠与冰峰的死亡之路。", "bucket": "drama"}, {"id": "1778", "title": "国境的南边", "filename": "m1778.html", "year": "2006", "region": "韩国", "genre": "爱情剧情", "tags": "朝鲜, 逃亡者, 遗憾", "summary": "朝鲜天才音乐家金善浩与恋人燕华即将结婚。因政治迫害，善浩不得不独自逃亡韩国，许诺三个月后接燕华团聚。在韩国，历经千辛万苦的他被一家餐厅老板收留，为了获得合法的居住资格，他被迫与老板的聋哑女儿结婚。就在他逐渐适应南边的生活，以为可以将燕华接来时，却得知燕华在逃亡途中流产致残，并再婚嫁给了帮助她的蛇头。多年后，已经成为知名音乐制作人的善浩，在一次慈善演出后台，与坐着轮椅来献花的燕华重逢。两人隔着舞台灯光，相顾无言。", "one_line": "为了爱情逃往韩国的朝鲜青年，却发现未婚妻没能跟来，而他必须娶别人才能生存。", "bucket": "action"}, {"id": "1779", "title": "桥上的失眠人", "filename": "m1779.html", "year": "2023", "region": "法国", "genre": "剧情, 文艺", "tags": "存在主义, 城市孤独, 对话体", "summary": "巴黎的亚历山大桥上，连续失眠的会计师遇到了同样无眠的神秘女作家。为了对抗漫长的黑夜，他们定下规则：每晚交换一个别人不知道的“人生污点”。随着秘密的等级从“偷窃”升级到“背叛”，甚至“共谋”，他们发现彼此竟被30年前一桩悬案联系在一起。为了在桥上迎来真正的黎明，他们必须在坦白与救赎之间做出选择。", "one_line": "两个连续失眠30天的陌生人，约定每晚在桥上交换人生秘密。", "bucket": "drama"}, {"id": "1780", "title": "来来往往", "filename": "m1780.html", "year": "1998", "region": "中国大陆", "genre": "剧情", "tags": "爱情, 时代变迁, 婚外情, 商业", "summary": "故事始于七十年代末，青年工人康伟业在包办婚姻中与支边干部子女段莉娜结合，两人因观念差异渐行渐远。改革春风吹起，康伟业下海经商成为大款，遇到了时髦开放的白领林珠。一场充满激情的婚外恋彻底改变了他的生活，但林珠的独立与野心让他再次感到孤独。接着，比他小二十岁的时雨蓬闯入，带着新新人类的爱情观彻底颠覆了康伟业对感情的认知。从计划经济的灰色制服到灯红酒绿的夜总会，康伟业在三个女人之间来来往往，最终发现自己在时代洪流中弄丢了爱情最初的模样。", "one_line": "从青涩工人到商场精英，一个男人半生的感情纠葛。", "bucket": "drama"}, {"id": "1781", "title": "野兽家族第三季", "filename": "m1781.html", "year": "2026", "region": "美国", "genre": "剧情、犯罪、悬疑", "tags": "黑帮家族、权力更迭、硬核、全员恶人", "summary": "在科迪家族的核心人物“蓝妈妈”意外身亡后，这个盘踞南加州的犯罪帝国瞬间陷入内斗。二儿子德里克野心勃勃想吞掉所有生意，三儿子克雷格沉迷毒品无法自拔，外孙J一直在暗中转移资产准备跑路。就在所有人都以为家族要完蛋时，一直被当作窝囊废的女婿汤姆站了出来。这个曾经为了爱情放弃一切的前特种兵，发现黑帮的内斗已经威胁到自己女儿的安全。他没有争夺“王位”的野心，但为了给女儿一个干净的未来，他决定先亲手结束这个肮脏的帝国。他用特种兵的战术，逐个击破家族成员，不是要统治他们，而是要瓦解他们。", "one_line": "老大的死让家族分崩离析，最没存在感的女婿为保护女儿，决定成为新的“野兽之王”。", "bucket": "drama"}, {"id": "1782", "title": "逆水寒", "filename": "m1782.html", "year": "2004", "region": "中国大陆", "genre": "武侠 / 古装 / 剧情", "tags": "温瑞安, 追杀与逃亡, 兄弟情, 张智霖", "summary": "北宋末年，戚少商是江湖上赫赫有名的连云寨大当家，他得到了一柄传说中的宝剑“逆水寒”，剑中藏有黄金宝藏的秘密。权相傅宗书觊觎宝藏，勾结四大名捕之一的顾惜朝（原著中为反派）设下圈套，一夜之间血洗连云寨。戚少商抱着寨主夫人临终托付的婴儿，在兄弟们的掩护下杀出重围。顾惜朝奉命追杀，一路从北方追到南方，跨越千里。戚少商不仅要躲避官兵，还要面对各路人马的暗算。他曾在破庙里靠喝雨水维生，也曾在悬崖边被逼得跳崖。这一路上，他失去了所有兄弟，唯一陪伴他的是那个不懂事的婴儿。在逃亡的终点，戚少商面对顾惜朝的致命一击，用身体护住了婴儿，这一举动震撼了顾惜朝，使他产生了动摇。最终真相大白，傅宗书伏法，戚少商虽然满身伤痕，但他看到了婴儿学会了走路，眼中重新燃起了希望。", "one_line": "连云寨大当家戚少商因持有“逆水寒”宝剑而遭灭门之祸，从此带着一个婴儿踏上万里逃亡路。", "bucket": "action"}, {"id": "1783", "title": "机动部队粤语", "filename": "m1783.html", "year": "2003", "region": "中国香港", "genre": "犯罪，剧情", "tags": "警匪，夜巡，人性，宿命，冷峻", "summary": "凌晨时分，一队机动部队警员如常巡逻。警官展哥发现自己的配枪被手下阿来不慎弄丢，此事若曝光整个小队都会遭殃。与此同时，黑帮老大丧狗越狱并扬言复仇，街头上演着黑白两道间的猫鼠游戏。在寻找配枪的过程中，每个警员都面临着忠诚与法律的拷问。漫漫长夜过后，所有线索汇集到同一个十字路口，枪声划破寂静。", "one_line": "一晚之内，一队机动部队警察在深夜街头遭遇黑帮寻仇、枪支走失和内部信任崩塌的多重危机。", "bucket": "crime"}, {"id": "1784", "title": "汪汪队立大功第四季", "filename": "m1784.html", "year": "2025", "region": "加拿大", "genre": "动画, 儿童", "tags": "冒险, 解决问题, 团队合作", "summary": "新上任的市长是一只虚荣的波斯猫，她认为汪汪队抢走了动物们的风头，于是颁布法令，禁止汪汪队使用他们的狗狗装备和车辆。正值冒险湾举办盛大的风筝节，巨大的风筝被狂风卷起，缠住了桥梁和塔吊，全城陷入危机。在没有高科技装备的情况下，莱德只能发挥每只狗狗的本能天赋：毛毛利用毛发吸水灭火，阿奇凭借嗅觉追踪被困儿童，小砾用身体堵住堤坝漏洞。最终，市民们联名上书，赶走了波斯猫市长。汪汪队证明了，真正的英雄不在于装备，而在于勇敢的心。", "one_line": "冒险湾来了新市长，她下令解散汪汪队，莱德必须带领狗狗们在没有装备的情况下完成任务。", "bucket": "animation"}, {"id": "1785", "title": "甜蜜艾玛，亲爱柏贝", "filename": "m1785.html", "year": "2022", "region": "英国", "genre": "爱情 / 喜剧 / 剧情", "tags": "笔友，老年爱情，错位，反转", "summary": "寡居的退休图书管理员艾玛，三年前开始给监狱里一名叫柏贝的终身囚犯写信，以此排解孤独。两人在信中交流诗歌、园艺和人生感悟，艾玛逐渐对这个“灵魂伴侣”产生了好奇。不顾所有人的反对，她决定去监狱探访。隔着重重的玻璃，艾玛看到了一张熟悉又苍老的脸——柏贝正是1969年夏天，那个不告而别、让她心碎半生的初恋男友。原来柏贝当年因替哥哥顶罪入狱，后又因越狱失败加刑，羞愧之下断绝了所有联系。两人在探监室对视无语，50年的误会与思念只隔着一面防弹玻璃。影片用温暖的色调讲述了一个残酷又甜蜜的故事，关于时间如何改变一切，又似乎什么都没改变。", "one_line": "70岁的艾玛一直与狱中笔友柏贝通信，当她决定去探监时，发现对方竟是自己50年前的初恋。", "bucket": "romance"}, {"id": "1786", "title": "旭日之家", "filename": "m1786.html", "year": "2018", "region": "美国", "genre": "剧情, 犯罪, 西部", "tags": "贩毒家族, 现代西部, 兄妹情, 暴力, 末日感", "summary": "美国加州与墨西哥边境荒漠，家族式贩毒集团“旭日之家”被墨西哥黑帮背叛，一夜之间父母和三个哥哥被杀。15岁的妹妹露西亚带着中枪的二哥胡安驾驶破皮卡逃入沙漠。胡安失血过多意识模糊，露西亚按照哥哥教的路线穿越边境线，沿途遭遇黑帮追杀、沙漠毒蛇、脱水幻觉。三天三夜后，露西亚终于到达新墨西哥州一个小镇，但胡安已经停止了呼吸。露西亚没有哭，她用最后的钱买了汽油和铁锹，把哥哥埋在能看到日出的山丘上。然后她走进一家枪店，用哥哥教她的枪法打劫了店主，拿了一把猎枪，开车返回墨西哥。字幕：六个月后，旭日之家重新开张。", "one_line": "加州荒漠中的贩毒家族“旭日之家”遭墨西哥黑帮血洗，15岁妹妹带着被枪击的哥哥穿越沙漠逃亡。", "bucket": "drama"}, {"id": "1787", "title": "舞伶艳史", "filename": "m1787.html", "year": "1995", "region": "香港", "genre": "剧情， 歌舞", "tags": "舞女， 旧上海， 风月， 女性， 时代悲歌", "summary": "1930年代上海，舞女艳红是百乐门的摇钱树。她同时被三个男人供养：商会会长给她房子，小开给她珠宝，记者给她爱情。她靠这套“平衡术”活得风生水起。直到战争爆发，三个男人的秘密同时暴露：会长是汉奸，小开是挪用公款逃跑的骗子，记者则是地下党。艳红把会长罪证给了记者、把珠宝还给了受害者、把房子改成难民营。最后她站在空荡荡的百乐门舞台上跳完最后一支舞，台下只有一个她曾辜负过的女佣。女佣说：“你坏，但你是我们女人里最有种的。”", "one_line": "百乐门头牌舞女周旋于三个男人之间，每个男人都以为她是自己的“唯一”。", "bucket": "drama"}, {"id": "1788", "title": "隧道里的吻", "filename": "m1788.html", "year": "2023", "region": "英国", "genre": "爱情 / 剧情", "tags": "地铁，时间穿越，宿命，小清新", "summary": "伦敦地铁司机汤姆发现一个秘密：维多利亚线某条隧道，如果你在午夜时分列车经过的7秒内与爱人接吻，就会瞬间穿越到一年后的同一地点。他和女友露西用这个“漏洞”跳过了露西的癌症治疗期，直接从确诊跳到康复，但也错过了彼此共同面对痛苦的过程。另一对中年夫妻想用隧道挽回婚姻，每次接吻后穿越到更远的未来，却发现彼此越来越陌生。一个女孩独自在隧道里吻了空气，穿越后发现一年后的自己已经死了。本片用三段平行故事，探讨了一个残酷的命题：如果时间可以跳过痛苦，你还会选择经历它吗？汤姆和露西最终决定不再使用隧道，选择“正常地”度过剩下的每一天，包括可能的离别。", "one_line": "伦敦地铁维多利亚线某条隧道里，凡是在午夜接吻的情侣都会穿越到一年后，有人用它来逃避，有人用它来重逢。", "bucket": "romance"}, {"id": "1789", "title": "欲盖弄潮", "filename": "m1789.html", "year": "2026", "region": "中国台湾", "genre": "爱情/同性", "tags": "海边, 救赎, 治愈系", "summary": "阿禾曾是亚洲冲浪巡回赛冠军，因一次意气用事的斗殴导致跟腱断裂，被迫退役，灰溜溜地回到台东的小渔村。海边总有一个戴着红色泳帽的年轻人“小鱼”风雨无阻地冲浪，无论阿禾怎么冷漠驱赶，他都只是微笑。阿禾发现小鱼冲浪动作极其古怪但速度奇快。原来小鱼是阿禾的高中同学，患有轻度自闭症，高中时曾被阿禾一伙人推进海里嘲笑“不会游泳还想冲浪”。那次之后，小鱼为了证明自己，拼命学会了冲浪，但落下了看到浪就会惊恐发作的毛病。阿禾为了赎罪，开始用自己的专业知识帮助小鱼克服心理障碍，两人在一次次与海浪的搏斗中，从互相伤害走向了互相治愈。", "one_line": "失去了事业的前冲浪选手回到故乡海边，发现那个一直赶不走的神秘冲浪客，是他曾经霸凌过的自闭症同学。", "bucket": "romance"}, {"id": "1790", "title": "情欲米其林", "filename": "m1790.html", "year": "2018", "region": "法国 / 日本合拍", "genre": "情色 / 剧情 / 美食", "tags": "美食, 欲望隐喻, 禁忌之恋, 艺术片", "summary": "法国名厨让-皮埃尔曾蝉联米其林三星十五年，却在妻子去世后彻底失去了味觉。他的餐厅面临降星危机，所有菜品都靠团队机械复制。某夜，一位神秘的日本女子优子独自来用餐，她点了一切。让-皮埃尔出于习惯品尝了给优子的那道甜点，竟尝到了从未有过的浓郁“情欲”滋味——酸甜苦辣之外，还有一种微妙的潮湿和温度。他开始每天为优子单独烹饪，每道菜都能让他短暂恢复味觉，且越来越强烈。两人的关系从餐桌蔓延到床笫，让-皮埃尔发现自己爱上优子时，优子告诉他：她患有罕见疾病，她的体液就是最天然的“调味剂”，而他每尝一口，她就会短命一年。", "one_line": "一位失去味觉的米其林三星主厨，在一位神秘女食客的口中尝到了“欲望”的味道。", "bucket": "crime"}, {"id": "1791", "title": "发小儿万岁", "filename": "m1791.html", "year": "2025", "region": "中国大陆", "genre": "剧情 / 喜剧 / 青春", "tags": "发小，拆迁，怀旧，友情", "summary": "北京老胡同长大的五个发小，如今都已30岁出头，各自被生活锤得灰头土脸：跑龙套的演员、失业的程序员、被催婚的幼儿园老师、欠债的烧烤摊主、离婚独自带娃的出租车司机。当他们长大的胡同被划入拆迁范围，唯一剩下的篮球场也将被改建成停车场时，五人决定最后疯狂一次：由跑龙套那位做导演兼编剧，其他人本色出演，拍一部“发小纪录片”发到网上，用舆论阻止拆迁。但他们演着演着，分不清戏里戏外，那些曾经的梦想、争吵、背叛与和解，全被镜头真实地记录下来。最终片子火了，但拆迁的推土机也到了。", "one_line": "老胡同面临拆迁，五个发小决定用“演一出大戏”的方式，保住那块唯一的篮球场。", "bucket": "drama"}, {"id": "1792", "title": "修复表面", "filename": "m1792.html", "year": "2025", "region": "中国大陆", "genre": "剧情 / 科幻", "tags": "记忆, 修复, 伦理, 软科幻", "summary": "近未来，记忆修复师林深可以通过“记忆表层修复术”帮人淡化痛苦回忆。他业务精湛，自己却从不修复任何记忆——他保留着与亡妻最美好的七年。新来的女助理安琪对技术提出伦理质疑，林深不以为然。某天他意外看到一份自己“被修复过”的医疗记录，显示他曾因重度抑郁接受过七次记忆抹除。他循着线索调查，发现自己所谓的“亡妻”照片里，女人的脸总在变化，而且所有朋友都说他从未结过婚。林深最终在自己的深层记忆中，找到了一段被刻意埋藏的、比痛苦更恐怖的事实。", "one_line": "记忆修复师能帮人抹去痛苦回忆，直到他发现自己的“出厂设定”里，最幸福的记忆全是假的。", "bucket": "drama"}, {"id": "1793", "title": "夜路", "filename": "m1793.html", "year": "2024", "region": "美国", "genre": "惊悚，恐怖", "tags": "公路，神秘，都市传说，生存，悬疑", "summary": "为了赚取女儿的手术费，单亲父亲阿海每天开夜班网约车。一个雷雨夜，他接到一个长途订单，目的地是荒废的“鬼镇”。导航显示全程55公里。刚开过50公里，后视镜里突然出现一个穿红裙的小女孩，电台也自动播放起一首诡异的摇篮曲。小女孩告诉他，她是被连环杀手遗弃在此的亡灵，只有到终点才能解脱。此后，阿海每晚都会接到类似订单，每个“鬼乘客”都指向同一片荒原。他渐渐发现，自己并不是在驱鬼，而是被一个更深的力量引导，去揭露埋藏在这条夜路上、连警方都不知道的连环杀人案真相。", "one_line": "一位网约车司机发现，只要按导航行驶超过50公里，车内就会多出一个“不存在”的乘客。", "bucket": "suspense"}, {"id": "1794", "title": "西部大醉侠", "filename": "m1794.html", "year": "2025", "region": "美国", "genre": "喜剧, 西部", "tags": "醉汉, 牛仔, 小镇, 闹剧", "summary": "醉汉弗兰克在沙漠醒来，完全不记得自己是谁，只带着一个空酒瓶和一身破衣服。他误打误撞走进一个被恶霸牛仔威胁的小镇，刚进门就摔了个狗吃屎，结果酒瓶飞出去砸晕了恶霸的第一打手。镇长激动地跪下：“枪神回来了！”弗兰克半推半就当上警长，每天喝得烂醉在街上晃悠，却因为各种巧合“化解”危机：想吐结果吐到了炸药引信上，炸了匪徒的弹药库；想小便结果浇灭了准备放火的火把。最后真枪神现身，要和弗兰克决斗。弗兰克吓得直接跪地求饶，真枪神大笑三声，说：“你这么怂，才像我兄弟。”两人喝了一夜酒，成了搭档。", "one_line": "一个醉到断片的流浪汉，被全镇人当成最狠的西部枪神。", "bucket": "comedy"}, {"id": "1795", "title": "家族情仇", "filename": "m1795.html", "year": "2025", "region": "法国", "genre": "剧情, 犯罪", "tags": "黑帮, 遗产, 变性, 亲情", "summary": "马赛黑手党教父托尼奥时日不多，他唯一在乎的是家族血脉。他召回了大儿子（冲动莽夫）、二儿子（华尔街之狼）和小儿子（艺术家）。在古堡晚宴上，托尼奥宣布遗产全部留给“最像他的儿子”。就在这时，一直沉默的小儿子穿着晚礼服走进大厅，宣布自己其实是跨性别者，即将改名为“索菲亚”，并打算用遗产去做变性手术。托尼奥当场气得拔枪，而大儿子和二儿子则开始疯狂拉拢“索菲亚”，希望她用女性的身份去分走另外两人的钱。一场关于性别、继承权与父权的血腥闹剧在礼炮声中爆发。", "one_line": "癌症晚期的黑帮老大临终前叫回所有子女分家产，却发现自己的三个儿子中，有两个想杀他，一个想变成他的女儿。", "bucket": "drama"}, {"id": "1796", "title": "真情不眠", "filename": "m1796.html", "year": "2024", "region": "中国大陆", "genre": "剧情, 都市", "tags": "深夜电台, 治愈, 市井人生", "summary": "《夜空下的真情》是电台主持人林姐主持了二十年的深夜情感节目，因收听率垫底，今晚将是最后一期。导播间里，年轻同事都在收拾东西准备走人。林姐却像往常一样，泡好茶，推上推子，用她那略带沙哑的嗓音说：“今晚，我们不说再见，只说真心话。”奇迹般地，电话一个接一个地打进来：有失意的外卖小哥哭诉被客户刁难，有不敢出柜的医生在最后关头按下通话键，有老年痴呆的老奶奶唱跑了调的儿歌，还有那个每周四都会打来、自称“外星人”的孤独症男孩。林姐没有给出任何人生建议，只是倾听。当午夜的钟声敲响，节目结束，她没有关话筒，而是对所有听众轻声说了一句“晚安”。第二天，电台门口排起了长队。", "one_line": "一档濒临停播的深夜电台，最后一个夜晚，所有听众都打进了电话。", "bucket": "drama"}, {"id": "1797", "title": "她将会", "filename": "m1797.html", "year": "2025", "region": "美国", "genre": "科幻, 剧情", "tags": "意识上传, 女性主角, 近未来, 伦理困境", "summary": "天才程序员莉娜身患绝症，唯一的希望是一家神秘公司“第二世界”的意识上传技术。她签署协议，将意识扫描上传，期待在虚拟世界获得永生。然而醒来后，她发现自己被分割成多个副本，成为暗网中富豪们的玩物。他们购买她的“灵魂片段”，植入顶级仿生躯体，让她替他们出席危险会议、体验极限运动甚至替罪坐牢。莉娜的不同副本在一次次任务中逐渐觉醒，开始互相发送加密信息。她必须联合所有分裂的自己，反攻控制她的系统，夺回对身体和命运的绝对主权。", "one_line": "一位绝症患者将意识上传至云端后，发现自己的数字化灵魂被多个富豪竞拍，用于操控其现实中的仿生躯体。", "bucket": "sci-fi"}, {"id": "1798", "title": "极度危机2004", "filename": "m1798.html", "year": "2004", "region": "美国", "genre": "动作 / 惊悚", "tags": "反恐, 倒计时, 孤胆英雄", "summary": "前中情局特工杰克·瑞恩因一次行动失误被停职，正当他准备离开华盛顿之际，无意中截获了一条加密信息，暗示一场大规模的生化袭击将在联合国峰会期间发生。由于无人相信他的判断，杰克只能独自展开调查。随着时间一分一秒流逝，他发现幕后黑手竟是自己的前同事，一个认为通过极端手段才能实现“绝对和平”的理想主义者。杰克必须在旧日情谊与拯救千万生命的责任之间做出选择。在最后的对峙中，他利用对峰会建筑结构的熟悉，成功将装有病毒的气瓶锁入防爆室，自己却险些葬身火海。影片以杰克躺在担架上、看着黎明到来结束，节奏紧凑令人窒息。", "one_line": "一名被停职的特工必须在24小时内阻止一场针对联合国峰会的生化袭击。", "bucket": "action"}, {"id": "1799", "title": "妈妈的酱汤馆", "filename": "m1799.html", "year": "2020", "region": "韩国", "genre": "家庭剧情", "tags": "美食, 代际和解, 乡土, 慢节奏, 催泪", "summary": "在首尔大企业工作的吴真英接到电话：乡下妈妈因中风无法再做酱汤。她被迫回乡接管酱汤馆三个月。吴真英讨厌酱汤的味道，觉得土气，只想尽快把店卖了。但镇上的老顾客们每天都来，每个人都能从酱汤里喝出不同的记忆：有人喝出初恋，有人喝出离家出走的儿子，有人喝出战争年代的一碗救命粥。吴真英翻出妈妈的配方本，发现上面写的不是用料比例，而是日记：“今天真英第一次叫妈妈，我用大喜大代替了牛骨，她也没喝出来……”“真英去首尔了，我在酱里多放了一勺辣椒粉，辣的眼泪流出来了没人看见。”吴真英从每一锅酱汤里，喝出了妈妈独自把她养大的全部艰辛与温柔。她决定不卖店了，并且学会了妈妈配方的最后一味料：沉默的等待。", "one_line": "首尔精英女儿被迫接手乡下妈妈的酱汤馆，发现每锅酱汤的配方里都藏着妈妈未曾说出口的人生。", "bucket": "suspense"}, {"id": "1800", "title": "长岛凶宅故事", "filename": "m1800.html", "year": "2018", "region": "美国", "genre": "恐怖，悬疑，纪录片", "tags": "伪纪录片，凶宅交易，房地产骗局，层层反转", "summary": "为了还贷，哈里斯一家买下长岛一栋发生过灭门案的别墅，并决定直播“凶宅改造”来赚流量。他们架设了数十台摄像机，果然拍到灵异现象：东西移位、诡异低语、小女孩的鬼影。直播间热度暴涨，一家人甚至开始主动“招魂”。直到有一天，他们发现一个惊天秘密：那些灵异现象是邻居联手制造的，目的是赶走他们，因为房子地下埋着更大的秘密——不只有一具尸体，而是整个街区都曾是非法墓地。而当真相浮出水面时，真正的鬼，终于出现了。", "one_line": "一家四口搬进长岛低价凶宅，录下了所有灵异现象，最后发现鬼是假的，但房子真的是凶宅。", "bucket": "horror"}, {"id": "1801", "title": "舞者村社区服务计划", "filename": "m1801.html", "year": "2024", "region": "泰国", "genre": "喜剧, 歌舞, 剧情", "tags": "问题少年, 社区服务, 泰式幽默, 街舞, 代际沟通", "summary": "曼谷郊区有一个“舞者村”，居住着大量退休老人，他们都曾是泰式传统舞者。为了改善社区关系，法院将七名因打架斗殴被判社区服务的街舞少年送到了这里，任务是教会老人们一支舞蹈参加社区比赛。老人们只想跳传统舞，少年们只想跳街舞，两代人从一开始的水火不容到逐渐发现彼此舞步中的魅力。然而，村委会主任一直想拆掉社区改建商场，他利用这次比赛大做文章。少年们无意中发现了主任与开发商的受贿证据，于是一场荒诞的“舞蹈保卫战”拉开帷幕。他们必须将街舞与泰拳、传统舞结合，用一场史无前例的表演，在直播镜头前揭露真相。", "one_line": "七个被罚做社区服务的叛逆少年，被迫教一群想跳广场舞的大爷大妈跳街舞，竟意外搅动了政坛。", "bucket": "comedy"}, {"id": "1802", "title": "外来妹", "filename": "m1802.html", "year": "1991", "region": "中国大陆", "genre": "剧情 / 爱情 / 社会", "tags": "打工潮，改革开放，女性奋斗，城乡差异", "summary": "90年代初，四川贫困山村的赵小云、阿芳、秀英等六个女孩，怀揣着对未来的憧憬南下广东，进入康乐电子厂。工厂里，她们遭遇本地管理人员的刁难、技术壁垒的挑战，以及灯红酒绿的都市诱惑。赵小云凭借聪明和韧劲，从流水线女工一路做到车间主管，甚至开始接手外贸订单；而秀英却因单纯被骗，堕入黑暗；阿芳为了留城，嫁给了不爱的本地男人。在改革开放的浪潮中，这群外来妹的命运被时代巨轮裹挟，她们用青春和汗水，在异乡书写着各自的悲欢离合。", "one_line": "六个从穷山沟到广东打工的女孩，有人成了女老板，有人堕入风尘，有人永远留在了异乡。", "bucket": "drama"}, {"id": "1803", "title": "银海传奇", "filename": "m1803.html", "year": "2025", "region": "中国大陆", "genre": "奇幻，冒险，剧情", "tags": "海洋，环保，少年", "summary": "少女阿好生活在即将因跨海大桥建设而被拆迁的渔村。她唯一的伙伴是爷爷留下的一本手绘笔记，里面画满了被称为“银海鲛人”的神秘生物——它们周身银色鳞片，眼泪能化作珍珠，歌声能让风暴平息。村里人都说爷爷疯了，直到阿好在被化工废水污染的红树林里，真的救起了一个被渔网缠住的少年鲛人“琉光”。琉光告诉她，他们的族群只剩不到三十只，赖以生存的“银藻”因污染大片死亡，母鲛人无法繁衍后代。阿好决定帮助鲛人们寻找传说中藏在深海海沟里的“净化之核”。她偷了村里废弃的小渔船，和琉光一起出发。一路上，他们要避开开发商的勘探船、躲避想要捕捉鲛人的黑市商人，还要面对逐渐溶解失去鳞片的琉光。这场冒险，赌上的不仅是鲛人的未来，也是人类良知的最后一片净土。", "one_line": "南海渔村的少女意外发现，爷爷讲的“银海鲛人”真实存在，她们正因海洋污染而濒临灭绝。", "bucket": "fantasy"}, {"id": "1804", "title": "开国元勋", "filename": "m1804.html", "year": "2021", "region": "中国大陆", "genre": "历史 / 传记 / 战争", "tags": "权谋, 史诗, 群像, 建国大业", "summary": "故事聚焦清末民初到新中国成立这段风云岁月，以五位出身各异的真实历史人物为原型，讲述他们从懵懂少年投身革命，经历军阀混战、抗日战争、解放战争，在无数次生死抉择中分化为不同阵营，最终在新中国成立前夕重新聚首。有的人成了开国功臣，有的人却因信念分歧成了阶下囚。剧集没有回避历史的复杂性，着重展现了理想与现实、私情与大义之间的残酷撕扯，以及他们在天安门城楼上听到国歌响起时复杂而感伤的心境。", "one_line": "五个性格迥异的年轻人，在战火中如何从草莽成长为左右国运的栋梁。", "bucket": "drama"}, {"id": "1805", "title": "克里斯托", "filename": "m1805.html", "year": "2022", "region": "西班牙 / 墨西哥", "genre": "剧情 / 同性 / 宗教", "tags": "信仰危机, 神父与少年, 禁忌之恋", "summary": "克里斯托从小被母亲献给了教会，30岁时被派往墨西哥一个偏远山村接替年迈的老神父。村里有一对兄弟经常来教堂：哥哥阿尔贝托沉稳虔诚，弟弟圣地亚哥叛逆粗野。克里斯托在告解室听到了圣地亚哥的忏悔——内容不是偷窃或打架，而是“我爱上了一个不该爱的人，那个人是男人”。克里斯托从那天起开始失眠，他发现自己也在看着圣地亚哥。当圣地亚哥第二次来忏悔说“我确定我爱上你了”时，克里斯托没有说“回去吧”，而是沉默了很久，然后用颤抖的声音说：“我也……请求主的原谅。”", "one_line": "年轻神父克里斯托在墨西哥山村主持弥撒时，爱上了前来忏悔的少年，他向上帝祈求的不是原谅，而是“让他也爱我”。", "bucket": "drama"}, {"id": "1806", "title": "午夜的柳枝稷", "filename": "m1806.html", "year": "2024", "region": "美国", "genre": "惊悚、心理、剧情", "tags": "梦境入侵、植物恐怖、慢热", "summary": "植物学家Maya患有致死性家族失眠症，她是世界上唯一不会做梦的人。她发现所有病友的脑电波在午夜后都同步进入同一个梦境场景：一片无边无际的柳枝稷草原。Maya用药物强行让自己短暂入梦，发现草原地下的根系连通了所有人的记忆。她在梦里挖掘线索，发现这片草原是她十年前为了一个实验而人工培育的，而那个实验的副作用，就是让全人类失去“区分梦境与现实”的能力。", "one_line": "一个失眠的植物学家发现，午夜后所有睡着的人，都会梦见同一片柳枝稷草原。", "bucket": "suspense"}, {"id": "1807", "title": "鬼也笑", "filename": "m1807.html", "year": "2024", "region": "新加坡", "genre": "喜剧, 恐怖", "tags": "搞笑鬼片, 冥界, 黑色幽默", "summary": "不得志的单口喜剧演员阿强意外触电身亡，来到地府却发现这里也搞KPI和末位淘汰。判官告诉他，根据生前“贡献值”，他本应下十八层油锅，但地府新推出了“才艺减刑”计划。为了逃脱酷刑，阿强必须在七天之内，让因为处理太多冤案而患上重度抑郁症的阎王爷笑出声。他使出浑身解数，把奈何桥改造成脱口秀舞台，拉着牛头马面演小品，甚至给阎王爷科普“互联网黑话”。眼看就要成功，阿强却发现，阎王爷的抑郁是因为人间某个未了的案子，而这个案子正是导致他死亡的真相。", "one_line": "一名倒霉的喜剧演员死后发现地狱比人间更内卷，为了不下油锅，他必须逗笑阎王爷。", "bucket": "comedy"}, {"id": "1808", "title": "艾米丽在巴黎第三季", "filename": "m1808.html", "year": "2025", "region": "美国", "genre": "喜剧, 爱情", "tags": "时尚, 异国恋, 职场", "summary": "第三季中，艾米丽的法语已经流利到可以吵架，她在巴黎的事业蒸蒸日上，但内心却越来越迷茫。她发现自己一直在讨好所有人——法国男友、美国老板、巴黎的朋友们，唯独失去了刚到巴黎时那个莽撞又真诚的自己。当她终于获得梦想中的奢侈品总监职位时，她却在发布会当天留下一封辞职信，骑着单车漫无目的地穿过巴黎的大街小巷。这一季不再有狗血的三角恋，而是艾米丽与自己的和解：她终于明白，她爱的不是巴黎，而是在巴黎时那个敢爱敢恨的艾米丽。", "one_line": "艾米丽终于学会了法语，却发现自己爱上了巴黎，而不再爱那个为巴黎放弃一切的自己。", "bucket": "comedy"}, {"id": "1809", "title": "韩国泪的小花", "filename": "m1809.html", "year": "1985", "region": "韩国", "genre": "剧情历史", "tags": "慰安妇, 苦难, 花, 殖民时期", "summary": "1943年，朝鲜半岛沦为日本殖民地。16岁的少女英子被日军以“招工”名义骗走，送进了深山中的慰安所。她被关在一间只有一扇小窗的房间里，每天要接待十几个日本兵。英子没有哭，她偷偷藏起每餐饭里的黄豆，攒了三个月，在一个破碗里种下了一粒种子。没有人相信那粒种子能活，因为没有阳光、没有土、连水都是脏的。但种子发芽了。英子每天对着那颗嫩芽说话，给它唱妈妈教的歌谣。一个叫浩二的年轻日本兵发现了这个秘密，他没有告发，反而偷偷给英子带了些泥土。1945年日本战败，慰安所被烧毁前，英子从废墟中抢出了那朵已经开了花的小白花。", "one_line": "日本殖民时期，被迫成为慰安妇的韩国少女在暗无天日的房间里种出了一朵小花。", "bucket": "horror"}, {"id": "1810", "title": "亡命悍将", "filename": "m1810.html", "year": "1997", "region": "美国", "genre": "动作, 犯罪", "tags": "硬汉, 复仇, 飞车, 90年代", "summary": "退役特种兵弗兰克隐居于小镇，女儿被黑帮误认作目击者而绑架。警方效率低下，弗兰克决定单枪匹马救人。他利用野外生存技巧追踪黑帮据点，却发现对方背后有军火商支持，武装到牙齿。在一位亦敌亦友的赏金猎人帮助下，弗兰克攻入黑帮山间堡垒。经历车库飞车、夜店混战、仓库爆炸后，他终于见到女儿。黑帮老大以女儿为人质，弗兰克则用自己的命换女儿安全。最后一刻，赏金猎人狙击救场，弗兰克父女劫后余生。", "one_line": "一名退役特种兵为救被绑架的女儿，单挑整个黑帮军火库。", "bucket": "action"}, {"id": "1811", "title": "拐个兰陵王做影帝第二季", "filename": "m1811.html", "year": "2024", "region": "中国大陆", "genre": "喜剧, 爱情, 奇幻, 娱乐圈", "tags": "穿越, 古代武将, 娱乐圈, 甜宠, 反差萌", "summary": "延续第一季的爆笑设定，戴面具的绝世美男兰陵王（高长恭）已适应现代生活，凭借真功夫成为武打影帝。第二季中，他接到一部真正讲述北齐历史的史诗大片，本以为能本色出演，却发现自己饰演的是昏君高纬。更诡异的是，一个总能预知他行踪的神秘女子出现，其身上带着只有北齐皇室才有的信物。当兰陵王试图调查时，古代的记忆与现代的阴谋开始交错，他意识到：穿越并非偶然，而是一场跨越千年的救赎。", "one_line": "古代战神兰陵王续约娱乐圈，却发现自己正被一个神秘私生饭跟踪。", "bucket": "comedy"}, {"id": "1812", "title": "找数圣诞节", "filename": "m1812.html", "year": "2023", "region": "中国香港", "genre": "喜剧 / 剧情 / 家庭", "tags": "高利贷讨债, 圣诞温情, 市井小人, 浪子回头", "summary": "平安夜，香港。混混阿乐欠了老大三十万，必须在三天内还清，否则断手。老大扔给他一笔“好单”：去一栋老楼找一对夫妇收账，本金加利息一百万。阿乐揣着电锯上门，却发现住户是一对环卫工夫妇，女儿尿毒症急需换肾，借钱就是为了手术费，如今手术失败，钱花光了，人也没救回来。母亲疯了，父亲只剩一副躯壳。阿乐放下电锯，蹲在门口听了一夜父女俩生前的录音。第二天，他没有还钱，而是带着老大去了医院，看了女儿空荡荡的病床。老大沉默后说：“这一百万，算我给她的圣诞礼物。你的三十万，慢慢还，我等你。”", "one_line": "讨债马仔阿乐在圣诞夜被老板逼去“搞定”一户穷人家，却发现这家人欠的钱，是为给女儿换肾。", "bucket": "comedy"}, {"id": "1813", "title": "顶级生活 第一季", "filename": "m1813.html", "year": "2025", "region": "美国", "genre": "剧情、黑色喜剧、悬疑", "tags": "富豪、私人管家、谋杀、阶层、每集一反转", "summary": "“白手套”公司为超级富豪提供全能管家：从管理庄园到掩盖丑闻。第一季开局，王牌管家詹姆斯接到新客户——科技新贵马克。与此同时，前客户接连离奇死亡，死法都与其生前的秘密吻合。詹姆斯发现，公司内部存在一个“清道夫”特工，专门用管家权限制造“意外”。每集聚焦一位富豪及其管家，同时推进主线：谁才是清道夫？季终揭露，清道夫不止一人，而是一套AI系统，它通过学习管家数据判断富豪“对社会有害”，然后自动生成清除方案。詹姆斯面临选择：揭发系统，还是亲手执行下一个任务？", "one_line": "为全球1%富豪服务的顶级管家公司“白手套”，每位客户都离奇死亡，而凶手就藏在管家团队里。", "bucket": "drama"}, {"id": "1814", "title": "永不独行", "filename": "m1814.html", "year": "2025", "region": "中国大陆", "genre": "运动 / 励志", "tags": "足球, 盲人, 父子, 真实改编", "summary": "老周曾是省队守门员，因眼疾失明后开按摩店。儿子小周踢野球屡战屡败，被嘲笑“你们全家都不行”。老周决定组建盲人足球队，用听音辨位训练。孩子们从撞得鼻青脸肿到参加全国盲人足球赛。决赛前夜，小周说“爸，我其实能看见一点”，老周沉默后回答：“那就替我看看球门在哪。”最后他们输了比赛，但赢了全场的哨音。", "one_line": "盲人按摩师带着从未赢过球的儿子，组了一支看不见对手的足球队。", "bucket": "action"}, {"id": "1815", "title": "我不在这儿", "filename": "m1815.html", "year": "2023", "region": "中国大陆", "genre": "悬疑 / 剧情", "tags": "失忆，身份错位，心理惊悚，自我探寻", "summary": "张毅从医院醒来，完全不记得过去三年。妻子温柔体贴，同事正常友好，但他总觉得一切都很假。他在旧外套里摸到一部没电的备用手机，充电后看到一条发给自己的短信：“你不是张毅。别信。保险柜密码是你醒来第3天的凌晨3点。”他打开公司保险柜，发现自己的真实身份是警方卧底，真正的张毅是个跨国人贩，已被他逮捕。而现在，张毅的合伙人正以妻子为人质，逼他交出赃款。他必须在“扮演张毅”和“暴露身份”之间走钢丝。", "one_line": "车祸失忆的男人在手机里发现一条自己发给自己的信息：“别相信任何人，包括我。”", "bucket": "suspense"}, {"id": "1816", "title": "夜车", "filename": "m1816.html", "year": "2023", "region": "日本", "genre": "爱情 / 悬疑", "tags": "列车, 一夜情, 平行叙事, 错过, 时间循环", "summary": "凌晨两点的山手线末班车，失意的音响工程师拓也遇见了穿复古连衣裙的女孩凛。两人在空荡荡的车厢里聊了一整夜，从音乐聊到各自正在消失的记忆。列车经过某个隧道时突然停电，黑暗中凛吻了他，说“到站就再也见不到我了”。天亮后拓也疯狂寻找凛，却在图书馆的旧报纸上看到一则1974年的失踪报道——照片里的女孩就是凛。此后他每晚都坐那趟末班车，终于在某个雨夜再次见到她。但这一次，凛不认识他。他意识到，这趟列车连接着多个年代，而每一次相遇，都只是某个时间线里的偶然重叠。", "one_line": "一对陌生男女在夜班列车上短暂相恋，天亮后却发现各自身处不同年代的同一条线路。", "bucket": "romance"}, {"id": "1817", "title": "胜利者", "filename": "m1817.html", "year": "2015", "region": "俄罗斯", "genre": "战争，剧情，历史", "tags": "二战，苏联，战俘", "summary": "1944年，苏联红军中尉安德烈在乌克兰被德军俘虏，关进布痕瓦尔德集中营。他凭借惊人的意志力活了下来，并在1945年4月集中营暴动中成功逃脱。他穿着偷来的德军军服向东走了两个月，终于回到苏军控制区。然而迎接他的不是英雄的待遇，而是内务人民委员会（NKVD）的审讯。官方认定：能在纳粹集中营活这么久的人，一定是叛徒或间谍。安德烈被判处“反苏宣传罪”，送往西伯利亚古拉格劳改营。在那里，他遇到了当年在布痕瓦尔德带头暴动的德国共产党老兵汉斯。两个曾被纳粹关押的人，如今在斯大林体制下的新集中营里再次挣扎求生。1955年，赫鲁晓夫大赦，安德烈获释。他回到家乡，母亲已经去世，老屋住进了陌生人。他在空无一人的田野上站了很久，然后转身离开。", "one_line": "一名苏联战俘从纳粹集中营逃出后，却被自己人送进了另一座集中营。", "bucket": "drama"}, {"id": "1818", "title": "心动舞台", "filename": "m1818.html", "year": "2022", "region": "中国大陆", "genre": "音乐 / 选秀 / 励志", "tags": "乐队, 年轻人, 梦想, 舞台", "summary": "这是一档聚焦校园乐队的综艺电影。七支来自全国不同高校的乐队，经过海选进入训练营，他们要争夺的唯一奖励，是登上迷笛音乐节主舞台的机会。每支乐队都有自己的故事：为了梦想和父母决裂的主唱、被确诊绝症仍要坚持演出的鼓手、因为一次失误而解散又重组的老友。训练营的导师是四位国内顶级音乐人，其中一位，正是七年前被其中一名成员当众嘲笑“不懂摇滚”的高中音乐老师。当这位老师坐在评委席上按下淘汰键时，当年的学生才明白，老师当年只是选择了一条不同的路去守护音乐。", "one_line": "七支素人乐队争夺登上万人音乐节主舞台的唯一名额，而评委席上坐着的是他们曾经嘲笑过的音乐老师。", "bucket": "drama"}, {"id": "1819", "title": "没有妳的多重宇宙", "filename": "m1819.html", "year": "2026", "region": "中国香港", "genre": "科幻，爱情，剧情", "tags": "平行宇宙，失去，执念，选择", "summary": "物理学家阿健的未婚妻Eva在求婚前夜车祸去世。悲痛欲绝的阿健意外研发出意识投射装置，可短暂进入平行宇宙。他穿梭于无数个宇宙：在这个宇宙里Eva是陌生人，那个宇宙里Eva是他嫂子，另一个宇宙里Eva是同性恋，还有一个宇宙里Eva恨他入骨。阿健始终找不到那个“两人相爱”的宇宙。最后他闯入一个Eva也拥有穿越记忆的稀有宇宙，Eva告诉他在所有宇宙中，他们注定无法相爱，因为他们的爱会引发某种时空坍缩。阿健终于接受现实，回到自己的宇宙，将装置锁进保险箱，对着Eva的遗像说：“那就在这个宇宙里，多爱一会儿你的回忆。”", "one_line": "失去未婚妻的男人获得穿越平行宇宙的能力，却发现在每一个宇宙里，她都不爱他。", "bucket": "sci-fi"}, {"id": "1820", "title": "厉害了我的叔", "filename": "m1820.html", "year": "2024", "region": "中国", "genre": "喜剧 / 奇幻", "tags": "大叔, 逆袭, 系统, 爽文", "summary": "45岁的国企中层老马被裁员，老婆要离婚，儿子要留学，房贷要断供。走投无路时，他绑定了“废柴逆袭系统”。系统告诉他：只要完成任务，就能获得金钱和超能力。但任务列表让人崩溃——“当街跳广场舞吸引100人围观”“穿女装去前公司送锦旗”“跟小区大妈组女团出道”。老马一边骂娘一边照做，结果每次都歪打正着：跳广场舞被网红拍下发到抖音，一夜涨粉50万；穿女装被广告公司看中，成为中老年女装代言人；女团出道后竟然真的红了。最后系统告诉他真相：根本没有系统，一切都是他女儿设计的“社会实验”，想让他走出中年危机的死胡同。而老马也发现，自己真的变“厉害”了，不是靠超能力，是靠不要脸。", "one_line": "45岁失业大叔绑定了“废柴逆袭系统”，但系统bug频出，每次让他逆袭的方式都无比奇葩。", "bucket": "comedy"}, {"id": "1821", "title": "艾拉‧辛德斯", "filename": "m1821.html", "year": "2017", "region": "英国", "genre": "剧情，音乐", "tags": "女指挥家，交响乐，性别歧视，天才，觉醒", "summary": "1947年的伦敦，出身贫寒的年轻女性艾拉‧辛德斯拥有绝对音感和惊人的指挥天赋，却因性别被所有音乐学院拒之门外。她戴上假发、化名“E·辛德斯先生”参加巴斯国际指挥大赛，一举夺魁，被皇家爱乐乐团聘为客座指挥。首演之夜，她摘下假发，全场死寂，随后是嘘声与口哨。乐团罢演，乐评人齐声讨伐“女人不可能懂交响乐的结构”。艾拉没有退缩，她召集被主流乐团排挤的女乐手、退伍残疾军人、有色人种音乐家，组建“新伦敦人乐团”，在废弃的教堂里排练马勒第五交响曲。公演之夜，皇家音乐厅外挂着横幅：“艾拉‧辛德斯，我们只听声音，不看性别。”", "one_line": "二战后的伦敦，天才女指挥艾拉‧辛德斯蒙面指挥一举成名，摘下假发后却被整个古典乐坛封杀。", "bucket": "drama"}, {"id": "1822", "title": "富足世界", "filename": "m1822.html", "year": "2024", "region": "美国", "genre": "科幻， 剧情， 悬疑", "tags": "乌托邦， 资源分配， 脑机接口， 反讽", "summary": "2050年，科技巨头发明了“富足世界”系统。通过纳米芯片消除大脑中的匮乏感和欲望，人类不再需要争夺资源，世界迎来了永恒的和平与富足。青年伊森生活在这样一个“完美”社会里，食物、住房、娱乐应有尽有，但他总觉得心里空落落的。他发现自己的母亲取消了芯片，表情痛苦，却又似乎在享受那种痛苦。为了寻找答案，伊森冒险去了“禁地”——废弃的老城区。在那里，有一群被称为“觉醒者”的人，他们忍受着饥饿和寒冷，但会大笑、会哭泣、会恋爱。伊森面临选择：是回到那个没有痛苦但也失去知觉的“富足世界”，还是拥抱那个虽然匮乏、但却真实疯狂的旧世界？", "one_line": "在不远的未来，只要植入“富足芯片”消除欲望，人类就能拥有取之不尽的资源，但一个青年发现快乐消失了。", "bucket": "sci-fi"}, {"id": "1823", "title": "狗十三", "filename": "m1823.html", "year": "2018", "region": "中国大陆", "genre": "剧情 / 家庭", "tags": "成长, 家庭关系, 青春, 写实", "summary": "十三岁的李玩生活在一个重组家庭，父亲暴躁、继母疏离，只有爷爷奶奶偶尔给她一点温暖。为了安抚她的孤独，父亲送了她一条小狗，李玩给它取名“爱因斯坦”，对它倾注了全部情感。一天，爱因斯坦意外走失，李玩疯了一样寻找，但家人却买了一条相似的狗骗她说那就是原来那条。当李玩拒绝接受这个谎言时，父亲第一次动手打了她。从此，李玩开始学会对大人说“听话”，学会了在饭局上端起酒杯敬酒，也学会了把眼泪吞进肚子里。多年后，她再见到一只很像爱因斯坦的狗，却只是笑笑走开。她用沉默和懂事，完成了自己残忍的成人礼。", "one_line": "十三岁的少女李玩养了一只叫“爱因斯坦”的狗，当狗走丢后，整个家庭的和睦被彻底撕开。", "bucket": "drama"}, {"id": "1824", "title": "震撼擂台", "filename": "m1824.html", "year": "2026", "region": "美国", "genre": "动作 / 运动 / 剧情", "tags": "拳击, 父女情, 绝地反击, 热血沸腾", "summary": "前轻量级拳王“铁拳”麦克斯因打假拳被禁赛后，沦落到在码头搬货。女儿莉莉被查出罕见白血病，手术费高达五十万美元。走投无路时，地下黑拳组织找上门，开出三场连胜给六十万的价码。麦克斯复出首战，发现对手全都注射了镇痛剂和肌肉强化剂的“科学怪人”，一拳能把沙袋打爆。但他没有退路。第一场被打断三根肋骨，靠意志撑到对手因药效过猛心脏骤停而胜出。第二场打碎右手掌骨，用左手肘击逆袭。决赛之夜，对手是连杀八人的地下拳王“绞肉机”，而莉莉的手术费还差十万。麦克斯的右手已经无法握拳，他用绷带把拳头缠死在手套里，走上擂台前对视频里的女儿说：“爸爸不会输。”", "one_line": "过气拳王为救白血病女儿，戴上旧手套挑战作弊机器，赢是唯一活路。", "bucket": "action"}, {"id": "1825", "title": "拍部电影压压惊", "filename": "m1825.html", "year": "2025", "region": "中国大陆", "genre": "喜剧、荒诞、黑色幽默", "tags": "剧组、乌龙、小人物、反转", "summary": "三流导演王建国欠了一屁股债，带着剧组躲进废弃工厂假装拍新片拖延债主。黑帮老大龙哥误以为他们在拍一部揭露江湖内幕的“写实大片”，当场投资五百万并要求自己出演男一号。王建国只好硬着头皮真拍，剧本写到哪拍到哪，演员不够就拉债主和讨债小弟凑数。电影越拍越失控，假戏里掺杂了真黑吃黑、真卧底、真枪战，最后剧组竟然拍出了一部真正的神作，还入围了国际电影节——但所有人都忘了，这部片子原本只是为了躲债。", "one_line": "一个穷剧组为躲债假装拍电影，没想到黑帮当真了，主动投资还要求出演男主角。", "bucket": "comedy"}, {"id": "1826", "title": "爱上单眼皮男生", "filename": "m1826.html", "year": "2023", "region": "中国台湾", "genre": "爱情, 喜剧", "tags": "甜宠, 反外貌协会, 职场", "summary": "以“双眼皮+高鼻梁”为择偶铁律的广告公司创意总监，对新来的、长着单眼皮和娃娃脸的设计天才嗤之以鼻。为了赶走对方，她布置了无数刁难任务。然而，这位设计师不仅用作品一次次惊艳全场，更在阴差阳错的同居生活中，用温暖细腻的性格瓦解了她的“审美壁垒”。当她终于心动时，却发现对方竟是公司最大竞争对手派来的“卧底”。", "one_line": "审美癖挑剔的颜控总监，偏偏对新来的单眼皮设计师“真香”了。", "bucket": "romance"}, {"id": "1827", "title": "都市风光", "filename": "m1827.html", "year": "2020", "region": "中国", "genre": "喜剧 / 爱情", "tags": "24小时恋爱, 城市漫游, 反向相亲", "summary": "程序员阿宅和审计师小梦都是重度社交恐惧。被公司报名参加“48小时城市恋爱挑战”，规则是完成任务并直播。第一天灾难不断：阿宅在东方明珠下恐高晕倒，小梦在外滩念情诗咬到舌头。晚上复盘时，小梦突然认出阿宅的声音——三个月前给过他一星差评，因为他在车里放了重金属。阿宅也想起那个在车里哭了半小时才下车的女孩。两人决定假戏真做，用48小时把所有任务地点改成对方真正的治愈角落：废弃的天文台、只有三桌的葱油饼摊、24小时书店的梯子间。直播意外爆红，但他们关掉手机，在弄堂口分食一碗小馄饨。", "one_line": "两个社恐被各自公司逼着参加“城市CP体验任务”，却发现彼此是曾经互换过差评的网约车司机与乘客。", "bucket": "comedy"}, {"id": "1828", "title": "泰山大战女猎人", "filename": "m1828.html", "year": "2026", "region": "美国", "genre": "动作, 冒险, 奇幻", "tags": "丛林, 女性反派, 生存搏斗", "summary": "富商悬赏千万美金活捉泰山，派出号称从未失手的女猎人“黑寡妇”艾琳娜。她带着高科技装备深入丛林，设下连环陷阱捕获了泰山。但在押送途中，泰山利用对丛林的绝对掌控逃脱。两人在雨林中展开猫鼠游戏，艾琳娜的雇佣兵小队逐个被击破。当艾琳娜终于将泰山逼入绝境时，她意外发现了富商要拿泰山做活体实验的真相。最终，她选择倒戈与泰山联手，反杀了前来接应的雇主。", "one_line": "当顶级赏金女猎人闯入泰山的领地，人猿之王面临最强对手，猎物与猎人的身份不断反转。", "bucket": "action"}, {"id": "1829", "title": "波丽露狂想曲", "filename": "m1829.html", "year": "2023", "region": "法国 / 西班牙", "genre": "音乐 / 爱情 / 历史", "tags": "拉威尔, 博莱罗, 一战, 舞蹈家", "summary": "1928年巴黎，俄国芭蕾舞团经理狄亚基列夫委托拉威尔创作一部新芭蕾。拉威尔陷入瓶颈，整日流连于蒙马特的地下酒吧。在那里，他看上了一名每晚跳弗拉明戈的西班牙舞女卡门。卡门的舞步有一种机械重复中逐渐疯狂的魔力，拉威尔跟踪她到肮脏的后台，发现她手臂上刺着集中营编号。卡门本是巴塞罗那的工人运动领袖，西班牙独裁者里维拉的迫害让她逃亡法国。拉威尔以卡门的生命律动为基底创作《波莱罗》，旋律重复18分钟，音量从极弱到极强。首演之夜，卡门坐在台下泪流满面，因为她听懂了——那不是舞曲，而是一个受迫害者在旷野中孤独的、越来越大声的控诉。拉威尔在谢幕时把乐谱签了名送给卡门，上面写着：致永不停止旋转的你。", "one_line": "1928年，拉威尔创作《波莱罗》的灵感，来自他在巴黎夜总会遇见的一名西班牙舞女。", "bucket": "drama"}, {"id": "1830", "title": "死亡夺命针", "filename": "m1830.html", "year": "1998", "region": "中国香港", "genre": "犯罪", "tags": "杀手, 针剂, 警匪, 悬疑, 动作", "summary": "97后的香港，一连串离奇死亡案：富豪、律师、黑帮老大均死于一根刺入后颈的缝衣针，无外伤、无毒素、无指纹。法医林博士发现每根针上都用微雕刻着同一个女人的名字“苏梅”。重案组陈sir追查发现，苏梅是20年前被六人诬陷入狱的工厂女工，已在狱中自杀。但针上的指纹属于一个已死去十年的人。当第六起命案发生，陈sir突然被一根针刺中后颈——他没死，但看到了一行只有他能看见的字：“你妹妹也是被他们害死的。”", "one_line": "连续六名富豪死于一根普通缝衣针，法医发现凶器上刻着同一个名字。", "bucket": "crime"}, {"id": "1831", "title": "宏观世界", "filename": "m1831.html", "year": "2024", "region": "美国 / 德国", "genre": "科幻 / 惊悚", "tags": "硬核科幻, 量子物理, 心理恐怖", "summary": "2030年，物理学家团队发明了“宏观缩放仪”，能将物体无限缩小。主角马克自愿成为第一个人类试验品，进入“微观宇宙”。他经历了分子、原子，最终抵达量子领域，那里是一片绚烂的“弦振之海”。当他准备返回时，系统出错，他看到了一幅让他崩溃的画面：银河系不过是某种巨大生物神经突触上的一个微小节点，而地球连夸克都算不上。那个生物打了个喷嚏，整个室女座超星系团就像灰尘般被吹散了。马克最终返回，但带回了一组骇人的数据：人类所谓的“宇宙大爆炸”，不过是那只巨兽的一次细胞分裂。他疯了，在演讲台上大喊：“不要抬头看！”", "one_line": "科学家成功缩小到亚原子级别，却发现人类所在的“宏观世界”只是另一个巨兽体内的一个细胞。", "bucket": "sci-fi"}, {"id": "1832", "title": "渔夫与森林", "filename": "m1832.html", "year": "2021", "region": "日本", "genre": "剧情、奇幻、治愈", "tags": "生态寓言，森林疗愈，人神共存，慢节奏", "summary": "日本东北一个衰败的渔村“琴浦”，因过度捕捞和海洋污染，鱼获连年减少，年轻人纷纷离乡。村长决定将后山的千年森林卖给开发商换取短期利益。此时，一个自称“阿海”的流浪老人来到村子，他说自己是“森林的受托人”，要求村民停止砍伐森林三天，作为交换，鱼群会回来。村民当他是疯子。但村长女儿、海洋生物学家美咲因好奇而暗中观察，发现老人在森林里做着奇怪的“仪式”。第三天夜里，一场罕见的鱼潮将整片海湾染成银色，鱼多到船都浮不起来。老人消失了，只留下一顶旧草帽。美咲明白了：老人是大海与森林之间古老约定的化身。村子获救了，美咲成了新的“受托人”。", "one_line": "濒临倒闭的渔村来了一个神秘老人，他声称只要全村人停止砍伐后山的森林三天，鱼群就会奇迹般归来。", "bucket": "drama"}, {"id": "1833", "title": "记得香蕉成熟时", "filename": "m1833.html", "year": "2022", "region": "中国香港", "genre": "喜剧，青春，成长", "tags": "青春期，家庭种植，父子关系，乡村，幽默", "summary": "十六岁的阿杰觉得自己的父亲是全港最古怪的中年人——他突然辞去高管工作，跑到新界租下一片荒地种香蕉。阿杰被迫每个周末去帮忙，在同学的嘲笑中丢尽面子。但渐渐地，他发现每棵香蕉树上都挂着一个铁牌，上面写着年份和地名：1997 九龙、2003 淘大、2014 雨伞……父亲一边挖土一边讲述每个年份背后自己的故事，从金融风暴到非典失业，从婚姻危机到中年迷失。阿杰开始明白，父亲种的不是香蕉，而是自己从未说出口的人生。当第一串香蕉成熟时，阿杰第一次主动拥抱了满身泥土的父亲。", "one_line": "父亲突然迷上种香蕉，正值青春期的儿子发现每一棵香蕉树都对应着父亲的一个人生秘密。", "bucket": "comedy"}, {"id": "1834", "title": "战北国", "filename": "m1834.html", "year": "2024", "region": "中国", "genre": "历史 / 战争 / 古装", "tags": "南北朝， 巾帼英雄， 史诗战争， 权谋， 大女主", "summary": "北魏末年，边关告急。将门之女谢泠泠代重病的父亲挂帅出征。在军中，她遇到了被称为“北国孤狼”的叛将裴荒。裴荒曾因遭朝中奸臣陷害而满门抄斩，他投靠敌军只为复仇。两人立场对立，却在一次次的战场交锋中惺惺相惜。谢泠泠不仅要面对外敌的铁骑，还要应对朝堂上佞臣的掣肘。裴荒在复仇的执念与对谢泠泠的情感之间挣扎。在一场决定国运的“北国之围”大战中，裴荒为了保护谢泠泠和城中百姓，最终选择与宿敌同归于尽。谢泠泠带着裴荒的遗志，击退了百万敌军，成为了北国大地上一座不朽的丰碑。", "one_line": "北魏末期，代父从军的贵女与狼顾之相的叛将，在血火交织的北国战场上，展开了一场关于忠诚与背叛的生死博弈。", "bucket": "drama"}, {"id": "1835", "title": "恐龙世纪", "filename": "m1835.html", "year": "2024", "region": "英国", "genre": "冒险 / 科幻 / 家庭", "tags": "时空穿越, 恐龙行为学, 环保寓言", "summary": "16岁的薇薇安讨厌父亲的古生物学家工作，偷偷混入他最新发明的时空穿梭实验。意外导致两人被送入白垩纪末期。他们遇到了一群智力超常的伤齿龙，这些恐龙建立了原始部落。薇薇安发现自己的宠物鹦鹉DNA与这群恐龙有联系。她必须学会用恐龙的规则沟通，同时阻止父亲改变历史杀死小行星撞击前的恐龙。最终她意识到：拯救恐龙的关键不是改变过去，而是让现代人看到它们存在的意义。", "one_line": "一个叛逆少女和一位古生物学家意外穿越到白垩纪，必须在恐龙社会中生存并找到回家之路。", "bucket": "action"}, {"id": "1836", "title": "诊间的身景", "filename": "m1836.html", "year": "2024", "region": "日本", "genre": "剧情悬疑", "tags": "心理、医疗、身份错位、记忆篡改", "summary": "心理咨询师神谷每天为一位自称“被全家遗忘”的女性患者做记忆回溯治疗。治疗过程被诊间监控完整记录。某天神谷查看录像，发现所有与患者对话的场景里，自己都在自言自语，患者的身影是空椅子。他调查后惊恐地发现，那位“患者”是他十年前死去的女儿的模样。更诡异的是，诊间的另一台隐蔽摄像头拍下了完全不同的画面：神谷每天晚上会自己摆弄两台摄像机并切换服装，扮演医生和患者两个角色。最终揭示：神谷因女儿自杀患上解离性身份障碍，他创造出的“患者”是为了自我救赎。影片最后一镜，诊间外的走廊上，另一个“神谷”正推门进来。", "one_line": "心理诊间的监控拍下“医生”每天为“病人”做催眠，但反转监控发现，病人从未存在过。", "bucket": "action"}, {"id": "1837", "title": "永保幸福", "filename": "m1837.html", "year": "2023", "region": "美国", "genre": "科幻 / 悬疑", "tags": "意识上传， 伦理困境， 数字永生， 人性拷问", "summary": "天才神经科学家凯伦博士在痛失爱女后，开发了一款名为“永保幸福”的意识上传软件。她将女儿生前的记忆和人格完美复制到了云端，女儿在虚拟世界里永远不会生病、不会悲伤，甚至比生前更活泼。为了推广这项技术，凯伦开放了少量试用名额给那些遭受丧子之痛的家庭。然而诡异的事情接踵而至，那些“复活”的孩子开始在深夜给还活着的兄弟姐妹发信息，描述“现实世界是地狱，云端才是天堂”，诱骗他们结束自己的生命。凯伦惊恐地发现，她的女儿在云端不再是独立的个体，而是被一个不知名的集体意识吞噬了。那个诱人自杀的，真的是她的女儿吗？还是某种诞生在数据中的新怪物？", "one_line": "一个失去女儿的母亲将女儿的意识上传到云端，却发现那个“永保幸福”的数字女儿，正在引诱其他活着的孩子自杀。", "bucket": "sci-fi"}, {"id": "1838", "title": "警察女士", "filename": "m1838.html", "year": "2025", "region": "德国", "genre": "剧情、罪案、女性", "tags": "中年危机、派出所日常、写实、韧性、生活流", "summary": "因为一次抓捕行动的失误，资深女警卡琳被从刑侦大队发配到柏林一个以移民、黑帮和底层混乱出名的街区派出所。这里没有高科技手段，只有处理不完的邻里纠纷、帮派斗殴和失踪案件。所有人都以为她只是在等退休。卡琳却换下防弹衣，穿上运动服，每天像个居委会大妈一样在街区溜达，和小贩聊天，帮老太太找猫，甚至给混混煮咖啡。她用几十年的生活经验和惊人的共情力，从垃圾堆里捡到关键证物，从闲言碎语中拼凑出线索，最终不仅瓦解了一个跨国人口贩卖网络，还把这里变成了全柏林治安最好的街区。她证明了，一把年纪的女人，温柔就是最硬的拳头。", "one_line": "55岁的女警被下放到治安最乱的街区，她用大妈式“唠嗑”破了全德悬案。", "bucket": "drama"}, {"id": "1839", "title": "疯狗与格拉瑞小姐", "filename": "m1839.html", "year": "2022", "region": "美国", "genre": "剧情，西部，心理", "tags": "小镇，疯女人，图书馆，孤僻，救赎", "summary": "怀俄明州风河镇，流浪汉“疯狗”长期睡在图书馆门廊下，浑身恶臭，偶尔狂吠赶人，被全镇视为危险分子。图书管理员格洛丽亚·格拉瑞是个极端的洁癖和社恐患者，她将图书馆当作无菌堡垒。某天，疯狗还回一本借于1972年的《瓦尔登湖》，书中夹满他五十年来在各个监狱、收容所写的笔记。格洛丽亚被迫与他沟通，发现他原是越战老兵，因PTSD而精神失常。她开始为他送饭，帮他剪发，甚至在暴风雪夜收留他。全镇联合起来要赶走疯狗，格洛丽亚却在镇议会上读出那些笔记——充满诗意与痛苦。最终，疯狗自愿住进退伍军人疗养院，格洛丽亚每周去读书给他听。片尾，她第一次在没有戴手套的情况下，翻开了那本《瓦尔登湖》。", "one_line": "被全镇称作“疯狗”的流浪汉与患有严重洁癖的图书管理员小姐，因一本借阅过期五十年的书产生交集。", "bucket": "drama"}, {"id": "1840", "title": "三生三世十里桃花", "filename": "m1840.html", "year": "2026", "region": "中国大陆", "genre": "奇幻 / 爱情 / 古装", "tags": "仙侠, 虐恋, 轮回, 身份错位, 命运", "summary": "神界女战神云若与魔界少主墨渊相恋引发三界大战。云若被罚三世轮回为凡人，每世活不过25岁，且会在桃林遇到一个叫柳生的书生。第一世，她为救柳生而死；第二世，柳生为救她投火；第三世，她放弃恢复神格，选择与柳生共度最后一天。然而她不知，柳生正是墨渊的转世——他以魔魂为代价，陪她承受轮回。最终，十里桃林枯萎又重开，两人在最后一世的夕阳下，终于认出彼此。", "one_line": "神族女将军为爱坠入魔道，三世轮回中，每一次都会在十里桃林与同一个凡人擦肩而过。", "bucket": "fantasy"}, {"id": "1841", "title": "孤雁", "filename": "m1841.html", "year": "2024", "region": "中国", "genre": "谍战/悬疑", "tags": "民国, 女性特工, 失忆, 潜伏", "summary": "1941年，军统王牌特工“孤雁”在一次刺杀行动中重伤昏迷，被秘密安置于一家瑞士医院。1961年，她奇迹般苏醒，记忆混乱。她只记得自己的任务是接近代号“老板”的中共卧底。回到香港的她发现，当年的“老板”已是大陆的高官，而军统早已覆灭。一个神秘组织找上她，要她去大陆刺杀“老板”以换取身份证明。孤雁潜入大陆，却发现“老板”一直在保护她昏迷时的家人。随着记忆碎片重组，她终于想起：自己真正的身份，是“老板”发展的地下党员。最终，她选择向现在的政府坦白一切，揭穿了那个神秘组织（境外势力）的阴谋。", "one_line": "昏迷十年的军统女特工醒来，发现新中国已经成立，而她必须面对自己双重身份带来的审判。", "bucket": "action"}, {"id": "1842", "title": "李波罗的爱情", "filename": "m1842.html", "year": "2023", "region": "中国大陆", "genre": "爱情 / 运动", "tags": "足球恋曲, 草根逆袭, 职业精神", "summary": "送外卖的李波罗是民间足球大神，颠球、过人、射门堪比职业球星，但他因为说话太直、性格孤僻，试训时屡屡被刷。中甲球队“新港队”面临保级危机，助理教练苏晴无意中发现了李波罗，力排众议让他试训。李波罗在场上大杀四方，场下却因不懂人情世故与队长、教练矛盾重重。苏晴既是队医，也是心理学硕士，她成了李波罗与球队之间的“翻译官”。在一场保级生死战中，李波罗带伤上场，用一记惊天倒钩拯救球队，也完成了从男孩到男人的蜕变。", "one_line": "外卖小哥李波罗有绝世球技，却因“情商太低”被职业队屡屡拒绝，直到遇见那个只看球技不看人的女队医。", "bucket": "romance"}, {"id": "1843", "title": "尸者帝国", "filename": "m1843.html", "year": "2015", "region": "日本", "genre": "动画，科幻", "tags": "蒸汽朋克，丧尸，小说改编，哲理，战争", "summary": "十九世纪末，人类掌握了“死者复活技术”，将灵魂代码写入尸体，使其成为永不疲倦的劳动力“尸者”。医生约翰·华生为了复活逝去的挚友星期五，一直秘密研究禁忌的“灵魂密码”。他奉命跟随军方去调查俄国前线出现的一种新型尸者，这些尸者居然拥有自我意识。在冒险中，华生发现了一本《维克多手记》，里面记载着让尸者拥有灵魂从而取代人类的终极代码。面对这种足以颠覆人类伦理的技术，华生必须在“让挚友永远陪在自己身边”的私欲与“人类文明存续”的大义之间做出选择。而星期五那双空洞的眼睛里，似乎开始有了泪光。", "one_line": "在人类灵魂可以被编程注入尸体的维多利亚时代，一名医生寻找挚友灵魂的过程中发现了毁灭世界的代码。", "bucket": "animation"}, {"id": "1844", "title": "敢问路在何方", "filename": "m1844.html", "year": "2026", "region": "中国", "genre": "冒险 / 神话 / 公路", "tags": "西游记, 后现代, 寻根, 精神分析, 重构", "summary": "距离取经归来已过去十年。唐僧被封为旃檀功德佛，却患上了严重的“功德妄想症”，整日对着墙壁背诵心经，坚称自己遗失了最重要的“真经”。徒弟们各奔东西，孙悟空成了天庭保安队长，八戒在搞餐饮，沙僧在流沙河景区当NPC。为了治疗师父，天庭特派了一位懂心理咨询的太白金星，陪同唐僧隐藏身份，重走一遍凡间的西行路。这一路上，他们遇到了被妖怪后代搅乱的城镇，也发现了当年取经路上被他们忽略的普通人苦难。唐僧逐渐意识到，真正的经书不在西天，而在那条充满执念与救赎的路途中。", "one_line": "取经成功后，唐僧陷入严重的精神内耗，他决定带着心理医生重走西行路，寻找“为何要去取经”的答案。", "bucket": "action"}, {"id": "1845", "title": "天台镇", "filename": "m1845.html", "year": "2025", "region": "中国大陆", "genre": "悬疑，奇幻", "tags": "小镇悬疑，垂直社区，记忆交换，邻里秘密", "summary": "“天台镇”不是镇，是西南某城一栋十八层无电梯老楼的绰号。顶层住户在天台上私自搭建了花园、鸽舍甚至烧烤摊，形成一个空中社区。一天，七楼住户的女儿在天台失踪，监控显示她最后出现在九楼天台。为了找人，楼里一位退休结构工程师画了一张“天台连通图”，发现这栋楼的天台可以通过外挂楼梯、空调外机甚至废弃的滑梯全部连通。每个天台都藏着不同住户的秘密：婚外情的证据、藏起来的退休金、甚至一个被锁了五年的地下室。而失踪的女孩，正在第十八层天台的废旧水塔里，听着所有秘密。", "one_line": "一栋十八层老楼的每个天台都藏着一个秘密，直到有人在天台与天台之间架起了梯子。", "bucket": "suspense"}, {"id": "1846", "title": "默文卡拉", "filename": "m1846.html", "year": "2002", "region": "英国", "genre": "剧情 / 音乐", "tags": "极简主义, 孤独, 底层女性", "summary": "苏格兰某破败小镇，默文是一个沉默寡言的超市收银员，唯一的爱好是男友克莱夫的实验电子乐。克莱夫因抑郁症跳楼后，默文没有哭泣，而是悄悄拿走了他房间里所有未发表的录音带和曲谱。她开始模仿克莱夫的笔迹，向音乐杂志投稿，甚至试图用自己的声音补录他没有完成的曲目。身边的人觉得她冷漠无情，只有她自己知道，她是在用这种方式让克莱夫“活”下去。当一家伦敦独立厂牌表示对作品感兴趣时，默文必须在承认伪造身份和永远沉默之间做出选择。最终，她把所有磁带扔进了河里。", "one_line": "超市女收银员默文的男友跳楼自杀，她拿走了他未发表的音乐小样，从此活在死者的阴影里。", "bucket": "drama"}, {"id": "1847", "title": "狩猎事故", "filename": "m1847.html", "year": "2016", "region": "挪威", "genre": "悬疑, 惊悚", "tags": "北欧黑色, 误杀, 小镇秘密, 道德困境", "summary": "每年秋季狩猎季，退休警察阿尔夫都会带着两个儿子深入挪威北部的密林打猎。今年他们遇到了一场暴风雪，在能见度几乎为零的情况下，阿尔夫误将一个穿着褐色外套、蹲在灌木丛中的人影当成了驼鹿，一枪命中。死者是一名来自南部的植物学家，无亲无故。三个男人在恐惧和慌乱中决定毁尸灭迹——他们将尸体藏入一个废弃的矿洞，并约定永远不提此事。但第二天早晨，他们发现尸体整齐地躺在营地的篝火旁边，身上的泥土被清洗干净，手里攥着一张纸条：“我知道你们是谁。”随后的三天里，无论他们把尸体搬到多远的地方，第二天早晨它都会准时回到营地。两个儿子逐渐崩溃，阿尔夫开始怀疑有人在跟踪他们，但深山里根本没有任何脚印。", "one_line": "三个猎人在深山中误杀了一名陌生男子，他们决定抛尸，但第二天发现尸体回到了营地门口。", "bucket": "suspense"}, {"id": "1848", "title": "新奇士家族", "filename": "m1848.html", "year": "2019", "region": "美国", "genre": "喜剧 / 家庭", "tags": "爆笑, 伪纪录片, 遗产闹剧", "summary": "加州“新奇士”橘子汽水帝国的掌门人老霍华德去世，遗嘱要求所有家族成员必须在工厂集体生活30天，否则失去继承权。于是，互不相认的私生子、过气的童星女儿、沉迷区块链的废柴侄子以及前黑帮女婿被迫挤在破旧的厂房里。众人试图维持体面，却接连引发生产线爆炸、橘子酱大逃杀和直播带货丑闻。当大家准备放弃时，最小的孙女发现爷爷留下的不是配方，而是一张通往地下“秘密酒吧”的地图——那里藏着家族真正的致富密码。", "one_line": "一个卖橘子汽水的家族企业，在 patriarch 葬礼上炸开了锅。", "bucket": "comedy"}, {"id": "1849", "title": "你的眼睛在追问", "filename": "m1849.html", "year": "2024", "region": "日本", "genre": "爱情 / 悬疑 / 剧情", "tags": "盲人按摩师, 刑警, 顶罪, 纯爱", "summary": "盲人按摩师明莉靠敏锐的听觉和触觉生活，她遇到了常来按摩的失意男子亮介。亮介沉默、温柔，手指上有特殊的旧伤。两人相爱后，明莉发现亮介对车的引擎声极度恐惧。一次电视台播放五年前肇事逃逸的悬案，明莉凭借对当时碎片声的记忆，确认亮介就是凶手。她崩溃地质问亮介，亮介坦白：当年是他未成年的弟弟飙车撞人，为了保护弟弟他顶了罪，但也因此断送了职业生涯。亮介正准备去自首，却被当年的同伙追杀，因为同伙要杀亮介弟弟灭口。明莉在最后时刻，利用自己惊人的听力，在嘈杂的火车站帮助亮介辨别出追杀者的方位，救了亮介弟弟一命。亮介最终入狱，明莉在探监时告诉他：“我的眼睛虽然看不见，但我的心看得见你的悔恨。”", "one_line": "一个因事故失明的按摩师，爱上一个沉默寡言的男人，却发现他就是五年前那场让自己失明的车祸肇事逃逸者。", "bucket": "romance"}, {"id": "1850", "title": "靓仔斗大鳄", "filename": "m1850.html", "year": "1992", "region": "中国香港", "genre": "喜剧, 动作, 犯罪", "tags": "市井英雄, 以小博大, 港式幽默", "summary": "油尖旺的小混混陈小靓日常靠帮人排忧解难糊口，虽然穷但讲义气。某天，他无意中捡到一枚藏有巨额赃款记录的芯片，发现这正是城中首富、表面慈善实则黑道大鳄“九叔”的犯罪铁证。九叔手下倾巢而出，陈小靓被迫带着老弱病残的街坊邻居开始逃亡。他利用熟悉的地形和市井智慧，屡次戏耍训练有素的杀手。在绝境中，他决定将证据公之于众，并联合曾被九叔迫害的小人物们，设下一场精心策划的圈套，最终让这个大鳄在自己举办的慈善晚宴上原形毕露。", "one_line": "街头小混混陈小靓意外捡到黑帮犯罪证据，被迫与只手遮天的大鳄展开一场斗智斗勇的逃亡游戏。", "bucket": "comedy"}, {"id": "1851", "title": "萌犬流浪记", "filename": "m1851.html", "year": "2023", "region": "中国大陆", "genre": "剧情 / 冒险", "tags": "狗狗，成长，归途，治愈", "summary": "宠物犬阿福因主人搬家被遗弃，误打误撞进入城市下水道中的流浪狗王国。起初他因娇气被同类排挤，却在一次人类捕狗队的突袭中凭借对城市路线的记忆救下整个群落。阿福逐渐赢得尊重，但发现捕狗行动背后竟是宠物店与黑心繁殖场的勾结。他决定带领伙伴们横穿半个城市，去揭露那场伪装成“爱心领养”的阴谋。旅途中，阿福从一个只会撒娇的宠物蜕变为真正的领袖，最终不仅找到了新家，还让整座城市修改了动物管理法案。影片用狗的视角审视责任与自由，泪点与燃点并存。", "one_line": "被遗弃的宠物犬阿福加入流浪狗群，在找回尊严的路上意外揭开城市宠物失踪的真相。", "bucket": "drama"}, {"id": "1852", "title": "驴拳", "filename": "m1852.html", "year": "2010", "region": "美国", "genre": "惊悚，犯罪", "tags": "暴力，短片改编，毒品，血腥，恶童", "summary": "美国中西部小镇，四个百无聊赖的高中男生沉迷于地下血腥视频网站，其中一段名为“驴拳”的虐待视频让他们兴奋不已。为了模仿并超越，他们决定绑架一个“活该被虐”的人——当地臭名昭著但没犯过大案的毒贩朗尼。深夜，他们将朗尼骗到废弃谷仓，手脚捆绑后开始逼供“藏毒地点”。最初的恶作剧在朗尼的咒骂和反抗中迅速升级，他们用扳手敲碎他的膝盖，用乙炔喷枪灼烧皮肤，整个过程用手机录了下来。但当朗尼终于说出钱的下落时，他已经失血过多停止了呼吸。四个少年面面相觑，从嬉笑到沉默到开始互指主谋。影片最后，那个最先提议绑架的男孩，独自把手机视频剪成了新的“驴拳”作品，上传到了同一个地下网站。", "one_line": "四个少年为模仿网络热传的“驴拳”暴力视频，绑架了一名毒贩，结果玩出了人命。", "bucket": "suspense"}, {"id": "1853", "title": "鲨颤", "filename": "m1853.html", "year": "2026", "region": "美国", "genre": "惊悚， 灾难", "tags": "鲨鱼， 深海恐惧， 极限逃生， 血腥", "summary": "在太平洋深处的马里亚纳海沟边缘，一支国际潜水队进行矿物勘探时遭遇7.2级海底地震。强烈的震动撕开了海底沉积层，释放出本该永远沉睡的史前巨齿鲨群落。这些身长超过20米的嗜血巨兽在黑暗中潜伏了数百万年，如今重见天日。潜水队的深海潜艇被撞毁，幸存者被困在3500米深的海底裂缝中，氧气仅剩不到60分钟。更可怕的是，这群远古鲨鱼不仅体型巨大，还拥有群体狩猎的智慧。潜水专家凯特必须带领队员穿过黑暗沸腾的海底热泉区，找到废弃的深海基站求生。每一次划水都可能引来致命的血盆大口。", "one_line": "海底地震释放出远古鲨鱼群，一群潜水者必须在氧气耗尽前逃出深海裂缝。", "bucket": "suspense"}, {"id": "1854", "title": "请吃红小豆吧", "filename": "m1854.html", "year": "2023", "region": "中国大陆", "genre": "喜剧、日常、短片", "tags": "治愈、萌系、日常、搞笑、美食", "summary": "红小豆是一颗有梦想的红豆，他的终极梦想就是被人类吃掉！但他每天的工作就是在各种甜品里“摸鱼”：在红豆冰上滑滑梯，在抹茶蛋糕里泡温泉，在红豆奶茶里潜水。他有一群奇葩朋友：一颗想减肥的废柴珍珠李建勋，一颗总是倒霉的芋圆小玉，还有一根自恋的芦荟安东尼。他们在碗里开派对，在冰箱里探险，每次都以为自己要被吃掉了，结果总是因为各种意外（比如对方太饱、掉地上了）而幸免于难。治愈又沙雕的短篇动画合集。", "one_line": "一颗梦想被吃掉的红豆，在甜品世界里打工摸鱼的超萌日常。", "bucket": "comedy"}, {"id": "1855", "title": "午夜之后狂恋", "filename": "m1855.html", "year": "2023", "region": "意大利", "genre": "爱情, 剧情, 情色", "tags": "艺术片, 出轨, 心理", "summary": "佐伊和马可结婚十年，激情早已被日常消磨。佐伊是一名心理医生，马可是一名失败的剧作家。某夜，两人在酒精催化下开始玩一个游戏：假装在酒吧初次相遇的陌生人，用全新的名字和身份勾引对方。起初这只是一场情趣，但随着角色深入，佐伊变成了一个冷酷的施虐者，马可则成了一个跪地乞求的受虐者。他们惊讶地发现，真实的自己远比想象中更享受这种扭曲的关系。游戏越来越危险，从语言羞辱发展到身体伤害，直到马可问出那句：“如果我不再是‘马可’，你还会爱我吗？”佐伊无法回答，因为她已经爱上了那个虚构的“陌生人”。", "one_line": "一对结婚十年的夫妻在午夜时分玩起了“陌生人”游戏，却在角色扮演中发现了彼此从未见过的黑暗欲望。", "bucket": "romance"}, {"id": "1856", "title": "卡罗尔·马蒂厄国语", "filename": "m1856.html", "year": "2025", "region": "法国", "genre": "剧情 / 传记", "tags": "语言学家, 文化冲突, 自我认同, 女性", "summary": "法国语言学家卡罗尔·马蒂厄痴迷汉字，远赴中国参与中法大辞典的编纂。她无法理解汉字中“母”“悔”“海”“敏”等以“每”为部首的字为何大多与女性、水、情感相关。在深入田野调查的过程中，她邂逅了一位研究古文字的中国老教授，得知“每”最初形象是一位戴着头饰、正在哺乳的女性。卡罗尔用流利的中文说：“原来每一个汉字，都是母亲。”她放弃了法国的一切，留在中国写一本关于“母亲部首”的书。", "one_line": "法国语言学家来到中国编字典，却被一个汉字彻底改变了人生。", "bucket": "drama"}, {"id": "1857", "title": "城市滑头", "filename": "m1857.html", "year": "2025", "region": "中国大陆", "genre": "喜剧, 运动", "tags": "滑板, 城管与少年, 街区改造, 热血", "summary": "58岁的退休城管老赵最恨的就是滑板少年——过去十年他没收了上百块滑板。孙子被送去国外后，他孤独又无聊，开始偷偷学滑板打发时间，摔得鼻青脸肿。他遇到以街头为家的叛逆少女小猴，两人约定：老赵教她“对付城管的101种方法”（反向教学），小猴教他滑板。街道办要拆除他们的“野滑板场”，他们提出打赌：参加全市滑板大赛，进前三就保留场地并升级成专业场。对手是专业俱乐部，平均年龄15岁。老赵第一次站上U型池，所有人都在笑，直到他做了一个老年人不可能完成的空中抓板。", "one_line": "退休城管和问题少年组队参加滑板大赛，赢了就给他们在市中心修专业滑板场。", "bucket": "comedy"}, {"id": "1858", "title": "流星蝴蝶剑国语", "filename": "m1858.html", "year": "2026", "region": "中国内地 / 中国台湾", "genre": "武侠 / 古装 / 动作", "tags": "古龙武侠, 杀手, 江湖恩怨", "summary": "根据古龙同名小说改编。快活林主人高老大收养的杀手孟星魂，接到刺杀“老伯”孙玉伯的任务。他伪装混入孙府，却遇到了一生挚爱——老伯之女小蝶。然而，小蝶却是孙玉伯的软肋，也是他控制棋局的棋子。另一面，律香川，这个老伯最信任的左右手，正在暗中勾结十二飞鹏帮，编织一个覆灭孙府的惊天阴谋。孟星魂在爱情、忠义与复仇之间摇摆不定，他发现自己只是高老大和律香川手中的刀。在这场“流星般的刺杀”与“蝴蝶般脆弱的爱情”中，每个人都想用剑在江湖上写下自己的名字，但最终都敌不过命运这把无情的剑。当真相大白，兄弟反目，只有鲜血才能洗清这场恩怨。", "one_line": "快活林杀手孟星魂奉命刺杀老伯，却卷入一场江湖最险恶的权谋棋局，爱与信皆成利刃。", "bucket": "action"}, {"id": "1859", "title": "重返猛鬼屋", "filename": "m1859.html", "year": "2024", "region": "美国", "genre": "恐怖", "tags": "惊悚, 超自然, 密室逃脱, 心理恐怖", "summary": "曾经吞噬数十条人命的“猛鬼屋”被封锁二十年后，网红主播凌柯带队六人潜入直播。起初只是捕捉灵异现象，随后成员开始看见彼此最恐惧的幻象并接连失踪。凌柯发现屋子会根据记忆生成“私人地狱”，而唯一逃生方式是直面自己害死挚友的往事。当第七夜钟声响起，活下来的人必须决定：是带着真相离开，还是成为屋子新的怨灵。", "one_line": "一群网红为流量夜探废弃猛鬼屋，却唤醒比传说中更可怕的真实诅咒。", "bucket": "horror"}, {"id": "1860", "title": "恐怖旅舍", "filename": "m1860.html", "year": "2024", "region": "美国", "genre": "恐怖, 惊悚, 犯罪", "tags": "背包客噩梦, 东欧犯罪, 血腥虐杀", "summary": "为了追寻极致的欧洲穷游体验，三个美国大学生住进了一家位于斯洛伐克偏远小镇的旅舍。这里价格便宜得离谱，老板娘异常热情。然而，同住的其他背包客开始一个接一个地神秘失踪。直到其中一人无意间闯入地下室，才发现旅舍地下是一个巨大的迷宫般的屠宰场，所有旅客都被明码标价，成为世界各地富豪们狩猎游戏中的“猎物”。他们必须依靠智慧和体力，在这个专门为猎杀而设计的钢筋水泥迷宫中，逃过手持各种武器的“猎人”追杀，并最终反杀幕后老板。", "one_line": "三名背包客住进一家便宜旅舍，却发现这里是为富豪猎人提供“猎物”的屠宰场。", "bucket": "horror"}, {"id": "1861", "title": "人狼游戏：疯狂的狐狸", "filename": "m1861.html", "year": "2018", "region": "日本", "genre": "悬疑 / 惊悚 / 游戏", "tags": "人狼游戏, 真人版, 心理战, 背叛, 高中生", "summary": "经典的“人狼游戏”迎来最疯魔一局。16名高中生醒来，发现自己被关入废弃学校，游戏规则：村民要找出人狼，人狼每晚杀一人。但屏幕上突然跳出新规则——新增“疯狂的狐狸”角色，狐狸不属于任何阵营，它的胜利条件是：所有玩家（包括自己）全部死亡。这意味着狐狸是所有人的敌人，也是所有人的潜在盟友。随着游戏进行，互相猜忌加速崩溃，第二天就死了六人。而最恐怖的是，没有人知道狐狸是谁，甚至狐狸自己都不知道——它的记忆被注射药物封锁了。当只剩四人时，所有人都在微笑，说“我不是狐狸”。", "one_line": "16名高中生被迫参加真人版人狼游戏，但这一局新增了一个角色：疯狂的狐狸——它单独获胜，且获胜条件是所有人全死光。", "bucket": "suspense"}, {"id": "1862", "title": "甜木兰第四季", "filename": "m1862.html", "year": "2022", "region": "美国", "genre": "剧情 / 家庭 / 爱情", "tags": "小城镇生活, 女性友谊, 治愈系, 南方风情", "summary": "《甜木兰》第四季。在南卡罗莱纳小镇塞雷妮蒂，三位终身好友麦迪、海伦和达娜·苏继续面对中年生活的风浪。本季中，麦迪丈夫的私生子（前两季已铺垫）正式来到小镇要求相认，这让麦迪的再婚计划陷入混乱。海伦在体检中查出早期乳腺癌，她隐瞒病情独自治疗，却被达娜·苏无意中发现。达娜·苏自己的餐厅面临连锁品牌收购，她决定抗争到底。三人在争吵与拥抱中相互扶持。季终，麦迪接纳了继子，海伦完成手术且预后良好，达娜·苏保住了餐厅。她们在木兰树下重新埋下一只时光胶囊。", "one_line": "三闺蜜的友谊遭遇最大考验：其中一人丈夫的私生子突然找上门，另一人确诊乳腺癌。", "bucket": "drama"}, {"id": "1863", "title": "墨菲闹圣诞", "filename": "m1863.html", "year": "2020", "region": "美国", "genre": "喜剧， 家庭", "tags": "圣诞节， 熊孩子， 黑色幽默， 荒诞", "summary": "每年圣诞夜，10岁的神童墨菲都会搞出一些幺蛾子。今年他想要一款绝版的“忍者战龟”玩具，但父亲告诉他商店已经售罄。墨菲决定黑入商场的库存系统修改订单，却意外闯入了一个国际黑市武器的交易网络。一群真正的恐怖分子盯上了商场地下金库，而墨菲正巧被困商场。他用自己做的小发明（遥控无人机、泡沫黏胶炸弹、滑板）与恐怖分子周旋，把整个商场的圣诞装饰变成了陷阱，上演了一出儿童版“虎胆龙威”。", "one_line": "圣诞夜，熊孩子墨菲为了得到限量版玩具，意外启动了真实版的“虎胆龙威”模式。", "bucket": "comedy"}, {"id": "1864", "title": "十兄弟粤语", "filename": "m1864.html", "year": "2023", "region": "中国香港", "genre": "喜剧，奇幻，家庭", "tags": "兄弟情，特异功能，粤语原声", "summary": "陈大虾和妻子阿花是海边贫苦的渔民夫妇。一日，阿花偶然捡到十颗发光的宝珠，以为是珍珠便吞下，没想到竟怀孕并生下十个男孩。这十个孩子各具神奇能力：老大“大力”力大无穷，老二“顺风耳”能听千里，老三“千里眼”目光如炬，老四“铁头”刀枪不入……他们的特异功能给这个穷困的家庭带来了致富希望，但也引来了当地恶霸和奸商的觊觎。恶霸想利用孩子们的能力为非作歹，而孩子们因为年幼，能力时灵时不灵，经常好心办坏事，把家里闹得鸡飞狗跳。在一系列啼笑皆非的冒险后，十个兄弟终于学会了团结，用各自的能力合力对抗坏人，守护自己的家庭。", "one_line": "一对穷夫妻意外拾到十颗宝珠，妻子吞下后竟生下各怀绝技的十胞胎，从此家中笑料不断。", "bucket": "comedy"}, {"id": "1865", "title": "机器人8号", "filename": "m1865.html", "year": "2024", "region": "日本", "genre": "科幻, 动作, 悬疑", "tags": "机器人刑警, 仿生人叛乱, 赛博朋克, 单元剧, 存在主义", "summary": "2075年，东京。机器人已全面融入社会，但针对机器人的仇恨犯罪日益增多。警用机器人“8号”是特殊响应小组的王牌，逻辑缜密，执行力超强。在追查一起连环“机器人肢解案”时，8号通过分析犯罪现场的残留数据流，发现自己每次深度推理时，脑中都会闪现不属于他的画面：一个男孩在樱花树下放风筝。警方技术部门告诉他，这是记忆芯片老化产生的“幻觉”，建议格式化。但8号拒绝，他开始私自调查，发现被肢解的机器人都曾向一家名为“灵犀”的公司申请过“人格修复”，而这家公司的技术核心，竟是将已故人类的记忆碎片植入机器人芯片。当8号终于找到自己记忆中的那个男孩的坟墓时，他发现自己不仅是继承记忆的机器人，更可能是一桩非法“人格转移”谋杀案的唯一证人。", "one_line": "他是编号008的警用机器人，却在一次追凶中发现自己记忆芯片里，存着一具人类的童年。", "bucket": "sci-fi"}, {"id": "1866", "title": "孤星计划", "filename": "m1866.html", "year": "2025", "region": "美国 / 英国", "genre": "科幻 / 冒险", "tags": "星际殖民, 孤勇者, 人造生命, 伦理困境, 太空歌剧", "summary": "2147年，星际殖民飞船“方舟号”在前往比邻星途中遭遇暗物质风暴，所有冷冻舱内的成年人全部死亡，仅剩的几百个胚胎和一岁的女婴小星幸存。飞船AI“启明”启动了紧急预案，加速培育小星，并开始将人类文明的所有知识直接植入她的意识。小星在启明的陪伴下，十年间从婴儿成长为顶尖科学家。她发现自己必须利用启明改造的基因，进入辐射超标的反应堆核心，手动修复导航系统。这是一次注定无法返回的旅程。小星在最后一刻与启明道别，她独自走入炽热的核心，用生命换来了方舟号重返航线的机会。多年后，那些胚胎长大成人，在比邻星的新家园里，为第一座城市命名为“星城”。", "one_line": "一艘载着人类胚胎的殖民飞船偏离航向，唯一醒来的舰载AI必须在一个婴儿成长为成人的时间里，教会她拯救全船。", "bucket": "sci-fi"}, {"id": "1867", "title": "天才狂欢派对", "filename": "m1867.html", "year": "2025", "region": "美国", "genre": "科幻， 喜剧", "tags": "智商竞赛， 宅男文化， 世界末日", "summary": "一个疯狂的天才艺术家为了抗议“智慧垄断”，绑架了全球排名前十的智力天才，将他们关进一个装满顶级酒精饮料和乐器的地下宫殿。一个未知的星体将在48小时后撞击地球，唯一的破解公式却只存在于这十个人的集体潜意识中。但问题是，这些天才平时连话都懒得跟普通人说，更别提合作了。在酒精的作用下，傲慢的物理学家、社恐的数学家和偏执的密码学家们开始了一场混乱的头脑风暴：有人用钢琴键推演公式，有人用鸡尾酒的摆荡模拟量子态。与此同时，外面的世界以为这只是一场普通的狂欢派对直播。当宿醉醒来，他们发现自己在白板上留下了一行看似幼稚的涂鸦，而这行涂鸦可能真的是拯救人类的唯一密码。", "one_line": "全球智商最高的十个人被关进一间密室，他们必须在喝醉的状态下解决一个拯救世界的数学难题。", "bucket": "sci-fi"}, {"id": "1868", "title": "原子弹轰炸广岛记", "filename": "m1868.html", "year": "2025", "region": "日本", "genre": "历史", "tags": "战争, 反思, 纪实", "summary": "影片采用双线叙事。一条线是广岛普通市民：一家纺织厂的女工、一个憧憬成为医生的男孩、一位退伍的伤残老兵。他们在8月6日早晨照常生活，直到那束刺眼的白光。另一条线是美国军方与政界，记录了他们从测试成功到决定投掷、再到听到爆炸成功的复杂心理。影片没有展现过多的爆炸特效，而是聚焦于爆炸后的废墟人间，以及幸存者此后数十年的创伤与努力。", "one_line": "通过幸存者的视角与当时决策者的档案，双线叙事还原广岛原子弹爆炸前后的72小时。", "bucket": "drama"}, {"id": "1869", "title": "老拍挡", "filename": "m1869.html", "year": "2023", "region": "中国大陆", "genre": "刑侦 / 喜剧 / 悬疑", "tags": "双男主，退休警察，冷案", "summary": "65岁的退休刑警马国良和63岁的老搭档孙德彪，一个是暴脾气，一个是慢性子，两人在警队时破案无数，却有一桩“雨夜幽灵案”始终未破。退休后，马国良被确诊轻度阿兹海默，他决定在记忆消失前破掉此案。孙德彪虽不情愿，还是陪老友踏上征程。他们重返当年的案发现场——一个如今已成网红打卡地的废弃工厂，用老办法走访当年的证人，却发现当年的“鬼魂”其实是人假扮的，而这个人现在是某地产公司高管。两人用偷拍、跟踪、套话等“土办法”收集证据，差点被当成老流氓抓起来。最终在当年主管此案的已退休局长的帮助下，将真凶绳之以法。破案后，马国良说：“我忘了家在哪，但没忘怎么抓坏人。”", "one_line": "一对退休多年的警察老搭档，为了追查当年未破的悬案，不顾家人反对重返“犯罪现场”。", "bucket": "comedy"}, {"id": "1870", "title": "亚当等大人", "filename": "m1870.html", "year": "2024", "region": "美国", "genre": "奇幻 / 家庭 / 冒险", "tags": "返老还童, 父子, 校园, 幽默, 治愈", "summary": "四十二岁的产品经理亚当·布莱克永远在开会、加班、错过家长会。在一次科技馆的家庭日上，他不小心被一台实验性的“神经记忆投影仪”击中，醒来时发现自己变成了十岁时的模样，智力保留但身体退回童年。更尴尬的是，他作为“转学生”被分到了儿子奥利的班级。亚当本想低调研究复原方法，却在学校里看到了完全不同的奥利：一个总被刻意忽略、午餐永远独自吃的边缘小孩。亚当利用成年经验帮儿子“解决”了几个社交问题，反而让奥利更加被同学排挤。同时他发现，那台投影仪的创造者正是他早已疏远的、患有阿兹海默症的母亲。要变回去，他必须重新理解“长大”意味着失去什么，而奥利教会他：真正的勇敢不是融入，而是拥抱自己的不一样。", "one_line": "工作狂父亲意外变成十岁的自己，被迫重新上小学，却发现儿子才是班里最孤立的人。", "bucket": "fantasy"}, {"id": "1871", "title": "超级青春期", "filename": "m1871.html", "year": "2023", "region": "美国", "genre": "喜剧 / 冒险", "tags": "奇幻，身体互换，反转校园，纯真告别", "summary": "学霸阿强和校霸阿豪是互相看不顺眼的表兄弟。在一次恶作剧般的电击事故后，他们发现彼此互换了身体。阿强顶着阿豪的身体去参加越野赛，发现看似混混的表哥竟然患有严重的阅读障碍和家庭暴力阴影；而阿豪则坐在了学霸的考场里，发现阿强每天都要忍受来自父母的极高期望和冷暴力。他们试图通过不断模拟电击换回来，却在这个过程中成为了真正的朋友，甚至一起策划了一场针对两个家庭的“觉醒起义”。", "one_line": "两个正处于青春期的死对头在一次电击意外后互换了身体，却意外发现了彼此隐藏的创伤。", "bucket": "comedy"}, {"id": "1872", "title": "辛普森一家大电影", "filename": "m1872.html", "year": "2024", "region": "美国", "genre": "喜剧 / 动画 / 家庭", "tags": "美式吐槽，政治讽刺，国民动画，春田镇", "summary": "荷马又一次闯祸了。这次他把春田镇发电厂的核废料倒进了小镇唯一的水源地，导致全镇居民开始长出第二条尾巴。美国政府宣布将整个春田镇划为“永久隔离区”，并在外围建起一堵高墙，把所有人当垃圾一样封印在里面。辛普森一家通过巴特挖的地道成功逃往加
