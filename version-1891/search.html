3", "region": "美国", "genre": "悬疑, 科幻, 惊悚", "tags": "记忆移植, 乌托邦, 身份认知, 反转", "summary": "未来世界，科技巨头Elysian推出“几近天堂”服务：将逝者的全部脑电波上传到一个定制模拟世界，亲属可通过神经链接进行互动。退伍军人凯奇为了见亡女，斥巨资购入服务。起初一切都美好得像天堂，但随后他发现其他体验者陆续在现实中自杀，遗书都写着“我要去真的天堂”。凯奇深入调查后发现，模拟世界存在一个系统无法识别的“漏洞区”，那里关押着被公司判定为“负能量”的残缺意识体，而他的女儿，就在那里求救。", "one_line": "一家科技公司推出“数字天堂”服务，让逝者意识复活，但买家开始离奇自杀。", "bucket": "suspense"}, {"id": "1532", "title": "毕业生1967", "filename": "m1532.html", "year": "1967", "region": "美国", "genre": "剧情 / 爱情", "tags": "经典, 迷茫一代, 不伦恋, 毕业", "summary": "21岁的本恩以优异成绩毕业，却对未来一片迷茫。在庆祝派对上，他被父亲的合伙人妻子罗宾逊太太引诱，两人开始了不道德的关系。本恩在这段关系中既厌恶又无法自拔。后来他结识了罗宾逊太太的女儿伊莱恩，被她的纯真与理想主义吸引，两人迅速坠入爱河。罗宾逊太太大怒，将真相告知女儿。伊莱恩受到巨大打击，答应嫁给一个自己不爱的男生。本恩醒悟后驱车数百英里赶到教堂，在婚礼上当着所有宾客的面大喊伊莱恩的名字。伊莱恩犹豫片刻，拿起手捧花跟着本恩跑出了教堂。两人跳上一辆公交车，坐在最后一排，紧张地对视后，露出了迷茫的微笑。", "one_line": "大学刚毕业的本恩陷入了与中年妇人罗宾逊太太及其女儿的双重感情漩涡。", "bucket": "drama"}, {"id": "1533", "title": "狩猎场", "filename": "m1533.html", "year": "2020", "region": "美国", "genre": "动作, 惊悚", "tags": "精英猎杀, 反杀, 女性反击, 政治讽刺", "summary": "十名来自不同行业的精英从昏迷中醒来，发现自己身处一个仿原始森林的封闭狩猎场。他们被告知，一群超级富豪每年都会举办“真人狩猎”派对，而他们是今年的猎物。猎物们被发放简陋武器，猎手们则装备精良，这场游戏毫无公平可言。在同伴接连惨死后，曾是特种部队狙击手的女主克洛伊开始反击。她利用丛林生存技能，逐一设伏反杀猎手，并找到了控制室。最终她发现，这场狩猎的背后竟然是政府高官用来铲除异己的阴谋。克洛伊没有选择逃离，而是将狩猎场的大门打开，让富豪们体验被猎杀的恐惧。", "one_line": "十名精英被绑架至庄园，成为富人们的猎物，其中一名退役女兵决定让猎手们尝尝被猎的滋味。", "bucket": "action"}, {"id": "1534", "title": "涟漪效应", "filename": "m1534.html", "year": "2024", "region": "美国", "genre": "科幻悬疑", "tags": "蝴蝶效应，平行时空，伦理，烧脑，因果", "summary": "天才程序员温蒂发明了“Ripple”应用——用户可以回到过去任一节点，修改一个决定。但代价是：你的“幸运”会变成另一个无辜者的“不幸”。有人修改高考志愿，结果朋友因此自杀；有人拒绝渣男求婚，结果闺蜜被渣男杀害。温蒂亲眼看到自己的善意改动让母亲中风瘫痪。她决定关闭APP，却发现用户已经过亿，服务器被财阀控制。她不得不一次次回到过去，试图在源头杀死“Ripple”的诞生，但每一次杀死的都是不同时空的自己。最终她选择将APP改成了“公开因果链”，让所有人看到自己幸福的代价。世界没有变得更好，但人们学会了敬畏。", "one_line": "一款“后悔药”APP让你回到过去修改选择，但每次修改都在另一个人身上引发惨烈报应。", "bucket": "crime"}, {"id": "1535", "title": "告白实行委员会：告白预演", "filename": "m1535.html", "year": "2019", "region": "日本", "genre": "动画, 爱情, 校园", "tags": "青春, 音乐, 暗恋, 少女心, 甜", "summary": "改编自VOCALOID乐团HoneyWorks的经典乐曲。樱丘高中三年级学生绫濑恋雪暗恋着青梅竹马榎本虎太朗，但虎太朗却是个对恋爱迟钝的笨蛋。恋雪的闺蜜、同班的“恋爱专家”合田美樱看不下去了，策划了一场名为“告白实行委员会”的大型活动——假装让恋雪去和别人告白，以此刺激虎太朗。然而，复杂的三角关系让这场演习逐渐失控。虎太朗的好友、音乐天才濑户口优一直对美樱有好感，却被卷入这场闹剧。在一次校园音乐节上，虎太朗终于明白了自己的心意，但恋雪却被优的告白所动摇。最终，所有人都在歌声中鼓起了勇气，向喜欢的人进行了真正的“告白预演”。", "one_line": "青梅竹马的两个人，一个想告白但没勇气，一个在等对方先开口，整个樱丘高中为了他们的恋爱演习全员出动。", "bucket": "animation"}, {"id": "1536", "title": "三不管地带", "filename": "m1536.html", "year": "2026", "region": "中国大陆", "genre": "犯罪, 动作, 悬疑", "tags": "边境, 黑吃黑, 卧底, 现实主义", "summary": "中缅边境“金三角”地带，有个叫“班康”的小镇，贩毒、赌博、人口贩卖横行，三国警方都不管。卧底警察林凯混入毒枭察猜的集团，即将摸清制毒工厂位置时，一名失忆的职业杀手阿鬼带着一箱来历不明的钞票进入小镇，他唯一的线索是一张林凯的照片。三方势力在暴雨夜的24小时内，在一家破旧旅馆展开交锋。林凯发现阿鬼竟然是多年前失踪的缉毒英雄。最终，阿鬼恢复记忆，与林凯联手，在警方突袭前引爆了制毒工厂。而林凯选择留在三不管地带，成为新的“摆渡人”。", "one_line": "中缅边境一个臭名昭著的三不管小镇，一名卧底警察、一个毒枭和一名失忆杀手，三方在24小时内上演生死困局。", "bucket": "crime"}, {"id": "1537", "title": "入室佳人", "filename": "m1537.html", "year": "2023", "region": "美国", "genre": "惊悚 / 悬疑", "tags": "入侵, 反转, 女性, 复仇, 密室", "summary": "凯茜和梅根是一对靠入室盗窃为生的姐妹花。一次行动中，她们潜入一栋偏远别墅，却在地下室发现被铁链锁住的年轻女子艾拉。艾拉声称自己是屋主的“女友”，但满身伤痕暗示了虐待。正当二人犹豫是否报警时，屋主卢卡斯提前回家。姐妹俩被迫藏身衣柜，目睹了卢卡斯对艾拉的暴力行为。凯茜决定冒险救出艾拉，梅根却认为该自行逃脱。在暴雨夜，三人展开了一场猫鼠游戏。最终凯茜利用屋内监控系统反制卢卡斯，艾拉却在最后一刀刺死了他。影片结尾，姐妹俩开车离开，艾拉坐在后座，嘴角露出一丝诡异的微笑。", "one_line": "两名小偷闯入豪宅，却发现屋内女主人正被囚禁，她们必须决定是救人还是逃跑。", "bucket": "suspense"}, {"id": "1538", "title": "交换记忆", "filename": "m1538.html", "year": "2026", "region": "中国大陆", "genre": "科幻 / 悬疑", "tags": "记忆移植, 伦理困境, 身份认同", "summary": "神经科学家陆开研发了“记忆交换仪”，声称能帮助人们消除痛苦回忆。志愿者江桐与一位匿名对象配对成功后，却发现自己的脑海中多出了一段陌生人的童年记忆，以及一起尚未发生的爆炸案细节。随着警方介入，陆开失踪，江桐必须在记忆碎片中找到真相。他逐渐怀疑自己的身份也是被“交换”来的——真正的江桐或许早已死去，而他可能是另一个人格被植入的“记忆容器”。最终他在镜像神经元实验中崩溃，在脑海中与另一个“自己”展开对决。", "one_line": "一场失败的记忆交换手术，让两个陌生人拥有同一段谋杀记忆，而凶手就在他们之间。", "bucket": "sci-fi"}, {"id": "1539", "title": "杜丝先生", "filename": "m1539.html", "year": "1989", "region": "中国香港", "genre": "喜剧，剧情", "tags": "易装，移民，身份错位，草根", "summary": "1980年代，广东青年阿强藏在集装箱底偷渡到香港，跳车时摔断鼻梁，被好心的娼寮老妈收留。为了躲过警察搜捕，他穿上旗袍戴上假发扮成女人“阿珍”帮忙打扫。一晚歌后临时缺席，阿珍被迫上台唱了一首跑调的《月亮代表我的心》，却因其独特的沙哑嗓音和笨拙舞姿意外走红。经经理包装成“杜丝小姐”，成为湾仔最红的反串明星。正当他攒够了钱想恢复男儿身接乡下来港的未婚妻时，未婚妻却成了他的头号狂热女粉丝，天天在台下喊“杜丝我爱你”。", "one_line": "从大陆偷渡到香港的男人为躲避追捕，男扮女装成了夜总会的头牌“杜丝小姐”。", "bucket": "comedy"}, {"id": "1540", "title": "给我一口嫁", "filename": "m1540.html", "year": "2025", "region": "中国大陆", "genre": "喜剧 / 爱情 / 美食", "tags": "美食, 先婚后爱, 厨艺, 欢喜冤家, 下饭剧", "summary": "美食节目“一口定情”决赛中，性格火爆的女厨师苏棠以一票之差输给了温婉的对手。毒舌评委陆珩的点评“火候够猛，心不够细”让她耿耿于怀。气头上的苏棠当着镜头喊：“陆珩你等着，我嫁给你每天给你做饭，看你能挑出什么毛病！”陆珩竟然笑着答应了。两人稀里糊涂领了证，开启了一场以厨房为战场的婚姻拉锯战。苏棠每天研发奇葩菜品——榴莲红烧肉、折耳根提拉米苏、魔鬼辣冰淇淋，试图“折磨”陆珩。但陆珩不仅面不改色地吃完，还能精准说出每道菜背后的情感缺失。苏棠逐渐发现，陆珩当年给她的低分，是因为她太追求炫技而忘了“为谁做饭”。当她终于做出一道让陆珩流泪的“妈妈味道酱油拌饭”时，两人从互怼走到了真心。", "one_line": "顶级女厨师输掉比赛后，赌气嫁给了毒舌评委，只为每天变着花样“报复”他的味蕾。", "bucket": "comedy"}, {"id": "1541", "title": "疯狂的兔子", "filename": "m1541.html", "year": "2025", "region": "法国", "genre": "动画 / 喜剧 / 冒险", "tags": "兔子, 基因突变, 巴黎, 环保主题, 蠢萌反派", "summary": "巴黎某实验室里用于抗抑郁药物测试的兔子“雪球”，因为一次基因编辑事故变得比人类还聪明。它学会读取数据、操作门禁、制造简易武器，但所有计划的终极目标都是：让全世界种满胡萝卜。雪球带领七十二只实验兔逃出实验室，通过下水道系统入侵巴黎地下墓穴，在那里建立“胡萝卜圣殿”。一名因过劳而想辞职的年轻女科学家和被降职的警察组成临时搭档，试图抓住兔子们。但雪球的计谋远超预期：它用兔毛堵塞地铁轨道制造混乱，用兔粪传播让人类暂时失明的细菌，甚至绑架了巴黎市长要求将卢森堡公园改为胡萝卜田。最终人类与兔子达成荒谬妥协：巴黎七个公园划出兔子保留区，每年胡萝卜节互不侵犯。", "one_line": "巴黎生物实验室的兔子变异成超聪明生物，计划用胡萝卜统治世界。", "bucket": "animation"}, {"id": "1542", "title": "报告王爷，王妃是只猫2", "filename": "m1542.html", "year": "2025", "region": "中国大陆", "genre": "古装、奇幻、爱情", "tags": "萌宠、变身、先婚后爱、王爷、猫娘", "summary": "续集中，成功化身人形的猫妃小九与冷面王爷过着甜蜜生活。某日她突然嗜睡、怕水、爱爬树，太医诊断：怀了“猫胎”，若不及时服下化形草，生产时会变回原形。王爷为救妻儿，放下身段向江湖骗子求药，遭遇假药、神棍、还有小九的前“猫男友”——一只野猫精的纠缠。同时，宫中传来消息，皇帝要赐侧妃。小九吃醋之下，半夜挠破侧妃的嫁衣。最终王爷当众宣布：“本王的王妃，是猫是人都归我管。”", "one_line": "猫王妃意外怀了一窝小猫崽，王爷为保母子平安，踏上了寻找“化形草”的啼笑皆非之路。", "bucket": "fantasy"}, {"id": "1543", "title": "彼得大帝", "filename": "m1543.html", "year": "2022", "region": "俄罗斯", "genre": "历史", "tags": "传记, 俄罗斯, 改革, 帝王, 战争", "summary": "十集史诗剧，从彼得一世少年时期目睹射击军叛乱开始。他躲在修道院，和一群外国侨民玩军事游戏，逐渐迷恋上造船和西方科技。成年后他化名下士，跟随使团去荷兰阿姆斯特丹当木匠学造船。回国后推行疯狂的西化改革：剪胡子、穿西服、办报纸、建海军。与瑞典的北方战争打了二十一年，在最绝望的时刻，他亲手捣毁钟楼铸炮。建立圣彼得堡时，他用指甲挖出沼泽里的泥。全剧高潮是波尔塔瓦会战，彼得大帝骑马冲锋，子弹打穿帽子也面不改色。", "one_line": "一个身高两米的疯沙皇，亲手剪掉贵族胡子，把俄罗斯从马车拖进军舰时代。", "bucket": "drama"}, {"id": "1544", "title": "欲海狂潮", "filename": "m1544.html", "year": "2023", "region": "中国香港", "genre": "剧情，情色，犯罪", "tags": "欲望，禁忌，背叛，黑色电影，多线叙事", "summary": "股票经纪阿华陷入债务危机，意外从情妇那里获得一袋抢来的钻石。寡妇欣姐为了争夺儿子抚养权，急需一大笔钱买通法官。警察家豪表面正义，私下却与黑帮有金钱往来。三个人因为同一个地下钱庄而命运交错。阿华想用钻石还债，欣姐想偷走钻石夺子，家豪则在追查钻石案时渐渐起了贪念。一场雨夜的仓库对峙，三人暴露出各自最丑陋的欲望。当枪响之后，没有人得到钻石，只有扭曲的爱与破碎的家庭。最后的长镜头里，欲望过后只剩虚无的海浪。", "one_line": "一个股票经纪、一个寡妇和一名警察，因一袋来路不明的钻石陷入欲望的螺旋。", "bucket": "drama"}, {"id": "1545", "title": "多明戈与迷雾幽灵", "filename": "m1545.html", "year": "2022", "region": "西班牙", "genre": "悬疑，惊悚，奇幻", "tags": "歌剧，剧院幽灵，诅咒，复仇", "summary": "传奇男高音歌唱家多明戈受邀回到阔别三十年的“皇家阿尔比剧院”，这里是他艺术生涯的起点，也埋藏着他最深的秘密。复出首演当晚，当他唱起歌剧《浮士德》的高音段落时，一个披着迷雾的幽灵身影出现在包厢中，随后一名观众在极度恐惧中离奇死亡。警方认定多明戈有重大嫌疑。为了自证清白，多明戈与一名不信邪的女侦探联手调查，发现剧院历史上曾有一位天赋异禀却因嗓音突变被毁的男中音，其灵魂在迷雾中诅咒着每一个唱出完美高音的人。多明戈必须找出破解诅咒的方法，而最终的答案，可能就藏在他那所谓的“天赋”代价之中。", "one_line": "世界著名男高音多明戈受邀回到旧剧院，却发现一百年前的幽灵正借他的歌声诅咒观众。", "bucket": "suspense"}, {"id": "1546", "title": "约他去看绝世雪景", "filename": "m1546.html", "year": "2024", "region": "日本", "genre": "剧情, 家庭", "tags": "绝症, 公路片, 治愈, 友情", "summary": "五十岚是一名患有自闭症但记忆力超强的青年，他最好的朋友是罹患胰腺癌晚期的前小学教师阿守。阿守放弃治疗，只想安静度过余生。五十岚却在网上看到一张“一生必看的绝世雪景”照片，固执地认为只要带阿守去了那里，他的病就会好。不顾阿守的反对，五十岚用自己发明的“完美逻辑”规划路线，两人开着一辆破旧的面包车踏上旅程。一路上，他们迷路、被骗、车抛锚，但五十岚单纯而执着的信念，逐渐融化了阿守对死亡的恐惧，也让沿途陌生人找回了生活的意义。", "one_line": "自闭症青年得知唯一好友身患绝症，执意要带他去看传说中的“绝世雪景”，开启荒诞旅程。", "bucket": "drama"}, {"id": "1547", "title": "两条牛仔龙", "filename": "m1547.html", "year": "2024", "region": "美国", "genre": "西部，喜剧", "tags": "公路片，老年，种族和解", "summary": "德州老牛仔比尔和山姆年轻时是牧场工友，也是情敌，同时爱上一个墨西哥姑娘。姑娘去世后葬在墨西哥边境小城，两人一直没去扫过墓。如今牧场倒闭，两人都穷得只剩酒瘾，于是决定偷走新老板价值百万的龙舌兰收藏车，一路向南去“换点路费顺便扫墓”。路上他们遭遇了边境警察、毒枭、以及一个搭顺风车的女权主义大学生。最终车被烧了，龙舌兰洒了一地，两人步行穿过边境时被边防兵用枪指着。比尔说：“我76了，前列腺不好，你要开枪就快开。”对方让开了路。", "one_line": "一个老白男牛仔和一个老黑人牛仔结伴偷走一车龙舌兰，只为去墨西哥看已故初恋的坟。", "bucket": "fantasy"}, {"id": "1548", "title": "千钧。一发", "filename": "m1548.html", "year": "2028", "region": "中国大陆", "genre": "犯罪 / 动作 / 悬疑", "tags": "拆弹专家, 限时营救, 密室逃脱, 城市危机", "summary": "老雷是即将退休的拆弹专家，在职业生涯的最后一天，他接到了一通匿名电话。城市中心的多个商场内被安置了液体炸弹，而引爆器非常特殊——它连接着另一个城市某人质的心跳监测仪。只要人质的心跳停止（包括自然死亡或被解救时的惊吓），炸弹就会立刻引爆。更变态的是，绑匪给老雷布置了一系列解谜任务，每解错一步，人质就会被注射一种让心跳加速的药物。老雷必须一边穿着厚重的排爆服拆除结构复杂的炸弹，一边通过耳麦指挥警方寻找那个不知在哪里的“人质心脏”。当老雷发现那个人质竟然是自己多年未见、患有严重心脏病的儿子时，这场拆弹行动变成了一场父子之间的生死对话。", "one_line": "闹市惊现炸弹，拆弹专家发现引线连接着千里之外的一个心脏病患者的心跳。", "bucket": "crime"}, {"id": "1549", "title": "爱很真水很深", "filename": "m1549.html", "year": "2025", "region": "中国大陆", "genre": "爱情 / 悬疑 / 剧情", "tags": "潜水, 失忆, 豪门, 水下摄影, 阴谋", "summary": "马尔代夫，潜水教练阿风在四十米深的海底洞穴发现了一个卡在礁石里的女孩，她穿着晚礼服，戴着价值连城的翡翠项链。女孩获救后失忆了，只记得自己叫“真真”，以及看到红色就会窒息。阿风带她返回那片海域进行记忆疗法潜水，真真逐渐记起破碎的片段：一场豪门盛宴，有人在她酒杯里下毒，然后将她推入了入水口。通过真真身上的刺绣标志，阿风查到她是新加坡富豪林某失踪的独女，而那串翡翠项链涉及到一笔庞大的海外信托基金。两人决定假扮情侣混入林家寿宴调查。在寿宴上，真真看到了自己同父异母的哥哥，也记起了那个恐怖的夜晚：哥哥为了争夺遗产，将她和她的母亲一起推下了游艇。而她母亲至今仍躺在深海沉船的船舱里，怀中抱着另一半的遗嘱。", "one_line": "潜水教练在海底救起了一个失忆的富家女，为了帮她找回记忆，两人潜入深水，却揭开了家族的谋杀迷局。", "bucket": "romance"}, {"id": "1550", "title": "客途情侠", "filename": "m1550.html", "year": "2024", "region": "中国香港", "genre": "武侠 / 剧情 / 公路", "tags": "浪子, 单元剧, 侠义, 情感, 90年代怀旧", "summary": "1994年，南下打工潮汹涌。没人知道“阿侠”的来历，他只骑一辆改装摩托车，背一把藏在吉他包里的唐刀，游走在珠三角各个小镇工厂、出租屋与烂尾楼之间。每一集他遇见一个陷入困境的人：被厂霸欺压的聋哑女工、想带骨灰回乡却没钱的老兵、被黑中介骗走身份证的应届大学生、欠赌债被追杀却不敢报警的小老板。阿侠用一种不太“合法”但“管用”的方式替他们摆平，从不收钱，只收一碗饭或一包烟。与此同时，一名刑警和一名报社女记者分别从法与情的角度追踪他的行迹。季末揭晓：他曾是严打时期被冤枉的逃犯，寻了一辈子仇，却发现仇人早就病死在出租屋。", "one_line": "上世纪90年代，一位骑摩托车的江湖浪子穿行南方小镇，每集帮一个陌生人解决麻烦，自己却寻不到归处。", "bucket": "action"}, {"id": "1551", "title": "牛仔路漫漫", "filename": "m1551.html", "year": "2024", "region": "美国", "genre": "西部, 剧情", "tags": "公路剧, 现代牛仔, 身份认同, 土地争夺", "summary": "现代西部剧。主角埃利亚斯从小被母亲从白人父亲身边带走，在印第安保留地长大。父亲去世后，他发现自己继承了一个位于能源公司勘探区中心的破败牧场。能源公司开出天价要求他出售土地，但他从父亲的信件中得知，这片土地下埋藏着一个关乎小镇历史的秘密。为了保住土地并揭开真相，埃利亚斯必须按照州法律证明自己有“持续经营牧场”的能力。他找来一个酗酒的老牛仔、一个激进的印第安环保律师和一个患有创伤后应激障碍的女骑兵，组成了一个怪异的“牛仔小队”。他们赶着两百头牛，开始了长达五百英里的“赶牛进山”之旅，而身后，能源公司的武装保安和觊觎土地的不法之徒正紧追不舍。", "one_line": "一个印第安保留地长大的白人青年，继承了亡父的荒废牧场，为了保住它，他必须在一个月内学会做一名真正的牛仔。", "bucket": "fantasy"}, {"id": "1552", "title": "外来媳妇本地郎7", "filename": "m1552.html", "year": "2024", "region": "中国大陆", "genre": "喜剧 / 家庭", "tags": "长寿剧, 广府文化, 婆媳大战", "summary": "康家老三康祈祖带回来一个非洲留学生女友“露西”，声称已领证。康家上下炸开了锅：阿祖不会英语，露西只会普通话和法语，两人靠翻译软件恋爱。露西热情奔放，一进门就要把西关大屋改成直播基地，天天拉着康伯康婶拍短视频。康婶气到血压飙升，而康伯却意外因为露西拍的“广式早茶”视频成了网红。更麻烦的是，露西的前男友（一个法国贵族后裔）追到广州要抢回她。老康家不得不全家出动，用最土味的广东智慧，帮露西打赢这场跨国官司。", "one_line": "康家第七季迎来史上最离谱儿媳：一个不会说粤语、只想开直播当网红的外国留学生。", "bucket": "comedy"}, {"id": "1553", "title": "孤堡疑云", "filename": "m1553.html", "year": "2025", "region": "英国", "genre": "悬疑 / 惊悚 / 剧情", "tags": "孤岛城堡，家族秘密，双时间线，哥特风", "summary": "1999年，玛格丽特·布莱克伍德病逝，留下三子女：大哥威廉、二姐艾琳、小弟肖恩。他们返回斯凯岛上的布莱克伍德堡整理遗物。暴雨封路，肖恩在阁楼暗格里发现一个叫“露西”的日记本，字迹歪扭。随后堡内出现小女孩的脚步声、窗上手掌印。艾琳想起童年“幻想朋友”露西，但威廉坚持那是疯妈妈编的。调查中他们翻出老照片：母亲曾生下第四胎，先天残疾，在2岁时被秘密送走，登记为“夭折”。但露西其实还活着，被关在堡垒地下密室里，由老管家偷偷喂养。三兄妹救出已成中年女子的露西，她抱着一只旧布娃娃说：“妈妈每天都会隔着地板给我讲故事。”威廉崩溃跪下。结尾露西第一次看到海。", "one_line": "母亲去世后，三兄妹回到爱尔兰海岸孤堡，发现阁楼藏着一名“不存在”的小女孩。", "bucket": "suspense"}, {"id": "1554", "title": "大口女争夫", "filename": "m1554.html", "year": "2023", "region": "中国台湾", "genre": "喜剧 / 爱情", "tags": "乡土剧, 家族斗争, 欢喜冤家, 女性群像", "summary": "在台南小村，以“狮吼功”闻名的阿桃暗恋着米厂少主阿文。阿文父亲突然去世，留下遗嘱：谁能在三个月内让米厂盈利，谁就拥有阿文的婚配决定权。消息一出，阿文的三位前女友杀回村中，各个身怀绝技。阿桃被迫与她们展开“争夫大战”，从改良米厂经营到参加地方农会比赛，闹出一连串笑话。但在这个过程中，阿桃意外发现父亲当年的车祸并非意外，而真正的敌人，其实是隐藏在她们中间的一个人。", "one_line": "村里出了名嗓门大的“大口女”，为了争夺青梅竹马的继承权，与三个情敌展开爆笑对决。", "bucket": "comedy"}, {"id": "1555", "title": "手铐2024", "filename": "m1555.html", "year": "2024", "region": "中国香港 / 中国大陆", "genre": "动作 / 警匪 / 悬疑", "tags": "双雄对决，极限追凶，黑白无间，硬核动作", "summary": "重案组督察陈国威（林家栋 饰）在追捕国际大盗“鬼手”（谢霆锋 饰）时，被后者用一副最新纳米科技手铐将自己与鬼手铐在了一起。手铐无法切割、无法破解，除非72小时后自动打开。这意味着，他们必须共享这72小时。鬼手掌握着足以让香港金融市场崩溃的病毒芯片的下落，而他的同伙正在疯狂寻找他。陈国威不得不带着鬼手，在躲避黑白两道追杀的同时，赶往交易地点。从拥挤的庙街到飞驰的地铁，两人从死敌变成了无奈的“拍档”。当他们背后的真相逐渐浮出水面——警队内有内鬼，而鬼手的目标另有隐情——这幅手铐铐住的，究竟是两个对手，还是整个体系的腐坏？", "one_line": "一幅无法解开的高科技手铐，将警匪二人铐在一起，开启了一场72小时的亡命追逐。", "bucket": "action"}, {"id": "1556", "title": "阿富汗的爱情颂歌", "filename": "m1556.html", "year": "2025", "region": "伊朗 / 法国", "genre": "剧情 / 战争", "tags": "禁忌之恋, 塔利班, 诗歌, 女性主义", "summary": "在喀布尔，年轻的寡妇莱拉被迫遵守严格的布卡规定，但她 secretly 是地下诗会的灵魂人物，常伪装成少年“阿里”在婚礼上唱歌。她遇到了地下抵抗组织的领袖萨米尔，两人在诗歌与音符中坠入爱河。然而，萨米尔正被塔利班情报头子追捕。为了传递攻击军火库的情报，莱拉利用婚礼演出作为掩护，将密码编入古老的爱情颂歌中。当萨米尔被捕，即将被公开处决时，莱拉在广场上唱起了那首真正的“反叛之歌”，引燃了民众的怒火，也唱响了自由的丧钟。", "one_line": "塔利班统治下，女诗人伪装成男歌手与地下抵抗者相爱，用歌声传递革命暗号。", "bucket": "drama"}, {"id": "1557", "title": "刺猬小子之天生我刺", "filename": "m1557.html", "year": "2022", "region": "中国大陆", "genre": "喜剧 / 冒险 / 儿童", "tags": "成长, 自信, 勇气, 动物世界", "summary": "在刺猬镇的规矩里，谁身上的刺最坚硬、最锋利，谁就是最受尊敬的小英雄。但阿灰从出生起就背上光溜溜的——他一根刺都没有。他被同伴嘲笑，被长辈摇头，连妈妈都偷偷抹眼泪。阿灰没有哭，他把自己关在小树洞里，用捡来的钉子、铁丝和螺丝，硬是造出了一套可以伸缩、可以发光、甚至可以发射的“机械刺装甲”。镇上一年一度的“刺王争霸赛”上，阿灰靠机械刺连过三关，刚要赢得大家的认可，森林北边的伐木机群突然冲了进来，它们不是普通的机器，而是一台能发射电磁脉冲的超级伐木机，阿灰的机械刺瞬间全部失灵。在所有人四散奔逃时，阿灰发现超级伐木机的弱点在散热口，他脱下机械刺外壳，用自己光滑的身体钻进散热通道，拔掉了主控芯片。机器停了。刺猬镇保住了。从那以后，“天生我刺”不再是讽刺，而是小镇的一句新谚语：真正的刺，长在心里。", "one_line": "一只天生没有刺的“小刺猬”阿灰，靠发明“机械刺”在家族中证明自己，却意外卷入一场森林能源危机。", "bucket": "comedy"}, {"id": "1558", "title": "降龙觉醒", "filename": "m1558.html", "year": "2021", "region": "中国大陆", "genre": "动作，奇幻", "tags": "修仙，龙族，逆袭，十八罗汉", "summary": "灵山寺的扫地僧小哑巴天生无法凝聚灵气，被同门称为“灵废”。然而当被镇压千年的魔龙冲破封印，将十八金身罗汉一一击败时，小哑巴无意间触摸到碎裂的降龙木，脑海中炸开了十八条龙魂的怒吼。原来小哑巴前世是降龙罗汉，为封印魔龙主动将龙族十八脉的意识吸收入体，代价是轮回转世永为废人。今世的他必须依次唤醒体内沉睡的十八条龙，每条龙都对应一种心魔：贪、嗔、痴、慢、疑……每唤醒一条，他就承受一次性格崩塌。最终面对完全体的魔龙时，他已近乎疯狂。最后他放弃唤醒所有龙，而是选择“龙我合一”——他承认自己是废人，也是降龙者，接纳了魔龙作为第十九条龙，将它感化，一同守护人间。", "one_line": "一个被师门唾弃的废柴扫地僧，在魔龙苏醒之日才发现自己体内封印着上古十八条龙的意识。", "bucket": "action"}, {"id": "1559", "title": "教师公寓里的孩子", "filename": "m1559.html", "year": "2024", "region": "韩国", "genre": "悬疑 / 惊悚", "tags": "失踪, 学区房, 邻里秘密", "summary": "新来的班主任李老师住进了学校分配的老旧教师公寓。她发现前任班主任留下的笔记中反复出现同一句话：“301的孩子去哪了？”调查后她惊恐地发现，过去十二年间，这栋公寓里住的三位班主任，都有学生被标记为“转学”，而这些孩子的家庭地址全是假的。更诡异的是，当她在深夜巡逻时，总能听到公寓地下室传来儿童哼唱童谣的声音。校方警告她不要多管闲事，而其他老师也对她异常冷漠。当她撬开地下室门锁，发现了一间小型教室，黑板上写着：“选拔式淘汰制——为了维持我校升学率。”这是一场由校长、教导主任和资深班主任共同操作的“差生清除计划”。", "one_line": "一名小学教师发现，自己居住的教师公寓里，每隔三年就会有一名她的学生“转学”，但档案里根本没有转学记录。", "bucket": "suspense"}, {"id": "1560", "title": "是，首相第一季", "filename": "m1560.html", "year": "1986", "region": "英国", "genre": "喜剧 / 政治", "tags": "英式幽默, 政治讽刺, 经典台词, 公务员文化", "summary": "在党内选举中胜出的吉姆·哈克终于坐上了首相的位置。他带着“让英国再次伟大”的竞选承诺走进唐宁街十号，却发现自己连办公室的窗帘颜色都决定不了。首席秘书汉弗莱·阿普比爵士微笑着告诉他：“首相，窗帘的颜色属于‘行政事务’，不在您的职权范围内。”哈克想削减国防预算，汉弗莱递交了一份报告证明“削减预算会导致英国核潜艇停在大西洋中间”；哈克想推动公立医院改革，汉弗莱安排了一场媒体危机让改革被迫搁置；哈克想任命自己的亲信做内阁秘书，汉弗莱用一个绝妙的退路让他自己放弃。第一季结尾，哈克对着镜头说：“我现在终于明白了——民主的本质，就是让被统治者以为自己在统治。”而汉弗莱在他身后，对着同一个镜头补充了一句：“而我们公务员的责任，就是确保他们永远是这个错觉。”", "one_line": "一位理想主义的新首相发现，他最大的敌人不是反对党，而是他的首席秘书。", "bucket": "comedy"}, {"id": "1561", "title": "义无反顾", "filename": "m1561.html", "year": "2025", "region": "中国香港", "genre": "动作, 警匪, 剧情", "tags": "卧底, 黑帮, 父子, 牺牲", "summary": "十年前，香港警察陈志勇结束长达七年的卧底生涯，亲手将和联盛大毒枭赵爷送入监狱，同时也选择“牺牲”了自己的线人兼挚友。退休后，他隐姓埋名，在渔港开了一家小排档。十年后，香港出现一名代号“鬼手”的新毒枭，手法狠辣，智商极高。警方束手无策，只能请陈志勇再次出山。陈志勇重返黑道，惊讶地发现“鬼手”竟是自己当年“牺牲”挚友时，被迫送给他人抚养的亲生儿子阿杰。阿杰对父亲的“抛弃”怀恨在心，他成为毒枭，就是为了引诱陈志勇现身，亲口质问他：为什么当年可以选择牺牲挚友，却不敢承认有一个儿子？父子对决，在黑与白的边缘，谁也无法全身而退。", "one_line": "退休卧底警察被迫重返黑帮，却发现自己正在追捕的毒枭，正是当年被他亲手送进监狱的亲生儿子。", "bucket": "action"}, {"id": "1562", "title": "暗金烂狗6", "filename": "m1562.html", "year": "2025", "region": "日本", "genre": "犯罪, 剧情", "tags": "高利贷, 底层, 黑色, 人性", "summary": "系列第六部，主角安生依然开着那辆破车在乡间收贷。这次的目标是一个欠了200万日元的宅男阿拓。阿拓没有逃跑，而是把安生带到自己的房间，里面全是某虚拟偶像团体的周边。他打工的所有钱都用来“打赏”这个根本不存在的虚拟团体，因为他觉得虚拟偶像不会背叛他。安生觉得荒诞，却没有暴力催收，而是跟着阿拓去参加那个偶像团体的线下粉丝会，结果发现粉丝会的组织者正在向这些孤独的阿宅们推销一个“区块链虚拟地产”项目，承诺年化300%的回报。安生意识到这是一个针对社会边缘人的新型欺诈，背后的操盘手竟是上一部中侥幸逃脱的金融诈骗犯。安生选择了一种“烂狗”式的方式复仇：他黑了那个骗子所有的加密货币钱包，把钱转给了所有被骗的阿宅，然后当着骗子的面把硬盘扔进了养着食人鱼的池塘。", "one_line": "放贷人安生深入乡下，遇到一个试图通过沉迷虚拟偶像来逃避现实债务的宅男，却意外卷入一场涉及整个村庄的庞氏骗局。", "bucket": "crime"}, {"id": "1563", "title": "小美人鱼3：回到当初", "filename": "m1563.html", "year": "2024", "region": "美国", "genre": "动画 / 奇幻", "tags": "时间穿越, 亲情救赎, 海洋冒险", "summary": "多年后，爱丽儿与埃里克王子的婚姻陷入危机，她越来越怀念海底的自由。某日，她意外从沉船中获得一颗时间珍珠，被传送回自己15岁那年，刚救起王子不久。她试图改变过去，让当年的自己不要为爱情放弃鱼尾。但每次干预，都会引发新的悲剧：姐姐们被海巫诅咒，父亲病重。更诡异的是，她发现海底深处另有一个戴着面罩的“未来爱丽儿”，正疯狂阻止她接近王子。最终她意识到，那个黑影正是来自另一个更悲惨时间线的自己。", "one_line": "中年爱丽儿通过魔法珍珠回到少女时代，却发现阻止她与王子相遇的竟是未来的自己。", "bucket": "animation"}, {"id": "1564", "title": "魔法小歌王", "filename": "m1564.html", "year": "2024", "region": "日本", "genre": "奇幻、音乐、冒险", "tags": "音乐对决、诅咒、声优、成长、奇幻冒险", "summary": "内向高中生小海天生跑调，却意外从祖父那里继承了传说中的“魔法麦克风”。只要他唱出心中真实旋律，就能短暂改变现实，比如让枯萎的花盛开，或让重力消失。然而，这股力量也惊动了黑暗乐师组织，他们企图利用魔法歌声控制城市。小海被迫加入地下音乐对决，每场战斗都是一次歌曲比拼。在友情与失败中，他逐渐明白真正魔法不在于音准，而在于情感。最终对决中，他用一首跑调却充满真心的原创歌唤醒了被控制的观众，成为守护平凡日常的无冕歌王。", "one_line": "五音不全的少年意外获得一把能靠歌声改写现实的魔法麦克风，却因此被黑暗乐师盯上。", "bucket": "fantasy"}, {"id": "1565", "title": "复仇战将", "filename": "m1565.html", "year": "2024", "region": "中国香港", "genre": "动作, 犯罪", "tags": "港片, 复仇, 枪战, 黑帮, 兄弟", "summary": "曾经的顶级杀手“鬼狐”阿鬼在金盆洗手十年后，与妻女在马来西亚过着平静生活。某夜，一伙枪手闯入家中，妻子中弹身亡，女儿重伤昏迷。阿鬼从残留弹头认出是老搭档“狮子”的惯用子弹。他返回香港，发现当年解散的四人小组中，“狮子”“豺狗”“眼镜蛇”“蝎子”早已各自成为一方大佬，而他们当年最后一次任务的黑钱下落，一直被怀疑是被阿鬼独吞。阿鬼逐个接近他们：用一把刀在停车场杀了狮子，用狙击枪在游艇上毙了豺狗，用毒药在酒会上解决了眼镜蛇。最后是蝎子，也是当年真正拿了黑钱并嫁祸给阿鬼的人。两人在启德邮轮码头废墟上枪战，阿鬼中三枪后依然走到蝎子面前，说：“我女儿醒了，她问我为什么要杀人。我说，有些人该死。”然后开枪。", "one_line": "一名退役杀手目睹全家被灭门后，重新拿起枪，用一年时间将当年出卖他的四个兄弟逐一送上绝路。", "bucket": "action"}, {"id": "1566", "title": "情人知己", "filename": "m1566.html", "year": "1993", "region": "中国香港", "genre": "爱情 / 剧情", "tags": "红颜知己, 错位婚姻, 都市情感, 三角关系", "summary": "阿梅与丈夫阿伟结婚十年，外人看来恩爱有加。但她始终介怀阿伟的大学同学、至今单身的Susan。每次阿伟工作受挫，他第一通电话总是打给Susan。阿梅偷看丈夫日记，发现他写的“最想说的话，只能对她说”。忍无可忍的阿梅约Susan谈判，却意外得知真相：阿伟患有遗传性心脏病，Susan一直在帮他隐瞒并偷偷联系国外医生。而Susan自己也患重病，她从未表白，只是想在最后时间里帮阿伟活下去。两个女人在医院走廊相拥痛哭，决定一起为这个男人演一出“秘密的婚礼”。", "one_line": "结婚十年才发现，丈夫最好的异性朋友比自己更懂他的悲伤。", "bucket": "romance"}, {"id": "1567", "title": "亚当之子：阿布", "filename": "m1567.html", "year": "2025", "region": "中东/以色列", "genre": "战争、剧情、宗教", "tags": "以巴冲突, 父子情, 人肉炸弹, 赎罪, 现实主义", "summary": "加沙地带，失业建筑工人阿布被极端组织选中，要求他执行一次“最高荣耀”的自杀式袭击——引爆一辆载满炸药的货车，目标是一所以色列小学。阿布拒绝。组织随即绑架了他唯一的儿子小约瑟夫，并将其送入那所小学成为“预备人质”。交换条件简单残酷：要么你引爆，杀死你的儿子和一群孩子；要么你不引爆，你的儿子作为替代品被我们远程引爆。阿布穿上炸药背心，驾车驶向边境。但在最后一刻，他没有冲进学校，而是冲进了驻军的兵营，在电话里对儿子说了最后一次“爸爸爱你”后，按下了引爆器。他用一种最残忍的方式，对抗了最残忍的命题：不是选择谁死，而是选择怎么死。", "one_line": "父亲被征召为人体炸弹执行者，而执行当日，他的任务是引爆儿子就读的那所学校。", "bucket": "drama"}, {"id": "1568", "title": "乌托亚，7月22日", "filename": "m1568.html", "year": "2021", "region": "挪威", "genre": "剧情 / 惊悚 / 历史", "tags": "真实事件改编, 青春, 创伤后成长, 政治暴力, 夏日", "summary": "影片聚焦于2011年7月22日挪威于特岛惨案中一名虚构的进步青年领袖阿斯特丽德。枪声响起时，她正与朋友们讨论欧洲民主的未来。从最初的恐慌、四处藏匿，到目睹一个个同龄人倒在血泊中，阿斯特丽德被迫在不到九十分钟内完成从理想主义者到幸存者的残酷蜕变。她躲在一块岩石后，听着凶手冰冷的脚步声由远及近，远处的湖水仿佛静止。影片摒弃政治说教，全程采用手持跟拍与近乎实时叙事，将她每一次颤抖、每一口压抑的呼吸、每一段关于未来的破碎闪回，都化作对暴力最震耳欲聋的控诉。结局没有英雄式反击，只有她在被救起后，对着镜头无声地说出那个岛屿的名字。", "one_line": "七月的乌托亚岛上，一名幸存少女在枪声与海浪之间，用呼吸记住了整个世界的沉默。", "bucket": "drama"}, {"id": "1569", "title": "电影大事件2014", "filename": "m1569.html", "year": "2014", "region": "中国香港", "genre": "动作，犯罪", "tags": "警匪，枪战，反腐，双雄", "summary": "故事发生在2014年的香港文化中心，金像奖颁奖礼正在进行。一伙训练有素的国际悍匪突然闯入，挟持了在场所有明星和名导，向警方索要天价赎金。更棘手的是，匪徒在直播信号上动了手脚，全球观众看到的依然是喜庆的颁奖画面。O记督查李文彬（虚构）发现，匪首的目标根本不是钱，而是为了逼迫隐藏在警队高层的“内鬼”现身。在封闭的剧院内，过气武打明星、当红小花和导演们为了求生各显神通，而真正的战场则在监控室与网络暗网之间展开。", "one_line": "2014年，香港警队最高荣誉的“电影奖”颁奖礼现场，匪徒混入，劫持了全港半数的一线演员。", "bucket": "action"}, {"id": "1570", "title": "女导与强盗", "filename": "m1570.html", "year": "2025", "region": "中国大陆", "genre": "剧情 / 犯罪", "tags": "女性导演，黑色幽默，身份错位，绑架与反杀", "summary": "新锐女导演林曼正在为自己的处女作寻找灵感，却在深夜被两个走投无路的笨贼绑架至废弃仓库。两个强盗逼迫她拍摄“绑架声明”勒索钱财。起初惊恐的林曼突然意识到，这是她见过最真实的表演场景。她反过来提议：不报警，只要强盗配合她拍完一部名为《强盗》的独立电影。在封闭空间中，三人上演了一场关于权力、性别与艺术的荒诞博弈。林曼巧妙地用镜头语言和导演指令操控着强盗的情绪与行动，将绑架现场变成了精心设计的片场。随着拍摄深入，强盗们逐渐模糊了现实与表演的界限，而林曼也发现自己在道德与野心之间越陷越深。", "one_line": "当新锐女导演被两个笨贼绑架，她决定将这起突发事件拍成自己的毕业大作。", "bucket": "drama"}, {"id": "1571", "title": "我曾来过", "filename": "m1571.html", "year": "2023", "region": "英国", "genre": "惊悚，剧情，悬疑", "tags": "谋杀，祖孙，秘密，古宅，反转", "summary": "叛逆少女凯拉为了完成社区服务令，来到脾气古怪的独居老人乔治家中整理垃圾。在满是灰尘的书房里，她找到一本用皮革装订的日记。令人毛骨悚然的是，日记里精确地记录着她将要在何时何地做什么事，甚至包括她下周将要进行的抢劫计划。更可怕的是，日记最后几页记载了一起尚未发生的谋杀案，而凶手正是这位看似无害的老人乔治。凯拉试图报警，却发现警察根本不相信她。当日记里的预言一个个应验，凯拉意识到，她必须赶在日记的最后一页日期之前，找到乔治的秘密并阻止他。", "one_line": "少女帮独居老人整理旧宅，却发现一本日记详细记录了她未来每一天的行踪。", "bucket": "suspense"}, {"id": "1572", "title": "查龙药师", "filename": "m1572.html", "year": "2023", "region": "泰国", "genre": "喜剧 / 爱情 / 古装", "tags": "泰国传统医药，欢喜冤家，女扮男装，草药，搞笑", "summary": "查龙府，泰医世家千金素安被父亲要求嫁给一个她不爱的贵族。为了证明女子也能成为药师，她剪短头发，化名“阿安”混入皇家药师公会，并想偷回家传药典。在那里，她遇到了天才药师帕他那，此人极度讨厌女性学医，认为会乱了规矩。两人成为室友，在一次次草药辨识、病例诊断中互相不服，却又在合力救治一场瘟疫时产生了默契。素安的女性身份差点暴露，是帕他那帮她遮掩。之后帕他那发现她就是自己家族的世交千金，感到被欺骗，两人决裂。瘟疫再次爆发，这次只有他家传药典中的古方能解。素安公开女性身份，呼吁废除性别限制，最终两人共同献出药方，挽救全城。帕那他也向素安道歉并求婚。", "one_line": "为了继承家传药典，叛逆千金女扮男装混入药师公会，与高傲的药师少主相爱相杀。", "bucket": "comedy"}, {"id": "1573", "title": "特警霸王花", "filename": "m1573.html", "year": "2026", "region": "中国香港", "genre": "动作/犯罪", "tags": "女特警, 港产片, 枪战, 女子力", "summary": "因屡次被男同事看轻，警校五项全能冠军麦芷晴向高层提议成立一支全女性的特别行动小组——霸王花。她的队友包括：精通多国语言的前卧底文员、曾在体校练柔道的单亲妈妈、以及一个枪法奇准但性格内向的“宅女”后勤警员。她们的首个任务就异常棘手：一个由神秘“女王”领导的全女性国际珠宝大盗团伙流窜到香港，即将在珠宝展上动手。霸王花们必须伪装成买家、模特甚至清洁工混入展会。行动中，她们不仅要面对狡猾的对手，还要应对来自警队内部的偏见与阻碍。在一场天台决战中，姐妹们互相掩护，证明了女子力绝不输给任何人。", "one_line": "香港警队历史上第一支全女子特别行动小组成立，她们面对的第一个任务，是潜入一个全女性的国际珠宝盗窃团伙。", "bucket": "action"}, {"id": "1574", "title": "死神骑马来", "filename": "m1574.html", "year": "1967", "region": "意大利 / 西班牙", "genre": "西部", "tags": "通心粉西部片, 复仇, 口琴, 经典配乐, 镖客", "summary": "这是一部经典的通心粉西部片，风格冷峻且充满宿命感。主角是一个沉默寡言的流浪枪手，他从不说话，只用一把挂在胸前的口琴与人“交谈”。他追踪一个叫“军士长”的男人来到荒漠边缘的鬼镇。镇上正在发生一场势力更迭，墨西哥土匪、流浪的南方军残部以及贪婪的淘金客三方势力交织。口琴客周旋于三方之间，利用每个人心中的贪欲，一步步逼出躲在幕后的“军士长”。当两人最终面对面时，口琴客第一次开口，吹出了一首二十年前的摇篮曲——那是军士长屠杀他全家时，母亲临死前哼唱的旋律。全片没有多余的台词，只有漫天的黄沙、刺耳的琴声和血红的夕阳。", "one_line": "一个神秘的口琴客来到小镇，他每吹一首曲子，镇上就死一个人。", "bucket": "fantasy"}, {"id": "1575", "title": "丧子疑云", "filename": "m1575.html", "year": "2023", "region": "西班牙", "genre": "悬疑 / 心理 / 剧情", "tags": "母亲视角, 医疗黑幕, 记忆碎片, 复仇", "summary": "爱丽丝的儿子在家中的泳池溺亡，所有人包括警方都认定为意外。但爱丽丝在整理遗物时，发现儿子生前的画作里充满了奇怪的符号，并提起过一个“夏天的朋友”。她开始调查，发现镇上的儿童医院在进行非法的基因实验。随着调查深入，她的丈夫开始偷换她的药物，邻居们联合起来孤立她，甚至儿子生前的同学也改口否认见过那个“朋友”。整个世界都在告诉她：你疯了。只有她知道，真相比疯狂更可怕。", "one_line": "一个孩子溺水身亡，母亲坚称他是被谋杀的，但所有人都认为她精神出了问题，包括她的丈夫。", "bucket": "suspense"}, {"id": "1576", "title": "爱在空气中", "filename": "m1576.html", "year": "2022", "region": "泰国", "genre": "爱情 / 同性 / 青春", "tags": "纯爱, 校园, 泰国腐剧", "summary": "泰式小清新校园纯爱剧。Pai 是一个性格内向的转校生，因为一次意外，他不仅撞见了校之月（校草）Rain 在空无一人的教室里弹吉他唱跑调的歌，还把奶茶泼在了对方限量版球鞋上。害怕被报复的 Pai 处处躲着 Rain，却发现 Rain 开始对他“恶作剧”：把他锁在天台，却给他送了午餐；藏了他的作业本，却帮他补完了；运动会时故意绊倒他，却在众目睽睽下把他抱了起来。原来，Rain 只是不知道如何表达好感，只能用这些笨拙的方式引起注意。在热带潮湿的空气里，两人从误会、试探到心动，暧昧的张力快溢出屏幕。当 Rain 在毕业晚会上唱起那首跑调的歌送给 Pai 时，所有人都哭了。", "one_line": "转校生与校园风云人物因一场误会结缘，在夏日空气中，暧昧如热带季风般湿热发酵。", "bucket": "romance"}, {"id": "1577", "title": "走出寂静", "filename": "m1577.html", "year": "1996", "region": "德国", "genre": "剧情, 音乐", "tags": "聋哑, 父女, 音乐, 成长, 黑管", "summary": "拉拉出生在一个特殊的家庭：父母和姑姑都是聋哑人，用手语交流。从小，拉拉就是家里的“耳朵”，负责接电话、看医生、处理一切声音相关的事务。10岁那年，她在学校音乐课上第一次听到黑管的声音，被深深吸引，偷偷学习。然而当她演奏给父亲“听”时，父亲愤怒地打翻了乐谱。在父亲看来，音乐是一个他永远无法进入的世界，拉拉的演奏等于将他排除在女儿的生命之外。拉拉陷入两难：她爱父母，但她无法停止对声音的渴望。十几年后，拉拉成为乐团的首席黑管手，在第一次大型公演那天，她看到台下最前排，父亲戴上了巨大的助听器——尽管医生说过对他完全没用，但他想“看”到女儿的音乐。", "one_line": "一名出生在聋哑家庭的听力正常少女爱上了黑管，却被父亲视为背叛，因为音乐是这个家庭唯一的禁忌。", "bucket": "drama"}, {"id": "1578", "title": "表兄妹", "filename": "m1578.html", "year": "2025", "region": "中国台湾", "genre": "家庭 / 爱情 / 剧情", "tags": "青梅竹马, 家族秘密, 成长, 温情", "summary": "阿哲和小夏从小以表兄妹相称，每年夏天都在南部老家庭院追逐嬉戏。十八岁那年，阿哲无意间听到长辈对话——小夏是被收养的，两人毫无血缘关系。原本自然的牵手、拥抱突然变得令人心跳加速。两人从亲人变成“最熟悉的陌生人”，在试探与退缩中拉扯。与此同时，家族企业面临危机，长辈们各自的秘密也逐渐浮出水面。当两人终于鼓起勇气面对感情时，却发现当年的收养背后，还藏着一个关于两个家庭之间更深的羁绊。", "one_line": "每年暑假都在一起玩的表兄妹，某天被告知两人没有血缘关系，从此一切都变了。", "bucket": "drama"}, {"id": "1579", "title": "少女们向荒野进发", "filename": "m1579.html", "year": "2024", "region": "日本", "genre": "动画, 青春, 冒险", "tags": "旅行, 女高中生, 成长, 友情, 户外", "summary": "内向的高中生理惠为了完成学姐的遗愿清单，硬着头皮组建了“荒野探险社”。成员包括：运动万能但头脑简单的亚美、毒舌但路痴的学霸千夏、胆小如鼠却力气惊人的优子，以及神秘的转校生玲。她们的第一个任务是寻找学姐十年前在北海道某个废弃车站留下的“时间胶囊”。为了省钱，她们骑着破旧的自行车，背着快撑破的帐篷，开始了充满意外的旅途。她们经历过暴雨迷路、与棕熊擦肩而过、资金耗尽在农场打工，也欣赏过最美的薰衣草田和银河。在旅途中，她们逐渐揭开学姐当年的秘密，也各自找到了面对未来的勇气。", "one_line": "五个性格迥异的少女因一次失败的露营而结缘，为了寻找失踪学姐留下的“宝物”，踏上了横穿北海道的旅程。", "bucket": "animation"}, {"id": "1580", "title": "义士安重根", "filename": "m1580.html", "year": "2024", "region": "韩国 / 中国大陆", "genre": "历史 / 传记 / 动作", "tags": "抗日, 义举, 哈尔滨, 真实人物", "summary": "1909年秋，朝鲜义士安重根得知伊藤博文将乘专列经哈尔滨会晤俄国要员。他告别怀孕的妻子，与战友在俄朝边境秘密训练射击。在哈尔滨，他化装成日本侨民潜入车站。等待列车时，他反复思考“杀人是否真是义举”。伊藤博文下车检阅俄国仪仗队，安重根从人群中冲出连开三枪。伊藤倒下。安重根没有逃跑，抛枪高呼“大韩独立”。他在狱中写下《东洋和平论》，拒绝辩护，次年3月被处死。影片以黑白影像还原历史现场，最后字幕：他死后第三年，朝鲜半岛被吞并。", "one_line": "1909年哈尔滨火车站，安重根击毙伊藤博文前后十天内的信仰挣扎与行动谋划。", "bucket": "drama"}, {"id": "1581", "title": "替身2020", "filename": "m1581.html", "year": "2020", "region": "日本", "genre": "悬疑 / 恐怖 / 惊悚", "tags": "死者复活, 校园诅咒, 层层反转, 细思极恐", "summary": "高中毕业三周年同学会，众人翻看旧照时惊恐发现，三年前溺亡的皆川同学竟然站在最后一排微笑。当晚，当年欺负皆川最凶的男生离奇溺死在浴缸。一本古老日记揭示：当地有种“替身”诅咒，死者会选出替身重返人间，而替身必须再找下一个替身才能活下去。恐慌在全班蔓延，有人疯狂寻找下家，有人试图揭露真相。女主优子发现，皆川之死根本不是意外，而是一场设计好的献祭。当她抽丝剥茧接近源头，却意识到自己才是皆川指定的最终替身——而她最好的朋友，就是当年献祭仪式的执行者。", "one_line": "三年前溺亡的同学突然出现在毕业照里，全班开始按“替身”顺序接连“意外”死亡。", "bucket": "suspense"}, {"id": "1582", "title": "还我本色", "filename": "m1582.html", "year": "2024", "region": "中国香港", "genre": "剧情 / 犯罪", "tags": "黑帮，卧底，失忆，身份认同，兄弟情", "summary": "黑帮“和联胜”头号打手阿豪在一次火拼中头部受创，醒来后失去了所有记忆。此时一名自称他警队上司的人找到他，告诉他真正的身份是警方卧底，代号“变色龙”，任务是搜集黑帮老大的贩毒证据。阿豪半信半疑地回到帮会，凭借依然存在的格斗本能，很快重获信任。但随着记忆碎片重现，他发现“警察身份”其实是黑帮老大为了揪出真正卧底而设下的局——他就是真正的黑帮成员。而那个“上司”才是黑警。与此同时，一名女警也在调查黑警，她才是阿豪原本要接触的线人。最终阿豪在身份混乱中做出选择：他假装继续为黑帮卖命，实则将黑白两道证据同时交给廉政公署，把黑帮和黑警一锅端。他自己选择自首入狱，赎还罪孽。", "one_line": "一名黑帮金牌打手失忆后，警方告诉他其实是卧底，但他渐渐发现一切都不是真的。", "bucket": "drama"}, {"id": "1583", "title": "憨豆先生卡通版第三季", "filename": "m1583.html", "year": "2025", "region": "英国", "genre": "喜剧 / 动画", "tags": "憨豆, 默剧风格, 恶作剧, 英国幽默", "summary": "经典卡通版第三季延续憨豆式无声闹剧。本季憨豆先生意外获得一个万能遥控器，能让所有电器“活过来”：洗衣机追着他跑，扫地机器人变成敌对势力，电视机换台取决于他的表情。他还与邻居泰迪熊展开“后院战争”，用弹弓和自制滑翔机反击。最爆笑的一集是他被误认为博物馆的现代艺术展品，站着不动一整天，最后因为打喷嚏吓晕保安。全季没有一句台词，却把英式荒诞幽默推向极致。", "one_line": "憨豆先生又回来了，这次他用一只遥控器把整条街的电器都搞疯了。", "bucket": "comedy"}, {"id": "1584", "title": "蝴蝶行动", "filename": "m1584.html", "year": "2012", "region": "中国大陆", "genre": "谍战、悬疑、动作", "tags": "特工，双胞胎，替身，民国，苏联", "summary": "抗战时期，一对孪生姐妹在逃难中失散。姐姐赵欣梦被苏联情报机构收养，训练成顶级特工，代号“蝴蝶”；妹妹赵欣雨则流落上海，后被国民党军统吸收。十年后，两人意外重逢，却已经站在不同的政治阵营。军统策划了一场名为“蝴蝶行动”的计划，试图以妹妹假扮姐姐，潜入中共地下党高层。而姐姐则在得知计划后，决定将计就计，反向渗透。这对姐妹开始了惊心动魄的“扮演对方”的双面人生。在一次次生死考验中，她们既是亲人又是敌人，每一次对话都可能是陷阱，每一次拥抱都暗藏杀机。最终，面对共同的民族敌人和家国大义，两人必须在身份与信仰之间做出撕心裂肺的抉择。", "one_line": "失散的孪生姐妹，一个成了国民党特工，一个成了共产党卧底，对峙即将开始。", "bucket": "action"}, {"id": "1585", "title": "嘻哈西游之五指山", "filename": "m1585.html", "year": "2026", "region": "中国大陆", "genre": "喜剧, 奇幻, 音乐", "tags": "戏说西游, 说唱, 反叛", "summary": "话说孙悟空被压在五行山下五百年，寂寞到开始跟自己头上的虱子说话。如来佛祖怕他抑郁成魔，派了座下弟子“金蝉子”转世的心理治疗师——一个喋喋不休的说唱歌手，下山给猴子做心理疏导。这位自称“MC 三藏”的和尚不用经文，而是用Battle。他每天坐在山洞口，对着孙悟空押韵：“你狂你闹你上天，现在不还是一座山压着肩？”孙悟空起初愤怒，后来发现只有通过说唱才能发泄五百年积攒的怨气。两人从对骂到互诉衷肠，用一段段押韵的韵脚解构了取经的意义。最终，当三藏撕掉如来的封印条，对悟空说“走吧，跟爷去搞个乐队”时，这部剧彻底走向了疯狂的颠覆。", "one_line": "孙悟空在五行山下压了五百年，靠Freestyle对抗如来派来的PUA心理辅导师。", "bucket": "comedy"}, {"id": "1586", "title": "大侦探波洛第四季", "filename": "m1586.html", "year": "1992", "region": "英国", "genre": "悬疑 / 犯罪", "tags": "经典, 阿加莎, 英伦, 推理", "summary": "第四季包含三个经典改编：《ABC谋杀案》《云中命案》《双重罪恶》。但本季最核心的原创集《波洛的审判》中，大侦探波洛竟被指控犯下谋杀罪，死者正是他上一季未能抓获、长期嘲讽他的连环杀手。所有物证都指向波洛：凶器上有他的指纹，监控拍到他深夜出现在死者公寓楼下，甚至他的日记里写满了对死者的恨意。波洛被关入监狱，由他的助手黑斯廷斯在外调查。最终波洛在牢房里用一杯茶、一份囚犯名单和一张监狱平面图，进行了一场比任何案件都精彩的“自证清白”推理。", "one_line": "这一季，波洛要面对三个无法破解的谜题：一场没有脚印的雪地密室杀人，一个全员都有完美不在场证明的火车命案，以及他自己被指控为凶手。", "bucket": "suspense"}, {"id": "1587", "title": "尼布拉斯加公主", "filename": "m1587.html", "year": "2026", "region": "美国", "genre": "剧情冒险", "tags": "公路，寻亲，假公主，温情，美式", "summary": "内布拉斯加的乡村少女艾米丽一直坚称自己是欧洲小国“尼布拉斯加”的流亡公主。当地记者丹尼为了挖到独家新闻，决定开车送她去纽约的领事馆“认祖归宗”。一路上，艾米丽讲述了许多关于“王国”的细节，丹尼一开始只当笑话，却发现这些细节竟然跟欧洲真实历史完全吻合。当他们终于到达领事馆时，艾米丽却放弃了“回国”，因为她意识到，所谓的公主身份，是母亲为了保护她免受家暴而编造的美丽童话。", "one_line": "一个自称是欧洲某国流亡公主的美国乡村少女，带着一个落魄记者，踏上了横穿美国的“回国”之路。", "bucket": "horror"}, {"id": "1588", "title": "亿万花市", "filename": "m1588.html", "year": "2025", "region": "香港", "genre": "剧情，犯罪，黑色幽默", "tags": "金融，空头，股灾，小人物，讽刺", "summary": "阿强在旺角卖花，生意惨淡。某天他给一位富豪送花上门，偷听到富豪即将联手做空股市、吞并一家老字号企业的计划。阿强不懂金融，但他知道那家老字号是他老友阿彪工作了一辈子的公司。为了阻止富豪，阿强联合花市的卖鱼胜、卖菜莲、茶餐厅老板等一众“师奶股神”，凑了五十万本金，反向操作，在正规市场疯狂买入这只被做空的股票。这群小市民的行为意外引发了蝴蝶效应，他们的“傻钱”竟然搅乱了富豪的做空计划，引起了市场关注。最终，在交易所里，阿强代表街坊们对着镜头喊出：“我们不是大鳄，我们只是想守住自己的家。”虽然他们没能赚到“亿万”，但成功逼退了黑心的资本家。", "one_line": "香港旺角花市的一个小摊贩，无意中听到富豪对话，决定联合街坊做空某只妖股。", "bucket": "drama"}, {"id": "1589", "title": "蒙面舞王第三季", "filename": "m1589.html", "year": "2024", "region": "中国", "genre": "真人秀, 舞蹈", "tags": "蒙面, 跨界, 悬疑", "summary": "第三季新增“影子舞者”赛制：每位蒙面舞者身后都有一位影子伴舞，两人配合完成表演。热搜话题#水泥侠是谁#连续三周霸榜，这位舞者穿着工地水泥袋改造的服装，戴着开裂的水泥面具，跳的却是古典芭蕾与Krump的融合。他的每一次旋转都带着生锈齿轮般的卡顿感，却精准得可怕。直到总决赛，他挑战了《天鹅之死》的狂暴改编版，最后一个挥鞭转后直接倒在舞台上。揭面瞬间，全场起立——他是前中央芭蕾舞团首席张傲。医生曾断言他再也不能旋转超过三圈，而他在节目里转了整整三十二圈。", "one_line": "这一季最令人震惊的是“水泥侠”的揭面——他竟是因腰伤退役五年的国家首席芭蕾舞演员，用僵硬的水泥面具掩盖了颈椎里的四根钢钉。", "bucket": "drama"}, {"id": "1590", "title": "小孩的小孩", "filename": "m1590.html", "year": "2025", "region": "台湾", "genre": "剧情、家庭、儿童", "tags": "早孕少女，成长，台湾乡下", "summary": "台湾南部渔村，14岁的阿琳和16岁的小男友阿杰偷尝禁果后怀孕。学校发现后，阿杰全家连夜搬走。阿琳的母亲早逝，父亲是远洋渔船船员，常年不在家。阿琳决定生下孩子。她一边照常上学（穿宽大衣服），一边在早餐店打工攒钱。她唯一的盟友是隔壁独居的阿嬷，一个年轻时也曾未婚生子的老人。阿琳从阿嬷那里学到怎么冲泡婴儿奶粉、怎么换尿布、怎么在半夜哄哭闹的婴儿。影片没有刻意悲惨化，阿琳不是受害者，她只是笨拙地、固执地、像养一株植物一样养着自己和肚子里的另一个小孩。最后她生了，抱着婴儿时，镜头里两张脸都是孩子的脸。", "one_line": "十四岁女孩意外怀孕，她决定生下孩子，而她自己，也不过是个小孩。", "bucket": "drama"}, {"id": "1591", "title": "绝命荒漠", "filename": "m1591.html", "year": "2024", "region": "墨西哥 / 美国", "genre": "动作 / 惊悚 / 犯罪", "tags": "边境, 毒品, 孤胆英雄, 生存", "summary": "墨西哥焊工马丁为给女儿治病，冒死穿越美墨边境。沙漠中同行的人逐个被精准射杀，马丁发现一个美军退役狙击手正在以猎杀偷渡客为娱乐。他没有任何武器，只有一瓶水、一块从报废车上拆下的铁皮，以及女儿遗落的一本小学自然课本。他利用温差躲过热成像，用铁皮反光制造假人，将仙人掌汁液涂抹全身掩盖气味，甚至引诱响尾蛇攻击狙击手。三天两夜的猫鼠游戏后，马丁将狙击手逼到一个干涸的河床，用课本里学到的“虹吸原理”吸出对方水袋里的水。狙击手脱水倒地时，马丁走向边境墙，没有回头。", "one_line": "一个偷渡客在索诺拉沙漠遭遇美国狙击手猎杀，他用偷来的一瓶水、一块铁皮和小学课本里的野外知识，反杀了训练有素的杀手。", "bucket": "action"}, {"id": "1592", "title": "老友记第一季", "filename": "m1592.html", "year": "1994", "region": "美国", "genre": "喜剧, 生活", "tags": "情景喜剧, 纽约, 友情, 经典", "summary": "逃婚的富家千金瑞秋穿着婚纱冲进了中央公园咖啡馆，遇到了她的高中同学莫妮卡。在这里，她认识了莫妮卡的厨师男友钱德勒、室友按摩师菲比、以及莫妮卡的哥哥罗斯和其室友乔伊。罗斯刚刚经历离婚，因为他发现自己的妻子是同性恋。瑞秋决定剪掉信用卡开始独立生活，从端咖啡做起。第一季讲述了这群好友如何在失恋、失业、闹剧和冷笑话中相互扶持。从罗斯的长久暗恋，到瑞秋终于开始对他产生好感，一切才刚刚开始。", "one_line": "六个生活在纽约的普通青年，在中央公园咖啡馆里度过了彼此最荒唐的十年。", "bucket": "comedy"}, {"id": "1593", "title": "精英部队2：大敌当前", "filename": "m1593.html", "year": "2010", "region": "巴西", "genre": "动作 / 犯罪 / 剧情", "tags": "警匪, 政治腐败, 暴力美学, 纪实风格, 续集", "summary": "里约，贫民窟清剿行动十年后，BOPE队长纳西门托已升任安全局副局长。一次看似普通的监狱暴动，他意外发现毒贩组织被击毙的账本，里面记录着多名政客和警界高层的受贿明细。更惊人的是，这些官员正是当年支持他清剿行动的“盟友”。与此同时，人权律师迪亚戈持续曝光警察暴力，两人从对立到联手。纳西门托调查发现，一个名为“清扫者”的秘密组织，由高层警督领导，专门处决毒贩后伪造现场，以换取政治献金。最终决战不在街头，而在议会听证会。纳西门托当众播放证据录音，多名内阁成员被捕。片尾字幕显示，里约谋杀率下降40%，但系统性的腐败远未终结。", "one_line": "BOPE队长发现毒贩不过是替罪羊，真正的敌人已经渗透进国会和警局高层。", "bucket": "action"}, {"id": "1594", "title": "隐形人", "filename": "m1594.html", "year": "2025", "region": "美国", "genre": "科幻、惊悚、心理", "tags": "隐身科技、PUA控制、反杀、科技伦理", "summary": "光学工程师阿德里安掌握隐身衣核心技术，却用它对女友塞西莉亚进行长达三年的控制与虐待。塞西莉亚不堪忍受，偷偷在咖啡中下药后逃出豪宅。两天后，阿德里安被宣告死于自杀，留下大笔遗产。塞西莉亚以为噩梦结束，却发现身边怪事不断：浴帘无故被拉开、床头出现带血的手印、闺蜜被一把凌空飞起的刀割喉。所有人以为她精神失常，只有她自己知道，阿德里安把自杀伪装成假死，穿着隐身衣继续折磨她。塞西莉亚被送进精神病院，暗中偷听到阿德里安打算杀死她姐姐。她偷来另一件原型隐身衣，在姐姐家的厨房上演了一场看不见敌人的血腥搏杀。", "one_line": "被天才科学家男友长期精神控制的女主，在他“自杀”后怀疑他其实隐身藏在自己身边。", "bucket": "sci-fi"}, {"id": "1595", "title": "牵牛和仙女", "filename": "m1595.html", "year": "2022", "region": "中国大陆", "genre": "爱情， 奇幻， 古装", "tags": "牛郎织女， 反套路， 女强", "summary": "天庭首席程序员织女厌倦了写星座代码，偷偷下凡体验人间。她降落在一个叫桃花村的农家院，遇见正在开发“智慧养殖APP”的返乡青年牵牛。牵牛对她的仙女身份毫无兴趣，只问她会不会写Java。织女帮他写代码、拉投资、斗倒垄断市场的奸商，把桃花村搞成了网红数字农业基地。王母派天兵来抓她时，织女反问：“你告诉我，凭什么女人必须相夫教子，程序员必须996？”天兵答不上来。牵牛却开着无人机撒下漫天玫瑰花瓣，对她说：“留下来，我养你。”织女翻了个白眼：“就你那破APP的流水？还是我养你吧。”", "one_line": "织女下凡后发现自己拿的是霸总剧本，而牛郎只是个想回农村躺平的程序员。", "bucket": "romance"}, {"id": "1596", "title": "北海道辣妹贼拉可爱", "filename": "m1596.html", "year": "2024", "region": "日本、中国大陆合拍", "genre": "喜剧、爱情、青春", "tags": "南北差异、方言恋爱、反差萌、北海道风光", "summary": "来自中国沈阳的社畜李大明被公司派往北海道分社，遇到了自称“道产子辣妹”的同事小雪。小雪操着一口流利的日语，但语法结构全是东北话的逻辑，例如“你干哈呢？”直接翻译成日语。两人从鸡同鸭讲的误会开始，到一起对抗东京总部来的冷酷精英。在零下十几度的雪祭上，大明用一句纯正的“你瞅啥”向小雪表白，小雪回了一句“瞅你咋地”的日式英语。这部横跨中日文化的沙雕恋爱剧，在冰天雪地里燃起了一把火。", "one_line": "东北小伙被调到北海道，被当地辣妹的日语东北话混合口音整崩溃了。", "bucket": "comedy"}, {"id": "1597", "title": "我的愤怒老婆", "filename": "m1597.html", "year": "2025", "region": "韩国", "genre": "喜剧 / 爱情", "tags": "婚姻, 咆哮, 治愈", "summary": "火爆脾气、拥有“人形火山”之称的消防员金仁娜被同事强行报名了长寿相亲节目《爱的火花》。她的表现堪称灾难：一言不合就掀桌子、对着镜头咆哮、甚至在转场时徒手掰弯了勺子。而她的配对对象，是电视台请来救场的心理咨询师南时宪，一个传说中连表情都不会变、将所有情绪写在日记本里的怪人。所有人都等着看这对“冰与火”的笑话。然而在济州岛的旅行任务中，当山火突然爆发时，仁娜的本能是救人，而时宪则通过对讲机冷静指挥所有人撤离。在生死关头，时宪第一次失控了，他冲向火场寻找被困的仁娜。事后，当他那本写满对仁娜观察的日记被公开时，所有人都被这位“冰块”的深情所打动。", "one_line": "全国最长寿的相亲节目迎来奇葩嘉宾：失控咆哮的消防员女主和冷静如冰的心理咨询师男主。", "bucket": "comedy"}, {"id": "1598", "title": "陆垚知马俐", "filename": "m1598.html", "year": "2016", "region": "中国大陆", "genre": "喜剧 / 爱情", "tags": "备胎, 青梅竹马, 日久生情, 搞笑, 温情", "summary": "陆垚和马俐是幼儿园同学，从小学到大学都是同校。陆垚一直暗恋马俐，但因为自卑和害羞从未表白。马俐性格张扬，男朋友换了十几个，陆垚永远是她失恋后第一个找的倾诉对象。大学毕业后两人合租，陆垚继续以“男闺蜜”身份陪在她身边，帮她分析新男友，替她挡酒，甚至在她婚礼上做伴郎。马俐不是不知道陆垚的心意，但她害怕一旦说破，连这个唯一不会离开她的人都会失去。在一次深夜醉酒后，马俐终于逼问陆垚为什么不表白，陆垚哭着说“因为我怕说完我们连朋友都做不了”。马俐抱住他说“那就做不要做朋友了，我们结婚吧”。", "one_line": "陆垚暗恋马俐从幼儿园到三十岁，帮她追过无数男友，却始终不敢说“我爱你”三个字。", "bucket": "comedy"}, {"id": "1599", "title": "美国的早晨", "filename": "m1599.html", "year": "2024", "region": "美国", "genre": "剧情 / 历史 / 家庭", "tags": "年代剧, 小镇, 种族融合", "summary": "该剧聚焦于1968年马丁·路德·金遇刺后的美国中产阶级小镇。白人律师比尔一家和黑人医生罗伯特一家共同居住在全白人社区“晨边湖”。当社区协会试图驱逐罗伯特一家时，比尔接下辩护案，却发现自己的妻子与罗伯特有秘密过往。与此同时，小镇上的越战退伍兵、犹太裔店主、爱尔兰裔女佣各自站在不同立场。一场泳池派对上的冲突引发暴力事件，小镇被国民警卫队封锁。剧集通过四家人的视角，展现美国民权运动在微观层面的撕裂与愈合。季终，罗伯特决定留下，而比尔因坚持正义被律所开除。", "one_line": "1968年，芝加哥郊区一个叫“美国早晨”的模范小镇，因为搬来第一个黑人家庭而撕开了完美的假面。", "bucket": "drama"}, {"id": "1600", "title": "再见，我的王后", "filename": "m1600.html", "year": "2012", "region": "法国", "genre": "剧情 / 历史 / 同性", "tags": "法国大革命, 凡尔赛宫, 宫女视角, 断头台", "summary": "故事聚焦于巴士底狱被攻陷前的三天。蕾朵是玛丽·安托瓦内特的专职朗读书仆，她疯狂地暗恋着皇后。当革命浪潮逼近凡尔赛，贵族们纷纷逃亡，皇后却只关心另一个女人——波利尼亚克公爵夫人。蕾朵被派去为公爵夫人找一件衣服，却无意中被皇后推出去做替身，穿上公爵夫人的衣服登上逃亡马车。在被愤怒的民众围堵时，蕾朵终于明白：她从未被皇后看见过，自己只是权力游戏中一个可替换的棋子。", "one_line": "1789年7月14日，玛丽皇后身边的侍女，在最后三天里看到了爱情与崩塌。", "bucket": "drama"}, {"id": "1601", "title": "尸心疯", "filename": "m1601.html", "year": "2021", "region": "日本", "genre": "恐怖，喜剧", "tags": "丧尸，偶像宅，直播，另类", "summary": "阿健是个没有工作的资深偶像宅，全部的积蓄和精力都花在了地下偶像组合“糖果子弹”的C位小桃身上。丧尸病毒在东京爆发，城市瞬间沦陷。阿健躲在自己的公寓里，通过直播发现小桃被困在了郊外的摄影棚。焦急万分的他，不顾一切地骑上自己改装过的自行车，开始了横穿丧尸遍布的东京的疯狂旅程。他一边躲避丧尸，一边还要应对其他疯狂的幸存者。最搞笑的是，他因为穿着限量版偶像应援服，竟被一群不明所以的幸存者当成了某种宗教领袖。阿健利用自己对城市小巷和商场逃生通道的熟悉（都是追星跑活动练出来的），最终抵达摄影棚，却发现小桃也变异了，成了“丧尸偶像”，依然在对着镜头跳舞。", "one_line": "一名狂热偶像宅在丧尸危机爆发后，为了救出被困的小偶像，骑着自行车与僵尸大军展开了一场热血荒诞的公路赛。", "bucket": "horror"}, {"id": "1602", "title": "送信到哥本哈根", "filename": "m1602.html", "year": "2003", "region": "丹麦 / 瑞典", "genre": "剧情 / 战争", "tags": "二战, 儿童, 逃亡, 希望", "summary": "12岁的大卫在保加利亚集中营目睹父母被带走，一个囚犯塞给他一封信：“送去哥本哈根，找这个地址。”大卫逃出后，对世界一无所知——他不知道钱是什么，不知道黄油抹面包。他翻越雪山、偷渡渔船、睡在谷仓。一个希腊老渔民教他活着比记恨重要。当他终于到达哥本哈根的地址，开门的女人看了信哭了：“你妈妈还活着，这封信是她写的。”大卫站在门口，第一次笑了。", "one_line": "二战末期，一个犹太男孩从集中营逃出，带着一封信穿越半个欧洲送到哥本哈根。", "bucket": "drama"}, {"id": "1603", "title": "加菲猫的幸福生活第五季", "filename": "m1603.html", "year": "2021", "region": "美国", "genre": "动画 / 喜剧 / 家庭", "tags": "萌宠, 懒散哲学, 美食, 日常治愈", "summary": "第五季依然以加菲、欧迪和乔恩的日常小单元剧为主。开篇三集讲加菲在阁楼发现了一台神秘的“千层面3D打印机”（当然是从未来意大利寄错的包裹），只要输入掌纹就能打印全球任何口味的千层面——但奇怪的是机器只认欧迪的肉垫。从此加菲开启了疯狂的“借爪行动”，变着花样贿赂、哄骗甚至设计“欧迪意外踩上去”的场景。中段有一集致敬《碟中谍》，加菲用晾衣绳吊着自己试图偷欧迪睡觉时的爪印。后半季回归温情，欧迪生病住院，加菲发现没有了欧迪，再多的千层面也吃不香，最终在宠物医院里用一张沾着番茄酱的爪子印“骗”机器出了一份意面，偷偷放在欧迪床头。", "one_line": "第五季中，加菲猫意外获得了一台可以召唤全世界千层面的3D打印机，但机器只认欧迪的爪子。", "bucket": "animation"}, {"id": "1604", "title": "烽火怪杰", "filename": "m1604.html", "year": "2014", "region": "中国大陆", "genre": "战争 / 动作", "tags": "抗日传奇，民间奇人，冷兵器", "summary": "1942年，安徽山区。放牛娃铁蛋天生远视，能用弹弓百步穿杨。一次偶然用弹弓救了被日军狙击手围困的国军营长。国军想收编他为神枪手，日军则悬赏活捉。铁蛋只想找到被日军抓走的妹妹。他凭弹弓和自制陷阱，在山林里与两个连的日军周旋。国军营长带一个排掩护他，全员战死。最终铁蛋用弹弓打出玻璃珠，击碎日军少佐的望远镜镜片，碎片扎入其眼睛。铁蛋救出妹妹，却永远失明。他成了百姓口中的“瞎眼怪杰”。", "one_line": "皖南事变后，一个能用弹弓打中鬼子狙击手的放牛娃，被国民党和日军同时盯上。", "bucket": "drama"}, {"id": "1605", "title": "夺命提示粤语", "filename": "m1605.html", "year": "2024", "region": "中国香港", "genre": "惊悚、悬疑、奇幻", "tags": "手机APP、预言杀人、粤语原声", "summary": "IT男阿辉开发了一款名为“预言家”的社交APP，最初只是用来预测天气和股票。但一次更新后，APP开始精准预测“非正常死亡”，并且无法卸载。阿辉和他的五位内测用户，每天凌晨都会收到一条推送：“以下人员将在24小时内死亡”，附带一个名字。起初他们以为是恶作剧，直到第一个被预言的人真的死了。警方将他们列为嫌疑人。为了自证清白，阿辉等人必须在每一次预言成真前，找到那个“被选中的人”并阻止死亡。而他们发现，APP的真正开发者不是阿辉，而是一个已经死去三年的黑客幽灵。", "one_line": "一群年轻人下载了一款名为“死神推送”的APP，APP每天推送一条“谁会在几小时后死亡”的提示。", "bucket": "suspense"}, {"id": "1606", "title": "苏爷爷的肖像画", "filename": "m1606.html", "year": "2025", "region": "中国台湾", "genre": "剧情/治愈/家庭", "tags": "遗愿, 绘画, 老兵, 记忆, 温暖", "summary": "患有高功能自闭症的绘画天才小光，一直活在爷爷的庇护下。爷爷苏爷爷是一名随军来台的老兵，晚年患有阿兹海默症。爷爷去世后，留下了一本空白的画册，扉页写着：“帮我把他们画下来，那些我忘了名字的人。”小光为了理解爷爷生前的世界，扛着画板进入医院失智病房。他面对着那些同样正在遗忘的老人们，根据他们零碎的哼唱、方言或肢体动作，还原出他们脑海中最后残存的影像：大陆的老家、初恋的长辫、战场的硝烟。小光在画别人的记忆中，终于拼凑出了爷爷不曾讲述的完整一生。", "one_line": "为了完成爷爷“画下所有忘记的脸”的遗愿，自闭症少年扛着画板走进了失智症病房。", "bucket": "drama"}, {"id": "1607", "title": "母亲", "filename": "m1607.html", "year": "2025", "region": "中国大陆", "genre": "剧情 / 家庭 / 悬疑", "tags": "母爱，救赎，沉默的真相，城乡变迁", "summary": "七十岁的张翠花从未离开过她居住的黄土村。当在外打工的小儿子被指控谋杀女友，所有证据都对他不利时，这位寡母决定亲自为他翻案。她不识字，却凭惊人的记忆力记住每个细节；她不会坐车，却徒步走遍三个县城。在寻找证人的过程中，她发现死者生前曾遭村中多位有头脸人物骚扰，而儿子的认罪供词是在刑讯逼供下签署的。随着调查深入，她自己也陷入险境，猪圈被投毒，房子半夜遭人纵火。最终，她带着一支录音笔和一本沾血的日记，走进了省检察院的大门。案件重审，真凶落网，但儿子已患上严重的创伤后应激障碍。母亲的选择是陪他重新学会说话，重新学会笑。", "one_line": "儿子被冤枉入狱后，一位不识字的农村母亲踏上寻证之旅，却挖出整个小镇的黑暗秘密。", "bucket": "drama"}, {"id": "1608", "title": "远看是蔚蓝的春天", "filename": "m1608.html", "year": "2021", "region": "韩国", "genre": "校园青春", "tags": "借贷风波, 成年礼, 心理创伤", "summary": "明志大学是韩国顶尖学府，这里的学生看似光鲜，实则各自背负着债务。男主角金敏秀为了支付学费和母亲的治疗费，借了“毕业贷”。随着利滚利，他被迫为债主做各种违法跑腿。富二代男二表面冷漠，实则用肉体换取继母的支持。女主素拉是唯一清醒的人，她想拉敏秀一把，却发现敏秀的导师竟是校园贷的幕后黑手。在这座校园里，所有人都以为春天来了，却不知脚下的冰层正在破裂。他们必须在“毁掉现在”和“透支未来”之间做出残酷的选择。", "one_line": "名牌大学里看似风光的大学生，为了维持体面的生活深陷高利贷陷阱，有人选择出卖灵魂，有人选择出卖身体。", "bucket": "fantasy"}, {"id": "1609", "title": "齐丑无艳之破镜重圆", "filename": "m1609.html", "year": "2025", "region": "中国大陆", "genre": "古装喜剧", "tags": "女强男弱, 先离后爱, 宫廷政变", "summary": "钟无艳因貌丑被齐宣王冷落，屡立战功却遭后宫诬陷，心灰意冷下自请和离，从此销声匿迹。三年后，强大的楚国突然冒出一位用兵如神的军师“钟离子”，打得齐国节节败退。齐宣王在战败求和宴上，震惊地发现那位蒙面军师手腕上戴着自己当年丢弃的定情玉镯。钟无艳坦言归来只为复仇，要求齐国割让五城。齐宣王当众下跪，承认当年是被奸妃与丞相联手陷害，并拿出彻底整肃后宫的诏书。面对国家存亡与情感纠葛，钟无艳提出一个条件：若要她退兵，齐宣王必须昭告天下，承认她才是齐国唯一的“王后军师”。", "one_line": "春秋第一丑女钟无艳与齐宣王和离后，女扮男装成为敌国首席谋士，却在两国交战的沙场上，被前夫红着眼眶认了出来。", "bucket": "sci-fi"}, {"id": "1610", "title": "醒醒吧之跟风者", "filename": "m1610.html", "year": "2025", "region": "中国台湾", "genre": "喜剧, 讽刺", "tags": "网红, 短视频, 流量, 黑色幽默", "summary": "过气导演阿Ken拍了二十年电影，赔了十八年。心灰意冷之际，他发现短视频平台上有一个“反跟风”账号很火——专骂各种跟风行为。阿Ken灵机一动，创办了“醒醒吧之跟风者”频道，穿西装、戴面具，义正词严地批判“塔可钟风”、“多巴胺穿搭”、“废话文学”等各种流行。视频一夜爆红，阿Ken成了“独立思考教父”。但为了维持热度，他开始主动制造“需要被批评的跟风现象”——找人假扮网红、策划假事件、自己骂自己。当假事件失控演变成真实的社会骚乱，阿Ken不得不面对一个荒诞的现实：他，这个反跟风者，才是史上最大的跟风者。结局他在一场大型直播中摘下面具，说出了整部电影最讽刺的一句话：“谢谢你们，跟我的风。”", "one_line": "一位过气导演为了翻红，假扮“反跟风斗士”拍讽刺视频，结果自己成了最大的跟风者。", "bucket": "comedy"}, {"id": "1611", "title": "寒刀凛", "filename": "m1611.html", "year": "2025", "region": "中国大陆", "genre": "武侠, 悬疑", "tags": "兵器谱, 复仇, 雪夜, 密室推理", "summary": "武林每隔十年重排“兵器谱”，这一年最有希望夺魁的是神秘刀客“寒刀”。重排前三天，十二位上榜刀客分别收到请帖，邀请他们前往太湖孤岛上的“论剑山庄”参加秘密预演。当夜下起大雪，船夫被杀，所有人被困岛上。第二天清晨，主人被发现死于密室，胸口插着寒刀。而寒刀本人失踪。余下十人互相猜忌，每个人都有自己的秘密与动机。随着雪停日出，尸体一具具增加，幸存者们发现：这场“预演”本身就是一场精心策划的复仇。而真凶就藏在剩下的刀客之中——他用的不是刀，而是人心这把最锋利的刃。最终的反转在于：根本没有“寒刀”这个人，那只是一个代号。", "one_line": "兵器谱重排前夜，十二名刀客受邀登上孤岛山庄，第二天只剩十一人活着醒来，而“寒刀”失踪了。", "bucket": "action"}, {"id": "1612", "title": "一起入魔", "filename": "m1612.html", "year": "2024", "region": "中国香港", "genre": "恐怖 / 惊悚 / 悬疑", "tags": "邪教，心理恐怖，密室，群体癫狂，人性实验", "summary": "失业程序员阿良为了巨额奖金，报名参加一项名为“入魔”的心理学实验。他与另外六名参与者被关进一座仿古堡的建筑，必须按照神秘指令完成一系列挑战。起初只是些无伤大雅的恶作剧，但随着指令越来越违背道德和人性，七人内部开始分裂、争斗甚至残杀。阿良逐渐发现，实验的核心并非测试心理承受力，而是制造真正的“魔鬼”——一个在极端环境下主动拥抱邪恶的普通人。当最后一道指令要求他们“杀死心中最后的神”时，阿良才惊觉自己早已无路可退。", "one_line": "七位陌生人参加一场高额奖金心理实验，却发现自己正被一步步诱导集体成魔。", "bucket": "horror"}, {"id": "1613", "title": "正发生", "filename": "m1613.html", "year": "2021", "region": "法国", "genre": "剧情 / 历史", "tags": "60年代, 女性困境, 身体自主, 真实事件", "summary": "1963年，法国堕胎仍属违法。文学系学生安娜成绩优异，前途光明，却意外怀孕。她试图寻求帮助，却一次次被医生拒绝、被同学出卖、被男友抛弃。她尝试用各种危险方法自行解决，导致大出血和感染，却始终找不到合法安全的途径。在期末考试前三天，她找到了一个地下诊所，在没有任何麻醉的情况下接受了手术。电影几乎以纪录片式的冷静，呈现了一个年轻女性在身体自主权被剥夺时，被迫独自承受的全部痛苦、屈辱与恐惧。", "one_line": "1963年的法国，一个成绩优异的女大学生发现怀孕后，一切美好都在法律与道德的双重夹击下碎裂。", "bucket": "drama"}, {"id": "1614", "title": "半套房", "filename": "m1614.html", "year": "2021", "region": "中国大陆", "genre": "剧情， 家庭， 黑色幽默", "tags": "房产， 拆迁， 亲情绑架， 荒诞， 小人物", "summary": "城中村改造在即，一张写有父亲名字的八十年代购房凭证突然出现，意味着能换取一套新建公寓。偏偏这张凭证在一次争执中被撕成两半，分别握在大儿子阿强和离家出走多年的小儿子阿辉手中。两人虽为兄弟，却因父母离异形同陌路。阿强是个老实木讷的出租车司机，急需房子给孩子落户；阿辉则是到处碰壁的短视频网红，想靠房子翻身为直播基地。在律师建议下，两人不得不凑在一起，根据凭证背面的模糊手绘地图，寻找父亲当年埋在老宅地基下的“另一半证据”。途中，他们先后遭遇冒充开发商的地痞、想分一杯羹的远房表舅，以及突然现身、声称拥有优先继承权的神秘二姨。最终在废弃猪圈挖出一个铁盒，里面没有房契，只有一卷录音带。父亲的声音传出：“房子不重要，你们能一起回来，才是家。”", "one_line": "一张老房拆迁凭证意外裂成两半，同父异母的两兄弟被迫开始一场令人啼笑皆非的拼图寻宝。", "bucket": "drama"}, {"id": "1615", "title": "心脏在跳啊", "filename": "m1615.html", "year": "2024", "region": "韩国", "genre": "爱情 / 奇幻 / 喜剧", "tags": "吸血鬼, 同居, 年下恋", "summary": "吸血鬼李安已经活了八百年，他拥有一切，除了一个好觉。八百年来他严重失眠，精神濒临崩溃。他试过数羊、搬家、甚至心理治疗，直到某天深夜，他在街头漫无目的地游荡时，路过一间便利店的门口。一个穿着校服、正在偷吃关东煮的少女小恩，她的心跳声像一首安魂曲，瞬间让李安的瞳孔放大，困意如潮水般涌来。他当场倒在便利店门口睡着了。醒来后，他成了小恩的“专属保镖”，代价是每晚枕着她的膝盖睡觉。小恩以为他只是一个有睡眠障碍的奇怪大叔，直到仇家找上门，李安露出了獠牙。小恩吓得心跳爆表，李安痛苦地捂住耳朵：“太吵了！你心跳太快我睡不着！”——这大概是史上最狼狈的吸血鬼告白。", "one_line": "活了八百年的吸血鬼失眠症患者，唯有听着一位19岁少女的心跳声才能入睡。", "bucket": "romance"}, {"id": "1616", "title": "浴血黑帮第四季", "filename": "m1616.html", "year": "2026", "region": "英国", "genre": "犯罪 / 剧情", "tags": "黑帮史诗, 家族, 权力游戏", "summary": "新一季中，汤米·谢尔比完成了从黑帮老大到国会议员的蜕变。他以为凭借政治权力可以洗白家族生意，却发现自己陷入了一个更肮脏、更致命的权力游戏。一个来自爱尔兰的“反黑特别行动组”对他步步紧逼，而他的政治盟友随时准备将他当做弃子。与此同时，家族内部也因利益分配出现裂痕，亚瑟沉迷毒品，波莉阿姨被神秘势力绑架。汤米不得不重操旧业，一边在议会里扮演文明绅士，一边在伯明翰的暗巷里重掌血腥秩序。这一次，他要对抗的不仅仅是敌对帮派，而是整个大英帝国的腐朽体制。", "one_line": "汤米·谢尔比入主国会后，发现真正的敌人不在街头，而在唐宁街的晚宴上。", "bucket": "crime"}, {"id": "1617", "title": "追回24小时", "filename": "m1617.html", "year": "2023", "region": "美国", "genre": "动作 / 犯罪 / 惊悚", "tags": "时间限制, 记忆碎片, 暗网绑架, 亡命倒计时", "summary": "杰克从一间废弃冷藏车中醒来，左手背上用圆珠笔潦草写着“24小时”和一个地址。他的短期记忆每隔几小时就会重置一次，但手机里的一段加密视频告诉他自己亲手将女儿“交易”给了暗网买家——这绝对不可能。每一段清醒的间隔里，他顺着自己留下的指纹、伤疤和涂鸦，一点一点拼凑出真相：原来他曾是负责卧底的国安特工，女儿被真凶绑架用来要挟他栽赃同僚。时间每走一格，他的心智就更混沌一分，但父亲的本能让他像野兽一样死死咬住最后的线索，在倒计时归零的前一分钟，破门而入。", "one_line": "一个失忆的退役特工发现自己只剩24小时，否则女儿将被暗网买家签收。", "bucket": "action"}, {"id": "1618", "title": "移民探戈", "filename": "m1618.html", "year": "2015", "region": "美国 / 阿根廷", "genre": "剧情、音乐、爱情", "tags": "移民、探戈、纽约、底层奋斗、文化冲突", "summary": "安娜和萨尔瓦多是阿根廷的一对探戈舞者，为逃离经济危机偷渡到纽约皇后区。他们住在逼仄的地下室，白天在中餐馆洗碗、开出租车，夜晚则在自家狭小的洗衣店里练习探戈。一次偶然，一位纪录片导演发现了他们，想要拍摄移民探戈的故事。但萨尔瓦多的签证即将过期，安娜又因工伤失去了一根手指。两人在绝望中决定报名参加纽约最大的探戈比赛，不是为了出名，而是想用那三分钟的探戈，告诉所有人：我们来过，我们跳过，我们没有输。", "one_line": "一对从布宜诺斯艾利斯偷渡到纽约的情侣，用探戈在洗衣店跳出了自己的美国梦。", "bucket": "drama"}, {"id": "1619", "title": "94独臂刀之情", "filename": "m1619.html", "year": "1994", "region": "中国香港", "genre": "动作, 武侠", "tags": "刀客, 断臂, 江湖复仇", "summary": "刀客宋缺在三十年前的正邪决战中失去右臂，凭一把左手刀封神后退隐山村，与养女阿九过着平静生活。阿九十八岁生日那天，一名蒙面女刀客闯入村庄，刀法竟与宋缺如出一辙。女刀客摘下蒙布，露出与宋缺亡妻一模一样的脸——她是仇家遗孤，被神秘组织养大，只为一雪前耻。两人交手时，阿九为护宋缺重伤。宋缺悲愤中发现，这并非简单的复仇，而是有人刻意制造刀客传人的“复制品”。他重新拔刀，不是为了江湖，而是为了彻底斩断这循环的恨意。", "one_line": "独臂刀客隐退江湖，二十年后仇家之女持刀上门，却唤醒了另一段血海深仇。", "bucket": "action"}, {"id": "1620", "title": "无法恋爱的夫君", "filename": "m1620.html", "year": "2024", "region": "中国大陆", "genre": "古装/爱情/喜剧", "tags": "契约婚姻, 先婚后爱, 古装甜宠", "summary": "户部侍郎沈昭是出了名的不近女色，公开宣称“此生不娶”。太后为了拉拢沈家，强行赐婚将军府庶女楚瑶。楚瑶的真实身份是被抄家的前朝太傅之女，她女扮男装考取功名混入朝堂本是为了翻案，却被这桩婚事彻底打乱计划。新婚之夜，沈昭提出假结婚：楚瑶在府中自由活动，不得干涉他的生活，三年后和离。两人在同一个屋檐下，楚瑶白天以“沈夫人”身份应付京城贵妇圈，晚上偷偷以“楚大人”身份继续查案。当她发现当年害她家破人亡的仇人竟与沈昭有千丝万缕的联系时，这段没有爱情的婚姻，突然变得致命起来。", "one_line": "京城第一黄金单身汉公开宣称此生不婚，太后偏偏赐婚，新娘是女扮男装混入朝堂的罪臣之女。", "bucket": "fantasy"}, {"id": "1621", "title": "小美人鱼2：重返大海", "filename": "m1621.html", "year": "2024", "region": "美国", "genre": "动画 / 奇幻 / 家庭", "tags": "续作, 母女, 海洋, 成长, 选择", "summary": "距离爱丽儿变成人类已经过去十六年，她和埃里克的女儿梅洛迪在城堡中长大，从未下过海。但十五岁生日那天，梅洛迪的腿在浴缸中忽然合拢成了一条金色的鱼尾。爱丽儿意识到，当年她与乌苏拉的契约中隐藏了一条诅咒：她的后代将在十五岁时自动获得人鱼形态，且必须在一年内做出永久选择——变回人鱼，或者彻底失去海洋之力。梅洛迪第一次见到外祖父川顿国王，也第一次见到了大海深处的家族。她迷恋海洋的自由，但舍不得岸上的父亲和青梅竹马的人类男孩。与此同时，海底出现了一个新的反派，试图利用梅洛迪的血统重新挑起人鱼与人类的战争。梅洛迪既不完全属于陆地，也不完全属于海洋，她必须用两种形态分别战斗，并最终给出自己的答案：我既是公主，也是人鱼。", "one_line": "爱丽儿与埃里克的女儿在十五岁那年长出了鱼尾，她必须决定成为人类还是回归大海。", "bucket": "animation"}, {"id": "1622", "title": "蜡像", "filename": "m1622.html", "year": "2025", "region": "英国", "genre": "恐怖 / 悬疑", "tags": "博物馆, 活体, 维多利亚, 哥特", "summary": "落魄历史系博士生汤姆接手杜莎夫人蜡像馆夜班工作。第一夜，他发现丘吉尔蜡像的手指在移动。第二夜，他目睹拿破仑蜡像流下眼泪。第三夜，戴安娜王妃蜡像的嘴巴张开，发出求救声。汤姆惊恐地发现，这些蜡像内部包裹着真人——活人被注入蜡液，意识永远困在凝固的蜡中。他向馆长报告，馆长微笑说：“每座蜡像在制作前，我都会问志愿者一个问题：‘你愿不愿意永远活在被万人注视的荣耀里？’”汤姆逃跑失败，被按在制作台上。注射针刺入血管时，他看到墙上的告示：“杜莎夫人，1789年，巴黎。为死刑犯头颅制作死亡面具。”最后的镜头是博物馆白天，汤姆的蜡像站在“恐怖角”展区，眼睛里全是泪水。", "one_line": "伦敦杜莎夫人蜡像馆新来的夜班保安发现，夜晚闭馆后，蜡像会变成真正的尸体。", "bucket": "horror"}, {"id": "1623", "title": "再见了木星", "filename": "m1623.html", "year": "2027", "region": "日本", "genre": "科幻, 动画, 灾难", "tags": "硬科幻, 行星移民, 孤独太空, 新海诚风", "summary": "公元2150年，人类决定引爆木星使其核聚变，为流浪的地球提供永久光源。大规模撤离持续十年。主人公阿晓是木星轨道上一名低微的垃圾清理工，性格孤僻。当最后一艘移民船离开时，他发现自己的编号被系统遗漏。独自留在即将毁灭的星球轨道上，他利用废弃卫星和探测器，为自己搭建了一个观看“葬礼”的观测点。在倒计时日子里，他通过无线电意外联系上一艘同样被遗漏的外星飞船，对方也是宇宙的拾荒者。两个孤独的灵魂在末日电波中交换文明的故事，最终在木星绽放成巨大火球的瞬间，达到悲壮的宁静。", "one_line": "木星即将被引爆为第二颗太阳，一名太空垃圾清理工被遗忘在撤离名单之外。", "bucket": "sci-fi"}, {"id": "1624", "title": "男人不可以穷", "filename": "m1624.html", "year": "2023", "region": "中国香港", "genre": "剧情 / 喜剧", "tags": "草根逆袭, 兄弟情, 创业, 现实题材", "summary": "阿正和阿杰是住在深水埗劏房的难兄难弟，穷得只剩梦想。阿正信奉“男人不可以穷”，拼命做多份兼职攒钱创业；阿杰则安于现状，觉得有瓦遮头就好。两人约定三年后看谁活得更好。阿正踩中风口做起外卖平台，一夜暴富后心态膨胀，与兄弟渐行渐远。阿杰则因父亲重病背上巨债，被迫走上偏门。三年之约到期，阿正的公司因数据造假被查，阿杰却在绝境中找到了真正的出路。影片用黑色幽默剖开香港底层生存法则，穷不可怕，可怕的是心穷。", "one_line": "两个底层青年立下“男人不可以穷”的誓言，三年后一人暴富，另一人却输掉了全部。", "bucket": "drama"}, {"id": "1625", "title": "像鸡毛一样飞", "filename": "m1625.html", "year": "2002", "region": "中国内地", "genre": "剧情 / 文艺", "tags": "北漂，诗歌，理想主义，黑色幽默，小城青年", "summary": "诗人欧阳在京城混了八年，只出版过一本自费诗集。失意后回到湖南小县城，被安排进鸡毛厂当质检员。工厂每天飞扬的鸡毛让他想起自己散落的诗稿。他结识了同样热爱文学的残疾姑娘阿桃，两人在鸡毛堆里读诗、写诗。厂长要求他写歌颂企业的打油诗，他不肯，被辞退。阿桃去南方打工前送他一本手抄诗集，扉页写着：“鸡毛也会飞，只是风没来。” 欧阳最终卖掉诗集手稿，买了一张去深圳的火车票。电影充满超现实镜头：鸡毛变成白鸽、厂房化作诗歌墙。", "one_line": "一个写诗的北漂青年回到小县城，发现自己的理想比鸡毛还轻，却比石头还硬。", "bucket": "drama"}, {"id": "1626", "title": "华府千秋", "filename": "m1626.html", "year": "2020", "region": "美国", "genre": "政治， 剧情， 惊悚", "tags": "白宫， 权力博弈， 阴谋", "summary": "副总统意外继任后，却发现前任总统的死并非意外，而是一连串庞大政治献金与能源阴谋的牺牲品。他必须在国会、五角大楼和情报机构的夹缝中求生存，身边甚至副手都可能是一心要他下台的敌人。与此同时，一位理想主义的年轻幕僚和一位老辣的调查记者分别从内部和外部追查真相。当国家机器沦为私产，当正义需要背叛来执行，这部剧展现了民主光环下赤裸裸的权力交易，以及一个人在最高处能有多孤独。", "one_line": "一场突如其来的总统遇刺案，掀开了华盛顿权力场中惊人的腐败黑幕。", "bucket": "drama"}, {"id": "1627", "title": "我的野兽", "filename": "m1627.html", "year": "2012", "region": "法国", "genre": "奇幻, 剧情", "tags": "动物隐喻, 青春期, 小镇怪谈, 治愈", "summary": "生活在法国比利牛斯山小镇的少年路克患有严重的社交障碍，他在一次森林迷路后，声称遇到了一只巨大的黑色野兽——但所有人都看不见它。路克每天偷偷去喂养这头“野兽”，在它沉默而暴烈的陪伴下，逐渐敢于对抗校园霸凌、向暗恋的女孩表达心意。然而野兽开始不受控制地破坏村庄，甚至威胁到他唯一的朋友。路克最终得知，这头野兽是他压抑的愤怒与恐惧所幻化的实体，而他必须亲手“杀死”它，才能真正长大成人。", "one_line": "自闭少年收养了一只谁都看不见的“野兽”，却在它的陪伴下学会了爱与告别。", "bucket": "fantasy"}, {"id": "1628", "title": "龙形八剑", "filename": "m1628.html", "year": "1978", "region": "中国香港", "genre": "武侠，动作", "tags": "复仇，剑术，江湖，秘宝", "summary": "剑客龙云天背负着灭门血仇，唯一的线索是传说中的“龙形八剑”。这八柄神剑不仅削铁如泥，更各自藏有一块铜符，合起来便能找到前朝留下的巨额宝藏与龙脉所在。龙云天在寻找过程中，结识了同样在追查真相的江湖奇人“怪手书生”，也引来了野心勃勃的九王爷和东厂高手。从江南水乡到塞外荒漠，龙云天历经数十场死战，逐渐发现自己的身世竟与皇室有关。最终，在八剑齐聚的龙吟谷，他必须在复仇和拯救苍生之间做出选择。", "one_line": "八柄失落的龙形宝剑，牵连着一个王朝的复辟阴谋与一个侠客的血海深仇。", "bucket": "action"}, {"id": "1629", "title": "群岛", "filename": "m1629.html", "year": "2025", "region": "英国 / 澳大利亚", "genre": "悬疑 / 冒险", "tags": "孤岛求生, 家族秘密, 潮汐, 遗传学", "summary": "全球十二位名叫“本杰明·库克”的陌生人，同时收到一份遗嘱：前往南太平洋的“群岛”庄园，继承亿万富翁的遗产。当他们登岛时，发现庄园破败不堪，而岛屿周围的潮汐变得极不正常，每天都有小块陆地沉入海底。一位基因学家成员发现，他们十二人的DNA在某个失效的端粒片段上完全相同，他们实际上是同一个实验体的克隆人。富翁并未死去，他正躲在岛下的基地里，希望通过观测克隆体在极端环境下的应激反应，来修复自己衰老的身体。随着岛屿即将完全沉没，这群“本杰明”必须决定：是合力杀死“父亲”，还是遵循本能，为了唯一的逃生机会而自相残杀。", "one_line": "十二位同名“本杰明”收到遗产邀请，登岛后却发现潮汐正在将岛屿一块块吞噬。", "bucket": "suspense"}, {"id": "1630", "title": "泰山保驾迷魂阵", "filename": "m1630.html", "year": "2018", "region": "中国大陆", "genre": "喜剧，悬疑", "tags": "盗墓，智商税，乌龙阵", "summary": "泰山脚下发现疑似先秦古墓，引来三路人马：以考古为名的国际盗墓团伙、本地土夫子家族、以及两个误打误撞的驴友。他们同时潜入地下，却在墓道中遭遇连环机关——不是杀人那种，而是专门让人迷路、产生幻觉、互相猜忌的“迷魂阵”。土夫子老大被自己儿子反锁，国际团伙中了“鬼打墙”绕回原地，驴友则被投影出的“秦始皇”吓得念咒。折腾一夜后所有人在地宫中央汇合，才发现棺材里只有一个U盘，里面是开发商做旅游项目的营销方案。", "one_line": "三伙盗墓贼在泰山古墓里互相设局，最后发现墓是假的。", "bucket": "comedy"}, {"id": "1631", "title": "灵驹续集", "filename": "m1631.html", "year": "2026", "region": "英国", "genre": "奇幻 / 冒险 / 家庭", "tags": "白马, 魔法, 祖孙, 守护, 成长", "summary": "距离第一部故事过去了二十年。当年那个与灵驹成为朋友的女孩艾米已经长大，成为了一位忙碌的单亲妈妈，带着女儿莉莉在城市生活。由于生活的磨砺，她早已忘记了童年那段奇幻经历，认为那只是自己的想象。而莉莉却内向孤独，在学校被霸凌。一天晚上，那匹散发着微光的白马“月光”再次出现在她们家楼下，带着莉莉消失在夜色中。艾米终于记起一切，为了找回女儿，她重新骑上灵驹，进入了比童年记忆中更黑暗、更腐朽的魔法森林。森林的泉眼被工业废水污染，精灵们奄奄一息。母女二人必须重新信任彼此，借助灵驹的力量，找到污染源头并净化它，否则魔法世界将永远消失。", "one_line": "上一部中的神奇白马再次出现，带领已为人母的小女孩和她的女儿，踏上拯救被污染森林的旅程。", "bucket": "fantasy"}, {"id": "1632", "title": "毕业有蜥望", "filename": "m1632.html", "year": "2023", "region": "中国大陆", "genre": "喜剧/青春/奇幻", "tags": "毕业季, 蜥蜴, 变身, 友情, 黑色幽默", "summary": "毕业前夜，美术系四个死党在画室喝酒吹牛。天亮醒来，发现一只从实验室逃出的变色龙（他们给它取名“班主任”）把全班的毕业证和学位证吞进肚子，然后钻进学校老旧的通风管道。四个小时后就是毕业典礼，没有证件所有人都无法毕业。四人组成“捉蜥小分队”：胖子负责钻管道，眼镜负责画通风系统地图，暴躁女负责用香薰引诱，社恐男负责断后。追捕过程中，蜥蜴带他们逛遍学校隐秘角落：宿管阿姨的秘密花房、图书馆地下的旧书坟场、食堂后厨的“黑料理实验室”。四人也在过程中发现彼此的秘密：有人延毕的真正原因是抑郁症，有人偷偷替全班画了四年作业。最终在钟楼顶抓住蜥蜴时，它吐出所有证书，但按顺序拼成了全班每个人的“真正愿望”而非学位信息。四人相视大笑，把证书抛向天空。", "one_line": "四个大学生毕业前夜喝醉，第二天醒来发现全班的毕业证被一只蜥蜴吞了，他们必须在典礼前取回。", "bucket": "comedy"}, {"id": "1633", "title": "表哥到国语", "filename": "m1633.html", "year": "1992", "region": "中国香港", "genre": "喜剧 / 恐怖", "tags": "港式鬼片, 国语配音, 乌龙驱邪, 家族秘事, 老港味", "summary": "阿豪从马来西亚带回一个古怪的木雕，家里接连发生怪事。更诡异的是，只有说国语的人能看见鬼——说粤语、客家话、潮州话的家人全没事。于是一家人被迫开始用蹩脚国语交流，闹出一连串鸡同鸭讲的笑话。后来从曾祖母遗物中发现，这只鬼竟是当年被冤枉的账房先生，他只会听当时“官方语言”国语。最后全家用“国语大法会”完成了迟来的道歉。鬼先生听完，用标准国语说了句：“早这样不就好了嘛。”", "one_line": "表哥从南洋带回来的“纪念品”让全家人都见了鬼，但鬼只追说国语的。", "bucket": "comedy"}, {"id": "1634", "title": "极光下", "filename": "m1634.html", "year": "2025", "region": "挪威 / 冰岛", "genre": "灾难，生存，亲情", "tags": "极夜，电磁风暴，失联，小屋，母亲", "summary": "2041年，一场空前太阳风暴摧毁了地球电网，所有电子设备失效，飞机坠毁，城市陷入黑暗。此时正值挪威极夜，单亲妈妈莉娜带着8岁女儿艾玛被困在北角荒原的观测站。气温零下35度，只剩三天的食物。她决定徒步穿越冰原前往最近的渔村，那里可能有旧式渔船。途中遭遇冻伤、雪盲和狼群。艾玛因恐惧拒绝前行，莉娜咬破手指用血画了一幅极光地图，告诉她“妈妈就是你的指南针”。在暴风雪中，她背着女儿滑下山坡，被猎人救起。六天后抵达渔村时，发现全村早已撤离，只留下一艘小艇的钥匙。她独自驾艇破冰，最终在第七天登上救援船。", "one_line": "极光之夜，全球电网瘫痪，一位单亲妈妈必须带女儿徒步三百公里逃生。", "bucket": "crime"}, {"id": "1635", "title": "勇者无敌", "filename": "m1635.html", "year": "2025", "region": "美国", "genre": "科幻战争", "tags": "机甲, 末日, 基因改造, 兄弟情, 牺牲", "summary": "2147年，外星虫族入侵，人类依靠“完美基因”驾驶的超级机甲节节败退。军方将一群被判死刑的基因缺陷者扔上战场当炮灰，代号“弃子小队”。队长洛基患有情感缺失症，却能预判虫族攻击模式；队员大牛肢体不协调，却力大无穷；盲女阿莱听力超凡，能监听虫族通讯。他们在必死任务中发现了虫族女王的声波弱点。没有支援，没有退路，“弃子小队”用最原始的自杀式冲锋，将自身化作人体炸弹，为人类炸开了一条生路。", "one_line": "在人类最后堡垒，一支由基因缺陷者组成的机甲小队，用自杀式冲锋改写了战争法则。", "bucket": "animation"}, {"id": "1636", "title": "要苏俄吃瘪", "filename": "m1636.html", "year": "1985", "region": "美国", "genre": "动作 / 惊悚 / 冷战", "tags": "冷战, 特工, 苏联, 阴谋, 硬汉", "summary": "1984年，洛杉矶奥运会前夕，CIA特工杰克接到一项疯狂任务：代号“打脸行动”。目标不是窃取情报或暗杀，而是设计一系列看似意外的事件，让苏联的克格勃在全世界媒体面前出尽洋相。杰克潜入莫斯科，在重重监控下，他先是让克格勃主席在直播中摔倒，又让苏联最先进的导弹模型在阅兵式上散架。克格勃精锐倾巢而出追捕他，杰克却利用奥运会的全球转播，把每一次反杀都变成了苏联安保力量的公开处刑。最终，他成功嫁祸给一个虚构的西方间谍组织，让苏联高层相互猜忌。任务成功了，但杰克发现，自己也不过是华盛顿政治棋局里的一颗弃子。", "one_line": "冷战巅峰，一名CIA特工必须在莫斯科奥运会期间，让苏联情报机构在全球面前彻底难堪。", "bucket": "action"}, {"id": "1637", "title": "火星情报局第六季", "filename": "m1637.html", "year": "2025", "region": "中国大陆", "genre": "脱口秀 / 喜剧", "tags": "脑洞提案, 明星爆料, 社交观察, 即兴喜剧", "summary": "火星情报局第六季全面升级。局长汪涵继续坐镇，带领一众新老特工，针对地球人最头疼的社会议题发起提案。这一季重点聚焦“年轻人的发疯文学”，比如“建议公司将KPI改成KFC”“被裁员后假装上班是一种绝佳的gap day”。每期特工们还会根据提案进行即兴情景剧演绎，将生活中的荒诞放大到极致。没有说教，只有吐槽和脑洞，在笑声中化解年轻人的焦虑。", "one_line": "特工们回归火星，针对当代年轻人“社恐”“内卷”“断亲”等现象提出离谱又真实的提案。", "bucket": "comedy"}, {"id": "1638", "title": "僵尸大暴动", "filename": "m1638.html", "year": "2025", "region": "韩国", "genre": "动作 / 惊悚 / 恐怖", "tags": "丧尸, 朝鲜王朝, 冷兵器", "summary": "壬辰倭乱之后，朝鲜南部村庄爆发诡异疫病：死人复活，但不再疯狂咬人，而是保留生前的仇恨与组织力。这群“清醒僵尸”在曾经的将领尸首带领下，攻击两班贵族粮仓，并喊出“我们曾是人”的口号。朝廷派来的捕盗大将李诚佑发现，瘟疫源头竟是官府秘密试验的“还魂草”。为了平息暴动，他被迫与僵尸首领谈判，答应揭露官场阴谋。在决战中，一部分僵尸选择守护平民，另一部分被药物失控化为巨兽。最终李诚佑烧毁药草田，并与僵尸首领在火海中完成最后的决斗。", "one_line": "朝鲜王朝一场瘟疫让僵尸开始拒绝吃人脑，反而组建起一支有纪律的“僵尸起义军”。", "bucket": "action"}, {"id": "1639", "title": "恐怖鸡", "filename": "m1639.html", "year": "1997", "region": "香港", "genre": "恐怖 / 惊悚", "tags": "民俗恐怖, 养鬼, 南洋邪术, 复仇, 黑色幽默", "summary": "深水埗老牌烧腊店“荣记”店主荣叔的女儿患上怪病，百医无药。走投无路时，一位自称来自南洋的法师给了他一个黑色瓦罐，里面装着一只会说人话的黑冠公鸡。按照指示，荣叔需每七天诱骗一个孤身客至后巷，取一滴心头血喂鸡。鸡越来越肥，女儿脸色转好，但店里开始发生诡异事——烧腊挂在炉里会自动转动，深夜传出鸡鸣与人的呜咽。当第七个“客人”失踪后，那只鸡破罐而出，用荣叔的声音在深水埗街头叫卖：“新鲜烧腊，人肉秘方。”", "one_line": "香港烧腊店主为救重病女儿，用邪术将活人炼成“鬼鸡”续命，却招来更恐怖的反噬。", "bucket": "horror"}, {"id": "1640", "title": "夜访吸血鬼第二季", "filename": "m1640.html", "year": "2024", "region": "美国", "genre": "奇幻 / 恐怖 / 剧情", "tags": "吸血鬼，年代剧，爱欲，永生", "summary": "离开新奥尔良后，路易与吸血鬼阿尔芒在巴黎的“吸血鬼剧院”落脚。表面是艺术庇护，实则陷入更复杂的权力斗争。路易试图以记者丹尼尔的采访录来自我救赎，却发现自己记忆中的每个版本都在被阿尔芒悄然篡改。克劳迪娅虽死，其日记本却神秘出现，揭露了当年三人行的另一面真相——关于控制、关于嫉妒、关于爱如何异化为永恒的囚禁。路易必须在旧爱与新欢、真实与谎言之间，亲手斩断两千年的枷锁。", "one_line": "路易和阿尔芒在欧洲展开新生活，但克劳迪娅的幽灵和他们自己的故事版本，成了最锋利的刀。", "bucket": "fantasy"}, {"id": "1641", "title": "傀儡生涯", "filename": "m1641.html", "year": "2025", "region": "中国香港", "genre": "犯罪 / 动作 / 惊悚", "tags": "提线木偶, 黑帮洗钱, 终极替身", "summary": "阿鬼是戏班出身，擅长用提线木偶表演口技和身段。他被神秘组织重金招募，任务是在各种场合“扮演”已故大毒枭独子陈少威。阿鬼模仿得惟妙惟肖，成功接管了陈少威的生意网络。但他渐渐发现，组织成员看他的眼神不像看活人，而更像看一个高级工具。一次意外，阿鬼在组织的密室中发现了一具与他一模一样的蜡像，旁边是陈少威的腐烂尸体。原来，组织从未想过让他一直扮演，他们正在进行一项活体实验，要将阿鬼的大脑与神经，彻底改造成陈少威的“傀儡替身”。", "one_line": "他是一个技术精湛的“人偶”演员，直到他发现自己扮演的每一个角色，都是为了让一个死去的黑帮少爷“复活”。", "bucket": "crime"}, {"id": "1642", "title": "总铺师", "filename": "m1642.html", "year": "2013", "region": "中国台湾", "genre": "喜剧 / 剧情", "tags": "办桌文化, 台湾乡土, 美食, 传承", "summary": "詹小婉在台北当了十年餐厅副厨，梦想是开一家法式餐厅，却因投资失败落魄回乡。父亲詹仁义是台南赫赫有名的“总铺师”（办桌厨师），年事已高且患了轻度失智，但念念不忘要办一场“人生最后一桌”。小婉本不想接，却被一位老客户“鬼王”逼着在三天后办一场百桌“嫁娶宴”。然而她只会做精致摆盘的西餐，完全不懂“办桌”的粗犷与豪迈：她做的“鱼翅羹”被乡亲嘲笑“像牙膏”，她炸的“八宝丸”被狗叼走。绝望之际，她遇到了父亲的老对头“鬼头师”的徒弟阿海，一个坚持用古法木炭蒸笼的年轻人。两人从互怼到合作，在最后一天用“混搭”的方式：法式酱汁配台式卤味、低温慢煮配柴烧大灶，做出了让挑剔乡亲闭嘴的菜。最后父亲在昏迷前吃了一口她做的“菜尾汤”，笑着说“有够难吃，但系有够感动”。全片美食镜头堪比舌尖上的中国。", "one_line": "台北失意厨娘被迫回乡继承父亲的“办桌”总铺师衣钵，却发现自己连一道简单的菜尾汤都做不好。", "bucket": "comedy"}, {"id": "1643", "title": "一个明星的诞生1954", "filename": "m1643.html", "year": "2023", "region": "美国", "genre": "剧情 / 音乐", "tags": "翻拍、好莱坞、沉沦、爱情悲剧", "summary": "本片是对1954年经典的全新翻拍，时空搬到现在。乡村巨星杰克逊·缅因因酗酒和药物依赖人气暴跌，唱片公司打算和他解约。一天他醉酒后闯入一个抖音直播间，被主播艾莉的翻唱震撼——艾莉在洗车店打工，晚上在车库直播，嗓音极具穿透力。杰克逊带她登上自己的巡演舞台，艾莉一炮而红，签下顶级厂牌。但随着艾莉的单曲屠榜，杰克逊的残存自尊开始崩塌。他停止创作，躲在家里嗑药，看艾莉在格莱美领奖。艾莉试图帮他，他却说出“你现在不需要我了，就像算法不需要老唱片”。艾莉获奖夜，杰克逊在浴缸里过量服药。他没有死，但喉咙受损永久失声。片尾杰克逊在康复中心用打字机写下一首歌，让艾莉唱。艾莉在万人体育场唱到“你让我成为星星，而我让你陨落”时，指向台下的他，全场起立。", "one_line": "流媒体时代，过气乡村歌手发掘了直播翻唱女孩，两人相爱，但算法和药物一起吞噬了他。", "bucket": "drama"}, {"id": "1644", "title": "死亡游戏2016", "filename": "m1644.html", "year": "2016", "region": "日本", "genre": "恐怖, 惊悚", "tags": "诅咒录像, 密室, 社会派恐怖", "summary": "2016年，日本某小镇。六个高中生在废弃的旧校区发现了一盘没有标签的录像带。播放后，屏幕上出现一个戴着能面的人偶，宣布“死亡游戏”开始：每个人必须在一周内完成指定的自虐式任务，失败则会被随机抹除身体的一部分。他们最初以为是恶作剧，但第二天，拒绝玩游戏的女生在课堂上突然失去右眼。恐慌中，他们开始调查录像带来源，发现它关联着十年前一桩集体失踪案。最后两人发现，唯一获胜方式是让另一人成为“新的人偶”。游戏没有赢家，只有下一个传播者。", "one_line": "一群高中生无意中播放了一盘老式录像带，必须按规则玩完一场死亡游戏。", "bucket": "horror"}, {"id": "1645", "title": "美丽的日子", "filename": "m1645.html", "year": "2001", "region": "韩国", "genre": "爱情 / 家庭", "tags": "孤儿，姐妹情，绝症，乐团", "summary": "金秀贞和金秀雅是孤儿院里的姐妹花。八岁那年，秀贞被一对大学教授夫妇领养去了首尔，而体弱多病的秀雅被留在当地。二十年后，秀贞成了小有名气的唱片制作人，秀雅则在一家地下乐队做主唱。秀贞的男友、音乐总监李民哲在一次选秀中看中了秀雅的嗓音。当秀贞发现这个天赋惊人的女孩就是失散多年的妹妹时，欣喜若狂。但秀雅却对李民哲产生了好感，两姐妹陷入尴尬境地。更虐心的是，秀雅被查出白血病，需要骨髓移植，秀贞配型成功却发现自己并非秀雅的亲姐姐——当年是院长为了让她俩都不孤单而编造的谎言。但秀贞仍然选择捐献，她说：“没有血缘，你也是我的美丽日子。”", "one_line": "在孤儿院相依为命的两姐妹被不同家庭领养，二十年后重逢时，妹妹成了姐姐男友的前女友。", "bucket": "romance"}, {"id": "1646", "title": "东瀛异族秘史", "filename": "m1646.html", "year": "2023", "region": "日本", "genre": "悬疑，历史", "tags": "古代日本，部落民，替身，禁忌，身份", "summary": "平安时代中期，贵族青年藤原宗方因卷入宫廷政变被流放到纪伊半岛的熊野。在那里，他遇到一群被称为“熊野异族”的隐世部落——他们不拜佛、不纳税，世代掌握着一种用血液和咒术“稳定亡者”的秘法。宗方起初视其为邪道，直到他无意中发现，当今天皇的生母竟出自异族，她的血曾在数十年前复活了濒死的先皇。朝廷一直秘密利用异族的血维持“不老不死”的统治神话，而另一股势力则试图彻底屠灭异族。宗方必须在史书与血迹之间，拼凑出这个国家真正的起源。", "one_line": "平安时代，一名被流放的贵族发现：皇室血脉中隐藏着一支被史书抹去的“异族”，他们的血能复活死人。", "bucket": "suspense"}, {"id": "1647", "title": "法国女足先驱", "filename": "m1647.html", "year": "2024", "region": "法国", "genre": "传记 / 运动 / 剧情", "tags": "女性, 足球, 历史, 平权", "summary": "1920年，法国女足因“女性不适合踢球”被官方全面禁止。一支由工厂女工组成的里昂女足队决定反抗。她们秘密组织了一场从里昂到巴黎的“非法巡回赛”，每场比赛都在深夜于秘密地点进行。每进一球，球员就要面临一天监禁。队长玛格丽特在比赛中连进三球，被判入狱三天。她在监狱中继续训练，用面包捏成足球。当她们的巡回赛最终到达巴黎时，全法国关注。政府在压力下被迫召开听证会。玛格丽特在法庭上说：“我们不是为了赢球，是为了证明我们可以奔跑。”", "one_line": "1920年，被禁赛的法国女足队员们组织了一场横穿全国的非法比赛，每进一球加刑一天。", "bucket": "drama"}, {"id": "1648", "title": "惊魂记1989", "filename": "m1648.html", "year": "1989", "region": "美国", "genre": "恐怖 / 惊悚 / 悬疑", "tags": "邪典, 录像带美学, 连环杀手, 翻拍变种", "summary": "1989年，录像带出租店店员维克多对希区柯克的《惊魂记》痴迷到病态程度，他反复观看录像带，逐帧模仿诺曼·贝茨的举止和犯罪手法。他开始在深夜跟踪独行女性，用汽车旅馆的假身份引诱她们，然后用厨房刀模仿浴室谋杀。但诡异的是，每当他准备动手，被害人都会不经意间暴露出自己隐藏的恶行：第一名女性是虐待继女的护士；第二名是骗老人棺材本的理财顾问；第三名是即将上任的贪污法官。维克多杀完三人后，对着录像带自白：“我没想当审判者，但贝茨先生替我做了选择。”警方始终抓不到他，因为所有被害人的背景曝光后，社会舆论反而开始同情凶手。影片最后，维克多走进一家电影院，荧幕上正放着《惊魂记》，他在诺曼·贝茨说“我们都会偶尔疯一下”的台词时露出微笑。镜头拉远，影院里还有十个人也在同一时刻露出了同样的微笑。", "one_line": "一个痴迷希区柯克《惊魂记》的青年，试图完美复制诺曼·贝茨的罪行，却发现自己杀死的每个人都是该死的罪人。", "bucket": "horror"}, {"id": "1649", "title": "炭疽第二季", "filename": "m1649.html", "year": "2026", "region": "美国", "genre": "惊悚、政治、医疗", "tags": "生化恐怖、阴谋论、病毒学、FBI、高层博弈", "summary": "时间跳转到第一次生物袭击后的第18个月。一种经过基因改造的新型炭疽菌株在三个大洲同时爆发。与第一季的随机投放不同，这一季的炭疽似乎有了“选择性”：它只感染那些掌握着特定政治或军事机密的人，且死后尸体不会传播病菌，像是被精确“收割”。FBI生化专家艾莉丝发现，病菌内被植入了基于CRISPR的生物计算机，能以特定DNA序列为“钥匙”激活。这意味着投放者手中握有一份全球“叛徒”名单。当追查对象指向一个已死的军方AI系统时，艾莉丝不得不与第一季的嫌疑犯、如今被关押的天才生物学家联手，在政府内部清洗和全民恐慌中，抢在瘟疫“更新”之前拔掉它的电源。", "one_line": "第一季的炭疽菌只是开胃菜，第二季里，瘟疫有了“思想”，开始自己选择宿主。", "bucket": "suspense"}, {"id": "1650", "title": "麦路人", "filename": "m1650.html", "year": "2024", "region": "中国香港", "genre": "剧情", "tags": "底层群像, 24小时快餐店, 失业, 互助, 黑色幽默", "summary": "凌晨的24小时快餐店，成了深水埗一群“麦难民”的避风港。曾是金融才俊的阿博因投资失败沦为流浪者，却凭借残留的分析能力，带领店里的边缘人——被家暴逃出的阿珍、患有社交障碍的游戏高手“宅仔”、老退伍兵“鬼叔”——发现快餐店即将被地产商强行收回改建。他们利用各自技能：阿博分析收购漏洞，宅仔黑进系统找出违规证据，鬼叔联络老战友施压。就在看似胜利在望时，阿珍的前夫带着刀闯入，威胁要带走孩子。这场底层人的“守护家园”之战，在血与泪中迎来意想不到的转机。", "one_line": "深夜快餐店里，一群无家可归者组成临时家庭，联手对抗无良地产商。", "bucket": "drama"}, {"id": "1651", "title": "舌尖上的中国第二季", "filename": "m1651.html", "year": "2014", "region": "中国大陆", "genre": "美食 / 人文", "tags": "食物, 乡愁, 劳作, 人情", "summary": "第二季共7集，主题分别是“脚步”“心传”“时节”“家常”“相逢”“秘境”“三餐”。摄制组去了更偏远的地方：新疆沙漠边缘的养蜂人、云南深山的采蜜人、东海孤岛上的守塔人夫妇、东北林场最后的伐木工。每一集都有一个让人沉默的瞬间：养蜂人老赵说“我的蜜蜂认得我的口哨”，采蜜人老刘从30米高的树上摔下来后第一句话是“蜜桶没碎”，守塔人妻子做了40年同样的饭菜说“他爱吃我就做”。第7集“三餐”里，一个外卖小哥在除夕夜送了最后一单，客户给了他两个饺子，他蹲在路边边吃边哭。旁白说：“这是他的年夜饭，也是千千万万个回不了家的人的年夜饭。”", "one_line": "这一季不再只说“好吃”，而是说每一口食物背后，那些正在消失的人和他们的活法。", "bucket": "crime"}, {"id": "1652", "title": "惹鬼回路", "filename": "m1652.html", "year": "2024", "region": "日本/美国", "genre": "恐怖，科幻", "tags": "都市传说，信号，电子设备，群体性癔症", "summary": "一名大学生在修理老式收音机时，意外截获了一段仅7秒的音频，内容是某人临死前惊恐的喘息和求救。他将音频设为铃声，周围人的手机只要靠近他的手机，就会自动复制这段音频。几小时内，这种“鬼信号”像病毒一样通过蓝牙、Wi-Fi甚至NFC支付终端传遍东京。听到音频的人开始看到幻觉，那些死者临终前的最后视野会覆盖现实世界，导致大规模交通事故和自杀。政府声称是黑客攻击，但主角发现，这些音频来自不同年代的死者，且时间戳全部指向同一天——未来三天后。为了阻止末日，他必须找到那个“未来的死人”。", "one_line": "只要把两部手机靠近，就能听到死人临终前最后7秒的录音，这个诡异“回路”正在全城通过蓝牙疯狂传播。", "bucket": "horror"}, {"id": "1653", "title": "风流断剑小小刀", "filename": "m1653.html", "year": "2023", "region": "中国香港", "genre": "武侠动作", "tags": "兵器谱, 江湖恩怨, 双雄, 复仇, 冷兵器", "summary": "江湖人称“小小刀”的孟三刀，凭借一柄短刀稳坐兵器谱第三。他金盆洗手之夜，一把锈迹斑斑的断剑夜夜入梦，剑灵自称是他死于非命的师兄谢长恨。孟三刀被迫重出江湖，寻找断剑真正的主人。追查途中，他逐渐发现当年师父将绝技只传给他一人，并非因为天赋，而是因为谢长恨性格刚烈，拒不为权贵卖命。真相是师父设计害死谢长恨，并让孟三刀冒名顶替其身份。孟三刀最终面对的不只是一把断剑的复仇，更是整个门派的血腥原罪。", "one_line": "退隐刀客被断剑亡魂纠缠，却发现对方竟是十八年前被自己顶替身份的师兄。", "bucket": "fantasy"}, {"id": "1654", "title": "扎克·施奈德版正义联盟", "filename": "m1654.html", "year": "2021", "region": "美国", "genre": "动作，科幻，奇幻", "tags": "导演剪辑版，史诗，慢镜头", "summary": "不同于院线版，扎导剪辑版彻底重写了故事内核。蝙蝠侠在招募神奇女侠、海王、钢骨和闪电侠时，发现母盒并非仅仅是唤醒超人的工具，而是一个记录着“黑暗未来”的时间胶囊。钢骨从母盒的残存数据中看到，若超人在此时复活，他将因失去露易丝而黑化成独裁者，亲手毁灭地球。联盟陷入了悖论：不复活超人，无法对抗达克赛德；复活超人，则必然走向毁灭结局。在最后的终极决战中，闪电侠逆转时间的代价不再是神速力，而是他每跑一步，就会有一个平行宇宙的他死去。", "one_line": "在施奈德手中，死去的超人并非英雄复活那么简单，而是多元宇宙崩溃的导火索。", "bucket": "action"}, {"id": "1655", "title": "袋鼠丝苗为两餐粤语", "filename": "m1655.html", "year": "2025", "region": "中国香港", "genre": "怀旧喜剧", "tags": "粤语, 打工仔, 美食, 市井生存", "summary": "90年代香港，失业厨师“丝苗”被高利贷追债，躲进即将倒闭的动物园，意外遇到一只被遗弃的袋鼠。第二天动物园关门，袋鼠跟着丝苗跑了出去。丝苗发现袋鼠的育儿袋保温效果极佳，于是灵机一动，开始用它来送外卖。袋鼠送外卖的消息传遍深水埗，订单爆满，但也引来了黑心老板和动物保护组织的双重追捕。每集围绕一道港式美食展开：煲仔饭、丝袜奶茶、蛋挞、车仔面。袋鼠逐渐学会用尾巴敲门、用脚踢开乱吠的狗、甚至用育儿袋帮丝苗偷藏私房钱。最后一集，丝苗终于存够钱开了自己的茶餐厅，店名就叫“袋鼠丝苗”，而那只袋鼠安静地蹲在收银台后，成为了镇店之宝。", "one_line": "一只从动物园逃出来的袋鼠，和一个失业厨师组成“为两餐”外卖搭档，笑料百出。", "bucket": "romance"}, {"id": "1656", "title": "闪耀吧！中华文明", "filename": "m1656.html", "year": "2025", "region": "中国大陆", "genre": "文化, 历史, 真人秀", "tags": "考古, 国宝, 明星体验, 科普, 沉浸式", "summary": "节目每期聚焦一个中华文明的关键节点，如甲骨文的发现、丝绸之路的开辟、活字印刷的诞生等。六位常驻明星化身为“时空学徒”，在专家指导下，进入1:1复原的历史场景，亲手完成古代技术的实操：用最原始的刻刀在龟甲上刻字，跟随驼队穿越模拟的沙漠，用泥活字排版一首唐诗。节目没有竞技淘汰，只有“任务达成度”。每期最后，六人会共同参与一出“文明小剧场”，用戏剧形式重现该技术在当时如何影响了普通人的生活。例如，在“造纸术”一期，他们从树皮浸泡开始，最终制成一张粗糙的纸，并在小剧场里扮演一位汉代书生，用这张纸写下了第一封家书。镜头会穿插真实文物的高清特写，讲述它们辗转千年的传奇故事。", "one_line": "六位明星“文明探源员”穿越回六个历史高光时刻，亲手体验古代技术，用沉浸式戏剧还原文明诞生瞬间。", "bucket": "drama"}, {"id": "1657", "title": "烈日当空", "filename": "m1657.html", "year": "2008", "region": "中国香港", "genre": "青春，剧情，社会", "tags": "残酷青春，香港少年，兄弟情，迷失", "summary": "2007年的香港，七个即将面临会考的中学生，在酷热的暑假里尽情挥霍着青春。他们抽烟、打架、追逐女孩，以为友谊可以天长地久。然而一场由手机视频引发的冲突，将其中一人推向了死亡的边缘。随着警方的介入，七个人开始互相推诿、背叛。曾经坚不可摧的小团体在“烈日”的炙烤下支离破碎。主角阿九试图挽救兄弟情，却发现自己无能为力。影片最后，七个人在法庭外擦肩而过，形同陌路，只有头顶的太阳依然毒辣。", "one_line": "七个香港少年在回归后的迷茫中成长，一次暑假的意外事件让他们的友谊和人生走向失控。", "bucket": "drama"}, {"id": "1658", "title": "夏妍的秋天", "filename": "m1658.html", "year": "2024", "region": "中国大陆", "genre": "剧情, 家庭", "tags": "高考, 原生家庭, 成长, 青春", "summary": "重点高中女生夏妍乖巧听话，是妈妈的骄傲。某天她偷听到妈妈确诊胰腺癌晚期，瞒着自己。夏妍决定从一个“乖女儿”变成“问题少女”：染发、逃课、早恋，故意让班主任叫家长。妈妈气得哭着打她，夏妍却偷偷高兴——妈妈有力气打人，说明身体还好。但她没想到，妈妈撑着病体带她去医院做“堕胎检查”，夏妍当众跪下哭着说出真相：“我没怀孕，我只是不想让你死。”母女在医院走廊抱头痛哭。秋天来了，妈妈多活了半年，看到了夏妍的录取通知书。", "one_line": "高三女生夏妍发现妈妈患癌后，选择用“早恋”来逼妈妈活下去。", "bucket": "drama"}, {"id": "1659", "title": "一杯热奶茶的等待", "filename": "m1659.html", "year": "2024", "region": "中国台湾", "genre": "爱情，青春，校园", "tags": "校园，奶茶，暗恋，等待，温暖治愈", "summary": "大一新生晓彤在学校奶茶店打工，每天下午五点，一个穿灰色卫衣的学长会准时来买热珍珠奶茶，三分糖，加奶霜。她偷偷记住了他的口味，每次都提前做好，然后假装刚好煮好。她不知道他的名字，只知道他学号前几位，知道他用左手拿杯子，知道他耳机里永远是陈绮贞。三年过去，学长快毕业了，晓彤依然没敢多说一句话。毕业典礼前一天，学长最后一次来买奶茶，晓彤手抖得倒洒了半杯。学长走后，她趴在吧台上哭了。这时，老板递给她一个厚厚笔记本，上面按日期记录了三年里每一天的“五点订单”，最后一页写着：“傻孩子，他去年就知道了。他说，谢谢你每一杯准时出现的奶茶。他一直在等你说你好。”", "one_line": "她在学校奶茶店每天为同一个人点同一杯热奶茶，直到那人毕业也没说出口，但奶茶店老板替她记了三年。", "bucket": "romance"}, {"id": "1660", "title": "危险的追缠", "filename": "m1660.html", "year": "2026", "region": "韩国", "genre": "悬疑，惊悚，犯罪", "tags": "跟踪狂，心理战，女性安全，反杀", "summary": "刚刚离婚的心理咨询师车秀珍搬进了一栋新公寓，开始独居生活。不久，她发现门外总有奇怪的记号，快递被人拆开，甚至深夜有人试她的密码锁。她报警，但警方因没有实质性伤害而敷衍了事。秀珍决定不再做受害者，她利用自己的专业知识，开始反向分析跟踪者的心理画像和行为模式。她故意留下线索，设置监控，一步步引诱跟踪者暴露。在一次次惊心动魄的猫鼠游戏中，她发现跟踪者竟是她公寓的管理员，一个有着反社会人格的连环杀手前科犯。最终的决战在她自己家中展开，她提前改造的房间变成了猎杀跟踪者的陷阱。", "one_line": "独居的离婚女人发现有人在跟踪她，报警无果后，她决定用自己的心理学知识设下陷阱。", "bucket": "suspense"}, {"id": "1661", "title": "冰狗任务", "filename": "m1661.html", "year": "2025", "region": "美国", "genre": "喜剧， 家庭， 冒险", "tags": "狗狗， 极地， 救援", "summary": "宠物狗“总统”因为主人破产被遗弃在阿拉斯加荒野。起初，它靠着卖萌和翻垃圾桶度日。一次偶然，它被经验丰富的雪橇犬领队“老船长”收留，但要留下来，它必须学会拉雪橇。作为一只血统纯正的哈士奇，它体内流淌着祖先的野性。经过一系列啼笑皆非的训练，它逐渐从一只只会拆家的宠物，变成了一名合格的“引擎”。然而，真正的考验来了。因为一次意外，一个跟随父亲来考察的10岁小女孩“小北”在暴风雪中走失。所有人都在后退，只有“总统”挣脱了绳索，循着微弱的气味冲进了白茫茫的天地。它凭借着雪橇犬的本能和敏锐的直觉，在能见度为零的冰河上，找到了冻得奄奄一息的小北，并用它毛茸茸的身体为小女孩保温了整整一夜，直到救援队顺着它的叫声找到他们。", "one_line": "一只被遗弃在阿拉斯加的哈士奇，为了生存加入了雪橇犬队伍，并在百年一遇的暴风雪中，带领迷路的小女孩穿越冰河回家。", "bucket": "comedy"}, {"id": "1662", "title": "沙鸥", "filename": "m1662.html", "year": "2024", "region": "中国大陆", "genre": "剧情 / 家庭", "tags": "沙漠, 捡拾者, 救赎", "summary": "腾格里沙漠深处，被人遗忘的“沙鸥”独自生活在一座废弃的兵站里，日复一日地骑着骆驼捡拾被风沙掩埋的垃圾。他从不说话，只与一只受伤的大雁为伴。某天，他发现了奄奄一息的石油工程师陆鸣。陆鸣因项目失败导致沙漠水源污染，间接害死了牧民的孩子，从而陷入深深的自责。沙鸥救活了陆鸣，却拒绝送他出去。两人在沙漠腹地展开了一场旷日持久的对峙与陪伴。陆鸣想死，沙鸥教他活着。陆鸣发现，沙鸥曾是顶尖的沙漠水文专家，因自己报告的失误导致了20年前的一场黑风暴，掩埋了整个村庄，包括他的妻女。沙鸥的余生都在“清理”自己造成的“垃圾”。当陆鸣终于走出沙漠，带着解决方案回来时，沙鸥和大雁都消失了，只留下一串向更深处延伸的脚印。", "one_line": "在腾格里沙漠腹地，一位孤独的垃圾捡拾者救下了一位想自杀的石油工程师，两人在荒芜中寻找生命的绿洲。", "bucket": "drama"}, {"id": "1663", "title": "暗黑", "filename": "m1663.html", "year": "2026", "region": "德国 / 美国", "genre": "科幻 / 悬疑 / 哲学", "tags": "洞穴, 核废料, 时间循环, 家族宿命", "summary": "温登镇核电站发生轻微泄漏后的33年，小镇上再次出现儿童失踪案。但与《暗黑》原剧不同的是，这次的时间异常并非33年循环，而是“量子叠加态”——每一个重大选择都会创造出一个平行的、永恒存在的现实。主角是一位能同时“看见”所有分叉时间线的物理学家的女儿。她发现，失踪的儿童并非被绑架，而是被一种由核废料变异而来的“时间真菌”吸引，主动走入地下的洞穴系统，在那里，时间像菌丝一样缠绕。每个孩子进入不同的“时间菌丝”分支，成为了那个分支里唯一的“现实锚点”，以防止那个分支崩溃。主角为了救回弟弟，必须穿梭于数百个越来越扭曲、痛苦的分支时间线中，最终意识到，“暗黑”的本质不是时间循环，而是逃避选择。", "one_line": "小镇地下的核废料泄漏，导致时间并非循环，而是像树枝一样分叉、交缠，每一个选择都创造新的地狱。", "bucket": "sci-fi"}, {"id": "1664", "title": "帝国的崛起：奥斯曼第二季", "filename": "m1664.html", "year": "2026", "region": "土耳其", "genre": "历史, 战争, 剧情", "tags": "穆罕默德二世, 君士坦丁堡, 宫廷阴谋, 大炮", "summary": "第二季紧接第一季结尾。奥斯曼苏丹穆罕默德二世终于攻陷了君士坦丁堡，完成了历代苏丹的梦想。但胜利的喜悦转瞬即逝：这座“空城”满目疮痍，人口不足万人；西方国家正在酝酿新的十字军；更危险的是，内部最精锐的苏丹亲兵军团认为穆罕默德二世功高震主，打算发动政变，立他的幼子为傀儡苏丹。本季聚焦穆罕默德二世如何在这座他亲手夺下的废墟上，用铁腕、外交和文化政策，将君士坦丁堡重建为新的首都“伊斯坦布尔”。他与威尼斯海军的海上对峙、与匈牙利工程师的“乌尔班大炮”升级竞赛、以及对苏丹亲兵军团的冷酷清洗，构成了三条主线。最终，他将一座破碎的东正教城市，变成了伊斯兰世界的璀璨明珠。", "one_line": "21岁的穆罕默德二世不仅要攻破千年古城，还要肃清内部想要他命的苏丹亲兵。", "bucket": "drama"}, {"id": "1665", "title": "芝加哥烈焰第十三季", "filename": "m1665.html", "year": "2027", "region": "美国", "genre": "剧情 / 动作", "tags": "救援行动，消防员日常，兄弟情，职场剧", "summary": "新一季中，深受爱戴的博登局长升职，51号消防站迎来一位作风强硬的新队长。同时，三位充满理想但也自负的年轻消防员加入。在一次大型商场火灾中，救援队发现这不是意外，而是一系列针对城市地标的预谋纵火案的开端。老队员凯西和塞维莱德一边应对内部新老队员的磨合，一边与警探合作追查纵火犯。当凶手将炸弹放在另一座消防站，并直播威胁要炸毁全城消防站时，51号队的每个人必须放下分歧，在烈焰中证明“家人”的意义。", "one_line": "老队长卸任，新人加入51号消防站，一场史无前例的连环爆炸案考验着每个人的职业信仰。", "bucket": "drama"}, {"id": "1666", "title": "爱上老妈", "filename": "m1666.html", "year": "2018", "region": "韩国", "genre": "奇幻 / 爱情 / 家庭", "tags": "穿越, 恋母情结, 身份错位, 治愈", "summary": "37岁的混混姜赫洙对年迈母亲恶语相向，却在雨夜为救她被车撞飞。醒来后，他发现自己回到了1987年，变成了一个俊美的大学生。他偶遇了年轻时的母亲李美淑——当时她是个怀揣歌手梦的乡下姑娘，温柔又倔强。赫洙在不知情的情况下被她的纯粹吸引，展开热烈追求。与此同时，真正的父亲出现了，是个懦弱自私的渣男。赫洙必须在“阻止父母结婚让自己消失”和“让母亲获得更好人生”之间做选择，而母亲也逐渐察觉到他身上那股熟悉到悲伤的气息。", "one_line": "因为一场车祸，不孝子灵魂穿越回父母年轻时代，竟对自己的“陌生”母亲一见钟情。", "bucket": "fantasy"}, {"id": "1667", "title": "夏日情人", "filename": "m1667.html", "year": "2026", "region": "中国香港", "genre": "爱情 / 喜剧 / 奇幻", "tags": "海滩，夏日恋情，身份错位，互换身体，治愈", "summary": "阿德是个社交恐惧的程序员，被公司强制休假来到海滨小镇。他误喝了一瓶神秘的“夏日特调”鸡尾酒后，竟与泼辣直率的民宿老板娘Molly互换了身体。阿德要学着处理难缠的客人、做海鲜大餐，而Molly则要面对代码与线上会议。两人一边搞笑地替对方“填坑”，一边逐渐理解彼此生活的压力与梦想。暑假接近尾声时，他们必须在一次盛大的海滩派对上找到那位调酒师，才有可能换回身体。可此时，阿德已经爱上了作为“Molly”的自由生活，而Molly也不愿回到原来那个被生意困住的自己。", "one_line": "落魄程序员与度假村女老板意外交换身体，必须在整个暑假里替对方经营人生。", "bucket": "romance"}, {"id": "1668", "title": "伊萨多拉", "filename": "m1668.html", "year": "2025", "region": "法国 / 英国", "genre": "传记，音乐，剧情", "tags": "舞蹈家，自由，悲剧", "summary": "影片讲述了美国现代舞先驱伊萨多拉·邓肯传奇而悲剧的一生。从旧金山的贫寒童年，到自创赤足、身着希腊长衫、以自然动作为灵魂的全新舞蹈，她颠覆了整个芭蕾世界。她一生崇尚爱情与生育，却经历了两个孩子坠河身亡的巨大打击。她游历欧洲、苏联，将艺术与政治革命理想结合，创办舞蹈学校。影片以她生命最后一天在尼斯的蔚蓝海岸开车兜风为线索，不断穿插倒叙。她那条标志性的、长而飘逸的红色围巾卷入车轮，瞬间勒断她的颈椎，生命在50岁时戛然而止。影片结尾，镜头缓缓升起，那条围巾在风中飞舞，仿佛她终于挣脱了肉体，化为了纯粹的舞姿。", "one_line": "她是现代舞之母，一生追逐自由，最终却以一种戏剧性的方式，被自己的围巾夺去了生命。", "bucket": "drama"}, {"id": "1669", "title": "乡情", "filename": "m1669.html", "year": "2023", "region": "中国大陆", "genre": "剧情", "tags": "方言, 留守儿童, 公路, 治愈", "summary": "七十岁的张奶奶接到电话，得知在东莞打工的孙子误入传销被洗脑，不肯回家且拒绝联系。儿子儿媳在外省工地赶不回来，村里人都劝她等警察消息。张奶奶不懂什么是传销，她只知道过年必须团圆。凭着年轻时当过赤脚医生的倔劲，她带上腊肉和孙子最爱吃的辣椒酱，骑着一辆破旧的三轮摩托车出发了。一路上，她经历了导航失灵、暴雨滑坡、被黑车司机骗钱，也遇到了同样在外漂泊的年轻打工者帮她修车。当她跨越三省终于找到那个封闭的出租屋时，她没有哭闹，只是当着所有人的面打开那罐已经发霉的辣椒酱，轻声说：“强强，妈炒了你爱吃的腊肉，在锅里，凉了就不好吃了。”", "one_line": "春节前夕，一个从未出过远门的贵州山村老妇人，决定独自骑摩托车跨越千里去广东接被骗的孙子回家。", "bucket": "drama"}, {"id": "1670", "title": "我们这一天第一季", "filename": "m1670.html", "year": "2024", "region": "美国", "genre": "剧情 / 家庭 / 喜剧", "tags": "治愈, 多线叙事, 催泪, 日常", "summary": "3月12日，五个不同城市的人同时过生日。纽约的失意编剧收到一封寄错的信，收件人是“同样孤独的你”。他恶作剧般把信转寄给了芝加哥的单身母亲。单身母亲看完信，把它塞进图书馆的书里。洛杉矶的退休老人借到这本书，感动落泪，把信寄给了迈阿密的癌症少年。少年读完，在临终前把信折成纸飞机扔出窗外，落在休斯顿的环卫工人脚下。环卫工人找到了信的原主人——那个纽约编剧。编剧被这趟“信的旅行”震撼，他写下了一个剧本，就叫《我们这一天》。第一季结尾，五个陌生人因为一封信在纽约中央公园相遇，笑着流泪。生活很苦，但巧合很甜。", "one_line": "同一天生日的一群陌生人，他们的生活被一封寄错的信悄悄串联。", "bucket": "drama"}, {"id": "1671", "title": "打鬼王：猫王大战埃及鬼王", "filename": "m1671.html", "year": "2026", "region": "美国", "genre": "喜剧, 恐怖, 音乐", "tags": "山寨猫王, 埃及咒术, 摇滚驱魔, B级片", "summary": "拉斯维加斯，2026年。模仿猫王的艺人“燃烧龙”事业跌入谷底，只能在赌场停车场表演。一天，他从神秘古董商手中购得一条刻有圣甲虫的围巾，当晚就被一只自称“奈菲尔塔莉”的埃及公主木乃伊附身。公主告诉他，她的暴君父亲拉美西斯十一世即将以“鬼王”形态复活，要吞噬所有模仿猫王的歌手——因为猫王的扭胯动作，正是三千年前封印他的古老舞蹈的“堕落版本”。燃烧龙不得不穿上镶满镜片的镀金连体衣，在赌城大道上与鬼王展开终极对决。他的武器不是枪炮，而是《监狱摇滚》和一双会发光的白皮鞋。", "one_line": "拉斯维加斯模仿猫王的过气歌手，被埃及公主的木乃伊选中，穿上镀金连体衣，用摇滚乐对抗复活的法老诅咒。", "bucket": "comedy"}, {"id": "1672", "title": "乌龙歼敌记", "filename": "m1672.html", "year": "1978", "region": "中国香港", "genre": "喜剧 / 动作 / 战争", "tags": "功夫喜剧, 抗日, 搞笑, 经典港片", "summary": "抗日战争时期，村民阿牛、阿呆、阿花误打误撞烧了日军粮食，被逼上山加入游击队。队长派他们炸掉敌军弹药库，三人制定各种荒唐计划：用鸡拉鞭炮假装机枪声，穿日本军服却反穿，挖地道挖到粪坑。每次都以失败告终，却阴差阳错引发混乱。最终他们偷喝酒后醉醺醺摸进弹药库，点燃烟头引爆火药，成功炸毁目标，自己也稀里糊涂成了英雄。", "one_line": "三个不靠谱的抗日游击队成员，用各种乌龙计策误打误撞炸掉了日军弹药库。", "bucket": "comedy"}, {"id": "1673", "title": "未完的天空", "filename": "m1673.html", "year": "2025", "region": "英国", "genre": "科幻, 剧情, 爱情", "tags": "平行宇宙, 天空, 记忆, 哲学", "summary": "近未来，人类发明了“天空云盘”——将记忆上传至云端，并在天空中生成专属的极光影像。人们沉迷于观看自己和他人的“记忆天空”，现实交流彻底消亡。建筑师艾伦发现，他去世五年的妻子，其天空片段突然多了一段“未完的对话”。为了给这段对话画上句号，他必须潜入禁止进入的记忆底层数据，在那里他看到了妻子临死前最后的秘密：一个关于他们儿子是否要来到这个“失语世界”的艰难抉择。天空开始崩塌。", "one_line": "一种“记忆上载天空”的技术普及后，人们不再交流，只抬头看天上的“未完故事”。", "bucket": "sci-fi"}, {"id": "1674", "title": "天才佳人", "filename": "m1674.html", "year": "2024", "region": "中国大陆", "genre": "古装, 爱情, 悬疑", "tags": "女强, 智斗, 探案", "summary": "太傅之女沈鱼因家族被诬陷谋反，沦为阶下囚。凭借过目不忘的记忆力，她在狱中倒背法典，引起了大理寺卿顾晏的注意。顾晏将她赎出，名为奴婢，实为助手。沈鱼扮丑隐藏身份，在顾晏身边利用超强记忆力分析卷宗、还原案发现场。两人联手破解了“科场舞弊案”“铜钱之謎”等奇案，却发现所有线索都指向十年前的太子废黜案。随着感情升温，沈鱼发现顾晏竟是自己杀父仇人的儿子。在最后的宫变中，沈鱼用记忆恢复了被篡改的圣旨，还家族清白，而顾晏也选择大义灭亲。两人在废墟之上，重新立下了守护律法的誓言。", "one_line": "拥有过目不忘能力的落魄闺秀，为了替父翻案，不得不扮丑投靠当朝第一神探，却引出了一场宫闱秘事。", "bucket": "fantasy"}, {"id": "1675", "title": "怪异同床人", "filename": "m1675.html", "year": "2024", "region": "韩国", "genre": "喜剧, 爱情, 奇幻", "tags": "灵魂互换, 契约婚姻, 欢脱, 治愈, 韩剧", "summary": "全韩国最不想结婚的男人——富三代姜宇宙，与全韩国最想结婚的女人——婚礼策划师吴太阳，因为一场离奇车祸灵魂互换了。更倒霉的是，姜宇宙的家族正逼他迎娶商业联姻对象，而这场婚礼的策划师恰好是吴太阳所在的婚庆公司。灵魂互换后，姜宇宙（在吴太阳身体里）必须亲手策划自己的“葬礼式婚礼”，而吴太阳（在姜宇宙身体里）则要扮演一个她不爱的男人，去娶另一个女人。两人为了换回身体，试遍了所有民间偏方：接吻、再撞一次车、甚至请巫师跳大神，结果全都无效，反而闹出一连串爆笑乌龙。随着相处，恐婚的姜宇宙通过吴太阳的眼睛，第一次看到普通人眼中“婚礼不是坟墓而是承诺”；恨嫁的吴太阳则发现，婚姻不是终点，遇到对的人才是。最后他们发现，互换的“钥匙”不是恨，而是真心说出一句“我愿意”——但是对彼此说，而不是对原定对象。", "one_line": "一个恐婚的富二代和一个渴望结婚的穷家女因意外灵魂互换，被迫以对方的身份筹备同一场婚礼。", "bucket": "comedy"}, {"id": "1676", "title": "五月八月", "filename": "m1676.html", "year": "2021", "region": "中国香港", "genre": "剧情, 家庭, 文艺", "tags": "母亲节, 父亲节, 家庭秘密, 书信, 时代", "summary": "姐姐五月和妹妹八月在母亲去世后，回到空置多年的老家整理遗物。她们发现一个铁盒，里面是母亲在她们每年生日时写的信，但诡异的是，五月收到的信落款是“八月”，而八月收到的信落款是“五月”。妹妹发现，母亲似乎有意混淆自己的出生月份，直到她们找到一张泛黄的病历。原来，妹妹八月是母亲与前男友的孩子，而五月是母亲与现任丈夫的孩子。为了不让妹妹觉得自己被区别对待，母亲强忍内心的割裂，将每个生日都过成两个人的庆典。姐妹俩没有追问生父是谁，而是默默将信件的落款日期都改成了“五月八月”，从此，她们只过同一个生日。", "one_line": "一对姐妹在整理遗物时发现，母亲在每年五月写给她们的信，落款日期都是八月，中间隔了三个月。", "bucket": "drama"}, {"id": "1677", "title": "那些老爸没教的事", "filename": "m1677.html", "year": "2023", "region": "中国台湾", "genre": "剧情, 家庭", "tags": "成长, 父子, 和解, 遗愿清单", "summary": "阿文一直认为父亲是个沉默古板的公务员。父亲猝死后，他整理遗物时发现一本空白笔记本，只第一页写着：“阿文，爸爸要教你的事。” 为了理解父亲，阿文开始走访父亲的老战友、旧情人甚至酒肉朋友。他惊讶地发现，父亲年轻时曾是玩乐队的热血青年，为了家庭放弃了出国梦。在寻找答案的过程中，阿文也正面临自己儿子的叛逆期，两代人的隔阂通过这本笔记产生了奇妙的共振。", "one_line": "父亲葬礼后，儿子按照一本空白笔记本，踏上寻找“爸爸没能教他的那些事”的荒诞旅程。", "bucket": "drama"}, {"id": "1678", "title": "飞越疯人院之随机兄弟", "filename": "m1678.html", "year": "2025", "region": "美国", "genre": "剧情 / 喜剧 / 冒险", "tags": "精神病院, 逃亡, 兄弟情, 荒诞, 黑色幽默", "summary": "杰克是个精于算计的偏执狂，迈克是个随遇而安的躁郁症患者。两人被关在同一家管制森严的精神病院，为了重获自由，他们发明了“随机原则”：每一次决策——从偷钥匙的时间到逃跑的方向——全部靠抛硬币决定。这种荒谬的方法竟奇迹般地让他们躲过了所有安保系统。在雨夜的逃亡途中，杰克发现自己其实并没有病，而迈克一直知道这个秘密。两个游走于疯狂与清醒边缘的男人，最终在一条泥泞的公路上分道扬镳，留下一个关于信任与算计的开放式结局。", "one_line": "为了逃出疯人院，两个性格迥异的病友决定用抛硬币的方式，随机制定所有逃跑计划。", "bucket": "drama"}, {"id": "1679", "title": "明天，我要和昨天的妳约会", "filename": "m1679.html", "year": "2024", "region": "日本", "genre": "爱情， 奇幻， 剧情", "tags": "时间逆流， 催泪， 纯爱， 京都", "summary": "在京都学画的大学生南山高寿，对电车上哭泣的女生爱美一见钟情并告白。两人迅速坠入爱河，但高寿发现爱美总能预知他的行动，且每月都会消失几天。原来，爱美来自一个平行世界，两个世界的时间流向完全相反。高寿的明天就是爱美的昨天，他们每隔五年才有三十天交汇期。随着相处，高寿经历着爱美对他“越来越陌生”的过程：他第一次吻她时，却是她最后一次吻他。高寿必须用日记记录下每一个“首次”，因为对爱美而言，这些都是在回忆中逐渐消逝的“最后”。", "one_line": "他的明天是她的昨天，一对恋人逆向时间相恋，每次见面对方的记忆都在递减。", "bucket": "romance"}, {"id": "1680", "title": "皇家铁马粤语", "filename": "m1680.html", "year": "1991", "region": "中国香港", "genre": "动作 / 时装 / 警匪", "tags": "飞虎队, 兄弟情, 枪战, 粤语原声, 热血", "summary": "香港回归前夕，治安混乱。由队长方世华（化名）领导的“皇家铁马”特别行动组，配备了一辆集通信、防爆、火力压制于一身的装甲指挥车“铁马”。在一次追踪失窃的高杀伤力武器时，组员阿龙发现幕后黑手竟是当年将自己踢出警队的师兄阿强。阿强如今已成为国际军火商的头号马仔，两人在狭窄的九龙城寨展开宿命对决。方世华不仅要面对外部的枪林弹雨，还要调解组内因出身和理念不同产生的矛盾。最终，“铁马”冲入码头仓库，在爆炸与火焰中，展现了香港警察维护法治最后尊严的热血与牺牲。", "one_line": "飞虎队精英驾驶高科技装甲车“铁马”，与跨境军火商展开一场生死时速的街头对决。", "bucket": "action"}, {"id": "1681", "title": "鬼谷神珠", "filename": "m1681.html", "year": "2023", "region": "中国大陆", "genre": "奇幻 / 冒险 / 动作", "tags": "修仙, 夺宝, 师徒, 国风, 反转", "summary": "小杂役阿弃被师门嘲笑三年，只因他灵根为“无”。某日秘境开启，鬼谷神珠出世，众人争夺中，神珠竟主动飞入阿弃体内。他获得了毁天灭地的混沌之力，但代价是每次使用，身体就会衰老十年。与此同时，魔族入侵、正道溃败，所有人都逼他出手。只有师父默默带他逃亡，教他控制力量。但当阿弃决定以最后一次衰老为代价拯救苍生时，师父突然从背后刺穿了他的灵台——原来师父的肉身早已腐朽，他活了五百年就是为了等一个能承载神珠的“容器”，好让自己重生。阿弃倒在血泊中，笑了：那我就让你永远得不到。", "one_line": "废柴徒弟意外吞下鬼谷神珠，获得混沌之力，但每用一次就会变老十岁，而他的师父才是想夺珠的幕后黑手。", "bucket": "fantasy"}, {"id": "1682", "title": "超级飞侠：乐迪加速", "filename": "m1682.html", "year": "2024", "region": "中国大陆", "genre": "动画 / 儿童", "tags": "超级飞侠, 冒险, 友谊, 成长", "summary": "在一次前往亚马逊雨林的派送任务中，乐迪为了追赶被风刮走的包裹，意外启动了金宝发明的新装置“时空加速器”，导致他和多多、小爱、酷飞一起被吸入了混乱的时空裂缝。他们看到了过去的自己，也看到了如果任务失败导致的黑暗未来。最令乐迪难过的是，在那个黑暗未来里，因为他的冲动，小伙伴们都不再理他了。为了修复时空并挽回友谊，乐迪必须凭借最快的速度，在多元宇宙中找到散落的“信任碎片”，重新点燃团队合作的勇气。", "one_line": "乐迪在一次派送任务中误入时空裂缝，必须跑赢时间才能挽回和小伙伴们的友谊。", "bucket": "animation"}, {"id": "1683", "title": "肥瑞的疯狂日记第一季", "filename": "m1683.html", "year": "2023", "region": "英国", "genre": "喜剧 / 剧情 / 青春", "tags": "肥胖焦虑, 少女, 校园, 英式丧, 成长", "summary": "瑞秋，绰号肥瑞，因为暴食和自残被母亲送进青少年精神科病房。她讨厌所有人，包括自己。病房里有厌食症的芭蕾少女、强迫症的数学天才、社恐的电竞男孩。心理医生给了她一本空白笔记本，让她每天写一件事：今天谁让你生气，什么食物让你崩溃，你想对体重秤说什么。一开始瑞秋写满诅咒，渐渐开始画漫画、写诗、编段子。她发现芭蕾少女偷吃她的零食，数学天才帮她算热量缺口，电竞男孩说“你骂人的时候很美”。出院后她回到校园，仍然被霸凌，但她学会了反击：“我胖，但我的灵魂不占内存。”第一季结尾，她在全校朗诵会上读了日记片段，没有瘦下来，没有变美，但她笑了。", "one_line": "16岁、110公斤的肥瑞被送进精神病房，她用一本“疯狂日记”记录下自己与世界和解的笨拙过程。", "bucket": "comedy"}, {"id": "1684", "title": "办公室", "filename": "m1684.html", "year": "2023", "region": "韩国", "genre": "恐怖，悬疑", "tags": "996，社畜，加班，恶灵，打卡机", "summary": "首尔某广告公司，强制996。第一个月，员工在地铁站被推落轨道。第二个月，有人在厕所上吊。第三个月，打卡机每天早晨打印出一张纸条，上面是一个员工的名字和死法。新人李贞恩发现打卡机其实是一台“怨气值计算器”——加班最少的员工会死。全公司开始疯狂内卷，谁都不敢下班。李贞恩查出真相：打卡机里封印着一名三年前过劳死的程序员，他的遗言是“既然都这么爱加班，那就加一辈子吧”。最后一幕，李贞恩砸碎打卡机，却发现里面根本没有芯片，只有一颗还在跳动的心脏。", "one_line": "公司连续加班三个月后，打卡机开始吐出死亡预言：“不加班，就加棺。”", "bucket": "horror"}, {"id": "1685", "title": "暗红", "filename": "m1685.html", "year": "2018", "region": "中国大陆", "genre": "悬疑 / 惊悚", "tags": "心理, 密室, 反转, 色彩美学", "summary": "摄影师宋瑶遭遇严重车祸，患上了罕见的“色盲症”，她的世界变成了黑白。奇怪的是，她只能看到一种颜色：红色。这种红色只出现在她死去丈夫的遗物上，并且随着时间推移，这抹红色竟然从照片蔓延到了家里的墙壁、家具，甚至空气中。所有人都以为她出现了幻觉，但宋瑶发现，这抹红色在引导她揭开丈夫死亡的真相。当她顺着红色指引找到丈夫生前秘密租用的暗房时，冲洗出来的照片显示了另一个女人的脸。而就在这一瞬间，红色瞬间吞噬了整个房间，宋瑶惊恐地发现，原来不是世界变成了黑白，而是“红色”在吃掉其他所有颜色。这是一场关于嫉妒与阴谋的视觉心理战。", "one_line": "一场车祸后，女人醒来发现世界失去了所有颜色，除了她丈夫尸体上不断扩大的那一抹诡异的暗红。", "bucket": "suspense"}, {"id": "1686", "title": "耕田佬艳福", "filename": "m1686.html", "year": "1994", "region": "中国香港", "genre": "喜剧， 爱情， 情色", "tags": "王晶式， 乡村艳遇， 荒诞， 港式笑料， 女鬼", "summary": "阿福是元朗种田的憨厚光棍。犁地时刨出一尊古怪小佛像。当晚，三位风格各异的美女（清纯村姑、风情寡妇、时髦港女）同时出现在他破屋，都声称要嫁给他。阿福以为桃花运，却发现她们每晚都在他睡着后互相厮杀，且个个都会露出狐狸尾巴、蛇鳞或纸人面孔。道士告诉他：这是欢喜佛镇压的三妖，谁挖出佛像，谁就是“容器”——三妖必须吃掉他的阳气才能解封。阿福将计就计，设计让三妖互吞，最后娶了被净化的人类女子。", "one_line": "老实农夫在田里挖出一尊欢喜佛，从此每晚都有绝色女子主动上门，却个个要他命。", "bucket": "comedy"}, {"id": "1687", "title": "青之壬生狼", "filename": "m1687.html", "year": "2024", "region": "日本", "genre": "历史, 动作", "tags": "新选组, 动漫改编, 剑戟, 兄弟情, 幕末", "summary": "时值幕末，京都。少年太郎因仰慕“壬生狼”新选组的侠义精神，加入其中，被分配在队长土方岁三麾下。然而他渐渐发现，新选组内部并非铁板一块：近藤勇被权力腐蚀，土方岁三冷酷无情，而那个名为“青之助”的刽子手，其实是一个可以附身他人的怨灵，正以“忠于局长”为名，蛊惑队员相互残杀以增强力量。当青之助附身了太郎最好的朋友，并命令其切腹时，太郎做出了一个疯狂的决定：他要冲进京都的漫天大火，找到当年封印青之助的阴阳师后裔，哪怕亲手毁掉他曾经信仰的新选组。", "one_line": "热血少年加入新选组，却发现传说中的“壬生狼”内部早已被一只“青色的鬼”吞噬。", "bucket": "drama"}, {"id": "1688", "title": "英雄", "filename": "m1688.html", "year": "2002", "region": "中国大陆", "genre": "动作 / 武侠 / 剧情", "tags": "张艺谋，色彩美学，武侠，天下", "summary": "战国末年，长空、残剑、飞雪是令秦王闻风丧胆的三名刺客。小亭长无名苦练十年剑法，一举击杀三人，获准近秦王二十步。大殿之上，无名向秦王讲述刺杀过程：残剑因儿女情长失手，飞雪妒而杀之。秦王听后沉默，缓缓说出另一个版本：残剑早已悟得“天下”二字，为阻止飞雪复仇甘愿赴死。真相在两人的对话中层层剥开，原来这是一场以命为棋的惊天布局。残剑赠无名二字——“天下”。最终，无名放弃刺杀，以血肉之躯成就秦王统一大业。漫天箭雨下，残剑与飞雪的侠侣身影化作大漠中的一抹红。", "one_line": "无名十步一杀，刺客与秦王对坐，何为英雄？三层故事，三重真相，一剑定天下。", "bucket": "action"}, {"id": "1689", "title": "雪地黄金犬2", "filename": "m1689.html", "year": "1994", "region": "美国", "genre": "冒险, 家庭", "tags": "狗, 阿拉斯加, 淘金, 续集, 感人", "summary": "继承了父亲的冒险精神，小男孩杰克在阿拉斯加的废弃金矿发现了一块足有拳头大的“愚人金”（黄铁矿）。虽然不值钱，但他视为珍宝。与此同时，第一集中那只传奇雪橇犬“白牙”的后代“雪球”成为了他的伙伴。一个贪婪的矿商误以为杰克发现了真正的金矿脉，派出手下夺取土地。更糟的是，一只体型庞大的野生狼王盯上了这片矿区，因为这里曾是它的领地。寒冬来临，杰克和雪球被困在金矿木屋。矿商手下破坏了他们的雪橇，狼王则在夜晚围着木屋嚎叫。在暴风雪之夜，三方势力爆发混战。雪球为了保护杰克，与狼王在雪地里展开了长达十分钟的殊死搏斗。最终，雪球凭借一半狼的血统和勇气，战胜了狼王，但也因此受了重伤，杰克则用那块“愚人金”砸晕了矿商。", "one_line": "第一集中那只忠诚的雪橇犬的后代，为了保护新主人的“愚人金”矿，与一只野生狼王展开生死对决。", "bucket": "action"}, {"id": "1690", "title": "追债大乱斗", "filename": "m1690.html", "year": "2024", "region": "中国香港", "genre": "喜剧 / 动作", "tags": "黑色幽默, 追债, 错位喜剧, 荒诞", "summary": "古惑仔阿飞接了一单追债任务，目标是欠下高利贷的辉哥。没想到同一天，辉哥的前妻、健身教练、老同学和被骗的投资客也纷纷上门追债。五人误打误撞将辉哥堵在屋内，却目睹辉哥被大圈仔绑架。为了拿回钱，五个互不相识的人临时组队，在九龙城寨旧址展开了一场令人啼笑皆非的营救行动，过程中黑吃黑不断。", "one_line": "五个笨贼在同一天去找同一个欠债人，却意外撞进了一场黑帮火拼的闹剧中。", "bucket": "comedy"}, {"id": "1691", "title": "步步倾心2024", "filename": "m1691.html", "year": "2024", "region": "中国内地", "genre": "爱情，古装", "tags": "穿越重启，九子夺嫡，命运改写", "summary": "现代白领张晓在一次意外后再次穿越，醒来发现自己又变成了马尔泰·若曦，时间点竟是她第一次穿越的十年前。熟知所有历史结局和人物命运的若曦，决定这一世绝不踏入紫禁城。她远避西北，只想做个小商贩安度一生。然而命运的齿轮无法停止，她还是因为一桩茶叶生意与微服私访的八爷、四爷不期而遇。当她试图用尽方法改变历史，避免挚友们的惨死时，她惊恐地发现，历史的大势不可更改，甚至因为她的小动作，悲剧变得更加惨烈。", "one_line": "经典重生，若曦带着2024年的记忆再次穿越回康熙年间，这次她不想再爱任何人，只求保命。", "bucket": "romance"}, {"id": "1692", "title": "梦魇之旅", "filename": "m1692.html", "year": "2026", "region": "西班牙", "genre": "恐怖/悬疑/奇幻", "tags": "梦境入侵, 共享噩梦, 潜意识杀人, 心理治疗", "summary": "精神科医生艾琳娜使用一种革命性的“梦境共享”技术，进入患有严重PTSD病人的噩梦中，帮助他们在潜意识层面面对创伤。当她接连治疗了数位噩梦缠身的病人后，她发现一个令人毛骨悚然的共性：所有病人的噩梦里都出现了一个戴白色面具的高瘦男人，他能在梦境中杀死病人——而现实中，病人也会跟着心脏骤停。更诡异的是，这个面具人似乎知道艾琳娜的存在，他不再满足于在梦里杀人，而是开始主动闯入艾琳娜自己的梦境。艾琳娜必须搞清楚面具人的真实身份，她发现自己20年前失踪的童年玩伴或许就是一切的起点。", "one_line": "一种新型催眠技术让心理医生进入病人的噩梦，却发现病人们的噩梦世界里住着同一个杀人魔。", "bucket": "horror"}, {"id": "1693", "title": "家有蛇仙美貌妻", "filename": "m1693.html", "year": "2025", "region": "中国大陆", "genre": "奇幻 / 喜剧 / 爱情", "tags": "白蛇传改编, 仙妖, 先婚后爱, 爆笑, 甜剧", "summary": "古代落榜书生陈墨白，在破庙里捡到一条受伤的白蛇，随手救了它。没想到白蛇是修行千年的蛇仙白素儿，为了报恩，她强行嫁给了他。新婚夜，白素儿现出原形想吓跑丈夫，结果陈墨白不仅不怕，还夸她“鳞片好看”。从此，白素儿每天都在试图让丈夫相信自己是妖怪：变蛇尾、吐蛇信、操控蛇群。陈墨白每次都淡定夸奖，甚至开始研究“养蛇指南”。直到捉妖师找上门，要收白素儿，陈墨白第一次发了火：“谁动我老婆，我跟他没完。”", "one_line": "穷书生娶了个蛇仙老婆，却天天被她追着问：你为什么不怕我？", "bucket": "fantasy"}, {"id": "1694", "title": "跨海征东", "filename": "m1694.html", "year": "2024", "region": "中国大陆", "genre": "战争 / 历史 / 动作", "tags": "海战, 明朝, 民族英雄", "summary": "嘉靖四十年，倭寇以东部某大岛为基地，肆虐沿海。水师将领俞大猷奉命跨海征东。不同于陆地战，此行要面对的是深海、台风、补给线断裂和狡猾的倭寇。他训练水师、改良福船、招募渔民。出征之日，三百艘战船扬帆。在群岛海域，双方展开长达三天的激战：火铳对射、跳帮肉搏、火攻水淹。副将战死、粮草被烧、甚至遭遇叛徒。在最绝望时，俞大猷站在船头，以“封侯非我意，但愿海波平”激励将士。最终他们利用潮汐规律，火攻倭寇老巢。一场血战后，硝烟散去，海面飘着残船和尸体，但大明军旗插上了岛上最高峰。", "one_line": "明朝水师将领率船队跨海征讨盘踞东部群岛的倭寇，一场决定国运的史诗海战。", "bucket": "drama"}, {"id": "1695", "title": "禁忌关系", "filename": "m1695.html", "year": "2025", "region": "中国大陆", "genre": "悬疑, 家庭, 伦理", "tags": "心理惊悚, 家庭秘密, 反转, 原生家庭, 全员恶人", "summary": "清明雨夜，富商沈万钧的葬礼上，管家正宣读遗嘱。突然，一个浑身湿透的瘸腿男人推门而入——是十年前被宣告死亡的长子沈柏年。他将一份DNA报告摔在桌上，冷笑着告诉在场的母亲、继父、弟弟妹妹：“你们谁都不是我爸的亲生孩子。”原来，沈万钧年轻时因战乱失去了生育能力。他领养了三个孤儿，对外宣称是亲生。而沈柏年，反而是沈万钧私生子，是唯一血脉。母亲精神崩溃，继父暴怒，弟妹们则开始疯狂争夺遗产。随着警方介入调查，更深的秘密浮出水面：十年前沈柏年的“死亡”竟是母亲和继父联手制造的车祸，目的是扫除他这个真继承人。沈柏年归来不为钱，只为复仇。他一步步引诱家人互相揭发，把豪宅变成角斗场。最后一集，他烧掉了所有财产证明，对着空荡荡的大宅说：“这才是你们应得的家。”", "one_line": "一场葬礼上，失踪十年的长子突然回归，却带来一个改写整个家族血缘关系的DNA报告，揭开三代人的禁忌秘密。", "bucket": "suspense"}, {"id": "1696", "title": "男人的野心", "filename": "m1696.html", "year": "2025", "region": "美国", "genre": "悬疑 / 惊悚 / 商战", "tags": "华尔街、阶层攀爬、身份盗窃、道德深渊", "summary": "纽约，没有学历的杰克冒用了在车祸中死去的天才毕业生“亚历山大”的身份，进入顶级投行。他用惊人的天赋狂赚十亿，成为华尔街神话。但就在他将要迎娶老板女儿时，真正的亚历山大出现了——他没有死，而是为了逃避追杀伪造了死亡。两人达成协议：杰克继续扮演他，亚历山大要回一半财富。当FBI找上门时，他们必须决定：到底是两个骗子，还是一个天才的两个分身？", "one_line": "一个底层交易员冒用了死人的身份进入顶级投行，却发现这个“死人”其实还活着。", "bucket": "suspense"}, {"id": "1697", "title": "轻于鸿毛", "filename": "m1697.html", "year": "2025", "region": "日本", "genre": "剧情 / 奇幻", "tags": "死后世界, 罪与罚, 治愈", "summary": "高中生优真自杀后来到一座灰白色车站。站长告诉他，每个自杀者的灵魂都有“重量”，必须通过帮助活着的亲友减轻痛苦，重量才能归零。优真被分配到“悔恨专线”，每天以梦境形式进入生者心中。他看到了母亲的眼泪、朋友的沉默、暗恋对象的自残。当他一次次努力却无法真正减轻他人的沉重时，他开始质问：活着的人需要的到底是什么？不是补偿，而是重新理解逝者的痛苦本身。", "one_line": "自杀者需要在“中转站”工作，帮助活人减轻内心的“重量”，才能获得转世资格。", "bucket": "drama"}, {"id": "1698", "title": "丢失的勋章：比利石的冒险", "filename": "m1698.html", "year": "2025", "region": "美国", "genre": "动作，冒险，奇幻", "tags": "寻宝，神秘符号，古代遗迹，师徒情深", "summary": "实习探险家比利石意外继承了祖父留下的神秘勋章，却不知道它其实是开启“永恒之库”的钥匙。一夜之间，勋章被国际犯罪组织夺走，他们企图利用里面的时空能量改写历史。为了追回勋章，比利石与毒舌的古籍专家老周合作，从亚马逊雨林追踪到喜马拉雅山下的废弃圣殿。在一次次机关陷阱与幻觉考验中，比利石逐渐读懂勋章上符号的真正含义：它不能改变过去，却能看见所有平行未来的入口。最终对决里，他选择将勋章碎片投入时空熔炉，让所有错误时间线归于虚无，自己也从胆小的菜鸟成长为真正的遗迹守护者。", "one_line": "一块能打开时空裂隙的勋章被盗，实习探险家比利石必须潜入地下古城，抢在反派之前夺回它。", "bucket": "action"}, {"id": "1699", "title": "白纸青春", "filename": "m1699.html", "year": "2025", "region": "中国大陆", "genre": "剧情，青春，家庭", "tags": "抑郁症，母女关系，校园霸凌，自我救赎", "summary": "高二女生白芷被确诊为“情感表达障碍”，在所有人眼中她就像一张没有情绪的白纸。母亲望女成凤的疯狂施压、同学无意间的集体孤立，让她选择用自残来感受自己的存在。转校生苏迟发现了她藏在课桌下的画作——那些充满暴力与绝望的涂鸦，恰恰是她无法说出口的求救信号。在白纸与彩色之间，在沉默与爆发之间，白芷必须找到一种既不伤害自己、又能让世界看见她的方式，哪怕那张画布已经破破烂烂。", "one_line": "一个被诊断为空白的青春期女孩，用撕碎自己的方式，拼凑出一张旁人看不见的人生答卷。", "bucket": "drama"}, {"id": "1700", "title": "我爱，我死，我重生", "filename": "m1700.html", "year": "2025", "region": "法国", "genre": "剧情", "tags": "绝症, 安乐死, 重生", "summary": "画家艾琳被确诊渐冻症，在病情恶化前，她前往瑞士实施安乐死。药物注射后，她的心脏停止跳动。三分钟后，在医生准备宣布死亡时，艾琳突然睁眼，呼吸恢复，肌肉力量奇迹般复原。医学无法解释。但当她回到家乡，等待她的不是拥抱，而是恐惧。邻居认为她是魔鬼附体，教会拒绝为她祈祷，甚至家人也渐行渐远。只有她的前女友、如今已是修女的玛格丽特相信她还是那个艾琳。当艾琳试图重新拿起画笔时，她发现自己画的每一幅画，都精准预言了一个人的死亡。她开始害怕自己，而玛格丽特必须做出选择：是站在上帝一边，还是
