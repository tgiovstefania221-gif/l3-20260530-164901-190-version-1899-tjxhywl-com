": "action"}, {"id": "1360", "title": "隐形女人", "filename": "m1360.html", "year": "2024", "region": "法国", "genre": "剧情、科幻、女性", "tags": "存在感、社会隐形、职场压迫、身体恐怖", "summary": "50岁的单亲妈妈玛丽是一家大公司的夜班清洁工，她像空气一样被同事无视。某天，她摔倒在CEO办公室，血流不止，却没有一个人注意到她，包括监控摄像头。渐渐地，她发现自己的身体正在变得透明，先是手指，然后是手臂，最后整个人从物理意义上“消失”了。变成隐形人后，玛丽没有去偷窃或复仇，而是继续做清洁工，因为她需要工资给女儿治病。但她听到了公司高层的秘密对话——他们正在研发一款能彻底抹除“无用阶层”（如清洁工、快递员）存在痕迹的药物，而她就是第一批受害者。为了阻止这项计划，玛丽利用隐形能力，将证据塞进了每一位股东的公文包，同时也要在彻底消失前，见女儿最后一面。", "one_line": "一位中年女清洁工被所有人彻底无视后，她真的获得了“隐形”的超能力，代价是无法复原。", "bucket": "drama"}, {"id": "1361", "title": "暗房", "filename": "m1361.html", "year": "2026", "region": "中国大陆", "genre": "悬疑 / 惊悚 / 心理", "tags": "胶片, 记忆, 犯罪心理, 密室", "summary": "老周在老城区开了一家胶片冲洗店，四十年如一日，是这座数码城市里最后的暗房守夜人。经常有人拿老胶卷来请他“复活回忆”。老周手艺好，话少，从不问客人为什么要洗这些几十年前的底片。直到一个年轻警察拿着一卷编号特殊的底片找上门。警察在暗房里等了一个小时，老周递出来的照片上是一个女人，从二十岁到六十岁，不同年代、不同衣着、不同表情。警察意识到，这四十年来老周冲洗的每一张照片上，都是同一个人。而那个女人的档案，在警方的系统里显示为——未查明身份，已失踪四十年。", "one_line": "一个洗胶卷的老头在暗房里冲洗了四十年照片，直到有人发现他洗的全是同一个女人。", "bucket": "suspense"}, {"id": "1362", "title": "亲吻亭3", "filename": "m1362.html", "year": "2023", "region": "美国", "genre": "爱情，青春", "tags": "大学，异地恋，闺蜜，成长，暑假", "summary": "艾尔和李是最好的朋友，她们约定一起上哈佛。但艾尔被加州伯克利录取，李则去了东海岸。最后一个暑假，艾尔试图在男友诺亚和李之间找到平衡。她去洛杉矶看望诺亚，却发现自己并不适应他的精英圈；而李在家乡筹备毕业舞会，感到被艾尔冷落。一条误发的短信让两人决裂，亲吻亭面临拆除。艾尔必须在大学开学前修复友谊，并决定亲吻亭的未来。最终她明白，真正的成长是学会放手。", "one_line": "高中毕业后的夏天，艾尔和李面临异地，她们的闺蜜协议和爱情都迎来终极考验。", "bucket": "romance"}, {"id": "1363", "title": "百合与直觉", "filename": "m1363.html", "year": "2024", "region": "日本", "genre": "悬疑，爱情", "tags": "双女主，精神分析，园艺", "summary": "天才犯罪侧写师如月瞳患有严重的社交障碍，唯一的慰藉是在公寓阳台上偷窥楼下邻居——园艺师白河百合子的花园。百合子温柔美丽，她的花园里种满了罕见的百合品种。一宗连环失踪案将两人联系到一起，如月瞳发现所有受害者的最后踪迹都指向了那家花店。随着调查深入，她惊恐地发现，百合子培育新品百合所用的“特殊肥料”，成分与人体组织高度吻合。更令人毛骨悚然的是，在搜查花园时，警方挖出了如月瞳失踪十年的姐姐的遗物，而姐姐生前，曾是百合子的初恋。", "one_line": "擅长破译犯罪心理的警探，发现新邻居的百合花园里埋着自己失踪十年的姐姐。", "bucket": "suspense"}, {"id": "1364", "title": "三五成群", "filename": "m1364.html", "year": "2011", "region": "中国香港", "genre": "剧情/黑色幽默", "tags": "小人物, 荒诞, 多线叙事", "summary": "深水埗的鱼蛋佬、无业青年、菲佣、当铺老板和退休警察，原本毫无交集。一张被丢弃又捡回的彩票成了纽带。鱼蛋佬以为丢了彩票心脏病发入院；青年捡到后发现是头奖，却被当铺老板骗走；菲佣偷走彩票想寄回家乡；退休警察为了破案尾随众人。五个人在旺角的黑夜展开追逐。最终彩票被风吹进下水道，但五人却因这场闹剧产生了奇妙的友谊，一起凑钱买了新的彩票。", "one_line": "五个不同身份的香港小人物，因为一张中了头奖却丢失的彩票，命运纠缠在一起。", "bucket": "drama"}, {"id": "1365", "title": "将军家的小儿子", "filename": "m1365.html", "year": "2023", "region": "中国大陆", "genre": "古装 / 喜剧", "tags": "穿越, 种田, 团宠, 逆袭", "summary": "投行精英沈逸车祸醒来，发现自己成了大梁国镇北将军的第九个儿子——一个体弱多病、只会吟诗作对的废物庶子。原主在家族毫无存在感，连丫鬟都欺负他。沈逸决定发挥特长：他把后院荒田改造成经济作物基地，用KPI考核管理家丁，搞军火期货赚得盆满钵满，还发明了“军营股份制”让士兵们干劲十足。原本想谋反的太子被他忽悠去搞房地产，想夺嫡的皇子们纷纷找他做理财顾问。将军老爹从嫌弃到震惊再到骄傲，最后哭着说：“这个家，没你不行啊！”", "one_line": "现代金融精英穿成将军府的废物小儿子，他用商业思维整顿家族军务，一不小心把全府带上了人生巅峰。", "bucket": "fantasy"}, {"id": "1366", "title": "秋津温泉", "filename": "m1366.html", "year": "2023", "region": "日本", "genre": "爱情 / 剧情 / 文艺", "tags": "纯爱， 昭和怀旧， 温泉疗养， 宿命感， 文学改编", "summary": "昭和末年，年轻的作家凉介在秋津温泉疗养时，爱上了旅馆老板的女儿阿雪。阿雪沉默寡言，却总在深夜为他铺好被褥、温好清酒。凉介许诺成名后必回来娶她，却在离开后逐渐杳无音讯。二十年后，凉介被诊断出绝症，他带着满心愧疚和未竟的手稿，再次踏上了前往秋津温泉的列车。车站早已荒废，旅馆也已停业，但阿雪依然穿着旧式和服，在落雪的站台上等他。原来阿雪终身未嫁，一直在经营这家只为等他一人而开的旅馆。两人在空寂的温泉旅馆中，度过了一个只有沉默交谈与回忆流淌的冬天，最终凉介在这片纯净的雪国中安详离去。", "one_line": "时隔二十年，身患绝症的作家重返秋津温泉，只为再见一面那位永远等在那里的旅馆之女。", "bucket": "romance"}, {"id": "1367", "title": "尸城30夜", "filename": "m1367.html", "year": "2025", "region": "韩国", "genre": "恐怖, 动作, 惊悚", "tags": "丧尸, 末日生存, 公寓楼, 人性", "summary": "不明病毒在首尔爆发，一栋拥有3000户居民的超高层公寓因为入口被汽车堵死，成了与世隔绝的孤岛。在最初的混乱过去后，幸存者发现顶层豪华住宅区的财阀们占据了天台农场和蓄水池，而底层住户则被困在黑暗潮湿的停车场里，日夜忍受丧尸的撞击声。以顶楼会长金顺哲为首的富人阶层宣布实行“配给制”，代价是底层要为他们在丧尸潮中充当肉盾。压抑的愤怒在一个小女孩被推出去喂丧尸后彻底爆发，一场从30楼蔓延到地下5楼的阶级战争，在丧尸的围观中惨烈上演。", "one_line": "丧尸爆发后，一栋30层公寓楼成了孤岛，顶层财阀与底层住户为了有限的资源展开了血腥内战。", "bucket": "horror"}, {"id": "1368", "title": "伊莱克特勒滑翔在蓝天", "filename": "m1368.html", "year": "2025", "region": "法国", "genre": "剧情/奇幻", "tags": "滑翔伞，救赎，幻觉，阿尔卑斯，自我和解", "summary": "曾是顶级滑翔伞运动员的伊莱克特勒，因在一次比赛中失误导致妻子坠亡而彻底沉沦。十年后，他带着酒瓶回到阿尔卑斯山的起飞点，企图结束生命。然而当他跳下悬崖展开伞翼时，一股超自然的气流将他推入一片金色的云海。在这里，他遇到了妻子年轻时的幻影，她引导他飞越那些他曾恐惧的山脊。每一次气流颠簸，都是对过往创伤的闪回；每一次平稳滑翔，都是与愧疚的一次和解。在云层深处，他不仅发现了当年事故背后被遗忘的技术真相，更重新学会了呼吸与爱，最终在现实世界的暴风雪中完成了一场不可能的安全降落。", "one_line": "失事飞行员在阿尔卑斯山上空遭遇神秘气流，竟与十年前遇难妻子的幻影共飞。", "bucket": "drama"}, {"id": "1369", "title": "树林里的夫妻", "filename": "m1369.html", "year": "2025", "region": "韩国", "genre": "悬疑/惊悚", "tags": "密室, 信任危机, 露营, 偷拍", "summary": "结婚七年的正焕和秀珍因无休止的争吵决定分居，在心理医生建议下，他们进行最后一次“荒野求生”式露营。两人在深山老林扎营，起初的尴尬在篝火和酒精作用下化为激情，关系开始回暖。然而第二天醒来，他们发现帐篷外挂着一台小型摄像机，里面记录了他们昨晚的私密对话，甚至连他们各自偷偷打算谋杀对方的玩笑话都被剪辑成了视频。手机失去信号，归途的木桥被毁，他们被困林中。更恐怖的是，视频开始播放他们从未发生过的血腥画面。两人开始互相怀疑，是对方在设局，还是有第三个人潜伏在周围？", "one_line": "一对濒临离婚的夫妻进行野外露营修复关系，却在深夜发现，帐篷外有一双眼睛记录了他们的所有秘密。", "bucket": "suspense"}, {"id": "1370", "title": "绝命毒师第二季", "filename": "m1370.html", "year": "2025", "region": "美国", "genre": "犯罪、剧情、惊悚", "tags": "毒品、化学老师、黑帮、家庭、道德沦陷", "summary": "第二季中，老白本想用第一笔毒资治疗癌症后收手，但新晋毒枭“屠夫”控制了 Albuquerque 市场，要求老白为其研发蓝色冰毒的改良版。老白拒绝，结果搭档小粉被抓。老白被迫妥协，同时他的连襟、DEA探员汉克开始追查“蓝冰之父”。老白的妻子斯凯勒发现丈夫行踪诡异，怀疑他有外遇，雇了私家侦探。双重压力下，老白设计让屠夫与另一黑帮火并，自己趁乱救出小粉，却导致汉克在交火中重伤。季末，老白看着病床上的汉克，对斯凯勒说出第一句谎话：“我只是赌钱输了。”", "one_line": "中学化学老师老白在第一季制毒后欲金盆洗手，却被新毒枭盯上，连家人都被卷入其中。", "bucket": "crime"}, {"id": "1371", "title": "泰德·邦迪", "filename": "m1371.html", "year": "2021", "region": "美国", "genre": "犯罪, 剧情, 传记", "tags": "连环杀手, 心理操控, 真人改编, 法庭对峙", "summary": "影片聚焦于1970年代美国最为臭名昭著的连环杀手泰德·邦迪。故事从他的女友伊丽莎白的视角切入，展现了一个外表英俊、谈吐优雅的法学高材生如何利用时代背景与个人魅力，反复犯下残忍罪行。警方在多州发现年轻女性的尸骸，却因邦迪的精心伪装和越狱能力而屡屡受挫。伊丽莎白在爱与怀疑中挣扎，最终配合警方设下圈套。法庭上，邦迪拒绝认罪并自行辩护，与检察官展开激烈交锋，直到最后一刻才露出其灵魂深处的虚无与疯狂。", "one_line": "表面迷人的法学院学生泰德·邦迪在女友眼中是完美情人，背后却是跨州猎杀女性的恶魔。", "bucket": "crime"}, {"id": "1372", "title": "亡命坑", "filename": "m1372.html", "year": "2024", "region": "中国大陆", "genre": "动作, 冒险", "tags": "洞穴, 求生, 贪念, 极限", "summary": "私营煤矿发生塌方，六名矿工被困在深达一千二百米的竖井底部。他们手头的食物只够撑三天，对讲机信号断断续续。在寻找渗水点时，领头的老师傅铁头用镐头刨开了一层松软的泥土，里面滚出十几具戴着旧式安全帽的骸骨。从腐烂的工作证上看，这些人死于三十年前同一座煤矿的“意外”。幸存者中有人开始崩溃，因为他的父亲就是当年失踪的矿工之一。更恐怖的是，有人发现坑底的新鲜空气入口正在被从外面故意填埋——有人不想让他们活着出去。六人从求生同伴变成彼此的嫌疑人，他们必须在氧气耗尽前找到真正的出口，和真相。", "one_line": "六名矿工被困千米深坑，却发现坑底堆积的并非矿石，而是三十年前的尸骨。", "bucket": "action"}, {"id": "1373", "title": "大道", "filename": "m1373.html", "year": "2024", "region": "中国大陆", "genre": "剧情，公路", "tags": "公路片，下岗潮，父女，和解", "summary": "1998年，东北老工业区。钢厂工人赵大路下岗了，妻子跑了，只剩他和10岁的女儿。女儿问他：“爸爸，书上说有一条‘大道’通向现代化，我们能去看看吗？”赵大路骑上那辆锈迹斑斑的二八大杠，后座载着女儿，从沈阳出发，一路向南。他们风餐露宿，遇到过骗子、卡车司机、流浪歌手。赵大路一路上给女儿讲那些消失的工厂，讲什么是“下岗”，讲什么是“国家”。3000公里，骑坏了3条轮胎，用了整整两个月。当他们终于看到上海外滩的霓虹灯时，女儿说：“爸爸，这就是大道吗？”赵大路看着车水马龙，说：“不，大道是咱们骑过来的那条路。”", "one_line": "一个90年代的下岗工人，骑着二八大杠自行车，载着女儿骑行3000公里去上海，只为看一次真正的“大道”。", "bucket": "drama"}, {"id": "1374", "title": "恋你", "filename": "m1374.html", "year": "2025", "region": "中国", "genre": "悬疑, 爱情", "tags": "记忆删除, 执念, 反转, 科幻", "summary": "程序员江望无法承受妻子意外去世的痛苦，加入“删忆计划”，抹去关于她的一切。手术成功后他确实不再悲伤，却在街头对一个陌生女人一见钟情，迅速陷入热恋。诡异的是，这个女人身上所有的小习惯、口头禅、甚至笑起来的弧度，都与他被删除的记忆隐隐重合。他开始偷偷调查，发现这个女人竟是自己“亲手创造”的——而这场重逢，从一开始就是一场针对他的精密陷阱。", "one_line": "为了忘掉亡妻，他接受了记忆清除手术，醒来后却疯狂爱上了一个陌生女人。", "bucket": "suspense"}, {"id": "1375", "title": "消失在远空中", "filename": "m1375.html", "year": "2023", "region": "日本", "genre": "悬疑, 科幻", "tags": "时间循环, 小镇, 失踪, 谜团", "summary": "北海道的偏僻小镇美瑛町在三年内连续失踪37人，警方束手无策。高中物理老师龙介发现所有失踪者的手机定位记录显示，失踪前一刻他们都在仰望天空。龙介安装了一台高精度望远镜，在某个深夜，他看到了天空中有一个肉眼无法察觉的黑色漩涡。龙介试图靠近漩涡，醒来时发现自己回到了三年前，妻子还活着，失踪者一个都没失踪。他以为是一场梦，但手表上多了三年的时间痕迹。龙介开始用这三年获得的记忆试图阻止失踪案，却发现每阻止一次失踪，就会有一个新人消失——似乎有人或某种力量在维持“消失名额”的平衡。当他终于接近真相时，发现自己已经在失踪名单上。", "one_line": "北海道小镇连续37人离奇失踪，唯一的共同点是——他们都曾仰望过同一片夜空。", "bucket": "suspense"}, {"id": "1376", "title": "游戏男孩 电影版", "filename": "m1376.html", "year": "2026", "region": "菲律宾", "genre": "爱情 / 同性 / 剧情", "tags": "网恋, 游戏直播, 奔现, 催泪", "summary": "人气网剧的电影版续作。游戏主播Cairo和工程师Gavreel经历了多年的异地恋，决定在Gavreel所在的城市见面并同居。然而，Cairo出发当天，超级台风“蝴蝶”登陆，航班取消、通讯中断。两人靠着模糊的定位共享和断断续续的网络信号，在洪水中互相指引。Cairo被困在一辆熄火的公交车里，Gavreel则冒着狂风暴雨徒步寻找。与此同时，电影穿插了两人过去三年隔着屏幕的回忆：第一次连麦、第一次因为延迟吵架、第一次隔着视频为对方过生日。当手机电量只剩1%，Gavreel终于游过积水到达公交车顶，砸开天窗，在暴雨中抱住了浑身湿透的Cairo。", "one_line": "因手游结缘的跨海情侣决定奔现，却在见面当天遭遇台风，手机仅剩最后一格电。", "bucket": "romance"}, {"id": "1377", "title": "唐朝诡事录之长安", "filename": "m1377.html", "year": "2024", "region": "中国大陆", "genre": "悬疑 / 古装", "tags": "唐朝, 探案, 诡事, 长安, 单元剧", "summary": "唐睿宗年间，长安城内发生多起离奇命案，死者均是被壁画中的武器所杀。更诡异的是，案发现场的壁画上，原本的人物会多出一个——正是死者的容貌。大理寺少卿卢凌风和医学奇才苏无名再次联手调查。随着线索深入，他们发现案件背后牵扯出一个叫“画师联盟”的神秘组织，成员皆是当年武则天时期被流放的宫廷画师后人。他们用一种特殊的颜料和催眠术，让壁画中的人物在特定条件下“活”过来。而他们的目标，是刺杀所有参与过当年“画师案”的官员后代。卢凌风必须在下一个满月之夜前找到破解之法，因为那晚长安城的三十六面壁画将同时“复活”。案件背后，还藏着一个关于“画中藏尸”的惊天秘密。", "one_line": "长安城内接连发生“壁画杀人案”，画中人物会在午夜走出墙壁行凶。", "bucket": "suspense"}, {"id": "1378", "title": "费德拉", "filename": "m1378.html", "year": "2026", "region": "法国 / 希腊", "genre": "剧情 / 爱情 / 历史", "tags": "古希腊悲剧，禁忌之恋，现代改编，心理", "summary": "将古希腊经典悲剧《费德拉》移植到现代背景。希腊航运大亨娶了比自己小三十岁的设计师费德拉。在豪华游艇上，费德拉遇到了从伦敦回来参加婚礼的继子希波吕托斯。希波吕托斯是个环保主义者，厌恶富豪阶层的奢靡生活，也厌恶这个“贪图钱财”的后妈。极致的厌恶在朝夕相处中扭曲成了致命的吸引力。在一次前往私人岛屿考察时，风暴将他们困在岛上，两人终于突破了伦理的防线。回到城市后，费德拉陷入无尽的愧疚与偏执，而希波吕托斯则想要逃离。费德拉无法忍受被抛弃，在痛苦和嫉妒中，她向丈夫诬告继子企图侵犯她。如同古悲剧一般，父亲向海神祈祷杀死儿子，马匹受惊，希波吕托斯在现代车祸中惨死，而费德拉也在悔恨中走向了深海。", "one_line": "当代希腊船王的年轻继母，爱上了叛逆的继子，一场席卷家族企业的毁灭性风暴就此拉开。", "bucket": "drama"}, {"id": "1379", "title": "天空中的金星", "filename": "m1379.html", "year": "2022", "region": "韩国", "genre": "剧情 / 家庭 / 运动", "tags": "棒球, 父女, 自闭症, 励志", "summary": "金成昊曾是韩国职棒起亚虎队的王牌投手，因为一次肩伤被球队释放，之后在便利店打零工，酗酒度日。一个雨天，他在便利店门口遇到了十五岁的智秀。智秀是个重度自闭症患者，但她的世界里只有一件事是清晰的：棒球。她能在三十米外精准地把石子扔进易拉罐，能说出所有球队所有投手的数据，但她无法与他人进行超过一个词的对话。智秀的母亲找到金成昊，请求他做智秀的私人教练，每周三次，每次半小时。金成昊拒绝了三次，第四次终于答应，理由是他需要钱交房租。头几节课几乎是灾难：智秀不看他，不回应指令，捡球时突然躺在地上盯着云看二十分钟。金成昊气得想摔手套，但在某一天他突然意识到，智秀从不抱怨，从不找借口，她只是用她自己的方式和棒球相处。金成昊开始改变教法：他不教智秀“怎么投球”，而是问她“你今天想投给谁看”。智秀说：“金星。”她指着傍晚天空中最亮的那颗星说，“奶奶说过，妈妈在那里。”金成昊用了九个月把智秀的投球动作从“精准”练到了“有威力”。在全国残疾人体育大会的赛场上，智秀站上了投手丘。她投出的第一个球没有进好球带，第二个球也没有。第三个球，她闭着眼睛投了出去，落在捕手手套里的声音很清脆。智秀没有回头看本垒，而是抬头看着天空，笑了。金成昊在休息区背过身去，哭得像个孩子。智秀获得了参赛奖，金成昊收到了另一支球队的教练邀请。他拒绝了，第二周出现在了智秀家门口，手里拿着一个新的手套，上面绣着“金星”。", "one_line": "一名被职业棒球界淘汰的投手，成为了一名自闭症女孩的私人教练，而女孩唯一的梦想是站上投手丘。", "bucket": "drama"}, {"id": "1380", "title": "唯一的受害者", "filename": "m1380.html", "year": "2024", "region": "韩国", "genre": "悬疑 / 犯罪 / 律政", "tags": "恶女, 身份反转, 全员恶人", "summary": "震惊全国的“午夜出租车”连环杀人案中，只有大学生金多海一人生还。她在警方保护下指认了出租车司机崔某为凶手，案件迅速结案，多海成为国民英雄。一年后，新调来的检察官李道镇在复查案卷时发现致命漏洞：所有被害人的通话记录、出行轨迹，最终都指向了多海——她才是那个将被害人引向死亡地点的人。更诡异的是，多海坚持认为自己也是受害者，她的记忆中存在一个名为“恩静”的共犯，但所有人包括警方档案中都找不到这个人的任何存在。李道镇面对一个无法被审判的受害者，开始怀疑：她究竟是双重人格的凶手，还是被更深的阴谋操控的提线木偶？", "one_line": "连环杀人案唯一的幸存者指认真凶后，却发现自己才是所有案件的“唯一受害者”，因为凶手就是她自己。", "bucket": "suspense"}, {"id": "1381", "title": "原来是老师啊！", "filename": "m1381.html", "year": "2022", "region": "中国大陆", "genre": "剧情 / 喜剧", "tags": "校园, 教师, 乡村教育, 成长", "summary": "满怀理想的音乐老师林清风，因为一次教学事故，被从省重点中学“发配”到了偏远落后的红石岭小学。这里全校只有不到一百个学生，音乐课更是形同虚设。最让他崩溃的是，校长让他组建一支鼓号队来参加县里的比赛。面对一群连简谱都不识、乐器五花八门（甚至包括锅碗瓢盆）的学生，林清风感到绝望。但在与学生们的相处中，他被他们的质朴和对音乐纯粹的热爱所打动。他因地制宜，将废弃的农具改造成乐器，创作出独一无二的乡村交响乐。这场看似不可能的参赛之旅，最终成了所有人心中的一次成长洗礼。", "one_line": "一位心怀梦想的城市音乐老师被下放到乡村小学，却发现这里的学生组成了一支“草台班子”乐队。", "bucket": "drama"}, {"id": "1382", "title": "恐吓直播", "filename": "m1382.html", "year": "2023", "region": "韩国", "genre": "惊悚, 犯罪", "tags": "直播, 社会讽刺, 实时叙事, 高概念", "summary": "过气主播东贤为了翻红，深夜开直播博眼球。突然接到匿名电话，对方声称在他家里装了炸弹，并给他一系列任务：去便利店偷东西、当街骂警察、跳汉江大桥……每完成一项，直播间打赏就暴涨。东贤以为是团队炒作，欣然照做。直到对方要求他“捅自己一刀”，他拒绝了，下一秒直播间画面切到他的家里——妻子被绑架。此时观看人数已飙升至7万，但没人报警。东贤在直播中崩溃求救，而弹幕里全是“是不是特效？”“快捅啊！”最终，东贤拿起刀，直播中断。", "one_line": "一名主播在深夜直播中接到神秘电话：按照指令做，否则你的家人会死，而全城有7万人正在同时观看。", "bucket": "suspense"}, {"id": "1383", "title": "逆喷射家族", "filename": "m1383.html", "year": "1984", "region": "日本", "genre": "喜剧， 家庭", "tags": "黑色幽默， 家庭崩溃， 泡沫经济前夜", "summary": "昭和末年，东京普通上班族小林正和妻子、儿子、母亲住在一栋逼仄的木造房子里。为了改善生活，他分期付款买了一台大彩电。然而，这台彩电成了家庭矛盾的导火索：儿子想看棒球，妻子想看肥皂剧，母亲想听演歌，小林想看新闻。争吵逐渐升级为冷战，甚至互相破坏信号线。绝望的小林决定重建房屋，结果施工队挖断了水管和电线，邻居投诉，黑道上门。在一个风雨交加的夜晚，全家人终于爆发了史无前例的大混战，最后合力将整栋房子拆成了废墟。坐在瓦砾堆上，一家人反而笑了。", "one_line": "一个四口之家为了争夺新买的彩色电视机，将整栋房子变成了战场。", "bucket": "comedy"}, {"id": "1384", "title": "小鸡快跑", "filename": "m1384.html", "year": "2023", "region": "美国 / 英国", "genre": "动画 / 冒险 / 喜剧", "tags": "定格动画， 农场， 越狱， 鸡， 续集", "summary": "距离第一部已过去二十年。金杰和洛奇带着族群生活在“鸡天堂”保护区——一个号称永久安全的岛屿。但岛上的管理者是一位看似慈祥的“家禽福利官”。他给鸡群提供精制饲料，鸡群渐渐变得肥胖、懒惰，失去飞翔的意愿。金杰的女儿莫莉偶然发现饲料中含有微量抑制肌肉生长的成分。更可怕的是，岛上每半年就会有一批最肥的鸡被悄悄运走，美其名曰“移居更好的栖息地”。金杰试图唤醒族群，但大多数鸡已经沉迷舒适圈不愿离开。洛奇也受伤无法飞行。莫莉带领一批年轻小鸡重新学习当年父母的越狱技巧。最终在老友们的帮助下，他们用一架改装的风力滑翔机逃出岛屿。福利官被捕，但片尾彩蛋显示他背后还有更大的食品集团。", "one_line": "金杰和洛奇在“鸡天堂”过上安稳日子，却发现这个“天堂”其实是精饲料配给的慢性屠宰场。", "bucket": "animation"}, {"id": "1385", "title": "晚娘粤语", "filename": "m1385.html", "year": "2024", "region": "中国香港", "genre": "剧情, 家庭", "tags": "粤语原声, 继母, 豪门, 年代", "summary": "故事开始于1962年的香港。年轻女子陈玉兰被迫下嫁丧妻的富商何伯，成为两个叛逆少年少女的“晚娘”。何家大宅里，丈夫漠不关心，继子继女视她为图谋家产的狐媚，下人也在背后嚼舌根。玉兰忍气吞声，用自己的智慧和善良一点点化解孩子们的敌意。几年后，香港股市崩盘，何家一夜之间负债累累，丈夫病倒，继子出走。关键时刻，玉兰挺身而出，凭借一手好刺绣和精明的商业头脑，从摆地摊做起，历经艰辛，最终不仅还清了债务，还让何家重新崛起。她用自己的行动，赢得了所有人的尊重和那个迟来的“妈”字。", "one_line": "上世纪60年代的香港，一个受尽白眼的“晚娘”，如何在一场家族危机中成为顶梁柱。", "bucket": "drama"}, {"id": "1386", "title": "甜蜜的任务", "filename": "m1386.html", "year": "2023", "region": "中国台湾", "genre": "剧情, 家庭, 喜剧", "tags": "美食, 亲情, 和解, 治愈, 传承", "summary": "台北顶级法式甜品师阿哲，因高强度工作导致味觉失调，不得不回乡休养。母亲经营着一家即将拆迁的老式糕饼铺，却突然留下一本写满密码般笔记的空白食谱失踪了。阿哲为了找到母亲，只能根据笔记里提到的“古早味”线索，一一复刻凤梨酥、状元糕等传统点心。在这个过程中，他儿时的邻居、初恋女友以及老街坊们纷纷加入帮忙。阿哲逐渐发现，母亲失踪是为了完成父亲生前未试验出的“会流泪的蛋糕”。而他找回味觉的过程，也是找回亲情与初心的过程。", "one_line": "顶级甜品师因过劳失去味觉，被迫回到乡下的家，接下“帮母亲写完失踪食谱”这个甜蜜又折磨的任务。", "bucket": "drama"}, {"id": "1387", "title": "单亲度假村", "filename": "m1387.html", "year": "2025", "region": "中国大陆", "genre": "喜剧, 爱情, 家庭", "tags": "单亲父母, 海岛, 相亲, 育儿", "summary": "在上海的职场女强人周一一、成都的瑜伽教练单宁、沈阳的烧烤店老板娘大美丽，因为各自不同的原因（骗婚、丧偶、离异）成了单亲妈妈。她们看到一则广告“阳光海岛单亲度假村，为你的孩子找到完美的另一个家长”。到了岛上才发现，这是个巨大的坑：所谓的度假村只是一个破旧民宿，而另外三个“候选人”竟也是单亲爸爸——一个不修边幅的海洋生物学家、一个毒舌的离婚律师、一个总想当网红的面条摊主。孩子们被关在一起玩泥巴，大人们则被迫参加各种尴尬相亲活动：三人两足背娃赛跑、亲子厨艺大比拼、以及“讲述你前任最糗的事”的真心话大冒险。在这个过程中，他们发现单亲父母最大的问题不是缺个伴侣，而是如何与孩子一起走出过去的阴影。最终没有强行配对，但所有人都成了彼此最好的“战友”。", "one_line": "三个互不相识的都市单亲妈妈，为了给孩子找个“爸爸”而报名参加一个奇葩的“单亲度假村”，却在海岛上与三个同样单身的爸爸们闹出了一系列爆笑乌龙。", "bucket": "comedy"}, {"id": "1388", "title": "巴黎妓院回忆录", "filename": "m1388.html", "year": "2029", "region": "法国", "genre": "剧情, 历史", "tags": "妓院, 19世纪, 群像, 女性", "summary": "故事发生在1897年巴黎蒙马特的一间高级妓院“天堂阁”。这里不仅是欲望的交易所，更是女性命运的缩影。剧集以群像形式展开：有被母亲卖来的乡下少女、有为了供弟弟上学而堕入风尘的知识女性、还有50岁仍在接客的老妓。纪录片式的镜头记录了她们的生活：反抗残酷的老鸨、争夺富商的宠爱、互相堕胎、以及染上梅毒后被扔进贫民窟的结局。当警方试图以卫生法关闭妓院时，女人们联合起来，利用她们偷听到的政商秘密作为武器，与整个父权社会进行了一场悲壮的谈判。", "one_line": "透过19世纪末巴黎最大妓院的奢华大门，窥探里面女人们挣扎、友谊与毁灭的一生。", "bucket": "drama"}, {"id": "1389", "title": "#狂野48小时", "filename": "m1389.html", "year": "2025", "region": "美国", "genre": "动作、喜剧、犯罪", "tags": "社交网络、全民追凶、直播破案、病毒营销", "summary": "过气网红“狂野杰克”为了重回热搜，策划了一场“48小时野外生存被劫持”的假事件。他带着隐藏摄像头深入废弃工厂，假装被神秘组织绑架。万万没想到，一群真绑匪刚好选中同一地点作为据点。杰克被误绑，他的直播意外没关，全网观众都以为这是表演。观众们通过直播给杰克提供逃跑线索，绑匪则以为这群“弹幕”是警方的心理战。一场全民参与的猫鼠游戏开始了，杰克必须在真实死亡与虚假热度之间，找到唯一的活路。", "one_line": "一名网红为涨粉伪造被绑架视频，结果引来真绑匪，全城网友通过直播帮他逃脱。", "bucket": "action"}, {"id": "1390", "title": "情义我心知粤语", "filename": "m1390.html", "year": "2026", "region": "中国香港", "genre": "剧情/犯罪/动作", "tags": "港产片, 兄弟反目, 江湖道义, 宿命感", "summary": "阿鬼和阿豪是庙街长大的孤儿，情同手足。十年后，阿鬼成了警方的金牌卧底，潜伏在阿豪所在的和联胜。阿豪凭着敢打敢拼坐上龙头位置，却始终坚持不碰毒品。此时一个跨国贩毒集团想利用和联胜的网络，警方则要求阿鬼必须将阿豪送进监狱以阻止合作。当阿鬼掌握的证据足以定罪阿豪时，他发现阿豪早已知道他是卧底，却一直在用自己的方式保护他，甚至不惜与贩毒集团翻脸。面对警方压力与黑帮追杀，两人不得不以最惨烈的方式，为这段兄弟情画上句号。", "one_line": "两个从小长大的黑帮兄弟，一个成了卧底，一个成了话事人，他们必须在“出卖”与“背叛”中找出第三条路。", "bucket": "drama"}, {"id": "1391", "title": "黑鹰追缉令", "filename": "m1391.html", "year": "2026", "region": "美国", "genre": "动作 / 惊悚", "tags": "黑鹰直升机, 雇佣兵, 追车, 复仇", "summary": "前陆军黑鹰飞行员雷克因拒绝执行非法命令被军事法庭开除。三年后，他的老战友们在一场私人安保任务中全部“意外”身亡，警方认定雷克是凶手。雷克在逃亡途中发现，真正的幕后黑手是一家雇佣兵公司的老板——他曾是雷克的教官，如今在拉斯维加斯利用黑鹰直升机替赌场老板做暗杀生意。雷克潜入军事博物馆，偷走了一架退役的黑鹰直升机。他用民用改装版的这架“老古董”，在拉斯维加斯大道上空与三架新型武装直升机展开追逐战。最终对决在凯撒皇宫的穹顶上演，雷克用直升机旋翼削掉了反派所在的观景台，并带着关键证人降落在警察局门口，双手举起投降。", "one_line": "前黑鹰飞行员被诬陷杀害战友，他偷走直升机在拉斯维加斯上空展开极限追缉。", "bucket": "action"}, {"id": "1392", "title": "夫妻英烈", "filename": "m1392.html", "year": "2014", "region": "中国大陆", "genre": "战争 / 爱情 / 剧情", "tags": "抗日, 夫妻档, 真实事件改编, 悲壮", "summary": "1942年，新四军情报员陈怀民和妻子李秀兰新婚第三天执行任务时被捕。日军知道两人中有一人是掌握核心情报的“夜莺”，但分不清是谁。日军军官出了一个残忍的游戏：谁能指认对方是“夜莺”，谁就可以活着出去。陈怀民和李秀兰分别被关在两个审讯室，互相听得见对方的惨叫，但看不见彼此。三天三夜，两人都在拼命把“夜莺”的身份揽在自己身上，说对方是无辜的群众。日军最终恼羞成怒，决定将两人一起处决。刑场上，两人终于相见，微笑着互相说了一句“对不起，我骗了你，我才是夜莺。”行刑后，日军在两人贴身衣物里发现了一模一样的半张情报——原来两人都是“夜莺”，各自掌握一半信息，这是组织为了防止一人叛变而设计的，而他们至死都不知道对方也是。", "one_line": "一对新婚三天的新四军夫妻同时被捕，日军让他们互相指认谁是“重要人物”，否则两人都要死。", "bucket": "drama"}, {"id": "1393", "title": "保持黑暗", "filename": "m1393.html", "year": "2023", "region": "美国", "genre": "惊悚 / 科幻 / 悬疑", "tags": "末世, 视觉障碍, 声音恐怖, 孤楼求生", "summary": "病毒通过光线传播，感染者会在看到光的三秒内双眼溶化并陷入狂暴。主角李昂是天生全盲者，因而免疫，但他所在的城市已陷入火海与尖叫。他被困在一栋智慧大楼的地下二层中控室，这里唯一的光源来自监控屏。他必须仅凭听觉和触觉维持大楼应急发电机的运行，因为地下三层还关着二十多名被感染的住户——只要断电，隔音门就会打开。李昂通过内部对讲机与楼顶一名幸存的天文学家少女建立联系，两人一个在地下一个在天台，共同推算日食到来的时间，因为日食期间唯一能安全转移的窗口只有三分钟。但少女不知道的是，李昂的对讲机里还有一个陌生人的呼吸声。", "one_line": "一种全球性眼盲病毒爆发后，一位从未失明过的保安被困在摩天大楼的供电中控室里。", "bucket": "suspense"}, {"id": "1394", "title": "新世代公民", "filename": "m1394.html", "year": "2018", "region": "美国", "genre": "喜剧 / 剧情", "tags": "高中生，学生会选举，政治讽刺，青春，脱口秀", "summary": "北卡罗来纳州一所公立高中，学生会主席选举向来是橄榄球队长的囊中物。今年，打算申请政治系的高四生布莱恩志在必得，他精心设计了竞选口号、海报、短视频矩阵，甚至写了一份“百日施政纲领”。但他发现选票上多了一个名字：露比——一个除了写代码几乎不跟任何人说话的亚裔女生。露比是被计算机老师强行推上名单凑数的，本人对竞选毫无兴趣。但当她接受校园电视台采访时，面无表情地用数据模型当场拆穿了布莱恩全部承诺中存在的逻辑漏洞与财务赤字，全场学生疯了。露比莫名其妙获得了极高人气，而她本人完全不想当主席，于是想出了一个天才计划：故意在辩论赛上对所有问题说“不知道”。结果学生群体把她的“不知道”解读为“厌倦虚伪政客”，支持率反而飙升到85%。布莱恩在崩溃之际，决定去找露比谈一笔交易。", "one_line": "一心想当学生会主席的高中男生，发现自己最大的对手竟是一个根本不想赢的程序员女生。", "bucket": "comedy"}, {"id": "1395", "title": "请不要在病房里念佛", "filename": "m1395.html", "year": "2020", "region": "日本", "genre": "剧情、医疗、宗教", "tags": "僧侣、医生、生死、治愈", "summary": "松本照円是净土真宗僧侣，同时也是大学医院的天才外科医。他习惯在手术前为患者诵经，这一行为被其他医生视为封建迷信。面对癌症晚期患者，别的医生会说“不放弃就有希望”，他却直接告诉病人“你可以准备后事了”，并用佛法帮助病人接受死亡。这种离经叛道的做法引起了院内医学伦理的争议，却奇迹般地让许多患者安详离世。某天，一直排挤他的院长患上了绝症，恐惧死亡的他偷偷来找松本求助。松本没有用药，而是带院长去了一次葬礼现场，让他直面死亡的真实面目。", "one_line": "一个既是僧侣又是急诊医生的奇葩男人，总是先念经救人再下诊断，面对绝症患者，他从不劝人坚强，只劝人放下。", "bucket": "drama"}, {"id": "1396", "title": "标心", "filename": "m1396.html", "year": "2024", "region": "中国台湾", "genre": "爱情, 奇幻, 剧情", "tags": "纹身, 灵魂标记, 宿命, 文艺, 双线叙事", "summary": "纹身师阿青天生有一个异能的胸口——当遇到灵魂伴侣时，对方的姓名会自动浮现在他的皮肤上。他靠着这个能力帮助无数人找到真爱，自己却始终等不到那个名字。直到某天，“林真”二字悄然浮现。阿青疯狂寻找林真，终于在一个下雨的便利店遇见了她。然而林真早已有未婚夫，她是来阿青的店里纹一个名字的——她未婚夫的名字。阿青看着自己胸口那个正在变淡的纹身，第一次明白了什么叫“缘分已尽”。", "one_line": "胸口突然出现的名字纹身，让他找到了命中注定的她，却发现自己只是她生命中的过客。", "bucket": "romance"}, {"id": "1397", "title": "你和我的小情歌", "filename": "m1397.html", "year": "2024", "region": "中国内地", "genre": "爱情/音乐", "tags": "音乐, 青春, 异地恋, 梦想", "summary": "独立音乐人苏晨在整理旧物时，翻出一盘布满灰尘的录音带，里面是高中同桌林晚晚当年随意哼唱的半首旋律。彼时两人因毕业分开，再无联系。苏晨凭着模糊记忆补全了这首歌，并匿名发布到网上，意外爆红。林晚晚听到后，认出那是自己的声音，开始寻找这位神秘的“合写者”。两人通过音乐重新连接，却发现彼此的生活早已被现实磨得面目全非。他们能否在音符中找到当年那个没说出口的答案？", "one_line": "一支录音笔偶然录下的即兴哼唱，成了两人跨越十二年的唯一情书。", "bucket": "romance"}, {"id": "1398", "title": "忧国的莫里亚蒂第一季", "filename": "m1398.html", "year": "2025", "region": "日本", "genre": "悬疑 / 犯罪 / 历史", "tags": "福尔摩斯，反派主角，贵族批判", "summary": "改编自同名漫画。19世纪末的英国，贵族阶层腐败堕落，平民遭受不公。孤儿院出身的阿尔伯特·莫里亚蒂被贵族收养，目睹了养父的残暴后，他杀死了养父，决心用“犯罪”来清洗社会。他召集了同样对贵族深恶痛绝的弟弟们和一群天才罪犯，策划了一系列针对恶贯满盈的贵族的“完美犯罪”，每一次都让警方束手无策。直到侦探夏洛克·福尔摩斯出现，他敏锐地察觉到这些案件背后有同一个操纵者。第一季结尾，莫里亚蒂在伦敦的迷雾中与福尔摩斯隔桥相望，两人互相致意，一场猫鼠游戏正式拉开帷幕。", "one_line": "少年莫里亚蒂决心用犯罪来摧毁腐败的英国贵族制度，而他最大的对手将是福尔摩斯。", "bucket": "suspense"}, {"id": "1399", "title": "通心树粤语", "filename": "m1399.html", "year": "2005", "region": "中国香港", "genre": "奇幻，悬疑，爱情", "tags": "粤语原声，都市传说，灵异树洞，通心，单元剧", "summary": "旺角花园街路口的老榕树，传说树心通灵，能实现人的愿望。单元剧形式，每集一个独立故事，讲述不同人向树洞许愿后发生的诡异变化。想红的歌手许愿后一举成名，却发现自己再也唱不出自己的声音；想挽回出轨男友的女人许愿后男友回来了，却变成了一个永远不会离开的“人偶”；想发财的乞丐许愿后中彩票头奖，但领奖当天所有亲戚同时去世，他成了遗产争夺的中心。所有的愿望都被“通心树”用一种扭曲的方式实现，而最终，每个许愿者都会回到树下，成为树的下一批养料。", "one_line": "旺角闹市有一棵百年老榕树，树心是空的，只要你对着树洞说出心事，你的愿望就会成真——但代价是你想不到的。", "bucket": "fantasy"}, {"id": "1400", "title": "大地金戈", "filename": "m1400.html", "year": "2023", "region": "中国大陆", "genre": "历史 / 战争 / 动作", "tags": "唐朝, 西域, 骑兵战, 真实沙盘", "summary": "公元766年，吐蕃大军攻陷河西，大唐在西域的最后一个据点龟兹镇被围。守将是年过六旬的老将郭昕，他手里只剩八千老弱残兵，且已十五年未收到中原音讯。当吐蕃使者劝降说“大唐已亡”时，郭昕指着远处的昆仑山说：“大唐亡不亡，山说了不算，我郭昕说了不算。但这座城，你们永远拿不走。”此后的四十二年里，城中百姓与士兵同吃同住，铸剑为犁、拆房为甲。当最后一代士兵头发全白时，他们用石灰刷白铠甲，最后一次出城列阵。", "one_line": "安史之乱后，一支被遗忘在大唐西疆的孤军，面对二十万敌军，死守了整整四十二年。", "bucket": "drama"}, {"id": "1401", "title": "我出生的那一天", "filename": "m1401.html", "year": "2025", "region": "阿根廷 / 西班牙", "genre": "剧情 / 悬疑 / 家庭", "tags": "出生秘密, 领养, 身份认同", "summary": "建筑师达里奥一直以为自己是养母玛尔塔的亲生儿子，因为玛尔塔从未对他隐瞒“你是领养的”这件事——她说她是他的生母。但在玛尔塔的葬礼上，律师交给达里奥一个信封，里面是一盘VHS录像带，标签手写着“我出生的那一天”。录像里，一个年轻女人在产房生下他，抱着他哭了很久，然后把他交给了一个护士——那个护士就是年轻时的玛尔塔。也就是说，玛尔塔不是生母，而是当年的接生护士。达里奥开始追查录像里那个女人的身份，发现她曾在1970年代的阿根廷军事独裁时期失踪，而所有档案都被销毁。最后他在一个老年痴呆症疗养院里找到了她——她认不出任何人，但会在每天凌晨三点醒来，对着空气说：“我的孩子，叫达里奥。”", "one_line": "35岁的男人在养母葬礼当天收到一盘录像带，里面是他出生那天的完整记录——但录像里的“母亲”不是养母。", "bucket": "drama"}, {"id": "1402", "title": "猫女：猎捕", "filename": "m1402.html", "year": "2023", "region": "美国", "genre": "动作 / 奇幻", "tags": "反英雄, 超级英雄, 盗窃, 追逐战", "summary": "哥谭市著名的珠宝大盗“猫女”帕特·菲利普偷到了一枚据说能打开古代猫神神殿的月光石。然而这次的任务没那么简单，宝石的主人是一位有黑帮背景的富商，他雇佣了杀手“丧钟”前来追讨。同时，警探芭芭拉·戈登也认为这枚宝石与一起连环失踪案有关，紧追不舍。更麻烦的是，一个崇拜猫的神秘 cult 组织也盯上了她，认为她是预言中的“神选者”。猫女不得不在哥谭的楼宇之间展开一场又一场惊心动魄的跑酷追逐战，并在最后发现自己卷入了一场关乎古代神力的巨大阴谋。", "one_line": "亦正亦邪的猫女偷走了一枚神秘宝石，却发现自己同时被黑帮、警探和神秘组织三方追杀。", "bucket": "action"}, {"id": "1403", "title": "神偷艳盗", "filename": "m1403.html", "year": "1993", "region": "中国香港", "genre": "喜剧、动作、犯罪", "tags": "盗宝、 斗智、 港式贺岁、 欢喜冤家", "summary": "国际钻石展览在香港举办，神偷李杰与艳盗安娜不约而同盯上了天价的“海洋之心”钻石。两人在戒备森严的展览馆里首次交锋，互相破坏对方行动，搞得警报大作，狼狈脱逃。随后，黑道大佬逼他们联手，要求在三天内盗取钻石，否则性命不保。两人被迫合作，却依旧互相提防、暗中使绊。他们一个擅长易容乔装，一个精通机关破解，在一次次惊险的行动中逐渐产生了默契与情愫。最后他们发现钻石是假的，真正的宝石藏在大佬的私人金库。最后一夜，两人上演了一场完美的偷天换日，不仅偷走了真钻，还顺便把黑道大佬的犯罪证据交给了警方。", "one_line": "被称为“百变神偷”的他和号称“从不失手”的她，为争夺同一颗钻石，从死对头变成了最佳拍档。", "bucket": "comedy"}, {"id": "1404", "title": "东柱", "filename": "m1404.html", "year": "2025", "region": "韩国", "genre": "传记 / 历史 / 黑白", "tags": "诗人, 日本殖民, 抵抗运动", "summary": "黑白传记片，全片采用16毫米胶片拍摄。聚焦韩国最受尊敬的抗日诗人尹东柱的最后三年（1942-1945）。他出生于中国延边，用韩语写诗，在东京留学期间组织地下文学社。1943年被日本特高课以“思想犯”逮捕，关押在福冈监狱。在狱中，他写下《序诗》《新路》《容易写成的诗》等名篇，诗里没有一个“抗日”字眼，但每一句都在说“我是朝鲜人，我要说朝鲜语”。1945年2月16日，他在狱中被进行人体实验的医生注射过量药物死亡，距离日本投降仅剩六个月。影片不使用任何配乐，仅有环境音和诗歌的韩语念白。最后一场戏：尹东柱的尸体被拖走，他的狱友在墙上用指甲刻下他生前念出的最后一句诗：“直到死亡那一刻，我仍仰望天空。”", "one_line": "韩国爱国诗人尹东柱在日据时期写下无数反抗诗歌，最终死在日本监狱里，年仅28岁。", "bucket": "drama"}, {"id": "1405", "title": "卡牌迷宫", "filename": "m1405.html", "year": "2023", "region": "日本", "genre": "悬疑，奇幻", "tags": "桌游，密室，规则怪谈，智斗", "summary": "七个互不相识的人醒来时被困在一座复古游戏厅里，唯一的出口需要打通一套名为“卡牌迷宫”的实体对战卡牌。每个人随机获得五张技能卡，而场外的亲友监视器里显示：每被击败一次，现实中就会有对应的人神秘失踪。他们必须轮流当“挑战者”和“守门人”，用卡牌组合、心理欺诈和实时规则篡改来决斗。随着游戏进行，他们发现卡牌上的怪兽和道具，对应着七人各自隐藏的童年创伤与罪行。最终的迷宫终点并非出口，而是一个审判席。", "one_line": "七个陌生人被迫参与一局真人桌游，每张卡牌都会在现实里杀死对应的人。", "bucket": "suspense"}, {"id": "1406", "title": "波兰家族", "filename": "m1406.html", "year": "2026", "region": "波兰", "genre": "剧情， 黑色幽默， 家庭", "tags": "葬礼， 遗产， 东欧， 荒诞", "summary": "一位脾气古怪的波兰老人去世了。他散布在欧洲各地的三个子女、以及他们各自的问题家庭，为了遗产第一次齐聚在祖宅。当他们打开遗嘱，发现没有一分钱，老人留下的是一家即将被关闭的、他年轻时曾工作过的“孤儿院”旧址。继承遗产的唯一条件是：他们必须在不卖掉土地的前提下，负责安置好院里最后一批被社会遗忘的残障孤儿。一个只想抢钱的现代家庭，被迫与一群最纯粹的弱势群体共处一室。从最初的抗拒、算计，到最终的笑与泪，这个波兰家族才发现，祖父留给他们的不是债务，而是一次重新做人的机会。", "one_line": "一个疏远的波兰家庭为争夺祖父的遗产齐聚一堂，却发现遗产是一笔巨额的“道德债务”。", "bucket": "drama"}, {"id": "1407", "title": "吉祥物", "filename": "m1407.html", "year": "2024", "region": "美国", "genre": "喜剧 / 恐怖", "tags": "吉祥物, 小镇, 诅咒, 血腥", "summary": "落魄商人杰克买下了一座濒临倒闭的复古游乐园，唯一的资产是一个破旧的吉祥物“快乐河马”人偶服。为了吸引眼球，他亲自穿上服装表演，却发现游乐园的客流量突然暴增。但每当夜幕降临，他总会失去部分记忆，而第二天镇上就会出现一具被吸干血的尸体。他惊恐地发现，这件祖传人偶服里寄居着一个古老的恶灵，它给予游乐园好运的条件是必须不断献祭活人。杰克想要脱下服装，却发现皮肤已经和布料长在了一起。", "one_line": "为了拯救即将倒闭的游乐园，老板穿上了祖传的吉祥物服装，却发现这衣服需要用人血来续命。", "bucket": "comedy"}, {"id": "1408", "title": "校草是女生", "filename": "m1408.html", "year": "2017", "region": "韩国", "genre": "爱情，喜剧", "tags": "女扮男装，校园，偶像，轻喜", "summary": "狂热的追星少女闵秀儿为了近距离接触隐藏身份在男校读书的爱豆，剪短头发女扮男装转入名门男子高中。凭借大大咧咧的性格和出色的运动神经，她迅速成为校园里最酷的“校草”，不仅吸引了大批女校外粉丝，甚至让真校草兼学生会会长产生了“自我怀疑”。在隐瞒身份与会长朝夕相处中，两人擦出了奇妙的火花，而秀儿的真实性别也面临着随时暴露的危险。", "one_line": "为了追星，女汉子假扮男生转入男子高中，却成了全校女生的暗恋对象“校草”。", "bucket": "romance"}, {"id": "1409", "title": "一个烂赌的传说", "filename": "m1409.html", "year": "2025", "region": "中国香港", "genre": "剧情 / 犯罪", "tags": "赌博，戒赌，悲剧，人性，底层挣扎", "summary": "阿水是澳门赌场里一个不起眼的烂赌鬼，他的人生信条是“有赌未为输”。欠下巨额高利贷后，走投无路的他答应为黑帮运送一件“特殊货物”来抵债。本以为是什么违禁品，却发现货物是一个被绑架来的五岁男孩。阿水需要将孩子藏匿几天，期间孩子的哭闹、恐惧以及那双清澈的眼睛，不断拷问着他早已麻木的良心。与此同时，一场更大的赌局正在等着他——是拿着黑帮给的封口费远走高飞，还是冒着生命危险将孩子送回到焦急的家人身边？这成了他人生中最大、也是最后的一次赌注。", "one_line": "烂赌鬼阿水为了还债，接了一单运送“特殊货物”的活，却发现货物是一个被绑架的小孩，他的良知与赌瘾开始了殊死搏斗。", "bucket": "drama"}, {"id": "1410", "title": "人生特别档案", "filename": "m1410.html", "year": "2024", "region": "中国大陆", "genre": "悬疑 / 奇幻", "tags": "单元剧, 人生修改器, 代价交换", "summary": "整座城市只在午夜出现的“第七档案室”，接受任何人的委托：你可以要求删除一段不想记住的记忆，或修改人生中的一个瞬间。但代价是，档案室会从你的现实人生中随机抽取并永久删除一样东西——可能是你的钢琴十级证书，可能是你养的猫，也可能是你未来某个重要机遇。每个单元的主角都有不得不修改的理由：想救回孩子的母亲，想篡改高考成绩的学生，想抹去婚外情痕迹的官员。但他们总会发现，被删掉的“随机事物”其实与修改的事件有着极其隐秘的因果联系。档案室的守护者，则有着自己不可告人的终极目标。", "one_line": "一家深夜档案馆允许客人“删改”自己的人生片段，但每次修改都会从现实里随机消失另一样东西。", "bucket": "suspense"}, {"id": "1411", "title": "摩登原始人第二季", "filename": "m1411.html", "year": "2024", "region": "美国", "genre": "喜剧，动画，家庭", "tags": "石器时代，现代梗，邻里日常，无厘头", "summary": "第二季中，摩登小镇要举办石器时代奥运会。弗雷德报名举重，他的杠铃是一只成年雷龙。威玛为了赢瑜伽比赛，学会了用火山灰做面膜。邻居贝蒂试图开一家“原始奶茶店”，结果把整个小镇的井水都染成了紫色。这一季最大的故事线是弗雷德和威玛的婚姻危机：威玛想装修石洞，买一张真正的羽毛床；弗雷德则偷偷攒钱买一台全新石制电视机。两人冷战期间，小镇火山突然喷发，全员逃难时威玛扔掉了羽毛床，抱起弗雷德最爱的保龄球。弗雷德则在岩浆前用两个石盘当桨板，救回了全家。", "one_line": "石器时代的原始人们继续用恐龙当车、石板当手机，笨拙而热闹地过着“现代生活”。", "bucket": "comedy"}, {"id": "1412", "title": "天使威士忌", "filename": "m1412.html", "year": "2025", "region": "英国", "genre": "剧情，喜剧，犯罪", "tags": "苏格兰，威士忌，救赎，盗窃，温情", "summary": "苏格兰高地的社区服务队里，四个犯人在监督下修剪草坪。领头人罗比得知女儿患上罕见病需要去美国治疗，但身无分文。他盯上了附近酒厂那桶价值百万英镑的“天使份额”限量威士忌。四个废物点心制定了一个蠢到可爱的偷酒计划，却在实施过程中笑料百出。当他们终于得手时，酒厂老板找上门说：那桶酒是他故意放在那的，因为他年轻时也曾为女儿偷过东西。", "one_line": "一群社区服务犯人计划偷走酒厂最珍贵的威士忌，只为给其中一人的女儿治病。", "bucket": "drama"}, {"id": "1413", "title": "拳霸少年2", "filename": "m1413.html", "year": "2011", "region": "泰国", "genre": "动作 / 冒险", "tags": "泰拳, 少年, 复仇, 丛林, 打斗", "summary": "前作中，少年阿泰在家乡击败了恶霸。本作中，黑帮为了报复，绑架了他的哥哥去当运毒骡子。阿泰独自一人追踪到了泰缅边境的罪恶之城。这里有一个由国际犯罪集团控制的地下拳赛，他哥哥就被囚禁于此。阿泰伪装成拳手参赛，一路上遇到了亦正亦邪的退役拳王“疯狗”和失明的土著女孩阿月。地下拳场的规则是：连胜十场才能见到老板。阿泰凭借凶狠的古法泰拳一路过关斩将，但也伤痕累累。最终决赛面对的是体型大他两倍的欧洲拳王。在阿月的笛声指引下，阿泰利用狭窄地形，上演了绝地反杀。", "one_line": "为救出被黑帮抓走的哥哥，山村少年深入金三角地下拳场，用泰拳打出自己的一片天。", "bucket": "action"}, {"id": "1414", "title": "中国人的流浪记", "filename": "m1414.html", "year": "2025", "region": "中国大陆", "genre": "年代剧情", "tags": "知青, 改革开放, 移民故事", "summary": "本剧改编自多部口述史。第一代：爷爷被下放北大荒，结识了逃亡的苏联贵族后裔奶奶。第二代：父亲在1978年考上大学，公派留学美国，却因绿卡与家庭决裂。第三代：孙女在2008年成为无国界医生，在非洲战乱区寻根。三条时间线交叉剪辑。他们分别在中国、苏联、美国、刚果（金）生活过，但每一代都觉得自己是“流浪者”。最终在2016年，三代人同时回到黑龙江边的一个小村庄，那里有第一代种下的白桦树。", "one_line": "一个中国家庭从1966年到2016年，跨越三代人、四个大洲的流浪与回归，寻找“家”的定义。", "bucket": "horror"}, {"id": "1415", "title": "死亡真面目3", "filename": "m1415.html", "year": "2024", "region": "美国", "genre": "恐怖，伪纪录片", "tags": "极限，暗网，社会实验", "summary": "网红主播凯拉为了挽救下滑的数据，带领团队加入了一个名为“死亡真面目”的暗网直播游戏。规则很简单：每人随机领取一个精致面具，面具内侧刻着一个陌生人的名字、死因和时间。他们需要找到这个人并拍下其死前最后一刻。起初，团队成员阿吉发现自己要找的对象是个身患绝症的老人，他决定伪造视频交差。然而，当他们剪辑素材时，画面中的老人竟变成了阿吉自己的脸，而死亡时间就在当晚。随着挑战深入，团队发现每个人都在镜头中提前看到了自己的死亡倒计时。他们试图销毁面具逃跑，但直播平台显示，观众数量已突破千万。最终，所有的逃避都只是让死亡方式变得更加残忍和戏剧化。", "one_line": "一个网红团队为博取流量参与暗网“死亡面具”挑战，却发现镜头里的死者全是他们自己。", "bucket": "horror"}, {"id": "1416", "title": "漆黑塔林", "filename": "m1416.html", "year": "2025", "region": "爱沙尼亚 / 芬兰", "genre": "恐怖 / 民俗", "tags": "森林, 异教, 民俗恐怖, 心理惊悚", "summary": "民俗学者托马斯受邀前往爱沙尼亚边境的“黑塔林”地区，调查三年来十二起离奇失踪案。当地人避谈这片森林，只说天黑后不要进去。托马斯发现塔林中央有一片用黑石垒成的圆形祭坛，每一棵古树上都钉着人形木偶，木偶的眼睛是真正的动物眼球。随着调查深入，他逐渐触碰到了一个从未被记录过的异教——信徒们相信森林需要定期献祭“名字”，否则就会释放出模仿人声的邪灵。当他的搭档深夜失踪，而手机里传来搭档自己的声音说着他从没说过的话时，托马斯才明白：塔林早就记住了他的名字。", "one_line": "民俗学者深入北欧黑森林调查失踪案，发现塔林里的每一棵树都挂着一具古老的诅咒。", "bucket": "horror"}, {"id": "1417", "title": "扫毒师姐", "filename": "m1417.html", "year": "2024", "region": "中国香港", "genre": "动作, 犯罪", "tags": "女卧底, 港式枪战, 姐妹情", "summary": "警校魔鬼女教官“梁妈”的卧底女儿被毒枭残忍杀害，警方却因证据不足无法定罪。梁妈伪造档案，以清洁工身份潜入毒巢。她不打不杀，而是用训警校新兵的方式折磨毒贩：凌晨五点紧急集合、抄写禁毒法一百遍、体能训练到呕吐。毒枭被逼疯，手下纷纷崩溃自首。当大毒枭终于举枪对准她时，梁妈笑了：“你以为我是来扫毒的？我是来当我女儿的老师——教你们什么叫后悔。”", "one_line": "警校女教官为了给卧底妹妹报仇，以51岁高龄潜入贩毒集团，用教书的方式教毒贩“做人”。", "bucket": "action"}, {"id": "1418", "title": "柳营春色", "filename": "m1418.html", "year": "2023", "region": "中国台湾", "genre": "剧情， 同性， 军营", "tags": "军旅， 青春， 成长， 隐秘的爱", "summary": "2003年的台湾军营，严格的“反泄露政策”让所有士兵都生活在互相检举的恐惧中。新兵林承佑性格内向，总是被老兵欺负。同梯的排长江孟甫表面上冷酷无情，是军纪的化身，却总是在暗中保护承佑。两人在演习、站哨、整理内务的日常中，眼神逐渐离不开彼此。但在那个年代，“柳营春色”不仅是诗意的风景，更是一种禁忌。一封不小心掉出来的情书，让两人的关系暴露在了监视之下。为了保护承佑不被开除军籍，江孟甫主动承担了所有责任，独自面对军事法庭。多年后，退伍的承佑在灯红酒绿的都市中，再次听到了那首他们曾在夜哨时偷偷哼过的歌。曾经的春色，早已化作心底无法磨灭的刺青。", "one_line": "在2000年代初严守“反泄露政策”的军队里，两名新兵在高压的军旅生活中，发展出了一段无法言说的暧昧情愫。", "bucket": "drama"}, {"id": "1419", "title": "翘课义勇军", "filename": "m1419.html", "year": "2023", "region": "日本", "genre": "喜剧, 校园", "tags": "热血, 反叛, 青春, 友情", "summary": "私立北樱高中面临被“未来教育集团”收购改建为商业中心的危机。以二年级的废柴三人组为首，一群成绩垫底但熟悉学校每处密道和弱点的学生组成了“翘课义勇军”。他们没有正面抗议，而是利用奇葩战术——在教学楼里养鸭子、在视察路线埋“臭气弹”、伪造闹鬼传闻——让每一次董事会视察都变成一场闹剧。随着行动升级，他们发现幕后推手竟是该校最优秀的模范生会长。", "one_line": "为了阻止学校被财团收购，一群学渣组成“翘课军”，专门破坏董事会的视察行动。", "bucket": "comedy"}, {"id": "1420", "title": "虽然没准备什么菜第三季", "filename": "m1420.html", "year": "2024", "region": "韩国", "genre": "真人秀，美食，脱口秀", "tags": "露营，深夜食堂，明星家常菜，治愈", "summary": "本季节目组将厨房搬到了人迹罕至的深山露营地。每期一位嘉宾前来做客，必须用现场极其有限的食材（甚至包括野菜和罐头）为主持人做一道“虽没准备但凑合吃”的菜。从泡面花样吃法到用石头烤五花肉，笑料百出。而在篝火旁，明星们卸下防备，聊起出道前的落魄与心酸，食物的简陋反而衬托出情感的滚烫。", "one_line": "顶流明星们在荒野露营地为你现做最不正经的“灵魂料理”。", "bucket": "drama"}, {"id": "1421", "title": "南方恶魔", "filename": "m1421.html", "year": "2025", "region": "美国", "genre": "犯罪，剧情", "tags": "黑帮，宗教，暴力美学，南方哥特，复仇", "summary": "约瑟夫服刑 18 年后回到路易斯安那的沼泽小镇。他想平静度日，却发现小镇早已被一个名为“羔羊会”的宗教组织控制。会长用《圣经》解释一切罪恶：将瘾君子绑在十字架上“驱魔”，把偷窃者扔进鳄鱼池“审判”。约瑟夫本想忍耐，直到他发现自己失踪多年的妹妹也成了“羔羊会”的祭品。他拿起猎枪和砍刀，用黑帮学来的残忍手段，一个接一个地“私了”那些披着圣袍的恶魔。但他逐渐发现，真正的幕后黑手竟是小镇警长和牧师。最后的教堂对决中，约瑟夫并没有开枪，而是打开了装满蛇的笼子，对所有人说：“上帝在看。”", "one_line": "一个出狱的杀手回到南方小镇，发现这里的恶魔不在教堂里，而在每个看似虔诚的邻居心中。", "bucket": "crime"}, {"id": "1422", "title": "明日传奇第六季", "filename": "m1422.html", "year": "2025", "region": "美国", "genre": "科幻 / 冒险 / 喜剧", "tags": "时间旅行, 多元宇宙, 团队重组, 自嘲梗", "summary": "第六季开篇，传奇团队成功修复了因“纪元破碎者”导致的多重时间线重叠危机。然而，当他们回到“现在”时，发现自己被从所有文献、数据库甚至人类记忆中彻底抹除了。没有身份证、没有档案、甚至连反派都不再认识他们。飞船AI吉迪恩因数据清零变成古董语音助手。为了“重新存在”，他们必须在不改变历史的前提下，让自己成为“必须被记住的人”。众人决定分散到不同时代，以民间传说、都市怪谈甚至网络迷因的方式，把自己植入人类文化。但一个更深的阴谋浮现：抹除他们的人，正是未来的传奇自己。", "one_line": "上一季结局团队拯救了时间线，代价是——他们被踢出了所有历史书，从此无人记得。", "bucket": "sci-fi"}, {"id": "1423", "title": "进藏", "filename": "m1423.html", "year": "2015", "region": "中国大陆", "genre": "纪录 / 人文 / 旅行", "tags": "西藏，朝圣，公路，信仰", "summary": "纪录片团队兵分五路，分别沿青藏、川藏、新藏、滇藏和中尼公路进藏。镜头跟随卡车司机、骑行者、磕长头的朝圣家庭、地质测绘员和背包客。其中藏族老阿妈一家从青海玉树出发，用一年半时间磕头到拉萨大昭寺，婴儿在路上出生，老人在途中离世。卡车司机老赵跑了二十多年青藏线，见过无数次车祸和雪崩。片中还有天葬台的肃穆画面、冈仁波齐的转山仪式、牧区孩子的眼睛。没有旁白解说，只有风声、经筒声和喘息声。终点不是拉萨，而是每个人内心的那座山。", "one_line": "五条进藏路线，五组普通人，用身体丈量通往天空的路。", "bucket": "crime"}, {"id": "1424", "title": "邪灵复仇", "filename": "m1424.html", "year": "2025", "region": "泰国", "genre": "恐怖, 灵异", "tags": "降头, 因果, 校园", "summary": "十年前，艺术学院的天才舞者小敏因校园霸凌跳楼自杀，她最心爱的一只红舞鞋始终没有找到。十年后，当年参与霸凌的四个同学相继遇到诡异事件。第一个在舞蹈室被自己的丝带勒死，第二个在泳池溺亡时脚上出现了红舞鞋。图书馆系的学生阿德为了救身为施暴者之一的姐姐，开始调查真相。他发现这不是简单的鬼魂复仇，而是有人利用“邪灵”降头术，将小敏的怨念实体化。在寻找施法者的过程中，阿德挖掘出了更多关于学校、老师和警方腐败的黑暗秘密，而最后的真相，远比鬼魂更令人心寒。", "one_line": "校园霸凌的施暴者接连惨死，每具尸体旁都放着受害者生前丢失的那只红舞鞋。", "bucket": "horror"}, {"id": "1425", "title": "虫笼的卡伽斯特尔", "filename": "m1425.html", "year": "2026", "region": "日本", "genre": "科幻惊悚", "tags": "虫笼，变异，末日，悬疑，逃生", "summary": "一种名为“卡伽斯特尔”的巨大虫笼突然出现在全球各大城市上空，所有被吸入笼中的人都会在三天内变异为嗜血虫兽。少女栞在一次意外中被困其中，却意外地没有变异。她在笼中发现了一个惊人的规律：虫笼每隔六年就会更换一批囚犯，而笼子的核心似乎在一座漂浮的图书馆里。栞必须在这个不断缩小的死亡空间里，揭开卡伽斯特尔的真正目的。", "one_line": "神秘“虫笼”从天而降，被囚其中的人类会逐渐异化成怪物，唯一幸存的少女发现了笼中的循环阴谋。", "bucket": "crime"}, {"id": "1426", "title": "铁翼惊情", "filename": "m1426.html", "year": "2025", "region": "中国香港", "genre": "动作, 惊悚", "tags": "飞机, 劫机, 密闭空间, 飞行员", "summary": "资深机长莫 sir 表面受人尊敬，实则债台高筑。他精心策划了一次假劫机：让同伙假扮劫匪，迫使飞机改道至一个荒废小岛，在那里他早已埋藏好价值连城的古董。副机长阿风无意中识破计划，但此时真劫匪混入乘客中，局面瞬间失控。阿风必须在万米高空，一边稳住驾驶舱，一边与真假两拨歹徒周旋。燃油即将耗尽，飞机在雷暴中摇摇欲坠，阿风的唯一武器是他对铁翼之下每一颗螺丝钉的了解。", "one_line": "一架飞往香港的客机上，副机长发现机长打算用整机乘客作为赌注，完成一次惊天骗局。", "bucket": "action"}, {"id": "1427", "title": "追梦迪士尼", "filename": "m1427.html", "year": "2023", "region": "美国", "genre": "剧情传记", "tags": "励志, 动画师, 职场奋斗, 梦想, 华特·迪士尼", "summary": "故事发生在20世纪40年代，二战刚刚结束，美国动画产业迎来黄金时代。主人公查理·贝克是一名退伍士兵，他在战场上靠画战友的肖像画来缓解压力。回到家乡后，他怀揣着对华特·迪士尼的崇拜，只身前往洛杉矶。因为没有接受过正规艺术教育，他屡屡被各大动画工作室拒之门外。走投无路之下，他进入迪士尼当了一名清洁工。每天夜里，他偷偷用办公室的画笔和纸练习动画手稿，一次偶然机会，他的草图被华特·迪士尼本人看到。华特被他笔下的情感张力打动，破格让他加入了《仙履奇缘》的制作团队，而查理也开始从一个只会临摹的工匠，成长为创造灵魂的动画大师。", "one_line": "一个怀揣动画梦想的穷小子，如何从失业记者变成了迪士尼的传奇动画师？", "bucket": "action"}, {"id": "1428", "title": "味想天开粤语", "filename": "m1428.html", "year": "2017", "region": "香港", "genre": "古装 / 美食 / 爱情", "tags": "粤菜, 食神争霸, 厨艺天赋, 味觉失灵", "summary": "此剧以粤语原声播出，讲述了在清朝广州，丁一山天生拥有“金舌头”，能尝出百种食材的细微差别，但因父亲曾是“毒杀亲王”的御厨，被判终生不得从事餐饮业。他只能藏在酒楼里当试菜员。叛逆的富家千金胡彤彤为了反抗婚约，决定开一家对台酒楼。两人狼狈为奸，一山负责研发，彤彤负责抛头露面。然而彤彤意外失去味觉，一山被迫戴上面具“替身”参赛。两人不仅要面对恶霸厨师的食材垄断，还要破解当年父亲冤案的谜团。剧中包含了大量地道的粤菜制作过程，如“太爷鸡”、“桂花蝉”等失传菜品的还原。最终在决赛中，一山必须只用触觉和听觉做出完美的“开水白菜”，向世人证明厨艺的本源在于心而非舌头。", "one_line": "天生拥有金舌头却因父亲罪人身份无法做厨师的酒楼伙计，联合叛逆千金，挑战广州城十年一度的“状元厨神”赛。", "bucket": "fantasy"}, {"id": "1429", "title": "逆转管弦乐团", "filename": "m1429.html", "year": "2025", "region": "日本", "genre": "音乐 / 剧情", "tags": "废校乐团, 时间悖论, 集体重生", "summary": "北樱高中管弦乐团因人数不足面临废部，团长小薰决定用最后一场演出告别。当全团合奏《未完成交响曲》第三乐章时，舞台灯光闪烁，他们连人带乐器穿越到了十年前——全国大赛的后台。他们发现当年那支神秘夺冠的“无名校”乐团，使用的曲目、指法、甚至服装上的修补痕迹都与自己一模一样。原来他们十年前就曾来过，现在必须完美复制当年的演出，才能让时间闭环。但问题是，当年的冠军乐谱，他们中没人记得全貌。", "one_line": "即将废校的高中乐团在最后演出中集体穿越回十年前的全国大赛，发现当时的冠军正是未来的自己。", "bucket": "drama"}, {"id": "1430", "title": "狐缘", "filename": "m1430.html", "year": "2024", "region": "中国大陆", "genre": "奇幻 / 爱情 / 古装", "tags": "聊斋, 人狐恋, 国风美学, 虐恋", "summary": "改编自《聊斋志异》但进行了全新重构。赶考书生王子服在荒山救下一只中箭白狐，白狐化名婴宁嫁给他，温柔贤淑。但新婚之夜起，每到子时，婴宁会变成另一个女人——性格迥异，且自称是另一个版本的婴宁。王子服起初以为狐妖善变，渐渐发现这其实是三只狐灵共享同一个身体：大姐婴宁负责白天的恩爱，二姐纨素掌管深夜的欲望，三妹阿琐只在月圆时出现，每次都在哭泣。真相是：三年前有道士灭门了这一家狐族，三姐妹的魂魄被强行封入同一具躯体。她们同时爱上了王子服，却也因此互相嫉妒。王子服必须在三姐妹中做出选择，而无论选谁，另外两个都会魂飞魄散。最终他选择让三姐妹都离开，自己终生未娶。片尾彩蛋：数百年后，一只白狐徘徊在书生的墓碑前。", "one_line": "书生救下一只白狐，白狐化身为妻报恩，但每夜子时她都会变成另一个人。", "bucket": "fantasy"}, {"id": "1431", "title": "用琴弦说话", "filename": "m1431.html", "year": "2025", "region": "中国", "genre": "音乐 / 剧情", "tags": "二胡, 失聪, 师徒, 非遗传承", "summary": "少年阿明因药物致聋，却拥有绝对音感和惊人的二胡天赋。他听不见声音，但能通过手指感知琴弦的震动频率，将震动转化为大脑中的“声音”。老艺人陈伯发现他的天赋，破例收徒，教他用触觉和视觉演奏。所有人都说聋人不可能拉好二胡，因为无法控制音准和情感。阿明用三年时间，在琴弦上贴满震动感应贴片，将每个音符的震动频率刻进肌肉记忆。他报名参加全国青少年二胡大赛，评委发现他是聋人后拒绝让他上台。阿明用一段无声的演奏视频震撼全网：镜头只拍他的手和琴弦，没有声音，但每一个看过视频的人都说——“我听见了”。", "one_line": "失聪的二胡天才，靠“看”琴弦的震动来演奏，他要参加全国大赛证明聋人也能听见音乐。", "bucket": "drama"}, {"id": "1432", "title": "夜的余烬", "filename": "m1432.html", "year": "2023", "region": "法国", "genre": "剧情 / 犯罪", "tags": "复仇, 纵火, 记忆碎片, 女性视角", "summary": "记者莉娜的童年被一场离奇大火吞噬，全家只有她幸存。多年后，城市里接连发生纵火案，作案手法与当年如出一辙。莉娜决定追踪这个模仿者，却在调查过程中发现，每一处新火场都像是一块拼图，指向她遗忘的黑暗记忆。随着火势蔓延，她惊恐地意识到，真正的纵火犯或许从未落网，而那个模仿者，正在替她完成一场迟到十七年的复仇。警方、神秘纵火者、以及当年案件的疑点，将莉娜卷入一场燃烧着谎言与罪恶的深渊。", "one_line": "十七年前一场大火烧毁了她的家，如今有人开始模仿那场火，留下的却是当年的真相。", "bucket": "drama"}, {"id": "1433", "title": "牵线", "filename": "m1433.html", "year": "2025", "region": "韩国", "genre": "悬疑，科幻，惊悚", "tags": "脑机接口，傀儡，闺蜜反目，意识上传，控制", "summary": "程序员智秀收到闺蜜敏英赠送的“K-lens”最新款智能眼镜，号称能监测健康与情绪。戴上后她发现自己的技能突飞猛进，钢琴、格斗、烹饪瞬间精通，但代价是偶尔会失去几小时记忆。某天智秀醒来发现自己满手鲜血站在阳台边缘，而监控显示昨夜操控她身体的人是敏英。原来眼镜内置了脑机接口后门，敏英可以完全接管她的运动神经。更恐怖的是，敏英并非一人作案，她背后是一个专门窃取高智商女性身体控制权的暗网俱乐部。智秀必须在身体被彻底夺走之前，用仅剩的自由意志——眼皮眨动——发送摩斯密码求救。", "one_line": "闺蜜送她一副智能眼镜当生日礼物，戴上后闺蜜竟能远程操纵她的身体，像操纵提线木偶。", "bucket": "suspense"}, {"id": "1434", "title": "造衣者", "filename": "m1434.html", "year": "2025", "region": "中国大陆", "genre": "剧情，家庭", "tags": "裁缝世家，代际和解，城市变迁，手工传承，女性视角", "summary": "苏州老街上，七十岁的裁缝苏绣云决定关掉开了五十年的旗袍店。关店前七天，三个女人先后走进来：一个要改嫁衣的离婚孕妇，一个要复制母亲遗物的短发女孩，一个要穿旗袍去自杀的老年舞者。苏绣云在量体裁衣的指尖触碰中，逐渐被她们的故事撬开了自己封存三十年的往事——她曾有一个女儿，在改革开放那年被送去香港，再无音讯。当最后一件旗袍完成时，她发现那位“老年舞者”正是她素未谋面的外孙女。一针一线都是时间织成的血缘，关门那天，店里挂满了送给陌生人的衣裳，而她决定不再离开。", "one_line": "一位即将关闭旗袍店的老师傅，在最后七天里为三位陌生女人缝制衣裳，却缝出了自己的秘密。", "bucket": "drama"}, {"id": "1435", "title": "鼹鼠", "filename": "m1435.html", "year": "2021", "region": "俄罗斯", "genre": "谍战 / 剧情", "tags": "双面间谍，父女反目，苏联解体余波，慢热神剧", "summary": "冷战虽已结束，但代号“鼹鼠”的传奇间谍安德烈一直潜伏在美国高层。在即将解密俄罗斯休眠特工名单的前夜，他离奇失踪。他的女儿卡佳，一个在纽约长大的普通律师，因不知情的父亲背景被CIA招募为诱饵。卡佳在追寻父亲踪迹时，发现父亲留下的线索竟然指向自己童年的玩偶。她必须做出选择：是向CIA坦白父亲的真实身份以求自保，还是利用CIA的资源抢先找到父亲，解开那份隐藏在苏联解体前夜的惊天宝藏（政治黑料）之谜。随着追查深入，她发现父亲失踪是为了保护她不被灭口。", "one_line": "潜伏在CIA三十年的克格勃“鼹鼠”突然失踪，他的女儿却刚刚被中情局招募。", "bucket": "action"}, {"id": "1436", "title": "爱是自私", "filename": "m1436.html", "year": "2023", "region": "日本", "genre": "剧情 / 爱情 / 同性", "tags": "LGBTQ, 死亡, 照护者困境, 自私与奉献", "summary": "时尚杂志编辑浩辅（32岁）过着放纵的生活，直到在一次拍摄中认识了朴素温柔的工作人员龙太（28岁）。两人相恋后，龙太被查出晚期胰腺癌。浩辅辞去工作，全职照顾龙太。他学会了打针、换药，每天记录龙太的体征和心情，发到社交媒体上，获得大量赞美为“模范恋人”。龙太的朋友私下对浩辅说：“他不想让任何人看到自己化疗后的样子，尤其是你。”浩辅这才意识到，他每次直播龙太的状况、每次在病床前表演坚强，都未经龙太同意。龙太去世后，浩辅整理遗物，发现龙太在手机备忘录里写：“我很感激他，但他让我觉得，我的病成了他证明自己会爱的工具。”浩辅崩溃了，他无法分辨自己是圣人还是恶魔。影片最后，他没有参加葬礼，而是回到了两人第一次约会的公园，坐了一整天，什么也没做。", "one_line": "一位风流成性的时尚编辑爱上了朴素的男人，对方却查出绝症。在照护过程中，他不断问自己：我的付出，到底是爱还是为了自我感动？", "bucket": "drama"}, {"id": "1437", "title": "不要太期待世界末日", "filename": "m1437.html", "year": "2023", "region": "罗马尼亚", "genre": "喜剧, 剧情", "tags": "黑色幽默, 社会讽刺, 打工人, 直播文化", "summary": "罗马尼亚，后工业城市。女工安卡被机器压断三根手指，老板只肯赔三个月工资。她走投无路时，一家网红孵化公司找到她：只要她每天直播“末日生存”人设——假装住在废墟、吃老鼠、哭诉悲惨遭遇，就能拿高额分成。安卡起初厌恶，后来发现观众只爱看“更惨”，于是她故意把自己化妆得更脏、更病态。一次直播事故中，她的真实地址被泄露，数百人带着食物和钱涌到她的普通公寓门口。安卡站在阳台上一脸茫然，对着镜头说：“你们是不是有病？”这句话反而让她爆火。结尾，她开着新车去买三明治，工厂老板在街边乞讨。", "one_line": "一名工伤致残的工厂女工被迫开着美颜直播卖惨，却意外成了全网最假的“真可怜人”。", "bucket": "comedy"}, {"id": "1438", "title": "布莱切利四人组第二季", "filename": "m1438.html", "year": "2015", "region": "英国", "genre": "悬疑, 剧情, 犯罪", "tags": "女性群像, 高智商犯罪, 密码破译, 战后创伤", "summary": "二战时期在布莱切利庄园破译德军密码的四位天才女性，战后被社会遗忘。苏珊在平淡的婚姻生活中，通过报纸上隐晦的字母规律，察觉到了一个正在多个城市流窜的连环杀手。她重新联系了擅长记忆细节的米莉、地图专家露西以及拥有社会工程学天赋的琼。四人组冒着被丈夫指责、被警察嘲笑的压力，秘密展开调查。她们发现杀手利用的是战后的难民登记系统漏洞。在第二季中，凶手变得更加狡猾，甚至开始反向设局陷害米莉。四位女性不仅要与凶手斗智，还要对抗那个不相信女人能破案的时代。最终她们在苏格兰场一位年轻探员的帮助下，用一场精密的“数字陷阱”将凶手绳之以法。", "one_line": "战后回归平淡生活的四位女破码员，再次联手追查针对女性的连环杀手。", "bucket": "suspense"}, {"id": "1439", "title": "非电影", "filename": "m1439.html", "year": "2023", "region": "法国", "genre": "纪录片 / 实验", "tags": "元电影，哲学思辨，打破第四面墙，黑白影像", "summary": "导演戈达尔（化名）试图创作一部囊括人类所有知识的“终极电影”。他拍摄了山川、河流、战争、爱情，但发现每个镜头都带着偏见。为了追求绝对客观，他试图不用剪辑、不用剧本、甚至不用摄影机（直接刺激视网膜）。最终他陷入癫狂，把自己关在剪辑室里三年，唯一的作品是一段长达72小时的黑场视频，只有最后三分钟是雪花噪点。本片记录了这“失败”的过程。画外音不断质问：“电影是什么？”最终镜头拉远，观众看到自己正坐在电影院看着这面空白的银幕。片尾字幕：你的人生，就是那部“非电影”。", "one_line": "一部试图拍摄“关于一切的电影”却失败了的纪录片，记录了失败本身。", "bucket": "drama"}, {"id": "1440", "title": "兰花香", "filename": "m1440.html", "year": "2011", "region": "中国大陆", "genre": "家庭, 伦理", "tags": "民国, 姨娘, 宅斗, 身世之谜", "summary": "民国初年，江南绸缎庄的汤家因一盆价值连城的“素心兰”而招致灭门惨案。幸存的小女儿丁香被迫隐姓埋名，以姨娘的身份嫁入仇人谢家。她表面逆来顺受，暗中却在兰花香的气味中寻找当年凶手的线索。谢家大少爷文博身体孱弱，却对丁香一见钟情，而二少爷文翰则处处怀疑丁香的身份。随着兰花展的临近，丁香发现父亲当年的死竟与谢家老太太的私生子有关。在一场大雨中，所有的秘密随着兰花的凋零与盛开而揭晓，丁香必须在复仇与爱情之间做出选择，并且要保护自己腹中的孩子。", "one_line": "一盆神秘的兰花牵扯出两代人的身世秘密，柔弱姨娘如何在乱世家宅中逆袭。", "bucket": "drama"}, {"id": "1441", "title": "阳光以西", "filename": "m1441.html", "year": "2020", "region": "澳大利亚", "genre": "剧情, 爱情, 公路", "tags": "末日, 公路, 孤独, 追寻, 治愈", "summary": "不知名的灾难让世界大部分地区陷入永夜，只有澳大利亚西海岸还有最后的阳光。主角杰被辐射感染，生命只剩三天。他没有选择留在“阳光以西”的幸存者营地等死，而是骑着老式摩托车，向东逆行，进入无尽的黑暗。他要去找因一次争吵而离开、至今下落不明的妻子。在黑暗的废墟中，他遇到了各种绝望的人：寻找孩子的母亲、守护过期食物的老人在漆黑的世界里，他用仅剩的生命力，完成一场注定没有回程的告白。", "one_line": "在世界最后一片被阳光照射的土地上，一个垂死的男人骑摩托车去寻找他失联的爱人。", "bucket": "drama"}, {"id": "1442", "title": "狐之歌", "filename": "m1442.html", "year": "2025", "region": "中国大陆", "genre": "动画、奇幻、音乐", "tags": "狐狸， 山海经， 治愈", "summary": "在山海经的世界里，九尾狐族世代以歌声呼风唤雨。小狐女灵灵天生拥有最美妙的歌喉，却因救一只受伤的百灵鸟，被猎人的毒箭射中喉咙，从此失声。族中长老告诉她，人类世界里有一种“歌谣精灵”，若能找到它，便能治愈任何嗓音。灵灵化为人形进入繁华的宋都东京城，遇到了盲眼琴师阿明。阿明虽然看不见，却能听到万物灵魂的声音。一人一狐踏遍山河，收集散落在民间的古老歌谣。最终灵灵发现，真正的歌谣精灵并非实体，而是藏在每一个愿意为他人唱歌的人心中。当她为濒死的阿明唱出无声却震耳欲聋的心中之歌时，奇迹发生了。", "one_line": "被猎人伤了喉咙的小狐妖无法再歌唱，她在寻找人类歌谣精灵的旅途中，学会了用心灵发声。", "bucket": "animation"}, {"id": "1443", "title": "旧锁", "filename": "m1443.html", "year": "2024", "region": "中国香港", "genre": "恐怖，惊悚", "tags": "民俗，凶宅，诅咒，悬疑，轮回", "summary": "古董商阿豪低价购入一栋著名的凶宅“何家大宅”，并请来风水师换掉所有门锁，以求破局。风水师将拆下的百年旧锁带走，当晚便离奇失踪。紧接着，阿豪的妻子阿欣开始每晚听到从主卧衣柜里传来小孩的拍门声和哭喊声。她发现，只要碰过那把旧锁的人，都会被拉入一个轮回梦境：梦中，她成了民国时期何家的丫鬟，目睹了主人将私生子活活锁在密室中的惨剧。阿欣找到锁匠后人得知，这把锁曾锁住的不只是门，还有怨念。要想解除诅咒，不是换锁，而是找到当年那把“打不开的锁”的钥匙——那枚藏在孩子手心里的铜钱。", "one_line": "风水师为一栋百年凶宅换了把新锁，当晚，所有碰过旧锁的人都听到门后有小孩在喊“妈妈开门”。", "bucket": "horror"}, {"id": "1444", "title": "庆典", "filename": "m1444.html", "year": "1995", "region": "中国香港", "genre": "剧情", "tags": "家族, 秘事, 现实主义, 群戏", "summary": "退休富商郭老爷子八十大寿，散居世界各地的四名子女携家眷回港祝寿。宴席开始，表面一团和气。长子宣布公司上市，次女炫耀丈夫升职，三子展示美国豪宅，幼女大谈公益事业。然而，随着一道“葱烧海参”上桌，尘封的家族往事被撕开。原来，长子公司濒临破产，次女丈夫因贪污被抓，三子早就离婚，幼女在美的所谓“基金会”实为骗局。更惊人的是，老爷子请来的寿星嘉宾，竟是当年被家族诬陷入狱的老管家。老爷子当众下跪认错，寿宴变成一场全员忏悔录。而真正的遗产，只留给了最不成器的孙子。", "one_line": "父亲八十大寿的宴席上，四兄妹轮番揭穿彼此伪造的幸福生活。", "bucket": "drama"}, {"id": "1445", "title": "斯图尔特·李：龙卷风", "filename": "m1445.html", "year": "2025", "region": "英国", "genre": "喜剧 / 脱口秀", "tags": "单口喜剧, 英式幽默, 讽刺, 实验", "summary": "斯图尔特·李的第五个单人专场，舞台被布置成一个被龙卷风刮过的二手商店。他穿着一件沾满狗毛的大衣出场，全程不使用常规麦克风，而是对着一个罐头说话。整场演出没有传统意义上的段子，他花了二十分钟调整一个歪掉的话筒架，然后突然切入对社交媒体算法的精准批判。他用一台1950年的胶片投影仪播放自己拍的仓鼠跑轮视频，指代人类的经济循环。当观众以为他在胡闹时，他猛地将话题拉回英国脱欧和AI取代劳动力，荒谬与精准的切换引发爆笑。最后十分钟，他开始模仿龙卷风的声音，整个剧场随之震动，化为一场无政府主义的狂欢。", "one_line": "怪诞喜剧演员斯图尔特·李用一台坏掉的投影仪和一只仓鼠，解构了当代社会的所有疯狂。", "bucket": "comedy"}, {"id": "1446", "title": "怒海潜将国语", "filename": "m1446.html", "year": "2018", "region": "中国内地 / 美国", "genre": "动作 / 冒险 / 灾难", "tags": "深海救援, 潜艇危机, 跨国合作", "summary": "南海深处，一艘载有核燃料的中国潜艇在执行任务时意外撞上废弃沉船，失去动力、艇体破损，卡在120米深的海沟边缘。潜艇内的氧气仅剩24小时。中方紧急调用“蛟龙”深海救援队，队长陈凯旋发现美方也派出了“深海救助”系统——操作者竟是他的老对手、曾在国际救援培训中不打不相识的前海豹队员杰克。两人曾因理念不合分道扬镳，如今必须在极端环境下重新信任对方。更棘手的是，潜艇失事位置靠近别国敏感海域，救援窗口期极短。陈凯旋和杰克要对抗的不仅是深海高压和有限氧气，还有来自各自上级的政治压力。当最后一套救援服只能供一人使用时，他们做出了同样的选择。", "one_line": "中国蛟龙突击队与美国海豹突击队的前队友，在南海一艘失事潜艇里再次并肩作战。", "bucket": "action"}, {"id": "1447", "title": "琳达·朗斯塔特：我的声音", "filename": "m1447.html", "year": "2023", "region": "美国", "genre": "音乐/传记", "tags": "传奇歌手, 墨西哥裔, 幕后, 治愈", "summary": "本片记录了传奇歌手琳达·朗斯塔特跌宕起伏的一生，从她早年在洛杉矶的墨西哥移民社区崭露头角，到横扫格莱美的辉煌岁月。大量未公开的排练录像和私人录音带，展现了她如何融合乡村、摇滚与拉丁音乐。影片重点放在她因帕金森症失去歌唱能力后，通过音乐治疗重新找回与声音连接的过程。她无法再唱出完美的长音，却用残存的声带教会了学生“呼吸中的情感”。这是一场关于消逝与重生的沉浸式体验。", "one_line": "当嗓音不再完美，她用生命最后的回响，重新定义了“歌唱”。", "bucket": "drama"}, {"id": "1448", "title": "纪伯伦哈利勒：先知", "filename": "m1448.html", "year": "2025", "region": "黎巴嫩", "genre": "剧情/传记/哲思", "tags": "文学改编, 流亡诗人, 东西方对话, 唯美镜头", "summary": "影片以纪伯伦在纽约的流亡岁月为主线，讲述他如何在疾病、贫困与对故土的思念中，创作出代表作《先知》。故事从1920年开始，纪伯伦在纽约的公寓里同时面对来自阿拉伯世界保守派的攻击和西方出版商的诱惑。他的爱人兼资助人玛丽·哈斯克尔始终陪伴在侧，但他们的爱情注定无法圆满。电影采用“剧中剧”结构，穿插《先知》中关于爱、婚姻、孩子、自由等26个篇章的视觉化呈现，每个篇章都以梦幻般的手绘动画表现。影片并未将纪伯伦塑造成完美圣人，而是展示了一个矛盾、脆弱、在东西方文化夹缝中挣扎的真实灵魂。", "one_line": "流亡纽约的纪伯伦，在生命的最后十二年里，用阿拉伯语和英语同时写下了这部影响世界的散文诗。", "bucket": "drama"}, {"id": "1449", "title": "酷爱电影的庞波小姐", "filename": "m1449.html", "year": "2021", "region": "日本", "genre": "喜剧 / 剧情", "tags": "电影制作, 梦想, 讽刺", "summary": "庞波小姐是好莱坞B级片女王，只拍肌肉、爆炸和僵尸。某天她突然宣布要拍一部冲奥文艺片：黑白画面，长镜头，无配乐。全公司觉得她疯了。新人导演吉恩被强行推上马，演员是过气老戏骨和刚出道的地下偶像。拍摄过程混乱不堪：投资人撤资，编剧罢工，主演打架。然而当粗剪版出来时，所有人都沉默了——那是一部关于电影如何杀死电影人的血腥寓言。庞波小姐笑着宣布：这才是我最想要的B级片。", "one_line": "天才制片人庞波小姐只做B级片，却要用一部文艺片冲击戛纳，全剧组都疯了。", "bucket": "comedy"}, {"id": "1450", "title": "乳齿", "filename": "m1450.html", "year": "2024", "region": "中国台湾", "genre": "剧情，奇幻，家庭", "tags": "换牙，返老还童，祖孙情，民俗，治愈", "summary": "叛逆少女小琪被迫回乡下照顾患阿兹海默症的奶奶。奇怪的事情发生了，奶奶开始掉牙并长出新牙，身体也奇迹般地恢复年轻。面对越来越像个小女孩的奶奶，小琪从厌恶到无奈，最终决定带着奶奶去寻找她记忆中提到的那棵“神树”。在寻根之旅中，小琪通过奶奶稚嫩的童言，逐渐拼凑出这个家族被遗忘的历史，也理解了上一辈人的苦衷，最终找回了遗失的亲情。", "one_line": "当90岁的奶奶开始换第二副乳牙并逐渐变回孩童时，叛逆的孙女不得不反过来当她的“妈妈”，两人踏上了寻找记忆的旅程。", "bucket": "drama"}, {"id": "1451", "title": "没谈过恋爱的我", "filename": "m1451.html", "year": "2024", "region": "中国大陆", "genre": "爱情、校园、青春", "tags": "母胎单身、 双向暗恋、 纯爱、 大学校园", "summary": "母胎单身22岁的中文系才女许诺，暗恋篮球队学长三年不敢表白，被室友嘲笑“只会纸上谈兵”。为了证明自己，她和同样没谈过恋爱的计算机系天才顾言西打赌，两人假装恋爱一个月，要给对方当“恋爱导师”。许诺教顾言西写情诗，结果写得文绉绉像悼词；顾言西教许诺用算法分析约会对象，结果算出学长有78%的概率是渣男。两人在一次次啼笑皆非的“教学实践”中，逐渐发现真正懂自己的就是眼前这个人。当许诺终于鼓起勇气要向学长告白时，顾言西却当着全校师生的面，用代码在操场上写了一个巨大的“我爱你”程序，抢先一步告白。两人这才明白，初恋就是最好的爱情理论。", "one_line": "中文系“理论派恋爱大师”和计算机系“母胎SOLO”学霸，因为一次打赌假装情侣，结果假戏真做，贡献了全部理论笑料。", "bucket": "romance"}, {"id": "1452", "title": "约会电影", "filename": "m1452.html", "year": "2024", "region": "美国", "genre": "喜剧，爱情，恶搞", "tags": "元叙事，约会软件，乱点鸳鸯，吐槽，彩蛋", "summary": "重度社恐的程序员阿杰和社牛插画师小美在“心跳”APP上匹配成功，约定周六晚在“邂逅”餐厅见面。但两人都不自信，各自同时在APP上约了另外三个备胎，以防对方“见光死”。结果到了当晚，同一张长桌八个人坐下，他们才尴尬认出彼此。餐厅经理因暗恋小美，故意把所有约会对象引到同一桌。随着菜品上桌，每一道菜都对应一个约会软件的“死亡聊天开场白”（比如“你平时喜欢做什么？”变成了一道沙拉拼盘）。阿杰的代码思维与小美的即兴画图不断撞出笑料，最后两人通过互相删光手机APP的方式，在暴雨中拥吻。片尾彩蛋：他们的约会数据被黑客盗走，做成了NFT。", "one_line": "一对网友决定见面，却发现彼此各自带了三个相亲对象，全订了同一家餐厅。", "bucket": "comedy"}, {"id": "1453", "title": "圣修伯里", "filename": "m1453.html", "year": "2025", "region": "法国", "genre": "传记, 剧情", "tags": "作家, 小王子, 飞行, 战争", "summary": "影片聚焦1940年至1944年，安东尼·德·圣修伯里流亡美国期间。他一边忍受着婚姻危机，一边在异国他乡撰写《小王子》。纽约的喧嚣让他窒息，只有回忆起年轻时在北非邮航担任飞行员的经历才能找到平静。随着二战加剧，他执意重返侦察飞行队，不顾年龄和身体限制。1944年7月，他最后一次起飞，消失在普罗旺斯上空。影片以平行剪辑呈现他写作与飞行，暗示“小王子”其实就是他自己。", "one_line": "《小王子》作者圣修伯里的最后岁月：在爱情、战争与沙漠中寻找童真。", "bucket": "drama"}, {"id": "1454", "title": "战地情莺", "filename": "m1454.html", "year": "2022", "region": "美国", "genre": "战争, 爱情, 音乐", "tags": "二战, 歌女, 间谍, 悲情", "summary": "1943年的巴黎，犹太歌莺莉亚每晚在“红磨坊”献唱，用美妙歌喉掩盖其抵抗组织间谍身份。当冷酷的德军情报官冯·克莱斯特将军被她的歌声吸引并展开追求时，莉亚决定利用这段感情窃取诺曼底登陆计划。两人在谎言与欲望中沉沦，莉亚逐渐发现将军并非纯粹的恶魔，而是一个厌恶战争却无法脱身的棋子。当登陆日临近，莉亚面临终极抉择：完成刺杀任务拯救无数生命，还是与爱人私奔逃离地狱。雨夜的火车站，将军已识破她的身份，却递给她两张前往中立国的车票。枪声响起，爱与信仰在战火中化为绝唱。", "one_line": "二战烽火中，一名夜总会歌女与德军军官相恋，而她实际是为盟军传递情报的间谍。", "bucket": "drama"}, {"id": "1455", "title": "烟波乐", "filename": "m1455.html", "year": "2025", "region": "中国", "genre": "悬疑 / 古装 / 奇幻", "tags": "江南, 画师, 魂穿, 诗谜", "summary": "临安城的天才画师沈烟波以“写实山水”名动天下，凡他画过的景色皆栩栩如生。某日，他重游旧地写生，却发现画中的湖泊、山峦竟从现实中凭空消失，只留下光秃秃的地表。惊恐之下，沈烟波反复试验，确认了自己的画拥有“吞噬风景”的诡异能力。与此同时，一桩连环失踪案引发恐慌——那些消失的风景里，曾住着隐世的文人、奇人甚至精怪。朝廷将其视为妖术，下令抓捕。沈烟波被迫逃亡，并试图画出最后一片“不存在”的风景，来逆转一切。", "one_line": "南宋画师发现，自己笔下每一幅山水画，都会导致现实中的某一处风景彻底从世上消失。", "bucket": "suspense"}, {"id": "1456", "title": "第一速度", "filename": "m1456.html", "year": "2024", "region": "中国大陆", "genre": "动作 / 赛车", "tags": "地下赛车, 卧底, 兄弟情, 生死时速", "summary": "交警陈默被派去摧毁一个利用赛车走私的组织。他伪装成富二代挑战地下车王阿豪，却次次被秒杀。阿豪欣赏他的“车菜瘾大”，收他为徒。陈默在学车过程中渐渐发现，阿豪其实是为了给弟弟治病才被迫替走私集团卖命。两人建立了亦师亦友的情谊，陈默面临任务与良心的煎熬。最终行动当晚，阿豪发现陈默的警察身份，却没有揭穿，反而帮他引开了其他赛车手。在最后一段盘山公路上，陈默驾驶改装警车与BOSS展开生死追逐，阿豪牺牲自己撞停了BOSS的车。葬礼上，陈默戴上阿豪的头盔，参加了合法赛事“第一速度”。", "one_line": "为了破案，菜鸟交警卧底地下赛车圈，却和车王成了生死兄弟。", "bucket": "action"}, {"id": "1457", "title": "残酷青春", "filename": "m1457.html", "year": "2023", "region": "中国大陆", "genre": "剧情 / 犯罪", "tags": "校园暴力， 成长阵痛， 小镇青年， 现实主义", "summary": "故事发生在东北一个灰蒙蒙的工业小镇。高中生李响性格懦弱，暗恋着校花林娜。林娜因拒绝当地小混混头目“龙哥”的追求而惨遭欺凌，并最终被逼转学。李响目睹一切却不敢出声，深深痛恨自己的软弱。为了接近“龙哥”并寻找报复机会，他开始混迹于街头，凭借一点小聪明和惊人的忍耐力逐渐获得信任。在一次因“龙哥”引发的冲突中，李响被迫参与了对一名讨债人的暴力殴打，并意外导致对方死亡。从一个旁观者变成参与者，李响的人生轨迹彻底偏离。影片结尾，他在火车站的候车室看到通缉令，身后响起了警笛声。", "one_line": "小镇少年为给暗恋的女孩复仇，一步一步从小混混的跟班沦为凶杀案的帮凶。", "bucket": "drama"}, {"id": "1458", "title": "反对夫人哈德利之战", "filename": "m1458.html", "year": "2026", "region": "美国", "genre": "剧情， 传记， 历史", "tags": "女权， 工会运动， 大萧条， 真实改编", "summary": "1937年芝加哥，经济大萧条阴影未散。钢铁巨头哈德利为压榨工人，大幅降薪并引入打手。工人领袖迈克被捕后，他懦弱的妻子多萝西为了给狱中的丈夫送饭，意外卷入了罢工运动。看到孩子们挨饿，多萝西从家庭主妇蜕变为领袖，集结所有女眷组成“妇女辅助团”。当资本家派出武装警察和高压水炮时，多萝西带着上百名妇女，推着婴儿车做掩体，敲着平底锅呐喊，用剪刀剪断铁丝网。这场看似荒唐的“平底锅战争”最终震惊全国，迫使罗斯福政府介入，为美国劳工史写下了浓墨重彩的一笔。", "one_line": "大萧条时期，一位钢铁厂工人的妻子带领家属们，用平底锅和扫帚对抗资本家的武装镇压。", "bucket": "drama"}, {"id": "1459", "title": "不管妈妈多么讨厌我", "filename": "m1459.html", "year": "2018", "region": "日本", "genre": "剧情 / 家庭", "tags": "亲情, 和解, 女性成长, 虐心", "summary": "自幼被母亲冷暴力的美咲，成年后离家成为独立插画师。某天她接到医院电话，母亲因肝硬化急需换肝，而她是唯一匹配者。美咲陷入挣扎，童年时母亲的嘲讽、忽视、偏心妹妹的画面不断闪回。她偷偷去医院看望昏迷的母亲，第一次握住了那双从未牵过她的手。最终她决定捐肝，却要求匿名。手术成功后，母亲醒来看着陌生的捐赠记录，第一次对着空气说了声“谢谢”。美咲在远处听到，泪流满面。", "one_line": "被母亲厌弃的女儿，在生命的尽头接到为母亲换肝的通知。", "bucket": "drama"}, {"id": "1460", "title": "1998之闯将", "filename": "m1460.html", "year": "2026", "region": "中国大陆", "genre": "剧情、历史、励志", "tags": "年代戏，下岗潮，创业，兄弟", "summary": "1998年，东北老工业基地。老赵是厂里的技术骨干，却和妻子一同在“下岗潮”中丢了饭碗。看着空荡荡的车间和家中断炊的米缸，老赵做了一个大胆的决定：卖掉房子，带着厂里十几个同样下岗的兄弟，南下深圳。他们不懂什么叫市场经济，只懂手里的钳工技术。从在华强北倒卖BP机被坑，到在流水线上靠过硬的技术攻克难关，老赵和兄弟们经历了被骗、被歧视、差点客死他乡的至暗时刻。但他们骨子里那种不服输的闯劲和重如泰山的兄弟情，让他们抓住了手机产业爆发的风口。最终，这群东北汉子在南方热土上，建起了属于自己的通讯帝国，也见证了中国制造从无到有的二十年。", "one_line": "1998年，东北国企下岗工人老赵，带着一群同样失业的兄弟，南下深圳，从倒卖BP机开始闯出一片天。", "bucket": "drama"}, {"id": "1461", "title": "观鸟大年", "filename": "m1461.html", "year": "2011", "region": "美国", "genre": "喜剧, 剧情, 冒险", "tags": "观鸟, 中年危机, 比赛, 治愈", "summary": "观鸟大年是北美观鸟者之间的一场真实竞赛，看谁能在一年内在北美地区观察到最多种类的鸟。离婚程序员布莱德、中产阶级公司高管斯图和刚从金融危机中恢复的年轻会计肯尼，三人因为不同的理由加入了这场疯狂的比赛。他们开着小破车奔波于阿拉斯加的悬崖和佛罗里达的沼泽之间，只为一睹珍稀鸟类“角嘴海雀”或“雪鸮”的真容。在这场持续一年的马拉松中，他们错过了家人的生日、丢掉了工作、甚至差点丧命。但当他们在荒岛一起目睹那极光之下飞翔的信天翁时，发现名次早已不重要，重新找回的热爱才是最大的奖赏。", "one_line": "三个不同年龄段的男人，为了争夺北美年度“观鸟大年”冠军，展开了疯狂的追鸟竞赛。", "bucket": "comedy"}, {"id": "1462", "title": "三个金币", "filename": "m1462.html", "year": "2021", "region": "中国大陆", "genre": "奇幻、喜剧、剧情", "tags": "愿望、沈腾、治愈、寓言式、金钱", "summary": "废柴青年罗小天欠债累累、女友分手、面试被拒，万念俱灰时从一个神秘老头手中得到三枚“心想事成”金币。他兴奋地许愿“一个亿”，次日真的中了彩票，却发现自己失去了味觉——这是他唯一热爱美食的乐趣。第二枚金币，他许愿“追回前女友”，女孩回心转意，他却发现自己的幽默感消失了，两人相处尴尬至极。握着最后一枚金币，罗小天终于明白：世上没有白得的午餐。他选择许愿“回到遇见老头之前”，一切归零，但他带着这份领悟，重新开始了脚踏实地的人生。", "one_line": "失业青年意外得到三枚许愿金币，但他每许一个愿，都要失去同等重要的东西。", "bucket": "fantasy"}, {"id": "1463", "title": "雾中之犬", "filename": "m1463.html", "year": "2025", "region": "日本", "genre": "悬疑，奇幻", "tags": "小镇，传说，失踪", "summary": "青年圭太回到雾岛小镇参加童年好友的葬礼，镇上流传着“雾犬”的怪谈。十年前的迷雾中，包括他好友在内的三个孩子失踪，只有一个女孩幸存归来，但记忆全失。圭太发现，当年的幸存者如今变得行为诡异，总是在深夜独自走向山里的神社。随着新一场浓雾降临，圭太尾随其后，在能见度不足两米的山路上，他听到了粗重的喘息声，并看到了那双不属于任何生物的红眼睛。", "one_line": "每当浓雾笼罩小镇，就会有孩子消失，人们说带走孩子的是雾中的野狗。", "bucket": "suspense"}, {"id": "1464", "title": "村主任和他的女友", "filename": "m1464.html", "year": "2024", "region": "中国大陆", "genre": "剧情 / 乡村 / 喜剧", "tags": "乡村振兴，基层干部，驻村生活，南北差异", "summary": "北方青石峪村村主任赵大河，正带领村民发展特色菌菇种植。正当产业初见成效时，他在南方读博的女友林青璇突然带着一套智慧农业方案空降而来，声称要“用数据改造一切”。林青璇的理论与村里的土办法屡屡冲突，闹出不少笑话，也让赵大河夹在乡亲和女友之间左右为难。一场突如其来的菌菇病害，让两套方法不得不正面碰撞。在共同对抗危机的过程中，林青璇理解了土地的温度，赵大河也看到了科技的力量。最终，村主任找回了女友的初心，也带领村子走出了一条独特的振兴路。", "one_line": "当理工科博士女友空降村子“指导工作”，村主任的爱情和村务同时遭遇了史上最强风暴。", "bucket": "drama"}, {"id": "1465", "title": "十二星座之为爱奔跑", "filename": "m1465.html", "year": "2025", "region": "中国", "genre": "爱情, 青春", "tags": "星座, 马拉松, 十二个主角, 群像", "summary": "大学操场，十二个被退社的“废柴”赌气立约：三个月后，每人以自己星座的名义组队完成一场全马接力赛，输了的请全体喝奶茶。十二个主角：白羊座冲动体育生、金牛座抠门会计、双子座精分编剧……他们从互相嫌弃到被迫磨合。故事线交织：处女座学长偷偷帮天蝎座女主按摩旧伤，水瓶座发起“星座作战企划”为队伍拉赞助，双鱼座在终点前把自己的接力手环交给跑崩了的狮子座。最终他们以倒数第二名的成绩完赛，但十二个人赛后抱在一起哭。结尾：每个人拿着星座接力奖牌，字幕打出“爱是唯一不需要配速的奔跑”。", "one_line": "十二个不同星座的年轻人，因为一场荒唐的马拉松赌约，被卷入彼此的爱与梦想，有人跑向终点，有人跑向对方。", "bucket": "romance"}, {"id": "1466", "title": "牛角面包", "filename": "m1466.html", "year": "2019", "region": "法国", "genre": "喜剧，生活", "tags": "面包师，巴黎早晨，意外邂逅", "summary": "住在巴黎蒙马特高地的面包师皮埃尔性格孤僻，他唯一的社交就是每天清晨将烤得形状丑陋的“牛角面包”送给街角的流浪汉卢卡。卢卡从不说话，只是默默收下。一天，卢卡身边多了一个衣着破旧但气质优雅的中年女人索菲。皮埃尔依然每天送出两个“丑面包”。渐渐地，沉默的三人形成了奇妙的默契。索菲开始帮皮埃尔打扫店面，卢卡修好了坏掉的烤箱。当市政厅要驱赶流浪汉时，皮埃尔第一次走出了他的面包店。", "one_line": "一个习惯独处的面包师，每天清晨把烤坏的牛角面包送给街角流浪汉，直到有一天流浪汉带来了一个女人。", "bucket": "comedy"}, {"id": "1467", "title": "她的轨迹", "filename": "m1467.html", "year": "2024", "region": "中国大陆", "genre": "剧情", "tags": "女性, 时代, 成长, 国企改革, 母女", "summary": "1983 年，东北纺织厂女工李招娣未婚生女，被工厂开除。她将女儿留给母亲，独自南下去深圳打工。女儿刘小年在外婆家长大，对母亲只有汇款单上的名字。2003 年，刘小年考上广州大学，在火车站与从深圳赶来送她的李招娣擦肩而过——两人已认不出彼此。2018 年，刘小年成为互联网公司高管，母亲李招娣则因工厂倒闭回到东北。刘小年为了做“女工再就业”项目调研回到老家，在社区活动室采访一群老年女工时，遇到了正在学用智能手机的李招娣。刘小年看着那张和自己一模一样的脸，两人沉默了很久。采访结束时，李招娣举起手机说：“能帮我和我女儿拍张照吗？我想发给她。”", "one_line": "从东北老工业基地到深圳电子厂，一对母女四十年各自奔跑却从未交汇。", "bucket": "drama"}, {"id": "1468", "title": "府上娶了个锦鲤新娘", "filename": "m1468.html", "year": "2022", "region": "中国大陆", "genre": "喜剧 / 爱情 / 古装", "tags": "锦鲤, 锦鲤运, 甜宠, 先婚后爱, 爽剧", "summary": "京城首富沈万财的独子沈逸飞体弱多病，算命先生说必须娶一个“八字极阴”的女子冲喜。媒婆送来了渔家女苏小鲤——此人命硬到克死了前两任未婚夫，人称“扫把星”。苏小鲤嫁进沈家第一天，沈家地里的庄稼被蝗虫吃光了，但苏小鲤随手一拨，蝗虫就飞走了，地里的庄稼居然比以前长得还好。沈家赌坊要倒闭，苏小鲤随便押了一注就赢了十万两。沈逸飞要把她赶走，结果苏小鲤刚出大门，沈家就遭了雷劈。沈逸飞无奈留下她，但他发现一个诡异规律：苏小鲤对所有人和事都有好运加成，唯独对他——只要苏小鲤碰他一下，他就会倒霉一整天（喝水塞牙、走路摔跤、睡觉被老鼠咬）。这个“锦鲤新娘”，究竟是在旺他还是在克他？", "one_line": "京城首富之子被迫娶了一个“扫把星”冲喜，没想到新娘自带锦鲤体质，把整个家族都带旺了，唯独克他一个。", "bucket": "comedy"}, {"id": "1469", "title": "怪兽8号", "filename": "m1469.html", "year": "2024", "region": "日本", "genre": "动作 / 科幻 / 热血", "tags": "怪兽, 中年逆袭, 变身英雄, 自卫队, 反差热血", "summary": "日比野卡夫卡，32岁，怪兽清扫公司员工，负责打扫每次“怪兽灾害”后留下的尸体碎块。他曾和青梅竹马约定一起加入防卫队，但对方成了英雄，他却连续落榜12年。一次意外中，一只小型寄生怪兽钻入了卡夫卡的体内，使他获得了变身成“怪兽8号”的能力——力量是普通防卫队员的100倍，但每次变身都会让怪兽意识侵蚀大脑一次，完全侵蚀后他将彻底变成一头毁灭城市的怪兽。卡夫卡隐藏身份重新报考防卫队，以31岁“高龄”成为训练生中最弱的人类，却每晚偷偷变身怪兽8号去击杀来袭的大怪兽。当他终于被队友怀疑时，真正的危机来了——最强怪兽“大怪兽6号”苏醒，而其目标正是寄生在卡夫卡体内的小型怪兽。", "one_line": "32岁的清洁工梦想加入防卫队杀怪兽，直到他自己变成了怪兽8号。", "bucket": "action"}, {"id": "1470", "title": "双龙会粤语", "filename": "m1470.html", "year": "2024", "region": "中国香港", "genre": "动作喜剧", "tags": "双胞胎, 错认, 港式幽默", "summary": "特技演员阿龙与粤剧文武生阿龙，不仅长相一样，连名字都相同。一次交通事故中，两人偶遇并惊讶于彼此容貌，为了各自的目的决定临时互换身份。飞车特技人被迫在戏台上耍花枪，把《帝女花》演成了动作片；而粤剧名伶则混进特技组，开着摩托飞跃火圈。两人在慌乱的互穿中笑料百出，却也因此卷入了黑帮的非法赌车阴谋。最终，兄弟俩必须联手，用真功夫和假把式，在赛道上给反派上一堂生动的“粤剧武打课”。", "one_line": "失散多年的双胞胎兄弟，一个是飞车特技人，一个是粤剧名伶，因同名而互换人生。", "bucket": "comedy"}, {"id": "1471", "title": "群蛇出洞", "filename": "m1471.html", "year": "2028", "region": "美国", "genre": "灾难, 惊悚, 冒险", "tags": "蛇灾, 自然灾害, 逃生, 密闭空间, 爽片", "summary": "洛杉矶发生里氏7.8级强震。震后，地底深处的热源导致一个史前蛇类栖息地“苏醒”。数以百万计的蛇类通过地裂涌入城市下水道和地铁。下班高峰期的地铁一号线，列车被蛇群逼停。乘客包括一名退役特种兵、一个实习医生、一位带着女儿的母亲。他们必须穿越长达三公里的黑暗隧道，到达还未被蛇入侵的应急出口。途中，灯光熄灭，脚下是冰冷的积水，四周是蛇体摩擦墙壁的沙沙声。特种兵利用地铁设备制造火墙阻挡蛇群，实习医生用人体气味掩盖疗法保护众人。最终仅五人逃生，地面上的军方启动了火烧隧道方案，城市得救。", "one_line": "一场地震激活了地下休眠千万年的蛇类大本营，整个城市地铁系统瞬间沦为蛇窟。", "bucket": "suspense"}, {"id": "1472", "title": "公牛费迪南", "filename": "m1472.html", "year": "2025", "region": "西班牙 / 美国", "genre": "动画 / 喜剧 / 家庭", "tags": "治愈, 反战, 动物, 幽默", "summary": "新版动画改编。费迪南是一头生长在“斗牛培训营”的公牛，所有牛的目标都是成为马德里斗牛场的明星。但费迪南只想在树下静静闻花香。因为它不训练，被卖到了农场当肉牛。在屠宰场的卡车上，它救了一只蠢萌的山羊和一只戏精刺猬，组成了逃亡小队。它们一路穿越城市和乡村，闹出无数笑话。当费迪南误打误撞闯入斗牛场时，面对挥舞红布的斗牛士，它不仅没有冲上去，反而一屁股坐在了场地中央，掏出藏在耳后的一朵小花闻了起来，感动了全场观众，从而推动了废除斗牛法的运动。", "one_line": "一头体型巨大却只爱闻花香的公牛，拒绝斗牛，带着小伙伴们大逃亡。", "bucket": "animation"}, {"id": "1473", "title": "窃心", "filename": "m1473.html", "year": "2025", "region": "中国台湾", "genre": "爱情，悬疑", "tags": "换心，记忆，替身", "summary": "体弱多病的富家千金林知夏接受了心脏移植手术，术后她发现自己口味变了，甚至开始出现不属于自己的记忆碎片。她循着梦中的模糊身影，找到了街头混混阿卓，并对他产生无法抑制的爱意。阿卓明知她不是前女友，却也无法自拔地被她吸引（因为那颗心）。两人陷入虐恋。随着林知夏的记忆逐渐完整，她惊恐地发现，自己的心脏来自于阿卓死于意外的前女友。更可怕的是，所谓的“意外”，其实是阿卓的仇家误杀。而那颗心之所以会给她，是因为她父亲买通了医院。这段由“窃心”开始的爱情，最终因为真相的残酷而走向毁灭。", "one_line": "富家千金接受心脏移植后，爱上了街头混混，而她不知道这颗心脏的原主人是混混死去的女友。", "bucket": "romance"}, {"id": "1474", "title": "玩尽杀绝3:钻石计划", "filename": "m1474.html", "year": "2025", "region": "美国", "genre": "惊悚, 犯罪, 悬疑", "tags": "钻石, 骗局, 黑吃黑, 反转, 极限求生", "summary": "职业骗子尼克、黑客天才萨米和伪装大师莉娜，组成了一个精英骗局团队，目标是南非钻石大亨范德比尔特的一颗稀世粉钻“非洲之心”。他们的计划堪称完美：莉娜伪装成苏富比拍卖行专家接近范德比尔特，萨米黑入他的安保系统，尼克则在拍卖会当晚实施偷天换日。计划执行顺利，粉钻到手，三人按约定在公海游艇上分赃。然而就在此时，尼克突然掏出了枪，原来他一直在利用另外两人，打算独吞钻石。但还没等他扣动扳机，萨米按下了遥控器，游艇瞬间爆炸——她早就留了后手，在游艇上装了炸弹。莉娜落海逃生，尼克被炸伤，而萨米带着钻石乘坐直升机逃离。就在萨米以为自己是大赢家时，她脖子后的皮肤下亮起了一个红点——范德比尔特通过内鬼在她体内植入了与粉钻关联的追踪芯片，而现在，尼克和莉娜的复仇联军，正根据这个信号追来。一场在非洲大草原上的三方追杀战，就此展开。", "one_line": "三个骗子联手从钻石大亨手中骗走价值十亿的粉钻，却发现钻石被植入了一枚追踪芯片。", "bucket": "suspense"}, {"id": "1475", "title": "美女与怪物", "filename": "m1475.html", "year": "2023", "region": "法国", "genre": "恐怖 / 黑色喜剧", "tags": "整容, 社交媒体, 畸形, 讽刺", "summary": "巴黎最炙手可热的整形医生杜瓦尔博士开发了一款AI“完美脸型生成器”——输入你的照片，AI会生成一张被大数据认证为“最吸引人”的脸。承诺“千人千面，但每一面都完美”。前一百位客户术后欣喜若狂，但三个月后，她们的脸开始“趋同”：眼皮、鼻梁、嘴唇、甚至骨骼结构全部变成同一张脸——一张极度对称、毫无瑕疵、却让人完全无法产生任何情感共鸣的“空白脸”。她们被社会抛弃，被称为“怪物”。杜瓦尔博士惊恐地发现，AI选择的“完美脸”，其实来自于数据库中一个被标注为“平均脸”的女尸。他必须赶在自己也成为第101个怪物之前，找到那个女人的身份。", "one_line": "一名整形医生发明了“完美脸型算法”，但他的所有客户术后都变成了同一张无法辨认的“怪物脸”。", "bucket": "horror"}, {"id": "1476", "title": "最后的贵族", "filename": "m1476.html", "year": "2025", "region": "中国大陆", "genre": "历史，剧情", "tags": "民国，贵族，家道中落，旗袍", "summary": "1949年春，上海。前清贵族后裔、银行家之女顾海棠在自家洋房举办最后一场舞会。宾客们讨论着去香港或台湾的船票。顾海棠的父亲已携小老婆和财产逃走，留下她、病重的母亲和满屋古董。与此同时，隔壁弄堂的百姓正在挨饿。顾海棠偶然发现家中地窖藏着父亲未带走的三千两黄金。她做出惊人决定：变卖古董换成粮食，分给整条弄堂。国民党军官、她的旧情人沈其昌劝她离开，并带来最后一张船票。登船那夜，顾海棠看到码头上排队等待救济粮的邻居们，把船票折成纸飞机扔进黄浦江。", "one_line": "1949年，上海最后一批名门望族面临抉择：是带着金条去台湾，还是留下与弄堂百姓共享一锅稀饭。", "bucket": "drama"}, {"id": "1477", "title": "孖生老虎", "filename": "m1477.html", "year": "2024", "region": "中国香港", "genre": "警匪动作", "tags": "双胞胎, 卧底, 身份错位, 九龙城寨", "summary": "1997前夕，一对双胞胎在逃亡中失散。20年后，哥哥阿鬼成了大毒枭的贴身保镖，心狠手辣；弟弟阿文则是潜伏在黑帮内部的卧底。一次交易中，阿文身份暴露被追杀，阿鬼为了救弟弟中弹昏迷。阿文看着和自己一模一样的哥哥，决定将计就计，顶替阿鬼的身份回到大毒枭身边调查贩毒网络。但他必须模仿哥哥的左手刀法、恐高症以及对某种香水的过敏反应。而苏醒后的阿鬼失去了记忆，在警方那里被当成了阿文，被迫以“卧底”的身份活下去。两个在不同立场长大的人，最终在九龙城寨的废墟里举枪相向。", "one_line": "双胞胎兄弟失散20年，一个成了黑帮悍将，一个成了卧底警探，当两人命运重叠，只能互换身份活下来。", "bucket": "action"}, {"id": "1478", "title": "九月的一天", "filename": "m1478.html", "year": "2026", "region": "法国 / 德国", "genre": "剧情, 历史, 悬疑", "tags": "公路电影, 东德, 逃亡, 真相追查, 慢节奏", "summary": "1989年9月的一天，东德女教师葛瑞塔收到匿名信，里面是一张照片：她的丈夫汉斯穿着西德警察制服，背景是被烧毁的汽车。汉斯20年前翻越柏林墙时失踪，被官方认定为死亡。葛瑞塔决定在西德边境开放有限度的缝隙期，独身前往西德调查。她发现汉斯当年成功逃亡，改名换姓成为警察，但那张照片的背景是一起警察虐囚纵火案——汉斯是知情者。她找到汉斯，后者已失忆。葛瑞塔没有揭发他，只是把照片留给他，转身回到东德。一个月后，柏林墙倒塌。", "one_line": "柏林墙倒塌前一个月，一个女人匿名收到一张照片：她失踪20年的丈夫，穿着西德警服站在一辆烧毁的车前。", "bucket": "drama"}, {"id": "1479", "title": "锦绣宅心", "filename": "m1479.html", "year": "2024", "region": "中国大陆", "genre": "古装、家族、悬疑", "tags": "宅斗、刺绣、遗产、女性群像、反转", "summary": "民国初年，江南丝绣世家沈府，以秘传“锦绣同心”针法独步天下。当家主母七十大寿当晚，一幅前朝遗作《寒鸦戏水》竟从绣绷上自行显形。次日，大太太贴身绣娘溺亡荷塘，手中紧握一根血红色丝线。三太太擅通灵，她坚称那幅绣图里绣着三个死去的女人，每死一个，绣图上的乌鸦便多一只眼睛。长女沈绣禾留学归来，她不信鬼神，却发现所有线索都指向父亲当年那场蹊跷火灾。当第二具尸体浮出水面，沈绣禾在祠堂密室里找到了那幅被禁的“万艳同悲”绣谱——原来，沈家每一代当家主母，都是用活人发丝绣出来的。", "one_line": "一幅传世绣图藏尽家族秘密，三名绣娘相继溺死于自家荷塘。", "bucket": "fantasy"}, {"id": "1480", "title": "杂家高手", "filename": "m1480.html", "year": "1990", "region": "中国香港", "genre": "动作", "tags": "功夫, 门派, 复仇, 硬桥硬马, 老港味", "summary": "三十年前，杂家拳宗师白鹤因不屑加入任何门派，被八大门派掌门联手围攻致死。其弟子刘阿弟隐姓埋名，在鱼市卖鱼练功，将八卦、形意、太极、洪拳等各派招式拆解融合成独一无二的“杂家拳”。当年仇人之一、洪拳掌门病逝前，刘阿弟才得知师父死的真相。他单枪匹马挑战八大派，先破铁线拳，再败咏春，一路血战。到第七场对战螳螂派时，他发现对方的杀手锏竟是自己师父的不传之秘。最终，幕后黑手竟然是当年刘阿弟的救命恩人、一直在背后默默帮助他的杂货店老板——师父的亲弟弟，为了争夺拳谱而勾结外敌。刘阿弟在悲愤中以一招“百家归一”了结恩仇，最终打破门派之见，成立“杂家武馆”。", "one_line": "杂家拳传人刘阿弟为报师仇，以各家杂糅功夫单挑八大纯正门派，却被发现最大仇人就在身边。", "bucket": "action"}, {"id": "1481", "title": "跳跃生命线粤语", "filename": "m1481.html", "year": "2018", "region": "中国香港", "genre": "剧情，职业", "tags": "救护员，生死时速，港剧情怀，群像", "summary": "麦Sir是经验最丰富的救护总队目，他带队的A292救护车是观塘区最可靠的“生命线”。新丁杰仔第一天报到，就遭遇了大型交通事故，在麦Sir的怒吼中学会了什么叫“冷静”。剧集通过一集一个或多个急救案例，串联起队员们的个人生活：有人因无法救回亲人而患上PTSD，有人在救护车上遇到了失联多年的父亲，也有人因为长期高压而险些毁掉婚姻。麦Sir自己则始终放不下一次五年前的失误，那个没能救回的小女孩成了他的心魔。在台风天的一次山体滑坡救援中，全员被困废墟，麦Sir必须在生命最后时刻教会杰仔：救护员不是为了成为英雄，而是为了在绝望中守住最后那一点光。", "one_line": "跟随一群香港救护员穿梭大街小巷，每一响警笛都是一场与死神的拔河。", "bucket": "drama"}, {"id": "1482", "title": "难以启齿", "filename": "m1482.html", "year": "2024", "region": "中国台湾", "genre": "剧情 / 家庭 / 同性", "tags": "家庭秘密，同性情感，父权压抑，无声告白，催泪", "summary": "陈家是当地望族，父亲陈校长一生威严，三个子女皆事业有成。葬礼上，按照习俗，长子陈安宁要念悼词。但他迟迟不开口，跪在灵前沉默了两个小时。族老逼迫下，他终于展开那张被汗浸湿的纸，第一句就让全场炸锅：“我爸生前最怕的事，不是死，而是承认我妈是被他打跑的。”接下来的悼词里，他揭开了这个模范家庭的脓疮：家暴、冷暴力、以及他本人长达十五年不敢出柜的恐惧。最难以启齿的不是自己的性取向，而是他之所以一直沉默，是因为父亲曾用“打断你的腿”威胁他。当安宁念完最后一个字，台下有人哭，有人骂，但他感到从未有过的轻松。这是他与父亲最后的对话，也是他真正成为自己的第一课。", "one_line": "一直乖巧的儿子在父亲葬礼上拒绝发言，只因他要念的悼词里藏着整个家族心照不宣的秘密。", "bucket": "drama"}, {"id": "1483", "title": "殉道者杀手", "filename": "m1483.html", "year": "2025", "region": "美国", "genre": "动作 / 惊悚 / 宗教", "tags": "刺客, 信仰, 梵蒂冈, 复仇, 反转", "summary": "“殉道者”是梵蒂冈秘密行动处最致命的刺客，代号“第十一使徒”。他从未失手，也从未有过真实的身份，只是一台被教会洗脑的完美杀人机器。在完成最后一次任务后，上级按照惯例给他注射了记忆清除剂，但药剂出了问题——他没有失忆，反而恢复了所有被删除的记忆，包括自己原本的名字、家庭，以及七年前他是如何被从监狱里“偷”出来改造成刺客的。更关键的是，他记起了第一个任务的目标：一个试图揭发教会高层性侵丑闻的记者，而那个记者，是他的亲生父亲。现在，教会发现他没有失忆，启动了“自噬程序”，派出了所有曾由他训练的学徒来追杀他。他必须抢在程序完成前，杀入梵蒂冈密库，找到证明他身份的唯一证据——一张他父亲死前藏进圣经里的全家福。", "one_line": "梵蒂冈最顶级的刺客接到了最后一个任务：杀死自己。", "bucket": "action"}, {"id": "1484", "title": "我爱驰星周", "filename": "m1484.html", "year": "2025", "region": "中国大陆", "genre": "剧情喜剧", "tags": "粉丝, 追星, 山寨, 荒诞, 公路", "summary": "河南农民李铁柱被女儿嘲笑“连周星驰是谁都不知道”。他翻出一张1999年的《喜剧之王》盗版VCD，指着上面糊掉的脸说：“这是我兄弟，他欠我50块钱，我去横店找他就能要回来。”女儿当笑话发了抖音，没想到全网开始接力帮李铁柱找“周星驰”。一路上，他遇到了山寨版“张柏芝”、开面馆的“吴孟达”、自称星爷御用替身的跛脚老头。最后他真的走进了《美人鱼2》的片场，见到了那个他以为叫“驰星周”的人。", "one_line": "一个脸盲的农村大叔为了向女儿证明自己认识周星驰，踏上了去横店“认亲”的荒诞公路之旅。", "bucket": "drama"}, {"id": "1485", "title": "大侦探第八季", "filename": "m1485.html", "year": "2026", "region": "中国大陆", "genre": "悬疑/推理", "tags": "本格推理，密室，暴风雪山庄，社会派，反转", "summary": "本季开篇，大侦探受邀参加一场在量子游轮上举行的“推理盛宴”。午夜过后，游轮与外界失联，定位显示已在公海。更诡异的是，船上十二位乘客包括：逃脱的连环杀手、贪腐的政客、诈骗犯、黑心药商……所有人都曾利用法律漏洞逍遥法外。一封匿名信声称：这艘船就是你们的法庭，只有真凶能活着下船。随后，连续的密室杀人开启，死者死法均对应其犯下的罪行。大侦探在追查过程中，发现自己也被算计其中，他的某个不为人知的秘密往事与这艘船的核心秘密相连。当法律触及不到的地方，私刑是否就是正义？大侦探面临职业生涯最艰难的抉择：是找出真凶，还是毁掉这个扭曲的“法庭”？", "one_line": "侦探受神秘富豪邀请登上豪华游轮，一夜醒来却发现船在公海，且乘客全是被定罪却逃脱的罪犯。", "bucket": "suspense"}, {"id": "1486", "title": "米娅的夏天", "filename": "m1486.html", "year": "2024", "region": "美国", "genre": "剧情 / 青春", "tags": "青少年, 性启蒙, 成长", "summary": "暑假第一天，米娅的母亲再婚并飞去欧洲度蜜月，把她一个人丢在俄亥俄州的沉闷小镇。米娅决定用这个夏天攒够钱，逃去纽约学摄影。她白天在超市收银，晚上在汽车电影院卖爆米花，周末还给邻居家带小孩。疲惫不堪的米娅遇到了同样在打暑期工的马科斯，一个梦想成为厨师的墨西哥裔男孩。两人在深夜打烊后的影院天台分享食物和秘密，逐渐靠近。米娅第一次体验到心动的感觉，却也害怕亲密关系会让她放弃远行。当她的存款终于够了，她却在车站犹豫了。与此同时，马科斯拿到了一家餐厅的学徒资格，但需要立刻搬到加州。两个年轻人必须在那个盛夏结束前，做出关于梦想与爱的选择。米娅最终买下了一张前往加州的票，却不是给自己，而是给了马科斯。", "one_line": "十七岁的米娅在暑假打了三份工，只为攒钱买一张去纽约的单程车票。", "bucket": "drama"}, {"id": "1487", "title": "常在我心", "filename": "m1487.html", "year": "2022", "region": "中国", "genre": "爱情，奇幻", "tags": "器官捐献，替身爱人，治愈", "summary": "患有心脏病的女孩小悠接受了来自一位因车祸去世的陌生女孩“叶子”的心脏。手术后，小悠不仅身体康复，性格也发生了剧变，她开始喜欢吃叶子生前最爱的苦瓜，喜欢听叶子最爱的乐队，甚至有一种强烈的冲动，想去见叶子的未婚夫阿卓。小悠以“接受者”的身份拜访了阿卓，本想表示感谢，却在见到阿卓的瞬间心跳加速——那颗不属于她的心脏，疯狂地爱着眼前的男人。阿卓也从小悠的一些小动作中看到了亡妻的影子。两人陷入了一种禁忌的情感：这究竟是移植细胞带来的“细胞记忆”，还是两个同样被遗弃的灵魂在相互取暖？", "one_line": "她接受了心脏移植手术后，发现自己竟不可救药地爱上了心脏原主人的未婚夫。", "bucket": "romance"}, {"id": "1488", "title": "里斯本夜车", "filename": "m1488.html", "year": "2023", "region": "葡萄牙, 德国", "genre": "悬疑, 文艺", "tags": "夜车, 日记, 独裁, 追寻", "summary": "中年教师戈列格里斯在雨中跳上一辆开往里斯本的夜班火车，逃离了重复的日常。在里斯本的一家旧书店，他偶然发现一本葡萄牙作家普拉多的日记《文字炼金师》，里面记录了一个人在萨拉查独裁统治下的思想抵抗。戈列格里斯被深深吸引，开始追寻日记主人的足迹，逐渐揭开普拉多从医生到作家再到反抗者的短暂一生。在追寻中，他遇到了当年出卖普拉多的挚友、普拉多失散的女儿，以及一个隐藏了四十年的秘密：普拉多最后的日记里，写的不是政治，而是对他的爱。", "one_line": "失眠的中学教师跳上一辆夜班火车，在终点站的旧书店里找到了改变一生的日记。", "bucket": "suspense"}, {"id": "1489", "title": "黑色星期一第三季", "filename": "m1489.html", "year": "2026", "region": "美国", "genre": "剧情，金融，黑色喜剧", "tags": "华尔街，崩盘，精英，骗局", "summary": "第三季时间跳转到1991年，前两季的主角们已经彻底沦为金融圈的过街老鼠。前交易天才布莱尔出狱后在一家彩票店打工；曾经的女王达恩成了地下赌场的发牌员；而那个永远笑着算计所有人的莫里斯，则被发现死在了一辆被烧毁的豪车里——尸体旁放着一张第三季才会揭晓的股票认购权证。新一季引入了一群来自芝加哥期货交易所的“野蛮人”，他们用一种前所未有的金融产品“波动率炸弹”，试图反向做空整个纽约证券交易所。布莱尔与达恩被迫重组，不是为了钱，而是为了在崩盘前救出莫里斯还活着的儿子。黑色幽默不减，暴力指数翻倍，每一集都在问同一个问题：你愿意牺牲多少无辜的人，去毁灭一个本就邪恶的系统？", "one_line": "1989年股灾过去两年后，一群被华尔街抛弃的疯子，决定亲手制造下一次崩盘。", "bucket": "drama"}, {"id": "1490", "title": "女挽狂澜", "filename": "m1490.html", "year": "2024", "region": "美国 / 挪威", "genre": "传记，冒险，体育", "tags": "航海，女性，风暴，破纪录，独臂", "summary": "根据真实事件改编。挪威女水手艾琳·海于格在出生时就失去左小臂，却梦想完成单人不间断环球航行。2019年，她驾驶“狂澜号”从法国出发，顺利通过赤道。第127天，在南大洋克罗泽群岛附近，气象仪器故障，她误入低压区中心，遭遇12级风暴与35米巨浪。帆船被多次打翻，桅杆折断，船舱进水，自动驾驶仪损毁。艾琳只能用单手和牙齿调整绳索、用仅存的应急帆拼死掌舵，连续72小时不眠不休。她录下“遗言视频”后，突然发现风暴眼有一刹那平静，趁机修复了无线电。最终她凭借惊人毅力驶出风暴，虽因船体受损未能完赛，却创下了残障水手最远单人航行纪录。返港时，万人欢呼。艾琳说：“大海从不怜悯任何人，它只是公平地对待每一个拼尽全力的人。”", "one_line": "独臂女水手决心以单人帆船环球航行，却在南大洋遭遇百年一遇的狂暴风暴，必须只手挽救即将倾覆的船。", "bucket": "drama"}, {"id": "1491", "title": "开膛手的复仇", "filename": "m1491.html", "year": "2024", "region": "英国", "genre": "悬疑惊悚", "tags": "连环杀手、历史改编、女性复仇、反转", "summary": "现代伦敦出现模仿开膛手杰克的连环杀人案，受害者均为知名媒体人，尸体被开膛且子宫被取走。女法医伊芙琳·李在尸检中发现，受害者体内均被植入微型胶片，内容是1888年五名受害女性的手写信——她们根本不是妓女，而是被记者编造身份以掩盖上层社会的性侵丑闻。伊芙琳追踪到开膛手杰克其实是当年一位外科医生，他杀人的目的是为了让世人看到真相，却被历史永久污名。现在的凶手是那位医生的玄孙女，她也是一名法医。伊芙琳面临选择：抓捕她，让真相再次被掩埋；或放走她，自己成为共犯。最终伊芙琳选择销毁证据，并在结案报告上写：五名受害者，职业不详。", "one_line": "开膛手杰克的后代正在杀死所有当年污蔑受害者为妓女的记者后代，而凶手是一名法医。", "bucket": "crime"}, {"id": "1492", "title": "团子大家族第一季", "filename": "m1492.html", "year": "2007", "region": "日本", "genre": "剧情 / 爱情 / 治愈", "tags": "key社, 催泪, 校园, 家族, 麻枝准", "summary": "光坂高中，被称为“不良”的冈崎朋也对一切漠不关心，直到他在通往学校的坡道上遇见了喃喃自语“团子大家族”的古河渚。渚因体弱留级一年，性格内向但执着，梦想是重建被废部的演剧部。朋也被渚的纯粹吸引，开始帮助她招募成员、申请社团、排演话剧。在这个过程中，朋也逐渐与自己的父亲、与过去的伤痛和解。第一季主要讲述两人相遇、相知，以及围绕他们身边的朋友们——天才少女琴美、活泼捣蛋的杏、温柔学姐智代等——的温暖日常。当演剧部终于要在文化祭上演时，渚却因高烧倒下，朋也第一次意识到，渚已经成为他生命中最重要的人。", "one_line": "问题学生冈崎朋也在樱花坡道上遇见古河渚，一个将“团子大家族”挂在嘴边的女孩，从此他的灰色人生被慢慢填满。", "bucket": "drama"}, {"id": "1493", "title": "我去远方，不流浪", "filename": "m1493.html", "year": "2019", "region": "中国大陆", "genre": "公路, 剧情, 家庭", "tags": "代际和解, 内地独立电影, 徒步旅行, 三峡移民", "summary": "小北是上海一名失业的插画师，她接到父亲的电话：爷爷被查出阿尔茨海默症中期，只认得老家的龙门阵。但老家早已因三峡工程沉入水底。小北决定带爷爷从重庆朝天门码头开始，徒步走到湖北姊归，沿途用画笔记录爷爷口中“还在那里”的茶馆、戏台和吊脚楼。一路上，爷爷时而清醒，时而把孙女当成年轻时的妻子。他们睡涵洞、搭货车、蹭丧宴。小北从一个抱怨一切的“丧青年”，逐渐听懂了三代人的迁徙与失落。最终他们没有到达淹没的县城，而是在一片拆迁废墟上，用投影仪将小北的画打在断墙上，爷爷笑了，说“这就是家”。", "one_line": "一个叛逆的95后女孩带着患有阿尔茨海默症的爷爷，沿着正在消失的长江古镇徒步找回记忆。", "bucket": "drama"}, {"id": "1494", "title": "飘香剑雨", "filename": "m1494.html", "year": "2023", "region": "中国台湾", "genre": "武侠, 悬疑", "tags": "江湖, 奇案, 兵器谱, 复仇", "summary": "武林突然出现一本失传的《天工兵器谱》，记载了两把传说中的神剑：“飘香”轻盈如烟，“剑雨”快如闪电。名门正派一夜之间惨遭灭门，唯一的线索指向二十年前的铸剑师之女云萝。云萝隐姓埋名在酒馆当跑堂，却被各路高手认出。她发现自己就是唯一能感应双剑的人，而幕后黑手竟是当年诬陷她父亲叛国的义兄。随着调查深入，她发现所谓的“宝藏”其实是足以摧毁皇权的火药配方。在一场雨夜竹林的对决中，云萝以血为祭，让“飘香”和“剑雨”在雨中合璧，完成了对虚伪江湖的审判。", "one_line": "传说集齐“飘香”与“剑雨”两柄神兵，就能开启前朝宝藏，一夜之间江湖血流成河。", "bucket": "action"}, {"id": "1495", "title": "自然光线", "filename": "m1495.html", "year": "2023", "region": "匈牙利 / 法国", "genre": "剧情 / 历史 / 战争", "tags": "二战, 东线, 游击队, 黑白摄影, 人性", "summary": "1943年严冬，一支效忠于德军的匈牙利游击队在东欧密林中执行清剿任务。他们捕获了一个蓬头垢面的当地女人，怀疑她是苏联游击队的侦察员。小队长被派去审问她，却陷入了沉默的僵局。这个女人既不招供，也不求饶，只是用一种近乎怜悯的目光看着他们。在森林无尽的自然光线中，饥饿、寒冷和猜忌开始瓦解这支队伍。当他们试图处决这个女人时，女人的眼神和远处的枪声同时响起。影片几乎没有对白，全靠自然光影和演员的微表情推进，展现了一种超越语言的、关于战争本质的静默审判。", "one_line": "1943年乌克兰丛林，一群匈牙利游击队员抓获了一名疑似苏联女间谍，但她的眼神比雪更冷。", "bucket": "drama"}, {"id": "1496", "title": "旧爱共度30天", "filename": "m1496.html", "year": "2020", "region": "韩国", "genre": "爱情 / 剧情", "tags": "破镜重圆, 契约同居, 治愈, 前任, 限时恋爱", "summary": "毒舌设计师江植洲和幼稚插画师韩素拉分手三年，老死不相往来。突然得知共同好友去世，留给他们的遗产是一套房子，条件是必须一起居住30天，否则房子将捐给仇人。两人无奈搬进同一个屋檐下，立下严格规定：互不干扰，谁先表白谁净身出户。在这30天里，江植洲发现了韩素拉画中的男主角全是他，韩素拉也看到了江植洲收藏着她所有丢掉的东西。两人在互损和试探中逐渐软化，第29天的雨夜，江植洲冲到雨里抱住韩素拉，说房子不要了，要她。然而第二天，律师告诉他们，房子本来就是韩素拉的，这只是好友设计的一场挽回局。", "one_line": "分手三年的奇葩情侣因遗产继承被迫同居30天，谁先动心谁就输掉房子。", "bucket": "romance"}, {"id": "1497", "title": "大卫林区：绿野谜踪", "filename": "m1497.html", "year": "2022", "region": "美国", "genre": "纪录片，传记", "tags": "大卫林区，幕后花絮，艺术创作，超现实主义", "summary": "本片并不是林奇某部电影的拍摄花絮，而是一部关于他如何“看”世界的纪录片。导演跟随大卫·林奇穿梭于洛杉矶的破旧公寓、阴森的工厂和路边昏暗的咖啡馆。林奇对着镜头分享他几十年来的冥想心得，并随手拿起餐巾纸画下那些梦中出现的诡异小人。纪录片捕捉了他为一个新项目选角的过程，其中一名演员的长相让他想起了“被烧焦的收音机”。影片没有传统的时间线，而是像林奇的电影一样充满跳跃的意象：一杯冒着诡异蒸汽的咖啡，窗帘后忽隐忽现的阴影，以及在录音棚里为一个女演员录制长达十分钟喘息声的过程。这是一次关于“林奇主义”最直观的溯源。", "one_line": "纪录片镜头深入大卫·林奇的内心世界，揭示他如何在日常生活中捕捉那些构成《双峰》与《穆赫兰道》的诡异灵感。", "bucket": "drama"}, {"id": "1498", "title": "被遗忘的战斗", "filename": "m1498.html", "year": "2023", "region": "俄罗斯", "genre": "战争 / 历史", "tags": "二战, 东线, 雪原, 狙击手", "summary": "1942年，苏德战场边缘地带。一支苏军侦察排深入敌后，因电台损坏与大部队失联。他们发现自己被军方记录为“全员阵亡”，而德军同样忽略了这片冻土。没有援军，没有命令，只有零下四十度的严寒和躲在暗处的敌人。排长别列科带领残存的二十名战士，截获了一辆德军补给车，利用缴获的弹药在废弃村庄里坚守了整整一个月。", "one_line": "1942年冬，一个被双方指挥部抛弃的步兵排，在冰原上为生存而战。", "bucket": "drama"}, {"id": "1499", "title": "爱上女主播", "filename": "m1499.html", "year": "2024", "region": "中国大陆", "genre": "剧情 / 爱情", "tags": "职场, 都市, 成长, 电台, 反转", "summary": "技术宅林深被强制调去支援濒临淘汰的深夜电台，搭档是出了名毒舌苛刻的主播苏念。起初两人水火不容，林深只想混日子，却意外发现苏念下班后竟是一位匿名治愈漫画作者，画的正是电台故事。林深利用技术手段帮她优化节目效果，收听率逆袭。就在关系升温时，直播意外暴露了苏念的真实身份，网络暴力席卷而来。林深用一场全城寻声行动帮她重建信心，两人也从彼此拆台变成了最懂对方声音的人。", "one_line": "一名只想摸鱼的技术宅被调去支援电台后，意外发现毒舌女主播的秘密身份，两人开启欢喜冤家模式。", "bucket": "drama"}, {"id": "1500", "title": "给我庇护", "filename": "m1500.html", "year": "1970", "region": "美国", "genre": "纪录片 / 音乐", "tags": "滚石乐队, 阿尔塔蒙特, 垮掉的一代, 悲剧, 真实影像", "summary": "本片真实记录了1969年滚石乐队在美国阿尔塔蒙特赛道举办的灾难性免费演唱会。原意是打造“伍德斯托克”的西部翻版，却因雇佣“地狱天使”飞车党充当安保而走向失控。在混乱的现场，飞车党与观众暴力冲突不断。当滚石演唱《Under My Thumb》时，一名18岁黑人青年梅雷迪斯·亨特在舞台前被飞车党活活刺死。影片将滚石乐队迷幻、慵懒的摇滚乐与台下正在发生的血腥杀戮进行交叉剪辑，美与暴烈、嬉皮理想与残酷现实形成令人窒息的对比。这不仅是一场演唱会的崩溃，更是整个“爱与和平”60年代神话幻灭的见证。", "one_line": "镜头记录了滚石乐队那场本想致敬伍德斯托克的免费演唱会，却变成了一场血色谋杀案。", "bucket": "drama"}, {"id": "1501", "title": "融尸荡魄", "filename": "m1501.html", "year": "1992", "region": "中国香港", "genre": "恐怖/情色/奇幻", "tags": "邪术, 降头, 港产片, cult", "summary": "香港富豪马爷年过六十，为求重返青春，请来泰国邪师修炼“融尸大法”，需取九名不同生辰的处女尸体，炼成药引。前八具顺利到手，唯独缺“阴年阴月阴日”的第九具。马爷发现，自己的年轻妻子小玲正是这个命格。他本想杀妻取尸，却发现小玲早已被邪师控制。在最后的法坛上，八具尸体开始融化，小玲的魂魄飞入马爷体内，她要的不是永生，而是同归于尽。那一夜，豪宅里响起九重惨叫。", "one_line": "富豪为求长生修炼邪术，需要九具不同命格的女尸，却在最后一具上发现自己妻子的魂魄。", "bucket": "horror"}, {"id": "1502", "title": "少年师爷之断案传奇", "filename": "m1502.html", "year": "2020", "region": "中国大陆", "genre": "悬疑 / 古装 / 儿童", "tags": "少年神童，推理，水乡，智斗豪强", "summary": "绍兴，嘉靖年间。十三岁的师爷之子阿辛酷爱钻研断案，被街坊称为“小师爷”。当朝廷十万两漕运官银在城外渡口凭空蒸发，知府将罪名扣在船帮头上准备严刑逼供。阿辛发现官银的铅封蜡样有问题，暗中调查时却遭遇黑衣人追杀。在卖馄饨的哑叔、机灵的书童小豆子的帮助下，他抽丝剥茧，发现这桩案子竟与知府师爷的海外账本以及三年前一桩灭门冤案有关。阿辛利用“水痕实验”和“飞鸢传信”引蛇出洞，最终在大堂之上，当着钦差的面，用一只烧鸡揭开了金库密室机关的秘密。", "one_line": "明朝江南水乡，十三岁的小师爷靠半部《洗冤录》，硬刚一桩牵连全城的“幽灵漕银案”。", "bucket": "suspense"}, {"id": "1503", "title": "瑟撒刚历险记", "filename": "m1503.html", "year": "2016", "region": "印度", "genre": "动作 / 历史", "tags": "战神, 史诗, 开挂", "summary": "在南印度卡利安王朝时期，暴虐的殖民者卡迪克将军霸占了圣水泉。部落首领之子瑟撒刚因为母亲被殖民者侮辱，激发了体内沉睡的战神之力。他先是在拳斗场徒手打死猛虎引起将军注意，随后混入将军的奴隶营。在月圆之夜，瑟撒刚觉醒了家族传承的十种武器技能，独自一人面对装备精良的数千殖民军。影片用开挂般的慢镜头展示瑟撒刚用长矛、弯刀乃至脚镣屠杀敌人的过程，最终他站在堆积如山的敌人尸体上，向侵略者宣告了原住民的不可侵犯。", "one_line": "一个天生神力的部落王子，为了拯救被殖民的同胞，单人屠杀了整个殖民军团。", "bucket": "action"}, {"id": "1504", "title": "拳师夺美", "filename": "m1504.html", "year": "2024", "region": "中国大陆", "genre": "动作, 爱情", "tags": "拳击, 复仇, 硬汉, 黑帮", "summary": "曾被誉为“铁拳”的拳击手林东因伤退役，在旧城区开了一家勉强维生的拳馆。某天，他的女友小美被当地一伙神秘势力绑架。林东唯一的线索是，对方要求他参加一场极度危险的地下黑拳赛，每赢一场，就透露一点小美的下落。为了爱人，林东拖着残躯重返擂台。他凭借意志力和丰富的经验连克强敌，却在最终决战前发现，策划这一切的幕后黑手竟是小美的亲哥哥方旭。方旭认为林东配不上自己的妹妹，想用这种方式让他知难而退。在最后的擂台上，林东面对的不是仇人，而是一场关乎尊严与爱情的人性考验。", "one_line": "过气拳王为救被掳走的恋人，在地下拳场连胜十场，却发现幕后黑手竟是她的亲哥哥。", "bucket": "action"}, {"id": "1505", "title": "与爱同在", "filename": "m1505.html", "year": "2025", "region": "印度", "genre": "爱情 / 歌舞 / 家庭", "tags": "跨宗教, 家族荣誉, 印巴分治, 真爱", "summary": "在充满宗教隔阂的小镇，有着世仇背景的印度教画师卡兰与穆斯林歌手艾扎相恋了。当双方家族剑拔弩张时，卡兰那患有严重阿兹海默症的爷爷突然“清醒”了。爷爷曾在印巴分治时期爱过一个穆斯林女孩，却因战乱遗憾终生。爷爷开始装疯卖傻，用那个年代的歌曲和记忆，将两个家族的长辈拉回到人性共通的情感中。在一场盛大的融合音乐节上，两个家族终于放下了背负几十年的仇恨，让这对年轻人得以牵手。", "one_line": "印度教小伙和穆斯林女孩在家族世仇中相爱，他们唯一的盟友竟是患了阿兹海默症的爷爷。", "bucket": "romance"}, {"id": "1506", "title": "生于十月", "filename": "m1506.html", "year": "2024", "region": "俄罗斯", "genre": "剧情, 悬疑, 历史", "tags": "苏联最后一届, 十月宝宝, 时代悲剧, 多线叙事", "summary": "1991年10月，莫斯科一家妇产医院里，十个婴儿在同一个雨夜出生。一位疯癫的老护士挨个给他们系上红丝带，预言：“你们是苏维埃的最后一代，你们的命运会像齿轮一样咬在一起，要么一起活，要么一个一个死。”三十年后的莫斯科，这十人中的第三个成员离奇坠楼。记者娜斯佳偶然发现，前两人的死亡都不是意外，而他们的共同点是：都曾在某个时刻试图找回当年的出生记录。娜斯佳逐一找到剩余的七人，却发现每个人都活成了预言的一部分——有人成了寡头，有人进了监狱，有人远走他乡，有人始终躺在精神病院里。而当她拼凑出真相时，老护士的身份才真正揭晓：她根本不是护士，而是克格勃最后一批“十月计划”的执行人。", "one_line": "十个在苏联解体前一个月出生的孩子，被一个预言捆在了一起，三十年后，他们中已有三人离奇死亡。", "bucket": "drama"}, {"id": "1507", "title": "火球：来自黑暗世界的访客", "filename": "m1507.html", "year": "2025", "region": "美国", "genre": "科幻, 惊悚", "tags": "外星入侵, 未知病毒, 末世求生", "summary": "一颗没有发出任何预警的火球划破夜空，坠落在美国偏远小镇的森林深处。最初，它被视为陨石，但很快，接触过火球辐射范围的居民开始表现出诡异的症状：情绪失控、瞳孔变黑、皮肤下浮现出脉动的光痕。盲女艾薇是唯一没有受到视觉污染的人，她发现自己能“听”到火球中生物的思想。军方封锁了小镇，艾薇必须在政府采取极端手段之前，找到一种方式与这个来自黑暗宇宙的访客沟通，否则整个地球的意识都将被它重写。", "one_line": "一颗火球坠落后，小镇居民开始异变，唯有盲女能“看见”入侵者的真面目。", "bucket": "sci-fi"}, {"id": "1508", "title": "找不着北", "filename": "m1508.html", "year": "2024", "region": "中国大陆", "genre": "喜剧， 爱情， 公路", "tags": "方向痴， 自驾游， 阴差阳错", "summary": "林小溪患有严重的方向识别障碍，但为了向分手的男友证明自己“可以独立”，她决定独自自驾从上海去漠河北极村找“北”。导航在出城第一个隧道就没了信号，林小溪凭着直觉开，三天后竟然开到了三亚。更离谱的是，副驾上还坐着一个她完全不认识的男生阿浪——他本来要去机场，上错了车，结果一觉醒来已经过了琼州海峡。两个“找不着北”的人被迫结伴，上演了一出从南到北、横穿中国的反向自驾闹剧。一路上他们经历了地图失灵、导航叛变、问路被坑等各种荒诞事件，也在无数次迷路中，找到了比方向更重要的东西——彼此。", "one_line": "严重路痴的女孩独自自驾去漠河找北，却一路开到了三亚，而副驾上坐着一个同样上错车的毒舌男。", "bucket": "comedy"}, {"id": "1509", "title": "大话骰", "filename": "m1509.html", "year": "2002", "region": "中国香港", "genre": "喜剧, 犯罪", "tags": "骰子, 赌场, 兄弟, 逆袭", "summary": "阿骰在澳门赌场做了十年的骰盅服务员，靠听骰子的本事从未失手，但他从不赌博。他的弟弟阿仔欠下赌债被黑帮抓走，阿骰被迫挑战赌场神话“骰魔”。规则是“大话骰”，就是互相猜对方骰子点数。阿骰用十年听骰的经验，能精确算出对方骰子的每一种可能，但他故意不停地输。在最后一局，阿骰把全部身家和弟弟的命压上，然后说出了对方骰盅里的每一个数字，连骰魔自己都不知道的数字。骰魔认输，把赌场股份分了一半给阿骰。阿骰把股份卖掉，开了全澳门第一家“禁赌”的茶餐厅。", "one_line": "一个只会摇骰子的服务员被卷入澳门赌场之争，他靠“吹牛”赢下了整个赌城。", "bucket": "comedy"}, {"id": "1510", "title": "女神异闻录5", "filename": "m1510.html", "year": "2025", "region": "日本", "genre": "奇幻，悬疑，动作", "tags": "怪盗，人格面具，心之怪盗团，青少年心理，社会批判", "summary": "转学至东京的高中生雨宫莲，因见义勇为被诬陷而背负“前科”。他与一群同样被社会抛弃的同学们，觉醒了名为“人格面具”的力量。他们化身为“心之怪盗团”，潜入名为“宫殿”的异世界，改变那些滥用权力、欺压弱者的“大人们”的扭曲内心，使其公开忏悔罪行。从校园欺凌的体育老师，到剽窃艺术的知名画家，再到操控选举的政客，怪盗团的名声越来越大。然而，他们的行为也逐渐触及到这个国家最顶级的权力核心。一场关于正义与审判、自由与控制的终极对决，即将在现实与精神世界之间爆发。", "one_line": "一群被社会贴上“问题儿童”标签的高中生，在深夜的异世界里“偷走”大人们的扭曲欲望，让他们悔改。", "bucket": "fantasy"}, {"id": "1511", "title": "兵王", "filename": "m1511.html", "year": "2026", "region": "中国大陆", "genre": "军旅 / 动作 / 热血", "tags": "特种部队，逆袭成长，生死战友", "summary": "身体素质超群但性格桀骜不驯的王浩入伍，被分到侦察连。他看不惯规矩，频频闯祸，却有着惊人的战术直觉。班长是个沉默的老兵，一直包容并引导他。在一次缉毒任务中，班长为救王浩而牺牲，临终前说：“你要成为兵王。”王浩痛不欲生，申请加入全军淘汰率最高的“炼狱”集训队。在那里，他经历了超越生理极限的折磨，从独狼变成了懂得团队配合的利刃。最终，在国际特种兵比武中，面对杀害班长的毒枭雇佣军，王浩在受伤的情况下，完成了不可思议的绝地反杀，将国旗插在了最高领奖台。", "one_line": "刺头新兵历经魔鬼训练营，为给牺牲班长报仇，挑战全军最高荣誉“兵王”称号。", "bucket": "action"}, {"id": "1512", "title": "特斯拉笔记", "filename": "m1512.html", "year": "2025", "region": "日本", "genre": "科幻 / 悬疑", "tags": "超能力, 电磁, 天才, 阴谋", "summary": "在近未来，物理系辍学生“空”捡到一个自称是尼古拉·特斯拉留下的神秘笔记本。按照笔记搭建线圈装置后，他竟获得了操控金属的“磁化能力”。但能力失控，他差点吸干一座大楼的钢筋。一名自称“特斯拉后裔”的神秘组织找上门，告诉他：全球还有十几个“笔记持有者”，他们能力各异，且都是历史上被掩埋的科学天才的“继承者”。组织要他们合作，开启特斯拉留下的“世界能量系统”。空却发现，每次合作都会消耗同伴的生命。他拒绝牺牲任何人，独自破解笔记，发现特斯拉真正的遗产不是能量系统，而是一个能够消除所有“人造天才能力”的反向装置。最后的决战，空在卫星轨道上对抗整个组织。", "one_line": "落魄天才发现特斯拉遗留的“线圈笔记”，并学会了用脑电波操控一切金属——包括人体内的铁质。", "bucket": "sci-fi"}, {"id": "1513", "title": "幸福里的朝阳", "filename": "m1513.html", "year": "2024", "region": "中国大陆", "genre": "剧情 / 家庭", "tags": "胡同, 邻里, 时代变迁, 温情, 成长", "summary": "故事从1998年北京幸福里胡同的最后一个夏天讲起。高中生林朝阳、邻居女孩陈晓和胡同小霸王刘毅，三人在即将拆迁的胡同里度过了最后的自由时光。林朝阳暗恋陈晓却不敢表白，刘毅的家庭因国企改制而陷入困境，陈晓则面临着随父母移居海外的选择。在一个流星雨的夜晚，他们将各自的梦想写成纸条，封在铁盒里埋在老槐树下，约定2008年奥运会时再聚首开启。十年后，三人命运迥异：林朝阳成了程序员，刘毅南下经商，陈晓成为记者。2008年重逢时，他们发现铁盒早已被工地掩埋，但曾经的诺言却以另一种方式实现。最终三人联手保护了仅存的老槐树，让幸福里的精神在新北京延续。", "one_line": "1998年北京胡同拆迁前夜，三个发小在最后的老槐树下埋下一个秘密，约定二十年后开启。", "bucket": "drama"}, {"id": "1514", "title": "送赞雪橇犬", "filename": "m1514.html", "year": "2014", "region": "美国 / 加拿大", "genre": "冒险 / 家庭", "tags": "狗狗, 南极, 极地求生, 忠诚, 真实事件改编", "summary": "南极科考站因暴风雪突然恶化，科考队乘飞机紧急撤离。由于飞机超载，八只雪橇犬被留在站外，系在铁链上。主人公杰瑞回到文明世界后，始终无法忘记它们，四处奔走筹措资金回去营救。与此同时，南极进入极夜，零下五十度的严寒中，雪橇犬们陆续挣脱锁链，以头犬玛雅为首，开始团队狩猎海豹和企鹅。当杰瑞时隔半年终于返回时，八只狗只剩六只活了下来，它们看到杰瑞的那一刻，集体仰头长嚎。", "one_line": "一支南极科考队撤离时被迫留下雪橇犬，它们在极夜中独自求生半年。", "bucket": "action"}, {"id": "1515", "title": "他妈²的藏宝图", "filename": "m1515.html", "year": "2024", "region": "中国香港", "genre": "喜剧 / 动作 / 冒险", "tags": "粗口喜剧, 黑帮, 宝藏争夺, 父子情", "summary": "街头小混混阿强（外号“他妈”）的父亲老马曾是传奇文物贩子。老马去世后，留下一张画满脏话的藏宝图，上面唯一的标记是铜锣湾警署署长办公室。阿强以为父亲是警匪勾结，联合自己的废柴兄弟，制定了一连串啼笑皆非的偷盗计划。他们假扮外卖员、空调修理工，甚至发动“声东击西”的暴动，却屡屡失败。最后，阿强在署长办公室的防弹玻璃夹层里，找到了一个U盘——里面不是宝藏，而是老马年轻时作伪证害死搭档的忏悔录像。老马要儿子把录像交给警方，洗清搭档的冤屈。阿强最终选择“偷”出真相，而不是宝藏。", "one_line": "一个不学无术的古惑仔，发现老爸临终留下的藏宝图，上面的“X”竟然标记在铜锣湾最大的警署里。", "bucket": "comedy"}, {"id": "1516", "title": "大神猴", "filename": "m1516.html", "year": "2024", "region": "中国", "genre": "奇幻 / 动作 / 喜剧", "tags": "孙悟空、另类西游、废柴、逆袭", "summary": "取经成佛后，孙悟空因在天庭醉酒砸了蟠桃会，被玉帝贬下凡间，法力全失，变成普通青年“侯大胜”。他的任务是在人间默默行善，积攒10万点“功德积分”才能重回仙班。于是他成了一名外卖员，因为送外卖是“人间最日常的救急”。他帮独居老人修水管得1分、替被家暴的妻子报警得5分、为白血病孩子捐骨髓得1000分。看着离10万分遥遥无期，他却渐渐不再想回去了。当太白金星下凡问他“功德够了，走不走”时，他正在暴雨里给一个没带伞的女孩送餐，回头说了一句：“等她吃完这一口再说。” 全片以喜剧包裹西游精神的内核：金箍圈可以摘，但责任感摘不掉。", "one_line": "被贬下凡的孙悟空失去所有法力，变成一个外卖员，需要攒够10万功德才能归位。", "bucket": "fantasy"}, {"id": "1517", "title": "桃花朵朵开", "filename": "m1517.html", "year": "2024", "region": "中国大陆", "genre": "喜剧、爱情、家庭", "tags": "过年、相亲、返乡、农村", "summary": "北漂程序员李桃红回南方老家过年，等待她的是父母安排的十场相亲。桃花厌倦了这种模式，决定用自己的专业技能“反击”：她偷偷开发一款名为“桃花运”的APP，可以根据相亲对象的特点，实时在耳机里给出“高情商回复”策略。前面几场相亲非常成功，桃花成了十里八乡的“相亲女神”。但当她遇见回乡创业的养蜂人陈实，AI策略却屡屡失灵——因为陈实完全猜不透。桃花删掉APP，开始用心交流。两人合伙帮村里搞电商卖蜂蜜，桃花也找到了职业新方向。最后APP项目被投资人看中，桃花带着陈实和全村人一起走向数字农业。", "one_line": "春节期间，大龄女程序员被父母逼着相亲，她却只想回家乡开发一款“防催婚APP”。", "bucket": "comedy"}, {"id": "1518", "title": "八公犬物语", "filename": "m1518.html", "year": "1987", "region": "日本", "genre": "剧情/家庭", "tags": "真实改编、忠犬、每日等待、催泪", "summary": "东京帝国大学的上野英三郎教授在涩谷站捡到一只迷路的秋田幼犬，取名“八公”。起初教授并不想养，但女儿千鹤子的坚持与八公每日送教授到车站、傍晚准时接站的习性，让这段关系逐渐无法割舍。八公学会了听脚步声辨别教授的下班列车，甚至成了车站附近小贩和孩童们的共同伙伴。然而在一个寻常的夏日，教授在大学讲台上因脑溢血猝然离世，再也没有走出涩谷站。八公在当晚的暴雨中等到深夜，被教授的妻子托人领走寄养，但它一次次挣脱绳索，穿越半个东京，准时在傍晚五点出现在涩谷站候车口。卖烤红薯的大叔、站员、附近的店主们默默接力喂养它。八公的毛发从油亮变得粗糙，步态从蹦跳变成蹒跚，但那个位置从未空缺。十年后的一个雪夜，八公躺在站台上，在梦里等来了教授的那声“八公”。", "one_line": "大学教授与一只秋田犬的相遇，换来了它此后十年风雨无阻的站台等候。", "bucket": "drama"}, {"id": "1519", "title": "大力水手", "filename": "m1519.html", "year": "2025", "region": "美国", "genre": "喜剧 / 奇幻 / 冒险", "tags": "真人版, 吃菠菜, 经典改编", "summary": "这次大力水手不是英雄，而是一个生活潦倒的水手波派。他 40 岁，失业、秃顶、啤酒肚，女朋友奥利弗跟一个健身房教练跑了。他的“大力”完全是吹牛，连罐头都打不开。一天他在一艘废弃货船上找到了一罐过期 30 年的菠菜罐头，吃了之后腹痛难忍，送医后发现他的基因被突变，力量爆棚但极不稳定：用力过猛会捏碎一切，情绪激动会飞出地球，而且效果只能持续 10 秒，之后就是剧烈虚脱。他被迫卷入一场港口黑帮的阴谋，对方绑架了奥利弗。波派要用这坑爹的“10 秒真男人”能力，在敌人老巢里上演一场断断续续的搞笑营救。", "one_line": "真人版大力水手，不靠菠菜，靠的是中年危机的丧，以及一次意外的基因突变。", "bucket": "comedy"}, {"id": "1520", "title": "一万个丛林夜", "filename": "m1520.html", "year": "2024", "region": "巴西 / 法国", "genre": "冒险 / 剧情 / 悬疑", "tags": "亚马逊, 失踪, 部落传说, 幻觉, 文明冲突", "summary": "人类学家安娜带领科考队进入亚马逊雨林寻找传说中的“无时部落”——据称这个部落生活在一个时间流速异常的区域。三周后，只有安娜一人走出丛林，且已白发苍苍。她的叙述令人震惊：在丛林中，他们经历了整整一万个夜晚（约27年），但外部世界只过了三周。时间流速不同的区域确实存在，但“无时部落”的真相更可怕——那里不是圣地，而是诅咒之地。每一个进入者都会被剥离对时间的感知，永远困在无尽的黑夜循环中。科考队成员一个接一个迷失，有人永远留在了“夜晚”里。安娜之所以逃出，是因为她破解了部落古老的仪式，但代价是——她再也无法辨别现实中的白天与黑夜，永远活在“一万个丛林夜”的幻觉中。", "one_line": "一支科考队在亚马逊雨林失踪，唯一幸存者说他们在丛林里度过了一万个夜晚。", "bucket": "action"}, {"id": "1521", "title": "爱的所有格", "filename": "m1521.html", "year": "2019", "region": "泰国", "genre": "剧情 / 爱情", "tags": "师生恋，伦理，悲剧，文学改编", "summary": "改编自泰国真实案件。17岁男生阿努瓦爱上语文女教师叻达（37岁），叻达起初拒绝，但被阿努瓦的才华打动，两人发生关系。叻达在课堂上教所有格时说：“'My student' 和 'my lover'，区别在于一个‘L’。”全班大笑，只有阿努瓦知道她在说真心话。恋情曝光后，叻达被学校开除，阿努瓦被父母送进寺庙出家。叻达以“诱骗未成年人”罪被判6年，出狱后阿努瓦已成年，两人在咖啡厅重逢，却再也回不去了。叻达说：“当年我用‘my’来爱你，现在你是‘yourself’了。”影片最后一镜，阿努瓦走出咖啡厅，雨停了。", "one_line": "高中男生爱上比自己大二十岁的女教师，她用所有格“my”宣告所有权，却被社会碾碎。", "bucket": "drama"}, {"id": "1522", "title": "喋血僵尸镇", "filename": "m1522.html", "year": "2025", "region": "中国香港", "genre": "恐怖，动作，喜剧", "tags": "僵尸，民国，道长，黑色幽默，封闭空间", "summary": "民国三十三年，中原大旱，溃兵赵大炮带着三个残兵逃荒，误入地图上不存在的“三喜镇”。小镇看似正常，实则每到子时，村民就双眼血红，皮肉溃烂，变成嗜血怪物。赵大炮等人被困在镇中心的三层茶楼，发现镇上唯一的道士“瞎老九”其实是装瞎，他用符咒和糯米勉强压制着尸变。原来三年前一具西洋吸血僵尸逃到此处与本土僵尸结合，感染了全镇水源。幸存者还包括一名懂西医的女学生和当地保长。众人必须在每个夜晚抵挡尸潮，同时找出僵尸母体所在的老井。赵大炮用土制炸药和瞎老九的符咒结合，发明了“燃烧符”，最后一战在鞭炮声与炸药的轰鸣中将老井炸毁，小镇化为火海。", "one_line": "民国末年瘟疫横行，一队散兵误入小镇，发现全镇百姓早已变成只吃活人的僵尸。", "bucket": "horror"}, {"id": "1523", "title": "亲亲婆婆", "filename": "m1523.html", "year": "2025", "region": "中国香港", "genre": "喜剧, 家庭, 都市", "tags": "婆媳关系, 反套路, 催婚, 斗智斗勇", "summary": "豪门婆婆周太是出了名的难搞，儿子带回的每一任女友都被她气走。这次儿子带了独立设计师施诗回家。周太拿出了厚达百页的“好媳妇家规”，从行走坐卧到消费理财无孔不入。施诗非但不生气，反而用设计师的专业能力将周太的旧宅重新改造，让每一处死板的规矩变成空间亮点。周太逐渐从刁难变为欣赏，最终在儿子求婚时亲自送上戒指。在闺蜜聚会上，周太骄傲地说：“别人是娶儿媳，我是招了个合伙人。”", "one_line": "“恶婆婆”想用一百条家规刁难准儿媳，不料准儿媳每一招都接得漂亮，最后婆媳竟成了最佳拍档。", "bucket": "comedy"}, {"id": "1524", "title": "内阁作战室 第一季", "filename": "m1524.html", "year": "2025", "region": "英国", "genre": "政治，惊悚，剧情", "tags": "核危机，决策，官僚，倒计时", "summary": "第一季共六集，采用实时叙事，每一集对应核弹到达前二十分钟。情报显示一枚携带核弹头的导弹从某国潜艇发射，目标伦敦。首相在第一时间被送入地下的“内阁作战室”。真正的危机不是核弹，而是作战室里的决策：首相拒绝签字授权核反击，因为情报可能造假；外交大臣坚持先发制人；国防大臣发现预警卫星数据被人为篡改；内阁秘书则在清理所有敏感文件。随着倒计时逼近，每个人的黑历史被逐一揭开——有人收受过献金，有人情妇在目标区，有人想借机发动政变。最后一分钟，他们终于查到篡改数据的真凶，但导弹已经肉眼可见。", "one_line": "核弹将在两小时后击中伦敦，而内阁作战室里的政客们还在为“谁签字”吵架。", "bucket": "suspense"}, {"id": "1525", "title": "欢迎来到驹田蒸馏所", "filename": "m1525.html", "year": "2024", "region": "日本", "genre": "剧情 / 职场", "tags": "威士忌, 家族企业, 梦想, 传承, 励志", "summary": "在东京广告公司担任高管的驹田健一，因公司重组被裁员。走投无路之下，他回到父亲留下的濒临倒闭的驹田蒸馏所。父亲生前欠债无数，员工只剩三位老人。健一原本打算卖掉土地，却在尝了一口父亲未完成的威士忌原酒后改变主意。他利用广告营销经验，将酿酒过程拍成短视频，意外走红网络。然而，传统酿酒师们拒绝改变工艺，新旧冲突爆发。健一必须在保住家族灵魂与商业求生之间，找到第三条路。", "one_line": "东京精英白领被裁员后，回到老家破败的威士忌蒸馏所，开启一场逆袭与救赎。", "bucket": "drama"}, {"id": "1526", "title": "吞下宇宙的男孩", "filename": "m1526.html", "year": "2019", "region": "澳大利亚", "genre": "剧情, 奇幻", "tags": "成长, 边缘人, 兄弟情, 魔幻现实主义", "summary": "从小患有严重口吃和社交障碍的男孩艾略特，被同学视为怪胎。在他唯一的理解者——哥哥带他看了一场流星雨后的第二天，艾略特惊恐地发现自己在睡梦中“吞”下了一颗坠落的星星。从那以后，他的身体开始发生奇异的变化：他的影子会在月光下自行其是，他能听到植物生长的声音，甚至能“看见”人们话语中飞舞的色彩。艾略特相信这颗星星赋予了他修复破碎世界的能力。他开始用这种奇怪的方式，试图修复父母濒临破裂的婚姻，帮助监狱里的父亲获得假释，并在真实与幻想的边缘，吞下了整个宇宙的孤独与希望。", "one_line": "一个口吃的男孩，坚信自己吞下了一颗星星，从此他的世界变得不再平凡。", "bucket": "drama"}, {"id": "1527", "title": "我的女大佬", "filename": "m1527.html", "year": "2020", "region": "中国香港", "genre": "喜剧, 动作", "tags": "黑帮, 女权, 反转, 江湖", "summary": "香港最大社团“和连胜”的坐馆突然去世，留下遗嘱让从未涉足江湖的儿子阿祖继承。但阿祖是个只想经营好自己小咖啡馆的文艺青年，社团内其他元老虎视眈眈。为了自保，阿祖找到了父亲当年的“秘密武器”——曾是社团第一打女、如今退隐江湖开茶餐厅的“大佬”芬姐。芬姐早已看透江湖事，只想安稳度日。但在阿祖的软磨硬泡和老街坊被欺压的现实下，芬姐重出江湖。她不靠打打杀杀，而是用商业手段和人情世故，把社团当成公司来整顿：搞KPI考核、办团建、开奶茶店转型。在笑料百出的权力游戏中，芬姐教会了阿祖：真正的“大佬”不是靠暴力，而是靠脑子。", "one_line": "社团最怂的太子爷，被迫扶持一位从良的茶餐厅老板娘上位成为新坐馆。", "bucket": "comedy"}, {"id": "1528", "title": "挪亚：灭世启示", "filename": "m1528.html", "year": "2026", "region": "美国", "genre": "灾难/奇幻", "tags": "圣经改编, 大洪水, 方舟, 人性考验", "summary": "本片颠覆了传统的圣经故事。挪亚不仅接到了神谕要建造方舟，还被告知：人类罪恶滔天，大洪水过后，挪亚一家必须绝后，让人类从此消失，只留动物存活。面对怀孕的儿媳、不孕的女儿以及想要抢夺方舟的暴徒，挪亚陷入了巨大的信仰危机。他既要抵御外敌入侵，又要防止家人在船上怀孕。在滔天洪水中，方舟成了一座移动的人性炼狱。挪亚手持匕首，站在即将临盆的儿媳床前，在“服从神谕”与“延续血脉”之间做出了最痛苦的抉择。影片对盲目信仰的反思极具当代意义。", "one_line": "挪亚建造方舟不仅仅是为了躲避大洪水，更是为了阻止人类最后的繁衍，以此净化世界。", "bucket": "fantasy"}, {"id": "1529", "title": "大兽", "filename": "m1529.html", "year": "2026", "region": "日本", "genre": "科幻 / 灾难", "tags": "巨型生物, 末日生存, 亲情羁绊", "summary": "2031年，代号“噬城”的巨型地底生物每七年准时苏醒，吞噬一座千万级人口城市后重新沉睡。退役怪兽分析师高野发现规律：巨兽从不随机选择目标，而是追踪某种特定频率的脑电波。他的女儿小薰所在的避难所，恰好是今年监测到最高匹配度的区域。高野必须在72小时内潜入禁区，用干扰器伪装小薰的信号，但代价是——他自己将成为巨兽唯一的追踪目标。", "one_line": "巨兽每七年醒来一次吞噬一座城市，这次它选中的是男主女儿所在的避难所。", "bucket": "sci-fi"}, {"id": "1530", "title": "活宝警探", "filename": "m1530.html", "year": "2024", "region": "香港", "genre": "喜剧, 动作, 警匪", "tags": "乌龙搭档, 功夫喜剧, 单元破案, 无厘头", "summary": "油尖旺扫黄组警员马德钟，是警校有名的“笑面虎”——他破案全靠一张嘴，能用传统相声的“说学逗唱”套取线人情报。新调来的督察方小柔是个社恐IT天才，她认为一切犯罪都能用大数据模型预测。当连环妓女凶杀案发生，两人的理念水火不容。马德钟要按江湖规矩“请茶”问话，方小柔却黑掉了整个麻将馆的监控。在追查一个代号“龟公”的神秘皮条客时，两人意外被锁在一艘走私船里，被迫用莫尔斯码敲击船舱壁吵架，却意外引来了海警。最终他们发现，凶手竟是警校的战术教官，而破案的关键既不是相声也不是代码，而是一盘二十年前的相声磁带里暗藏的机密。", "one_line": "一位精通传统相声的警员与一位只会讲科技犯罪的宅女督察组成了史上最不靠谱的扫黄组。", "bucket": "comedy"}, {"id": "1531", "title": "几近天堂", "filename": "m1531.html", "year": "202
