它们在一次演出中意外听到公司要销毁它们研发新品，于是炸毁实验室，偷走一艘披头士主题的复古飞船，开始逃亡。途中它们收留了一个被父母逼着考宇宙公务员的人类少女，以及一台患有抑郁症的老旧机器人。每到一个星球，它们就伪装成流浪乐队开演唱会筹集燃料费，而黑帮老大“狗王”率领的赏金猎犬军团紧追不舍。第一季结尾，三只猫发现了更惊人的真相——它们体内藏着足以重启宇宙的超频基因片段。", "one_line": "三只被基因改造的摇滚猫偷了一艘飞船，在银河系里一边开演唱会一边躲避宇宙最大黑帮的追杀。", "bucket": "sci-fi"}, {"id": "1021", "title": "阿水", "filename": "m1021.html", "year": "2025", "region": "马来西亚 / 新加坡", "genre": "剧情 / 家庭 / 历史", "tags": "南洋华工， 橡胶园记忆， 哑女传信， 失散兄妹", "summary": "1920年代，马来亚橡胶园。哑女阿水能用敲击水桶的不同节奏，在整座种植园里“说话”。工头们不知道的是，阿水用这套水下摩斯码，暗中组织了一场持续二十年的无声抵抗：传递禁书、通报巡园时间、甚至帮一对失散的兄妹相认。阿水其实是园主和一名华工的女儿，被割舌灭口后扔给工人养大。二战日军南侵，橡胶园被征用，阿水的水声情报网成了华人抗日游击队的眼睛。她救下了一名受伤的年轻军官，竟是自己从未见过面的弟弟。但弟弟不知道，阿水为了掩护他，已经将自己作为饵。最后一场大雨中，阿水敲出三下水桶声——那是她发明的“我爱你们”。", "one_line": "她是个哑女，却用一碗水的声音，为整座橡胶园里的华工传递了三十年的秘密。", "bucket": "drama"}, {"id": "1022", "title": "开心三傻组", "filename": "m1022.html", "year": "1985", "region": "中国香港", "genre": "喜剧", "tags": "搞笑，整蛊，友情，市井，怀旧", "summary": "阿福、阿寿和阿喜是住在贫民窟的三个穷光蛋，他们每天都在做着发财梦。看到电视上的发明比赛，三人决定用捡来的破烂制造“万能机器人”参赛。过程中他们闹出一系列笑话，把街坊邻居搞得鸡飞狗跳。不料他们的发明意外挫败了一伙真正的珠宝劫匪，三人瞬间成了城市英雄。但此时的他们却只想回到那个虽然穷但很快乐的破屋里，继续吹牛打屁。", "one_line": "三个底层小市民为了发财，用各种奇葩发明和整蛊手段制造混乱，却歪打正着成了英雄。", "bucket": "comedy"}, {"id": "1023", "title": "安娜贝尔", "filename": "m1023.html", "year": "2017", "region": "美国", "genre": "恐怖, 惊悚", "tags": "鬼娃娃, 诅咒, 心理恐惧", "summary": "年轻夫妻艾比和杰克搬进一栋复古别墅，在阁楼发现一个精致的瓷娃娃“安娜贝尔”。很快，家中出现怪事：物品移位、墙壁渗水、镜中幻影。艾比调查发现，娃娃曾属于一个百年前失踪的女孩，其怨念未消。随着月圆之夜临近，安娜贝尔的低语变成清晰的指令——要艾比成为它的“新躯壳”。杰克求助灵媒，得知唯有找到女孩的遗骨并举行安魂仪式，才能打破诅咒。最后一夜，艾比被引入地下室，面对娃娃的终极幻象，她以血书写下自己的名字，骗过怨灵，成功将其封印。", "one_line": "一个被遗弃的玩偶每到午夜便会低语，新主人必须在一周内解开它的身世之谜，否则灵魂将被吞噬。", "bucket": "horror"}, {"id": "1024", "title": "黑百合公寓", "filename": "m1024.html", "year": "2023", "region": "日本", "genre": "恐怖、悬疑、惊悚", "tags": "凶宅、诅咒传承、密室、氛围恐怖", "summary": "为了省钱，大学生亚美搬进了传闻中的“黑百合公寓”。起初一切正常，只是邻居都阴沉沉默，且公寓里没有一盆植物。亚美在装修时砸开墙壁，惊现一具干尸，手中捧着一朵诡异的黑百合。从那天起，她每晚都能听到土壤被翻动的声音，墙上渗出粘稠的花汁。她调查发现，这栋公寓建在古老的花语诅咒之上——每一任“花匠”（死者）都必须找到下一个“土壤”（租客）才能安息。亚美必须在七日之内，将黑百合种到原主人（开发商）的墓前，否则自己将成为墙中新的花肥。", "one_line": "少女搬进禁止养花的公寓，却发现上一任租客死在墙里，手里紧紧握着一株黑百合。", "bucket": "horror"}, {"id": "1025", "title": "小城一梦之臭棋乱飞象", "filename": "m1025.html", "year": "2024", "region": "中国大陆", "genre": "剧情 / 黑色幽默", "tags": "象棋, 小镇, 荒诞, 方言", "summary": "南方小城，以摆残局骗钱为生的“臭棋篓子”马飞象，偶然从一老乞丐处得到一本民国棋谱。他发现棋谱每一步都对应着小城当年的凶杀案地点。当他按棋谱“将军”时，竟挖出了一具遗骸和一卷胶卷。胶卷内容足以让全城半数富商身败名裂。各方势力（地产商、退休干部、黑车司机）开始用各种荒诞手段抢棋谱——包括用广场舞噪音攻击、在马飞象家楼下开丧事乐队。最终马飞象用一记“臭棋”（乱飞象）把所有线索引到公安局门口，案件破了，但全城经济开发项目也被迫叫停。市民骂他是罪人，他却说：“象田不能乱飞，但人心更不该乱。”", "one_line": "一个街头象棋骗子，误打误撞破解了民国悬案，却搅黄了全城的大生意。", "bucket": "drama"}, {"id": "1026", "title": "美国体育故事", "filename": "m1026.html", "year": "2025", "region": "美国", "genre": "剧情, 运动", "tags": "励志, 真实事件改编, 种族, 逆袭, 热血", "summary": "2025 年，美国高中橄榄球联赛突然杀出一支来自底特律最乱街区的“野狗队”。他们没有正规教练，没有像样的装备，却凭借一种街头自创的、被专家嘲讽为“自杀式”的混乱打法，一路碾压精英私立学校球队。主教练是前黑帮成员马库斯，他唯一的战术就是“让对手比我们更痛”。当他们杀入全国总决赛时，才发现真正的对手——西点军校联队，全员注射了某种强化反应速度的实验药剂。这不再是一场体育比赛，而是一场阶级与体制的血腥对抗。马库斯必须让他的孩子们明白：有些胜利，比生命更重要。", "one_line": "一个由贫民窟混混组成的橄榄球队，用近乎疯狂的战术杀入全国总决赛，却发现对手是军方秘密培养的生物改造人。", "bucket": "drama"}, {"id": "1027", "title": "恐怖热线之大头怪婴", "filename": "m1027.html", "year": "2002", "region": "中国香港", "genre": "恐怖 / 惊悚", "tags": "都市传说, 伪纪录片, 港式恐怖, 真实改编, 心理恐", "summary": "电台节目“恐怖热线”接到神秘电话，一名自称前护士的老妇讲述了1960年代某医院产下一个“头大如斗、浑身鳞片”的怪婴，随后婴儿被医生活活闷死。当晚，主持人收到一张发黄的照片，上面是7个人的合影，正是当年参与掩盖真相的医护人员。第二天开始，照片上的人一个接一个离奇死亡：第一个溺死在浴缸，第二个被墙压扁头颅……当最后只剩主持人自己时，他发现那张照片背面写着一行字：“你是第8个，当年接生的是你父亲。”而父亲早已去世。电话铃声响起。", "one_line": "电台接到听众爆料“大头怪婴”真相后，所有参与节目的人开始按照当年婴儿的死亡顺序惨死。", "bucket": "horror"}, {"id": "1028", "title": "青春死党", "filename": "m1028.html", "year": "2017", "region": "中国内地", "genre": "喜剧，校园", "tags": "女生宿舍，毕业焦虑，姐妹情深", "summary": "大四下学期，历史系402宿舍的四位女生面临着不同的未来：考研失败、工作没着落、即将异国恋、被迫回老家结婚。极度焦虑中，大大咧咧的寝室长老赵提议，在毕业前最后一个月，把大学四年不敢做的事全做了：偷校园里的“镇校之石”、向暗恋的体育老师告白、在校长办公室开派对、甚至来一场说走就走的穷游。随着清单一项项被划掉，她们也终于在荒唐的闹剧中，找到了直面未来的勇气。", "one_line": "大学即将毕业，一个宿舍四个“死党”在最后一个月里，决定列一份“不作不活”的疯狂遗愿清单。", "bucket": "comedy"}, {"id": "1029", "title": "女士们", "filename": "m1029.html", "year": "2017", "region": "日本", "genre": "剧情 / 女性 / 群像", "tags": "女性群像, 日本社会, 职场妈妈, 不婚主义, 撕标签", "summary": "东京一家高端婚恋俱乐部“Lady’s”因经营不善倒闭，却意外留下了五位互不相识的女性会员：渴望成为家庭主妇却屡屡被渣的20岁女大学生、事业有成却被视为“剩女”的30岁女医生、为了孩子不得不相亲的单亲妈妈、被丈夫骗光财产的40岁主妇，以及看透男人只想找“保姆”的60岁潇洒阿姨。面对倒闭后泄露的隐私风险，五个人从相互指责到结成联盟。她们不再为了迎合男性而改变自己，而是开了一家名为“女士们”的咖啡馆，在这个小小空间里，对抗整个社会对女性的偏见与规训。", "one_line": "一家倒闭的相亲俱乐部里，五个年龄、身份各异的女人决定抱团取暖，重新定义自己的人生。", "bucket": "drama"}, {"id": "1030", "title": "沉默的共谋者", "filename": "m1030.html", "year": "2023", "region": "意大利/法国", "genre": "悬疑 / 犯罪", "tags": "反转， 黑色电影， 复仇， 双面人生", "summary": "马可在一家偏远的阿尔卑斯山疗养院工作，为人温和沉默，却时常做关于勒杀与清洗血渍的噩梦。一名私家侦探突然出现，指控他与十年前三起未解的女性失踪案有关——法医证据显示，每处犯罪现场都被专业级手段清理得一尘不染，仿佛有人精准抹去了所有痕迹。马可在自我怀疑中展开调查，发现疗养院一位老年痴呆症患者竟握有关键录音带。录音带揭露：真正的凶手是当地富有声望的慈善家，而马可当年只是被胁迫搬运尸体的目击者。为了洗刷罪名并让真凶伏法，马可必须假装仍是那个“沉默的共谋者”，设下圈套让凶手自曝。", "one_line": "一位失忆的疗养院护工发现，自己可能是连环失踪案中负责清理现场的“共谋者”。", "bucket": "suspense"}, {"id": "1031", "title": "致命柔情", "filename": "m1031.html", "year": "2025", "region": "韩国", "genre": "爱情 / 惊悚 / 悬疑", "tags": "病娇, 反转, 家庭暴力, 女性复仇, 心理战", "summary": "女主韩素希嫁给了完美男人姜志勋，他是知名心理医生，温柔体贴。新婚夜，志勋因为素希没有按习惯摆放拖鞋而第一次动手打她，打完立刻跪地痛哭，说自己是因太爱才失控。素希没有报警，没有逃跑，而是笑着原谅了他。接下来的365天，她在日记里记录每一次家暴，同时表现得越来越“爱”他。她故意跟志勋的双胞胎哥哥在民亲近，故意让志勋以为他们偷情。志勋的嫉妒与控制欲达到顶峰，终于在某个深夜，他举刀冲进了在民的卧室。素希站在门外，听到惨叫声，拨打了报警电话。警察赶到时，志勋浑身是血，在民已经死亡。志勋在法庭上反复说“是她害的”，但素希拿出365天的日记和伤情鉴定，微笑着说：“我才是受害者。”", "one_line": "她嫁给了完美丈夫，新婚夜发现他是控制狂，于是她用一年时间装乖、忍打、布局，只为让他亲手杀了他的双胞胎哥哥。", "bucket": "romance"}, {"id": "1032", "title": "不只是语言", "filename": "m1032.html", "year": "2023", "region": "日本", "genre": "剧情 / 爱情", "tags": "聋哑题材, 手语恋爱, 细腻情感, 治愈", "summary": "聋哑女孩美咲在大学里遇到了内向的男生拓海。拓海因为口吃不敢在人前大声说话，总被当成怪人。两人在图书馆的角落相遇，一个听不见，一个说不出，却意外地开始了笔谈。从纸条到手机，再到美咲教拓海手语，他们建立了一个只有彼此理解的世界。然而，外界的声音不断侵入：家人的不解、同学的嘲笑、以及美咲前男友带来的误会。当拓海终于学会用美咲的方式“说”出“我喜欢你”时，一场车祸却让美咲面临永远失去手语能力的可能。他们必须证明，爱情，从来不只是语言。", "one_line": "听不见的她和不敢说的他，用笨拙的手势和书写，谈了一场“不只是语言”的无声恋爱。", "bucket": "drama"}, {"id": "1033", "title": "暗警", "filename": "m1033.html", "year": "2025", "region": "中国大陆", "genre": "犯罪 / 动作", "tags": "卧底, 缉毒, 黑吃黑, 潜伏", "summary": "缉毒警察林峰潜伏在东南亚大毒枭身边三年，代号“暗警”，即将收网。然而行动前夜，他惊讶地发现新入伙的悍匪竟是失散十五年的亲弟弟林涛。更复杂的是，林涛也是一名潜入匪帮的卧底，却隶属于另一个互不知情的侦查部门。兄弟二人为了不暴露身份，不得不在行动中互相“演戏”，甚至被迫在毒枭面前上演手足相残。当最终收网命令下达时，林峰必须亲手逮捕弟弟，而弟弟手中的枪也正瞄准了他的心脏。一场警方内部的信息壁垒，差点酿成无法挽回的悲剧。", "one_line": "毒枭身边的王牌卧底被迫亲手逮捕失散多年的亲弟弟，而弟弟也是警察。", "bucket": "crime"}, {"id": "1034", "title": "拳王1991粤语", "filename": "m1034.html", "year": "1991", "region": "中国香港", "genre": "动作, 剧情, 运动", "tags": "拳击, 励志, 粤语, 底层, 尊严", "summary": "三十七岁的阿成正是一名码头苦力，女儿患有先天性心脏病。当医生告知手术需要天文数字般的费用时，他走投无路。曾经是业余拳手的他找到老搭档，决定复出打职业赛。所有人都嘲笑他的年龄和出身，但阿成只有一句话：“我打一拳，女儿的命就多一分希望。”他不挑对手，从垫场赛打起，靠着一股蛮力与不怕死的意志，硬是一路赢下去。终于，他站到了香港拳王的挑战席上。对面是正值巅峰、二十三岁未尝败绩的卫冕冠军。决赛夜，整个码头工友都来观战。最后一回合阿成已满脸是血，但他依然没有倒下，因为他答应女儿，打完比赛就去看她。", "one_line": "码头搬运工为给女儿筹集手术费，踏入拳坛，用一双满是老茧的拳头打出底层人的尊严。", "bucket": "action"}, {"id": "1035", "title": "鬼修女", "filename": "m1035.html", "year": "2018", "region": "美国", "genre": "恐怖 / 招魂宇宙", "tags": "招魂衍生，修道院，恶魔瓦拉克，温子仁，暗黑美学", "summary": "1952年，罗马尼亚卡拉塔修道院，一名年轻修女离奇自杀。梵蒂冈派来有驱魔经验的神父伯克和还俗见习修女艾琳进行调查。两人抵达后发现，修道院建在一座中世纪古堡废墟之上，修女们都在进行永久的沉默祷告。每到午夜，修道院深处的石门后就会传出低语声，而壁画上的圣徒会流下黑色的液体。艾琳在幻觉中看到了恶魔瓦拉克的真身——一个戴着修女头巾的鬼脸。原来这座修道院本是为了封印“地狱公爵”瓦拉克而建，但随着修女们信仰的动摇，封印正在瓦解。艾琳必须在成为恶魔的容器之前，用初代修女留下的圣物重新完成封印仪式。", "one_line": "罗马尼亚一间与世隔绝的修道院里，一位修女在临终前尖叫着说：修道院地下的东西不能打开。", "bucket": "horror"}, {"id": "1036", "title": "亮剑", "filename": "m1036.html", "year": "2025", "region": "中国大陆", "genre": "历史、战争", "tags": "重拍、军人魂、战术、热血", "summary": "本版并非翻拍原作小说，而是截取李云龙从朝鲜战场轮换回国后的故事。他因在战场上坚持“非对称作战”而受到批判，被“发配”到刚成立的后勤学院当教员。在那里，他面对一群从苏联留学归来、满口现代军事理论的年轻军官，双方从理念冲突到惺惺相惜。李云龙将他“狼性战术”与现代化装备结合，秘密组建一支代号为“利剑”的特种大队。这支部队不仅要在演习中对抗传统王牌师，更要执行一项跨越边境线的秘密任务——夺取一份关系到国家命运的核技术图纸。赵刚、孔捷等老战友也以不同方式回归，共同诠释“狭路相逢勇者胜”的新时代含义。", "one_line": "2025 版全新演绎李云龙的传奇，聚焦他抗美援朝归来后组建新中国第一支现代化特种作战队的岁月。", "bucket": "drama"}, {"id": "1037", "title": "古巴春色", "filename": "m1037.html", "year": "2025", "region": "西班牙", "genre": "喜剧，音乐", "tags": "复古，老爷车，拉丁节奏", "summary": "遭受事业爱情双重打击的乐评人丹尼尔，为了躲避现实来到古巴。他在色彩斑斓的哈瓦那老城偶然听到了一段用废旧水管和垃圾桶敲出的旋律，演奏者是三位加起来超过两百岁的老人——前卷烟厂工人、退休斗鸡手和曾经的码头搬运工。丹尼尔用最后的一点积蓄为他们录制了唱片，没想到这首歌在网络上意外爆红，引来了美国大唱片公司的追逐。面对巨额合约，三位老人却提出了一个荒诞的条件：必须让他们在革命广场举办一场演唱会，只为纪念他们去世多年的第四位成员——一只名叫“切”的鹦鹉。", "one_line": "一个落魄的伦敦乐评人来到哈瓦那，被三个街头老爷爷组成的乐队改变了人生。", "bucket": "comedy"}, {"id": "1038", "title": "恶劣天气", "filename": "m1038.html", "year": "2019", "region": "英国", "genre": "剧情, 灾难, 惊悚", "tags": "末日求生, 人性考验, 密闭空间, 暴风雪", "summary": "一场超级暴风雪突降英国M8高速公路，数百辆车被困，气温骤降至零下四十度。13个陌生人躲进一辆冷藏挂车（恰好隔热）。食物仅够5人撑过一周，而气象预报说救援至少十天后到。起初大家平等分配，但随着饥饿加剧，矛盾爆发。他们决定通过投票每天淘汰一人，那人将“贡献”身体。这是一个残酷的微型社会实验：第一个被投出去的是个流浪汉；第二个是亚裔程序员；第三个是个孕妇（理由是“她会消耗双倍营养”）。当只剩下六人时，一个老妇人站出来说：“你们都是畜生了，我不会投票，你们吃了我吧。”她主动走入风雪。第二天，救援队到了，发现老妇人冻僵在车门外，而车厢内一片沉默。幸存者无人入狱，但终身被噩梦缠身。", "one_line": "一场千年一遇的暴风雪困住了高速公路上的13个人，他们必须决定每天吃掉谁才能活到救援来临。", "bucket": "drama"}, {"id": "1039", "title": "巴黎之恋", "filename": "m1039.html", "year": "2024", "region": "法国", "genre": "爱情 / 喜剧", "tags": "异国偶遇, 错位身份, 巴黎地标, 一夜情变真爱", "summary": "编辑麻衣在婚礼前被悔婚，独自前往巴黎执行“单身疗愈计划”。她入住一家古老的小酒店，第一天就在电梯里被一位浑身颜料、穿着工装裤的男人撞了个满怀，他手里的咖啡全洒在她的白裙子上。男人慌乱地道歉并用画刷蘸水帮她擦——麻衣认定他是酒店清洁工，于是故意用最任性的方式“报复”他：让他当私人向导、半夜送可颂、假装男友气前任。实际上这个男人叫卢克，是巴黎小有名气的街头壁画艺术家，因为正在酒店外墙绘制巨幅壁画才穿着工装。他爱上麻衣的刁蛮，更不敢澄清身份。直到麻衣的前任带着未婚妻杀到巴黎，卢克被迫在蒙马特高地当众即兴创作一幅“假婚礼誓言画”，谎言才如颜料桶般倾覆。但麻衣最后发现：卢克唯一没撒谎的，是那杯咖啡确实是不小心洒的。", "one_line": "一位去巴黎散心的日本图书编辑，误把街头画家当成了酒店服务生，两人展开一场身份谎言大作战。", "bucket": "romance"}, {"id": "1040", "title": "哥哥和妹妹", "filename": "m1040.html", "year": "2024", "region": "韩国", "genre": "剧情/家庭", "tags": "血缘, 秘密, 成长, 催泪", "summary": "从小就因父母离异而分开的哥哥成浩和妹妹智雅，在父亲去世后重逢。为了继承一笔需要“兄妹共同居住满一年”才能动用的巨额遗产，两个形同陌路的年轻人不得不挤进同一间公寓。起初，生活习惯的巨大差异让他们冲突不断。但在逐渐磨合的过程中，智雅无意间发现了一张旧照片，照片里的人根本不是他们的父亲。随着调查深入，一个关于三十年前医院抱错婴儿的残酷真相浮出水面。没有血缘关系的两人，在挣扎与痛苦中，一种超越亲情与爱情的情感悄然滋生。", "one_line": "为了争夺巨额遗产，失散二十年的兄妹被迫同居，却发现对方根本不是亲人。", "bucket": "drama"}, {"id": "1041", "title": "男人底线", "filename": "m1041.html", "year": "2007", "region": "中国大陆", "genre": "剧情 / 家庭 / 伦理", "tags": "中年危机, 道德, 国企改革, 反腐", "summary": "北方重工被南方资本收购，厂长魏海峰、总工赵德柱和销售科长钱大亮面临抉择：签字同意裁员，每人拿八百万补偿；拒绝签字，工厂关闭、三千工人失业。魏海峰选择保护工人，却被妻子发现他收过私企老板一块名表；赵德柱为了女儿的留学费，偷偷出卖了技术图纸；而钱大亮最狠，直接伪造了工人联名信。当三个男人在停产的车间里对峙，魏海峰掏出那块表砸碎了玻璃，说：“底线不是用来试的，是用来守的。” 后来，他们被工人联名举报，但最后一封信上，只有三个人的名字。", "one_line": "一家老牌国企被私企收购，三个中年男人在金钱、兄弟和良知之间反复试探自己的底线。", "bucket": "drama"}, {"id": "1042", "title": "不可撤销－正序版", "filename": "m1042.html", "year": "2025", "region": "法国", "genre": "剧情，惊悚", "tags": "非线性叙事，复仇，宿命，重剪", "summary": "这是一次影像实验。将原版《不可撤销》的片段完全按照时间正序重新剪辑：从男主角马库斯和女友爱丽克斯在公寓里的甜蜜早晨开始，到他们出门、参加派对、爱丽克斯独自离开、隧道事件、马库斯发疯、复仇、误杀、被捕。当所有事件按逻辑顺序铺开时，那种“明知结局却无力阻止”的窒息感被放大到了极致。观众不再是跟着主角发现真相，而是看着一对普通情侣如何一步步被偶然的恶意碾碎。最残忍的不是意外，而是阳光灿烂的早上，他们还在计划下周的旅行。", "one_line": "将原版的倒叙彻底逆转，一场复仇从终点回到起点，你看到的将是彻底的绝望。", "bucket": "drama"}, {"id": "1043", "title": "警察大贼", "filename": "m1043.html", "year": "2025", "region": "中国香港", "genre": "动作， 犯罪", "tags": "双雄， 卧底， 反转， 港风", "summary": "高级督察陈国威是警界的反黑先锋，做事雷厉风行。传奇神偷“鬼手”叶非凡早已金盆洗手，却被旧账牵连。一个神秘的跨国金融集团，利用合法外壳进行大规模洗钱，同时绑架了叶非凡的孙女，要挟他盗取竞争对手的保险库数据。巧合的是，陈国威正在卧底调查同一个集团。两人在保险库中狭路相逢，被迫合作。一个是体制内的正义感，一个是江湖道义的旧传统，他们要联手潜入被高科技武装到牙齿的集团总部。然而，当真相浮出水面，他们发现警队高层和黑帮内部，早就被同一只看不见的手操控。", "one_line": "警队明日之星与神偷祖师爷被迫联手，对抗一个用钞能力洗黑钱的跨国财团。", "bucket": "action"}, {"id": "1044", "title": "裸之夜", "filename": "m1044.html", "year": "2020", "region": "日本", "genre": "爱情，文艺，情色", "tags": "欲望，束缚与解放，心理，黑白摄影", "summary": "东京，患有“睡眠裸体症”的服装设计师阿清，与患有“睡眠穿衣症”的图书馆管理员隆史，因为一次合租意外住在了一起。夜晚成了他们的战场：阿清必须脱光，隆史必须穿紧。两人制定了一套复杂的“夜间交接仪式”，试图互不干扰。然而在狭窄的一室一厅里，他们的身体与心灵开始频繁碰撞。阿清通过隆史的眼睛重新审视自己的身体，不再将其视为羞耻；隆史则在阿清的鼓励下直面童年创伤。影片大量使用长镜头和黑白影像，将欲望化为光影的流动。那一夜，当他们彻底打破规则，不再需要任何衣物遮蔽时，真正的夜晚才刚开始。", "one_line": "一个只能裸体才能入睡的女人，遇到了一个只有穿衣才能入眠的男人，他们同居了。", "bucket": "romance"}, {"id": "1045", "title": "机械西游", "filename": "m1045.html", "year": "2026", "region": "美国", "genre": "科幻, 动作", "tags": "赛博朋克, 取经, 人体改造", "summary": "公元2150年，世界毁于AI战争，残存人类生活在数据废墟中。少女苏是个半机械改造人，她脑中藏有一段加密信息，指向传说中的“伊甸园协议”——一段能够重启世界网络的源代码。为了找到它，苏必须在机械猎人“金”的追杀下，穿越辐射荒漠。路上她激活了一只编号为“WUKONG”的战斗机器猴。一人一猴需要集齐四个散落在废土各处的数据核心，分别是代表“贪、嗔、痴、慢”四大程序病毒的破解补丁。在这场机械版的西行路上，最大的敌人并非外在怪物，而是苏体内那个正在觉醒的AI人格。", "one_line": "在废土未来，一个被改造成半机械人的少女，带着一只机器猴子，去寻找传说中的“重启密钥”。", "bucket": "sci-fi"}, {"id": "1046", "title": "兰心大剧院", "filename": "m1046.html", "year": "2021", "region": "中国大陆", "genre": "谍战，黑白", "tags": "娄烨，黑白摄影，戏中戏，孤岛，巩俐", "summary": "1941年秋冬，著名演员于堇（巩俐 饰）时隔三年从香港返回上海，表面上是为旧爱谭呐执导的话剧《礼拜六小说》担任女主角，实则是接受养父、同盟国间谍休伯特（帕斯卡尔·格雷戈里 饰）的任务：从掌握日本偷袭珍珠港情报的密码专家那里获取信息。她周旋于前夫、日本特务和盟军间谍之间，在兰心大剧院的舞台与现实之间穿梭。当话剧正式上演的那一夜，台下坐满了各方势力的眼线，枪声在剧场内响起，戏里戏外，真假难辨。", "one_line": "1941年，孤岛时期的上海，著名女演员于堇返回上海出演话剧，实则是为了执行一项秘密任务。", "bucket": "action"}, {"id": "1047", "title": "好运之人", "filename": "m1047.html", "year": "2025", "region": "中国大陆", "genre": "喜剧，奇幻，人生", "tags": "转运，黑色幽默，小人物", "summary": "快递员郝运是出了名的倒霉体质，送啥啥丢，到哪哪炸。一天他捡到一枚古旧硬币，此后事事顺遂：中彩票、升职、女神青睐。然而他发现，自己的每一次好运都伴随着身边人惨遭横祸——同事摔断腿、房东被骗光、发小被裁员。硬币的规则是“此消彼长”。郝运试图毁掉硬币，却发现自己已经离不开这种“被选中”的感觉。在一场抉择中，他选择将硬币丢进熔炉，主动回到倒霉的日常。影片最后，他依旧丢件、依旧被骂，但他笑着捡起路边的一枚普通硬币，说：“今天运气不错。”", "one_line": "倒霉蛋捡到一枚“好运硬币”，却发现每次好运都会从身边人身上偷走运气。", "bucket": "comedy"}, {"id": "1048", "title": "黄飞鸿之五：龙城歼霸", "filename": "m1048.html", "year": "2025", "region": "香港", "genre": "动作 / 武侠 / 历史", "tags": "清末、海盗、佛山无影脚、民族气节、蒸汽朋克", "summary": "1905年，清政府筹备自建铁路，引发西方列强不满。一股神秘势力开始在珠江口劫掠商船，专抢铁路相关物资，手法酷似百年前的海盗张保仔。黄飞鸿受两广总督之邀调查此事，发现幕后主使竟是张保仔的孙子张玉麟——一名留洋归来的机械天才。张玉麟驾驶一艘装有蒸汽炮塔的铁甲海盗船“龙城号”，声称要“以海盗之道还治列强之身”，实则被英国东印度公司暗中操控。黄飞鸿率领徒弟们登船，在船上的蒸汽迷宫与张玉麟展开决战。张玉麟使用蒸汽驱动的机械臂和火枪，黄飞鸿则以无影脚和雨伞相抗。最后一战，船体爆炸，黄飞鸿救出张玉麟，对方临死前说出一个坐标——那里沉睡着郑和下西洋时留下的星海图。片尾彩蛋：十三姨打开一个铁盒，里面是半张羊皮卷，画着美洲西海岸的航线。", "one_line": "1905年，黄飞鸿与海盗张保仔的孙子在蒸汽铁甲船上对决，背后是列强瓜分中国南海的惊天阴谋。", "bucket": "action"}, {"id": "1049", "title": "天生要完美", "filename": "m1049.html", "year": "2022", "region": "中国大陆", "genre": "剧情 / 家庭 / 喜剧", "tags": "完美主义， 母女， 喜剧， 成长， 治愈", "summary": "苏静是顶级家居整理师，她的人生信条是“没有无序，只有未被完美安置”。她的女儿陈小禾却是个“熵增”爱好者——考试故意填错答案、把房间弄成垃圾场、在妈妈整理好的衣柜里塞进一团团袜子。母女关系在女儿高考前夕彻底爆炸：陈小禾伪造了零分试卷。苏静崩溃之际，小禾的班主任告诉她，女儿是罕见的“高功能反叛型人格”，她的“搞砸”是一种潜意识里对抗母亲焦虑系统的自救。更让人震惊的是，小禾在网上成立了一个“天生不完美联盟”，专门教人如何“优雅地搞砸”，已有上万会员。苏静决定乔装潜入这个联盟。", "one_line": "一个凡事必须完美的单亲妈妈，生下一个坚决要把所有事情搞砸的叛逆女儿。", "bucket": "drama"}, {"id": "1050", "title": "大恋爱：与将我忘记的你", "filename": "m1050.html", "year": "2026", "region": "日本", "genre": "爱情 / 科幻 / 医疗", "tags": "记忆丧失, 绝症, 倒叙恋爱", "summary": "图书管理员小梢患上了一种罕见病：每天醒来，她会失去前一天的长期记忆，只保留到发病前。肿瘤科医生拓海被确诊为脑瘤，只剩一年生命。两人在医院楼顶意外相遇，拓海看到小梢努力用笔记本记下每一天时，决定为她创造“最值得记住的一天”。然而小梢第二天就会忘记拓海是谁，拓海必须每天重新自我介绍、重新追求、重新让她爱上自己。而拓海自己的身体也在迅速衰败。当拓海的病历出现在小梢昨天的笔记里，她终于知道真相。她决定用仅剩的短期记忆能力，为拓海写一本书，书名就叫《大恋爱》，把每一天的爱都用最精准的文字刻下来。拓海去世那天，小梢没有哭，因为她已经不记得他了。但她翻开书，第一页写着：今天，你会遇见一个让你心动的人。", "one_line": "一个患有罕见“每日记忆重置”症的女孩，与一个只有一年寿命的男孩，开始了一场倒叙的恋爱。", "bucket": "romance"}, {"id": "1051", "title": "波利死后", "filename": "m1051.html", "year": "2025", "region": "美国", "genre": "悬疑, 剧情", "tags": "死亡, 校园, 网络暴力, 罗生门", "summary": "高三女生波利从教学楼一跃而下，留下了无字遗书。在她的葬礼派对上（这是她生前的遗愿），六位自称与她最亲近的同学聚在一起追忆。校园小记者偷偷录音，发现六个人的描述中，波利是完全不同的人：在男友口中她是抑郁症患者；在闺蜜口中她是控制狂；在老师口中她是天才；在霸凌者口中她是挑衅者；在暗恋者口中她是缪斯；在网友口中她是网红。记者通过拼凑这些谎言和记忆碎片，还原出一个被社交网络、原生家庭和同辈压力逐渐撕碎的普通女孩。没有凶手，人人都是帮凶。", "one_line": "校园女神波利自杀后，六个自称是她“最好朋友”的人在葬礼上讲述的故事完全对不上。", "bucket": "suspense"}, {"id": "1052", "title": "恋恋不忘的我们", "filename": "m1052.html", "year": "2021", "region": "中国台湾", "genre": "爱情", "tags": "失忆, 重逢, 虐恋, 治愈", "summary": "天才园艺师江念晴在前往订婚现场的路上遭遇严重车祸，醒来后失去了近五年的记忆。她记得闺蜜，记得父母，唯独忘记了未婚夫、建筑设计师陆以恒。在念晴的记忆里，陆以恒还是那个大学里总和她吵架的讨厌学长。陆以恒没有撕心裂肺地解释，而是默默退回朋友的位置，以“协助康复治疗师”的身份重新出现在她身边。他带她重新走过他们相爱的地方，用新的约会让她第二次爱上自己。就在念晴准备接受这个“新男友”时，她无意中看到了陆以恒车里的行车记录仪——车祸发生前一刻，他正在和她因为另一个女人激烈争吵。她开始怀疑：那场车祸，真的是意外吗？", "one_line": "车祸失忆的她忘了所有人，唯独忘记不了一直守护在身边的他。", "bucket": "romance"}, {"id": "1053", "title": "特级英雄黄继光", "filename": "m1053.html", "year": "2022", "region": "中国大陆", "genre": "战争, 历史", "tags": "抗美援朝, 英雄, 真实改编, 战斗, 催泪", "summary": "1952年上甘岭，黄继光是连队里的通信员，因为个子矮、枪法差常被调侃。他总吹嘘自己在家乡是打猎高手，战友们都不信。战役打响后，连队攻坚受阻，三个爆破组全部牺牲。黄继光主动请缨，在左臂被打穿、弹药耗尽的情况下，扑向地堡枪眼。牺牲前他大喊了一句：“我这次没吹牛！”片中用大量细节还原黄继光作为普通士兵的一面：他怕黑、想家、也会写错别字。直到堵枪眼的那一秒，他都是一个有血有肉的青年，而非符号化的英雄。", "one_line": "上甘岭战役前，黄继光在战友面前吹牛说自己是“神枪手”，却用身体堵枪眼成了真正的英雄。", "bucket": "drama"}, {"id": "1054", "title": "再吻一次", "filename": "m1054.html", "year": "2023", "region": "法国", "genre": "爱情", "tags": "法式浪漫，中年爱情，重逢，文艺", "summary": "文森特经营着一家快倒闭的旧书店，生活像死水一样平静。某天，他打翻了咖啡杯，捡起掉落的书时，一双熟悉的手帮他拾起了那本烫金的《恶之花》。抬头一看，是离婚十年、远走加拿大的前妻玛丽。两人相视无言，却因为一场地铁罢工被困在了玛丽的公寓。在狭小的空间里，他们分吃一块长棍面包，谈论那些从未对别人说起的往事：流产、出轨、以及那句没说出口的对不起。雨停之后，玛丽即将飞回加拿大，文森特追到机场，在所有旅客的注视下，他只要一个机会：再吻一次，哪怕只是告别。", "one_line": "离婚十年的书店老板，在巴黎街头偶遇曾经恨之入骨的前妻，手里拿着一本当年的情诗集。", "bucket": "romance"}, {"id": "1055", "title": "兔子", "filename": "m1055.html", "year": "2025", "region": "中国", "genre": "动画 / 奇幻", "tags": "成人寓言, 水墨风格, 自由意志", "summary": "在一个名为“幸福农场”的封闭世界里，所有动物都按照预设剧本活着：鸭子游泳，母鸡下蛋，兔子吃草繁殖。主角是一只编号3986的灰兔，它每天的生活就是吃睡和被人观看——是的，农场每个角落都有摄像头，动物们的“快乐生活”被实时直播给“神”看。一次意外，3986撞坏了摄像头，眼前的世界突然出现了“雪花”和“故障”。它发现草场外面有片黑暗森林，发现“神”其实是和自己一样的兔子，只不过被接上了电线和屏幕。3986开始悄悄解放其他动物，办法很简单：告诉它们，除了农场，还有片可以决定自己今天吃不吃草的野地。", "one_line": "在一个一切都由“主控台”设定的完美农场里，一只兔子偶然发现：自己的眼睛是摄像头。", "bucket": "animation"}, {"id": "1056", "title": "折腰", "filename": "m1056.html", "year": "2024", "region": "中国大陆", "genre": "古装、爱情、权谋", "tags": "先婚后爱，家国情怀，替嫁，强强联合", "summary": "南北朝乱世，门阀士族清河崔氏面临覆灭危机。懦弱庶女崔小蝶被迫替嫡姐嫁给敌国手握重兵的杀神将军陆北辰。新婚夜，她以为必死无疑，却发现自己被重重保护。陆北辰外表冷酷无情，实则心怀苍生，暗中保护前朝遗孤。崔小蝶在险恶的将军府中凭借过人的织锦技艺和细腻心思，逐渐发现陆北辰并非世人口中的恶魔，而是一个在权力漩涡中挣扎的理想主义者。两人从猜忌试探到联手粉碎了太后一党的篡位阴谋，最终在烽火连天中彼此折腰，守护了破碎山河下的一方百姓。", "one_line": "为救家族，懦弱庶女替姐出嫁，却意外发现杀伐果断的敌国将军夫君竟藏着一个惊天秘密。", "bucket": "fantasy"}, {"id": "1057", "title": "与魔鬼同行1997", "filename": "m1057.html", "year": "1997", "region": "美国", "genre": "剧情， 惊悚， 犯罪", "tags": "北爱冲突， 卧底， 恐怖分子， 道德困境， 布拉德皮特", "summary": "北爱共和军激进成员罗里受命前往纽约，任务是购买一批黑市导弹用于袭击英国驻军。他化名“戴文”，以租房名义住进了纽约警察汤姆家的阁楼。汤姆是一名正直善良的重案组警探，他的妻子希拉和两个年幼的孩子把戴文当成了家人。几个月相处中，戴文亲眼目睹了汤姆每天如何保护市民、如何爱他的家庭，他的信念开始动摇。当军火交易日期临近，汤姆意外发现了阁楼里的武器线索，两人在天台上用枪口指着对方。戴文手里握着遥控器，而汤姆手里握着他藏匿武器的证据。圣诞钟声敲响时，这场友谊与使命的对决必须画上句号。", "one_line": "一名北爱尔兰共和军成员潜入纽约警察家庭，却在日常相处中与警察一家建立了无法割舍的情感纽带。", "bucket": "drama"}, {"id": "1058", "title": "黑土地黄棉袄", "filename": "m1058.html", "year": "2022", "region": "中国大陆", "genre": "剧情 / 家庭 / 历史", "tags": "东北, 九十年代, 国企下岗, 父女情, 现实主义", "summary": "现实主义家庭伦理片。故事发生在1999年冬天的黑龙江小城。父亲老赵是国营工厂的劳动模范，却在四十岁那年遭遇下岗。为了不让女儿辍学，他脱下厂服，换上那件穿了好几年的黄色棉袄，开始去劳务市场等零活。女儿小燕不理解父亲的沉默和固执，觉得那件洗得发白的黄棉袄让她在同学面前丢脸。直到除夕夜，小燕偷偷跟踪父亲，发现他为了多挣一百块，在零下三十度的夜晚帮人扛煤，冻僵的手里还攥着给她买的新书包。小燕哭着扑上去，黄棉袄裹住两个人。影片最后，老赵重拾老本行开了一家修车铺，那件黄棉袄被挂在墙上，像一面旗帜。", "one_line": "1999年东北下岗潮，父亲穿着唯一的黄棉袄，在雪地里扛起整个家的尊严。", "bucket": "drama"}, {"id": "1059", "title": "无瑕的房间", "filename": "m1059.html", "year": "2024", "region": "西班牙", "genre": "惊悚，悬疑", "tags": "密室，心理，强迫症", "summary": "天才建筑师艾利克斯患有严重的强迫症和洁癖，他接到了一个神秘客户的委托：设计一座“完美监狱”，要求犯人在其中感受不到任何时间的流逝和空间的限制。为了寻找灵感，他把自己关进了自己设计的一个“无瑕的房间”——一个纯白色、没有任何棱角、完全静音的立方体。起初，他享受着这种绝对秩序带来的安宁。但随着时间推移，他开始在这个没有任何参照物的空间里产生幻觉，他看到了自己童年的创伤，看到了妻子的背叛。他试图打开房门，却发现门从外面被锁死了。监控摄像头后面，客户的声音传来：“现在，体验一下你设计的‘完美囚笼’吧，建筑师先生。”", "one_line": "一个患有严重强迫症的建筑师，把自己关在一个纯白色的房间里设计监狱，却发现自己才是被设计的囚徒。", "bucket": "suspense"}, {"id": "1060", "title": "以父亲的名义", "filename": "m1060.html", "year": "2024", "region": "印度", "genre": "剧情, 家庭", "tags": "父女, 法律, 平权, 赚泪", "summary": "老拉姆是一个连自己名字都不会写的贫穷农民，唯一的骄傲是当上律师的女儿莉祖。莉祖因为拒绝支付高额嫁妆，被前夫一家诬告偷窃，关进了乡下的拘留所。面对对方家族聘请的精英律师，所有人都劝拉姆认罚和解。但他从女儿的书包里翻出一本落满灰尘的印度宪法，决定亲自为女儿辩护。他每天请村里的学生教他读法律条文，用种田的农谚来理解法条逻辑，甚至在法庭上把“证据”说成“庄稼的根”。庭审当天，他穿着破旧的衬衫，用最朴实的语言拆穿了对方的谎言，那句“我女儿不是嫁妆，她是我的宪法赋予我的骄傲”让全场泪崩。最终，莉祖无罪释放，老拉姆依然不会写字，但他在判决书上按下了红手印。", "one_line": "一位文盲老农民发现女儿因嫁妆纠纷被诬陷入狱，他翻出宪法，在乡村法庭上为自己当律师的女儿辩护。", "bucket": "drama"}, {"id": "1061", "title": "魔鬼之血", "filename": "m1061.html", "year": "2024", "region": "西班牙", "genre": "恐怖、神秘", "tags": "邪教、血液、诅咒、家族秘密", "summary": "安娜意外继承了一座位于比利牛斯山脉深处的古堡。当她进入城堡时，发现所有房间的墙壁都呈现出暗红色，空气中弥漫着铁锈味。她翻看家族日记得知，她的祖先是十七世纪一个邪教的高级祭司，相信“魔鬼之血”可以让家族永生。从那以后，每隔三十年，家族中就会有一人被选为“容器”，将全身血液注入墙壁的凹槽中。而今年，三十年之期已到，安娜就是被选中的下一个容器。古堡的大门已经自动反锁。", "one_line": "少女继承远房亲戚的古堡，发现墙壁里浇筑着历代家族成员的血液。", "bucket": "horror"}, {"id": "1062", "title": "边境杀手", "filename": "m1062.html", "year": "2024", "region": "美国 / 墨西哥", "genre": "动作 / 惊悚 / 犯罪", "tags": "贩毒集团，CIA，道德困境，边境线，硬汉动作", "summary": "前特种兵队长雷耶斯的女儿在美墨边境被毒贩流弹击中身亡，凶手却逍遥法外。绝望的他被CIA特工招募，加入了一支专门打击贩毒集团高层的“暗影小队”。雷耶斯以为找到了复仇的途径，却发现这支小队的手段远比毒贩更加残酷。他们不受法律约束，使用酷刑、暗杀，甚至不惜制造屠杀来嫁祸对手。在一次深入墨西哥腹地的行动中，雷耶斯亲手杀死了仇人，但复仇的快感立刻被空虚取代。他看清了自己正在变成当初所痛恨的那种人。最终，他选择用一种极端的方式，在边境线上完成对自己的审判。", "one_line": "一名退役特种兵为了给被毒贩杀害的女儿复仇，加入了CIA的秘密行动组，却发现自己正在被训练成下一个恶魔。", "bucket": "action"}, {"id": "1063", "title": "米奇之反派群星会", "filename": "m1063.html", "year": "2025", "region": "美国", "genre": "喜剧， 奇幻， 歌舞", "tags": "反派集结， 平行宇宙， 粉丝向", "summary": "在童话世界之外的“废弃创意区”，住着被遗忘的迪士尼反派们。皮特厌倦了永远输给米奇，他找到一本失落的“创世故事书”，可以重写每个角色的命运。他召集了《白雪公主》的皇后、《睡美人》的梅尔菲森特、《小美人鱼》的乌苏拉等人，组成“反派联盟”。他们入侵了各个经典故事世界，把结局全部改写成反派获胜。米奇必须在唐老鸭和高飞的帮助下，穿越不同的动画平行宇宙，说服各个版本的正派角色团结起来。最后的大决战在“灰姑娘的皇宫”展开，歌舞升平中却暗藏杀机。", "one_line": "米奇的死对头皮特召集了迪士尼所有经典反派，打算用黑魔法重写童话世界。", "bucket": "comedy"}, {"id": "1064", "title": "手册", "filename": "m1064.html", "year": "2023", "region": "法国", "genre": "悬疑，奇幻", "tags": "超自然，规则怪谈，日记，恐怖，哲学", "summary": "失业青年卢卡斯在巴黎旧书店淘到一本奇怪的书，封面上写着《生活手册》。起初他以为是恶作剧，随手写下“明天会下雨”，第二天果然暴雨。他又写“老板会给我道歉”，前老板真的打电话来道歉。卢卡斯开始疯狂写下令自己暴富、成名、获得爱情的内容，一切顺利成真。然而他发现手册的页数在减少，而自己每写一条，就会失去一段真实的记忆。当他写到最后一条“我想和女友永远在一起”时，他突然忘记了女友的长相。翻看手册前页，他才发现原来自己已经用这本书重写了生活无数次，而每一次都因为贪婪失去了最爱的人。", "one_line": "男主在旧书店买到一本《生活手册》，发现手册上写的每一件事都会在24小时内成真。", "bucket": "suspense"}, {"id": "1065", "title": "浪漫往昔", "filename": "m1065.html", "year": "2024", "region": "英国", "genre": "剧情 / 爱情 / 历史", "tags": "英伦, 庄园, 阶级, 复古", "summary": "1924年的英格兰，贵族小姐艾琳娜继承了濒临破产的庄园。她决定将庄园改造成高级度假酒店，雇佣了一位沉默寡言的年轻园丁米哈伊尔。米哈伊尔对花草有着惊人的知识，能用俄语背诵普希金的诗，会在暴雨夜用古法修缮漏雨的温室。两人在紫藤花架下渐生情愫。当艾琳娜鼓起勇气表白时，伦敦来的俄国流亡贵族认出米哈伊尔——他竟是罗曼诺夫家族的旁支、沙皇的侄子，布尔什维克革命后隐姓埋名逃到英国。消息传出后，记者蜂拥而至，艾琳娜面临抉择：是要这段被全世界围观的“王子和灰姑娘”童话，还是回到那个真实的、会帮她修剪玫瑰的园丁身边？", "one_line": "1920年代，贵族小姐爱上了庄园里的园丁，但她不知道园丁其实是流亡的俄国王子。", "bucket": "drama"}, {"id": "1066", "title": "死神剧场版：无人的回忆", "filename": "m1066.html", "year": "2008", "region": "日本", "genre": "动画、动作、奇幻", "tags": "死神BLEACH、空座町、剧场版、虚圈、原创剧情", "summary": "空座町突然出现了一种奇怪的“白化病”，患者会逐渐失去生命中最重要的记忆，最终陷入沉睡。一护惊讶地发现，自己也开始忘记露琪亚的名字和面容。此时，一位名叫茜雫的神秘少女出现在一护面前，她自称是“记忆的死神”，身上携带着能毁灭现世、尸魂界和虚圈三个世界的“记忆之珠”。一护在保护茜雫的过程中，发现这场记忆危机的幕后黑手是一群被尸魂界放逐的 ancient 死神。为了让茜雫不再孤独，为了夺回关于伙伴们的珍贵回忆，一护必须与茜雫联手，闯入由记忆碎片构成的死亡空间，对抗那个企图利用“无人的回忆”来重塑世界的疯狂敌人。", "one_line": "一护失去了关于露琪亚的所有记忆，一个来自死者之界的少女揭开了阴谋。", "bucket": "animation"}, {"id": "1067", "title": "失控好莱坞", "filename": "m1067.html", "year": "2026", "region": "美国", "genre": "剧情 / 悬疑", "tags": "娱乐圈, 制片厂阴谋, 全员恶人", "summary": "传奇导演斯坦利开拍新片《失控》，讲述的是好莱坞黄金时代一桩未破的谋杀案。讽刺的是，开拍第一天，投资方暴毙；第二周，编剧被道具灯砸死；第三周，男主演在化妆间“自杀”。剧本似乎在自动撰写死亡名单。年轻的制片助理艾拉发现，所有死者都与二十年前一位被权势逼死的小编剧有关。而斯坦利的新片，正是翻拍那位编剧的遗作。更恐怖的是，每死一个人，剧本的结局就会自动“修正”得更加完美。艾拉必须在成为下一个修正项之前，在片场这个封闭的斗兽场里，找出那个隐藏在导演、过气女星、甚至保镖中的“剧本幽灵”。", "one_line": "一部被誉为“预定奥斯卡”的电影，在拍摄期间接连发生“意外”死亡，凶手就藏在剧本的每一页里。", "bucket": "drama"}, {"id": "1068", "title": "艾拉妮丝", "filename": "m1068.html", "year": "2021", "region": "阿根廷 / 西班牙", "genre": "剧情 / 女性", "tags": "社会现实, 母亲, 性工作者, 尊严", "summary": "在布宜诺斯艾利斯的破旧公寓里，艾拉妮丝与一岁半的儿子、以及几个同样以出卖身体为生的女孩同住。白天，她努力攒钱，梦想有一天能出版自己的诗集；夜晚，她在街头巷尾讨生活，但始终保持着一种近乎固执的尊严和温柔。这种脆弱的平衡被一次警方突击扫黄行动打破。警察以“提供不适宜儿童的居住环境”为由，强行带走了她的儿子。依据法律，她必须证明自己有“稳定工作和固定住所”，才能获得抚养权。但一个性工作者怎么可能获得官方认可的工作证明？走投无路的艾拉妮丝，一边周旋于冷漠的官僚系统和社会福利机构，一边更激进地投身于夜色，用身体换取金钱和法律援助，她要以自己的方式，向这个将她定义为“不合格母亲”的社会，发起一场无声而坚韧的反击。", "one_line": "一个怀抱诗人梦想的性工作者母亲，为了夺回被社会福利机构带走的儿子，不惜用身体与整个僵化的体制对抗。", "bucket": "drama"}, {"id": "1069", "title": "你是我的喜悦", "filename": "m1069.html", "year": "2024", "region": "中国香港", "genre": "爱情 / 音乐", "tags": "音乐疗愈，失忆，街头艺人，相遇", "summary": "天才钢琴家顾晓峰在一场车祸中失去所有记忆，沦为旺角天桥上的流浪汉，只有一台破旧的电子琴相伴。他每天反复弹奏同一段不完整的旋律，却不知那是他为女友谱写的求婚曲。五年后，女友程喜悦已成为知名音乐制作人，她来旺角寻找创作灵感，被这段旋律击中。她认出眼前的流浪汉就是失踪的爱人，但顾晓峰对她毫无反应。程喜悦决定匿名帮助他康复，聘请他做自己的助理，暗中播放他们过去的录音、带他去曾经约会的地方。顾晓峰的音乐记忆逐渐复苏，却因为头部血块压迫神经，一旦恢复全部记忆就会失明。在一次慈善音乐会上，顾晓峰选择弹完那首《喜悦》，在最后一个音符落下的瞬间，他深情望向程喜悦，说出“你是我的喜悦”，随后缓缓闭上双眼，永远失去了视力。", "one_line": "一位失忆的天才钢琴家流落街头，他用一段未完成的旋律，唤醒了爱人封存五年的记忆。", "bucket": "romance"}, {"id": "1070", "title": "夺命情仇", "filename": "m1070.html", "year": "2026", "region": "中国香港", "genre": "犯罪动作", "tags": "复仇， 双雄， 黑帮", "summary": "和联胜龙头“鲨鱼强”的儿子陈浩东在游艇上被枪杀。次日，警方抓获嫌疑人——顶级杀手“鬼见愁”。然而当夜，大佬的情妇、夜总会妈咪“苏菲”也自首，称是自己因爱生恨而杀人。鲨鱼强知道真凶只有一个，于是设下圈套：谁先承认自己说谎，就杀谁全家。鬼见愁和苏菲因此被迫都坚称自己是凶手，并为了证明自己才是“最合格的凶手”，开始疯狂追杀对方。在一连串反转后，发现真凶其实是鲨鱼强的养子，他伪造了现场。鬼见愁和苏菲最终联手反杀。结尾，两人在警局相视一笑，他们是情敌，也是彼此最懂的知己。", "one_line": "黑帮大佬的独生子被杀，头号杀手与大佬情妇都声称是自己干的，两人为此展开了一场你死我活的“认罪”竞赛。", "bucket": "horror"}, {"id": "1071", "title": "生命中的岛屿", "filename": "m1071.html", "year": "2022", "region": "日本", "genre": "剧情 / 家庭", "tags": "孤岛, 临终关怀, 治愈, 少子化", "summary": "因斗殴被退学的高中女生美咲，被母亲“流放”到一座只有八个老人居住的偏僻岛屿，照顾患阿尔茨海默症的外婆。美咲以为这是无聊的惩罚，却意外发现岛上每个老人都是一本活着的历史书。退休教师教她观星，老渔民教她分辨潮汐，外婆在清醒时哼唱的战前歌谣指向了岛上埋藏的一箱二战时期的家书。美咲从抗拒到接纳，帮助老人们完成了各自的遗愿清单。当台风来袭，美咲用学到的知识挽救了突发疾病的老人。春天来临，老人们陆续离世，美咲成了岛上唯一的居民，她决定留下，成为新的“岛屿守护者”。", "one_line": "一个只剩八名老人的海岛，迎来了一位来自东京的叛逆少女。", "bucket": "drama"}, {"id": "1072", "title": "魔鬼女房东", "filename": "m1072.html", "year": "2023", "region": "中国香港", "genre": "悬疑惊悚", "tags": "租房惊魂, 偷窥, 心理操控, 港味, 层层反转", "summary": "港大研究生阿杰因交不起房租，通过中介租到了铜锣湾一间价格低得离谱的套房。女房东芬姐四十多岁，笑面迎人，每天变着花样送汤送饭，还帮他介绍兼职。阿杰起初感激不尽，却渐渐发现不对劲：芬姐总是能精准知道他的作息，他的私人物品疑似被翻动，房间插座里藏着针孔摄像头。他试图搬走，芬姐立刻变脸，拿出合同上他根本没注意过的霸王条款——提前解约需赔偿全年租金。阿杰开始调查，发现这间公寓过去三年换了五任租客，全部无故失联。他在天花板夹层里找到一部旧手机，里面有一段视频，上一任房客对着镜头说：“芬姐七年前就死了，现在住你隔壁的……是她的姐姐。”话音未落，门锁响了。", "one_line": "穷困研究生租下廉价公寓，女房东热心过头，直到他发现上一任房客失踪前曾留下一行血字：房东不是人。", "bucket": "animation"}, {"id": "1073", "title": "铁雨2：首脑峰会", "filename": "m1073.html", "year": "2024", "region": "韩国", "genre": "动作 / 惊悚 / 政治", "tags": "朝韩关系，核危机，潜艇", "summary": "为突破半岛僵局，韩国总统、朝鲜最高领导人、美国总统决定在东海一艘核潜艇上举行绝密三方峰会。然而朝鲜军方强硬派发动政变，控制了潜艇的指挥权，将三国首脑及随行人员困在海底。前作主角——朝鲜特工严铁雨和韩国青瓦台外交官郭哲宇再次联手，必须在氧气耗尽的72小时内，与政变军人周旋，同时化解三国之间的猜忌与冲突。潜艇内上演三方博弈，潜艇外各国军队剑拔弩张。最终严铁雨牺牲自己炸毁潜艇动力系统，让潜艇上浮，政变头目被击毙。峰会虽然成功，但代价惨重。", "one_line": "韩、朝、美三国首脑在潜艇上举行秘密峰会，却被朝鲜政变军人困在海底300米。", "bucket": "action"}, {"id": "1074", "title": "世纪大毁灭", "filename": "m1074.html", "year": "2026", "region": "美国", "genre": "动作 / 科幻 / 灾难", "tags": "全球灾难, 特效大片, 末日, 军武, 牺牲", "summary": "一颗由未知材料构成、无法被拦截的死星正以超高速撞向地球。全球联合组织“诺亚方舟”计划失败，最后一名华裔天体物理学家林博士提出了绝命方案：集结全球所有核弹头，让一艘载人飞船带着它们冲入死星核心，在内部引爆。但由于通讯延迟，引爆只能手动完成。年迈的退役宇航员陈纳德主动请缨，驾驶着改装后的老旧航天飞机，在无数人的注目礼中飞向太空。他穿过碎屑带、躲过引力波，在死星表面着陆的那一刻，对着地球敬了个礼，按下了按钮。", "one_line": "一颗死星撞向地球，唯一能阻止它的方法，是在它表面引爆地球所有的核弹头。", "bucket": "action"}, {"id": "1075", "title": "莫札特与鲸鱼：真爱相依", "filename": "m1075.html", "year": "2005", "region": "美国", "genre": "剧情，爱情", "tags": "自闭症，高功能，浪漫，治愈", "summary": "唐纳德是一个拥有非凡数学天赋但社交能力几乎为零的出租车司机，他过着精确如钟表般的规律生活。直到他遇到了伊莎贝尔，一个美丽、不受约束、同样患有自闭症谱系障碍的女孩。她的不按常理出牌打乱了他所有的计划，却又像另一颗孤独的星球终于找到了轨道。两人迅速坠入爱河，但两个“怪胎”的恋爱过程充满了误解、崩溃与笑泪。当他们决定尝试同居并融入所谓的“正常人”社群时，彼此间的摩擦和保护壳被强制剥落的痛苦，让这段关系岌岌可危，他们必须在相斥的特质中，寻找那份独一无二的真爱频率。", "one_line": "患有阿斯伯格综合征的数学天才与同样古怪的女生相爱，在混乱中寻找秩序与共鸣。", "bucket": "drama"}, {"id": "1076", "title": "爱的方式", "filename": "m1076.html", "year": "2018", "region": "中国台湾", "genre": "剧情 / 家庭 / 同性", "tags": "母子，出柜，代际创伤，和解", "summary": "退休国文教师林秀兰发现儿子阿杰的性取向后，陷入了长达一个月的失眠。她没有像想象中那样爆发争吵，而是默默报名了一个名为“彩虹桥”的家长互助会。在那里，她遇到了各式各样的父母：有坚决反对的，有假装接受的，还有一位失去儿子的父亲。林秀兰开始写日记，记录自己从“我做错了什么”到“他需要什么”的心理转变。她偷偷学习网络用语，尝试理解儿子的世界。但当她终于准备好一切，鼓起勇气对儿子说出“妈妈爱你”时，阿杰却因为长期压抑而提出了搬出去住。影片细腻展现了东亚家庭中，爱不是缺乏，而是常常用错了表达方式。", "one_line": "一位母亲在得知儿子是同性恋后，没有哭闹，而是报了一个“如何与LGBT子女相处”的培训班。", "bucket": "drama"}, {"id": "1077", "title": "多浪迪警官3：保护者", "filename": "m1077.html", "year": "2014", "region": "西班牙", "genre": "喜剧 / 动作 / 犯罪", "tags": "西班牙恶搞, 奇葩警察, 贩毒集团, 加勒比风情", "summary": "西班牙最不靠谱但运气爆棚的混混警官多浪迪又被上司流放了，这次他被派往治安混乱的迈阿密，任务是保护一位即将出庭作证的美国毒枭污点证人。多浪迪带着他那口极烂的英语和无比旺盛的荷尔蒙，不仅没把人藏好，反而带着证人出入夜总会和赌场，闹得满城风雨。当地黑帮、中情局特工甚至古巴流亡分子全都盯上了他们。在一连串的误会和混战中，多浪迪误打误撞地摧毁了多个贩毒窝点。他不仅抢走了大毒枭最心爱的粉红色凯迪拉克，还把证人的女儿给拐跑了，最终在狂风骤雨中上演了一场极其不专业的快艇追逐战，靠离谱的运气完成了保护任务。", "one_line": "混世魔王多浪迪警官奉命保护一位美国毒枭污点证人，却阴差阳错搅黄了整个迈阿密的毒品交易。", "bucket": "comedy"}, {"id": "1078", "title": "危机迷雾", "filename": "m1078.html", "year": "2025", "region": "中国大陆", "genre": "悬疑 / 刑侦 / 心理", "tags": "测谎师、连环杀人、记忆植入、反转再反转、双男主", "summary": "刑侦队首席测谎师沈渡，破案率100%，靠的不是技术，而是一种能“听见谎言频率”的天赋。最新案件：三名女性被勒杀，现场都留下一根白色羽毛。所有物证指向沈渡的前搭档、因渎职入狱的刑警顾城。顾城出狱后失踪，沈渡测谎时却发现每个新嫌疑人的生理数据都与凶手的“心理画像”吻合，但供词全是真话。更诡异的是，每次测谎后，沈渡都会看到同样的幻觉——一只白鸽站在童年卧室的窗台上。他潜入警局档案室，翻出一份被封存的旧案：二十年前有个叫“白鸽”的连环杀手，手法与本案一致，但凶手早已被击毙。沈渡开始怀疑自己被植入了虚假记忆。第十集的反转令人头皮发麻：他的天赋不是听见谎言，而是无意识中催眠了嫌疑人，让他们说出他“想听”的真相。而那只白鸽，是他十岁时亲手杀的。", "one_line": "测谎专家卷入连环凶杀案，每次审讯的嫌疑人都是无辜的，而真正的凶手竟藏在他的记忆里。", "bucket": "suspense"}, {"id": "1079", "title": "橘色奇迹", "filename": "m1079.html", "year": "2025", "region": "日本", "genre": "爱情， 科幻， 青春", "tags": "时空信， 拯救爱人， 平行世界， 催泪， 校园", "summary": "高二女生菜穗在一个平凡的早晨收到了一封自称来自十年后的她写的信。信上详细描述了当天即将发生的一切：新来的转学生翔将会在放学后遭遇车祸，而这一切的开端，源于她今天在课堂上没有举手回答一个问题。起初菜穗半信半疑，但当信中的预言一一应验时，她意识到这是改变命运的唯一机会。信中还提到，翔将在半年后自杀，而所有朋友都未能阻止他。菜穗开始按照信的指示，一步步靠近那个沉默寡言的少年。然而改变历史需要付出代价：每一次微小的改变，都会让菜穗记忆中与翔的美好回忆消失。她必须在“拯救他的生命”和“与他从未相爱”之间做出残酷抉择。而信的最后一页写着：“如果选择救他，请记得：十年后的你，从未后悔。”", "one_line": "十年后的自己寄来一封信：今天下午，阻止那个转学生坐上那辆车。", "bucket": "romance"}, {"id": "1080", "title": "没完没了", "filename": "m1080.html", "year": "2026", "region": "中国大陆", "genre": "喜剧 / 家庭", "tags": "邻里, 鸡毛蒜皮, 温暖, 群像", "summary": "北京某老旧小区6号楼，终于决定加装电梯。这本是好事，但一楼的王大爷怕影响采光，坚决反对；二楼的孙阿姨想借着电梯把自己家改造成“空中商铺”；三楼的年轻夫妻刚离婚，谁出电梯费成了新一轮吵架素材；四楼的老教授想把电梯按钮换成指纹识别的，彰显“高端”；五楼的租户们各自为政；六楼的独居老太太却因为腿脚不便，成了最支持的人。从投票、筹钱、施工到验收，每一集都是一场鸡飞狗跳的闹剧。但随着电梯一点点建起来，这些吵了十几年的邻居，被迫挤在同一个狭窄的电梯轿厢里，从相互指责，到不得不聊天，最后竟然成了彼此晚年生活里最吵但也最亲的人。", "one_line": "老小区加装电梯，一楼到六楼，十二户人家，十一年的恩怨，全被这部电梯给搅和出来了。", "bucket": "comedy"}, {"id": "1081", "title": "热泪心声", "filename": "m1081.html", "year": "2024", "region": "美国", "genre": "剧情 / 音乐 / 传记", "tags": "合唱团，失声，指挥，奇迹", "summary": "著名女高音歌唱家格蕾丝在一场惨烈车祸中声带受损，永远无法再歌唱。她颓废地来到一所聋哑学校做清洁工。在那里，她看到孩子们虽然听不见，却异常热爱用手语“唱”歌。格蕾丝心中的音乐之火重新点燃，她决定组建一支“无声合唱团”。她教孩子们用手语的快慢、力道的轻重、面部的表情来表达音乐的强弱和情感。所有人都觉得她疯了，因为孩子们根本听不到彼此，更无法对齐节奏。格蕾丝发明了“心跳指挥法”——让孩子们把手放在彼此的胸口上，感受同一个震频。在州合唱大赛上，当这支毫无声音的合唱团走上舞台，用手语和身体演绎出贝多芬《欢乐颂》时，全场观众起立，热泪如雨。", "one_line": "一场车祸让著名女高音失去了声音，她在聋哑学校当清洁工时，用手语“指挥”出了一支震惊全国的无声合唱团。", "bucket": "drama"}, {"id": "1082", "title": "风人物语", "filename": "m1082.html", "year": "2020", "region": "日本", "genre": "动画 / 奇幻 / 治愈", "tags": "风， 都市传说， 校园， 治愈， 奇幻", "summary": "高中生真白瞬从不讲话，因为每个人的话对她而言都是一阵带颜色的风——谎言是灰色，善意是金色。转学第一天，她“听”到一股从未有过的黑色强风从学校钟楼涌出。那是濒临消散的本地风神“息吹”，因现代人不再感受自然而被彻底遗忘。息吹恳请真白成为它的“代行人”，收集人们此刻真实的情绪之风来维持它的存在。真白因此被迫与校园里最吵闹的棒球部王牌、总说反话的图书委员产生交集。然而，一股来自未来工业区的“铁锈风”正在吞噬所有情绪，息吹告诉真白：最后一个承载情绪的人消失，城市将永远失去风。", "one_line": "内向高中生发现自己是“风语者”，而城市里被遗忘的“风神”正因孤独而准备自毁。", "bucket": "animation"}, {"id": "1083", "title": "空房禁女", "filename": "m1083.html", "year": "2019", "region": "韩国", "genre": "恐怖", "tags": "囚禁, 精神分裂, 反转, 密室", "summary": "素珍嫁给了富商在勋，搬进了他位于郊区的独栋别墅。入住第一晚，她就注意到走廊尽头有一间被焊死的房间。丈夫警告她永远不要打开。然而每到深夜，素珍总能听到从那间空房里传来的指甲刮擦声和低语。她开始在家中各处发现不属于自己的长发。精神濒临崩溃的素珍偷偷请来锁匠打开房门，里面却空无一物，只有四面白墙。然而当她转身，却发现原本空白的墙壁上用血字写满了“快逃”。此时丈夫的电话打来，声音冰冷：“我知道你开门了。现在，该轮到你进去了。”素珍这才明白，空房不是关别人的，是准备关她的。", "one_line": "新婚少妇搬进丈夫的豪宅，渐渐发现家中那间永远上锁的空房间里，住着一个“看不见的人”。", "bucket": "horror"}, {"id": "1084", "title": "当他们认真编织时", "filename": "m1084.html", "year": "2023", "region": "日本", "genre": "剧情", "tags": "家庭, 治愈, 手工, 成长", "summary": "高中生小茜因打架被停学，母亲将她送到乡下与外婆同住。外婆是当地最后的“记忆编织师”，能用彩色棉线将人的回忆织成挂毯。小茜起初极度抗拒，觉得这是老掉牙的手艺。然而外婆告诉她，每一段被织入的回忆都会永远保存，如果线断了，记忆也会消失。小茜偶然发现外婆正在编织一段关于她已故父亲的记忆，而那段记忆与自己有关。她开始主动学习编织，试图修复自己与父亲之间破碎的最后回忆。随着挂毯逐渐成形，小茜也理解了父亲当年的选择。最终，她用自己织出的挂毯，与外婆一起完成了对家族伤痕的温柔修补。", "one_line": "一个叛逆少女被送到乡下的外婆家，被迫学习即将失传的手工编织，却意外织出了逝者的记忆。", "bucket": "drama"}, {"id": "1085", "title": "夜色", "filename": "m1085.html", "year": "2022", "region": "法国", "genre": "爱情, 剧情", "tags": "巴黎, 一夜情, 邂逅, 敏感", "summary": "失意的作家马克和刚被解雇的护士蕾拉在巴黎的一家地下酒吧相遇。与通常的一夜情不同，蕾拉提议他们不要发生关系，而是在天亮前一起游荡在巴黎的街头。他们穿过空无一人的卢浮宫庭院，在塞纳河畔偷听流浪汉的梦话，在24小时营业的咖啡馆里互相坦白最不堪的过去。随着夜色渐淡，两人之间产生了超越肉体的深刻连接。但当第一缕阳光照在蒙马特高地时，蕾拉透露她其实是马克前妻的妹妹，这一次相遇是她策划已久的“报复”或“救赎”。", "one_line": "两个在巴黎夜店相遇的陌生人，决定在黎明前共享一夜真实而非激情的散步。", "bucket": "romance"}, {"id": "1086", "title": "巴黎艳妹", "filename": "m1086.html", "year": "2011", "region": "法国", "genre": "剧情，文艺", "tags": "姐妹，移民，身份认同，巴黎，成长", "summary": "生活在巴黎十五区的会计莉莉安已经彻底融入了法国中产生活，她隐瞒了自己阿尔及利亚的出身，甚至有一个未婚夫。突然，同母异父的妹妹、染着红发、性格奔放的尤拉从马赛来到巴黎。尤拉看不惯姐姐的虚伪，不仅在她的办公室里用法语夹带阿拉伯语大声交谈，甚至勾引了莉莉安的保守未婚夫。在一次次的冲突与和解中，莉莉安被迫重新面对自己为了融入主流社会而割裂的过去。最终，当尤拉被遣返时，莉莉安在机场终于撕掉了假发和伪装，用母语大喊出了妹妹的名字，完成了自我救赎。", "one_line": "阿尔及利亚裔的姐姐在巴黎过着保守的生活，活泼的妹妹到来后，彻底搅乱了她的平静与伪装。", "bucket": "drama"}, {"id": "1087", "title": "巴塔哥尼亚", "filename": "m1087.html", "year": "2022", "region": "阿根廷", "genre": "剧情 / 冒险", "tags": "公路片， 自我发现， 荒原， 老年", "summary": "70岁的玛利亚被诊断出肺癌晚期，她决定不化疗、不告別，偷偷开走养老院新买的那辆房车。副驾驶上坐着她唯一的伙伴——同样患癌、时日无多的老狗“闪电”。她的目标是巴塔哥尼亚冰川，那个她和已故丈夫四十年前约定去却从未成行的地方。一路上，她遇到了搭车的年轻背包客、同样逃家的少年、以及一个也曾失去爱人的巡警。她没有告诉任何人她的病，却在每一个夜晚对着星空说话。最后，她没有到达冰川——房车在距离目的地五十公里处抛锚。她牵着狗，走了最后一段路。当看到冰川的那一刻，她笑着对狗说：“就是这里了，不错吧。”", "one_line": "一个患绝症的老太太抢了一辆房车，载着同样垂死的老狗，驶向南美最南端的冰川。", "bucket": "drama"}, {"id": "1088", "title": "斯隆女士", "filename": "m1088.html", "year": "2016", "region": "美国", "genre": "剧情 / 惊悚", "tags": "政治游说, 女性权谋, 反套路, 神结局, 快节奏", "summary": "杰西卡·斯隆是游说界的“食人鱼”，为了胜利可以牺牲任何人，包括自己。她跳槽到一个小型公司，目标直指拥有数千万会员的全国枪支协会。对手用尽手段：窃听、色诱、收买她的下属。斯隆被董事会开除，前同事集体背叛。在国会听证会上，她面临伪证指控。最后一刻，她按下录音笔——原来她故意让自己被陷害，所有对话和邮件早已备份给联邦调查局。对手全灭，她自己入狱一年，但对着牢房镜头露出胜利微笑。", "one_line": "华盛顿最狠的女说客为扳倒枪支协会，不惜把自己送进监狱做最后一步棋。", "bucket": "drama"}, {"id": "1089", "title": "爱通过直播", "filename": "m1089.html", "year": "2025", "region": "韩国", "genre": "爱情，喜剧，职场", "tags": "直播，网红，假戏真做，欢喜冤家", "summary": "曾经的美妆一姐姝英因丑闻掉粉百万。新平台提出“恋爱真人秀”对赌：与一位男主播假扮情侣直播三十天，若粉丝破三百万便给天价合约。签约后她才发现男方是专门打名誉权官司、曾起诉过她的毒舌律师姜律。两人第一次直播就互怼到差点被封号，反而意外爆红。网友疯狂嗑这对“怨侣CP”。为了流量，他们不得不越演越真：烛光晚餐、海边日出、甚至见家长。但当初的合同里藏着陷阱——最后一天需要当众“求婚”，而姜律的拒绝将令她彻底身败名裂。", "one_line": "过气女主播为翻红签下恋爱直播合同，谁知搭档竟是现实里水火不容的死对头律师。", "bucket": "romance"}, {"id": "1090", "title": "粉色飞碟", "filename": "m1090.html", "year": "2028", "region": "中国大陆", "genre": "科幻, 喜剧, 家庭", "tags": "飞碟, 少女, 小镇, 治愈, 跨物种", "summary": "高三女生林小禾生活在即将被拆迁的南方小镇，父母常年在外，她与患阿尔茨海默症的奶奶相依为命。某夜，她用爷爷留下的老收音机搜索信号时，意外接通了外星通讯网络，一架粉色飞碟坠落在她家后院。飞碟驾驶员是一个自称“咕噜”的社恐外星维修工，它必须在一周内修好飞碟，否则星际枢纽将永久关闭。林小禾发现，修飞碟需要的零件竟散落在小镇各处，而这些地方恰恰藏着她与家人的珍贵回忆。为了不被拆迁队发现，一人一外星人展开了一场深夜寻宝行动。在找回零件的过程中，林小禾逐渐理解了父母离乡打工的无奈，也找回了对未来的勇气。最终，飞碟升空的那一刻，整个小镇被染成了温柔的粉色，拆迁计划竟因此被永久搁置。", "one_line": "小镇女孩意外用老式收音机召唤来一架故障的粉色飞碟，被迫与呆萌外星人开启修船之旅。", "bucket": "sci-fi"}, {"id": "1091", "title": "破戒", "filename": "m1091.html", "year": "1962", "region": "日本", "genre": "剧情, 历史", "tags": "部落民歧视, 阶级, 自我认同, 岛崎藤村", "summary": "明治时期的信浓国，青年教师濑川丑松出身于最底层的“秽多”部落，但一直遵照已故父亲的遗言“藏好出身，伪装到底”。他在村里的小学任教，深受学生爱戴，却每日活在身份曝光的恐惧中。学校新来了一个同样出身低微但选择公开身份的同僚，此人被全村孤立后自杀。丑松更加深藏不露，甚至与自己心爱的女教师疏远。当学生们在课堂上讨论“平等”时，一个孩子天真地问：“老师，那你是秽多吗？”丑松沉默了三天。第四天早晨，他在全校朝会上摘下帽子，平静地说：“我是。”全场死寂，随后一名学生带头鼓掌。他失去了教职，却赢得了一船学生的渡河送别。片尾，他站在河对岸回头，笑了。", "one_line": "明治时代一名隐瞒“秽多”出身的小学教师，在学生的追问下选择了破戒自曝身份。", "bucket": "drama"}, {"id": "1092", "title": "黑店", "filename": "m1092.html", "year": "2025", "region": "台湾", "genre": "悬疑 / 惊悚", "tags": "密室, 人性考验, 黑色电影, 反转", "summary": "深山公路旁有一家诡异的旅馆，号称“从不让客人活着离开”。暴雨封路，五个互不相识的旅客被迫入住：逃跑的毒枭、被骗光积蓄的教师、执行秘密任务的警察、寻找失踪女儿的母亲，以及一个沉默的作家。半夜，教师发现自己杯中有毒，而每个人都被下了不同的慢性毒药，解药只有老板有。旅馆开始出现“规则”：每天只能投票一人获得解药，且这个人必须坦白一个秘密。随着秘密揭晓，五人的关系错综复杂地交织在一起。最后发现，老板其实是二十年前连环杀人案的唯一幸存者，他开这家店，是在等待当年的真凶。", "one_line": "暴雨之夜，一家深山旅馆里，五个各怀鬼胎的旅客发现，老板在给他们的食物里下了同一种药。", "bucket": "suspense"}, {"id": "1093", "title": "鸡尾酒派对", "filename": "m1093.html", "year": "2022", "region": "法国", "genre": "喜剧 / 爱情 / 剧情", "tags": "多线叙事, 醉酒, 一夜, 浪漫, 法式", "summary": "巴黎名流杜邦先生举办私人鸡尾酒派对，邀请各界精英。觥筹交错间，一个黑客偷偷接入派对网络，将六位主角手机里的“待发送消息”全部群发给了全场嘉宾。于是，出轨证据、公司内幕、私生子照片、匿名恐吓信……所有精心维护的假面瞬间崩塌。建筑师发现自己老婆和自己的老板有一腿；时尚主编发现闺蜜在背后骂她“又老又丑”；外交官收到匿名信揭露他洗钱。全场混乱之际，最不起眼的调酒师女孩站出来，她引导大家先喝酒、再面对。天亮时，有人分手，有人复合，有人进警局，有人裸辞。而始作俑者，正是那个被所有人忽视的杜邦先生的私生女。", "one_line": "一场上流社会的鸡尾酒派对，六个人的秘密在酒精作用下，全部互发到了所有人的手机上。", "bucket": "comedy"}, {"id": "1094", "title": "守门员面对罚点球时的焦虑", "filename": "m1094.html", "year": "2019", "region": "德国", "genre": "剧情, 心理, 运动", "tags": "足球, 存在主义, 黑色幽默, 心理战, 孤独", "summary": "在一场决定降级与否的关键比赛中，门将布洛赫神勇扑出了一粒点球，成为全城英雄。但胜利的狂欢过后，他感到巨大的虚无。他悄然离开球队，漫无目的地游荡在陌生的城市边缘。他旁观路人的生活，介入一场混乱的争吵，甚至尝试犯罪。足球场上的“瞬间决策”与生活中的道德困境形成残酷互文。当他再次站在陌生的点球点前，面对一个孩子踢来的皮球，他终于明白：守门员最焦虑的不是扑不出球，而是不知道为什么要扑出它。", "one_line": "一名扑出关键点球的门将突然在赛后失踪，开启了一场关于输赢与存在的荒诞漫游。", "bucket": "drama"}, {"id": "1095", "title": "婚头转向", "filename": "m1095.html", "year": "2025", "region": "中国台湾", "genre": "喜剧 / 爱情", "tags": "婚礼, 乌龙的, 前任, 家族闹剧", "summary": "婚礼策划师小顾从业八年从未失手，直到接手“世纪婚礼”。新娘在化妆间接到前男友的语音留言，新郎在休息室发现自己还爱着伴郎，司仪突然宣布要出家，而新娘的父亲带着小三来抢婚。更离谱的是，酒店送错了酒席、蛋糕里有假牙、婚车被开去跑滴滴。四组人马在婚礼现场各自为战，闹出无数笑话。最终，没有一场婚礼顺利举行，但所有人都在这场荒诞的闹剧里找到了真正想要的答案——有些人应该结婚，有些人应该放手。", "one_line": "婚礼当天，新娘、新郎、前任和司仪同时反悔，一场婚礼演变成四组人马的大型翻车现场。", "bucket": "comedy"}, {"id": "1096", "title": "我的美好人生", "filename": "m1096.html", "year": "2023", "region": "瑞典", "genre": "剧情生活", "tags": "中年危机, 自我寻找, 北欧, 治愈", "summary": "四十三岁的莉娜过着人人羡慕的生活：高薪建筑师、帅气体贴的丈夫、两个优秀的孩子、斯德哥尔摩市中心的豪宅。但她每天早晨都要在车里坐十五分钟才有勇气走进办公室。某天她在超市看到一个收银员对顾客微笑，突然意识到自己已经很久没有那样笑过了。第二天，莉娜递交辞呈，对丈夫说“我要去找找看，如果我不是‘完美的莉娜’，还能是谁”，然后独自开车去了北方一个小岛。岛上只有三百个居民，莉娜在那里学习劈柴、钓鱼、修补渔网，也重新学习如何愤怒、哭泣和无聊。", "one_line": "拥有完美家庭和事业的女人突然辞职离家，她只说了一句：“我想试试不美好的人生。”", "bucket": "romance"}, {"id": "1097", "title": "来自星星的少女", "filename": "m1097.html", "year": "2025", "region": "韩国", "genre": "浪漫、奇幻", "tags": "外星人、青春校园、异能、治愈", "summary": "来自开普勒星球的少女拉利亚因为母星政变，驾驶飞船逃离时坠落在地球。她伪装成转校生进入一所高中，发现飞船需要“真爱能量”才能启动返航。偏偏她绑定的是全校第一、性格冷若冰霜的周宇镇。拉利亚拥有读心和短暂暂停时间的能力，但对周宇镇完全无效。为了完成任务，她闹出了无数笑话：告白被拒、情书送错、甚至差点暴露身份。然而随着相处，她发现周宇镇并非冷漠，而是背负着沉重的秘密。一场外星人倒追学霸的爆笑又虐心的恋爱开始了。", "one_line": "外星公主为躲避政变坠落在首尔，为了回家，她必须在一个月内让全校最冷漠的学霸爱上她。", "bucket": "fantasy"}, {"id": "1098", "title": "徒有其表", "filename": "m1098.html", "year": "2014", "region": "英国", "genre": "剧情, 惊悚, 心理", "tags": "整容, 身份, 扭曲", "summary": "长相平平的弗洛伦斯从小受尽嘲笑。她攒钱去了一家地下诊所，进行了全身整形，变成了一个人见人爱的金发美女，改名“弗洛拉”。但她很快发现，美丽带来的便利伴随着深深的恐惧：她不敢大笑、不敢流泪，怕假体移位；男友爱的是她的皮囊，而非灵魂；更可怕的是，她开始看到“以前的自己”在镜子里对她冷笑。某天，她的假体感染，脸开始溃烂。她疯狂地寻找医生修复，却卷入一桩贩卖器官的阴谋。最终，她选择撕下绷带，以真面目面对世界，并说出那句：“美是特权，但不该是诅咒。”", "one_line": "一个丑女孩通过极端整容变成美女，却发现自己失去的不只是脸。", "bucket": "drama"}, {"id": "1099", "title": "龙骑士4", "filename": "m1099.html", "year": "2026", "region": "美国", "genre": "奇幻, 动作, 冒险", "tags": "龙, 史诗, 战争, 终极, 特效大片", "summary": "时间来到了现代。古老的龙族封印被军火商的能量钻探打破，最后一只巨龙苏醒，其愤怒足以毁灭半个地球。预言中的龙骑士是一位历史系宅男提姆，他被龙血契约绑定，被迫成为骑士。但当他骑上龙背，准备像游戏中那样冲锋陷阵时，面对的却是A-10攻击机的贫铀弹和响尾蛇导弹。魔法与科技的对决就此展开。提姆必须一边躲避现代武器的锁定，一边找到重启古代禁咒的方法，让龙族和人类重新签订和平条约。", "one_line": "传说中最后一位龙骑士复活，却发现自己要对抗的不是恶龙，而是驾驶战斗机的现代军队。", "bucket": "fantasy"}, {"id": "1100", "title": "千金丫环", "filename": "m1100.html", "year": "2022", "region": "中国大陆", "genre": "爱情 / 喜剧 / 年代", "tags": "互换身份, 民国, 先婚后爱, 甜宠, 反转", "summary": "民国时期，财阀独女沈如意被父亲许配给从未谋面的“江北土财主”陈家少爷。她连夜出逃，阴差阳错以新招丫环的身份进入了陈家。她服侍的二少爷陈明远举止粗俗、满身铜臭，正是她嫌弃的未婚夫。沈如意一边忍耐着“伺候土包子”的日子，一边暗中搞鬼想让对方主动退婚。但她渐渐发现，陈明远的粗鲁全是伪装，他实则在秘密将家族资产转移给革命党。当沈如意的身份暴露，陈明远摊牌：他一开始就知道她是谁，只是觉得“驯服一个嘴硬的大小姐比直接娶进门有趣多了”。", "one_line": "财阀千金为逃婚假装成丫环，却不知她服侍的少爷就是她要嫁的“土包子”未婚夫。", "bucket": "romance"}, {"id": "1101", "title": "桃李劫", "filename": "m1101.html", "year": "2025", "region": "中国大陆", "genre": "悬疑, 犯罪, 青春", "tags": "校园霸凌, 复仇, 反转", "summary": "盛华中学百年校庆当晚，曾经的校园风云人物、如今的地产少东家陈非离奇坠楼。紧接着，参与过当年“桃李劫”事件的另两位校友也相继遇害。十年前，品学兼优的贫困生苏桃被诬陷偷窃，不堪凌辱跳楼身亡。如今，当年负责案子的老刑警重返调查，却发现所有证据都指向苏桃那个智商超群的弟弟。就在警察即将抓捕时，真正的策划者主动现身——竟是当年唯一对苏桃释放善意的同学，如今的校长之女。", "one_line": "顶尖中学百年校庆夜，三位曾霸凌同学的富二代接连惨死，疑点指向十年前自杀的女学生。", "bucket": "suspense"}, {"id": "1102", "title": "牛头不对马嘴", "filename": "m1102.html", "year": "2024", "region": "中国", "genre": "喜剧 / 爱情", "tags": "错位, 灵魂互换, 乡村, 城市, 方言", "summary": "北京金牌律师林峰接了一桩乡村土地纠纷案，对方当事人是老农民牛德旺。开庭前一天，两人在破庙躲雨遭雷击，醒来后灵魂互换。林峰变成了六十岁的驼背老头，牛德旺则钻进三十岁的西装身体里。林峰要在牛棚里学会养牛，还要帮村民写诉状；牛德旺被迫上法庭，用一口方言把法官和对方律师怼到语无伦次。两人通过手机互相指导，闹出一连串笑料。最终他们发现，土地案的幕后黑手正是林峰的律所合伙人。", "one_line": "城市毒舌律师和乡村养牛大爷意外灵魂互换，两人必须用对方身体打官司。", "bucket": "comedy"}, {"id": "1103", "title": "串流先锋", "filename": "m1103.html", "year": "2023", "region": "美国", "genre": "惊悚、科技、悬疑", "tags": "暗网直播、数字犯罪、社会讽刺、极限生存", "summary": "全球最火的流媒体平台“先锋视频”推出了一档划时代的生存真人秀：四位过气网红被投放到一座无人荒岛，24小时直播求生，观众付费投票决定他们获得的物资。起初这只是一场博眼球的流量狂欢，但当一位选手意外死亡，而投票选项突然变成了“电击”、“断粮”、“释放毒气”时，所有人都意识到这不是特效。幕后黑手利用平台的AI算法实时分析观众情绪，将施虐行为包装成娱乐。女主角、过气游戏主播阿曼达必须利用她对直播机制的了解，反噬这套系统，让全球观众看到屏幕背后那双沾满鲜血的手。", "one_line": "四个网红参加一档天价直播真人秀，却发现观众投票决定的是他们的生死。", "bucket": "suspense"}, {"id": "1104", "title": "一课一练", "filename": "m1104.html", "year": "2023", "region": "日本", "genre": "奇幻，校园，动作", "tags": "考试，作弊，魔法，轻小说改，搞笑", "summary": "在这个世界，从小学到大学，所有考试都变成了真实的“试炼迷宫”。学生们必须用魔法和知识破解谜题、战胜怪物才能过关。主角“留级一年”的立花文太是全校闻名的差生，他的特殊能力“一课一练”极其鸡肋：每上完一节课，他只能完全记住并运用其中一个知识点。就在所有人都不看好他时，高考终极迷宫“拉普拉斯之盒”即将开启。凭借这个看似弱小的能力，文太却展现出惊人的“精准”战术。他能用物理课的一个杠杆原理撬动Boss，用化学课的一个反应公式瞬间改变迷宫环境。他的怪异战术吸引了天才优等生绫乃和作弊专家鬼头的注意。三人组成最不可能的小队，挑战将考生内心的“知识焦虑”实体化的最终Boss。而文太也逐渐发现，他的能力并非鸡肋，而是为了打破这个看似公平、实则僵化的考试制度的“钥匙”。", "one_line": "在这个世界，所有考试都必须在“考试迷宫”里实战进行，而男主的能力是“每节课后只能复述一个知识点”。", "bucket": "fantasy"}, {"id": "1105", "title": "天狼劫国语", "filename": "m1105.html", "year": "1990", "region": "中国香港", "genre": "武侠 / 古装", "tags": "TVB, 武侠, 宿命, 复仇, 刘德华", "summary": "明末，武林传言“天狼令”重现，得令者可号令群雄。少侠白承恩为报父仇卷入争夺，发现父亲当年正是因参悟天狼令秘密而被灭口。天狼令每隔一甲子，在“天狼食日”之日便会吸取持有者的精气，这便是“天狼劫”。白承恩结识了亦正亦邪的魔教之女冷凝霜，两人从天狼令中悟出一套“天狼剑法”，但这套剑法也会加速反噬。为了破解诅咒，他们必须在天狼食日前集齐七颗天狼石。朝廷、东厂、武林正邪各派纷纷登场，在一场血雨腥风中，白承恩最终发现最大的敌人竟是自己的血脉至亲。", "one_line": "武林惊现“天狼令”，得令者可称霸，但每六十年必遭天狼食日的反噬之劫。", "bucket": "action"}, {"id": "1106", "title": "阿汤的火星任务", "filename": "m1106.html", "year": "2024", "region": "美国", "genre": "科幻, 冒险", "tags": "火星, 硬科幻, 宇航员, 自救", "summary": "2035年，第三次火星载人任务“战神三号”遭遇超强太阳风暴，宇航员阿汤被碎片击中，生命体征消失，队长无奈下令撤离。然而阿汤只是昏迷，醒来后发现自己是这颗红色星球上唯一的人类。基地只剩下31天的补给，而下一次任务抵达需要四年。阿汤，这位植物学家出身的宇航员，开始了史上最硬核的自救。他改造了居住舱，利用自己的粪便和火星土壤种植土豆；他通过拆解旧火星车零件修复通讯设备；他甚至在强沙尘暴中独自驾驶改装车前往三千公里外的“探路者号”遗迹寻找旧天线。当NASA宣布将发射无人补给船但需要他行驶3200公里去指定地点接收时，阿汤剃光了头，在日志里写下：“不管是靠神迹还是物理，我都要回家。”", "one_line": "宇航员阿汤因事故被遗弃在火星，他必须利用过期土豆和人类排泄物活到救援到来。", "bucket": "sci-fi"}, {"id": "1107", "title": "宝贝老板：圣诞红利", "filename": "m1107.html", "year": "2024", "region": "美国", "genre": "喜剧, 奇幻, 家庭", "tags": "圣诞特别篇, 合家欢, 恶搞, 商业竞争", "summary": "圣诞节前夕，Baby Corp接到了噩耗：圣诞老人因为吃了太多布丁而中风住院，北极的礼物生产陷入瘫痪。股市大亨“格林奇·马斯克”趁机发起了敌意收购，企图废除圣诞节，推出订阅制的“无聊玩具盒子计划”。宝贝老板虽然已经长大成人，但不得不再次喝下“永远宝宝配方奶”，恢复婴儿身，带领特工小队潜入北极。他们发现礼物生产线的自动化出问题，所有玩具都变成了会杀人的泰迪熊。宝贝老板必须说服闹罢工的小精灵们，在圣诞节早晨到来之前，手工赶制出足够的礼物，并且找出谁才是真正在幕后操纵股价下跌的内鬼。", "one_line": "为了阻止“圣诞老人股份公司”被邪恶的“禁欲玩具商”恶意收购，宝贝老板必须秘密潜入北极，夺回孩子们的愿望清单。", "bucket": "comedy"}, {"id": "1108", "title": "魔都传奇粤语", "filename": "m1108.html", "year": "1998", "region": "香港", "genre": "剧情， 黑帮， 悬疑", "tags": "上海滩， 粤语， 复仇， 传奇", "summary": "1927年，少年阿聋目睹全家被黑帮灭门，自己被割断声带扔进黄浦江。十年后，他化名“剃刀”，在法租界当擦鞋匠。他不能言，却因幼年习武练就极强唇语能力，能隔街读取对话。他利用这一能力，挑拨三大帮派关系，让他们自相残杀。当最后一个仇人——已成为公共租界董事——死在他的剃刀下时，警察局长抓了他。但审讯室的门打开，走进来的却是当年救他的巡捕房探长。探长递给他一把枪，说：“其实，我是地下党。”", "one_line": "1930年代上海滩，一个聋哑擦鞋匠用一把剃刀和一双能读唇语的眼睛，暗中操纵三大帮派命运。", "bucket": "drama"}, {"id": "1109", "title": "冤鬼再见粤语", "filename": "m1109.html", "year": "2023", "region": "中国香港", "genre": "喜剧 / 恐怖", "tags": "鬼魂, 粤语梗, 黑色幽默", "summary": "风水师儿子陈茂才继承了一个“阴阳眼”体质，但他看到的鬼一点也不可怕——都是些困在生前琐事里的普通“社畜鬼”。有只鬼因为老板欠他三个月工资不肯投胎，有只鬼因为结婚钻戒掉进下水道，还有只鬼临终前没看完一部烂剧，非要陈茂才帮他看完并讲结局。陈茂才一边帮鬼解决这些荒诞的遗愿，一边被它们逼到精神崩溃。最后他发现，所有鬼魂都指向同一栋废弃大厦，而那里埋着一个真正凶残的厉鬼。当厉鬼出现时，陈茂才对它大喊：“你生前是不是也被甲方改过方案啊？”厉鬼愣住，哭了。", "one_line": "一个倒霉蛋发现自己能和鬼说话，但每只鬼都只想让他帮忙讨债、找工作、甚至修空调。", "bucket": "comedy"}, {"id": "1110", "title": "花月于飞", "filename": "m1110.html", "year": "1995", "region": "中国香港", "genre": "爱情 / 古装", "tags": "唐传奇，诗妓，侠客，悲剧美学", "summary": "唐传奇风格爱情片。长安平康里名妓苏月飞以诗才名动天下，但她只卖艺不卖身。江湖游侠柳于飞花重金买下她的初夜，却只是端坐桌前，请她品评自己的诗作。两人从诗词歌赋谈到人生哲学，苏月飞认定这是知己。柳于飞替她赎身并要娶她，但就在婚礼当夜，一伙黑衣人杀入。苏月飞这才知道，柳于飞是奉命来杀她父亲——朝廷叛将的刺客，而她的真实身份是叛将之女。柳于飞在忠义与爱情间选择了她，但追杀令已下。两人在血色月光下纵马逃离长安，身后是漫天花雨。", "one_line": "大唐女诗妓爱上了一名为她赎身的侠客，成亲当晚却发现侠客要杀的是她，救的也是她。", "bucket": "romance"}, {"id": "1111", "title": "蒙面侠苏洛2：不朽传奇", "filename": "m1111.html", "year": "2027", "region": "美国", "genre": "动作、冒险、奇幻", "tags": "超级英雄、传承、剑术、不死诅咒", "summary": "距上一代苏洛隐退已过去十五年。女承父业的年轻苏洛——艾琳娜在洛杉矶守护拉丁裔社区，身手矫健却缺乏前辈的神秘威慑力。某夜，老苏洛迭戈突然出现在她面前，浑身是伤，眼神绝望。他本应在五年前死于癌症，却因年轻时佩戴过一块被诅咒的“大地之心”黑曜石，获得了不死之身——但每一次复活都会消耗身边至亲的寿命。艾琳娜的母亲已因此病危。为了打破诅咒，父女二人必须重返墨西哥的死亡金字塔，找回当年献祭的仪式匕首。而一个盗取文物为名、实则觊觎永生之力的私人武装也已盯上他们。", "one_line": "老苏洛将面具传给女儿后，却发现自己被古印第安的永生诅咒困住，成了无法死去的传说。", "bucket": "action"}, {"id": "1112", "title": "颠覆", "filename": "m1112.html", "year": "2023", "region": "中国大陆", "genre": "悬疑 / 犯罪", "tags": "时空穿越, 谋杀, 反转, 科技, 记忆", "summary": "落魄程序员陈树开发了一款能深度修改手机系统日志和云端备份的软件，专门帮客户“洗白”过去。一天，他收到匿名包裹，里面是一部旧手机和一则预言：三日后某富豪会被暗杀。陈树以为恶作剧，随手修改了手机里的行程记录。没想到预言成真，而监控显示凶手竟然就是他自己。他利用自己的软件不断回溯修改数据，试图找出真凶，却发现每次修改都会创造新的时间分支，而所有证据都指向一个惊人的事实：未来的自己为了拯救更多人，不得不制造这起谋杀。", "one_line": "程序员发明篡改手机历史记录的工具，却发现自己卷入了一场早已注定的谋杀。", "bucket": "suspense"}, {"id": "1113", "title": "我男友成了姐夫的理由", "filename": "m1113.html", "year": "2024", "region": "中国", "genre": "剧情 / 爱情 / 家庭", "tags": "伦理困境, 姐妹反目, 年度狗血", "summary": "妹妹小禾和男友阿哲相恋五年，准备结婚。姐姐小穗突然带着身孕回国，宣布孩子爸爸是阿哲。全家震惊，父母逼小禾退让。小禾搬出家门，却发现姐姐的“怀孕”是假的。她开始调查，发现阿哲和姐姐其实早有预谋：他们看中的是小禾名下的一套遗产房。小禾收集证据，在婚礼现场播放了录音。全场哗然，父母当场晕倒。小禾看着崩溃的姐姐和跪地求饶的阿哲，只说了一句：“你们的婚礼，我送了一份大礼。”三年后，小禾成为房产律师，接到的第一个客户竟是姐姐。", "one_line": "妹妹的男友突然成了姐姐的未婚夫，婚礼前夜，妹妹收到一封来自“新郎”的绝密邮件。", "bucket": "drama"}, {"id": "1114", "title": "颤密", "filename": "m1114.html", "year": "2022", "region": "日本", "genre": "悬疑 / 犯罪", "tags": "地震, 摩斯密码, 公寓, 连环案", "summary": "东京连续三年发生了七起“地震关联杀人案”：每次3级以下的小地震过后，涩谷区同一栋老旧公寓“朝日庄”就会有一名住户死亡，死因皆为心脏骤停，无外伤。新人刑警夏川结衣发现，每次地震的P波和S波间隔时间，恰好等于死者公寓房间号的摩斯密码。她住进朝日庄卧底，与楼里性格古怪的住户们周旋：永远在扫地的管理员、从不说话的五楼女人、以及一个每天记录地震数据的中学物理老师。地震再次来临，这一次的震颤频率指向夏川自己的房间。她必须在震动的几十秒内，找出那个利用地震杀人的人。", "one_line": "东京每次小型地震后，同一栋公寓都会有人被杀，而地震的震颤频率恰好是死者的公寓号。", "bucket": "suspense"}, {"id": "1115", "title": "囚徒", "filename": "m1115.html", "year": "2025", "region": "韩国", "genre": "犯罪, 动作", "tags": "监狱, 复仇, 地下拳赛, 黑警", "summary": "前国家情报院特工姜朴洙的女儿被一个走私集团灭口，凶手逃入监狱服刑以求庇护。姜朴洙故意杀害一名黑帮分子，成功关进同一所监狱。但进去后他才知道，整座监狱的狱警、医疗室甚至典狱长都在走私集团的薪资单上。他被迫参加地下拳赛才能接近目标，每次胜利换来一次“意外”见面的机会。就在他即将手刃仇人时，女儿的心脏移植接收者——一个陌生的少年——出现在会面室，仇人用少年的命要挟他。", "one_line": "为了给女儿报仇，前特工故意杀人入狱，却发现仇人早就买通了整座监狱。", "bucket": "crime"}, {"id": "1116", "title": "荒野迷案第二季", "filename": "m1116.html", "year": "2025", "region": "中国大陆", "genre": "悬疑, 犯罪, 冒险", "tags": "户外, 连环案, 社会派, 双男主", "summary": "边境刑警队再次接到报案，无人区发现一具被野狼啃食的骸骨，DNA比对显示正是第一季已经枪决的犯人。法医鉴定死亡时间三个月内，而那个犯人早在一年前就死了。老搭档林峯和陆阳重新组队，在追查过程中，他们发现这起案件牵扯出一个庞大的暗网直播组织，专门在高海拔无人区进行“狩猎游戏”。更诡异的是，每破获一个线索，就有一个新的人证离奇死亡，且死法都酷似第一季里的经典作案手法。这似乎是某个熟悉他们办案风格的“老熟人”，在利用时间差布下的弥天大局。", "one_line": "第一季的真凶伏法后，队长却收到了来自“死者”的加密邮件，而邮件发送时间在死者死亡前一周。", "bucket": "suspense"}, {"id": "1117", "title": "广东十虎苏灿之神龙摆尾", "filename": "m1117.html", "year": "2022", "region": "中国香港", "genre": "动作、武侠", "tags": "功夫、醉拳、民族大义、清末、硬桥硬马", "summary": "本片聚焦苏灿成为“醉乞”前的黑暗时期。年轻的苏灿已是广东武术界翘楚，却因性格狂傲得罪了洋行买办和腐败水师提督。在一场阴谋中，苏灿被下药后陷害与洋人私通，功力被废，全家被抄，父亲气死。沦为乞丐的苏灿被扔到珠江边的粪船上等死。在恶臭与绝望中，他观察蛇虫鼠蚁在极端环境下的求生本能，结合醉酒后身体不受控制的状态，悟出了一套借力打力的全新腿法——“神龙摆尾”。这一式专攻下三路，看似狼狈不堪，实则每一脚都暗藏杀机。大年三十夜，苏灿用这套腿法杀回提督府，以最卑微的姿态完成了最骄傲的复仇。", "one_line": "成为“醉乞”前的苏灿遭人陷害功力尽失，他在码头的粪船上悟出了“神龙摆尾”这一式。", "bucket": "action"}, {"id": "1118", "title": "让她走", "filename": "m1118.html", "year": "2025", "region": "法国", "genre": "心理 / 惊悚", "tags": "控制欲, 母女关系, 密室, 反转", "summary": "单亲妈妈克莱尔曾是歌剧名伶，她将自己未实现的梦想全部压在女儿艾拉身上。艾拉16岁时爱上流行音乐，想退学当创作歌手。克莱尔崩溃，将艾拉锁在地下室的隔音琴房里，对外谎称她去国外学声乐。克莱尔每天教她咏叹调，不许唱任何流行歌。直到新搬来的邻居是位音乐制作人，他在墙边听到微弱旋律，以为是新风格排练。一年后，艾拉偷偷用钢琴模仿莫尔斯码，向外发送“Help”。制作人报警。警察破门时，克莱尔正穿着礼服为艾拉“演出”，而艾拉已瘦脱相，但她唱的最后一首歌，是自己写的摇滚，歌词是“妈妈，谢谢你的恨，它让我知道怎么活”。", "one_line": "一位母亲用铁链锁住“堕落”的女儿，邻居听到歌声却以为是在排练话剧。", "bucket": "suspense"}, {"id": "1119", "title": "中大奖", "filename": "m1119.html", "year": "2019", "region": "中国大陆", "genre": "喜剧 / 剧情", "tags": "彩票, 黑色幽默, 小人物, 荒诞", "summary": "工厂清洁工老马中了彩票头奖500万，他决定不辞职、不张扬，继续穿着工服扫地，想看看周围人真实的嘴脸。中奖消息在厂里传开后，人人都知道中奖者是厂里某个人，但不知道是谁。老马戴着耳机扫地，偷听到了一段又一段荒诞的对话：车间主任计划绑架“中奖人”逼他吐出彩票；女会计想色诱对方然后卷款私奔；保安队长组织了“寻奖特工队”；就连厂里最老实的门卫大爷都在研究如何制造一场“意外”。更绝的是，所有人都以为只有自己掌握了真相。老马从看戏者变成了戏中人，他决定将计就计，用这500万做诱饵，设计一场终极人性实验。然而当他最终摊牌时，却发现压根不存在“其他人”——整个工厂里，只有他一个人是真实的，其余全是彩票中心派来的演员，这是一个长达一个月的社会学观察节目。", "one_line": "清洁工中了五百万后隐身工厂假装继续打工，却发现全厂所有人都在秘密策划绑架那个“中奖人”。", "bucket": "comedy"}, {"id": "1120", "title": "凌天独尊", "filename": "m1120.html", "year": "2026", "region": "中国大陆", "genre": "古装，仙侠，玄幻", "tags": "废材逆袭，宗门天才，上古血脉，修炼等级，打脸爽剧", "summary": "少年凌云天在“天剑宗”做了三年杂役，被同门称为“凌废材”。他每日打扫藏经阁，实际上是在暗中破解层层封印。因为他的真实身份是万年前的“凌天战神”，在与魔帝同归于尽前将神识封印转世。现在魔帝即将复苏，他必须找回力量。一次宗门大比中，他被长老当作诱饵丢入妖兽森林，却意外触发了第一层封印，觉醒战神剑意，一招斩杀四级妖兽。消息传回，昔日羞辱他的人开始恐慌，而宗门最神秘的太上长老突然现身，向他跪下说：“恭迎战神归位。”但凌云天发现，太上长老嘴角有一丝不易察觉的微笑——当年出卖战神、导致他陨落的，就是此人。而对方下跪，只是为了夺舍这具正在复苏的完美躯体。", "one_line": "宗门最弱的杂役弟子，体内却封印着上古战神的全部记忆与修为——只等他亲手解开。", "bucket": "fantasy"}, {"id": "1121", "title": "家变！", "filename": "m1121.html", "year": "2024", "region": "中国台湾", "genre": "剧情 / 家庭", "tags": "拆迁风波, 亲情撕裂, 黑色荒诞", "summary": "台北老城区面临拆迁，根据政策，家中每多一个户籍人口就能多分一套补偿房。长子阿杰算了一笔账：如果独居的老父亲能在这时候结个婚再马上离婚，家里就能凭空多出一套房子。全家人一拍即合，但问题是谁愿意当这个“工具人”？找来找去，他们竟然找上了父亲四十年前因家族反对而分手的初恋爱人阿香。阿香如今是独居富婆，竟然同意了这荒唐的提议，条件是这一个月内，父亲必须像年轻时那样追求她一次。于是，一场荒诞的“夕阳红闪婚”在全家人的监视下上演，旧情复燃的尴尬与亲人间的算计让这个家变得支离破碎。", "one_line": "一家人为了多拿一套拆迁补偿，决定让父亲“合法结婚又快速离婚”，候选人竟是父亲的前女友。", "bucket": "drama"}, {"id": "1122", "title": "给你的短信", "filename": "m1122.html", "year": "2023", "region": "日本", "genre": "爱情/奇幻", "tags": "短信，时空，遗憾，治愈，东日本大地震", "summary": "2011年3月11日，女孩真希在争吵中给男友翔太发出短信“我恨你，再也不想见到你”。下一秒，东日本大地震发生，真希遇难，翔太余生都活在悔恨里。十年后的同一天，翔太的手机突然响起，收到的正是那条十年前没发出去的“我恨你”。起初他以为是诈骗，但回复后，竟能与2011年的真希实时通信。他拼命想要救她，告诉她不要出门、不要靠近海边。但每改变一次过去，现在的记忆就会混乱。最终他发现，唯一能让真希活下来的方法，是回复那条短信：“我爱你，无论你恨不恨我。”", "one_line": "2011年3月11日，她发给男友的“我恨你”短信因地震信号中断。十年后，这条短信发出了。", "bucket": "romance"}, {"id": "1123", "title": "初爱", "filename": "m1123.html", "year": "2024", "region": "中国台湾", "genre": "爱情, 青春, 剧情", "tags": "校园, 纯爱, 失忆", "summary": "女孩晓晨因车祸患上了短期记忆障碍，每天醒来都会忘记前一天的事。每天清晨，她的书桌上都会出现一封手写情书，署名“初”。根据线索，她找到了同校的兄弟阿初和阿念。阿初是温柔的学长，阿念是叛逆的弟弟。阿初承认情书是自己写的，但晓晨却在阿念的房间里找到了与情书字迹相同的草稿。原来，一直默默写情书的是弟弟阿念，他因哥哥也喜欢晓晨而选择退出。阿念每天在校门口远远看她，却让哥哥代为送信。晓晨决定利用每日重置的记忆做实验：她分别约会两兄弟，发现和阿念在一起时心跳更快。最后她设计让阿念在雨中朗读情书，那一刻旧记忆被冲垮，新记忆诞生——她选择了那个不敢说爱的人。", "one_line": "车祸失忆的女高中生每天都会收到一封署名“初”的情书，当她找到写信人时，对方却指认自己的双胞胎哥哥才是暗恋者。", "bucket": "romance"}, {"id": "1124", "title": "好奇的乔治3:回到丛林", "filename": "m1124.html", "year": "2023", "region": "美国", "genre": "喜剧 / 冒险 / 家庭", "tags": "萌宠，雨林探险，环保，益智", "summary": "黄帽子先生送给乔治一台古董级“植物情感翻译机”，不料乔治乱按按钮，竟听懂了濒死古树“老贝利”的求救。原来贪婪的开发商正准备砍伐整片雨林建造高尔夫球场。乔治独自潜入丛林，利用翻译机煽动树木“行走”到悬崖边玩起“木头人”游戏，搞得推土机寸步难行。黄帽子先生赶来时才发现，这场看似捣蛋的行动，竟是阻止生态灾难的唯一方法。最终乔治用一桶花生酱收买了开发商的宠物狗，上演了一出啼笑皆非的“反拆迁”大戏。", "one_line": "调皮的小猴乔治误打误撞启动了一台旧式植物翻译机，随即被卷入一场拯救雨林的疯狂行动。", "bucket": "comedy"}, {"id": "1125", "title": "小小兵", "filename": "m1125.html", "year": "2026", "region": "美国", "genre": "喜剧、动作、冒险", "tags": "萌系、反派、团队协作、爆笑", "summary": "凯文、斯图尔特、鲍勃和两位新同伴因为找不到合格的主人，决定自己当老板，开了一间“好人拯救事务所”。他们的第一单生意是帮助一位善良的面包师摆脱高利贷骚扰，结果却把对方的办公室炸成了泳池。随后，一位神秘的女科学教母看中了他们的破坏天赋，试图利用他们摧毁超级英雄联盟。小小兵们一边稀里糊涂地执行“正义任务”，一边发现女教母才是真正的反派。最终在一场废弃游乐园的大战中，他们用最荒唐的方式——巨型棉花糖弹弓——赢得了胜利，并阴差阳错地成为了城市的小小守护者。", "one_line": "五只渴望效忠最坏主人的小小兵，意外成立了一家“好人拯救公司”，却把城市搅得天翻地覆。", "bucket": "comedy"}, {"id": "1126", "title": "越后筒石亲不知", "filename": "m1126.html", "year": "1964", "region": "日本", "genre": "剧情 / 历史", "tags": "社会写实, 女性苦难, 木下惠介", "summary": "越后筒石地区，以险峻的亲不知断崖而闻名。阿吟的丈夫在一次矿难中死去，她独自拉扯三个孩子。为了抄近路去镇上做工，她必须每天冒着生命危险攀爬那段被称为“死亡海岸线”的悬崖。村里人都说，女人走那段路，十有八九会摔进海里。但阿吟为了多挣那半小时的工钱，硬是徒手攀爬了几千次。她的手掌磨出了铁一样的茧子，她的背影像一只贴在崖壁上的壁虎。多年后，孩子们长大成人，要离开村子去大城市。长子决定要为母亲修一条路，但阿吟拒绝了，她说：“我已经不需要路了，那条路就在我心里。”在一个冬夜，她去海边接喝醉的儿子，在海浪声中，她悄无声息地消失在了黑暗里。", "one_line": "为了养活矿工的儿女，一个女人把自己活成了连接悬崖两端的“活吊桥”。", "bucket": "drama"}, {"id": "1127", "title": "芝加哥警署第九季", "filename": "m1127.html", "year": "2025", "region": "美国", "genre": "犯罪 / 动作 / 悬疑", "tags": "警匪, 卧底, 黑帮, 单元剧加主线", "summary": "第九季开篇，芝加哥街头出现一种能让人在幻觉中自残的新型毒品“天使尘”，三天内造成十七人死亡。情报组组长沃伊特发现所有线索都指向警署内部。新来的证据保管室管理员伯恩斯，是个看起来木讷的老警察，从没出过外勤。但毒品贩子落网后供述，他们的“上家”能精准知道警方每一次突击行动的时间。伯恩斯的银行流水干净得像蒸馏水，但他的儿子三年前因吸毒过量死亡，医院记录显示他儿子死前最后一通电话打给了警署内线。汉克·沃伊特决定设一个只有自己知道的假行动，时间定在凌晨三点。当夜，伯恩斯果然在证据保管室用内部通讯系统发出了消息。沃伊特推开门，伯恩斯没有反抗，只是说：“你儿子死的时候，有任何人帮你吗？” 沃伊特关掉了录音笔。镜头切到伯恩斯抽屉里一张他儿子的照片，照片背面写着一行字：“毒贩是警察的儿子，警察是毒贩的父亲。”", "one_line": "情报组在追查新型毒品“天使尘”时发现，供货源头竟是警署内部新的证据保管室管理员。", "bucket": "crime"}, {"id": "1128", "title": "法国女人", "filename": "m1128.html", "year": "1995", "region": "法国", "genre": "剧情, 爱情", "tags": "女性独立, 外籍军团, 战地情缘", "summary": "性格倔强的巴黎女教师玛格丽特在被未婚夫抛弃后，不顾世俗眼光，女扮男装加入了法国外籍军团。在阿尔及利亚的烈日下，她要比男人更狠才能活下来。艰苦的训练和残酷的战争让她脱胎换骨，她也在此遇到了沉默寡言的军官路易。两人在沙暴中互相依偎，产生了禁忌的感情。然而战争结束，当她们回到法国，却发现那段在极端环境下的感情无法适应平淡的日常生活。玛格丽特最终选择再次离开，独自重返沙漠，因为她发现，这片荒凉的土地才是她唯一的灵魂归宿。", "one_line": "一位被爱情伤透的法国女教师，远赴北非加入外籍军团，在沙漠中寻找自我与救赎。", "bucket": "drama"}, {"id": "1129", "title": "猫儿叫春", "filename": "m1129.html", "year": "2025", "region": "泰国", "genre": "惊悚, 悬疑, 超自然", "tags": "民俗, 降头, 女性复仇, 诡异", "summary": "曼谷老城区流传着一个传说：每到泰历的“鬼月”，死去的老降头师会化作黑猫寻找替身，其叫声如同婴儿啼哭，听过的人会在七日内暴毙。年轻女警阿念是坚定的无神论者，她接手的第一起离奇死亡案中，唯一的“目击者”是一只流浪黑猫。随着调查深入，阿念发现死者都是二十年前一桩灭门案的嫌疑人，而那只黑猫似乎在指引她寻找证据。当她越来越接近真相，她自己也听到了那摄人心魄的猫叫声，并开始看到幻觉。在科学与民俗的夹缝中，阿念必须找到那个在背后利用黑猫进行降头术的活人复仇者，或者承认，这真的是来自亡灵的法律。", "one_line": "午夜巷子里传来婴儿哭声般的猫叫，听过的人接连死亡，一名不相信鬼魂的女警深入调查。", "bucket": "suspense"}, {"id": "1130", "title": "孤山魅影", "filename": "m1130.html", "year": "2024", "region": "中国大陆", "genre": "悬疑惊悚", "tags": "深山, 怪谈, 民俗, 人格分裂, 反转", "summary": "五名驴友闯入西南边陲禁地“鬼哭岭”，当地传说山中住着被献祭的红衣女鬼，会索要生人面孔。露营当晚，他们真的看到红衣魅影，一名队员次日发现自己的脸在镜子里变成了陌生的女人。恐慌蔓延，互相猜忌。五人逐一死去，死者的脸都被剥走。幸存的阿木报警，警察在深山中挖出一具无脸女尸，DNA比对显示，女尸与阿木有亲缘关系。阿木崩溃坦白：五年前她曾和姐姐进山，姐姐跌落悬崖，她怕担责独自逃走。女鬼是姐姐，而魅影不是索命，是在帮妹妹找回遗忘的负罪感。", "one_line": "驴友在深山中遇到红衣女鬼索命，报警后却发现，女鬼的脸与其中一名驴友一模一样。", "bucket": "animation"}, {"id": "1131", "title": "机器战警国语", "filename": "m1131.html", "year": "2026", "region": "中国大陆", "genre": "科幻、动作、犯罪", "tags": "赛博格、本土化改编、未来警察、义体人", "summary": "2046年，上海。为了应对高科技犯罪和警力不足，天网集团推出“铁臂工程”：将重伤濒死的警察改造为“执法机器人”。模范交警陆征在一次追捕中坠楼，醒来后发现自己只剩下大脑和脊椎，其他皆为金属与碳纤维。他被命名为“征途-1”，投入治安最混乱的临港新城区。凭借超强火力与精准程序，他迅速成为犯罪克星，媒体称他“机器战警”。但程序设定的“绝对服从”与他残留的人性记忆产生剧烈冲突。他发现，自己亲手抓捕的罪犯中，有人是被陷害的线人；而设计他的总工程师，正是当年临港新城区黑警保护伞的残余势力。一句来自妻子、带着口音的“侬快回来吃饭”，成了改写他底层代码的终极指令。", "one_line": "2046年的上海，一名因公殉职的交警被改造成半人半机的“秩序维持者”，却发现他要对抗的是整个腐败系统。", "bucket": "sci-fi"}, {"id": "1132", "title": "长安伏妖", "filename": "m1132.html", "year": "2021", "region": "中国大陆", "genre": "奇幻, 动作", "tags": "唐朝, 伏妖, 捉妖师, 特效, 降魔", "summary": "唐玄宗年间，长安城妖邪频出，百姓惶恐。御厨小伙计李长安因为误食了一颗被诅咒的“伏妖珠”，体内意外获得了历代最强天师的法力。但他本人毫无降妖经验，甚至连杀鸡都怕。当祸害人间的金毛吼即将破封而出时，李长安被六扇门总捕头硬推上阵。他一边学法术一边闹笑话，却逐渐发现，这场妖祸背后藏着一个关于先皇与宫廷的惊天阴谋。最后一战中，胆小如鼠的厨子必须用最朴素的方式——做一道菜——来封印灭世大妖。", "one_line": "唐朝长安妖祸四起，一个胆小如鼠的厨子被迫拿起了伏妖天师的令牌。", "bucket": "fantasy"}, {"id": "1133", "title": "猫妖小杏", "filename": "m1133.html", "year": "2025", "region": "日本", "genre": "奇幻、治愈、家庭", "tags": "猫妖、乡村、民俗、成长、友情", "summary": "小杏是一个爱捣蛋的9岁女孩，因为嘲笑了一尊路边的地藏菩萨，被惩罚变成一只橘猫。她必须在七天之内、也就是盂兰盆节夜半钟声敲响之前，找到藏在村子三个地方的名字碎片：桥下、神社水井和祠堂抽屉。变成猫后，她遇到了一只活了三百年的老猫妖——它也曾是人类，但放弃了找回名字。在老猫妖的帮助下，小杏渐渐发现：她变成猫不是因为惩罚，而是因为她真正的奶奶年轻时也是一只猫妖，血脉正在觉醒。最后她不急着变回人，反而选择用猫的身体去救被困在火灾里的弟弟，名字在那一刻自动归来。", "one_line": "一个被变成猫的小女孩必须在盂兰盆节结束前找回自己的名字，否则将永远成为一只流浪猫妖。", "bucket": "fantasy"}, {"id": "1134", "title": "妈妈，我不想坐牢", "filename": "m1134.html", "year": "2026", "region": "中国台湾", "genre": "犯罪 / 家庭 / 剧情", "tags": "少年犯, 单亲, 司法", "summary": "单亲妈妈阿芸经营着一家快倒闭的早餐店，儿子小杰是她全部的希望。当小杰目睹妈妈被讨债者欺辱，失手将其推下楼梯致死。法庭上，阿芸拼命揽罪，但小杰仍被判刑三年。在囚车开走前，阿芸隔着玻璃对小杰说：“妈妈很快就来陪你。”小杰以为是安慰。一年后，新一批女囚入监，小杰在放风时看到了穿着囚服的妈妈。原来阿芸为了替儿子顶罪并能在监狱里照顾他，策划了一起保险诈骗案，故意入狱。母子从至亲变成“狱友”，小杰既愤怒又心疼。在监狱这个微型社会里，他们必须学会新的生存法则，一个要对抗狱霸，一个要应对腐蚀。当小杰得知妈妈可能因诈骗罪加刑至十年时，他策划了一场越狱，不为自由，只为让妈妈“无罪释放”。", "one_line": "16岁的少年为保护妈妈过失杀人，入狱前，妈妈对他说：“进去别怕，妈妈也进去陪你。”一年后，妈妈真的成了狱友。", "bucket": "crime"}, {"id": "1135", "title": "夏日乐园2017", "filename": "m1135.html", "year": "2023", "region": "日本", "genre": "青春 / 剧情", "tags": "怀旧， 夏日限定， 友情羁绊， 绝症催泪", "summary": "时间倒回2017年的夏天，那一年智能手机刚刚普及，LINE的提示音取代了课间传纸条。高中生小介、阿悟、真央和雪子面临着即将到来的高考和分别。他们占据了郊区一座即将拆除的废弃游乐园作为暑假的秘密基地。一天，他们在摩天轮的控制室里发现了一本被尘封的日记，日记的主人是一个十年前的女孩，她在日记里记录了自己在这里被霸凌的绝望，以及一个藏在旋转木马下的时间胶囊。四个少年决定在游乐园拆除前的最后一天，找到那个时间胶囊，并替那个女孩完成未了的心愿。随着调查深入，他们发现女孩的遭遇正以另一种形式发生在他们中的某人身上。", "one_line": "2017年夏天，四个高中死党在即将拆除的游乐园里建立了“秘密基地”，却发现了十年前一个女孩在此留下的求救日记。", "bucket": "drama"}, {"id": "1136", "title": "齐妙请微笑", "filename": "m1136.html", "year": "2024", "region": "中国", "genre": "喜剧 / 职场", "tags": "职场，假笑，打工人，荒诞，讽刺", "summary": "商超优秀员工齐妙突然被公司评为“年度假笑冠军”，要送去总部参加“微笑之星特训营”。她以为是一次带薪休假，结果训练营在荒郊野外，教官要求全员24小时露出八颗牙齿，睡觉也要戴微笑固定器。每天考核“发自内心的笑”并打分，不及格者要被关进“小黑屋”观看自己面无表情的监控回放。齐妙暗中调查发现，这个训练营是公司高管用来筛选“没有反抗意识”的奴隶员工，而所有成绩优异的员工最后都被派去了最累的岗位。齐妙联合几名“假笑同伙”策划了一场大逃亡，临走前给所有监视器贴上了自己的大笑照片。", "one_line": "柜台员工齐妙因“微笑不合格”被公司送去“微笑改造营”，却发现那里是洗脑传销式的地狱训练营。", "bucket": "comedy"}, {"id": "1137", "title": "双杀", "filename": "m1137.html", "year": "2022", "region": "香港 / 中国大陆", "genre": "动作, 犯罪, 悬疑", "tags": "杀手, 替身, 兄弟反目, 枪战, 反转", "summary": "金牌杀手“鬼”与“影”搭档七年，从未失手。两人情同手足，一起在东南亚的地下世界闯出名号。某天，神秘雇主开出天价，要求两人完成最后一单“双杀”任务——目标是一对居住在偏远别墅的兄弟。行动当晚，阿鬼突袭楼上，阿影清理楼下。当阿鬼掀开目标被子时，看到的却是一张和自己一模一样的脸——那是他的孪生兄弟。更糟的是，阿影在楼下发现的目标，正是阿鬼的养父。两人同时接到指令：杀了对方，带着钱消失，否则身边所有人都得死。一场别无选择的生死对决，在暴雨夜的别墅中展开，每次“击杀”都引出一个更深的谎言。", "one_line": "顶尖杀手阿鬼接到的终极任务是杀掉自己的搭档，可他不知道，搭档也接到了同样的任务。", "bucket": "action"}, {"id": "1138", "title": "风姿物语银河篇", "filename": "m1138.html", "year": "2025", "region": "日本 / 中国内地", "genre": "科幻 / 奇幻 / 冒险", "tags": "太空歌剧, 修仙, 机甲, 多主角, 史诗", "summary": "公元 3024 年，人类分裂为两大势力：崇尚基因改造和机械飞升的“银河帝国”，以及隐匿在小行星带、修炼灵气的“修仙联盟”。战争持续百年，互有胜负。普通机甲兵陈默在战场上被击中濒死，体内却突然觉醒了一个自称“太虚真人”的修仙者灵魂——他来自十万年前的修仙文明，是唯一知晓“灵能+科技”融合秘密的人。太虚真人用灵气修复了陈默的身体，并教会他同时驾驶机甲和使用飞剑。陈默成为两界通吃的“不伦不类”的存在，被帝国视为叛徒、被联盟视为异端。他带着一个逃婚的帝国公主和一个被逐出师门的修仙少女，踏上寻找上古遗迹“银河之心”的旅程。最终，三人在遗迹中发现了真相：修仙和科技本为一体，分裂是上古阴谋家的骗局。大结局中，陈默融合两派力量，击败了操控战争的幕后AI。", "one_line": "十万年修仙文明与高科技银河帝国开战，一个废柴机甲兵体内觉醒了远古修仙者的灵魂。", "bucket": "sci-fi"}, {"id": "1139", "title": "警察“夏一笑”的快乐生活", "filename": "m1139.html", "year": "2023", "region": "中国大陆", "genre": "喜剧, 生活, 情景剧", "tags": "社区民警, 暖心, 搞笑", "summary": "警校高材生夏一笑一心想办大案，却被分到幸福里社区当片警。这里没有持枪悍匪，只有丢猫的老太太、跳广场舞互殴的大妈、以及一个天天假装喝醉碰瓷的大爷。夏一笑用各种“歪招”解决矛盾：帮大爷直播带货治好碰瓷、用网游术语调解学生斗殴、甚至cosplay外卖员抓捕偷内衣贼。在一系列笑料中，他逐渐理解了“小案不小办”的意义。当一伙真正的骗子盯上社区老人时，夏一笑联合全社区的大爷大妈，上演了一场精彩的“反杀”。", "one_line": "新手片警夏一笑被分到老城区，各种鸡飞狗跳的邻里纠纷让他哭笑不得。", "bucket": "comedy"}, {"id": "1140", "title": "捷京谍影", "filename": "m1140.html", "year": "2024", "region": "中国台湾", "genre": "悬疑, 动作", "tags": "布拉格, 交换日记, 间谍", "summary": "台北女生林真真到布拉格留学，在机场错拿了另一个同款行李箱。打开后发现里面全是看似普通的旅游纪念品，但经过她程序员男友的解码，每一个纪念品对应的二维码都是欧洲地下军火交易的密钥。随即，她的室友离奇坠楼，导师身份成谜，甚至前来接头的“大使馆工作人员”都是假的。林真真必须在捷克警方、台湾黑帮和国际间谍三方势力的夹缝中，利用她本专业的“密码学”知识，破解行李箱中遗物暗藏的信息，找到那个隐藏在查理大桥下的终极机密。", "one_line": "赴捷克留学的普通女生发现，自己错拿的行李箱里，装着整个欧洲地下黑网的交易清单。", "bucket": "suspense"}, {"id": "1141", "title": "搏击英雄", "filename": "m1141.html", "year": "2025", "region": "中国大陆", "genre": "动作 / 运动 / 励志", "tags": "MMA，草根逆袭，社会底层，硬核格斗", "summary": "曾经的省队散打冠军林虎因误伤对手被禁赛，为了给患重病的妹妹凑医药费，他脱下队服，穿上了快递工服。白天他穿梭在城市的大街小巷，忍受客户的刁难和扣款；夜晚，他戴上面具，化名“黑虎”，在无规则的地下黑拳赛场用血肉换取金钱。他的拳头越来越重，但眼神却越来越浑浊。当他终于攒够手术费时，黑心老板设下圈套，让他必须在终极决战中打假拳，否则就废掉他妹妹的医疗机会。决赛之夜，面对同样身世凄惨的对手，林虎摘下了面具，在所有人的注视下，他不再是为了钱，而是为了这些年被践踏的梦想，打出了那记最漂亮的回旋踢。", "one_line": "快递小哥白天送货，晚上在地下拳场搏命，他的最后一单，是为尊严而战。", "bucket": "action"}, {"id": "1142", "title": "再见，黑钱胜地", "filename": "m1142.html", "year": "2022", "region": "美国", "genre": "惊悚 / 犯罪 / 剧情", "tags": "洗钱， 最终季， 家庭决裂， 绝地反击", "summary": "这是大热剧集《黑钱胜地》的大结局衍生篇（或最终季故事）。伯德一家在经历了墨西哥贩毒集团、堪萨斯黑手党和联邦调查局的多重绞杀后，终于攒够了足够的筹码想要离开这个血腥的漩涡。然而，当他们试图关闭赌场洗钱通道时，发现“黑钱”就像流沙，越挣扎陷得越深。马蒂不得不用最后的数学才华，设计了一场能够吞掉各方势力尾款的“完美骗局”；而温蒂则要在政治野心与儿女安全之间做最后的切割。一场决定所有人命运的赌局即将在奥扎克湖畔上演，他们将用自己的方式，对地狱说再见。", "one_line": "为黑帮洗钱数十亿的伯德一家，终于想金盆洗手，却发现退出黑钱的代价，远比加入要高得多。", "bucket": "suspense"}, {"id": "1143", "title": "我的心", "filename": "m1143.html", "year": "2006", "region": "法国", "genre": "爱情, 音乐", "tags": "心脏移植, 钢琴家, 宿命", "summary": "著名钢琴家斯蒂芬素来以精准却毫无感情的演奏著称。在接受心脏移植手术后，他发现自己无法再弹奏巴赫，而是开始即兴弹出充满爱意的爵士乐。更诡异的是，他总是不自觉地走到城市另一端的一间花店门口，盯着女店主玛侬发呆。玛侬的未婚夫半年前死于车祸，而那颗心脏正是移植给斯蒂芬的那一颗。随着接触加深，斯蒂芬分不清这到底是自己的感情，还是心脏的记忆。在演奏会上，玛侬出现在观众席，斯蒂芬的手指在琴键上颤抖，他弹奏了一首死者生前写给她的情歌，然后走向她，说：“他的心告诉我，他从未离开。”", "one_line": "一名性格冷酷的钢琴家接受心脏移植后，突然爱上了陌生人的未婚妻，因为跳动的心脏记得死者生前的挚爱。", "bucket": "romance"}, {"id": "1144", "title": "无怨无悔", "filename": "m1144.html", "year": "1997", "region": "中国香港", "genre": "剧情 / 犯罪", "tags": "黑帮, 兄弟情, 宿命", "summary": "阿鬼曾是叱咤风云的黑帮打手，因大佬背叛导致结拜兄弟阿强惨死，他心灰意冷退出江湖，开了个小餐馆。二十年后，阿鬼被诊断出肺癌晚期。他本打算平静死去，却无意中得知当年出卖他们的幕后黑手，如今已是商业巨鳄，且正在洗白竞选议员。阿鬼心中那根刺再次扎了进来。他拒绝了曾经小弟们的帮忙，独自一人拿着那把生锈的刀，开始跟踪目标。在过程中，他遇到了阿强已成年的女儿，女孩并不知道他的身份，只是把他当成一个和蔼的叔父。阿鬼在亲情与仇恨之间备受煎熬。最后，在一场慈善晚会上，阿鬼没有选择动手，而是在众人面前揭露了对方的罪行，自己则从容地被警察带走，他对着镜头说了一句：“阿强，哥做到了。”", "one_line": "金盆洗手的黑帮大佬得知绝症后，要为死去的兄弟讨回最后的公道。", "bucket": "drama"}, {"id": "1145", "title": "圣诞夜大火", "filename": "m1145.html", "year": "2024", "region": "西班牙", "genre": "灾难 / 历史 / 剧情", "tags": "真实事件改编, 群像戏, 人性, 救援", "summary": "改编自真实灾难事件。1983年的圣诞夜，巴塞罗那的一栋高层商业大厦顶楼夜店因烟花操作失误引发大火。本片聚焦于被困在电梯及楼道中的数个家庭：一对正准备求婚的同性情侣、一名带着两个孩子逃离家暴丈夫的母亲、以及一位退休后返聘的老年保安。火势从顶层向下蔓延，由于设计缺陷，所有逃生通道都变成了烟囱。救援队在外围束手无策，楼内的人们只能通过破损的手机信号与外界联系，留下最后的遗言。影片采用近乎实时拍摄的手法，展现了从起火到整栋楼坍塌的120分钟里，人性的光辉与绝望的交织。", "one_line": "圣诞前夜，一栋住满狂欢者的商业大厦突然燃起大火，电梯成了唯一死亡陷阱。", "bucket": "drama"}, {"id": "1146", "title": "队长小翼2世少篇", "filename": "m1146.html", "year": "2024", "region": "日本", "genre": "运动, 热血", "tags": "足球, 童年经典, 世少赛, 热血", "summary": "世少篇续作，日本队终于踏上世界舞台。首战对手是拥有“欧洲最强射手”的德国队。大空翼的膝盖旧伤未愈，岌岌可危。日向小次郎的猛虎射门被德国门将单手接住，岬太郎的传球路线全部被封死。上半场0:3落后。中场休息时，教练只说了一句：“你们是为了什么踢球？”下半场，所有人开始为彼此而战。大空翼忍着伤痛完成了一次倒钩助攻，日向用头球破门后满脸是血。最后一分钟，大空翼用那只能站立的脚踢出了“曲线射门”。球进了。漫画式的夸张，却燃得让人相信奇迹。", "one_line": "世少赛开战，大空翼率领日本队对阵世界强敌，每一个倒钩射门都赌上了足球少年的全部。", "bucket": "horror"}, {"id": "1147", "title": "黑衣马术师传奇", "filename": "m1147.html", "year": "2022", "region": "英国", "genre": "剧情, 冒险, 运动", "tags": "马术, 复仇, 庄园, 黑马", "summary": "天才马术少年亚瑟在目睹父亲于比赛中坠马身亡后，消失十年，化身为“黑衣马术师”归来。他骑着父亲留下的那匹无人能驯服的黑色烈马，以极其古怪凌厉的骑术横扫欧洲各项邀请赛。每一次获胜，他都会在赛场留下一个神秘的符号。随着他的名气越来越大，当年与父亲同台竞技的老骑手们开始坐立不安。亚瑟发现父亲的马鞍被人动了手脚，而这背后牵扯到一个涉及非法赌马和赛马培育的庞大利益集团。他不仅要赢回荣誉，更要在马背上，亲手将凶手绳之以法。", "one_line": "神秘的黑衣人骑着不驯的黑马，挑战欧洲各大马术豪门，只为揭开父亲死亡的真相。", "bucket": "drama"}, {"id": "1148", "title": "九丹", "filename": "m1148.html", "year": "2023", "region": "中国大陆", "genre": "剧情 / 家庭 / 年代", "tags": "女性成长， 姐妹情仇， 乡村， 励志", "summary": "上世纪90年代北方农村，性格截然不同的姐妹九丹和九燕相依为命。姐姐九丹善良隐忍，妹妹九燕精明自私。九燕因过失伤人面临牢狱之灾，她痛哭流涕地恳求九丹为自己顶罪。念及姐妹亲情，九丹含冤入狱。五年后，九丹出狱回家，却发现家中已无她立足之地：九燕不仅嫁给了九丹青梅竹马的恋人，还成了村里的致富带头人，备受赞誉。面对亲情的背叛和爱情的逝去，九丹从最底层的零工做起，凭借一手祖传的酿酒手艺，艰难开辟自己的道路。最终，真相在一次意外中浮出水面，姐妹俩不得不直面人性的审判。", "one_line": "善良姐姐被迫替妹妹顶罪入狱，出狱后却发现妹妹已取代她的一切。", "bucket": "drama"}, {"id": "1149", "title": "音速小子4", "filename": "m1149.html", "year": "2026", "region": "美国", "genre": "喜剧 / 动作 / 动画 / 科幻", "tags": "索尼克，穿越时空，金属索尼克，合家欢", "summary": "索尼克在大都会追蛋头博士时，一脚踢碎了博物馆的时间宝石。时间线瞬间崩坏：中世纪出现了金环，恐龙时代有电视。索尼克、塔尔斯和纳克鲁斯被迫分散到不同时代：索尼克掉进古埃及，被当成圣甲虫；塔尔斯落在美国西部，用科技骗过印第安人；纳克鲁斯误入二战战场，徒手撕坦克。而蛋头博士却趁机在每个时代抢夺科技。最终三人用宝石碎片召唤出“时间索尼克”合体形态，把所有科技和蛋头一起扔回了最初的时间点。", "one_line": "索尼克不慎打碎时间宝石，与塔尔斯、纳克鲁斯穿越到各个错误时代，必须赶在蛋头博士之前修复历史。", "bucket": "comedy"}, {"id": "1150", "title": "天山雪", "filename": "m1150.html", "year": "2024", "region": "中国大陆", "genre": "剧情 / 冒险", "tags": "雪山, 护林员, 悬疑", "summary": "在天山深处，年迈的护林员巴特尔是方圆百里唯一的守护者。一场百年不遇的雪崩后，他在冰川裂缝里发现了一架几十年前坠毁的运输机，机身布满弹孔，内部却有来历不明的现代加密设备。巴特尔还没来得及上报，一群装备精良的“登山队”便悄然进山，声称寻找失踪队友，实则步步逼近坠机点。老人凭借对山脉每一寸土地的熟悉，与对方展开一场在暴风雪中的生死周旋，最终揭开了一个被冰雪掩埋三十年的国家机密。", "one_line": "最后一位天山护林员在雪崩中发现一架载满秘密的失事飞机，却引来了境外势力。", "bucket": "drama"}, {"id": "1151", "title": "身穿十二单衣的恶魔", "filename": "m1151.html", "year": "2024", "region": "日本", "genre": "古装悬疑", "tags": "平安时代，宫廷斗争，连环杀人，女性复仇", "summary": "永祚元年，日本宫廷接连发生贵族离奇死亡，死者均为男性，死前面带诡异微笑。因大雪封路，外界的武士无法入宫，所有公卿吓得闭门不出。只有中宫身边的橘雅子，因必须遵守礼法，每日穿着重达二十公斤的十二单衣行走于回廊。她发现所有死者生前都曾参与迫害一名叫“阿菊”的女官。雅子利用自己行动迟缓、不易被怀疑的优势，在层层叠叠的衣襟下藏匿小刀和毒药检测纸。当她步步逼近真相，发现凶手竟是自己最信赖的乳母，而下一个目标，正是曾对阿菊见死不救的天皇。雅子必须在守护宫廷秩序与揭发皇族罪恶之间，做出痛苦抉择。", "one_line": "平安时代，一位必须穿着沉重十二单衣的贵族女子，成了宫中唯一能追查连环杀人案的“侦探”。", "bucket": "action"}, {"id": "1152", "title": "吉尔的妻子", "filename": "m1152.html", "year": "2025", "region": "美国", "genre": "惊悚 / 剧情", "tags": "心理操控, 婚姻, 替代, 人格分裂", "summary": "吉尔和艾米莉是众人眼中的完美夫妻。一天，吉尔突然失踪，警方认定他意外死亡。在整理遗物时，艾米莉发现了一个秘密仓库，里面住着一个名叫安娜的女孩。安娜整容成了艾米莉的样子，学习她的口音、动作、甚至记忆，仿佛一个“备用艾米莉”。艾米莉震惊之余，开始调查丈夫的意图。随着深入，她发现吉尔有严重的控制欲和心理疾病，他计划在“不满意”艾米莉时，就抹杀她，让安娜取而代之。更可怕的是，安娜不仅仅是受害者，她逐渐展现出比吉尔更可怕的疯狂，她认为自己才是“真正的艾米莉”，并开始模仿艾米莉的生活，试图取代她的一切。两个女人展开了一场关于身份与存在的心理战争。", "one_line": "丈夫失踪后，妻子发现他生前一直在偷偷培养一个和自己长得一模一样的“替代品”。", "bucket": "suspense"}, {"id": "1153", "title": "逆转裁判", "filename": "m1153.html", "year": "2025", "region": "日本", "genre": "悬疑, 律政", "tags": "法庭推理, 游戏改编, 冤案昭雪", "summary": "改编自同名游戏。新人律师成步堂龙一接手的第一个独立案件，看似一目了然：被告人在凶器上留有指纹，监控拍到他在案发时间出现在附近。成步堂在导师绫里千寻的指导下，从控方的证物链中逐一找出微小漏洞——时间戳的秒数误差、证人的角度差、监控中被忽视的阴影。当他在法庭上大喊“异议あり”并出示反证时，整个法庭的气氛为之一变。随着案件深入，他发现这桩普通凶杀案背后涉及检察官办公室和警局的证据篡改链条。成步堂不仅要为当事人洗清冤屈，更要在一个默许“有罪推定”的司法系统中证明：真相永远比效率重要。", "one_line": "新人律师成步堂龙一接手一桩铁证如山的杀人案，在法庭上喊出“异议”，发现证物链指向一个更大的司法黑幕。", "bucket": "suspense"}, {"id": "1154", "title": "末代福晋", "filename": "m1154.html", "year": "2026", "region": "中国大陆", "genre": "历史，剧情", "tags": "清末，女性，王府，家国", "summary": "宣统三年，局势动荡。肃亲王府的末代福晋叶赫那拉·婉贞表面骄奢淫逸，整日沉迷牌局，被京城贵族嘲笑为“最没脑子的福晋”。革命党人逼她交出王府藏宝图，日本人开出天价收买国宝《九州山河图》，满清遗老逼她保住祖产。所有人都在等这个“蠢女人”做出选择。距离抄家还有三天，婉贞召集所有势力开了一场牌局。她当众烧毁了真迹，把假账册给了革命党，把赝品卖给了日本人，然后坦然走进监狱。百年后，博物馆展出的《九州山河图》旁边写着：捐赠者，婉贞。捐赠时间，民国元年。", "one_line": "大清最后一位福晋在王府被抄前三天，用一本假账册换走了真国宝，自己却被永远钉在耻辱柱上。", "bucket": "drama"}, {"id": "1155", "title": "健将联盟", "filename": "m1155.html", "year": "2025", "region": "中国大陆", "genre": "喜剧, 运动, 励志", "tags": "残奥会, 逆袭, 热血, 群像", "summary": "前短跑名将因伤截瘫后自暴自弃，被社区安排去照顾几个“特殊”孩子：一个脑瘫但智商超群的天才，一个失去双臂的街头混混，一个重度抑郁的前体操队员，以及一个视力障碍的音乐生。为了逃避现实，教练随口说要带他们打硬地滚球（一项重度残障人士运动）。没想到这群被人嘲笑为“废物联盟”的人，在无数次冲突与磨合中，竟然打出了全国冠军。他们从互相嫌弃到生死相依，目标直指残奥会，向世界证明：残缺的只是身体，不屈的永远是灵魂。", "one_line": "五个被体育界淘汰的“废物”，组队冲击残奥会硬地滚球金牌。", "bucket": "comedy"}, {"id": "1156", "title": "哈啦大发师2", "filename": "m1156.html", "year": "2023", "region": "中国台湾", "genre": "喜剧 / 家庭", "tags": "理发店, 返乡, 社区, 笑中带泪, 台语", "summary": "在台北闯荡失败的发型师阿乐，灰溜溜回到台南小镇，被迫接手父亲留下的快倒闭的老式理发店“哈啦大发师”。店里唯一的员工是说话比剪刀还锋利的老员工桂姨，以及一只会骂脏话的鹦鹉。阿乐本想用都市流行技法改造老店，却遭到街坊老顾客的集体抵制。为了生存，他不得不跟桂姨学习“洗头聊八卦、剪发送人生建议”的老派哲学。过程中，他发现了父亲生前留下的“秘密账本”，上面记满了欠债与善举。阿乐最终将现代审美与本土人情味融合，不仅救活理发店，更让它成为治愈整个社区的深夜洗头食堂。", "one_line": "破产发型师返乡继承老店，却发现店里只剩一个爱讲干话的阿嬷和一只鹦鹉。", "bucket": "comedy"}, {"id": "1157", "title": "女子戏班", "filename": "m1157.html", "year": "2023", "region": "中国大陆", "genre": "剧情 / 历史", "tags": "民国、戏曲、女性群像、传承、复仇", "summary": "民国二十六年，北平“荣春社”坤班正值鼎盛。台柱子筱牡丹色艺双绝，二牌花旦巧云泼辣爽利，老旦海棠沉稳内敛。日军进城后，戏班被汉奸胁迫为慰军演出。班主拒绝后被枪杀，筱牡丹被迫接管戏班。地下党老陈以琴师身份潜入，利用戏箱运送药品和情报。巧云在一次传递密信时被捕，受尽酷刑未吐一字。海棠伪装成日本军官的佣人，偷出城防图。最终全戏班在日军庆功宴上登台，戏台上唱的是《霸王别姬》，戏台下早已埋好炸药。她们用最后的演出为城外进攻的游击队发信号。", "one_line": "1937年北平沦陷，一个坤班女戏子们在枪口下用唱腔和胭脂藏起抗日密信。", "bucket": "drama"}, {"id": "1158", "title": "只怪太操心", "filename": "m1158.html", "year": "2022", "region": "韩国", "genre": "喜剧、家庭", "tags": "中年危机、控制欲母亲、MBTI、代际冲突、治愈", "summary": "一辈子为家庭操碎了心的母亲吴爱子，在丈夫去世后陷入了严重的空巢焦虑。她偷偷用养老钱买下了一栋小公寓，以“投资装修”为名，强行让三个成年子女搬回来同住。大儿子是失业的编剧，二女儿是不婚主义的牙医，小儿子是试图出柜的设计师。吴爱子用“妈妈视角”插手他们的人生：逼儿子去相亲、偷看二女儿的病历、给小儿子介绍“好女孩”。孩子们苦不堪言，制定了一百条“反操控计划”。在一系列的鸡飞狗跳中，吴爱子被查出早期阿尔茨海默症，她不断“操心”的背后其实是害怕被遗忘。当孩子们终于理解了母亲的恐惧，他们开始反过来“操心”母亲，关系从对抗变成了守护。", "one_line": "控制欲超强的妈妈和三个想要逃离的孩子，在被迫同居的公寓里上演笑泪交织的拉锯战。", "bucket": "comedy"}, {"id": "1159", "title": "斗破苍穹 动态漫第二季", "filename": "m1159.html", "year": "2025", "region": "中国大陆", "genre": "奇幻 / 动作 / 冒险", "tags": "异火、少年逆袭、动态漫画、斗气、热血", "summary": "萧炎在迦南学院成功收服陨落心炎，斗气飙升至斗王巅峰，却也因此暴露了体内多种异火的秘密。天焚炼气塔地底突然震动，一座远古斗圣的遗迹破土而出，引发了中州各方势力的觊觎。魂殿派出四大尊老携“锁魂链”前来抓捕萧炎，誓要抽离他的异火融合体。萧炎与萧门兄弟们一边探索遗迹争夺远古传承，一边与魂殿展开游击战。在遗迹深处，他遇到了被困三百年的药老旧友——一位擅长傀儡术的神秘老者。老者告诉他，魂殿收集灵魂的真实目的不是为了炼药，而是在召唤一名远古邪斗圣的残魂。第二季结尾，萧炎被迫提前融合三种异火，身体濒临崩溃。危急时刻，药老燃烧部分灵魂力强行唤醒萧炎体内隐藏的“龙凰血脉”。萧炎双眼变为金紫双色，一字一顿：“魂殿，你们的死期到了。”", "one_line": "萧炎收服陨落心炎后实力暴涨，但天焚炼气塔下的远古遗迹突然开启，引来了魂殿的疯狂追杀。", "bucket": "fantasy"}, {"id": "1160", "title": "神无", "filename": "m1160.html", "year": "2024", "region": "日本", "genre": "奇幻， 悬疑", "tags": "神明， 空无， 轮回， 治愈", "summary": "深山中的“无神村”有一个恐怖的诅咒：每年夏夜，必有一人会毫无征兆地凭空消失，不留任何痕迹，村民称之为“神隐”。大学生神代明日香为了研究这个民俗传说回到故乡，她的祖母就是多年前第一个“消失”的人。她通过现代科学仪器和古老村志的交叉对比，发现所有消失者都指向一个共同的量子态：他们同时存在于这个世界和另一个世界。明日香找到了两个世界的“裂缝”，并主动进入。另一个世界名为“神有”，那里有一个温和的“神”在为所有迷失的灵魂编织永恒的幻梦。但这个幻梦正在吞噬现实，当越来越多的人“自愿消失”，明日香必须做出选择：是唤醒村民，还是留在有“神”的虚无中。", "one_line": "在一个没有神明的村庄，每年都有一个人会“消失”，而主角发现，消失的人都去到了一个有“神”的世界。", "bucket": "fantasy"}, {"id": "1161", "title": "姐妹双行之巴黎护照", "filename": "m1161.html", "year": "2024", "region": "中国大陆", "genre": "喜剧 / 冒险", "tags": "姐妹CP, 异国奇遇, 身份错位", "summary": "姐姐是雷厉风行的霸道总裁，妹妹是稀里糊涂的二次元宅女。两人去巴黎谈收购，结果护照、钱包全被抢。大使馆补办需一周，而明天签约失败公司就完了。妹妹提议去“黑市”买假护照。姐妹俩误入地下护照工厂，发现这里的老板竟是警察局长。为了拿到护照，姐姐假扮成俄罗斯黑帮情妇，妹妹则用cosplay技能伪装成局长的初恋。在一场混乱的面具派对中，姐妹俩不仅拿回了护照，还顺手偷拍了局长受贿的证据。第二天签约现场，姐姐用流利的法语签下合同，妹妹则在旁边睡着了，嘴角还挂着口水。", "one_line": "为了夺回被偷的护照，一对姐妹花在巴黎黑市上演了一出狸猫换太子。", "bucket": "comedy"}, {"id": "1162", "title": "夺爱、高校教师", "filename": "m1162.html", "year": "2004", "region": "日本", "genre": "悬疑, 爱情", "tags": "师生恋, 复仇, 心理操控, 校园", "summary": "新人教师柏木玲子被班上三名学生联手伪造聊天记录，诬陷她与男学生发生不正当关系，最终被学校开除并遭舆论绞杀。三年后，她通过整容和假身份以“铃木薰”的名字重回同一所高中，成了最受学生爱戴的语文老师兼班主任。当年陷害她的三名学生，一个留校当了体育老师，一个成了PTA会长儿子，还有一个是她班上的学生家长。她不动声色地利用每个人的软肋和心理漏洞，让他们一步步主动说出当年的真相，并在校内公开放映录音证据时微笑着问：“现在，谁才是坏人？”", "one_line": "高中女教师被学生设局陷害身败名裂，三年后她换了身份回到同一所学校成为最受欢迎的老师，开始温柔而精准的报复。", "bucket": "suspense"}, {"id": "1163", "title": "征服钱海", "filename": "m1163.html", "year": "2022", "region": "美国", "genre": "剧情、金融、犯罪", "tags": "华尔街、欺诈、卧底、兄弟反目、资本游戏", "summary": "哥哥阿诚是数学天才，弟弟阿信是前警察。两人受FBI委托，以实习生身份混入号称“钱海”的纽约对冲基金，暗中收集洗钱证据。起初配合默契，哥哥用量化模型发现资金暗流，弟弟则记录人际网。但随着利润分成到手，哥哥开始享受顶层生活，甚至主动帮基金设计更隐蔽的避税漏洞。弟弟多次劝返无效，反而被哥哥架空。最终弟弟选择上交全部证据，包括针对哥哥的那份。庭审那天，哥哥对弟弟说了句“你果然是最好的警察”。七年后哥哥出狱，两人在一条破旧渔船边沉默对视，剧终于一个没有拥抱的和解。", "one_line": "一对草根兄弟潜入华尔街顶级对冲基金做卧底，哥哥却渐渐沉迷金钱游戏，弟弟不得不亲手将他送入监狱。", "bucket": "drama"}, {"id": "1164", "title": "大叔与少年", "filename": "m1164.html", "year": "2025", "region": "中国大陆", "genre": "公路, 代际冲突, 救赎, 成长", "tags": "刑满释放, 寻亲之旅, 忘年交, 中国小镇", "summary": "五十岁的老混子强哥出狱后发现世界早已抛弃他，唯独一个患有严重自闭症的少年亮亮像影子般跟着他。亮亮口袋里只有一张模糊的工厂照片和一句话：“带我去找爸爸。”强哥起初只想骗走亮亮的救助金，却被亮亮惊人的机械维修天赋所震撼。两人骑着一辆改装的破三轮踏上公路，遭遇了地痞、骗子、善良的寡妇和落魄的工人。当真相揭晓——亮亮的父亲早已死在强哥当年那场斗殴中时，这场救赎之旅才真正开始。", "one_line": "一个刚出狱的中年混混，带着一个自闭症少年骑着破三轮穿越中国，只为寻找少年口中“不存在的父亲”。", "bucket": "fantasy"}, {"id": "1165", "title": "厚颜无耻的人", "filename": "m1165.html", "year": "2024", "region": "韩国", "genre": "剧情 / 犯罪 / 黑色幽默", "tags": "诈骗, 反转, 黑色幽默, 小人物, 道德困境", "summary": "男主角赵南振是业内闻名的骗子，专挑为富不仁者下手。某天他接到神秘委托，目标是一对古怪的老夫妻。他精心设计多重身份接近对方，却发现无论自己扮演理财师、神父还是远房侄子，老夫妻都笑脸相迎、乖乖掏钱。当他认为这是职业生涯最轻松的一票时，突然发现所有转账记录都指向同一个海外账户——他自己的。更诡异的是，那对老夫妻家中挂着的全家福里，年轻时的父亲，长得和他一模一样。", "one_line": "一个靠行骗为生的男人接下一单天价任务，却发现自己骗的每个对象都是同一个人。", "bucket": "drama"}, {"id": "1166", "title": "法证先锋4", "filename": "m1166.html", "year": "2020", "region": "中国香港", "genre": "悬疑 / 犯罪 / 刑侦", "tags": "高科技破案, 法医学, 单元剧", "summary": "法证部、法医科与重案组再次联手。高级化验师高安接手法证先锋首位化验师的冷案：一具1989年的骸骨，心脏处插着一支限量版钢笔。调查中，他们发现近期发生的“冻肉杀人案”“钢琴线割喉案”“药厂投毒案”竟都与这具骸骨有关，且每案现场都留下了同一本诗集残页。随着富商、退休法官、知名医生相继涉案，真相指向三十年前一场被掩盖的校园霸凌致死案。当年的施暴者如今已是社会名流，而真正的策划者竟是一直在帮助警方破案的一名心理侧写师。最终高安在实验室用最新DNA methylation技术锁定真凶。", "one_line": "一具埋在水泥墙里三十年的骸骨被挖出，将四桩看似独立的完美犯罪串联成一张复仇网。", "bucket": "suspense"}, {"id": "1167", "title": "传教士第二季", "filename": "m1167.html", "year": "2017", "region": "美国", "genre": "奇幻 / 冒险 / 剧情", "tags": "反英雄, 超自然, 公路片, 血腥, 信仰", "summary": "第二季紧接上季结局，杰西拥有了“创世之力”（一声令下，万物遵从），但这股力量让他成为天堂、地狱乃至圣杀者组织的追杀目标。为了摆脱困境并搞明白“上帝为什么要弃天庭而去”，杰西、吸血鬼女友图丽普以及嗜酒如命的爱尔兰人卡西迪踏上了横跨美国的公路之旅。他们一边躲避追杀，一边在红灯区、小镇酒吧甚至黑帮巢穴寻找上帝的踪迹。本季在暴力和荒诞中穿插了大量关于“信仰是什么”的哲学思考。杰西逐渐发现，拥有神的力量未必能救赎他人，连自己都无法保护。", "one_line": "一个拥有上帝之力的传教士，带着吸血鬼女友和爱尔兰酗酒搭档，开车寻找被贬下凡的上帝。", "bucket": "fantasy"}, {"id": "1168", "title": "我真的爱死你", "filename": "m1168.html", "year": "2003", "region": "中国香港", "genre": "爱情 / 喜剧 / 恐怖", "tags": "黑色幽默, 病娇, 港式鬼片, 人鬼恋", "summary": "花花公子阿强对女友阿蚊厌倦后提出分手，阿蚊伤心欲绝过马路时被车撞死。当晚阿蚊的鬼魂就出现在阿强床上，不是索命，而是要求阿强“继续爱我，而且要比以前更爱我”。从此阿强过上求生不得求死不能的生活：阿蚊鬼魂会在他与其他女人亲热时突然现身做鬼脸，会在他睡觉时站在床边盯他一整夜，还会附身到他老板身上要求加薪和批假陪“女朋友”。阿强请来各路道士捉鬼，结果道士反被阿蚊教训。绝望中阿强找来阿蚊生前的闺蜜帮忙，却意外发现阿蚊是被闺蜜推下车的。真相大白后阿蚊心愿了结，在阿强真正说出“我真的爱过你”后成佛离去。", "one_line": "渣男想甩掉女友，女友却意外死亡并变成厉鬼，天天逼他“爱到死为止”。", "bucket": "romance"}, {"id": "1169", "title": "拥抱大白熊", "filename": "m1169.html", "year": "2024", "region": "韩国", "genre": "剧情 / 治愈 / 家庭", "tags": "抑郁症, 玩偶服, 治愈, 温情, 邻里关系", "summary": "23岁的“小凛”患有严重的社交恐惧症，无法与人进行正常眼神交流。在社工的帮助下，她得到了一份特殊工作：穿上厚重的“大白熊”玩偶服，在商业街为一家新超市发传单。躲在玩偶服里的小凛感到前所未有的安全，她开始自由地舞蹈、笨拙地给孩子们气球。渐渐地，这条日渐萧条的商业街上，商户们都爱上了这只“大白熊”：失明的老奶奶把它当成儿子；单亲家庭的小女孩每天等它放学；就连脾气暴躁的鱼铺老板也会偷偷给它留一条鱼。小凛通过大白熊的身份，学会了倾听和付出。但当商业街面临拆迁危机时，小凛必须在众人面前脱下头套，以真实的面目发出声音。这一次，她必须直面恐惧。", "one_line": "一个重度社恐的女孩穿上大白熊玩偶服在街头发传单，意外治愈了整条街的孤独灵魂，包括她自己。", "bucket": "drama"}, {"id": "1170", "title": "野狼呼叫21", "filename": "m1170.html", "year": "2023", "region": "美国", "genre": "战争、动作、剧情", "tags": "越战、无线电、真田、孤独", "summary": "1968年，越战前线。通讯兵“野狼21”所在的巡逻队在丛林中遭遇伏击全军覆没，仅他一人幸存，且身受重伤。为了在敌人搜捕中活下去，他利用手里唯一的电台，假装大部队还在行动：模仿队长下达撤退命令，模仿机枪手扫射，模仿医护兵求救。这种诡异的操作不仅迷惑了越共游击队，甚至也骗过了前来救援的美军。在这场孤独的心理战中，“野狼21”逐渐分不清自己到底是谁，精神濒临崩溃。最后他在友军火力覆盖的前一刻被救出，但从此失去了说话的能力，因为他已经“杀死”了自己的所有战友。", "one_line": "越南丛林深处，一名负责空中支援引导的通讯兵在部队全灭后，独自对着无线电模仿全军的声音，骗过了敌人的围剿。", "bucket": "drama"}, {"id": "1171", "title": "男子拳击", "filename": "m1171.html", "year": "2024", "region": "美国", "genre": "运动，剧情，励志", "tags": "拳击，变性选手，性别争议，体育精神，父女", "summary": "跨性别男性拳手迈卡已经完成激素治疗和胸部重建手术，合法参加业余男子组拳击比赛。但他连赢三场后，所有对手开始集体罢赛，理由是“生理女性骨骼密度差异”。拳击协会陷入两难。这时，曾经的世界拳王、56岁的退役老将比尔·“铁锤”·汉森主动申请与迈卡打一场表演赛。所有人以为比尔是去“教训”迈卡，但比尔在发布会上说：“我打了三十年拳，见过最硬的汉子和最怂的娘们。我想和这个年轻人打一场，因为他是唯一一个敢站在男子组里的人。”比赛打满十个回合，最后两人同时倒地，相视而笑。赛后投票，男子拳击协会全票通过迈卡的参赛资格。", "one_line": "一名跨性别男拳手参加男子组比赛，却被所有对手抵制，直到一位退役老将主动递上手套。", "bucket": "drama"}, {"id": "1172", "title": "蓝色茉莉", "filename": "m1172.html", "year": "2023", "region": "美国", "genre": "剧情", "tags": "女性, 心理, 阶级跌落, 都市", "summary": "茉莉曾是一位光芒万丈的纽约名媛，丈夫哈尔是金融界新贵。谁料哈尔因巨额诈骗被捕，财产全部查封，茉莉一夜之间变得一无所有。她被迫离开奢华生活，飞到旧金山投靠妹妹金洁。金洁住在破旧街区，做着收银员工作，两人生活格格不入。茉莉试图遮掩过去，谎称丈夫只是因病去世，同时拼命寻找机会重返上流社会。她在一家牙医诊所当前台，甚至假装高学历和丰富人脉，试图钓到新的金龟婿。就在她以为自己即将嫁给一位外交官时，往事被妹妹的前夫当众揭穿。婚礼梦碎，茉莉坐在公园长椅上，对着空气喃喃自语，精神彻底崩塌。影片以冷峻的镜头刻画了一个时代泡沫下走投无路的女性。", "one_line": "曼哈顿名媛茉莉因丈夫诈骗入狱而一夜间跌落底层，她试图隐瞒过去在旧金山重攀上流社会。", "bucket": "drama"}, {"id": "1173", "title": "坏坏爱", "filename": "m1173.html", "year": "2025", "region": "中国大陆", "genre": "爱情 / 喜剧", "tags": "欢喜冤家，职场反套路，嘴硬心动", "summary": "广告公司里，策划总监陆尧和客户总监苏棠并称“双煞”，一个逼哭文案，一个气走甲方。公司合并部门，两人被迫共用一间办公室，开始无休止的“战争”：偷藏对方文件、调高对方空调温度、在汇报时公然拆台。直到某次团建醉酒，两人在KTV角落接吻，第二天全公司疯传视频。为保住饭碗，他们被迫假装情侣，却在假戏中逐渐发现：对方那些“坏”，恰恰是自己最渴望的安全感。结局电梯之吻，甜到齁嗓。", "one_line": "两个全员公认的“职场恶人”互相给对方使绊子，结果使着使着亲上了。", "bucket": "romance"}, {"id": "1174", "title": "缅因姐妹", "filename": "m1174.html", "year": "2023", "region": "美国", "genre": "剧情， 公路", "tags": "姐妹情， 治愈， 小镇生活", "summary": "姐姐艾琳是波士顿投行精英，妹妹露比是缅因小镇的单亲妈妈，两人五年未说话。母亲去世后遗嘱规定：她们必须一起将母亲的骨灰撒在缅因州七个地标，否则遗产全部捐给厌恶的教会。上路后冲突不断，艾琳嫌弃露比的生活混乱，露比指责艾琳从未回家。在第二个停靠点阿卡迪亚国家公园，露比无意间看到艾琳的诊断书——早期多发性硬化。在第三个停靠点龙虾镇，艾琳发现露比一直默默替母亲偿还医疗债务。两人在暴雨中修车时彻底和解，最终将骨灰撒在了母亲初恋的情人崖，而非遗嘱列出的任何一个地点。", "one_line": "性格迥异的姐妹因母亲遗嘱被迫共驾一辆破皮卡横跨缅因州，途中发现对方藏了半生的秘密。", "bucket": "drama"}, {"id": "1175", "title": "陨石噩梦", "filename": "m1175.html", "year": "2026", "region": "美国", "genre": "科幻 / 惊悚", "tags": "天灾降临, 密室逃生, 倒计时", "summary": "一颗小型陨石毫无征兆地击穿了纽约一栋摩天大楼的顶部，导致大楼结构失衡，随时可能坍塌。在这场灾难中，五名互不相识的男女被困在了一部高速电梯里，悬在50层的高空。电梯内通讯中断，只有一部老旧的对讲机还能接收到外界的零星消息，告诉他们救援队至少需要两小时才能到达，但大楼最多只能撑三十分钟。五人中有一名结构工程师、一名护士、一名退役军人、一名孕妇和一名黑客。他们必须在极度恐慌和资源匮乏的情况下，利用彼此的专业知识，试图手动打开电梯门并爬到尚未断裂的楼层，而每一次错误的尝试，都可能让电梯直接坠入深渊。", "one_line": "一颗陨石击中了市中心的大厦，困在电梯里的五个人必须在氧气耗尽前找到逃生通道。", "bucket": "sci-fi"}, {"id": "1176", "title": "马洛", "filename": "m1176.html", "year": "2022", "region": "美国", "genre": "悬疑 / 犯罪", "tags": "硬汉侦探, 黑色电影, 复古风, 连环案", "summary": "1939年，洛杉矶。硬汉侦探菲利普·马洛受一位美艳贵妇委托，寻找她失踪的女儿。表面看只是一个叛逆少女离家出走的案件，但随着调查深入，马洛发现这背后牵扯到好莱坞的色情制片黑幕、腐败的警察局长以及一个热衷于猎杀富家女的连环杀手。马洛在灯红酒绿的洛杉矶街头穿梭，一边要应对黑帮的追杀，一边要提防委托人藏起来的秘密。当真相水落石出，马洛才发现：他找到的不仅是一个女孩的下落，更是一整座城市的腐烂心脏。", "one_line": "洛杉矶私家侦探马洛受托寻找失踪的女继承人，却卷入了一场涉及好莱坞与黑帮的阴谋。", "bucket": "suspense"}, {"id": "1177", "title": "春家小姐是讼师第一季", "filename": "m1177.html", "year": "2022", "region": "中国大陆", "genre": "古装 / 律政 / 喜剧", "tags": "女讼师, 大唐, 破局, 平权, 单元探案", "summary": "春风县，员外之女春荼蘼从小痴迷律法，偷读《唐律疏议》。父亲入狱后，她女扮男装上公堂，竟以“律无明文不为罪”翻案成功。第一季共12个单元案件，涉及田产霸占、寡妇再嫁、僧侣遗产、奴婢自赎等真实大唐律例冲突。她一边帮底层百姓赢官司，一边与未婚夫、县衙主簿沈大人斗智斗勇——对方主张“情理法”，她坚持“法不容情”。过程中她发现父亲入狱背后牵涉到一桩盐铁私贩大案。结尾在公堂之上，她褪去男装，以女子身份接下“代诉人”首案，震惊全城。", "one_line": "大唐永徽年间，员外家千金春荼蘼偷偷替人写状纸，第一桩案子就告到了自己的未婚夫头上。", "bucket": "fantasy"}, {"id": "1178", "title": "暗房秘密", "filename": "m1178.html", "year": "2024", "region": "法国 / 比利时", "genre": "悬疑 / 惊悚 / 剧情", "tags": "摄影，失踪案件，银盐工艺，记忆篡改", "summary": "摄影记者茱莉整理已故意大利祖父的暗房遗产时，意外冲洗出一批从未示人的底片。照片上依次是1960年代小镇失踪的五名女性，每张最后一张底片都显示她们走进祖父的工作室。茱莉不愿相信祖父是连环杀手，继续深入调查，却发现小镇传说中另有真凶——镇长、神父、警长都曾利用祖父的暗房处理“尸体照片”。祖父将这些底片封存，成为沉默的目击者。当茱莉即将公开证据时，当年还活着的人开始一个个“意外”死亡。暗房的红灯下，谁才是下一个被“显影”的猎物？", "one_line": "一位老摄影师去世后，他暗房的底片显影出30年前小镇五桩失踪案的真正凶手——他自己。", "bucket": "suspense"}, {"id": "1179", "title": "落难男神", "filename": "m1179.html", "year": "2024", "region": "中国香港", "genre": "喜剧，爱情", "tags": "身份错位，草根逆袭，港式幽默", "summary": "娱乐圈顶流偶像“男神”姜晨，因在直播中不慎暴露傲慢嘴碎的真面目而遭全网抵制，一夜破产。他躲进即将拆迁的贫民窟，却被独居老人李伯误认为是离家出走二十年的废柴儿子。为了逃避粉丝和狗仔，姜晨将错就错，住进了漏雨的破屋。在这里，他学会修水管、摆地摊、和街坊大妈打麻将，逐渐褪去虚伪光环。然而，一档真人秀节目组为了流量，策划了一场“巨星落难寻亲记”直播，当镜头对准肮脏的菜市场时，正在帮李伯吆喝卖鱼的姜晨，被迫进行一场关于尊严与真实的终极抉择。", "one_line": "顶流男神因为一场直播事故被全网封杀，流落贫民窟后，竟被老伯认成了失踪多年的废柴儿子。", "bucket": "comedy"}, {"id": "1180", "title": "他们结婚了还有很多孩子", "filename": "m1180.html", "year": "2019", "region": "法国", "genre": "喜剧 / 家庭", "tags": "多子家庭, 中年危机, 法式幽默, 日常荒诞", "summary": "马丁和茱莉是小镇上的“生育冠军”，从双胞胎到四胞胎，家里永远像战场。当第十个孩子降生后，马丁开始在超市夜班中逃避现实，茱莉则迷上了极简主义装修视频。影片用闹剧般的手法展现换尿布、开家长会、拼车篮的灾难现场，但在鸡飞狗跳间，导演埋下了许多温柔的俯拍镜头：深夜马丁抱着哭闹的婴儿在客厅踱步，茱莉悄悄在他咖啡杯底画上笑脸。最终两人在送孩子参加露营后的空房子里，首次对视超过十秒，大笑之后抱头痛哭。", "one_line": "一对夫妻养育十个孩子的疯狂日常，在混乱中重新找回彼此的眼神。", "bucket": "comedy"}, {"id": "1181", "title": "狄仁杰之天神下凡", "filename": "m1181.html", "year": "2025", "region": "中国内地", "genre": "悬疑, 奇幻", "tags": "大唐, 心理幻觉, 邪教", "summary": "武则天祭天大典前夕，长安城内突然出现“天神”，自称要降罪于女皇。目击者描述一致，但现场查无踪迹。狄仁杰调查发现，所有目击者都曾在同一家“波斯浴场”洗过澡。原来波斯商人利用西域香料和特定频率的铜钟声，对洗澡的达官贵人进行集体潜意识催眠，植入“神迹”记忆，目的是扰乱朝纲，为西域联军进攻做内应。狄仁杰不仅要破解催眠原理，更要在祭天大典上，当着武则天的面，用一面铜锣的反向声波唤醒被催眠的御林军，在幻象与现实的夹缝中保护圣驾。", "one_line": "长安百姓自称见到了“天神”，狄仁杰却发现，这所谓的神迹源于一场大规模催眠。", "bucket": "suspense"}, {"id": "1182", "title": "红角落", "filename": "m1182.html", "year": "2023", "region": "美国 / 中国", "genre": "剧情、悬疑、律政", "tags": "跨国审判， 文化冲突， 正义困境， 律师辩护", "summary": "跨国律政惊悚片。美国精英律师乔纳森接到一生最大的案子：为中国某高官之子李鸣（被媒体称为“红角落”）辩护，罪名是向境外出售国家机密。乔纳森坚信李鸣是政治牺牲品，展开激进辩护。在深入调查中，他发现种种证据都确凿指向李鸣，但同时暴露了中国司法系统中某些人的失职。就在乔纳森准备做无罪辩护时，李鸣在狱中向他坦白：他确实是间谍，目的是报复父亲对他的冷漠。乔纳森陷入职业伦理的绝境：是遵守律师保密义务，还是举报当事人？最终他选择让李鸣自首，自己则因违规被吊销执照，返回美国。法庭上，李鸣的判决词发人深省：特权毁了他，国家救了他。", "one_line": "美国律师在中国为一名被控间谍罪的“红二代”辩护，却发现真正的间谍是他自己的委托人。", "bucket": "drama"}, {"id": "1183", "title": "午夜心跳", "filename": "m1183.html", "year": "2010", "region": "中国大陆", "genre": "恐怖, 惊悚", "tags": "医院, 心理惊悚, 国产恐怖, 氛围, 因果", "summary": "市第三人民医院因为一桩医疗事故被废弃，传闻每到午夜零点，空荡荡的心电图室里就会传出“咚咚”的心跳声，但频率只有每分钟20次——那是死人的心跳。实习医生林欣为了完成一篇关于“濒死体验”的论文，带着录音笔独自潜入旧医院。她发现，心跳声并非幻觉，而是一个女孩的怨魂在重复自己死亡前的最后记忆。二十年前，一个患有罕见心脏病的小女孩在医院等待器官移植，主治医生为了给高官亲属抢器官，故意让她“心脏死亡”。女孩在还有意识的情况下被推进了停尸房，那种绝望和不甘化作了一个诅咒：凡是心脏被她“听到”的人，都会在午夜心跳响起时，心脏骤停。", "one_line": "一所废弃医院里，每到午夜就能听见诡异的心跳声，而那频率只出现在死人身上。", "bucket": "horror"}, {"id": "1184", "title": "名门绅士2:淑女之心", "filename": "m1184.html", "year": "2024", "region": "泰国", "genre": "爱情 / 剧情", "tags": "豪门恩怨, 贵族恋爱, 家族传承, 浪漫虐心, 泰剧", "summary": "这是《名门绅士》系列第二部，聚焦卓泰缇家族二公子帕坤。他表面是个只懂赛马和舞会的花花公子，实际却暗中资助贫民学校。女主卡米拉是国防部最年轻的军事战略分析师，出身寒门，为调研乡村教育问题而屡次与帕坤交锋。帕坤被她冷静又毒舌的拆台能力吸引，用“追求淑女”的古典方式展开攻势，却频频被卡米拉用兵法反制：“声东击西”、“欲擒故纵”全被识破。与此同时，家族企业陷入对手设下的地产骗局，卡米拉不得不以战略思维协助帕坤反击。两人在互相拆台与扶持中渐生情愫，但阶层差异与家族名誉成为绕不开的坎。", "one_line": "当玩世不恭的贵族二少爷遇到精通兵法的平民女学者，爱情变成了一场你进我退的攻防战。", "bucket": "romance"}, {"id": "1185", "title": "狐狸猎手", "filename": "m1185.html", "year": "2024", "region": "美国", "genre": "剧情 / 传记 / 运动", "tags": "摔跤, 心理惊悚, 真实改编, 阶层, 控制欲", "summary": "出身底层的摔跤手马克·舒尔茨被杜邦集团继承人约翰·杜邦（外号“狐狸”）看中，邀请加入其训练的“狐狸猎手”俱乐部。马克以为遇到了伯乐，却逐渐发现杜邦是个控制欲极强的偏执狂。他强迫队员叫他“教练”，干预他们的私生活，甚至要求马克故意输掉比赛来满足其病态的掌控欲。马克的哥哥、奥运冠军戴夫前来解救弟弟，却引发了杜邦更疯狂的嫉妒。当兄弟俩试图离开时，悲剧在车道上枪响中发生。", "one_line": "贫民窟的摔跤天才被亿万富翁“狐狸”相中，却发现所谓的“爱国者之家”是一座奢华的金丝笼。", "bucket": "drama"}, {"id": "1186", "title": "盖世奇才", "filename": "m1186.html", "year": "2026", "region": "中国大陆", "genre": "动作 / 武侠", "tags": "奇才, 武术, 复仇, 江湖, 逆袭", "summary": "明末，小镇上住着一个叫阿生的哑巴青年，每天凌晨三点起来磨豆腐，动作快到像在练功，镇上人都笑话他是“傻生”。只有老铁匠陈伯知道，阿生其实是二十年前被灭门的武林世家唯一后人，他的哑是假装的，为的是躲避杀手组织“阎王帖”的追杀。阿生每天磨豆腐、挑水、劈柴，其实都在修炼家传的《无声音》心法——一种不需要开口发力的轻功与指法。某夜，阎王帖三大杀手摸到小镇，屠光了半条街。阿生躲在地窖里听着乡亲们的惨叫，终于撕掉了嘴上的封条，第一次开口说话：“陈伯，豆腐凉了。”下一秒，他的身影消失在月光里。杀手们只见白影闪过，额头出现一个指洞。天亮时，阿生坐在豆腐摊前，面前摆着三颗人头，安静地磨着最后一桶豆腐。", "one_line": "卖豆腐的哑巴青年身怀绝顶轻功，却被全镇当傻子，直到杀手团屠村那夜。", "bucket": "action"}, {"id": "1187", "title": "托托，佩皮诺和精神病人", "filename": "m1187.html", "year": "2025", "region": "阿根廷 / 西班牙", "genre": "剧情 / 喜剧 / 公路", "tags": "精神病院, 逃亡, 友谊, 南美", "summary": "托托是个8岁男孩，坚信自己有超能力，能听见植物说话；佩皮诺是个六旬老人，三十年来从未开口，只用手风琴说话；精神病人“马拉多纳”幻想自己是球王转世。三人在暴雨夜用电击疗法制造混乱，偷走院长的救护车，一路向南。他们要去乌斯怀亚——“世界的尽头”，因为托托听说那里有一棵能让人“恢复出厂设置”的树。一路上，佩皮诺用手风琴曲化解抢劫犯的敌意，“马拉多纳”用头球挡住坠落的巨石。当他们终于抵达那棵树时，发现它只是一棵枯死的树干。托托哭着问为什么，佩皮诺第一次开口：“因为你们从来就没有坏掉过。”三个人在枯树下跳舞。", "one_line": "精神病院里，一个把自己当超级英雄的孩子，一个从不开口的哑巴老头，和一个幻想自己是足球明星的病人，偷了一辆救护车去寻找“阿根廷的尽头”。", "bucket": "drama"}, {"id": "1188", "title": "林祭", "filename": "m1188.html", "year": "2019", "region": "中国台湾", "genre": "恐怖， 民俗", "tags": "民俗， 森林， 诅咒", "summary": "导演阿伟带领团队前往台湾著名的迷雾森林，拍摄一档探灵纪录片。他们的目标是寻找二战时期日军埋藏在此的黄金以及“高砂义勇队”战士的亡灵。在一位自称能通灵的原住民向导带领下，他们按地图深入禁区，却触碰了一个又一个禁忌：砍倒神木、污染水源。当晚，营地开始发生诡异事件，队员们陆续失踪，死状仿佛遭遇了古老的“出草”猎首。他们听到山林中传来只有自己才懂的秘密，被幻觉逼至疯狂。阿伟发现，这不仅仅是厉鬼索命，更是这片土地对被殖民历史冤魂的“献祭仪式”。", "one_line": "一支探险队深入台湾山区寻找失踪的日据时期“高砂义勇队”黄金，触怒了山林守护灵。", "bucket": "horror"}, {"id": "1189", "title": "野兽之都", "filename": "m1189.html", "year": "2023", "region": "西班牙", "genre": "犯罪 / 奇幻", "tags": "动物隐喻，黑帮，地下世界，魔幻现实主义", "summary": "虚构的南美城市“野兽之都”，每个市民在成年时都会觉醒“兽形”——有人变成狮子、老虎，有人变成狐狸、狼，也有人变成老鼠、兔子。社会等级完全由兽形决定。17岁少年米格尔的兽形是一只老鼠，他和同为鼠族的姐姐生活在底层。姐姐被狮子黑帮老大“埃尔雷”强占后精神失常，米格尔决定复仇。他联合被排挤的蛇族医生、疯癫的鹰族游侠、以及一只失去了牙齿的老虎，组成了一支“杂牌兽队”。他们的计划：在每年一度的“兽王决斗日”，趁所有强者互相残杀时，用智谋而非蛮力杀死“狮子”。但米格尔在最后一刻发现，埃尔雷的人类形态其实是他的亲生父亲。", "one_line": "在一个人类可以变形成动物的城市，弱势的“鼠族”少年为救姐姐，必须猎杀最强的“狮子”黑帮老大。", "bucket": "crime"}, {"id": "1190", "title": "天伤星武松", "filename": "m1190.html", "year": "2025", "region": "中国大陆", "genre": "动作，古装，武侠", "tags": "水浒传，硬核动作，暗黑风格，兄贵情，复仇", "summary": "本片聚焦武松为兄报仇前后的黑暗时期。不同于传统演义，这里的武松（天伤星）在得知兄长惨死后，理智彻底崩坏。他拒绝官府，放弃律法，独自在雨夜中化身为嗜血的复仇恶鬼。从逼问真相到狮子楼斗杀西门庆，每一场打斗都摒弃了花哨的招式，只有纯粹的力量与杀意。在鲜血与火焰中，武松最终手刃仇敌，但他也意识到自己内心的“伤”已无法愈合。他不再是那个坦荡的打虎英雄，而是一个背负着罪孽、主动戴上枷锁的囚徒，踏上了被刺配孟州的孤独之路。", "one_line": "武松并非天生打虎英雄，他
