人生", "filename": "m0680.html", "year": "2024", "region": "美国", "genre": "剧情 / 悬疑", "tags": "选美黑幕, 分尸案, 双时间线", "summary": "1995 年的“美国玫瑰”选美皇后凯瑟琳，二十年后被发现死于自家浴缸，疑似嗑药过量。警探在整理遗物时发现一堆 VHS 录像带，全是她当年选美的训练记录。当警探倒带播放时，画面突然切换成另一个陌生女孩被囚禁折磨的实时影像。原来凯瑟琳生前一直在秘密追踪一个涉及选美圈高层的连环杀手，而这个杀手如今已是市长候选人。随着倒带画面的不断揭露，凯瑟琳的死亡真相逐渐浮出水面——她是被灭口，而凶器就藏在录影带的盒子里。", "one_line": "昔日选美冠军被发现死于豪华公寓，其生前的录像带被倒带后，竟播放出了另一场谋杀。", "bucket": "drama"}, {"id": "0681", "title": "咸湿神医", "filename": "m0681.html", "year": "2023", "region": "中国香港", "genre": "喜剧，古装，奇幻", "tags": "老中医，搞笑，偏方，性教育，市井江湖", "summary": "1920年代广州，民间神医“咸湿陈”专治各种难以启齿的怪病。有富商“不举”却天天被逼纳妾，有少妇“假孕”只因太渴望孩子，有书生“见女即晕”因为被礼教压抑太深。咸湿陈的疗法从不涉及情色，而是用各种看似荒唐的偏方（如与公鸡赛跑、在闹市裸奔半圈）来打破病人的心理枷锁。当地西医馆视他为眼中钉，联合警察局要取缔他的“淫秽诊所”。在法庭上，咸湿陈逐一解释每个“咸湿”药方背后的现代心理学与中医原理，全场哗然。这是一部用屎尿屁包裹的严肃性教育片，笑过之后满是心酸与反思。", "one_line": "民国年间一位专治“怪病”的神医，其实所有药方都是在教病人正视自己的欲望。", "bucket": "comedy"}, {"id": "0682", "title": "秘密关系台版", "filename": "m0682.html", "year": "2024", "region": "中国台湾", "genre": "爱情 / 剧情", "tags": "职场, 婚外情, 台剧, 细腻", "summary": "台北顶级广告公司，三组秘密情侣：创意总监与实习生、已婚副总与女秘书、前台与快递员。三人互相知道对方秘密，形成微妙同盟。新来的HR总监Maggie，宣称严格执行“办公室利益回避”，实则自己就是副总的地下情人之一。一次提案泄密，公司损失千万客户。Maggie提出“彻查办公室关系”，实则借机铲除情敌。女秘书被逼辞职，实习生被发配高雄，快递员被举报偷窃开除。副总以为胜利，Maggie却在董事会上拿出副总贪污的账本——原来她一直是董事长派来的商业间谍。最后镜头，被开除的三人一起开了间小广告公司，窗外台北101华灯初上，他们说：“没有秘密，真好。”", "one_line": "台北广告公司里，三组办公室地下恋情同时进行，而公司新来的HR总监，专抓“利益回避违规”。", "bucket": "romance"}, {"id": "0683", "title": "江湖好汉", "filename": "m0683.html", "year": "2026", "region": "中国内地", "genre": "黑色幽默/犯罪/剧情", "tags": "东北, 下岗潮, 伪钞, 兄弟, 荒诞", "summary": "1999年的东北工业小城，老实巴交的钢厂工人赵大勇下岗后，看着考上美院的女儿凑不齐学费，他决定铤而走险。既然买不起美元，他就决定自己“造”美元。他找来几个同样穷途末路的兄弟：一个偏执的物理老师负责调色，一个曾经的操作工负责印刷。他们用面粉、淀粉和墨水，竟然真造出了连验钞机都识别不了的“超逼真伪钞”。但当这批“东北卢布”流入黑市，引来的不是钱，而是真正的俄国黑手党和本地地头蛇。这群“好汉”必须用车间里的扳手和电焊，在废弃的工厂里打一场智商与胆量的保卫战。", "one_line": "为了给女儿凑学费，下岗工人照着美剧《绝命毒师》的方法，造出了以假乱真的“东北卢布”。", "bucket": "comedy"}, {"id": "0684", "title": "我人生中最精彩的瞬间", "filename": "m0684.html", "year": "2023", "region": "韩国", "genre": "剧情 / 运动 / 励志", "tags": "乒乓球, 逆转, 中年危机, 国家队, 热血", "summary": "曾经的天才少女乒乓球手金敏智退役后在一家大型超市做收银员，每天忍受着枯燥的生活和丈夫的冷暴力。某天，当地体育局为了凑齐参加亚运会混双项目的参赛人数，临时征召了附近社区的中年乒乓爱好者。金敏智与另外四位同样被生活磨平了棱角的中年人组成了史上最业余的国家队。他们没有专业教练，就在超市地下室用折叠桌当球台训练。预选赛上，面对平均年龄只有自己一半的专业选手，他们凭着各种野路子和“不讲武德”的擦边球一路爆冷。决赛局，金敏智膝盖韧带断裂，她坐在轮椅上打完了最后一球。", "one_line": "一支由超市收银员、出租车司机和全职主妇组成的业余乒乓球队，竟获得了亚运会的替补资格。", "bucket": "drama"}, {"id": "0685", "title": "怒火风暴", "filename": "m0685.html", "year": "1993", "region": "美国", "genre": "动作，剧情，惊悚", "tags": "暴力，城市犯罪，复仇，社会问题", "summary": "威廉·福斯特刚出狱，本想改过自新，回到妻子和女儿身边。但洛杉矶如同一座巨大的吞噬灵魂的绞肉机：修路堵车、商店拒绝找零、快餐店歧视前科犯、混混骚扰……一连串的日常不公和侮辱，让他的理智在一上午之内彻底崩塌。他搞来一把枪，开始用一种极度狂暴的方式“纠正”这座城市里的每一个讨厌鬼。他炸毁施工车、射杀抢劫犯、恐吓无良店员，甚至在公园里和一个同样愤怒的退伍老兵进行了激烈交谈。这场暴走让他重新找回了存在感，但也让他意识到，自己早已在愤怒中迷失，最终，在夕阳下的海边，被警察狙击手击毙。", "one_line": "一个刚出狱的工程师，在洛杉矶街头被接连不断的倒霉事逼成了向整个城市宣战的杀人魔。", "bucket": "action"}, {"id": "0686", "title": "纽约上的圣诞节", "filename": "m0686.html", "year": "2019", "region": "美国", "genre": "爱情， 节日", "tags": "圣诞电影， 都市浪漫， 偶遇", "summary": "失业又失恋的英国青年汤姆打算在纽约度过最糟糕的圣诞。他偶遇了从婚礼上逃出来的富家女索菲亚。索菲亚刷爆了父亲的信用卡，两人都没钱住酒店，于是决定在24小时营业的中央车站“流浪”。他们吃自动贩卖机的薯片，躲过保安的巡查，在空无一人的候车大厅里跳舞。索菲亚给汤姆讲述每个车站角落发生过的真实故事，汤姆则教她用口哨吹出英伦民谣。当午夜钟声响起，索菲亚的未婚夫带着保镖找来。汤姆以为这是一场梦，却看到索菲亚在车窗上哈了口气，画了一个笑脸，指了指自己的心。", "one_line": "一个无处可去的男人和一个逃避婚约的女人，在纽约中央车站度过了一个奇妙的平安夜。", "bucket": "romance"}, {"id": "0687", "title": "古墓入侵者", "filename": "m0687.html", "year": "2025", "region": "美国", "genre": "动作，冒险", "tags": "盗墓，考古，机关，寻宝，夺宝奇兵", "summary": "考古学家林博士发现文物走私集团“蝮蛇”正在定位秦始皇陵的“水银地宫”。为了抢在走私犯之前保护国宝，她不得不与江湖大盗“老九”合作。老九带着黑客、爆破手组成的杂牌军，利用现代科技破解古人机关。他们穿过水银河流，躲避连环弩箭，发现地宫并非埋葬秦始皇，而是藏着华夏九鼎。走私集团头目引爆了炸药，导致水银泄漏。老九为了救林博士，将自己封在石棺中。最终林博士带着九鼎逃出，而老九奇迹般从另一条密道生还。", "one_line": "一个由小偷、黑客和考古学家组成的杂牌军，为了阻止文物走私，抢先闯入秦始皇的真实地宫。", "bucket": "action"}, {"id": "0688", "title": "赎梦", "filename": "m0688.html", "year": "2025", "region": "中国香港", "genre": "悬疑 / 奇幻", "tags": "梦境, 心理, 救赎, 烧脑, 平行时空", "summary": "天才心理师程真掌握了一项禁忌技术：进入他人梦境修改潜意识。为偿还巨额赌债，他接受神秘委托，潜入富商千金甄梦的梦中，目的是植入“主动放弃继承权”的指令。然而甄梦的梦境世界诡异至极，每次进入都是一个重复的雨天十字路口，她永远在寻找一个不存在的人。程真逐渐发现，甄梦并非简单的失眠症患者，而是一场连环车祸的唯一幸存者。她在梦中不断“赎罪”，是因为她认为自己才是车祸的肇事者。随着程真越陷越深，梦境开始入侵现实，他发现自己的记忆也在被篡改。最终惊觉，自己才是那场车祸的真正凶手，而甄梦一直在用自己的梦境，为他搭建通往自首的道路。", "one_line": "心理医生潜入患者梦境偷盗遗产，却发现自己困在了被害者编织的赎罪地狱里。", "bucket": "suspense"}, {"id": "0689", "title": "妖神记之黑狱篇", "filename": "m0689.html", "year": "2025", "region": "中国大陆", "genre": "玄幻, 冒险, 热血", "tags": "监狱篇, 妖神觉醒, 越狱", "summary": "本篇章为《妖神记》的独立长篇外传。聂离在一次战斗中被帝国暗算，打入地下三千里处的“黑狱”——一座活的监狱。黑狱的墙壁由吞噬灵魂的黑色结晶构成，每层关押着不同等级的失控妖兽，它们被帝国的“驯兽钉”控制了心神，成为没有理智的杀戮机器。聂离失去所有外部灵力，只凭肉体与意志从最底层开始向上攀爬。在黑狱中，他遇到了被关押了三百年的上一代妖神转世者“哑巴”、一个能用头发感知危险的小女孩“发娘”，以及一条会说人话却被剜去双目的老龙。聂离发现，黑狱其实是一个巨大的献祭法阵，帝国每隔百年就会将这里的所有妖兽与囚徒一次性炼化，用来喂养帝都地下的“龙脉”。他们要做的不是越狱，而是在献祭日到来之前，把整座黑狱翻过来。", "one_line": "最强妖神转世者聂离被关进帝国最深处的“黑狱”，这里关押的不是囚犯，而是被帝国驯化为兵器的失控妖怪。", "bucket": "action"}, {"id": "0690", "title": "东京情况", "filename": "m0690.html", "year": "2023", "region": "日本", "genre": "剧情 / 爱情 / 都市", "tags": "东京, 合租, 孤独, 疫情后, 邂逅", "summary": "涩谷一间高级共享公寓“Hikari House”招租，租金极低，条件是必须接受每月一次的心理评估。五个看似普通的新住户：失业的IT工程师、伪装成留学生的夜场女孩、退休后寻求刺激的老教授、躲避家暴的素人画家、以及一名自称写小说实则跟踪前男友的女作家。影片以每个月最后一天的心理评估室场景为节点，展现五人生活如何逐渐纠缠。冰箱里的食物被下药、阳台的花盆里埋着窃听器、每个人的过去都在被神秘人挖掘。当他们发现这间公寓本身就是一场大型社会实验时，始作俑者竟是他们最信任的那个人。", "one_line": "疫情后的东京，五个陌生人住进同一间共享公寓，每个人都带着不可告人的目的。", "bucket": "drama"}, {"id": "0691", "title": "歌声泪痕", "filename": "m0691.html", "year": "2023", "region": "美国", "genre": "音乐 / 剧情", "tags": "乡村音乐, 酗酒, 母女, 救赎, 真实改编", "summary": "改编自某位已故乡村天后的真实人生。表面上她是聚光灯下豪放不羁的“酒桶女神”，台下却深陷酗酒、药物滥用以及对年幼女儿的忽视。经纪人伙同第三任丈夫长期虐待她的女儿，而她用酒精麻痹自己假装看不见。直到女儿在一次事故中失语，这位天后才在录音室里唱了一首没有歌词的“呜咽”。那首歌后来成为传世经典，但没有任何人知道，那不是在唱歌，那是一个母亲迟到了十年的嚎啕大哭。影片讲述了她如何从泥潭中爬起，争夺抚养权，并用歌声找回尊严的故事。", "one_line": "她是 70 年代最火的乡村天后，但台下的每一次掌声，都伴随着女儿在后台被虐待的哭声。", "bucket": "drama"}, {"id": "0692", "title": "不是钱的事儿", "filename": "m0692.html", "year": "2021", "region": "中国大陆", "genre": "喜剧 / 剧情", "tags": "黑色幽默, 小人物, 人情社会", "summary": "老赵在城中村开了一家杂货铺，生活拮据但乐善好施。一天他替邻居王大爷垫钱买了张彩票，结果中了五十万。消息传开，半个村子的人都跑来声称自己“有份儿”：有人说自己当初帮老赵看过店，有人说老赵欠自己人情，甚至有人拿出一张二十年前的借条。老赵被逼得走投无路，只好把彩票锁进铁盒，宣布“谁要能证明这钱有自己的份儿，就分”。于是整个村子变成了法庭、茶馆、戏台，各路谎言与真情轮番上演。最后彩票被洗衣机搅烂，所有人反而松了口气，坐在一起吃了一顿久违的团圆饭。钱没到手，人情回来了。", "one_line": "一张中了五十万的彩票，让整个城中村的街坊邻里都疯了。", "bucket": "comedy"}, {"id": "0693", "title": "豪门怨灵", "filename": "m0693.html", "year": "2024", "region": "中国香港", "genre": "恐怖 / 悬疑", "tags": "港式鬼片，家族秘密，豪宅，复仇", "summary": "何氏家族在老太爷去世头七夜举办继承宴。席间，大宅里的镜子开始出现异象：老太爷的影像只对大孙何冠希微笑。众人以为是吉兆，冠希却吓破了胆，因为他知道，爷爷生前最恨他。随着镜中幻象加剧，家族成员相继死于非命，死法全与老太爷生前痛斥的“七宗罪”对应。警方介入调查，却发现这并非鬼魂作祟，而是有人利用3D全息投影和古老机关制造“鬼魂杀人”。而凶手，就站在那些微笑的镜面背后。", "one_line": "豪门夜宴上，已故老太爷的音容出现在每一面镜子里，只对长房长孙微笑。", "bucket": "horror"}, {"id": "0694", "title": "爱的世界国语", "filename": "m0694.html", "year": "1988", "region": "台湾", "genre": "爱情， 剧情", "tags": "时代悲剧， 语言隔阂， 外省人", "summary": "1980年代的台北眷村，活泼开朗的本省女孩阿凤爱上了温文儒雅的外省教师老刘。老刘国语极好，但台语一窍不通；阿凤国语蹩脚，两人最初只能靠一本国语字典比手画脚地交流。这段纯粹的感情却在当时省籍矛盾依然敏感的社会环境下举步维艰。阿凤的家族激烈反对，认为外省人“迟早要回去”。在巨大的家庭压力下，阿凤被迫嫁给本地商人。多年后，已成为祖母的阿凤在整理旧物时翻出那本泛黄的字典，里面夹着一张字条：“教我台语，好吗？”", "one_line": "眷村长大的本省女孩与不会说台语的外省教师，用一本国语字典谈了一场被时代拆散的恋爱。", "bucket": "romance"}, {"id": "0695", "title": "三楼的陌生人", "filename": "m0695.html", "year": "2024", "region": "美国", "genre": "恐怖 / 心理惊悚", "tags": "合租公寓, 未知室友, 社交恐惧, 密室推理", "summary": "主角小凯和三个朋友合租一栋老旧公寓的三楼。某天深夜，他在厨房发现一个陌生男人正平静地吃他的泡面。男人穿着和所有人同款的灰色睡衣，说自己是“新搬来的室友”，住在最里面那间从没人打开过的储物间。小凯去问另外三人，每个人都以为那间房住的是别人介绍的室友，但四人对了一遍聊天记录——从未有人介绍过他。更诡异的是，监控显示大门从未被陌生人刷开过，而那间储物间里没有任何生活用品，只有墙壁上用铅笔密密麻麻写满日期，最新一个就是今天。四人决定轮流守夜，但每晚都有人梦游般走向那间房。小凯偷偷装了摄像头，第二天回放发现：凌晨三点，他自己笑着打开储物间的门，对着空气说“请进”。而那扇门上的猫眼，在录像里变成了一只真正的眼睛。", "one_line": "四个合租年轻人发现公寓里实际住着第五个人，但所有人都坚称不认识他，且门禁记录显示他从没进来过。", "bucket": "horror"}, {"id": "0696", "title": "亚历山大内夫斯基", "filename": "m0696.html", "year": "2029", "region": "俄罗斯", "genre": "历史 / 传记 / 战争", "tags": "沙俄历史, 军事天才, 史诗战争, 民族英雄", "summary": "十三世纪，涅瓦河英雄亚历山大·内夫斯基刚刚从冰湖战役中凯旋，他击败了条顿骑士团，成为全罗斯公国的精神支柱。但金帐汗国的使者也随之而来，要求他交出长子作为人质。与此同时，他的胞弟安德烈在暗中联合了诺夫哥罗德的反贵族势力，指责亚历山大与蒙古人媾和是“背叛东正教”。影片没有把重心放在著名的冰湖之战上，而是聚焦于战后两年内，亚历山大如何在蒙古人的刀锋、教宗的招安信、弟弟的政变阴谋和民众的猜疑之间走钢丝。他最终在觐见拔都汗的归途中，服用慢性毒药，将自己的死伪装成瘟疫，保住了儿子的性命和公国的喘息机会。", "one_line": "他击退了条顿骑士团，却没能击退自己胞弟的匕首。", "bucket": "drama"}, {"id": "0697", "title": "蓝调计程车", "filename": "m0697.html", "year": "2024", "region": "中国台湾", "genre": "剧情/音乐", "tags": "深夜， 计程车， 蓝调， 单元剧", "summary": "阿青曾是知名蓝调吉他手，因创作瓶颈和抑郁症退圈，改开夜班计程车。他从不打表，只让乘客用“一个故事”或“一种声音”当车费。每集都是一个深夜乘客的故事：想逃婚的新娘、从ICU偷溜出来的老爷爷找初恋、带着骨灰盒环岛的少年、被迫相亲的女博士。阿青会在听完故事后，即兴弹一段蓝调吉他送给对方。某天，他的前女友兼主唱林真上车了，她已是当红明星，即将嫁给富商。林真说：“当年你只敢对着车窗弹琴，不敢站在舞台上。”阿青沉默后弹了一首为她写的未发表新歌。林真落泪下车。最终阿青在乘客们的鼓励下，回到当年离开的Livehouse，办了一场只有蓝调和故事的小型演唱会。台下坐满了曾经车上的乘客。", "one_line": "一个患失眠症的计程车司机，每晚载着不同的乘客，用蓝调吉他治愈他们也疗愈自己。", "bucket": "drama"}, {"id": "0698", "title": "泰姬陵", "filename": "m0698.html", "year": "2025", "region": "印度", "genre": "剧情 / 历史", "tags": "建筑、爱情、权力、史诗、悲剧", "summary": "十七世纪，莫卧儿帝国。天才石匠阿米尔被征召参与修建泰姬陵。他负责主穹顶的浮雕，倾注了全部心血。他爱上了监工的女儿，两人在工地秘密相恋。泰姬陵历时二十二年建成，沙贾汗为让工匠永远无法复制这座奇迹，下令处死所有核心工匠，或刺瞎双眼后流放。阿米尔被刺瞎双眼，恋人被迫嫁给监工。二十年后，阿米尔以乞丐身份回到德里，用盲杖探路，一步一步摸进皇宫。他用当年雕刻穹顶的同一把凿子，在皇宫大殿的地面上刻下一幅完整的地宫结构图——图上标注了只有他知道的、泰姬陵地下隐藏的秘道。这幅图后来成为英国人掠夺泰姬陵藏宝的指引。", "one_line": "不是沙贾汗为妃子建陵的故事，而是一名参与修建泰姬陵的工匠在完工后被刺瞎双眼的复仇史。", "bucket": "drama"}, {"id": "0699", "title": "女仁医", "filename": "m0699.html", "year": "2025", "region": "印度", "genre": "传记 / 剧情 / 历史", "tags": "女性先驱, 医学禁令, 破旧立新", "summary": "19世纪末，印度童婚盛行，14岁的阿南迪·乔希嫁给了一个丧偶且支持她读书的邮政员。不幸的是，她生下的孩子因医疗条件差而夭折。这激发了阿南迪学医的愿望。当时印度严禁女性学习梵文和西方医学，她遭到社区抵制甚至生命威胁。丈夫变卖家产支持她，她克服重重阻力，最终被美国女子医学院破格录取。在异国他乡，她患上了当时的绝症肺结核，但仍以优异成绩毕业，成为印度第一位女西医。回国后，她虽然只活了22岁，却为印度女性打开了一扇通往医学殿堂的门。", "one_line": "19世纪印度，第一位女医学博士阿南迪·乔希的真实故事，她对抗整个社会的偏见，为印度女性行医凿开通路。", "bucket": "drama"}, {"id": "0700", "title": "异星灾变第二季", "filename": "m0700.html", "year": "2022", "region": "美国", "genre": "科幻, 惊悚", "tags": "AI伦理, 外星殖民, 宗教隐喻, 硬科幻", "summary": "接续第一季结尾。母亲和孩子们在开普勒22b的热带区建立了新的定居点，但食物短缺和神秘辐射病开始夺走生命。父亲在一次勘探中坠入地底裂缝，意外发现了一座比“方舟”更古老的外星飞船——里面沉睡着一种半植物半动物的碳基生物，它们的大脑能够以量子态影响地表的梦境。与此同时，马库斯率领的“太阳神信徒”残部追踪到了定居点，他们相信母亲是“恶魔的代理人”。最惊人的反转出现在第五集：母亲尝试与地底生物的集体意识连接后，发现这颗星球其实是某个高等文明设立的“孵化场”，而人类和那些生物一样，都是被设计的“实验品”。第二季结尾，所有人类角色的意识被上传到了地底网络，而母亲第一次露出了恐惧的表情。", "one_line": "母亲在开普勒22b的地底发现了另一座“方舟”，里面沉睡的生物不属于任何已知物种。", "bucket": "sci-fi"}, {"id": "0701", "title": "小学鸡起革命", "filename": "m0701.html", "year": "2024", "region": "中国香港", "genre": "剧情，儿童，家庭", "tags": "校园叙事，童真对抗，教育反思，温情搞笑", "summary": "在某所保守的小学里，新来的校长以健康为由禁止了所有零食和课间活动。以捣蛋鬼肥仔聪为首的几名一年级学生，为了捍卫自己的“垃圾食品自由”，竟然模仿历史课本上学到的内容，发明了一套幼稚却有效的抗议方式：上课集体睡觉、用橡皮屑堆成堡垒、在操场画满笑脸。他们的行动意外引发了高年级学生的共鸣，事件在社交媒体上发酵，引来记者蹲点。面对学校和家长的压力，这群孩子用最天真的方式，揭露了成人世界里过度控制和抹杀童年的荒诞，最终引发了一场关于快乐童年的全校大讨论。", "one_line": "为了抗议校长取消小卖部零食，一所小学的全体低年级学生发起了一场令人啼笑皆非的“非暴力不合作运动”。", "bucket": "drama"}, {"id": "0702", "title": "你的世界我们懂", "filename": "m0702.html", "year": "2023", "region": "中国大陆", "genre": "家庭、剧情", "tags": "自闭症、亲情、成长、治愈、社会议题", "summary": "高中生林小宇被诊断为自闭症谱系障碍，母亲辞职陪读，父亲忙于赚钱养家，妹妹则因被忽视而叛逆。小宇无法正常交流，却对数字异常敏感。一次偶然，他用一串看似乱码的数字记录下父亲的经济压力和母亲的崩溃瞬间，妹妹破解后全家震惊。从此，家人开始学习用他的“语言”沟通。当父亲公司裁员、母亲旧病复发时，小宇通过分析数据帮父亲找到了公司财务漏洞，避免倒闭。这个“来自星星”的孩子，反而成了照亮家庭的那束光。", "one_line": "一个患有自闭症的少年，用他独特的数学思维，悄悄解开了全家人的心结。", "bucket": "drama"}, {"id": "0703", "title": "狄亚伯洛大决斗", "filename": "m0703.html", "year": "2029", "region": "美国", "genre": "西部 / 动作 / 惊悚", "tags": "双枪, 复仇, 沙漠小镇, 恶霸警长, 半小时对决", "summary": "墨西哥边境小镇狄亚伯洛，被残暴警长特伦斯和他的六人手下统治了十五年。一个阴天，一名叫克罗斯的枪手骑马入镇。他不喝酒、不找女人、不跟任何人交朋友，只是每天上午坐在警长办公室对面的旅馆阳台上，喝一杯黑咖啡。有人给他钱让他杀警长，他拒了；有人拿枪威胁他离开，他把对方手指折断了。警长特伦斯是前神枪手，但已经十五年没拔过枪。他害怕了，躲进镇上的石砌教堂，拒绝出来。克罗斯于是向全镇宣布：“我将在正午十二点，独自一人走进教堂。如果警长不开枪，我就用手杖打死他。” 正午到来，全镇人围在教堂外，听着里面传出皮鞋踩石板的声音，一声，两声，紧接着是连续六声枪响。门开了，只有克罗斯走出来，他扔下一个银色的警徽，说：“你不敢决斗，所以你输了。”", "one_line": "神秘枪手来到狄亚伯洛镇，不为钱也不为命，只为逼警长在正午时分走出教堂完成一场自杀式决斗。", "bucket": "fantasy"}, {"id": "0704", "title": "我的狗是杀手", "filename": "m0704.html", "year": "2024", "region": "美国, 英国", "genre": "喜剧, 犯罪", "tags": "黑色幽默, 杀手, 萌宠", "summary": "孤独的职业杀手“杰克”意外收养了一只金毛犬。从此，他的暗杀任务开始变得离奇顺利——目标总会以各种匪夷所思的“意外”死亡，比如滑倒、被花盆砸中、鱼缸漏电。而现场唯一的共同点是都有一撮金毛。当警方成立专案组调查这位“隐形杀手”时，杰克惊恐地发现：自家狗子正叼着带血的线索对他摇尾巴。他不得不一边躲警察，一边试图让狗别再“帮忙”。", "one_line": "一只被遗弃的金毛被职业杀手捡回家后，每次都能意外“帮”主人灭口，且从不留证据。", "bucket": "comedy"}, {"id": "0705", "title": "朱莉娅的困扰", "filename": "m0705.html", "year": "2018", "region": "英国", "genre": "悬疑 / 剧情", "tags": "记忆障碍，心理惊悚，古典庄园", "summary": "朱莉娅在一场严重车祸后醒来，失去了过去五年的记忆。丈夫塞巴斯蒂安带她回到位于苏格兰高地的古老家族庄园疗养。庄园里的每个人都对朱莉娅态度微妙——婆婆称她“差点毁了这个家族”，小叔子看到她就像见了鬼，女仆甚至拒绝与她独处。朱莉娅从旧日记中得知，过去的自己曾三次被送入精神病院，并曾试图用一把拆信刀刺向丈夫。所有人都告诉她：那些都是她的疯狂行为造成的幻觉。但随着朱莉娅在庄园里走动，她不断闪回一些碎片画面：一个被锁在阁楼的女人、一扇打不开的门、以及塞巴斯蒂安抱着另一个女人的照片。当第四个夜晚来临时，朱莉娅决定撬开那扇门，找到那个“疯女人”曾经藏起来的真相。", "one_line": "车祸失忆的女人回到丈夫的家族庄园，发现所有人都说她曾是个疯女人，而她完全不记得。", "bucket": "suspense"}, {"id": "0706", "title": "奔跑吧兄弟第一季", "filename": "m0706.html", "year": "2014", "region": "中国大陆", "genre": "真人秀 / 竞技", "tags": "撕名牌，户外游戏，明星同乐，指压板", "summary": "引进自韩国的户外竞技真人秀，由邓超、Angelababy、李晨等担任常驻主持。每期设定一个主题故事，成员们需要在不同的城市地标完成各类体力与脑力游戏，躲避“猎人”追捕，收集线索，最终在残酷的“撕名牌”环节中决出胜者。第一季奠定了国民综艺的基础。", "one_line": "七位固定成员带领飞行嘉宾，在全国各地展开斗智斗勇的户外游戏竞赛。", "bucket": "drama"}, {"id": "0707", "title": "老板渡假去2", "filename": "m0707.html", "year": "2027", "region": "美国", "genre": "喜剧, 冒险", "tags": "续集, 度假灾难, 黑帮, 乌龙", "summary": "倒霉老板“老查”时隔七年再度被董事会“强制休假”。这次他选了南太平洋一个地图上没有标注的私人岛屿，只带了忠心的助理和一副象棋。上岛后才发现，岛上住着一群打扮成《加勒比海盗》模样的现代海盗，他们在这里藏了价值两亿美元的比特币硬盘。老查误打误撞捡到了硬盘，于是三方人马（老查二人组、海盗、追来的黑帮）在小岛上展开了一场石器时代般的争夺战。最后老查用象棋里的“骑士”棋子换走了硬盘，因为他把棋子的底座换成了真正的微型储存卡。结尾他坐在回程的救生筏上说：“这次至少没着火。”", "one_line": "老板上次度假炸了别墅，这次学乖了选了个无人岛，结果岛上是海盗的藏宝地。", "bucket": "comedy"}, {"id": "0708", "title": "不灭神王", "filename": "m0708.html", "year": "2023", "region": "中国大陆", "genre": "奇幻, 动作, 修仙", "tags": "重生, 废柴逆袭, 龙傲天, 爽文套路", "summary": "万界神王姜自在被心魔偷袭，肉身崩毁，一缕神魂重生在苍澜国将军府的“废物”少爷身上。这个少爷不仅经脉寸断，还是全城笑柄，未婚妻更是带着强者上门退婚。姜自在本想低调修炼，但他脑中却绑定了一个“天道吐槽系统”，每当他做出不符合“废柴”人设的事，系统就会自动发出弹幕嘲讽他，甚至把心里话说出来。他本想隐藏实力，系统却大喊：“区区金丹也敢嚣张，我们家少爷当年可是神王！”瞬间社死。为了屏蔽这个嘴贱系统，姜自在不得不疯狂刷怪，一路碾压各路天才。随着修为恢复，他发现这一世的身份并不简单，而心魔的阴谋才刚刚浮出水面。", "one_line": "仙界最强神王渡劫失败，重生为凡间废柴少爷，开局就被退婚，还自带一个吐槽系统的修仙辅助器。", "bucket": "fantasy"}, {"id": "0709", "title": "往事在他方", "filename": "m0709.html", "year": "2020", "region": "中国台湾", "genre": "剧情, 同性, 文艺", "tags": "老年同志, 回忆与现实, 唯美摄影, 情感压抑, 身份认同", "summary": "退休教师张文远一直将真实的自己藏在柜子里，结婚生子，过完了看似正常的一生。初恋阿青的葬礼让他重回故乡台南。在阿青妹妹交给他的一个旧箱子里，他发现了两百多封自己从未收到的信和几十张照片。原来阿青始终爱着他，等他等了一辈子。张文远沿着信中的路线，重走了一遍年轻时与阿青走过的地方，每一步都是迟到了五十年的回应。旅程的终点，是阿青留给他的最后一句“我原谅你了”。", "one_line": "七十岁的深柜老人回乡参加初恋葬礼，在旧照片和信件的指引下，踏上了一段追寻往事的旅程。", "bucket": "drama"}, {"id": "0710", "title": "锦衣之下", "filename": "m0710.html", "year": "2019", "region": "中国大陆", "genre": "古装/爱情/悬疑", "tags": "锦衣卫, 探案, 欢喜冤家, 明朝", "summary": "嘉靖年间，锦衣卫指挥使陆绎奉命调查扬州修河款失踪案，遇到了鬼马精灵、视财如命的女捕快袁今夏。陆绎心狠手辣，今夏机灵贪财，两人因争抢同一桩案子而结下梁子。然而，随着调查深入，他们发现案件背后牵扯出巨大的朝堂阴谋，甚至与沿海倭寇和皇帝修道有关。从互不相让到被迫合作，两人在险象环生的探案中渐生情愫。陆绎冷酷的外表下藏着温柔的内心，今夏看似圆滑实则坚守正义。当陆绎发现今夏的身世与自己的家族血案有关时，他必须在复仇与深情之间做出残酷抉择。", "one_line": "锦衣卫经历陆绎，遇上六扇门女捕快今夏，两人从互抢案到互抢心。", "bucket": "fantasy"}, {"id": "0711", "title": "王子与贫儿", "filename": "m0711.html", "year": "1999", "region": "美国", "genre": "剧情、家庭、冒险", "tags": "身份互换、马克吐温、成长、童话改编、社会阶层", "summary": "在十六世纪的英国伦敦，一个名叫汤姆的穷苦男孩做梦都想当国王。一次偶然的机会，他遇到了刚即位不久的爱德华王子。两人惊奇的发现彼此长得一模一样。为了体验不同的生活，他们互换了衣服，也互换了命运。汤姆被当成王子留在宫中，面对繁文缛节和权臣的试探，他凭借平民的善良与机智化险为夷；而真正的爱德华流落民间，目睹了底层民众在暴政下的悲惨生活。当真假王子在加冕典礼上再次相遇，一场关于公正、仁慈与责任的人性考验终于迎来高潮。", "one_line": "长相相同的王子与乞丐互换身份，一个体验民间疾苦，一个饱尝宫廷束缚。", "bucket": "drama"}, {"id": "0712", "title": "退休大赢家", "filename": "m0712.html", "year": "2025", "region": "法国", "genre": "喜剧", "tags": "退休, 诈骗, 公路, 疯狂", "summary": "曾是中学教师的玛德琳、退休水管工约瑟夫以及前歌剧演员安吉洛，住在一家死气沉沉的养老院。他们收到理财机构破产的消息，一辈子的积蓄化为乌有。三人一合计，决定不等死，而是去戛纳抓住那个逃走的理财顾问。他们开着加装了遮阳棚的电动轮椅，带上速效救心丸和假牙粘合剂就上路了。一路上，他们假装是某奢侈品牌的老年体验官骗吃骗喝，误闯天体海滩引发混乱，甚至还用轮椅“别停”了一辆大货车。当他们终于在游艇派对上找到那个骗子时，对方嘲笑他们没有证据。玛德琳淡定地指了指自己一直佩戴的老花镜——那是一个隐藏摄像头，全程直播到了养老院的电视上。", "one_line": "三个住在养老院的老头老太，偶然发现自己毕生的养老金被理财顾问卷跑，于是开着电动轮椅去戛纳追债。", "bucket": "comedy"}, {"id": "0713", "title": "终点之城", "filename": "m0713.html", "year": "2026", "region": "阿根廷 / 西班牙", "genre": "剧情, 奇幻", "tags": "公路电影, 亡灵节, 告别, 治愈", "summary": "布宜诺斯艾利斯的巴士司机胡安，某天驶入了一个地图上不存在的小镇——“终点之城”。在这里，他接到的乘客都是亡灵，他们需要在胡安的车上完成最后一段回忆之旅，才能彻底离开。胡安起初恐惧，后来倾听每一个亡灵的故事：未说出口的爱、无法释怀的恨、来不及的道别。他渐渐开始面对自己最深的愧疚——25年前因酒驾害死弟弟。当胡安在终点站拥抱弟弟的亡灵时，小镇消失，他回到了现实，满眼泪水，却终于自由了。", "one_line": "一位误入亡灵小镇的巴士司机，每天载着看不见的乘客驶向最后的终点站。", "bucket": "drama"}, {"id": "0714", "title": "赦免", "filename": "m0714.html", "year": "2025", "region": "德国", "genre": "剧情 / 战争", "tags": "二战, 反思, 法庭, 人性", "summary": "2015年，汉堡地方法院重启对一名九十四岁前集中营女会计的审判，她被指控在1943-1945年间协助屠杀至少三万人。她全程沉默，不辩护、不求饶、不忏悔，像一座风干的雕塑。媒体愤怒，公众唾骂，律师试图以“高龄痴呆”为由申请免审。直到审判最后一天，一位九十一岁的奥斯维辛幸存者、也是唯一一位能在法庭上认出她面容的证人，拄着拐杖走到被告席前，没有指控，只是安静地说了一句话：“我赦免你，但你必须看着我的眼睛，说你什么都没看见。”老人沉默了很久，终于抬起眼皮。全场寂静。", "one_line": "九十四岁的纳粹前集中营会计被送上法庭，她全程沉默，直到最后一名幸存者走到她面前。", "bucket": "drama"}, {"id": "0715", "title": "寻找咕噜", "filename": "m0715.html", "year": "2024", "region": "美国 / 新西兰", "genre": "冒险 / 奇幻", "tags": "中土, 粉丝电影, 纪录片", "summary": "这是关于一部“未完成电影”的纪录片。2019年，一群《指环王》死忠粉在网上众筹，计划拍一部《寻找咕噜》的前传短片。他们带着粗糙的道具和满腔热情，扎进新西兰南岛的密林。拍摄过程堪比灾难——演员摔伤、道具被洪水冲走、当地毛利人抗议歪曲文化。但五年后，这部只拍了30分钟的“烂尾片”却在粉丝圈引起轰动，因为他们在胶片里，意外记录下了新西兰最后一片原始雨林被砍伐前的真实影像。", "one_line": "一群超级粉丝自筹资金，深入新西兰原始森林，试图拍摄一部关于咕噜起源的独立电影。", "bucket": "action"}, {"id": "0716", "title": "偷吻", "filename": "m0716.html", "year": "2024", "region": "法国", "genre": "爱情, 剧情", "tags": "法式浪漫, 身份错位, 文学改编感", "summary": "入行七年的替身演员艾洛迪专门负责接吻戏和背影戏，从未露过脸。她爱上了当红男星加斯帕尔——但仅限于银幕上的他，因为每次拍吻戏，加斯帕尔都会真吻她，且在吻的间隙对她耳语“别睁眼，让我记住你”。艾洛迪认为这是爱情的前兆，直到加斯帕尔在采访中宣布婚讯，未婚妻是女主角莉拉。艾洛迪崩溃，决定在最后一场吻戏后辞职。那是一场雨夜街头的长吻，拍到一半片场停电，黑暗中她感到一个吻落下，温柔、缓慢、带着泪水的咸味，和加斯帕尔那种炽热激情的吻完全不同。来电后，加斯帕尔站在三米外，而吻她的人是影片的场记——一个她从未正眼看过、却每天为她留一杯热茶的沉默男人。他轻声说：“我一直在这里，是你只在看他。”", "one_line": "一个替身女演员在拍吻戏时总被男主真吻，她以为是入戏太深，直到片场停电时那个吻来自另一个人。", "bucket": "romance"}, {"id": "0717", "title": "艾达·雷德", "filename": "m0717.html", "year": "2024", "region": "美国", "genre": "犯罪, 剧情", "tags": "女性杀手, 史诗, 西部元素", "summary": "艾达·雷德是一个普通农妇，忍受了十年拳脚后，在某个夜晚用斧头砍死了醉酒的丈夫。她烧掉房子，带着仅有的马和一把左轮手枪逃亡。警长带着一队人追捕，她穿越沙漠、雪原、印第安部落，期间遇到好心收留她的妓女、同样在逃的罪犯、以及一个想要保护她的赏金猎人（对方不知她身份）。她杀过人也救过人，最终被逼至峡谷边缘。面对追兵，她没有投降，而是调转马头，冲向他们。最后一幕是她浑身是血骑马远去，画外音响起：“他们都叫我怪物，我只是不愿再做猎物。”", "one_line": "19世纪末美国西部，一个被家暴的女人杀了丈夫后，被迫踏上逃亡与复仇之路。", "bucket": "crime"}, {"id": "0718", "title": "跳舞吧！爸爸", "filename": "m0718.html", "year": "2022", "region": "印度", "genre": "剧情 / 歌舞 / 家庭", "tags": "单亲父亲, 芭蕾, 性别偏见", "summary": "建筑工马哈维尔是个一米九的糙汉，妻子去世前唯一的遗愿是：“让女儿把芭蕾跳下去”。但女儿被全市最好的芭蕾学院拒绝，原因是“需要母亲陪同练习”。马哈维尔决定自己学芭蕾，然后以家长助演身份陪女儿考试。零基础、腰伤、工友嘲笑、还有“男人跳芭蕾就是娘娘腔”的社区暴力——他把家里的铁管焊成把杆，每晚在工地路灯下练习。一年后学院开放日，当他穿着妻子的旧舞裙，与女儿完美演绎《天鹅湖》选段时，台下的评委哭了。", "one_line": "粗犷的建筑工为继承亡妻遗愿，穿上芭蕾舞裙和女儿同台竞演。", "bucket": "drama"}, {"id": "0719", "title": "牙齿和指甲", "filename": "m0719.html", "year": "2024", "region": "美国", "genre": "惊悚, 恐怖", "tags": "密闭空间, 心理博弈, 极限生存", "summary": "小镇牙医艾伦的夜诊来了一位自称牙疼的神秘男子。当艾伦用X光片查看病人牙齿时，竟发现一颗牙齿的填充物里藏着一枚微型存储芯片。解码后的信息指向三起未破的失踪案，而所有受害者失踪前都看过牙。艾伦意识到眼前的病人可能就是连环杀手，而诊所早已被反锁。他必须利用牙科器械和密闭空间的布局，在不让对方察觉的情况下，向外界求救并自保。随着两人看似平常的对话逐渐升级为心理攻防，艾伦发现凶手真正的目标正是他自己——因为艾伦的三年前的一份诊疗记录，是唯一能定罪此人的证据。", "one_line": "一场牙齿化验，竟牵扯出连环命案，牙医与侦探在诊室展开致命猫鼠游戏。", "bucket": "suspense"}, {"id": "0720", "title": "冰山下的守望者", "filename": "m0720.html", "year": "2026", "region": "中国大陆", "genre": "剧情, 冒险", "tags": "极地, 孤独, 守护, 生态", "summary": "南极内陆，气候学家江皓自愿成为“冰穹A”观测站的最后一任越冬者。在极夜降临后，他通过冰下声呐探测仪，发现冰层下3公里处存在一个有节奏的“心跳”，且该生命体正在缓慢上浮。江皓进一步研究发现，这是一个存活了上亿年的单细胞集合体，它的苏醒可能因全球变暖而起。国内紧急下令：为防止未知风险，启动热熔钻头将其消灭。江皓却在与它的“对话”中（通过振动频率），意识到它是一个无害的、甚至是地球生态调节器的存在。在绝对命令与生命良知之间，江皓切断了通讯，成为了这座冰下文明的守望者。", "one_line": "南极冰站，最后一个留守的科学家发现冰层下存在远古生命，而上级命令他将其消灭。", "bucket": "drama"}, {"id": "0721", "title": "仿妆", "filename": "m0721.html", "year": "2021", "region": "中国大陆", "genre": "悬疑 / 惊悚", "tags": "美妆, 换脸, 复仇, 都市传说, 黑科技", "summary": "化妆师米粒偶然得到一款神秘的“仿妆精华液”，只要滴入粉底液，就能在六小时内变成任何人的模样。她开始用仿妆潜入前男友的婚礼、冒充讨厌的同事去搞破坏。但很快，她发现自己每一次用完仿妆，脸上的真实皮肤就会松弛一点点。更可怕的是，她听说这款仿妆液的发明者其实是一个连环杀手，他用仿妆接近受害者，然后将对方的脸皮完整剥下，做成新的“精华液原料”。米粒发现自己已经是下一个目标。", "one_line": "一款号称能“复制任何人的脸”的仿妆技术，背后是一条条被剥掉的脸皮。", "bucket": "suspense"}, {"id": "0722", "title": "皇牌特务龙虎斗", "filename": "m0722.html", "year": "1989", "region": "中国香港", "genre": "动作 / 喜剧", "tags": "双雄，CIA，黑吃黑，港式幽默", "summary": "金牌搞笑动作组合再度联手。CIA特工麦克来港追查失窃的生化芯片，而重案组警长李国华则负责一桩黑帮军火案。两人因巧合屡次撞车，大打出手后却被上司勒令合作。他们互相看不顺眼，每次行动都能把现场炸成废墟，却又意外破获关键线索。追查到最后，李国华发现出卖情报的内鬼竟是自己的亲弟弟，而麦克也被告知，CIA内部的叛徒代号“青龙”，所有证据都指向李国华。两人在维多利亚港的货船上拔枪相向，背后却是同一批敌人。", "one_line": "香港警察与CIA特工因任务重叠而被迫合作，却不知道对方就是自己要抓的“内鬼”。", "bucket": "action"}, {"id": "0723", "title": "火爆大油城", "filename": "m0723.html", "year": "1988", "region": "美国", "genre": "动作", "tags": "石油, 硬汉, 爆炸, 阴谋", "summary": "退休消防总教官杰克受邀来到昔日以石油繁荣的“油城”参加庆典，却发现昔日战友接连死于诡异的“意外火灾”。当地警方以证据不足草草结案，杰克凭借经验认定火灾源头是化学纵火。他联手镇上唯一的女记者莎拉，潜入戒备森严的石油精炼厂，发现财团为了征地开采页岩气，正有计划地清除钉子户。杰克不仅要面对高科技纵火设备，还要对抗被收买的警长。最终，他在燃烧的钻井平台上与幕后杀手展开肉搏，并在油井爆炸前十分钟拯救了整个小镇。", "one_line": "一名退休消防员重返石油小镇，发现连日火灾背后是跨国财团的灭口计划。", "bucket": "action"}, {"id": "0724", "title": "反派初始化", "filename": "m0724.html", "year": "2025", "region": "日本", "genre": "奇幻 / 动作 / 穿越", "tags": "重生，反英雄，宿敌，系统流", "summary": "魔王级反派“黑帝”在即将毁灭世界的前一刻，被一个自称“剧情修正者”的未知系统强制重置到二十年前——他刚获得能力、与宿命对手“白夜”初次相遇的那天。这一次，他带着所有记忆，却发现自己无法做出任何“反派行为”，一旦触犯规则就会被系统惩罚甚至抹杀。为了破解系统，他不得不假扮成一个三流英雄，与白夜组队打怪，同时暗中寻找重置的源头。然而随着调查深入，他震惊地发现：这个系统，居然是由未来的白夜临死前创造的，而“成为反派”是他自己最初的选择。", "one_line": "终极反派在临终前被系统重置，回到了与英雄初次对决的那一天。", "bucket": "fantasy"}, {"id": "0725", "title": "基督之名", "filename": "m0725.html", "year": "2022", "region": "美国", "genre": "惊悚、悬疑", "tags": "宗教、小镇、谋杀、信仰崩塌、反转", "summary": "美国密苏里州一个宁静小镇，年轻的牧师迈克尔深受居民爱戴，他的布道永远座无虚席。某天，教堂地下室的百年墓穴在修缮时被发现多了三具无头尸，死亡时间都在最近三个月内。警方的调查陷入僵局，因为凶手没有留下任何物理证据。但迈克尔发现了一个令他灵魂战栗的事实：他在无意中翻查忏悔记录时发现，三名死者在遇害前一天，都曾来教堂向他忏悔，而他们忏悔的内容正是“我即将犯下不可饶恕的罪”。凶手在行凶前会先来忏悔，把迈克尔变成了“提前知情的沉默帮凶”。更恐怖的是，第四名忏悔者已经出现，而迈克尔必须在“遵守保密义务”和“阻止谋杀”之间做出终极选择。", "one_line": "虔诚的小镇牧师开始调查教堂地下室的三具无头尸，却发现凶手每次行凶前都曾向他忏悔。", "bucket": "suspense"}, {"id": "0726", "title": "布兰妮：星踪可考", "filename": "m0726.html", "year": "2025", "region": "美国", "genre": "传记 / 悬疑 / 音乐", "tags": "流行偶像, 监护权阴谋, 粉丝破案, 伪纪录片", "summary": "本剧采用伪纪录片+真实素材混剪的形式，讲述了一群布兰妮粉丝从2019年开始的“破案”过程。他们注意到布兰妮的Instagram存在大量异常：照片背景的日历时间不符、某些发音与布兰妮口音不同、甚至瞳孔反射中出现了陌生男人的脸。粉丝们成立了#FreeBritney线上小组，用开源情报技术（OSINT）追踪照片元数据、航班记录和加密聊天记录。他们发现，布兰妮自2008年以来一直被置于一个名为“星踪”的监护系统下，该系统不是法律监护，而是一个由音乐产业高层、安保公司和私人医疗集团组成的商业联盟，控制了至少12位知名艺人。更可怕的是，他们在一些被删除的直播录像中，逐帧发现了一个重复出现的十六进制代码，解码后是一串坐标——指向内华达沙漠深处一个没有标注的建筑。全剧8集，第7集结尾，他们收到了来自那个坐标的匿名加密视频，内容是布兰妮本人的一句话：“你们已经找得很近了，转身。”", "one_line": "布兰妮的粉丝们不相信她的社交媒体是本人发的，他们组建了一个线上侦探团，发现了一个涉及娱乐圈顶层的人口控制计划。", "bucket": "drama"}, {"id": "0727", "title": "比安布林更黑", "filename": "m0727.html", "year": "2025", "region": "韩国", "genre": "惊悚, 犯罪, 悬疑", "tags": "复仇, 连环杀手, 模仿犯, 黑色电影, 反转", "summary": "寂静的韩国海滨小镇，接连发生手法与已伏法的连环杀手“安布林”如出一辙的命案。一时间，全镇恐慌，媒体蜂拥而至，称其为“安布林归来”。年轻警探秀雅负责此案，她发现模仿犯的作案虽有形似，却在细节上更加残忍和仪式化，仿佛在“超越”安布林。随着调查深入，所有线索都指向一个不可能的嫌疑人——安布林本应早已死在狱中的孪生兄弟。但秀雅通过心理侧写发现，凶手并非崇拜安布林，而是痛恨他。凶手的真实身份是当年安布林案中一位被忽略的受害者的父亲。他精心策划“模仿”是为了引导警方重新调查安布林案中未被追查的共犯——一位德高望重的企业家。最终，这位父亲在即将成功复仇时被秀雅阻止，他在警车上意味深长地说：“我只是让世界比安布林更黑一点，才能看清它原本的颜色。”", "one_line": "小镇出现模仿著名连环杀手“安布林”的凶案，但警察发现，真正的凶手比安布林更疯狂。", "bucket": "suspense"}, {"id": "0728", "title": "时限三天爱上我", "filename": "m0728.html", "year": "2024", "region": "中国大陆", "genre": "爱情 / 奇幻 / 都市", "tags": "倒计时恋爱, 系统任务, 契约情侣, 高概念", "summary": "26岁的母胎单身程序员苏晚，某天醒来后发现手机里多了一个无法卸载的APP“恋爱倒计时”，上面显示：72小时后你将被从所有人的记忆中删除，唯一破解方法是让一个对你完全陌生的男人真心说出“我爱你”。苏晚试遍所有招数：搭讪、英雄救美（失败）、假装失忆（被拆穿），最后被迫选中了公司里最讨厌她的毒舌同事、产品经理陆淮舟。陆淮舟认为苏晚是“史上最不靠谱的开发”，苏晚则认为陆淮舟是“控制狂甲方”。在倒计时的压力下，两人被迫开启“三小时约会、三小时互怼、三小时写代码”的疯狂模式。随着时间流逝，苏晚发现自己分不清陆淮舟的关心是因为任务还是真心，而陆淮舟则发现，自己好像真的开始在意这个永远穿格子衫的女孩了。", "one_line": "母胎单身的她被系统告知：三天内必须让一个男人爱上自己，否则就会消失。", "bucket": "romance"}, {"id": "0729", "title": "深夜里的美味秘方", "filename": "m0729.html", "year": "2024", "region": "日本", "genre": "美食 / 治愈 / 剧情", "tags": "深夜食堂、秘方、匠人精神、都市孤独", "summary": "东京小巷，凌晨两点准时亮灯的拉面店“时雨”。店主老头没有菜单，只问客人一句话：“你今天想放下什么？”然后根据客人的人生故事调制一碗专属拉面：分手女人得到的是“眼泪咸味增面”；破产男人得到“负债辣味噌”；绝症少年得到“来生猪骨浓汤”。每碗面都有一个隐藏配方，吃到的人会在第二天找回重新开始的勇气。直到一天，老头的女儿来找他做最后一碗面。", "one_line": "一家只开在凌晨两点的拉面店，每碗面里都藏着顾客人生的“秘密配方”。", "bucket": "drama"}, {"id": "0730", "title": "犹大与黑色弥赛亚", "filename": "m0730.html", "year": "2024", "region": "美国", "genre": "传记 / 历史 / 惊悚", "tags": "黑豹党, 卧底, FBI, 政治阴谋", "summary": "1968年芝加哥。小混混比尔·奥尼尔因偷车被捕，FBI探员米切尔给了他一个选择：去黑豹党伊利诺伊州分会当卧底，否则把牢底坐穿。比尔成功接近魅力非凡的主席弗雷德·汉普顿。弗雷德推行“彩虹联盟”，试图联合所有少数族裔反抗政府。在与弗雷德相处的过程中，比尔被其理想主义感染，陷入深深的道德困境。但FBI用他的家人威胁，逼迫他提供汉普顿的公寓图纸和作息时间。1969年12月4日凌晨，警方在FBI授意下冲入公寓扫射，熟睡中的汉普顿被当场打死，年仅21岁。多年后，出狱的比尔面对记者，泪水决堤：“他们让我毒死了弥赛亚。”", "one_line": "1960年代，一名街头小偷为免牢狱之灾成为FBI线人，亲手送走了把他当兄弟的黑豹党领袖。", "bucket": "drama"}, {"id": "0731", "title": "亚当变奏曲", "filename": "m0731.html", "year": "2019", "region": "法国", "genre": "剧情， 音乐， 同性", "tags": "钢琴， 救赎， 精神病患", "summary": "亚当是享誉国际的钢琴天才，但他有一个秘密：他患有精神分裂症，他幻想出一个名叫“诺亚”的男人，陪伴他度过了整个孤独的青年时代。诺亚是亚当的缪斯，也是他的爱人。为了治病，亚当接受了一种激进的电击疗法，诺亚的人格随之消失。亚当的琴声也变得精准而冰冷，再也弹不出当年的感动。几年后，亚当受邀参加一个音乐比赛，参赛曲目正是他为“诺亚”而作的《亚当变奏曲》。在演奏过程中，他开始在观众席看到了诺亚的身影。这一次，亚当不想再杀死他，哪怕代价是自己再次坠入精神错乱的深渊。他选择了最疯狂的方式：在最后一个音符落下的瞬间，对着空无一人的观众席，说出了那句从未说出口的“我爱你”。", "one_line": "天才钢琴家因精神分裂入院，他分裂出的第二人格竟是他此生最爱的男人，而这个人，根本不存在。", "bucket": "drama"}, {"id": "0732", "title": "迷失列车", "filename": "m0732.html", "year": "2027", "region": "欧洲", "genre": "科幻, 悬疑, 惊悚", "tags": "平行宇宙, 车厢, 密闭空间, 无限循环", "summary": "一群身份各异的乘客登上从巴黎开往伊斯坦布尔的东方快车。列车驶入一条本该只有几分钟长的隧道后，便再未驶出。乘客发现，每打开一节车厢的门，就会进入一个奇怪的平行世界：有的车厢变成了二战时期的纳粹集中营，有的车厢是洪水淹没的水下世界，还有的车厢里所有人都失去了眼睛。主角们必须在食物耗尽前，找到那节“真实车厢”。随着探索深入，他们发现自己其实是某个人工智能模拟程序中的故障代码，而列车是系统在试图删除他们。", "one_line": "一列横穿欧洲的夜班火车驶入隧道后，每节车厢竟通往一个截然不同的人间炼狱。", "bucket": "sci-fi"}, {"id": "0733", "title": "爱巢", "filename": "m0733.html", "year": "2025", "region": "法国", "genre": "剧情 / 家庭", "tags": "三代同堂, 房产纠纷, 温情, 故乡, 法式幽默", "summary": "马赛老城区一栋破旧别墅面临强拆，住在里面的八旬老太太苏菲拒绝签字。她三个在外打拼的子女为了“保护母亲”纷纷搬回老宅，却因生活习惯、教育观念和藏在阁楼里的童年旧账天天吵架。大姐要卖房分钱，二哥要坚守到底，小妹则带来一帮搞行为艺术的朋友在墙上涂鸦。就在一家人闹得不可开交时，苏菲拿出了一本五十年前的日记，里面记录着这栋房子真正的意义——不是房子，而是里面的人曾如何爱过。", "one_line": "一套老房子面临拆迁，搬进来的子女们试图用爱赶走开发商，却先差点拆散彼此。", "bucket": "drama"}, {"id": "0734", "title": "嘿玛嘿玛", "filename": "m0734.html", "year": "2023", "region": "不丹", "genre": "剧情, 神秘, 艺术", "tags": "面具, 仪式, 禁忌, 身份认同, 宗教", "summary": "在不丹的密林深处，有一个持续两周的秘密仪式。参与者戴上完全相同的大面具，脱下社会身份，在匿名中获得绝对自由。一名中年男子周加入仪式，最初体验到卸下责任的狂喜。然而，当他偶遇一位神秘女子后，内心的嫉妒与欲望开始膨胀。在匿名性的掩护下，他犯下了无法挽回的暴力罪行。二十年后，他带着面具回到原地，当年的事件早已成为传说，而他必须面对那个未曾离开的幽灵，以及面具下无法逃脱的自我审判。", "one_line": "每隔十二年，森林深处举行一场戴上面具、隐匿身份的丛林法会，一名男子因欲望犯下大错。", "bucket": "drama"}, {"id": "0735", "title": "玛丹娜", "filename": "m0735.html", "year": "2026", "region": "法国", "genre": "剧情 / 音乐 / 传记", "tags": "女性，成长，叛逆，流行文化", "summary": "1978年，20岁的玛丹娜·西科尼带着35美元从密歇根州辍学来到纽约。她睡在垃圾堆旁，当过裸体模特，被抢劫、被强暴、住过老鼠横行的公寓。她组建的第一个乐队在同性恋酒吧演出，被唱片公司拒绝无数次。所有人都说她长得不够漂亮、声音太尖、舞蹈太疯。但她坚信：“我不在乎你喜不喜欢我，我只要你在谈论我。”本片聚焦玛丹娜从1978年到1983年发行首张同名专辑《Madonna》的五年黑暗岁月。她像一只打不死的老鼠，从地下俱乐部爬到主流视野。当《Holiday》最终在舞厅爆红时，她站在时代广场的雨里大笑。影片最后一幕：她对着镜子涂上标志性口红，说：“世界，准备好。”", "one_line": "1980年纽约，一个叫玛丹娜·西科尼的底层舞者，准备用野心和身体征服整个音乐工业。", "bucket": "drama"}, {"id": "0736", "title": "手视", "filename": "m0736.html", "year": "2024", "region": "法国", "genre": "艺术剧情", "tags": "盲人, 触觉, 雕塑, 哲学, 黑白", "summary": "天才雕塑家保罗在意外中失明后，发展出了一种超乎常人的触觉能力：他可以通过双手的触摸，感知到对方内心的情绪、过往甚至谎言。他用这种方式创作出了一系列令人惊叹的“情绪肖像”雕塑。某天，一名神秘女子委托他制作自己已故丈夫的胸像，但只提供了一张照片，拒绝让他触摸任何与丈夫有关的东西。保罗凭借仅有的照片，用双手在黏土上摸索了数月，终于完成了一座完美的胸像。然而在交付作品的那天，他无意间触碰到了女子的手——那双手，和胸像上的手一模一样，而且那双“手”告诉他：根本没有所谓的丈夫。", "one_line": "一位失明的雕塑家，通过触摸别人的脸来“看见”他们的灵魂，直到有一天，他摸到了一张没有表情的脸。", "bucket": "fantasy"}, {"id": "0737", "title": "黄金战士", "filename": "m0737.html", "year": "2025", "region": "中国大陆", "genre": "动作, 战争", "tags": "抗美援朝, 狙击手, 兄弟情", "summary": "抗美援朝战争最惨烈的上甘岭，卫生员“秀才”因为晕血从未杀过人，只负责抬担架。当他的连队遭遇美军王牌狙击小队伏击、全员被困坑道时，秀才被逼到了绝境。他利用地形、石头、雪和从尸体上拆下的零件，制造出各种匪夷所思的诡雷和陷阱，上演了一场以一人之力对抗精英狙击手的绝地反击。他始终没有开一枪，却成为了敌人眼中的“黄金幽灵”。", "one_line": "上甘岭战役中，一位从不带枪的卫生员为救战友，用石头和诡雷单挑敌军一个狙击小队。", "bucket": "action"}, {"id": "0738", "title": "神之子", "filename": "m0738.html", "year": "2006", "region": "美国", "genre": "奇幻， 剧情", "tags": "宗教隐喻， 超能力， 末日预言， 救世主", "summary": "偏远小镇的男孩伊利亚出生时，一道圣光划破天际，他的双手能治愈任何伤痛，代价是每次治愈后他自己都会身患同样的疾病。他的母亲坚信他是上帝派来的使者，带着他四处布道，使他疲惫不堪。伊利亚渴望像一个普通男孩那样生活，他开始拒绝使用自己的能力。此时，一场足以毁灭小镇的瘟疫悄然蔓延，镇上唯一的神父也染病倒下。看着身边的人一个个痛苦死去，伊利亚陷入了巨大的挣扎。他恨命运的不公，却又无法漠视生命的逝去。最终，他选择了背负起十字架，以燃烧自己的生命为代价，为小镇带来最后的救赎，成为了真正的“神之子”。", "one_line": "一个生来就拥有治愈能力但自己却疾病缠身的男孩，必须学会接受自己作为“神之子”的宿命。", "bucket": "fantasy"}, {"id": "0739", "title": "全面逃杀", "filename": "m0739.html", "year": "2025", "region": "美国", "genre": "动作、惊悚、生存", "tags": "大逃杀、雇佣兵、背叛、复仇", "summary": "前黑水公司雇佣兵凯恩被老搭档米歇尔邀请参与“高端安保测试”，上岛后植入颈后追踪芯片，才知道自己是“狩猎派对”的唯一猎物。岛上遍布热感无人机、自动炮台和赏金猎人，每活过一小时，奖金翻倍，全球暗网直播。凯恩利用雨林生存技巧反杀三队猎人，黑进直播系统向全网喊话：“你们在看的不是游戏，是我被处决的直播。” 观众开始倒戈，黑客集体攻击服务器。米歇尔在控制室犹豫时，凯恩已炸开地堡大门。两人对峙，米歇尔坦白：公司绑架了他女儿。凯恩放下枪，说：“那就让他们看看，一个父亲能有多疯。” 最终他带着米歇尔和女孩乘直升机逃离。", "one_line": "退役雇佣兵被旧同事骗进私人岛屿的猎杀游戏，猎物只有他一个，猎手是整座岛的武装系统。", "bucket": "action"}, {"id": "0740", "title": "好孕测验", "filename": "m0740.html", "year": "2025", "region": "日本", "genre": "剧情 / 悬疑 / 女性", "tags": "生育焦虑, 医疗阴谋, 职场女性, 身体自主", "summary": "2025年，东京。一款名为“好孕测验”的家用试纸成为爆款，只需一滴唾液，十分钟就能测出“最佳受孕窗口”和“胚胎健康概率”。销售公司“LIFE+”号称准确率99.9%，上市半年创下销量神话。三位女性：35岁的广告总监、28岁的已婚护士、19岁的大学生，几乎同时发现自己“好孕测验”呈阳性。但她们的医院血液检查结果全部是阴性。三人通过一个地下论坛联系到一起，开始调查。护士黑入了“LIFE+”服务器，发现测试结果并非基于生物学，而是基于用户的“社会信用分”——平台通过购物记录、社交媒体发言、地理位置判断“这个女性是否应该怀孕”。高信用分者显示阳性（鼓励生育），低信用分者显示阴性（暗示“你不配”）。更可怕的是，阳性结果会被自动同步到用户的公司人事系统和婚姻登记数据库。三位女性决定公开数据，但第二天，护士因“泄露医疗隐私”被捕，大学生被学校以“精神不稳定”为由退学。只剩广告总监一个人面对镜头。她在全国直播中说：“我的好孕测验是阳性。但我不想生孩子。我只是想让所有不想生的人，有资格说不。”", "one_line": "一款成功率99.9%的家用“好孕测验”试纸风靡全国，直到三位不同年龄的女性发现，阳性结果取决于你的社交信用分。", "bucket": "drama"}, {"id": "0741", "title": "水城追逐战", "filename": "m0741.html", "year": "2026", "region": "意大利 / 法国", "genre": "动作, 惊悚, 犯罪", "tags": "威尼斯, 快艇, 狂欢节, 面具, 水上追逐", "summary": "威尼斯狂欢节第二天，重案组女警吉亚拉接到秘密任务：将掌握黑手党洗钱核心证据的会计师从主岛护送到机场。但她刚驶出运河，三艘改装过的黑色快艇从两侧包抄，船上的枪手戴着威尼斯狂欢节的银色面具。吉亚拉驾驶警用快艇在狭窄水道中疯狂穿梭，船底擦着古老的建筑墙面。会计师透露：追杀者是黑手党最精锐的“水鬼”小队，他们对每一条运河的流向、每一座桥的限高都了如指掌。吉亚拉利用狂欢节的游行船只作为掩护，在圣马可广场前与敌人上演了一场高速漂移，随后弃船上岸，混入成千上万戴着面具的游客中。但敌人通过热成像无人机锁定了他们，吉亚拉必须在面具被摘下之前，抢到贡多拉码头最后一艘能出海的船。当子弹撕破狂欢的彩带，这场追逐将决定威尼斯的最后一块净土是否沦陷。", "one_line": "威尼斯狂欢节期间，女警护送证人的快艇被黑帮包围，整座水城变成致命赛道。", "bucket": "action"}, {"id": "0742", "title": "日常警事", "filename": "m0742.html", "year": "2024", "region": "中国大陆", "genre": "剧情, 悬疑", "tags": "派出所, 单元剧, 社会百态", "summary": "和平路派出所即将被合并，所有警员人心惶惶，只等着混日子走人。唯独警长老马（即将退休）依然每天处理着鸡毛蒜皮的小事：找猫、劝架、抓传销。他看似啰嗦迂腐，却能通过对社区每一户居民的了解，从常理中洞察反常。一个声称丢自行车的报案，他顺藤摸瓜挖出一个跨省拐卖团伙；一起普通的噪音扰民投诉，他通过一袋特殊的垃圾，阻止了一场灭门惨案。他用的是最笨的办法：聊天。在他的絮叨中，每个嫌疑人都会在不经意间露出破绽。本剧采用单元剧形式，每两集一个案件，在家长里短中折射出大时代下小人物的命运和坚守。", "one_line": "在即将被裁撤的破烂派出所里，一个絮叨的“废柴”警长用最不靠谱的方式，解开了最残酷的谜题。", "bucket": "drama"}, {"id": "0743", "title": "黑侠", "filename": "m0743.html", "year": "1996", "region": "中国香港", "genre": "动作 / 科幻 / 犯罪", "tags": "超级英雄 / 改造人 / 蒙面 / 暴力 / 救赎", "summary": "神秘组织“701部队”多年来秘密进行一项“强化战士”计划，将普通士兵改造成没有痛觉、力大无穷的杀人机器。徐夕是其中最优秀的战士，代号“黑侠”。但他厌倦了杀戮，在一次任务中假死脱身，逃到香港，在市区图书馆当起了一名温和的图书管理员。他以为可以过上平静的生活，但701部队的教官为了引他出来，开始疯狂屠杀无辜市民，并栽赃给“黑侠”。徐夕为了不连累同事，决定不再沉默。他重新穿上那件标志性的黑色战衣，戴上墨镜，利用自己的超强体能与格斗技巧，在城市的地下与追兵展开殊死搏斗。他找到了同样厌倦组织、愿意帮助他的前女教官。两人联手捣毁了701部队在香港的据点，但在最终对决中，徐夕发现自己最好的朋友——一名普通警察，也被卷入了这场风暴，并即将成为新的“黑侠”实验品。", "one_line": "一个不愿再杀人的生化改造人隐居于都市，却被迫重披黑衣，对抗追杀他的疯狂军队。", "bucket": "action"}, {"id": "0744", "title": "强尼上战场", "filename": "m0744.html", "year": "2025", "region": "美国", "genre": "战争 / 剧情", "tags": "反战, 心理创伤, 个人英雄主义, 现实主义", "summary": "伊拉克战争老兵强尼回国后被封为“国家英雄”。他在一次战斗中独自扛着受伤队友穿越火线，被媒体大肆渲染。但没有人知道，那一刻他根本没想救人，他只是想逃跑，只是跑错了方向。这个“英雄的秘密”像毒蛇一样啃噬着他的内心。他患上了严重的PTSD，分不清现实与幻觉。当政府邀请他为战争债券站台时，他必须在“虚假的英雄”和“真正的懦夫”之间做出选择。", "one_line": "他是战场上的英雄，但每个深夜他都要对着镜子确认自己还是“强尼”。", "bucket": "drama"}, {"id": "0745", "title": "新荡女卡门", "filename": "m0745.html", "year": "2024", "region": "西班牙", "genre": "剧情，爱情", "tags": "现代改编，女性主义，自由与叛逆", "summary": "现代版《卡门》。卡门是巴塞罗那地下电子乐圈最耀眼的DJ，她不受任何规则束缚，无论是爱情、道德还是法律。她凭借自己的音乐和魅力，玩弄着规则，同时也玩弄着追求者们的感情。士兵何塞因她而背弃了未婚妻和军队，最终沦为夜店保安。斗牛士埃斯卡米里奥则是富二代夜店老板，同样被她吸引。与原著不同，这里的卡门更加清醒和主动，她知道自己要什么。当何塞因嫉妒和占有欲要杀害她时，卡门用她的智慧和圈子的力量反将一军，她没有死，而是彻底摧毁了何塞，让他明白：试图驯服一个自由的灵魂，自己就会被毁灭。她转身消失在舞池中央，继续着她的传奇。", "one_line": "将经典悲剧《卡门》搬到现代都市夜店，她不再是一个被动的诱惑者，而是一个主动的游戏规则制定者。", "bucket": "drama"}, {"id": "0746", "title": "超时空护卫队第一季", "filename": "m0746.html", "year": "2026", "region": "中国大陆", "genre": "科幻, 动作, 动画", "tags": "时间线, 机甲, 平行宇宙, 团队", "summary": "在时间管理局的监控下，历史本应平稳流动。然而，一股神秘势力开始篡改关键节点，导致时间线崩坏。三名被各自时代抛弃的“边缘人”——古代机械师、现代程序员和未来退役士兵，被紧急组建成“超时空护卫队”。他们驾驶着简陋的初始机甲，在混乱的时间碎片中穿梭。但随着任务深入，他们发现每次修正历史，都会创造出一个更黑暗的平行宇宙，而那个幕后黑手，似乎掌握着他们所有人最私密的记忆。", "one_line": "三个来自不同时间线的“废柴”被招募，负责修正被篡改的历史，却发现最大威胁是未来的自己。", "bucket": "sci-fi"}, {"id": "0747", "title": "好奇的乔治", "filename": "m0747.html", "year": "2024", "region": "美国", "genre": "动画 / 冒险 / 家庭", "tags": "儿童, 探险, 友情, 科普, 治愈", "summary": "乔治和戴着黄帽子的老朋友，这次来到了一个被遗忘的游乐园旧址。乔治在旋转木马的底座下，发现了一个锈迹斑斑的铜制罗盘。罗盘上没有东南西北，而是刻着四个词：笑、泪、拥抱、再见。无论乔治怎么转动，指针总是颤颤巍巍地指向“笑”。他跟着指针跑进一片灌木丛，发现了一台老旧的爆米花机。乔治拉动拉杆，爆米花炸出来的不是玉米，而是一张张褪色的游乐园旧照片。照片里，一个没有腿的小女孩坐在旋转木马上笑得灿烂。黄帽子先生认出了她——那是三十年前失踪的游乐园主人的女儿。乔治决定，要把这个罗盘送给所有不开心的小朋友，带他们找到属于自己的“笑”。", "one_line": "小猴子乔治捡到一个神秘罗盘，指针指向的并非北方，而是“所有人心里最快乐的地方”。", "bucket": "animation"}, {"id": "0748", "title": "弗兰克电影", "filename": "m0748.html", "year": "2026", "region": "美国", "genre": "喜剧、悬疑", "tags": "伪纪录片，好莱坞讽刺，失踪案，元电影", "summary": "导演阿伦是个纪录片门外汉，他想拍一部关于过气动作明星弗兰克“东山再起”的励志片。他采访了弗兰克的经纪人、前妻、替身演员和私生饭，所有人都在镜头前讲述着感人的故事。但在剪辑阶段，阿伦突然发现了一个恐怖的事实：所有采访的时间戳都是混乱的，弗兰克其实在三年前就失踪了，而接受他采访的这些人，每个人扮演的都是不同的角色。经纪人实际上是追踪弗兰克的债主，前妻是私家侦探，而那个私生饭可能是绑架者。阿伦决定将这部纪录片变为调查记录，镜头成了他保命的工具。当真相逐渐浮出水面，弗兰克本人却突然出现在了片场门口。", "one_line": "一名三流导演在拍摄一部关于大明星弗兰克的纪录片时，突然发现弗兰克本人已经失踪三年，而片中所有人都在撒谎。", "bucket": "comedy"}, {"id": "0749", "title": "地牢围攻2", "filename": "m0749.html", "year": "2025", "region": "美国", "genre": "动作奇幻", "tags": "游戏改编, 地下城, 小队作战, 魔法, 硬核打斗", "summary": "电影版《地牢围攻》续集。前精英雇佣兵凯恩退出江湖后隐居小镇，女儿被神秘教团掳走当作“活祭品”献祭给地牢深处的存在。凯恩找回老队友：暴躁矮人爆破手、失忆精灵法师和变节教团圣女，四人闯入被诅咒的九层地牢。每一层都对应一种死法：毒雾、镜像、重力反转、时间循环。在第五层，他们发现教团祭司口中的“恶魔”实际上是被众神囚禁的上古存在“裁决者”，而女儿的血脉是唯一能解除封印的钥匙。凯恩面临选择：让女儿牺牲换取出路，或释放裁决者屠尽众神，代价是整个地牢崩塌。", "one_line": "前雇佣兵为救女儿重操旧业，组队闯入禁忌地牢，发现底层关押着神明。", "bucket": "comedy"}, {"id": "0750", "title": "成人派对", "filename": "m0750.html", "year": "2024", "region": "美国", "genre": "喜剧 / 剧情", "tags": "30岁，生日派对，老友重聚，人生选择，黑色幽默", "summary": "艾米迎来了30岁生日，邀请了五个从大学就认识的老友来家中聚会。最初的鸡尾酒和怀旧音乐过后，有人提议玩“成人版”真心话大冒险——不能说假话，不能拒绝大冒险。游戏开始后，每个人精心维护的面具一一被撕下：模范丈夫被曝出出轨，乖乖女其实一直在吸大麻，事业有成的投行男其实失业三个月了，而艾米自己，则被问出她五年前曾偷偷堕过胎。场面从好笑变成难堪，从难堪变成愤怒，又从愤怒变成了前所未有的坦诚。当派对变成一场互相揭短的闹剧后，天亮了，五个浑身狼狈的人坐在被砸烂的客厅里，第一次真正看见了彼此。", "one_line": "三十岁生日派对上，五个老友玩起了“真心话大冒险”，结果每个人都崩掉了伪装。", "bucket": "comedy"}, {"id": "0751", "title": "隐世狼女第二季", "filename": "m0751.html", "year": "2024", "region": "加拿大", "genre": "奇幻 / 惊悚", "tags": "狼人, 身份认同, 都市传说", "summary": "远离人群的狼女艾莎本季被迫进入地下狼人社会。一个名为“月嚎”的帮派控制着城市东区，首领要求她杀死一名“叛徒”——一个隐藏身份多年的老狼人。艾莎在执行任务时发现，这个老狼人正是当年为了保护她而牺牲名声的生父。父女联手对抗帮派，同时还要躲避猎魔人的追杀。本季揭露了狼人社会的等级制度，而艾莎必须在复仇、保护与自我认同之间做出抉择。", "one_line": "狼女被迫加入城市里的狼人帮派，却发现帮派首领猎杀的是自己的亲生父亲。", "bucket": "fantasy"}, {"id": "0752", "title": "街角工作室", "filename": "m0752.html", "year": "2025", "region": "美国", "genre": "喜剧 / 剧情", "tags": "独立电影, 片场, 梦想, 群像, 荒诞", "summary": "纽约布鲁克林的一个街角，失业导演艾迪用最后的积蓄盘下了一家倒闭的便利店，改造成“街角工作室”。来这里的人五花八门：想拍健身视频的脱衣舞娘、要用手机拍丧尸片的披萨店外卖员、坚信自己发明了“嗅觉电影”的怪老头、以及为了拿学分不得不来的电影系富二代。每一集都是一个项目的荒唐筹备过程：资金靠众筹、演员是路人、道具从垃圾堆捡。但当这些看似不可能的作品杀青时，这群失败者却拍出了比好莱坞更真实的人间百态。最终，他们收到了Netflix的收购邀约。", "one_line": "一个废弃的街角便利店被改成了“最穷电影工作室”，这里每天都有好莱坞做梦都写不出的剧本。", "bucket": "comedy"}, {"id": "0753", "title": "胖胖的搞笑", "filename": "m0753.html", "year": "2025", "region": "中国大陆", "genre": "喜剧 / 家庭 / 生活", "tags": "体型歧视，逆袭爽剧，萌宠搭档", "summary": "胖子阿强因为体型被同事嘲笑、被女友抛弃，人生跌入谷底。突然，他被告知继承了从未谋面的叔叔的“遗产”——一家濒临倒闭的拳击馆，以及一只会说话但刻薄的橘猫。橘猫告诉他，必须完成叔叔留下的十个整蛊坏人的任务，才能获得真正的亿万财产。阿强开始了啼笑皆非的执行过程：用屁垫恶搞刻薄上司、用遥控车戏弄碰瓷大妈。在过程中，他不仅瘦了下来，还收获了真正的友谊和爱情。最终，他不仅拿到了钱，更找回了自信。", "one_line": "200斤的废柴宅男意外继承黑道遗产，却必须与一只毒舌猫联手完成十个奇葩任务。", "bucket": "comedy"}, {"id": "0754", "title": "狼的孩子雨和雪", "filename": "m0754.html", "year": "2012", "region": "日本", "genre": "动画，剧情，奇幻", "tags": "母爱，成长，治愈，兽人", "summary": "大学生“花”爱上了不常出现的“他”，后来发现他是狼人。两人结婚生子，生下了姐姐“雪”和弟弟“雨”。雪活泼好动，性格像狼；雨胆小怯懦，性格像人。幸福的时光因“他”的意外去世而终结。为了躲避城市中泄密的风险，花带着两个孩子搬到偏僻的、没有水电的深山里居住。这里野兽出没，冬天大雪封山。花一个弱女子，靠种地、打猎、甚至学做木工，艰难地养育着孩子。孩子们渐渐长大，面临最终的选择：作为人活在人类社会，还是作为狼回归自然。雪选择了学校，学会了隐藏狼的身份；而雨则拜山中老狐狸为师，决定成为山林的守护者。在一个暴风雨之夜，花含泪目送着雨消失在山林中。", "one_line": "一个普通女大学生爱上了狼人，生下一对姐弟，丈夫死后，她独自在深山抚养这对能变狼的孩子。", "bucket": "animation"}, {"id": "0755", "title": "到此一游", "filename": "m0755.html", "year": "2025", "region": "中国大陆", "genre": "悬疑 / 公路", "tags": "犯罪, 黑色幽默, 网络热点", "summary": "五个想要博出位的网红主播，结伴前往传说中有去无回的“幽灵谷”进行生存直播。他们每到一处地点，就会在岩壁上发现用利刃刻下的“到此一游”字样，而落款日期竟然是“明天”。最初他们以为是队友搞鬼，但随着其中一人按照“明日雕刻”的指引行动后真的失踪，恐惧开始蔓延。他们发现，这个留言板不仅来自未来，而且只会在他们即将死亡的地点出现。为了活下去，这群为了流量不惜出卖灵魂的年轻人，必须根据这些死亡预告，反向推理出凶手的动机，展开一场与未来的终极赛跑。", "one_line": "一群网红为了流量去无人区直播探险，却接连收到来自未来的“到此一游”雕刻。", "bucket": "suspense"}, {"id": "0756", "title": "鬼马小天使", "filename": "m0756.html", "year": "1997", "region": "中国香港", "genre": "喜剧、家庭、奇幻", "tags": "童星、超能力、乌龙神仙、邻里温情", "summary": "七岁的小婉君是屋村里出了名的捣蛋鬼。一天，她在废品站捡到一个破旧的陶瓷小天使，擦拭时不小心划破了手指，血滴在了天使上。从此，只要她对着一个人大喊“变小！”，对方就会在接下来的一个小时里变回自己七岁时的模样。一开始，她用这招来搞恶作剧：让总板着脸的包租婆变回爱哭的小女孩，让凶巴巴的教导主任变回喜欢舔棒棒糖的傻小子。但渐渐地，她发现这个能力可以治愈人心：让忙于工作的爸爸重新体会到当父亲的快乐，让孤独的独居老人重新变回那个有梦想的少年。然而，一个神秘的收藏家发现了小天使的秘密，派出了两名笨贼前来抢夺。", "one_line": "一个顽皮的七岁女孩意外获得了能让成年人暂时变回孩子的超能力，整个社区都被她搅得天翻地覆。", "bucket": "comedy"}, {"id": "0757", "title": "异空危情", "filename": "m0757.html", "year": "2026", "region": "中国香港", "genre": "科幻, 动作, 悬疑", "tags": "平行宇宙, 特务, 自我对决", "summary": "2040年，香港保安局高级特工方展博发现市民的噩梦中频繁出现一个“黑港”——一个被跨国财团统治的平行香港，那里的天空永远是红色的。更可怕的是，黑港的人正在通过梦境向本宇宙输出一种意识病毒，被感染的人在现实里会逐渐被黑港的自己替换。方展博奉命潜入“黑港”，却发现那里的统治者竟是自己的母亲——一个在本宇宙早已死去的女人。母亲告诉他，两个宇宙本为一体，分裂时产生了正邪两种能量，而方展博是唯一可以平衡两者的“锚点”。为了拯救本宇宙，他必须亲手杀死母亲，但杀死母亲后，黑港的能量将全部涌入他的体内——他会变成下一个暴君。", "one_line": "特区保安局发现平行宇宙中的另一个香港已经沦陷，而入侵的通道是每个人的梦境。", "bucket": "sci-fi"}, {"id": "0758", "title": "疯狂盯梢令", "filename": "m0758.html", "year": "2024", "region": "美国", "genre": "动作 / 喜剧", "tags": "警察, 保护证人, 搞砸任务, 乌龙搭档, 飙车", "summary": "芝加哥警局最差的两位警探——社交恐惧症的技术宅内特和暴力倾向的前拳击手洛根——被上司扔去执行一个“不可能搞砸”的任务：把黑帮污点证人汤米从汽车旅馆护送到法院。结果内特开门时被门撞晕，洛根去追猫，汤米趁机溜走。这个痴迷于做美妆视频的年轻证人并没有逃跑，而是躲进商场参加彩妆大赛。内特和洛根必须在三小时内找回汤米，同时躲避黑帮杀手的追捕。两人从互相嫌弃到配合出糗，最后内特用无人机追踪到汤米的位置，洛根用拳击打败杀手，汤米则在法庭上边作证边展示自己获得亚军的眼影盘。三人最终成了奇特的友谊组合。", "one_line": "两名最不靠谱的警察被派去保护一名黑帮污点证人，结果证人在第一分钟就跑了。", "bucket": "action"}, {"id": "0759", "title": "断袖男", "filename": "m0759.html", "year": "2025", "region": "中国香港", "genre": "剧情 / 同性 / 家庭", "tags": "中年出柜, 家庭伦理, 粤语片, 父子和解, 传统与现代", "summary": "开了三十年出租车的阿辉，一直是个沉默寡言的好父亲、好丈夫。在独生子的婚礼宴席上，他喝了很多酒，看着儿子幸福的样子，终于没忍住，对妻子说出了藏在心底三十年的秘密：“我喜欢男人。”全场哗然，妻子当场晕倒，儿子觉得颜面尽失。阿辉被赶出家门，投靠了年轻时暗恋的老友。这场迟来的出柜撕开了家庭伪装的和睦，原来儿子的未婚妻也有婚外情，原来妻子早就知道一切只是在隐忍。阿辉必须用余生来修复与家人的关系，获得真正的自由。", "one_line": "五十岁的的士司机阿辉，在儿子婚礼当天决定出柜，整个家族的秘密因此如多米诺骨牌般倒塌。", "bucket": "drama"}, {"id": "0760", "title": "萌萌杂技演员", "filename": "m0760.html", "year": "2024", "region": "中国大陆", "genre": "喜剧 / 家庭", "tags": "动物杂技, 小丑扮相, 欢乐冒险", "summary": "小熊猫“球球”天生胆小，却痴迷于观看杂技表演。它所在的动物园面临倒闭，唯一的希望是在市里杂技大赛获奖。退役杂技演员老马因意外受伤而一蹶不振，在动物园当清洁工。球球意外展现出模仿能力，老马重燃斗志。一人一熊组合不断闹出笑话：球球在走钢丝时吓出尖叫，老马在抛接球球时闪了腰。但他们凭借真诚与默契，将失误变成笑点，最终用一套融合保育知识、萌翻全场的表演赢得观众的心，拯救了动物园。", "one_line": "动物园里一只立志成为最萌杂技演员的小熊猫，与失意的退役杂技演员组成“掉链子”组合，勇闯年度大赛。", "bucket": "comedy"}, {"id": "0761", "title": "装饰之日", "filename": "m0761.html", "year": "2024", "region": "韩国", "genre": "悬疑, 剧情", "tags": "犯罪, 家庭, 复仇, 秘密", "summary": "女主韩素拉在母亲葬礼上，遇到了一个自称是母亲生前委托的“葬礼装饰师”的神秘男子。他把灵堂布置得如梦似幻，甚至还原了母亲年轻时最爱的花园。但素拉发现，这个装饰师无名指上有一个疤痕，这与当年杀害她父亲的凶手指纹特征一致。她暗中调查，发现母亲并非自杀，而是被这个人“美化”了死亡现场，以掩盖谋杀。更深的秘密是：父亲当年发现了母亲与这个男子的私情，男子失手杀人，而母亲为了包庇情人，谎称父亲是失踪。十年后，男子为了彻底占有母亲，将其杀害，并以“装饰”之名掩盖罪行。素拉在灵堂的鲜花中藏了一把刀，在所有人面前，亲手将利刃刺入了装饰师的心脏。", "one_line": "父亲失踪十年后，母亲突然在家中上吊，负责装饰“葬礼”的人，却是当年杀害父亲的凶手。", "bucket": "suspense"}, {"id": "0762", "title": "捷京谍影", "filename": "m0762.html", "year": "1995", "region": "中国大陆", "genre": "悬疑 / 谍战 / 年代", "tags": "捷克, 布拉格, 冷战, 古董, 经典谍战", "summary": "1993年，布拉格。旅居捷克三十年的华侨古董商老沈从查理大桥坠河身亡，警方认定为自杀。他在北京的侄子沈冲是一位退伍侦察兵，不信叔叔会自杀，借商务考察的名义来到布拉格调查。他发现叔叔死前一直在寻找一批二战末期被纳粹掠夺、后被苏联红军转移至捷克斯洛伐克的“黄金列车”残骸。线索藏在一件明代瓷瓶的夹层里。沈冲的调查引起了捷克黑帮、俄罗斯军火贩子和一个代号“鼹鼠”的英国情报人员的注意。在布拉格浓郁的红屋顶和阴冷的巷子里，沈冲结识了叔叔的捷克女友、一位研究二战档案的历史学家，两人在伏尔塔瓦河的游船上躲过暗杀，在天文钟下破解了密码。最终，黄金并没有被找到，但沈冲发现叔叔真正的死因，是因为他知道了一个关于“谁才是真正的叛徒”的秘密。", "one_line": "1990年代初，一名中国古董商在布拉格离奇死亡，牵扯出一桩冷战时期遗留的巨额黄金秘密。", "bucket": "suspense"}, {"id": "0763", "title": "禁女大风波", "filename": "m0763.html", "year": "2027", "region": "中国大陆", "genre": "悬疑/惊悚", "tags": "民国奇案, 女校, 幽灵, 反转", "summary": "1928年，上海一所教会女校流传着“禁女”的传说：违反第七条校规的女生会化为一团蓝色火焰人间蒸发。新学期伊始，校董之女林怀袖在浴室离奇自燃，死前身上浮现出诡异的数字。紧接着，违反过校规的学生一个接一个在众人面前化为火球。侦探受雇调查，发现所谓自燃其实是化学系高材生利用白磷和特殊涂层制造的谋杀。而真正的幕后黑手，竟是该校已故校长的遗腹女——她在出生时就被视为“禁女”关在地窖整整十八年，从未见过阳光。她策划这一切，只为等侦探来杀死她，因为她知道侦探是自己失散多年的双胞胎哥哥。", "one_line": "民国女校突现“禁女”诅咒，接连有人自燃，直到她们翻开那本被血浸透的校规。", "bucket": "suspense"}, {"id": "0764", "title": "疯狂食人鲨", "filename": "m0764.html", "year": "2026", "region": "美国", "genre": "恐怖 / 科幻 / 灾难", "tags": "鲨鱼, 生化, 血浆, B级, 反转", "summary": "某沿海生物实验室为了攻克癌症，将一种重组基因注入鲨鱼体内，试图利用鲨鱼的免疫系统培养抗体。但基因发生不可控突变，三只实验鲨鱼不仅体型暴涨，还产生了前所未有的认知能力：它们能记住人脸、能破解捕捞网的结构，而且它们的消化系统发生变异，消化人体组织时会分泌一种成瘾性酶。换句话说，它们“上瘾”了。军方封锁海岸线，派出特种猎杀队，但每次都能被鲨鱼识破战术。更糟糕的是，其中一只鲨鱼顺着洋流游入了度假海滩，在千人眼皮底下制造了一场血色狂欢。最终，一名濒临退休的海洋生物学家提出疯狂方案：利用鲨鱼对“药”的成瘾，用特制诱饵把它们引到深海引爆。但当他坐在诱饵船上时，三只鲨鱼同时浮出水面，却没有攻击，而是整齐地围着他绕圈，仿佛在思考。", "one_line": "军方将抗癌基因注入鲨鱼体内，副作用是：鲨鱼开始觉得人类才是最好的药。", "bucket": "horror"}, {"id": "0765", "title": "厄夜车诺比", "filename": "m0765.html", "year": "2021", "region": "美国 / 乌克兰", "genre": "恐怖 / 科幻", "tags": "切尔诺贝利, 辐射, 变异, 伪纪录片, 密室", "summary": "为了搏流量，六位网红组团潜入切尔诺贝利隔离区，进行24小时“鬼城直播”。起初一切都很顺利，废弃的摩天轮、荒废的学校、寂静的广场。但当夜幕降临，他们的盖革计数器开始不规则跳动，辐射值时而爆表时而又归零。队长Mike在拍摄著名的“石棺”时，镜头里出现了一个人形轮廓，但没有热源反应。而后，队员开始离奇失踪，每消失一人，直播间的观看人数就暴涨。当最后只剩女主播Lena时，她通过回放录像发现——闯进隔离区的不止他们六个，而那个“东西”，一直在镜头边缘注视着他们。", "one_line": "六名网红闯入切尔诺贝利禁区直播，镜头捕捉到了不该存在的东西。", "bucket": "horror"}, {"id": "0766", "title": "命运之线", "filename": "m0766.html", "year": "2025", "region": "韩国", "genre": "爱情, 奇幻, 悬疑", "tags": "红线, 前世今生, 因果循环, 虐恋", "summary": "女主惠仁天生能看到每个人小指上的姻缘红线，她因此成为顶级婚恋顾问。她与完美未婚夫准叙订婚时，却发现两人之间没有线——这意味着他们没有命中注定的缘分，全靠谎言维系。惠仁追查准叙的红线尽头，发现另一端连接着一个已经死去的女人。更诡异的是，准叙的红线在女人墓碑处断裂，又被他自己强行打结接到了惠仁手上。原来准叙是上一个轮回中杀死惠仁前世的人，他篡改红线是为了赎罪。本剧围绕“人能否对抗命运”展开，每集开头会展示一个不同选择导致的不同前世。", "one_line": "能看到姻缘红线的女孩发现，自己和未婚夫之间根本没有线。", "bucket": "romance"}, {"id": "0767", "title": "死亡约定", "filename": "m0767.html", "year": "2023", "region": "韩国", "genre": "惊悚, 犯罪, 奇幻", "tags": "契约, 复仇, 阴阳眼, 连环杀人, 反转", "summary": "重案组女警韩素希天生能看见鬼魂，她利用这个秘密能力侦破了许多冷案。最新出现的“雨夜屠夫”专杀违背誓言的人，手法与她十年前意外死亡的男友志勋的日记描述如出一辙。更诡异的是，志勋的鬼魂突然出现，恳求她停止调查。在她追查下，发现志勋当年曾与一群朋友立下“永远忠诚”的血契，而那群朋友正一个个死去。但每个死者的手机里，都有一段志勋活着时录制的视频：“如果我死了，杀我的就是……”视频戛然而止。韩素希最终在志勋的墓地发现，那个与她立下永远相爱约定的人，从未真正离开。", "one_line": "能与死者对话的女警探发现，她追查的连环杀手正是十年前与自己立下“死亡约定”的已故男友。", "bucket": "suspense"}, {"id": "0768", "title": "多芬丢失的项链", "filename": "m0768.html", "year": "2024", "region": "法国", "genre": "悬疑 / 冒险", "tags": "名画, 谜题, 卢浮宫", "summary": "卢浮宫实习生塞西莉亚在研究大卫名画《拿破仑一世加冕大典》时，通过超高精度扫描发现，画中约瑟芬皇后脖子上戴的一条祖母绿项链，在现存的所有历史文献中竟毫无记载，仿佛被历史刻意抹去。更离奇的是，她查到这条项链在法国大革命期间真的存在，但于1815年突然消失。塞西莉亚由此展开调查，发现这条项链隐藏着拿破仑王朝的一桩私生子秘闻。与此同时，一个神秘的古董商组织也在疯狂寻找这条项链，他们不惜杀人灭口。塞西莉亚与年轻的档案管理员皮埃尔根据画中的隐藏细节作为谜题线索，从卢浮宫的地窖追到凡尔赛宫的密室。最终，他们在一座无名墓穴中找到了项链和一份足以改写王朝历史的信件。而当他们选择将真相公布而非私吞时，那个神秘组织的头目露出了真面目——竟是卢浮宫德高望重的馆长。", "one_line": "卢浮宫实习生发现名画《加冕式》中约瑟芬的项链竟在现实中丢失，由此卷入惊天阴谋。", "bucket": "suspense"}, {"id": "0769", "title": "饱餐秀色", "filename": "m0769.html", "year": "2024", "region": "中国大陆", "genre": "古装 / 美食", "tags": "巾帼御厨, 宫廷权谋, 舌尖美学", "summary": "民间女厨凌潇潇厨艺天赋异禀，她的父亲曾是宫中御厨，却因一道“凤凰展翅”导致皇后流产而被处死。十年后，潇潇改名换姓通过选拨进入御膳房，从最底层的择菜工做起。她发现当年的案子与现在的德妃和御膳房总管有关。为了接近权力中心，潇潇利用美食帮助不受宠的常在争宠，也利用食物相克原理巧妙反击陷害她的人。在一场万国宴上，潇潇重做“凤凰展翅”，在皇上面前揭开了当年皇后流产的真相——那是一场针对皇嗣的精密投毒。", "one_line": "天才女厨娘为查清父亲冤案混入御膳房，用一道道绝美菜肴作为武器，在后宫风波中火中取栗。", "bucket": "fantasy"}, {"id": "0770", "title": "鲁镇传说", "filename": "m0770.html", "year": "2025", "region": "中国大陆", "genre": "悬疑 / 惊悚", "tags": "民国， 古镇， 怪谈， 反转", "summary": "1927年，鲁镇流传着一个可怕的传说：每隔十九年，新婚前夜的新娘便会神秘消失，至今已失踪九人。北平警探顾衍之被秘密派往鲁镇调查，却发现镇上居民对此讳莫如深。他与即将成婚的少女沈晚棠结识，在调查中逐渐发现失踪案与镇上四大家族百年前的恩怨有关。枯井中挖出的嫁衣、老宅里被抹去的族谱、疯女人反复吟唱的童谣，所有线索指向一个惊人的真相：失踪的新娘并未离开鲁镇，而是被以某种“仪式”永远留在了地下。当第十九年的期限再次临近，顾衍之必须在婚礼前夜揭开真相，而他自己也渐渐发现，这趟调查的起因远比他想象的更为复杂。", "one_line": "鲁镇百年间每隔十九年便有新娘失踪，新来的警探发现所有线索都指向一口枯井。", "bucket": "suspense"}, {"id": "0771", "title": "意外的第二个孩子", "filename": "m0771.html", "year": "2025", "region": "西班牙", "genre": "剧情 / 心理 / 家庭", "tags": "代孕, 伦理, 家庭秘密, 姐妹, 反转", "summary": "巴塞罗那的建筑师马特奥和妻子克拉拉是坚定的丁克族，结婚十年从不打算要孩子。某日，他们家门口出现一个婴儿篮，里面附有DNA报告和一张字条：“这是你的第二个孩子，第一个在别处。”报告显示婴儿的生父是马特奥，生母一栏被涂黑。马特奥坚称自己从未出轨，且已做过结扎手术。调查后他们发现，婴儿是通过非法代孕出生的，而代孕母亲竟是克拉拉的亲妹妹艾琳娜。更震惊的是：艾琳娜三年前罹患子宫癌被切除子宫，她一直渴望做母亲，便偷偷用马特奥多年前捐给精子库的精子（克拉拉知情且同意捐精）进行代孕。但中介搞错了胚胎，将另一个匿名的卵子和马特奥的精子结合，生下了这个“意外”的婴儿。而艾琳娜体内，还怀着那个真正的“组合胚胎”——那是克拉拉的卵子和马特奥的精子，也就是克拉拉和艾琳娜姐妹共同的“孩子”。影片最后，四人围坐在一起，讨论该不该生下这个孩子。", "one_line": "一对丁克夫妇忽然收到匿名包裹，里面是一个婴儿和DNA报告——证明这是男方“意外”拥有的第二个孩子。", "bucket": "drama"}, {"id": "0772", "title": "十方武圣", "filename": "m0772.html", "year": "2024", "region": "中国大陆", "genre": "玄幻 / 热血", "tags": "穿越, 废柴逆袭, 宗门争斗", "summary": "现代兵王方行在任务中坠机，醒来竟成了修真大派“天剑宗”里最受欺凌的旁系子弟，且丹田破碎无法聚气。当所有人嘲笑他是废物时，方行却利用现代力学原理改造剑招，用火药原理炼制“爆裂符”，甚至用军事战术指导同门夺回矿脉。在宗门大比上，他凭借精准的关节技和心理学博弈，接连击败高高在上的内门天才。然而，当魔族入侵时，方行发现自己的穿越并非偶然，他体内的破碎丹田，其实是封印上古魔神的关键“十方锁”。", "one_line": "特种兵王穿越成被废丹田的懦弱旁系子弟，却靠着现代格斗术和军工知识，在修真界掀起一场降维打击。", "bucket": "action"}, {"id": "0773", "title": "育种", "filename": "m0773.html", "year": "2017", "region": "美国/加拿大", "genre": "科幻， 惊悚， 伦理", "tags": "基因编辑， 人造子宫， 伦理困境， 黑色实验室， 反乌托邦", "summary": "2065年，全球男性生育率跌破0.1，人类依靠“国家育种中心”统一配种和代孕维持繁衍。遗传学家伊芙因反对强制基因净化的政策而遭通缉，转入地下黑市，秘密为客户培育未经审批的“野性婴儿”。某天，她接到一份特殊委托：一位蒙面贵妇要求培育一个拥有全部“原始情感”的胎儿，包括愤怒、嫉妒和攻击性。伊芙认为这是找回人性完整性的机会，冒险执行。十个月后，婴儿顺利诞生，外表与普通婴儿无异。然而伊芙在对婴儿做例行脑波扫描时，骇然发现其杏仁核区域有一段从未记录过的加密序列。破解后显示：这是冷战时期被销毁的“超级士兵”杀戮基因，能让孩子在青春期后无差别杀人。贵妇的真实身份是极端优生组织领袖，她计划利用这个孩子制造恐慌，从而推行更严厉的洗脑法案。伊芙必须在孩子被带走前，用反向病毒改写其基因。最终她选择留下孩子，隐姓埋名逃往辐射荒原，成为这个基因改造孩子的养母。", "one_line": "生育率归零的未来，一名地下“育种师”发现她亲手培育的完美婴儿，携带着被删除的杀戮基因。", "bucket": "sci-fi"}, {"id": "0774", "title": "宝刀红侠", "filename": "m0774.html", "year": "2025", "region": "中国香港", "genre": "武侠动作", "tags": "冷兵器, 复仇, 侠义精神, 师徒传承", "summary": "香港历史博物馆的一件镇馆之宝——明末抗清名将的贴身佩刀“红刃”在夜间被盗。监控显示，盗贼身法诡异，现场没有留下任何痕迹。警方一筹莫展，但江湖上各路高手却闻风而动：有人自称是“红刃”原主人的后代，有人自称是古代刀法的唯一传人，有人说这把刀里藏着明末的巨额宝藏，还有人坚称刀上有诅咒，必须由自己销毁。所有这些“红侠”们在城市的楼顶、地铁、菜市场展开了连番冷兵器对决，打得天昏地暗。然而他们都不知道，这把刀真正的“主人”是博物馆里一个其貌不扬的文物修复师老陈，他三十五年来每天擦拭这把刀，对它上面的每一道划痕、每一处锈迹都了如指掌。他确实不会武功，但他知道这把刀最大的秘密：它根本不是什么名将佩刀，而是当年一个小铁匠为自己心爱的姑娘打的菜刀。那个姑娘的名字里有个“红”字。", "one_line": "一把被诅咒的宝刀从博物馆被盗，引来各路“红侠”争夺，而真正的刀主人是一个不会武功的文物修复师。", "bucket": "action"}, {"id": "0775", "title": "无证之据", "filename": "m0775.html", "year": "2025", "region": "中国大陆", "genre": "悬疑, 犯罪", "tags": "法医, 零口供, 职场博弈", "summary": "天才法医林深因七年前的一起错案被吊销执照，并入了“黑名单”。如今，一名即将执行死刑的犯人找到他，声称自己被冤枉，但所有证据都已被销毁。林深没有合法身份进入任何实验室，他只能化身清洁工、保安、快递员，用偷来的时间潜入鉴定中心、公安局档案室甚至是火葬场。他每找到一个新证据，就有人比他先一步毁灭。随着调查深入，林深发现当年的错案与这起新案件有着同一个幕后推手——一个利用司法漏洞洗白黑钱的庞大组织。而在林深即将得手之际，警方以“非法获取证据”为由逮捕了他，对方笑着问他：“你的证据无效了，现在你也是罪犯了，怎么办？”", "one_line": "一名因冤案被开除的法医，只能靠非法手段为死刑犯洗清罪名。", "bucket": "suspense"}, {"id": "0776", "title": "超人：明日之子", "filename": "m0776.html", "year": "2025", "region": "美国", "genre": "动作 / 科幻", "tags": "超人重启, 外星难民, 孤独英雄", "summary": "在一个平行时间线里，氪星毁灭的同时，地球正被另一支外星种族“收割者”全面入侵。人类文明濒临崩溃，军队节节败退。卡尔·艾尔的飞船坠落在战场上，被一支游击队捡到。他作为婴儿被养父母藏在地下掩体中长大，从未见过阳光。18岁时，他第一次走出掩体，发现黄太阳光线赋予他无敌的力量。但他没有选择成为拯救世界的“超人”，而是只想找到回氪星的方法——直到他听到养母说：“这里就是你的家，孩子。”", "one_line": "氪星毁灭前，婴儿卡尔被送入太空，但他降落的地球正处于一场全球外星入侵战争之中。", "bucket": "action"}, {"id": "0777", "title": "永不让步", "filename": "m0777.html", "year": "2012", "region": "美国", "genre": "剧情 / 传记 / 运动", "tags": "励志，女性，拳击，抗争，真实改编", "summary": "根据真实事件改编。杰姬曾是一名前途无量的拳击手，却因结婚生子放弃了职业生涯。丈夫的长期家暴让她忍无可忍，带着儿子逃离后，却因“无力抚养”被剥夺抚养权。法庭判决她必须在规定时间内证明自己有稳定的收入和心理状态。走投无路的杰姬重返拳坛，此时她已经35岁，浑身伤病。在退役教练的帮助下，她开始了炼狱般的恢复训练。每一次被打倒，她就想到儿子在寄养家庭受苦的眼神。面对年轻力壮的对手和社会的偏见，杰姬从未想过放弃。在决定命运的冠军赛上，她被打断了肋骨，却依然咬牙站着，最终以一记重拳KO对手，不仅赢得了金腰带，更赢得了作为母亲的尊严。", "one_line": "一位被家暴逼入绝境的单亲妈妈，为了夺回儿子的抚养权，站上了满是血与汗的拳击台。", "bucket": "drama"}, {"id": "0778", "title": "你做初一我做十五", "filename": "m0778.html", "year": "2024", "region": "中国香港", "genre": "喜剧、犯罪、动作", "tags": "冤家搭档、黑白两道、以牙还牙、无厘头", "summary": "黑帮社团“和联胜”的小头目“初哥”和警方卧底“十五仔”在同一社团里互相不知道身份。初哥奉大佬命去收保护费，每次都撞上十五仔的缉毒行动；十五仔想搜集犯罪证据，全被初哥的“猪队友操作”搅黄。两人认定对方是自己的克星，开始了一场低智商的“互坑大战”：你在我车里放蟑螂，我往你盒饭里加泻药；你举报我藏毒，我陷害你嫖娼。闹到最后，两人被敌对社团同时绑架。在仓库里互相扒衣服时才发现对方身上的纹身（一个是关公，一个是警察编号）。笑骂之后，他们决定假扮情侣逃出生天，顺便联手做掉真正的幕后黑手——原来两边的老大是同一人。", "one_line": "黑帮小弟和卧底警察互相使绊子，结果使成了最佳拍档。", "bucket": "comedy"}, {"id": "0779", "title": "断桥因果", "filename": "m0779.html", "year": "2023", "region": "中国大陆", "genre": "剧情 / 悬疑", "tags": "犯罪, 复仇, 小成本佳作", "summary": "雾城老公路桥在暴雨中坍塌，施工队在清理桥墩时发现一具穿着高中校服的白骨。死者被证实是十年前的失踪学生陈小雨。当年警方定性为离家出走，如今大桥设计师、包工头、教育局官员纷纷陷入恐慌。死者父亲老陈是一个沉默的修鞋匠，十年来他每天都在桥头等女儿回来。当他得知女儿是被活活砌进桥墩时，他拿起修鞋的锥子，开始用自己的方式“修”理这座吃人的社会。随着老陈的追查，一场涉及豆腐渣工程、校园霸凌和权色交易的黑暗往事被硬生生从桥墩里刨了出来。", "one_line": "一座年久失修的大桥突然断裂，桥下露出一具被封印十年的白骨，牵出小镇官商勾结的灭门案。", "bucket": "drama"}, {"id": "0780", "title": "不再着迷", "filename": "m0780.html", "year": "2026", "region": "美国", "genre": "剧情 / 悬疑 / 心理", "tags": "邪教, 洗脑, 心理惊悚, 女性视角", "summary": "年轻女学者Emma为了研究“服从心理机制”，化名潜入一个名为“新伊甸园”的精神团体。教主Gabriel看似温和，实则通过剥夺睡眠、重复劳动和选择性奖励逐步控制成员。Emma起初冷静记录，但当她经历了一次假装的“忏悔”被教主当众宽恕后，她体验到了一种前所未有的解脱感。随着调查深入，她发现自己记录的数据开始服务于教会，并且她开始主动为教主的荒谬行为找借口。最终，当FBI前来调查教主涉嫌性侵时，Emma发现自己站在了教主这一边，对着同事喊出了教义。全剧最后一镜是她手腕上若隐若现的教会刺青。", "one_line": "一名哈佛心理学博士为写论文加入邪教，却发现自己逐渐开始真心崇拜那位教主。", "bucket": "drama"}, {"id": "0781", "title": "驴孩朱利安", "filename": "m0781.html", "year": "2025", "region": "西班牙 / 墨西哥", "genre": "奇幻 / 剧情 / 超现实", "tags": "身体畸形， 马戏团隐喻， 母子羁绊， 怪胎美学", "summary": "朱利安生来就有一对巨大的驴耳，被母亲卖给了流浪马戏团，作为“半人半兽”展出。他在笼子里长大，唯一的陪伴是老驯兽师和一头瞎眼的驴。十五年后，马戏团重返朱利安的故乡，他发现镇上所有人都戴着各种动物假体——有人长着象鼻，有人浑身鳞片，有人驼背如山。原来，小镇多年前爆发一种怪病，所有人都会逐渐畸变，只有朱利安天生免疫。母亲卖掉他不是因为嫌弃，而是为了凑钱买血清救全村。但血清早已失效，如今所有人都快死了。朱利安面临选择：用自己健康的骨髓制造新血清，还是拔掉耳朵变成正常人逃走？", "one_line": "一个长着驴耳朵的男孩，在马戏团当了十五年“怪物”，直到他发现自己其实是小镇唯一健康的人。", "bucket": "fantasy"}, {"id": "0782", "title": "失忆的爱", "filename": "m0782.html", "year": "2024", "region": "泰国", "genre": "爱情、剧情、催泪", "tags": "车祸失忆、双面人生、遗忘与守护", "summary": "新婚妻子小琴遭遇严重车祸，醒来后失去了过去一年的记忆。她不记得自己和丈夫阿努特曾经激烈争吵过，只记得恋爱时的甜蜜。阿努特对她无微不至，仿佛一切都没发生过。但小琴在家中发现一本带锁的日记，和一部旧手机。手机里有一条未发出的短信草稿：“他不爱我了，他爱的是我死去的姐姐。”小琴开始偷偷调查，发现阿努特的前女友、自己的双胞胎姐姐死于一场火灾，而那场火灾发生的时间，正是她失去记忆的那一年。小琴无法确定，阿努特照顾她，是因为爱她，还是因为她这张和姐姐一模一样的脸。她决定伪造一场“康复”，演一出戏来测试丈夫的真实心意。", "one_line": "她因车祸失忆，醒来后深爱的丈夫对她百般呵护，直到她发现自己手机里存着一张被撕碎的反向寻人启事。", "bucket": "romance"}, {"id": "0783", "title": "江之岛棱镜", "filename": "m0783.html", "year": "2025", "region": "日本", "genre": "奇幻， 治愈， 青春", "tags": "时间循环， 夏日， 记忆碎片， 小镇风情， 温柔", "summary": "少女夏海在江之岛神社的角落捡到一块看似普通的六角棱镜。当晚，她喜欢的学长向她告白，幸福来得太突然，以至于她忘记了询问学长的名字。第二天醒来，一切归零，又是同样的暑假第一天。夏海很快发现，这块棱镜能够让她“读档”重来。起初她利用这个能力不断修正告白场景，试图打造最完美的回忆。然而随着一次次循环，她发现学长每次告白的台词都不一样，性格也略有差异。她这才意识到：她不是在“重来”，而是在不同的平行世界之间跳跃，每个世界的学长都是同一个人但有着不同的命运。其中一个世界的学长，甚至会在暑假结束后永远搬离小镇。夏海必须在无限的选择中，找到唯一能留下他的那一条时间线，哪怕这意味着放弃其他世界所有美好的回忆。", "one_line": "她在江之岛捡到一块棱镜，从此每个夏天都在重复同一天。", "bucket": "fantasy"}, {"id": "0784", "title": "年度最佳学生", "filename": "m0784.html", "year": "2025", "region": "印度", "genre": "剧情 / 惊悚", "tags": "精英教育，校园悬疑，竞争，心理，反转", "summary": "圣托马斯学院以残酷的精英教育闻名，每年只有一个“年度最佳学生”能获得全球顶尖大学的保送资格。穷学生罗希特靠奖学金进入这里，他渴望改变命运。与他竞争的，是校董之子、同时也是学霸的卡比尔。两人从学业竞争，逐渐升级为黑客攻击、栽赃陷害、甚至毁人前途。当罗希特的女友意外发现卡比尔家族操纵学校的黑幕时，一场离奇的实验室火灾夺走了她的生命。警方判定为意外，但罗希特坚信是谋杀。他不再追求那个头衔，而是潜入学校最深的暗网系统，决定在颁奖典礼上，当着所有人的面，揭穿这场沾满鲜血的荣誉骗局。", "one_line": "一所贵族学校里，为了争夺唯一的“年度最佳学生”保送名额，优等生们之间展开了一场充满谎言与谋杀的致命游戏。", "bucket": "drama"}, {"id": "0785", "title": "木乃伊魔咒", "filename": "m0785.html", "year": "2026", "region": "埃及", "genre": "冒险, 恐怖", "tags": "古埃及, 盗墓, 诅咒", "summary": "在埃及沙漠深处，一支由国际盗墓者组成的队伍，发现了无名法老的墓穴。他们不顾当地人的警告，强行打开了封印的石棺。被释放的并非腐烂的木乃伊，而是祭司的幽灵“卡”。他没有直接杀死闯入者，而是施加了更残酷的诅咒——“永生惩罚”。每个盗墓者都将轮回10次，每次死亡后重生，在短暂的“休息”后立即进入下一段更痛苦的死亡：从被圣甲虫啃噬、被黄金掩埋、到被蛇群缠绕窒息，每一次死亡都是古埃及最残酷刑罚的复现。为了摆脱诅咒，他们必须将那个被错误封印的法老真正的灵魂，从亡灵书中解放出来，而这需要他们中的一人自愿献出灵魂。", "one_line": "一群盗墓贼闯入金字塔，释放了沉睡千年的祭司，这个祭司的诅咒不是杀死他们，而是让他们体验法老的变态惩罚。", "bucket": "action"}, {"id": "0786", "title": "利刃出鞘", "filename": "m0786.html", "year": "2019", "region": "美国", "genre": "剧情 / 悬疑 / 犯罪", "tags": "推理，阿加莎式，全员恶人，反转，幽默", "summary": "富豪小说家哈兰在85岁生日第二天被发现死于自己房间，喉咙被割开。久负盛名的侦探布兰科被匿名聘请调查。哈兰的家人——包括叛逆的大女儿、窝囊的女婿、网红儿媳、花花公子孙子等人——都在极力伪装自己。随着调查深入，布兰科发现哈兰的护士玛塔是唯一不撒谎的人，因为她说谎就会呕吐。所有证据都指向玛塔，但布兰科看穿了这家人设计的精巧骗局：其实是孙子兰森偷换了药物并设下连环计。最终在家族的争吵中，真相被层层剥开，善良的玛塔继承了所有财产，而兰森暴露了自己的卑鄙。", "one_line": "知名犯罪小说作家在生日派对后离奇割喉自杀，侦探发现家族每个成员都是伪装的毒蛇。", "bucket": "drama"}, {"id": "0787", "title": "爱慕", "filename": "m0787.html", "year": "2012", "region": "法国", "genre": "剧情，爱情", "tags": "老年，疾病，婚姻", "summary": "退休的音乐教师乔治和安妮是一对相濡以沫多年的夫妻。一天，安妮突然中风，半身瘫痪，只能依靠轮椅生活。乔治承担起照顾妻子的重任，但随着安妮病情恶化，她的神智逐渐模糊，自尊心极强的她无法接受这种失去尊严的生活。乔治在身心俱疲中依然保持着温柔，他给安妮读报、讲故事、回忆过去。然而在一个平静的早晨，面对安妮反复的折磨与痛苦，乔治做出了一个令人心碎的决定。他用一个枕头，结束了两人的痛苦，随后随她而去。", "one_line": "一对八十多岁的老夫妻，用生命最后的时光诠释什么是“直到死亡将我们分开”。", "bucket": "drama"}, {"id": "0788", "title": "动态漫画·龙王殿第二季", "filename": "m0788.html", "year": "2025", "region": "中国", "genre": "动作 / 奇幻", "tags": "动态漫画, 爽文, 龙傲天, 都市", "summary": "第二季接续上季剧情。隐藏身份在都市送外卖的龙王萧隐，得知当年指腹为婚的未婚妻沈家沈灵儿，正在被第一豪门陈家逼婚。陈家大少当众羞辱萧隐不过是个外卖员。萧隐忍无可忍，当街亮出龙王令，瞬间千名黑衣战士跪地。但这引发了隐藏在世界背后的古武世家的注意。原来，萧隐的龙王身份背后牵扯到一个古老的预言。这一季中，萧隐不仅要横扫豪门，更要面对来自古武界的挑战。在保护未婚妻的过程中，他发现沈灵儿体内竟然封印着一股足以毁灭世界的神秘力量。画风升级，打斗场面更加流畅。", "one_line": "龙王回归都市，本想过平淡生活，却发现未婚妻被逼婚，一怒之下拔剑掀翻整个豪门。", "bucket": "action"}, {"id": "0789", "title": "破晓徂徕山", "filename": "m0789.html", "year": "2025", "region": "中国", "genre": "战争/历史", "tags": "抗日, 游击战, 信仰, 壮烈", "summary": "1938年，山东徂徕山。抗日武装起义在即，但记载着联络暗号和部署的密码本意外落入日军之手。农民出身的游击队战士铁柱，因恐惧战场当了逃兵，却在路上救下了被日军追赶的女学生苏婉宁，苏婉宁手里拿着那个密码本。两人一个懦弱，一个文弱，身后是穷追不舍的日军精锐。他们不懂什么大道理，只知道不能让密码本落入敌手。在风雪交加的徂徕山上，铁柱为了保护苏婉宁和密码本，克服了内心的恐惧，利用山形地势与敌人周旋。最终，铁柱牺牲自己引开了大部队，苏婉宁成功将密码本送到，起义的枪声在破晓时分响起。", "one_line": "徂徕山起义前夕，一个逃兵和一个女学生，因为一本遗失的密码本，在日军围剿中开启了亡命之旅。", "bucket": "drama"}, {"id": "0790", "title": "如蝶翩翩", "filename": "m0790.html", "year": "2021", "region": "韩国", "genre": "剧情 / 治愈", "tags": "芭蕾, 老人, 梦想, 忘年交", "summary": "70岁的退休邮差沈德出爷爷在妻子葬礼后，偷偷走进一家芭蕾舞教室。他曾是少年芭蕾天才，因家贫放弃。如今患早期阿兹海默症的他，想在忘记一切之前再跳一次《吉赛尔》。23岁的李采禄曾是韩国最年轻的芭蕾舞首席，因脚踝重伤被迫退役，自暴自弃地在舞蹈教室当清洁工。两人相遇后，采禄一开始觉得沈爷爷“荒唐又可怜”，却被他每一次摔倒后爬起来继续旋转的执着打动。采禄开始认真教他，而沈爷爷用“就算明天忘光，今天也要跳完”的态度，重新点燃了采禄对舞台的渴望。最终，他们不是师徒，而是彼此的药。", "one_line": "70岁的老人想跳芭蕾，23岁的天才舞者因伤放弃梦想，两个人在同一个练习室里互相拯救。", "bucket": "drama"}, {"id": "0791", "title": "年年有余", "filename": "m0791.html", "year": "1986", "region": "中国大陆", "genre": "剧情 / 家庭", "tags": "农村, 改革, 致富, 春节, 传统与冲突", "summary": "改革开放初期，南方渔村的老渔民刘老根固守传统，认为“年年有余”就是每年过年家中要有条大鱼压阵。但他不知道，县里来的技术员已经推广了网箱养鱼，他偷偷从集体鱼塘捞走的那条大青鱼，正是村里唯一经过选育的鱼种。除夕之夜，当全村人准备观看“鱼灯舞”时，发现作为“鱼种”的大鱼不见了。刘老根羞愧难当，交出鱼时发现鱼已经快死了。技术员没有责怪他，而是带着全村人用这条奄奄一息的鱼尝试人工授精繁殖。一夜之间，老刘根知道了什么是科学，全村人也摒弃了旧俗。最终，鱼苗成功孵化，来年家家户户都有了上百条大鱼。片尾，老刘根端着鱼头对着扩建的鱼塘说：“这才是真正的年年有余。”", "one_line": "除夕夜，老渔民偷藏了一条大鱼准备自家享用，却不知这条鱼竟是全村致富的秘密。", "bucket": "drama"}, {"id": "0792", "title": "超级骑警2", "filename": "m0792.html", "year": "2025", "region": "美国", "genre": "喜剧、动作", "tags": "警察、恶搞、公路、搭档、笑料", "summary": "佛蒙特州的公路骑警五人组因业绩垫底面临解散危机。突然接到联邦任务：保护一名要出庭指认黑帮的会计师证人，送至迈阿密。结果这群路痴骑着摩托一路向南，却阴差阳错登上了去阿拉斯加的货机。在极寒之地，他们与当地非法捕猎团伙火并，把证人的Excel证词当作柴火烧了取暖。当黑帮杀手追来时，五个人用雪球、冰钓竿和一辆雪地摩托上演了史上最胡闹的追车戏。最终他们骑着驯鹿冲进法院，证人光着身子用冻僵的手指在冰面上写出了关键账目。案子赢了，骑警队保住了，但联邦探员发誓再也不用他们。", "one_line": "五个废柴骑警误打误撞被派去保护毒枭证人，结果走错机场。", "bucket": "comedy"}, {"id": "0793", "title": "那时我们还小", "filename": "m0793.html", "year": "2022", "region": "中国台湾", "genre": "剧情，家庭，成长", "tags": "怀旧，童年，亲情羁绊", "summary": "2024年，事业有成的建筑师阿凯偶然翻到了小学毕业纪念册，思绪瞬间被拉回1999年的夏天。那时他和死党阿凯、小胖、小静即将小学毕业，他们一起在河边抓鱼，一起偷摘芒果，一起在台风天里搭建秘密基地。但那个夏天也隐藏着成年人不愿提及的秘密：阿凯父母闹离婚，小静因为家庭暴力而沉默，小胖家里因“九二一”地震而陷入困境。故事在“现在”的插叙和“过去”的细腻描绘中来回切换，展现四个人如何依靠彼此微小的善意，艰难地度过了那个看似无忧无虑实则暗流涌动的夏天。成年后的他们，终于理解了当年父母的不易，也与自己的童年达成了和解。", "one_line": "一张尘封的毕业纪念册，让四位中年发小的记忆闪回到1999年的那个炎热夏天。", "bucket": "drama"}, {"id": "0794", "title": "18岁老处女", "filename": "m0794.html", "year": "2025", "region": "美国", "genre": "喜剧, 青春, 性教育", "tags": "女性视角, 破除羞耻, 闺蜜情, 反差萌, 轻松治愈", "summary": "18岁的艾薇是全校唯一没有性经历的高四女生，被闺蜜群嘲“老处女”。毕业派对前，她立下flag：今晚必须告别处女身。她先后瞄准了书呆子、体育生和乐队主唱，每次都因对方动机不纯或自己感到不适而失败。最后她在停车场遇到同样焦虑的男生诺亚，两人坦诚说出“我只是怕被嘲笑”“我也是处女/男”。他们没发生关系，而是去买了个蛋糕庆祝“我们都还没有准备好”。艾薇在毕业致辞上说：“18岁还是处女不可怕，可怕的是你觉得这件事很可怕。”", "one_line": "高中毕业前夜，全班只剩女主还是处女，她决定24小时内破处，却发现所有人都想“帮她”只是出于自己的执念。", "bucket": "comedy"}, {"id": "0795", "title": "特工总裁小辣妹", "filename": "m0795.html", "year": "2025", "region": "中国大陆", "genre": "动作 / 爱情", "tags": "霸总, 女保镖, 身份错位, 扮猪吃老虎, 爽剧", "summary": "星恒集团女总裁沈星澜收到暗杀威胁，安保公司给她配了一名特级保镖——身高一米六、说话嗲声嗲气、爱穿粉色卫衣的姜小辣。沈星澜以为被坑了，差点退货。入职第一天，沈星澜在车库被十二名持枪绑匪围堵，姜小辣微笑着脱下卫衣，里面全是战术背心与微型武器。八秒钟，十二人全倒。沈星澜还没反应过来，姜小辣已经重新穿上卫衣，递给她一杯奶茶：“老板，喝完再报警。”之后两人卷入跨国军火集团的阴谋，姜小辣一边保护沈星澜，一边查清当年害死自己队友的仇人。沈星澜从嫌弃到依赖，最后发现姜小辣退役的真正原因——她曾经保护过的人，为了利益出卖了她。", "one_line": "跨国集团女总裁雇了一名看起来只会撒娇的小辣妹当保镖，没想到她是退役王牌特工，一个打一百个。", "bucket": "action"}, {"id": "0796", "title": "逐月之月", "filename": "m0796.html", "year": "2024", "region": "泰国", "genre": "爱情 / 同性", "tags": "校园, 暗恋成真, 纯爱", "summary": "高中生威亚一直暗恋同校的学霸兼校草法。为了能考上法所在的顶级大学，学渣威亚开启了地狱式学习模式，最终压线考入。入学第一天，威亚在学校广场远远看到正在发言的法，激动得说不出话。让他意外的是，法竟然主动向他走来，叫出了他的名字。然而，法非常冷淡，甚至警告威亚不要靠近自己。威亚以为被讨厌了，却不知法之所以冷淡，是因为他暗恋威亚三年，害怕自己失控。在一次次社团活动和考试冲突中，两人笨拙地靠近，又因误会推开，直到一场暴雨，才揭开了双向暗恋的真相。", "one_line": "学渣男主为了靠近暗恋的学霸校草，拼命考上同一所大学，却发现对方早已在入学当天认出了自己。", "bucket": "romance"}, {"id": "0797", "title": "性伴侣的品格 决心", "filename": "m0797.html", "year": "2025", "region": "日本", "genre": "爱情 / 伦理", "tags": "成人向, 契约关系, 情感博弈, 治愈, 深夜剧", "summary": "34岁的广告精英绫乃遭遇男友背叛后，对婚姻彻底失望；28岁的自由摄影师苍太则因原生家庭阴影，恐婚恐育。两人在一场相亲派对上互相看穿伪装，一拍即合签订了《伴侣协议》：只保持身体关系，不过问对方私生活，不留宿，不恋爱，不结婚。前六集堪称完美的契约执行：每周三见面，事后各自离开，礼貌而克制。但随着时间的推移，规则开始逐一崩塌：绫乃开始特意做苍太爱吃的饭菜，苍太则在绫乃发烧时打破了“不留宿”的铁律。当绫乃的前男友回来求复合时，苍太发现自己无法遵守“不干涉”条款。最终在协议签订一周年那天，苍太撕毁了合同，拿出戒指说：“我想和你签一份一辈子不分手的永久合同。”", "one_line": "因情伤决定终身不婚的男女，签订了一份完美的“性伴侣协议”，却在日复一日的亲密中输掉了自己的心。", "bucket": "romance"}, {"id": "0798", "title": "入职后的我们", "filename": "m0798.html", "year": "2025", "region": "中国", "genre": "剧情 / 职场", "tags": "职场, 新人, 互联网大厂, 群像, 现实主义", "summary": "聚焦大厂“新生训练营”。名校学霸、海归富二代、小镇做题家、关系户、社牛专科生和只想躺平的咸鱼，六位性格各异的毕业生同时进入顶级互联网公司“巨量引擎”。从入职第一天的破冰洗脑，到为了绩效相互撕扯的“赛马机制”，再到无休止的大小周加班。有人为了转正陷害同事，有人因过劳晕倒在工位，有人在数据和良知之间挣扎。当他们逐渐要被系统驯化成没有感情的“工具人”时，公司内部论坛突然出现了一篇揭露高管性侵的匿名帖。这六个人必须决定，是继续当沉默的工蚁，还是赌上职业生涯，重启一场关于公平的“黑客行动”。", "one_line": "六名背景迥异的00后毕业生进入一家巨型互联网公司，他们在“OKR”和“内卷”中，试图找回“人”的价值。", "bucket": "drama"}, {"id": "0799", "title": "花心梦里人", "filename": "m0799.html", "year": "2026", "region": "中国香港", "genre": "爱情 / 喜剧", "tags": "都市情感, 渣男成长, 轻松喜剧", "summary": "阿俊是香港最专业的“时间管理大师”，靠着对每个女友的伪装游刃有余。一场意外昏迷后，他醒来发现自己获得了“共情超能力”——他能一秒体验到每个女友的喜怒哀乐，甚至能同时看到七个不同角度的世界。前一刻还在陪空姐看日落，后一秒就感受到会计师被甲方折磨的崩溃。这种感同身受的折磨让他痛不欲生，曾经的花言巧语全都变成了良心谴责。为了摆脱这种痛苦，他必须让七个女孩都真心实意地对他说出“我不再爱你”，并在这个过程中，第一次学会了什么是真正的爱。", "one_line": "一个脚踩七条船的职业渣男，某天醒来发现自己拥有了七个女友的全部记忆。", "bucket": "romance"}, {"id": "0800", "title": "用九柑仔店", "filename": "m0800.html", "year": "2019", "region": "中国台湾", "genre": "剧情 / 生活", "tags": "怀旧, 杂货店, 乡土, 治愈", "summary": "在台北打拼多年的俊龙事业受挫，被迫回到乡下接手爷爷留下的“用九柑仔店”。原本只想卖掉这块地换钱，却在整理旧物时发现了一本日记，记录了这间小店几十年来默默帮助过的无数村民。从赊账的寡妇到躲雨的流浪汉，从寄存在此的定情物到代写的情书，每一件商品背后都藏着人情冷暖。俊龙决定重开小店，他慢慢理解了：在这个飞速遗忘的时代，总需要一个地方，慢下来聆听。", "one_line": "失意都市男回乡接管老旧的柑仔店，发现那不仅是商店，更是全村灵魂的收容所。", "bucket": "drama"}, {"id": "0801", "title": "巫术面具", "filename": "m0801.html", "year": "2026", "region": "尼日利亚 / 美国", "genre": "恐怖 / 悬疑 / 民俗", "tags": "非洲巫毒, 祖灵崇拜, 连环诅咒, 面具杀人魔, 考古惊悚", "summary": "非裔考古学家阿德回到尼日利亚祖村，继承了部落最后的“艾贡冈”面具——传说面具中封印着首位反抗殖民者的巫医之灵。当晚，一个戴着同款面具的身影开始屠杀村民，死者脸上都浮现出被烈火灼烧的图腾。阿德在村中长老的禁室发现一本19世纪传教士日记：原来殖民者当年制造了一对“诅咒面具”——真品守护部落，赝品则会召唤出被歪曲的杀戮分身。如今赝品被文物贩子激活，而唯一能对抗它的方法，是阿德主动戴上真品，接受祖灵“献祭第一个所爱之人”的审判。", "one_line": "每一任戴上远古面具的族长都死于非命，而我是下一任。", "bucket": "horror"}, {"id": "0802", "title": "旧爱综合征", "filename": "m0802.html", "year": "2024", "region": "中国大陆", "genre": "都市 / 情感", "tags": "前任、心理疾病、群像、治愈", "summary": "都市里悄悄流传着一个号码，拨通后会被接到地下诊所“旧爱综合征治疗中心”。患者千奇百怪：忘不掉初恋的金融男、被PUA后无法自愈的设计师、离婚十年仍梦到前妻的出租车司机。治疗方法更加离谱：让患者重走约会路线、扮演前任说话、甚至举办模拟葬礼。每个单元讲述一个故事，串联起主治医生自身的秘密——原来她正是“旧爱”本身。最后一集，她摘下口罩，对着镜头说：“你们该好了。”", "one_line": "一家名为“前任诊所”的神秘机构，专治各种放不下。", "bucket": "drama"}, {"id": "0803", "title": "爱死你害死你", "filename": "m0803.html", "year": "2024", "region": "日本", "genre": "爱情 / 悬疑 / 心理", "tags": "病娇, 反转, 婚姻, 欺骗, 虐恋", "summary": "程序员拓也娶了完美女友真希，婚礼当天他幸福得快要死去。第二天醒来，真希只留下一张写着“爱死你❤”的字条和一枚戒指，人却消失了。拓也开始疯狂寻找，却发现真希的名字、身份全是伪造的。他找到了真希的“前夫一号”，对方是个残疾人，他说真希曾对他无微不至，然后在某天消失，他因思念过度出了车祸。拓也继续寻找“前夫二号”、“三号”……每个男人都被真希的“极致之爱”迷得神魂颠倒，然后在她离开后遭遇不幸，有的破产，有的精神失常，甚至有两人“意外”死亡。拓也发现自己也出现了被害的征兆。他终于明白，“爱死你”这三个字，既是情书，也是判决书。而他必须找到真希，完成这场死亡游戏的最后一环。", "one_line": "新婚第二天，妻子留下一张“爱死你”的字条后消失，丈夫追查时发现，她的每一任前夫都离奇死亡。", "bucket": "romance"}, {"id": "0804", "title": "我，迈克尔", "filename": "m0804.html", "year": "2018", "region": "美国", "genre": "剧情 / 传记 / 心理", "tags": "自我认同, 出埃及记, 意识形态转变", "summary": "迈克尔曾是以“祷告疗法”成功“脱离”同性恋的象征人物，出版畅销书，上电视布道。他帮助无数父母“纠正”孩子的性取向。然而在为一个男孩做“治疗”时，男孩自杀未遂，迈克尔第一次产生怀疑。他秘密接触心理学界，发现“祷告疗法”本质是虐待。他用了三年时间从否认、挣扎到接受：与自己曾伤害过的同志社区见面道歉，与前妻离婚，与一个叫莱斯的男人相爱。最后他在当年布道的同一个舞台，牵著莱斯的手说：“我曾是迈克尔，一个骗子。现在我是迈克尔，一个诚实的人。”全场教徒退场，只剩几个被他伤害过的家庭起立鼓掌。", "one_line": "一个曾是美国最著名的反同活动家，后来公开出柜并与自己男友结婚，改编自真实事件。", "bucket": "drama"}, {"id": "0805", "title": "我美妙的西柏林", "filename": "m0805.html", "year": "2021", "region": "德国", "genre": "纪录片 / 历史", "tags": "西柏林, 冷战, 同性恋, 亚文化, 夜生活", "summary": "本片通过大量从未公开的私人影像、照片和当事人采访，还原冷战时期西柏林的特殊地位。因为东德封锁和西方法律漏洞，西柏林成为同性恋、异装癖、艺术家、逃兵役者的避风港。这里的夜店从60年代起就允许同性跳舞，诞生了欧洲最早的同志骄傲游行。影片追踪三位老人：70岁的变装皇后、当年从东德游过施普雷河的少年、以及一位曾在柏林墙边开同志酒吧的美国士兵。他们的故事交织成一段被遗忘的彩虹历史，直到1989年墙倒，一切归于统一与平淡。", "one_line": "从二战后到墙倒之前，西柏林如何成为全世界同性恋者的自由天堂与避难所。", "bucket": "drama"}, {"id": "0806", "title": "罪人", "filename": "m0806.html", "year": "2024", "region": "中国大陆", "genre": "悬疑, 犯罪", "tags": "密室, 反转, 心理博弈, 孤胆英雄", "summary": "落魄警察王铭因过失致人死亡被停职，在警局审讯室做杂物。深夜，一个报警电话打来，电话那头的女人声音颤抖，称自己被锁在地下室，而丈夫正在楼上磨刀。由于无法出警，王铭只能通过电话引导对方自救。随着通话深入，他发现这个“丈夫”似乎与五年前一桩悬案有关，而报警人的身份也疑点重重。王铭必须在狭小的空间内，利用极少的线索拼凑真相，同时还要应对前来审讯他的昔日同事。当他以为即将成功时，一个关于他自己过去的惊天反转让他措手不及。", "one_line": "一名被停职的警察被困在审讯室，仅凭一部电话和直觉，试图拯救一名神秘报警人。", "bucket": "suspense"}, {"id": "0807", "title": "危险人物", "filename": "m0807.html", "year": "2026", "region": "美国", "genre": "犯罪惊悚", "tags": "连环杀手, 侧写师, 猫鼠游戏, 高智商", "summary": "FBI行为分析部王牌侧写师艾伦·克罗斯，因三起未公开细节的谋杀案现场出现了他论文中的专属标记，被指控为连环杀手。检方证据链完整：DNA、监控、购买记录。艾伦在看守所里发现，真凶故意留下破绽，每一条指向他的证据都恰好能自洽，又恰好不完美——这是挑衅，更是邀请。艾伦保释后组建秘密小队，发现凶手竟是他十年前教过的学生，一个同样具备反社会人格却学会了共情的“失败作品”。凶手的目的不是杀人，而是逼老师回到“野兽状态”，完成一场“谁是更完美的怪物”的终极对决。最后一刻，艾伦没有开枪，而是说出了凶手的真名，后者崩溃自杀。", "one_line": "顶尖犯罪侧写师被当作模仿犯逮捕，为了自证清白，他必须亲手抓到那个比自己更了解自己的杀手。", "bucket": "sci-fi"}, {"id": "0808", "title": "洛瑞太太和她的儿子", "filename": "m0808.html", "year": "2019", "region": "英国", "genre": "剧情 / 传记 / 家庭", "tags": "艺术家, 母子关系, 控制, 绘画", "summary": "20世纪上半叶，英国工业城市曼彻斯特。洛瑞先生白天是煤气公司的一名收租员，晚上偷偷在阁楼画那些灰蒙蒙的工业风景和火柴人似的工人。他的母亲伊丽莎白曾是名门闺秀，因家道中落不得不搬到贫民区，她将一切不幸归咎于儿子的平庸。她反复撕毁洛瑞的画稿，嘲笑他的画“像小孩子涂鸦”，逼迫他考取公务员。洛瑞一生未娶，默默照顾瘫痪在床的母亲二十多年，每晚在病床前为她读小说，等她睡着后才去作画。母亲去世后，洛瑞的绘画风格骤然转变，火柴人变得更小、更孤独。多年后，他的画作成为英国国宝，拍卖出千万英镑。记者问他“最想对母亲说什么”，洛瑞说：“我想告诉她，那些火柴人，其实都是她。因为在我眼里，她被生活压得那么小，小到随时会消失。”", "one_line": "英国画家L.S.洛瑞一生都在画火柴人，而他控制欲极强的母亲至死都觉得儿子是个没出息的铁路职员。", "bucket": "drama"}, {"id": "0809", "title": "大奥动画版", "filename": "m0809.html", "year": "2024", "region": "日本", "genre": "历史，奇幻，剧情", "tags": "大奥，性别逆转，宫斗，浮世绘风，权谋", "summary": "改编自同名漫画。18世纪的日本，一场“赤面痘疮”瘟疫导致男性人口锐减至女性的四分之一，社会结构彻底颠倒。德川幕府第八代将军吉宗是一位女性，她坐镇江户城，而大奥——将军的后宫——住着三千名精心挑选的美男子。女将军必须在男性家老们的权谋斗争中维持统治，同时在大奥中分辨真心与谄媚。新入宫的贫苦旗本之子水野祐之进原本只想出人头地，却逐渐爱上了那位在深夜卸下将军面具、独自落泪的女人。他不知道自己即将卷入一场足以颠覆整个幕府的政变，而政变的核心，是将军的真实性别。", "one_line": "江户幕府时期，一场瘟疫导致男性锐减，将军由女性担任，三千美男成了她的后宫。", "bucket": "drama"}, {"id": "0810", "title": "借王", "filename": "m0810.html", "year": "2023", "region": "香港", "genre": "犯罪 / 动作", "tags": "高利贷, 卧底, 反套路, 港产片", "summary": "会计师阿乐的好友因欠下巨额高利贷跳楼身亡，但阿乐查账时发现好友的债务数字根本不合逻辑。为查清真相，他主动向全港势力最大的地下钱庄“借王”借贷。这个钱庄没有暴力催收，而是通过一套精密算法让债务像滚雪球般永不还清。阿乐见到“借王”本人——一位瘫坐在轮椅上的失语老人，他仅靠眨眼和敲击手指指挥庞大的金融帝国。阿乐发现，所有借贷者的数据最终都流向一个神秘账户，而这个账户的受益人，竟然是廉政公署的高层。", "one_line": "金融精英为调查好友之死伪装成借贷者，发现全港最大的“债王”竟是一个从不开口说话的老人。", "bucket": "crime"}, {"id": "0811", "title": "风尘莽汉", "filename": "m0811.html", "year": "2025", "region": "中国香港", "genre": "犯罪, 动作", "tags": "黑帮, 出租车, 东南亚, 复仇", "summary": "阿鬼曾是九龙城寨最狠的“收数人”，二十年前为了给兄弟顶罪逃亡泰国。如今他满脸刀疤，开着一辆破出租混迹于红灯区。雨夜，他接了一个浑身是血的白发老人，对方用潮州话喃喃自语，怀里抱着一颗假人头。阿鬼认出此人就是当年血洗他家麻将馆、导致他妻离子散的幕后黑手“跛忠”。但跛忠因吸毒导致脑损伤，已经完全认不出阿鬼。阿鬼决定不杀他，而是载着他穿越整个泰国，去见他失散的女儿，让他清醒地看着自己是怎么被世界遗忘的。", "one_line": "一个金盆洗手的黑帮打手成了曼谷夜班出租车司机，直到他深夜载上了杀害自己全家的仇人，而且对方已经疯了。", "bucket": "crime"}, {"id": "0812", "title": "月下琴心", "filename": "m0812.html", "year": "2024", "region": "中国大陆", "genre": "古装 / 武侠 / 爱情", "tags": "古琴, 刺客, 国风, 唯美, 江湖", "summary": "南唐末年，琴师柳隐以一曲《广陵散》名动天下。无人知道他也是杀手“无弦”，用琴弦杀人，从不见血。朝廷命他刺杀手握兵权的节度使李重进。柳隐潜入李府，月下试琴时，发现后园一个哑女正在偷偷听琴。她是李重进的女儿李慕，天生失语，却懂音律。柳隐每晚弹琴，她隔着窗听。一个月后，柳隐不忍杀她父亲，决定抗命。朝廷派新杀手取而代之，李府被血洗。柳隐带李慕逃亡，用琴声为她“说话”。最终对决，柳隐断了琴弦，用身体挡下毒箭，死在李慕怀里。李慕抱琴跳崖，江湖再无无弦，只流传一首《慕隐曲》。", "one_line": "最负盛名的琴师其实是江湖第一杀手，他在月下弹琴杀人，却对一个听琴的哑女动了心。", "bucket": "fantasy"}, {"id": "0813", "title": "阿燕的人生", "filename": "m0813.html", "year": "2025", "region": "越南 / 法国", "genre": "剧情, 历史", "tags": "女性史诗, 越战, 移民", "summary": "1975年，西贡沦陷前夜。年轻女子阿燕失去了所有家人，带着仅有的一个食谱本登上了逃难船。船在海上遭遇海盗，她被打伤，食谱本掉入海中，她只来得及捞起一页——鱼露的配方。在马来西亚难民营，她靠给其他难民做饭活了下来，并认识了一位法国记者。她跟着记者来到巴黎，从洗碗工做起，凭借对味觉的天赋和那一页配方，在厨房里找到了尊严。她将越南菜与法餐融合，最终在塞纳河边开了一家小餐馆。她从不谈论过去，但每一道菜里都是记忆：春卷里是家人的笑脸，河粉汤底是难民营的苦咸。多年后，她的女儿问：“妈妈，你的一生苦吗？”阿燕切着香茅，笑着说：“都煮进汤里了。”", "one_line": "越南女子阿燕从西贡沦陷那天开始，历经战争、船难、难民营，最后在巴黎成为知名厨师，用食物串联起破碎的人生。", "bucket": "drama"}, {"id": "0814", "title": "神风刀", "filename": "m0814.html", "year": "2019", "region": "中国大陆", "genre": "武侠，动作，古装", "tags": "刺客，日本刀法，大明，复仇，宿命", "summary": "崇祯年间，江南铸刀世家沈家因拒绝为东厂督主铸造“不鸣刀”，全家被屠。少年沈惊鸿带着祖传的半截刀谱和一块陨铁逃走，流落到东海荒岛，被隐居于此的倭寇遗民、盲眼刀客三郎收留。三郎将日本“神风流”刀法与中原锻刀术融合，以陨铁和沈惊鸿的血铸成一把“神风刀”——刀身会随握刀者的杀意变温。十年后，沈惊鸿携刀入中原。他每杀一个仇人，刀上就会多一道血纹。当杀到督主面前时，沈惊鸿才发现督主竟是三郎失散多年的亲弟弟。兄弟对决，神风刀断裂，沈惊鸿在废墟中捡起断刃，改用短刀法杀死督主。最后他将断刀归还大海，转身成了一个铁匠。", "one_line": "明朝末年，一个被东厂灭门的铸刀少年带着倭寇后裔打造的妖刀，踏上以刀证道的复仇之路。", "bucket": "action"}, {"id": "0815", "title": "灵魂摆渡3", "filename": "m0815.html", "year": "2016", "region": "中国大陆", "genre": "奇幻, 悬疑, 惊悚", "tags": "灵异, 人性, 公路, 温情", "summary": "赵吏失去了所有记忆，冬青体内的蚩尤即将觉醒，冥界政局动荡。这一季，三人被迫分开。赵吏被流放到荒芜的冥界边境，冬青被神族带走，而王小亚以天女身份回到昆仑。他们各自在绝境中挣扎，却发现所有线索都指向千年前的一场阴谋。赵吏恢复记忆后，决定牺牲自己换取冬青自由。最后一集，冬青抱着昏迷的赵吏走上黄泉路，路边开满红色彼岸花。王小亚以全部寿命为代价，开启轮回之门。他们赢了，但赢的代价是——便利店再也没有夜班了。", "one_line": "444号便利店的铁三角，这一次要踏入冥界最深处的禁地，去改写一个死去的结局。", "bucket": "fantasy"}, {"id": "0816", "title": "树木之城", "filename": "m0816.html", "year": "2024", "region": "日本", "genre": "奇幻/治愈", "tags": "环保, 城市童话, 成长, 宫崎骏风", "summary": "未来世界，人类将城市建在一棵直径数公里的远古巨树“尤格德拉”之上。少女绿音是这座城市里出了名的“麻烦精”，因为她总在破坏公共设施。实际上，她是在挖出那些试图吸干树根营养的“人造根”。某天，城市里的电子设备开始失控，飞行汽车撞向大楼，而只有绿音听到了树木发出的求救声。原来，城市管理者正在秘密向树心注射一种合成树脂，准备将巨树彻底石化，改造成纯金属的城市。绿音结识了森林里的精灵和想成为植物学家的富家少爷，他们必须赶在城市变成死城之前，唤醒巨树沉睡的意识，引发一场属于大自然的反击。", "one_line": "在一个被巨树贯穿的现代化都市里，叛逆的少女发现城市的心脏正在腐烂，而只有她能听懂树的哭泣。", "bucket": "fantasy"}, {"id": "0817", "title": "血仍未冷", "filename": "m0817.html", "year": "2025", "region": "中国香港", "genre": "动作，犯罪", "tags": "老炮儿，复仇，兄弟情，硬核", "summary": "曾经的传奇枪手“九指文”隐居三十年，唯一的牵挂是智力停留在10岁的儿子阿宝。阿宝在街头目睹一桩黑帮交易，被灭口。警方草草结案，九指文等了三十年的枪，终于要再次出膛。他不用智能手机，不认路，甚至握枪的手都在抖。但他用最笨的办法：一个一个找，一个一个问。当黑帮派出一百人来围剿他时，九指文在废弃的游乐场里，用阿宝最喜欢的玩具布置了杀阵。这场仗，不是为了正义，是为了告诉阿宝：老爸的血，为你而热。", "one_line": "三十年前金盆洗手的枪王，为了给傻儿子讨回公道，重出江湖单挑整个黑帮。", "bucket": "action"}, {"id": "0818", "title": "黑海人妖", "filename": "m0818.html", "year": "2021", "region": "乌克兰 / 土耳其", "genre": "剧情 / LGBT / 犯罪", "tags": "变性人, 黑帮, 救赎", "summary": "乌克兰敖德萨港，变性人“维拉”是地下俱乐部的台柱。她攒钱多年终于要去做最后一场变性手术，却发现同父异母的妹妹患了白血病。黑帮老大“鲨鱼”找到她：只要将一批海洛因藏在身上偷渡到土耳其，就能拿到10万美金。维拉伪装成孕妇登上货船，与同样走投无路的船员米海尔结盟。途中遭遇海警，维拉把毒品冲入马桶，激怒黑帮。船被黑帮快艇包围时，米海尔引爆了煤气罐。维拉被渔民救起，毒品尽失，但她抱着妹妹的化验单笑了。", "one_line": "变性舞者为了给妹妹治病，答应帮黑帮运送毒品横渡黑海。", "bucket": "drama"}, {"id": "0819", "title": "以爱为契", "filename": "m0819.html", "year": "2021", "region": "中国大陆", "genre": "爱情 / 都市", "tags": "契约婚姻, 先婚后爱, 职场, 甜宠, 误会", "summary": "餐饮集团女总裁林熹为了满足爷爷遗嘱中的结婚条款，不得不临时找对象。她选中了因父亲重病而欠债的天才厨师季明朗：帮他清债，换一年婚姻。两人住进同一屋檐下，从互不干涉到互相欣赏。但当季明朗的前女友和公司内鬼接连出现，假结婚面临暴露风险。更糟的是，林熹发现爷爷的死似乎与季明朗的父亲有关，爱情与复仇一触即发。", "one_line": "为了继承产业，女总裁与负债厨师签订假结婚协议，却意外动了真心。", "bucket": "romance"}, {"id": "0820", "title": "不问苍生问鬼神", "filename": "m0820.html", "year": "2023", "region": "中国香港", "genre": "恐怖, 悬疑, 古装", "tags": "民国, 降头, 民俗, 反转", "summary": "民国初年，接受西方医学教育的法医张孝回国探亲，却遇到一起诡异的灭门惨案：死者七窍流血，表情狂喜，且死前都高喊着“发财了”。当地警察束手无策，只能求助道士作法。张孝嗤之以鼻，坚持用解剖学寻找真相。然而，随着调查深入，他发现尸体胃里塞满了写满生辰八字的纸条，现场留下的灰烬经化验竟是致幻的“鬼神散”。当科学无法解释监控（眼睛）证据时，张孝自己也开始产生幻觉，看见死去的亲人伸手向他索命。他不得不放下骄傲，联手最后一位茅山传人，查出这场利用“贪念”作为引子的连环杀人案真相，揭开人性比鬼神更可怕的现实。", "one_line": "民国时期，一名留洋归来的法医坚信科学，却在接手灭门案时，发现所有证据都指向了茅山禁术。", "bucket": "horror"}, {"id": "0821", "title": "红色护卫", "filename": "m0821.html", "year": "2023", "region": "中国大陆", "genre": "战争 / 冒险", "tags": "长征, 护送, 密码本, 女性战力", "summary": "1935年，红军某部遭围剿，唯一掌握新破密法的通讯参谋牺牲前将密码本交给女战士林月。上级命她以最快速度赶上主力部队，否则整个战区的通讯将彻底暴露。林月带着密码本和一名十四岁的小号手踏上旅程，身后是国民党一个师的追兵。他们没有地图，没有后援，只有一把狙击枪和十二发子弹。沿途经过彝族区、沼泽地和雪山，林月每开一枪都必须确保命中关键目标。当她最终站在主力部队面前时，密码本完好无损，但她已经连续六十小时没有合眼，右手食指永远无法再扣扳机。", "one_line": "长征途中，一名女狙击手奉命护送一本顶级密码本，身后是敌军整一个师。", "bucket": "drama"}, {"id": "0822", "title": "女囚霊", "filename": "m0822.html", "year": "2024", "region": "日本", "genre": "恐怖惊悚", "tags": "监狱怪谈, 诅咒录像带, 密室逃脱", "summary": "昭和时代臭名昭著的“虹桥女子刑务所”因废除死刑而关闭，最后7名重刑犯与5名狱警在移送前夜留守。新人囚犯真由子在废弃的放映室找到一盘没有标签的录像带，画面中一个穿着华丽和服的女人正在唱凄美的演歌。播放后，监狱电力开始诡异波动，一名狱警被发现溺死在只有10厘米深的蓄水池里。传说60年前，曾是花魁的囚犯“小菊”因越狱被狱卒钉死在墙壁里，她的怨念随着录像带被封存。如今，每播放一次录像带，小菊就会以一种“江户时代酷刑”的方式杀死一人。幸存者们发现，要停止诅咒，必须按照演歌歌词的提示，找到小菊真正的遗骨并给予安葬，而尸骨就在他们脚下的某处。", "one_line": "一座即将关闭的旧女子监狱移送最后一批囚犯，新囚犯无意中播放了禁忌的录像带，释放了60年前被狱卒虐死的“花魁幽灵”，监狱瞬间沦为血狱。", "bucket": "horror"}, {"id": "0823", "title": "丛林果汁", "filename": "m0823.html", "year": "2024", "region": "巴西", "genre": "冒险, 奇幻", "tags": "亚马逊传说, 变身, 环保寓言", "summary": "生物技术公司的实习生莉莉安在亚马逊雨林科考站失踪，公司派了三名年轻的办公室白领前去“确认情况”——实则是让他们以出差名义堵住监管机构的嘴。三人分别是自恋的市场部主管丹尼、恐高的工程师苏菲、以及来混资历的老板儿子卢卡斯。他们抵达科考站后发现，莉莉安曾记录了一种当地部落传说中的“穆鲁奇果汁”，由三十六种雨林植物和一种神秘树蛙分泌物混合而成。三人误喝果汁后，开始随机变形：丹尼变成了美洲豹却只有吉娃娃的胆子，苏菲变成了绞杀榕必须寄生在卢卡斯身上，而卢卡斯变成了箭毒蛙被自己的影子吓晕。他们必须找到莉莉安——她已经变成了雨林本身的声音——才能解除诅咒。而解药，是自愿永远留在雨林。", "one_line": "三个来亚马逊寻找失落实习生的大学生的城市白领，喝下神秘的紫色果汁后，开始随机变成雨林里的动植物。", "bucket": "action"}, {"id": "0824", "title": "奇异的罗曼史", "filename": "m0824.html", "year": "2015", "region": "西班牙", "genre": "爱情/奇幻", "tags": "失忆、循环、黑色幽默、浪漫", "summary": "图书管理员安娜患罕见短期记忆丧失症。画家马科斯第一天表白被拒，第二天被当成流氓。马科斯决定每天重新追求一次。第57天，安娜说“你很像梦里的一个人”。第112天，她主动吻了他。第300天，安娜在日记本上发现全是自己的字迹：“我每天都会忘记他，但每天都会重新爱上他。这是诅咒，还是最大的幸运？” 马科斯知道答案：他手机里存着三百次“我愿意”的录音。", "one_line": "她每天醒来都会忘记昨天，他每天都要让她重新爱上自己，已经重复了三百次。", "bucket": "romance"}, {"id": "0825", "title": "约瑟芬", "filename": "m0825.html", "year": "2013", "region": "法国", "genre": "喜剧 / 爱情", "tags": "大龄剩女, 法式浪漫, 女主成长, 职场喜剧", "summary": "约瑟芬34岁，单身，在杂志社做小编辑。每逢家庭聚会，五个姐妹和她们的丈夫孩子加父母，都会把“约瑟芬的男友呢？”挂在嘴边。不堪其扰的她雇佣了在街头发传单的失业演员马索来假扮男友。马索帅气、体贴、会说法语、英语和意大利语，完美得不像真的。随着家庭聚会越来越频繁（父母金婚、姐妹生日、圣诞、复活节……），马索的“演技”也越来越炉火纯青，但约瑟芬发现，自己开始分不清哪些是表演，哪些是真情。更麻烦的是，马索似乎也有秘密——他根本不是失业演员。", "one_line": "34岁的约瑟芬被全家催婚催育，为了证明自己“有人要”，她雇佣了一位失业演员假扮男友，却假戏真做。", "bucket": "comedy"}, {"id": "0826", "title": "永恒的少女", "filename": "m0826.html", "year": "2024", "region": "阿根廷 / 西班牙", "genre": "剧情 / 奇幻 / 女性", "tags": "不老症, 母女, 时间囚笼, 拉美魔幻, 衰老焦虑", "summary": "1985-2025年，阿根廷。女孩露娜患有一种极端罕见的“幼态持续症”，生理年龄每七年才增长一岁。她的母亲卡门却因基因早衰，四十岁就已形同八十老妪。这对“母女年龄倒挂”的组合，在四十年间不断搬家、伪造身份、躲避医疗机构。露娜始终是13岁少女的模样，心智却已成熟到疲惫。当卡门临终前，露娜终于得知真相：她的“永恒”是一场实验意外——母亲当年为了救白血病女儿，使用了未批准的胚胎基因疗法。如今卡门即将老去，她留给露娜两个选择：找到解药变回正常人，或永远做“永恒的少女”，替母亲活下去。", "one_line": "患有不老症的女儿每七年衰老一岁，而正常母亲却在加速变老，她们互为时间的镜子与监狱。", "bucket": "drama"}, {"id": "0827", "title": "羔羊医生", "filename": "m0827.html", "year": "2025", "region": "中国香港", "genre": "犯罪 / 剧情", "tags": "心理， 医生， 连环杀手， 暴力， 救赎", "summary": "天才外科医生林森被誉为“上帝之手”，但他患有严重的梦游症。每当有病人死在他手术台上，当晚这座城市就会出现一具被精准解剖的罪犯尸体。重案组女警探通过尸检报告追查到了林森，发现他是在用“惩罚恶人”来弥补“未能救人”的愧疚。林森陷入自我怀疑，决定自首。但在最后一案中，他面对的是杀害女警探父亲的凶手。林森选择在清醒状态下，用手术刀合法地救活凶手，将其送进监狱，完成了自我的精神救赎。", "one_line": "一个只想救人的急诊室医生，发现自己每次手术失败后，就会在梦中变成连环杀手。", "bucket": "crime"}, {"id": "0828", "title": "衰鬼刑警", "filename": "m0828.html", "year": "2024", "region": "中国香港", "genre": "喜剧, 动作", "tags": "灵异, 搭档, 港式幽默, 破案", "summary": "阿强是被警队辞退的倒霉蛋，欠一屁股债，决定跳楼。结果没死成，反而摔出了“阴阳眼”。从此他被一群生前是警察的鬼魂缠上了——“鬼差”陈伯、方言极重的“鬼后”花姐、只会跳机械舞的“鬼仔”阿乐。这群鬼逼着阿强帮他们完成未了的案件，否则就让他永不安宁。阿强被迫用“捉鬼”的方式“捉人”，用各种奇葩道具和鬼魂的特殊能力破获了一起黑帮贩毒案。最后他发现，这群鬼之所以不投胎，是因为他们都在等待一个真相——阿强当年被开除就是被这个黑帮陷害的。人鬼搭档最终在废弃的戏院里上演终极对决。", "one_line": "一个被开除的废柴警察自杀失败，发现自己从此能看见鬼魂，还被一群逗比鬼魂逼着去破案。", "bucket": "comedy"}, {"id": "0829", "title": "出发吧！我的脱单假期", "filename": "m0829.html", "year": "2023", "region": "意大利", "genre": "喜剧, 爱情", "tags": "意式浪漫, 单身旅行, 反转, 治愈", "summary": "老实说，这是一场灾难。女主角赛琳娜30岁，从未恋爱过。她斥巨资报名“爱情特快”旅行团，号称五天必脱单。结果大巴上坐了8对来“修复关系”的中年情侣，全程都在吵架、冷战、扔戒指。唯一另一个单身的，是逃婚出来的新郎马可，穿着新郎服就跳上了大巴。整个旅程，赛琳娜成了8对情侣的免费调解员，而马可在旁边捣乱式地提分手建议。最后一天，赛琳娜崩溃大哭，说自己只想谈一次恋爱。马可脱下西装外套披在她身上，说：“那现在开始吧。我叫马可，我是个刚逃婚的混蛋，你愿意从第一句‘你好’开始吗？”", "one_line": "30岁母胎单身的女孩报名“脱单旅行团”，结果全团都是来疗伤的情侣，只有她和一个逃婚新郎是单着的。", "bucket": "comedy"}, {"id": "0830", "title": "玛格丽塔的情人", "filename": "m0830.html", "year": "2019", "region": "法国", "genre": "同性 / 爱情 / 战争", "tags": "一战，女同，庄园，书信，秘密", "summary": "一战结束，女伯爵阿德里安娜带着面部伤疤回到家族庄园，未婚夫克里斯托弗对她体贴入微，却总在深夜独自去庄园旁的玫瑰屋。阿德里安娜跟踪发现，玫瑰屋里住着一个沉默的女人——玛格丽塔，克里斯托弗对外宣称她是自己雇来的钢琴教师。在试探与对峙中，阿德里安娜震惊地发现，玛格丽塔正是她在前线战地医院里相爱并失散的护士情人。当年两人被战火冲散，玛格丽塔被误认为阵亡。如今，玛格丽塔因战地经历丧失语言能力，而克里斯托弗娶她，只是为了永远囚禁这个“让未婚妻变成同性恋”的女人。三个人的爱欲与罪孽，在玫瑰盛开的庄园里迎来血色绽放。", "one_line": "一战后，受伤的女伯爵回到庄园，发现未婚夫的“情人”玛格丽塔，竟是自己失散多年的战地恋人。", "bucket": "romance"}, {"id": "0831", "title": "我所有微不足道的悲伤", "filename": "m0831.html", "year": "2021", "region": "中国台湾", "genre": "剧情 / 家庭", "tags": "亲情， 绝症， 和解", "summary": "宋怀玉是一名成功的策展人，她冷漠、理智，与母亲林秀兰断绝来往十年。当她接到医院电话得知母亲患上阿兹海默症时，本想直接支付看护费了事，却意外发现母亲收藏着一箱子自己从小到大的“破烂”——一张不及格的考卷、一只摔坏的万花筒、一件洗得发白的旧校服。出于愧疚，宋怀玉把母亲接回了家。随着母亲记忆的不断错乱，那些深埋在争吵下的误会逐一浮出水面：母亲的改嫁并非背叛，父亲的家暴另有隐情。当母亲终于认不出自己女儿的脸时，宋怀玉才开始用一场虚构的“展览”，把母亲缺失的幸福童年一件件还给她。", "one_line": "一位患了阿兹海默症的母亲，在记忆彻底消失前，试图修复与恨了自己十年的女儿的关系。", "bucket": "drama"}, {"id": "0832", "title": "魔鬼着魔", "filename": "m0832.html", "year": "2018", "region": "西班牙", "genre": "恐怖 / 心理", "tags": "驱魔, 邪教, 反转, 信仰质疑", "summary": "年轻女孩艾玛被送入修道院驱魔，她言行暴烈、力大无穷，能用拉丁文背诵失传的异端经文。资深驱魔师托雷斯神父使用了所有仪式手段都无效，反而在艾玛的嘲讽中开始怀疑自己的信仰。某次艾玛突然平静地说：“你们向上帝祷告驱赶我，可我就是你们祷告的对象。”影片后半段彻底反转：原来真正的恶魔从未附身，而是假装附身来诱骗神父进行长时间的渎神仪式。当托雷斯最终念出“我放弃信仰”时，艾玛恢复了正常，而神父彻底疯了。结尾镜头中，托雷斯在精神病院对着空气做驱魔手势。", "one_line": "驱魔仪式上，神父发现附身的不是魔鬼，而是上帝。", "bucket": "horror"}, {"id": "0833", "title": "杨善洲", "filename": "m0833.html", "year": "2011", "region": "中国大陆", "genre": "传记 / 剧情", "tags": "楷模, 植树造林, 真实事件改编, 公仆", "summary": "影片根据云南保山地委书记杨善洲真实事迹改编。退休当天，他谢绝了组织安排的省城住房，独自住进大亮山的窝棚，开始义务植树造林。二十二年间，他带领林场职工和周边百姓，将5.6万亩荒山变成林海，价值超过3亿元。但他生活极其清贫，女儿结婚拿不出嫁妆，家里漏雨无钱修补。当林场验收合格后，他拒绝一分钱奖金，将林场经营管理权无偿移交国家。2010年杨善洲病逝，遗嘱要求将骨灰分为三份，一份撒在大亮山，一份撒在老家，一份留给老伴将来合葬。", "one_line": "退休地委书记放弃进城养老，上山种树二十二年，死后骨灰撒遍青山。", "bucket": "drama"}, {"id": "0834", "title": "小型事故", "filename": "m0834.html", "year": "2024", "region": "法国", "genre": "剧情、家庭、社会", "tags": "童年创伤、连锁反应、道德困境", "summary": "上班族文森特在早高峰轻微追尾前车，双方和解，无人员伤亡。然而当晚，前车司机留下遗书跳河自尽，称“二十年前那件事的愧疚终于压垮了我”。文森特开始调查，发现死者是当年一家托儿所员工，而自己年幼时曾在那家托儿所待过。翻开旧相册，母亲终于坦白：文森特四岁时曾被该员工无意中锁在储物间一整夜，出来后性格大变，而家人为了“不把事情闹大”选择了沉默。如今，当年的“小型事故”已经毁掉了文森特的婚姻、事业以及他与父亲的关系，而死者遗言中那句话，只有文森特一个人理解其真正含义。", "one_line": "一场无人受伤的小型追尾，却牵出二十年前一个被“小事”毁掉的五口之家。", "bucket": "drama"}, {"id": "0835", "title": "埃尔利希博士的魔弹", "filename": "m0835.html", "year": "2025", "region": "德国", "genre": "传记/剧情/历史", "tags": "医学史, 理想主义, 科研, 抗争", "summary": "1900年代初，梅毒如瘟疫般席卷欧洲，无药可医。德国医生保罗·埃尔利希怀抱着“化学疗法”的疯狂设想，试图用染料给病菌染色并精准杀死它们，被医学界视为异端。在巨额债务与资金断裂的绝境中，他得到了富商弗雷德里希的资助，却在即将成功时被嫉妒他的学阀古斯塔夫以“人体实验”的罪名举报。面对牢狱之灾与舆论绞杀，埃尔利希在妻子的支持下顶住压力，夜以继日地筛选了第六百零六种化合物。最终，他成功研制出了“砷凡纳明”，用这枚幻想中的魔弹，撞开了现代化学疗法的大门。", "one_line": "面对世纪绝症与学阀围剿，一位偏执的医学博士赌上一切，只为寻找那枚能精准杀死病魔的“魔法子弹”。", "bucket": "drama"}, {"id": "0836", "title": "玩命鎗火", "filename": "m0836.html", "year": "2021", "region": "美国", "genre": "动作，犯罪，惊悚", "tags": "黑吃黑，密室枪战，黑色幽默，多线叙事", "summary": "夜幕下的洛杉矶，六名身份各异的军火贩子在废弃仓库进行秘密交易。当偏执狂马格南怀疑有人私吞定金时，他手中的左轮意外走火，瞬间点燃了所有人的神经。前特种兵出身的保安试图维持秩序，却被误认为是警方卧底。女谈判专家艾娃被困在二楼办公室，她发现这场混乱背后竟藏着一名神秘杀手，正利用混乱逐个清除目标。子弹横飞，友情与背叛在硝烟中不断反转，最终仅剩两人对峙时，才惊觉整场火拼不过是幕后大佬清理门户的一盘棋。", "one_line": "一场地下军火交易因一枚走火的子弹，演变成仓库内六派人马的无差别疯狂枪战。", "bucket": "action"}, {"id": "0837", "title": "一闪一闪亮星星", "filename": "m0837.html", "year": "2025", "region": "中国大陆", "genre": "爱情, 奇幻", "tags": "时间回溯, 遗憾, 暗恋, 治愈", "summary": "内向的女孩林星辞有一个奇怪的能力：每当她因为某句话感到极度后悔时，时间会倒退回说那句话之前。她用这个能力不断修正与暗恋对象季远舟之间的对话，试图让关系走向完美。但随着一次又一次回溯，她发现季远舟对她的好感其实来自于她某次“不完美”的真诚失言。更可怕的是，每次回溯都会让季远舟的一些记忆消失。最后一次，林星辞面临抉择：说出完美的告白，季远舟会接受但永远不知道她是谁；或者说出糟糕的真话，时间不再倒流。她选了后者，而季远舟说：“你这次好奇怪，但我好像很久以前就喜欢你了。”", "one_line": "每一次她后悔说出某句话，时间就会倒退回那句话之前，但她发现改写也意味着失去一些从未说出口的真心。", "bucket": "romance"}, {"id": "0838", "title": "赌徒5150", "filename": "m0838.html", "year": "2024", "region": "中国香港", "genre": "犯罪、心理惊悚", "tags": "高利贷、极限赌局、人格分裂、反转", "summary": "债台高筑的赌徒陈乐被神秘组织带入一间名为5150的秘密赌室。这里不赌金钱，只赌“自我”。每一轮，他都必须押上自己的一段珍贵记忆或一种人格特质。随着“善意”、“初恋记忆”、“道德感”逐一输掉，他变成了一个冷酷、陌生的赌徒。最终，他面对的是赌局幕后操纵者——另一个更完美的自己。为了赢得自由，他必须赌上最后剩下的一样东西：对“现实”的认知。", "one_line": "赌徒在5150号房的致命赌局中，发现筹码是自己的记忆与人格。", "bucket": "crime"}, {"id": "0839", "title": "美丽的南方", "filename": "m0839.html", "year": "2023", "region": "中国大陆", "genre": "家庭、生活", "tags": "返乡, 代际冲突, 田园治愈, 女性成长", "summary": "设计师林小溪在婚礼当天被悔婚，心灰意冷之下被迫回到广西老家的荔枝园。父亲病重，果园濒临破产，还欠下全村巨债。她本想卖掉果园一走了之，却发现母亲留下的笔记本里写满了生态种植的“疯话”。在年轻村官阿亮和一群留守老人的帮助下，她尝试用全新的直播电商模式救活果园。与此同时，她渐渐揭开母亲当年离开的真相，也与自己和解。", "one_line": "一个城市女孩被迫回到南方农村老家，接手即将倒闭的家族果园，却发现更大的秘密。", "bucket": "drama"}, {"id": "0840", "title": "野兽特警2003", "filename": "m0840.html", "year": "2003", "region": "中国香港", "genre": "动作", "tags": "黑警, 卧底, 暴力美学, 枪战", "summary": "绰号“野兽”的重案组警长马志恒行事暴烈，以暴制暴，是警队中的异类。2003年，一名刚毕业的年轻警员被安排成为他的搭档。年轻警员逐渐发现，马志恒之所以如此疯狂，是因为他的线人女友三年前被黑帮老大“鬼王”活活打死，而证据不足无法定罪。如今“鬼王”重出江湖，马志恒决定在回归纪念日前用自己的方式结束这一切。年轻警员面临着职业道德与个人情感的双重煎熬，他必须选择是阻止马志恒，还是成为他手中的另一把枪。最后的枪战在霓虹灯下展开，野兽最终带着微笑倒下。", "one_line": "2003年的九龙城寨，一个比悍匪更像野兽的警察，用私刑执行着自己心中的正义。", "bucket": "action"}, {"id": "0841", "title": "诸神之锤", "filename": "m0841.html", "year": "2024", "region": "挪威 / 丹麦", "genre": "动作 / 历史 / 奇幻", "tags": "维京, 北欧神话, 史诗, 血腥", "summary": "公元875年。维京英雄拉格纳战死英格兰，灵魂被女武神带入冥界。其子比约恩为将父亲灵魂救回英灵殿，必须按照预言集齐被奥丁打碎的三块“雷神之锤”碎片：第一块在挪威海蛇的腹中，第二块在法兰克国王的王冠上，第三块在冰岛火山的熔岩里。比约恩召集十二名狂战士，踏上血腥征程。他们屠海蛇、攻城堡、跳火山，每集齐一块，比约恩的身体就获得一部分雷神之力——但副作用是逐渐失去人性。最终在冥界之门，他用已变得如石头般的手握住完整战锤，却发现自己无法认出父亲的灵魂。锤子说：成为神，就没有父亲。", "one_line": "维京传奇英雄拉格纳之子，为了从冥界抢回父亲灵魂，必须集齐雷神之锤的三个碎片。", "bucket": "action"}, {"id": "0842", "title": "法不容情", "filename": "m0842.html", "year": "2022", "region": "中国大陆", "genre": "律政, 剧情", "tags": "正义, 反腐, 人性", "summary": "律界新星沈峥为追求不败纪录，接下了一起富二代奸杀案的辩护。他利用程序漏洞成功为当事人争取到了无罪释放。就在庆功宴上，一份匿名证据寄到了他手里，直指这起案件的真正凶手是他的父亲——那位即将被提名为最高法院大法官的法学泰斗。沈峥在正义与亲情间挣扎，他开始暗中调查，发现父亲多年来利用法律漏洞建立了一个服务于权贵的“完美犯罪”链条。当最后一场庭审到来，父亲坐在旁听席上，沈峥必须在掌声和唾弃之间，选择做一个真正的“人”。", "one_line": "金牌律师为杀人犯脱罪后，发现真凶竟是自己的司法界父亲。", "bucket": "drama"}, {"id": "0843", "title": "周末情人", "filename": "m0843.html", "year": "2025", "region": "中国大陆", "genre": "爱情 / 悬疑", "tags": "密室, 身份互换, 黑色幽默, 限时", "summary": "每个周末，已婚女高管周静与健身教练阿猛都会在郊外民宿偷情。这个周六早晨，他们醒来发现房门被焊死，房内只有一袋干粮、一把水果刀和一张纸条。门外传来一个男人的声音，自称是周静丈夫。他给出一条残酷规则：48小时后，若两人都在，他将引爆整栋楼；若只剩一人，则开门放生。周静与阿猛从情人瞬间转为猜忌对手。两人开始疯狂翻找逃生线索，却意外发现对方隐藏的秘密远比偷情更致命——他们都曾想杀各自伴侣。而门外的“丈夫”，也许根本不是丈夫。", "one_line": "一对偷情男女被困民宿密室，门外自称“真丈夫”的男人说：只有一人能活着出来。", "bucket": "romance"}, {"id": "0844", "title": "丢失的时间", "filename": "m0844.html", "year": "2023", "region": "西班牙", "genre": "悬疑 / 科幻", "tags": "时间循环、记忆、小镇、失踪、谜题", "summary": "建筑师艾琳娜回到阔别二十年的西班牙小镇处理母亲遗产。她发现全镇居民的日历、钟表、手机都显示同一天——6月18日，但所有人对这一天发生的事情描述互相矛盾。有人说那天是晴天，有人坚持下了暴雨。更诡异的是，她童年最好的朋友露西亚就是在6月18日失踪的，而所有人都坚称“没有叫露西亚的人”。艾琳娜在母亲阁楼发现一台旧录像机，播放出的画面显示那天下午小镇曾短暂陷入完全静止，所有钟表停在15:32。她开始寻找同样记得露西亚的人，发现几个“知情者”陆续意外死亡。最终她在小镇教堂地下的暗道里找到了静止的时间本身——一个发光的球体，而露西亚被困在里面二十年。", "one_line": "一个女人回到故乡发现所有人都记错了同一天的时间，而她的童年好友在二十年前的那天消失了。", "bucket": "suspense"}, {"id": "0845", "title": "雪崩行动", "filename": "m0845.html", "year": "2024", "region": "美国", "genre": "历史，悬疑，谍战", "tags": "二战，纳粹原子弹，挪威重水工厂，破坏小队，真实历史改编", "summary": "1943年，挪威泰勒马克。盟军派出的“雪崩行动”破坏小队成功炸毁了纳粹重水工厂，但他们很快得知：纳粹已将大部分重水和核心科学家转移至隐秘的“山谷基地”，并计划在六周内制造出第一枚原子弹。更致命的是，盟军指挥部认为任务已完成，切断了所有联系，并宣称“雪崩小队全员阵亡以绝后患”。幸存的六名挪威破坏兵和一名英国军官被遗弃在零下四十度的雪原上，装备只够维持三周。他们召开了一场残酷的投票：是隐姓埋名逃往中立国瑞典活命，还是以“已死之人”的身份，用自己的方式潜入山谷基地，进行一场不可能的自杀式袭击。而他们不知道的是，基地的安保主管，正是其中一人的亲哥哥。", "one_line": "一群被盟军抛弃在挪威雪山上的破坏兵，必须自行决定：炸工厂，还是炸已经造出的原子弹？", "bucket": "drama"}, {"id": "0846", "title": "停止呼吸", "filename": "m0846.html", "year": "2025", "region": "美国", "genre": "科幻 / 惊悚", "tags": "纳米科技，意识上传，临终虚拟世界，道德困境", "summary": "未来世界，科技公司推出“永生休眠”技术，让绝症患者在弥留之际将意识上传至虚拟天堂，肉体则停尸休眠。少女米娅签约后，本应进入美好的死后世界，却发现自己身处无尽的恐怖走廊，每次“死亡”都会重置。她意识到系统出了致命错误，必须在肉体被火化前找到“唤醒代码”。", "one_line": "身患绝症的女孩签约“睡眠计划”，醒来后发现意识被囚禁在一个无限循环的噩梦里。", "bucket": "sci-fi"}, {"id": "0847", "title": "异物志", "filename": "m0847.html", "year": "2022", "region": "中国大陆", "genre": "悬疑, 奇幻, 动作", "tags": "都市传说, 超自然物品, 单元探案, 团队作战, 国产网剧", "summary": "女友离奇溺亡在没有任何水源的房间里，这让石坚的人生从此只有两个字：复仇。在调查过程中，他意外获得一把神奇钥匙——插入任何有水的地方，都能操控液态水。他也因此被卷入了一个存在数千年的秘密组织“物委会”的纷争。该组织专门寻找和保管具有超自然力量的“异物”：能让人隐身的神像、可打印未来报纸的打印机、装着另一个世界的大门把手。石坚联合了同样拥有异物的几个伙伴——能用照片偷走记忆的记者、速度极快的快递员、以及一个自称来自异世界的少女。他们一边对抗觊觎异物的邪恶公司“联盟”，一边在找到杀死女友的“时间停止怀表”后，发现了一个关于世界真相的惊天秘密。", "one_line": "一件能控制水的 ancient 钥匙，一本可以召唤记忆的相机，一个专门收集异物的神秘组织。", "bucket": "suspense"}, {"id": "0848", "title": "大法官金斯伯格", "filename": "m0848.html", "year": "2023", "region": "美国", "genre": "传记 / 剧情", "tags": "律政, 女权, 传记, 平权", "summary": "本片聚焦美国最高法院大法官鲁斯·巴德·金斯伯格早年的职业生涯。1950年代，她从康奈尔毕业后进入哈佛法学院，是全院500名学生中仅有的9名女性之一。她曾因性别被律所拒绝，被法官质疑“女人为什么抢男人的工作”。金斯伯格没有公开怒吼，而是用冷静的法律策略，在法庭上一条一条推翻基于性别的歧视性法律。电影重点呈现了她1970年代在ACLU主导的六件里程碑式性别平权案，以及她如何从一个被轻视的女性，成长为宪法平权条款最坚定的守护者。", "one_line": "她从被歧视的女性律师，一步步成为美国最高法院的RBG。", "bucket": "drama"}, {"id": "0849", "title": "进击的鼓手", "filename": "m0849.html", "year": "2014", "region": "美国", "genre": "剧情，音乐", "tags": "偏执，艺术追求，师徒，极限施压", "summary": "19岁的安德鲁考入全美顶尖的音乐学院，一心想成为像巴迪·里奇一样的传奇鼓手。他被魔鬼导师弗莱彻选入核心乐队，本以为梦想启动，却发现这是噩梦的开始。弗莱彻用谩骂、扔椅子、扇耳光的方式教学，要求鼓手打到双手出血、虎口撕裂也不准停。安德鲁为了得到认可，疯狂练习，甚至为了准时参加排练而选择出车祸后带血爬出车。他甩掉了女友，与家人决裂，整个人被偏执吞噬。在一次重要演出上，安德鲁因紧张搞砸了，并在愤怒中殴打了弗莱彻，被学校开除。几个月后，他在酒吧偶遇弗莱彻，对方邀请他参加一场爵士音乐节。当安德鲁走上台，才发现弗莱彻给他的乐谱是错的——这是一场蓄意的毁灭。但在全场的嘲笑声中，安德鲁没有下场，而是转身回到鼓前，开始了属于自己的、疯狂的独奏。", "one_line": "一个想成为顶级爵士鼓手的音乐学院学生，遇到了一位用极致暴力手段“激励”学生的魔鬼导师。", "bucket": "drama"}, {"id": "0850", "title": "马警长的故事", "filename": "m0850.html", "year": "2024", "region": "中国大陆", "genre": "刑侦, 乡村, 剧情", "tags": "乡村警察, 单元剧, 人情世故, 悬疑", "summary": "东北小镇，
